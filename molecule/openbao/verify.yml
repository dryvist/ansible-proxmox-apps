---
# Molecule verification playbook — validates install + config without a live
# OpenBao (the service does not start under Docker).

- name: Verify
  hosts: all
  become: true
  gather_facts: true

  vars:
    openbao_user: openbao
    openbao_data_dir: /opt/openbao/data
    openbao_config_dir: /etc/openbao
    openbao_config_file: /etc/openbao/openbao.hcl
    openbao_env_file: /etc/openbao/openbao.env
    openbao_terrakube_workspace_names:
      - iac-platform
      - tofu-github
      - tofu-unifi
      - tofu-aws-production
      - tofu-runs-on
      - tofu-proxmox
      - tofu-proxmox-aws-infra
      - tofu-proxmox-servarr-config

  tasks:
    - name: Check the bao binary is installed
      ansible.builtin.stat:
        path: /usr/bin/bao
      register: bao_bin

    - name: Assert the bao binary exists
      ansible.builtin.assert:
        that:
          - bao_bin.stat.exists
        fail_msg: "bao binary not found at /usr/bin/bao"

    - name: Check the openbao system user exists
      ansible.builtin.command:
        cmd: "id {{ openbao_user }}"
      register: bao_user
      changed_when: false
      failed_when: bao_user.rc != 0

    - name: Check the data directory exists with 0700
      ansible.builtin.stat:
        path: "{{ openbao_data_dir }}"
      register: bao_data

    - name: Assert the data directory is 0700 and owned by openbao
      ansible.builtin.assert:
        that:
          - bao_data.stat.exists
          - bao_data.stat.isdir
          - bao_data.stat.mode == '0700'
          - bao_data.stat.pw_name == openbao_user
        fail_msg: "Data dir missing or wrong perms/owner: {{ bao_data.stat | default({}) }}"

    - name: Check the rendered config exists
      ansible.builtin.stat:
        path: "{{ openbao_config_file }}"
      register: bao_cfg

    - name: Assert the config exists
      ansible.builtin.assert:
        that:
          - bao_cfg.stat.exists
        fail_msg: "openbao.hcl was not rendered"

    - name: Read the rendered config
      ansible.builtin.slurp:
        src: "{{ openbao_config_file }}"
      register: bao_cfg_content

    - name: Assert the config has the expected stanzas
      ansible.builtin.assert:
        that:
          - "'storage \"raft\"' in (bao_cfg_content.content | b64decode)"
          # On-prem static-key seal — never the cloud awskms seal.
          - "'seal \"static\"' in (bao_cfg_content.content | b64decode)"
          - "'awskms' not in (bao_cfg_content.content | b64decode)"
          # Raft auto-join: a retry_join block is rendered per peer.
          - "'retry_join' in (bao_cfg_content.content | b64decode)"
          - "'listener \"tcp\"' in (bao_cfg_content.content | b64decode)"
          # Listener must bind the VLAN IP, never all-interfaces. Match the
          # address:port form ('0.0.0.0:') so the template's explanatory comment
          # (which mentions 0.0.0.0) does not false-trip this assertion.
          - "'0.0.0.0:' not in (bao_cfg_content.content | b64decode)"
          - "'192.168.20.210:8200' in (bao_cfg_content.content | b64decode)"
        fail_msg: "openbao.hcl missing expected stanzas, has awskms, or bound to 0.0.0.0"

    - name: Check the env file exists with 0600
      ansible.builtin.stat:
        path: "{{ openbao_env_file }}"
      register: bao_env

    - name: Assert the env file is 0600
      ansible.builtin.assert:
        that:
          - bao_env.stat.exists
          - bao_env.stat.mode == '0600'
        fail_msg: "openbao.env missing or not 0600 ({{ bao_env.stat.mode | default('absent') }})"

    - name: Read the rendered env file
      ansible.builtin.slurp:
        src: "{{ openbao_env_file }}"
      register: bao_env_content

    - name: Assert the env file carries the static seal key, not AWS creds
      ansible.builtin.assert:
        that:
          - "'OPENBAO_STATIC_SEAL_KEY=' in (bao_env_content.content | b64decode)"
          - "'AWS_ACCESS_KEY_ID' not in (bao_env_content.content | b64decode)"
          - "'AWS_SECRET_ACCESS_KEY' not in (bao_env_content.content | b64decode)"
        fail_msg: "openbao.env should carry OPENBAO_STATIC_SEAL_KEY and no AWS creds"

    - name: Check the systemd unit was installed
      ansible.builtin.stat:
        path: /etc/systemd/system/openbao.service
      register: bao_unit

    - name: Assert the systemd unit exists
      ansible.builtin.assert:
        that:
          - bao_unit.stat.exists
        fail_msg: "openbao.service unit not installed"

    # --- Automated raft snapshot daemon (rendered when snapshot creds are set;
    # converge.yml stubs them). The timer never starts under Docker, but the
    # script/env/service/timer templates must all render. ---
    - name: Stat the snapshot daemon files
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /usr/local/bin/openbao-snapshot.sh
        - /etc/openbao/openbao-snapshot.env
        - /etc/systemd/system/openbao-snapshot.service
        - /etc/systemd/system/openbao-snapshot.timer
      register: bao_snap_files

    - name: Assert the snapshot script, env, service, and timer all rendered
      ansible.builtin.assert:
        that:
          - item.stat.exists
        fail_msg: "snapshot daemon file missing: {{ item.item }}"
      loop: "{{ bao_snap_files.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Assert the snapshot env file is 0600 (holds the AppRole creds)
      ansible.builtin.assert:
        that:
          - bao_snap_files.results[1].stat.mode == '0600'
        fail_msg: >-
          openbao-snapshot.env must be 0600
          ({{ bao_snap_files.results[1].stat.mode | default('absent') }})

    - name: Read the rendered snapshot script
      ansible.builtin.slurp:
        src: /usr/local/bin/openbao-snapshot.sh
      register: bao_snap_script

    - name: Assert the snapshot script leader-gates, verifies, and alerts
      ansible.builtin.assert:
        that:
          # Leader-gated: only the active node snapshots.
          - "'/v1/sys/leader' in (bao_snap_script.content | b64decode)"
          - "'is_self' in (bao_snap_script.content | b64decode)"
          # Takes + integrity-checks the snapshot.
          - "'operator raft snapshot save' in (bao_snap_script.content | b64decode)"
          - "'gzip -t' in (bao_snap_script.content | b64decode)"
          # Least-privilege snapshot AppRole login, not a root token.
          - "'auth/approle/login' in (bao_snap_script.content | b64decode)"
        fail_msg: "openbao-snapshot.sh missing leader-gate, snapshot-save, integrity, or approle-login logic"

    # RBAC bootstrap (policies/AppRoles) only runs against a live, unsealed
    # server — unreachable under this Docker scenario — so it can't be
    # exercised here. What CAN be checked without a live server: every policy
    # template the role's defaults reference actually exists, catching a
    # rename/typo before it reaches a live cluster. Live AppRole/policy
    # behavior (capabilities, cross-domain isolation) is proven separately
    # against the real cluster.
    - name: Check every RBAC policy template referenced in role defaults exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../../roles/openbao/templates/{{ item }}"
      loop:
        - terraform-apply-policy.hcl.j2
        - terrakube-workspace-policy.hcl.j2
        - ansible-converge-policy.hcl.j2
        - observability-policy.hcl.j2
        - local-cloud-policy.hcl.j2
        - monitoring-policy.hcl.j2
        - media-policy.hcl.j2
        - local-llm-policy.hcl.j2
        - public-policy.hcl.j2
        - kv-capability-policy.hcl.j2
        - github-mint-policy.hcl.j2
        - ai-admin-policy.hcl.j2
        - snapshot-policy.hcl.j2
      register: bao_policy_templates
      delegate_to: localhost
      become: false

    - name: Assert every RBAC policy template is present
      ansible.builtin.assert:
        that:
          - item.stat.exists
        fail_msg: "Missing OpenBao policy template: {{ item.item }}"
      loop: "{{ bao_policy_templates.results }}"
      loop_control:
        label: "{{ item.item }}"

    # --- Self-escalation invariant for the leaf->rollup composition model -------
    # The base read-/write- capability policies + the rollups composed from them
    # (read-all, read-write-all) must be an ENUMERATED union that provably EXCLUDES
    # the control plane and the IaC kernel: sys/policies*, auth/* (incl.
    # .../secret-id), auth/token/create, and secret/infra/*. Composition attaches
    # policy NAMES to a token, so if every base leaf excludes those paths, so does
    # every union of leaves. We prove it by rendering every generated capability
    # policy and scanning its GRANT lines (dropping `#` comment lines, which name
    # the excluded paths in prose). `ai-admin` is the ONE self-modify role and is
    # deliberately NOT part of this composition — it is asserted separately.
    - name: Load OpenBao role defaults (rendered) for the composition invariant
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../roles/openbao/defaults/main.yml"

    - name: Render every generated base capability policy (read-/write-/github-mint)
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../roles/openbao/templates/{{ item.template }}"
        dest: "/tmp/cap-{{ item.name }}.hcl"
        mode: "0600"
      loop: "{{ openbao_ai_capability_policies }}"
      loop_control:
        label: "{{ item.name }}"
      delegate_to: localhost
      become: false

    - name: Slurp the rendered base capability policies back
      ansible.builtin.slurp:
        src: "/tmp/cap-{{ item.name }}.hcl"
      loop: "{{ openbao_ai_capability_policies }}"
      loop_control:
        label: "{{ item.name }}"
      register: bao_cap_policy_reads
      delegate_to: localhost
      become: false

    - name: Assert NO base capability leaf grants a control-plane / kernel path
      vars:
        # Concatenate every leaf's GRANT lines (reject `#` comment lines).
        cap_grants: >-
          {{ bao_cap_policy_reads.results
             | map(attribute='content') | map('b64decode')
             | map('regex_replace', '(?m)^#.*$', '') | join('\n') }}
      ansible.builtin.assert:
        that:
          - "'sys/policies' not in cap_grants"
          - "'auth/approle' not in cap_grants"
          - "'auth/token' not in cap_grants"
          - "'/secret-id' not in cap_grants"
          - "'secret/data/infra' not in cap_grants"
          - "'secret/metadata/infra' not in cap_grants"
          # Positive: the write leaves DO grant scoped create/update/delete/patch.
          - "'create\", \"update\", \"delete\", \"patch' in cap_grants"
        fail_msg: >-
          A base read-/write- capability leaf gained a self-escalation grant
          (policy edit / auth mint / secret-id / token mint / infra kernel), so
          every rollup composed from the leaves would inherit it.

    - name: Read OpenBao defaults source for the remaining structural assertions
      ansible.builtin.slurp:
        src: "{{ playbook_dir }}/../../roles/openbao/defaults/main.yml"
      register: bao_defaults_source
      delegate_to: localhost
      become: false

    # The read-write-all rollup must be a union of ONLY the generated read-/write-
    # base leaf names — never a hand-added admin/control policy — so it cannot
    # smuggle in `ai-admin`, a terrakube policy, etc.
    - name: Assert read-write-all is exactly the read-/write- leaves of the source list
      vars:
        rw_expected: >-
          {{ (openbao_ai_domains | map('regex_replace', '^(.+)$', 'read-\1') | list)
             + (openbao_ai_domains | map('regex_replace', '^(.+)$', 'write-\1') | list) }}
      ansible.builtin.assert:
        that:
          - (openbao_read_write_all_policies | sort) == (rw_expected | sort)
          # No member outside the read-/write- namespace (no admin/control policy).
          - (openbao_read_write_all_policies | select('match', '^(?!read-|write-).*') | list | length) == 0
        fail_msg: >-
          read-write-all contains a policy that is not a read-/write- base leaf of
          openbao_ai_domains — the composition could carry a control-plane grant.

    # Every apply/admin actor role must carry NO standing secret_id — the
    # human-gated model mints a single-use wrapped one on demand. Uses the RENDERED
    # openbao_approles (Jinja-composed), covering the generated ai-apply-<svc>.
    - name: Assert every apply/admin actor role carries no standing secret_id
      vars:
        gated_roles: >-
          {{ (openbao_ai_domains | map('regex_replace', '^(.+)$', 'ai-apply-\1') | list)
             + ['ai-apply-all', 'ai-admin'] }}
      ansible.builtin.assert:
        that:
          - >-
            openbao_approles
            | selectattr('name', 'in', gated_roles)
            | selectattr('manage_secret_id', 'equalto', false)
            | list | length == (gated_roles | length)
        fail_msg: "An apply/admin AI actor role (ai-apply-*/ai-admin) is missing manage_secret_id:false"

    # ai-admin is the ONLY role permitted to self-modify (policy/auth/token). Prove
    # it attaches its own standalone ai-admin policy, NOT the composed base leaves.
    - name: Assert ai-admin is the sole self-modify role (standalone policy, not composed leaves)
      vars:
        admin_role: "{{ openbao_approles | selectattr('name', 'equalto', 'ai-admin') | first }}"
      ansible.builtin.assert:
        that:
          - admin_role.policy | default('') == 'ai-admin'
          - admin_role.token_policies is not defined
        fail_msg: "ai-admin must attach the standalone ai-admin policy, not composed base leaves."

    - name: Assert all nine exact-claim Terrakube JWT roles are declared
      ansible.builtin.assert:
        that:
          - >-
            item in ((bao_defaults_source.content | b64decode | from_yaml).openbao_terrakube_workspaces
            | map(attribute='name', default='') | reject('equalto', '') | list)
        fail_msg: "Missing Terrakube JWT workspace declaration: {{ item }}"
      loop: "{{ openbao_terrakube_workspace_names }}"

    # The AWS secrets engine registration/config only runs against a live
    # server (init.yml is entirely docker-guarded), so it can't be exercised
    # here either. What CAN be checked without a live server: the external
    # plugin binary actually staged, the server config pointing at it, and the
    # terraform-apply policy template source still granting the dynamic AWS
    # STS path — catches a future edit silently dropping any of them.
    - name: Assert the rendered config sets plugin_directory
      ansible.builtin.assert:
        that:
          - "'plugin_directory' in (bao_cfg_content.content | b64decode)"
        fail_msg: "openbao.hcl is missing plugin_directory (external plugins would be unloadable)"

    - name: Stat the staged AWS plugin binary
      ansible.builtin.stat:
        path: /opt/openbao/plugins/openbao-plugin-secrets-aws_linux_amd64_v1-v0.3.0
      register: bao_aws_plugin

    - name: Assert the AWS plugin binary is staged, root-owned, and not world/group-writable
      ansible.builtin.assert:
        that:
          - bao_aws_plugin.stat.exists
          - bao_aws_plugin.stat.pw_name == 'root'
          - bao_aws_plugin.stat.mode == '0750'
        fail_msg: >-
          AWS plugin binary missing or wrong owner/mode:
          {{ bao_aws_plugin.stat | default({}) }}

    - name: Stat the staged GitHub plugin binary
      ansible.builtin.stat:
        path: /opt/openbao/plugins/vault-plugin-secrets-github-linux-amd64-v2.3.2
      register: bao_github_plugin

    - name: Assert the GitHub plugin binary is staged and protected
      ansible.builtin.assert:
        that:
          - bao_github_plugin.stat.exists
          - bao_github_plugin.stat.pw_name == 'root'
          - bao_github_plugin.stat.mode == '0750'
        fail_msg: >-
          GitHub plugin binary missing or wrong owner/mode:
          {{ bao_github_plugin.stat | default({}) }}

    - name: Read the terraform-apply policy template source
      ansible.builtin.slurp:
        src: "{{ playbook_dir }}/../../roles/openbao/templates/terraform-apply-policy.hcl.j2"
      register: bao_terraform_apply_policy_src
      delegate_to: localhost
      become: false

    - name: Assert the terraform-apply policy grants aws/sts/tf-proxmox
      ansible.builtin.assert:
        that:
          - "'aws/sts/' in (bao_terraform_apply_policy_src.content | b64decode)"
          - "'\"read\", \"update\"' in (bao_terraform_apply_policy_src.content | b64decode)"
        fail_msg: "terraform-apply-policy.hcl.j2 is missing the dynamic AWS STS grant"

    - name: Load OpenBao role defaults for policy rendering
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../roles/openbao/defaults/main.yml"

    - name: Render the ai-orchestrator policy with role defaults
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../roles/openbao/templates/ai-orchestrator-policy.hcl.j2"
        dest: /tmp/ai-orchestrator-policy.hcl
        mode: "0600"

    - name: Read the rendered ai-orchestrator policy
      ansible.builtin.slurp:
        src: /tmp/ai-orchestrator-policy.hcl
      register: bao_ai_orchestrator_policy

    - name: Assert ai-orchestrator can mint only named GitHub permission sets
      ansible.builtin.assert:
        that:
          - "'github/token/dryvist-full-automation' in (bao_ai_orchestrator_policy.content | b64decode)"
          - "'github/token/personal-full-automation' in (bao_ai_orchestrator_policy.content | b64decode)"
          - "'github/token/*' not in (bao_ai_orchestrator_policy.content | b64decode)"
        fail_msg: "ai-orchestrator policy does not preserve the named GitHub token boundary"

    # --- SSH CA (signed client certificates, ssh-certificate-authority ADR) ---
    # init.yml's engine/CA/role writes are live-server-only (bootstrap-token
    # guarded), so this scenario proves the STRUCTURAL invariants: the role
    # table matches the ADR exactly, sign leaves are confined to enumerated
    # sign endpoints, and the actor attachments follow the security decisions
    # (ai-elevated signs ONLY automation-ai; readonly signs nothing).
    - name: Assert the SSH signing role table matches the ADR
      vars:
        ssh_roles_by_name: "{{ openbao_ssh_roles | items2dict(key_name='name', value_name='principal') }}"
      ansible.builtin.assert:
        that:
          - openbao_ssh_mount == 'ssh-client-ca'
          - "ssh_roles_by_name == {'automation-ai': 'ai-agent', 'automation-ansible': 'ansible', 'ci-runner': 'ci'}"
          - (openbao_ssh_roles | selectattr('name', 'equalto', 'automation-ai') | first).ttl == '1h'
          - (openbao_ssh_roles | selectattr('name', 'equalto', 'automation-ansible') | first).ttl == '1h'
          - (openbao_ssh_roles | selectattr('name', 'equalto', 'ci-runner') | first).ttl == '30m'
          # No wildcard principals, ever (documented upstream wildcard bug +
          # per-principal-class design).
          - openbao_ssh_roles | map(attribute='principal') | select('equalto', '*') | list | length == 0
        fail_msg: "openbao_ssh_roles drifted from the ssh-certificate-authority ADR table"

    - name: Assert per-role extensions (interactive AI only; ansible/ci exec-channel)
      ansible.builtin.assert:
        that:
          - >-
            (openbao_ssh_roles | selectattr('name', 'equalto', 'automation-ai') | first).extensions.keys()
            | list == ['permit-pty']
          - "(openbao_ssh_roles | selectattr('name', 'equalto', 'automation-ansible') | first).extensions == {}"
          - "(openbao_ssh_roles | selectattr('name', 'equalto', 'ci-runner') | first).extensions == {}"
        fail_msg: "SSH role extensions drifted (agent-forwarding or pty leaked into a non-interactive role)"

    - name: Render every generated ssh-sign leaf
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../roles/openbao/templates/{{ item.template }}"
        dest: "/tmp/ssh-sign-{{ item.name }}.hcl"
        mode: "0600"
      loop: "{{ openbao_ssh_sign_policies }}"
      loop_control:
        label: "{{ item.name }}"
      delegate_to: localhost
      become: false

    - name: Slurp the rendered ssh-sign leaves back
      ansible.builtin.slurp:
        src: "/tmp/ssh-sign-{{ item.name }}.hcl"
      loop: "{{ openbao_ssh_sign_policies }}"
      loop_control:
        label: "{{ item.name }}"
      register: bao_ssh_sign_policy_reads
      delegate_to: localhost
      become: false

    - name: Assert every ssh-sign leaf grants exactly one enumerated sign endpoint
      vars:
        sign_grants: >-
          {{ bao_ssh_sign_policy_reads.results
             | map(attribute='content') | map('b64decode')
             | map('regex_replace', '(?m)^#.*$', '') | join('\n') }}
      ansible.builtin.assert:
        that:
          # Only sign endpoints — never config, roles, keys, or the KV mount.
          - "'ssh-client-ca/config' not in sign_grants"
          - "'ssh-client-ca/roles' not in sign_grants"
          - "'ssh-client-ca/keys' not in sign_grants"
          - "'secret/' not in sign_grants"
          - "'sys/' not in sign_grants"
          - "'auth/' not in sign_grants"
          # Positive: the three enumerated sign paths are granted create+update.
          - "'ssh-client-ca/sign/automation-ai' in sign_grants"
          - "'ssh-client-ca/sign/automation-ansible' in sign_grants"
          - "'ssh-client-ca/sign/ci-runner' in sign_grants"
          - "'create\", \"update' in sign_grants"
        fail_msg: >-
          An ssh-sign leaf escaped the enumerated sign-endpoint allowlist —
          it could reconfigure the CA or cross into KV/control-plane paths.

    - name: Assert actor attachments follow the SSH signing security decisions
      vars:
        elevated_role: "{{ openbao_approles | selectattr('name', 'equalto', 'ai-elevated') | first }}"
        readonly_role: "{{ openbao_approles | selectattr('name', 'equalto', 'ai-readonly') | first }}"
        converge_role: "{{ openbao_approles | selectattr('name', 'equalto', 'ansible-converge') | first }}"
        apply_roles: "{{ openbao_approles | selectattr('name', 'match', '^ai-apply-') | list }}"
      ansible.builtin.assert:
        that:
          # ai-elevated signs ONLY automation-ai — never ansible/ci roles.
          - "'ssh-sign-automation-ai' in elevated_role.token_policies"
          - "'ssh-sign-automation-ansible' not in elevated_role.token_policies"
          - "'ssh-sign-ci-runner' not in elevated_role.token_policies"
          # ai-readonly signs nothing.
          - readonly_role.token_policies | select('match', '^ssh-sign-') | list | length == 0
          # ansible-converge signs ONLY automation-ansible.
          - "'ssh-sign-automation-ansible' in converge_role.token_policies"
          - >-
            converge_role.token_policies | select('match', '^ssh-sign-')
            | reject('equalto', 'ssh-sign-automation-ansible') | list | length == 0
          # every ai-apply-<svc> signs ONLY automation-ai.
          - >-
            apply_roles | map(attribute='token_policies')
            | select('contains', 'ssh-sign-automation-ai') | list
            | length == (apply_roles | length)
          - >-
            apply_roles | map(attribute='token_policies')
            | map('select', 'match', '^ssh-sign-')
            | map('reject', 'equalto', 'ssh-sign-automation-ai')
            | map('list') | flatten | length == 0
        fail_msg: >-
          SSH signing attachment drifted from the security decisions
          (ai-elevated/apply sign only automation-ai; readonly none;
          ansible-converge only automation-ansible).
