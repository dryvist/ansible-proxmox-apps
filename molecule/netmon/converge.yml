---
# Molecule converge playbook
# Tests the netmon role against the test container.

- name: Converge
  hosts: all
  become: true
  gather_facts: true

  vars:
    # Docker-in-Docker requires vfs (fuse-overlayfs is unavailable in the test
    # container).
    netmon_docker_storage_driver: vfs
    # Exercise the DOCSIS (cable) template branch — SNMP config only, no
    # Starlink sidecar to pull.
    netmon_uplink_kind: cable
    # No cribl_edge group in the test inventory; pin a local HEC URL so the
    # rendered Telegraf output is valid.
    netmon_hec_url: "http://127.0.0.1:8088/services/collector/event"
    netmon_docsis_snmp_community: "public"

  tasks:
    - name: Include netmon role
      ansible.builtin.include_role:
        name: netmon
