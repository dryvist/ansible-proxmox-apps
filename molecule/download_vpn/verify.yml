---
# Molecule verification for download_vpn (validation layer 1 — the CI gate).
#
# Proves the killswitch logic without a real Proton VPN:
#   1. The rendered nftables ruleset has output policy DROP and ONLY the
#      allowed rules (loopback, LAN, Proton endpoint, wg0).
#   2. qBittorrent is configured to bind to wg0.
#   3. With the killswitch loaded and wg0 DOWN, the netns has NO IPv4 and NO
#      IPv6 internet egress.
#   4. The validator + deploy-time validate.yml cover v4 AND v6 (asserted by
#      grepping their rendered logic).

- name: Verify
  hosts: all
  become: true
  gather_facts: true

  vars:
    download_vpn_wg_interface: wg0
    download_vpn_nft_ruleset_path: /etc/nftables.d/download-vpn-killswitch.nft
    download_vpn_wg_backup_key_path: /etc/wireguard/wg0-backup.key
    # Endpoint hosts to expect in the killswitch — from the (placeholder) env the
    # molecule scenario injects; 192.168.* fallbacks keep this committed-safe.
    _primary_ep_host: >-
      {{ (lookup('env', 'PROTON_WG_PEER_ENDPOINT')
          | default('192.168.0.7:51820', true)).split(':')[0] }}
    _backup_ep_host: >-
      {{ (lookup('env', 'PROTON_WG_BACKUP_PEER_ENDPOINT')
          | default('192.168.0.8:51820', true)).split(':')[0] }}
    # Matches the role default: download_vpn_data_dir (/data) is not overridden
    # by converge.yml, so the --profile tree lands at this fixed, deterministic
    # path (see defaults/main.yml: download_vpn_qbittorrent_{profile,config}_dir).
    download_vpn_qbittorrent_profile_dir: /data/.qbittorrent-profile
    download_vpn_qbittorrent_config_dir: /data/.qbittorrent-profile/qBittorrent/config
    download_vpn_qbittorrent_export_dir: /data/.qbittorrent-profile/exported-torrents

  tasks:
    # --- 1. ruleset content ------------------------------------------------
    - name: Read the rendered killswitch ruleset
      ansible.builtin.slurp:
        src: "{{ download_vpn_nft_ruleset_path }}"
      register: ks_file

    - name: Decode ruleset
      ansible.builtin.set_fact:
        ks: "{{ ks_file.content | b64decode }}"

    - name: Assert output chain default policy is DROP
      ansible.builtin.assert:
        that:
          - "'hook output' in ks"
          - "'policy drop' in ks"
        fail_msg: "Killswitch output chain is not default-DROP."

    - name: Assert reload is replace-not-merge (flush precedes the definition)
      ansible.builtin.assert:
        that:
          - "'flush table inet killswitch' in ks"
          - ks.index('flush table inet killswitch') < ks.index('table inet killswitch {')
        fail_msg: >-
          killswitch.nft must declare+flush its table before defining it, or a
          systemd ExecReload merges new rules after the old unconditional drop
          and config changes never take effect.

    - name: Assert ONLY the allowed egress rules are present
      ansible.builtin.assert:
        that:
          - "'oif \"lo\" accept' in ks"
          - "'oifname \"' ~ download_vpn_wg_interface ~ '\" accept' in ks"
          - "'udp dport' in ks"            # Proton handshake rule
          - "'ip daddr' in ks"             # LAN allow rule
          - "'log prefix \"killswitch-drop' in ks"
          # Negative: no blanket internet accept, no v6 ::/0 accept.
          - "'ip6 daddr ::/0 accept' not in ks"
          - "'accept comment \"any\"' not in ks"
        fail_msg: "Killswitch ruleset has unexpected or missing rules."

    - name: Assert BOTH Proton endpoints (primary + backup) are permitted
      # Failover to the backup would be blocked fail-closed unless the killswitch
      # pre-permits its endpoint too.
      ansible.builtin.assert:
        that:
          - _primary_ep_host in ks
          - _backup_ep_host in ks
        fail_msg: >-
          Killswitch does not permit both Proton endpoints (primary
          {{ _primary_ep_host }} + backup {{ _backup_ep_host }}).

    - name: Stat the backup WireGuard key
      ansible.builtin.stat:
        path: "{{ download_vpn_wg_backup_key_path }}"
      register: _backup_key

    - name: Assert the backup WireGuard key is deployed root-only (0600)
      ansible.builtin.assert:
        that:
          - _backup_key.stat.exists
          - _backup_key.stat.mode == '0600'
        fail_msg: >-
          Backup WireGuard key {{ download_vpn_wg_backup_key_path }} is missing
          or not root-only (0600).

    - name: Load the killswitch ruleset into the kernel
      ansible.builtin.command:
        cmd: "nft -f {{ download_vpn_nft_ruleset_path }}"
      changed_when: true

    - name: Read the live output chain policy
      ansible.builtin.command:
        cmd: nft list chain inet killswitch output
      register: live_chain
      changed_when: false

    - name: Assert the LIVE killswitch output policy is drop
      ansible.builtin.assert:
        that:
          - "'policy drop' in live_chain.stdout"
        fail_msg: "Loaded killswitch output policy is not drop."

    # --- 2. qBittorrent bound to wg0 ---------------------------------------
    - name: Read qBittorrent config
      ansible.builtin.slurp:
        src: "{{ download_vpn_qbittorrent_config_dir }}/qBittorrent.conf"
      register: qbt_conf

    - name: Assert qBittorrent binds to wg0
      ansible.builtin.assert:
        that:
          - "'Session\\\\Interface=' ~ download_vpn_wg_interface in (qbt_conf.content | b64decode)"
          - "'Connection\\\\Interface=' ~ download_vpn_wg_interface in (qbt_conf.content | b64decode)"
        fail_msg: "qBittorrent is not bound to wg0."

    # --- 2b. qBittorrent session/queue state persists on /data -------------
    - name: Assert qBittorrent.conf exports a persistent, plain-file torrent backup
      ansible.builtin.assert:
        that:
          - >-
            'Session\\TorrentExportDirectory=' ~ download_vpn_qbittorrent_export_dir
            in (qbt_conf.content | b64decode)
        fail_msg: >-
          qBittorrent.conf does not set Session\TorrentExportDirectory under
          the persistent /data profile tree.

    - name: Read the deployed qBittorrent systemd unit
      ansible.builtin.slurp:
        src: /etc/systemd/system/qbittorrent-nox.service
      register: qbt_unit

    - name: Assert the systemd unit passes --profile under the persistent /data tree
      ansible.builtin.assert:
        that:
          - "'--profile=' ~ download_vpn_qbittorrent_profile_dir in (qbt_unit.content | b64decode)"
        fail_msg: >-
          qbittorrent-nox.service does not start with --profile pointing under
          the persistent /data tree — the session/queue state would land back
          on the disposable container rootfs.

    # --- 3. simulate wg0 down -> no v4/v6 egress ---------------------------
    - name: Ensure IPv6 is disabled (as the role does on real hosts)
      ansible.posix.sysctl:
        name: "{{ item }}"
        value: "1"
        sysctl_set: true
        state: present
        reload: true
      loop:
        - net.ipv6.conf.all.disable_ipv6
        - net.ipv6.conf.default.disable_ipv6
      failed_when: false

    - name: Confirm wg0 is absent (down) for the leak test
      ansible.builtin.command:
        cmd: ip link show wg0
      register: wg0_present
      changed_when: false
      failed_when: false

    # noqa command-instead-of-module: this leak test deliberately uses curl so
    # behaviour matches the runtime validator exactly; the uri module's success
    # semantics differ and would mask a partial leak.
    - name: Attempt IPv4 internet egress with the killswitch up and wg0 down  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: curl -fsS --max-time 6 https://ifconfig.me
      register: leak_v4
      changed_when: false
      failed_when: false

    - name: Assert NO IPv4 egress when wg0 is down (killswitch holds)
      ansible.builtin.assert:
        that:
          - leak_v4.rc != 0
          - (leak_v4.stdout | trim | length) == 0
        fail_msg: >-
          LEAK: IPv4 internet egress succeeded with wg0 down
          (got '{{ leak_v4.stdout | trim }}'). Killswitch is not fail-closed.

    # noqa command-instead-of-module: the uri module cannot force IPv6-only
    # (curl -6); forcing the v6 family is the point of this leak test.
    - name: Attempt IPv6 internet egress with the killswitch up  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: curl -fsS -6 --max-time 6 https://ifconfig.me
      register: leak_v6
      changed_when: false
      failed_when: false

    - name: Assert NO IPv6 egress (disabled + dropped)
      ansible.builtin.assert:
        that:
          - leak_v6.rc != 0
          - (leak_v6.stdout | trim | length) == 0
        fail_msg: >-
          LEAK: IPv6 internet egress succeeded
          (got '{{ leak_v6.stdout | trim }}'). IPv6 must have no path.

    # --- 4. validator + deploy-time logic cover v4 AND v6 ------------------
    - name: Read the runtime validator script
      ansible.builtin.slurp:
        src: /usr/local/bin/download-vpn-killswitch-validate.sh
      register: validator

    - name: Assert the validator checks both v4 and v6 egress + stops qBittorrent on breach
      ansible.builtin.assert:
        that:
          - "'curl -6' in (validator.content | b64decode)"
          # R2 hardening: the forced non-VPN egress probe binds to the DERIVED
          # LAN interface (LAN_IF), not a hard-coded eth0. Assert the script
          # sets LAN_IF from the role and uses it for the leak probe.
          - "'LAN_IF=' in (validator.content | b64decode)"
          - "'--interface \"${LAN_IF}\"' in (validator.content | b64decode)"
          - "'--interface eth0' not in (validator.content | b64decode)"
          - "'ip -6 route show default' in (validator.content | b64decode)"
          - "'systemctl stop qbittorrent-nox.service' in (validator.content | b64decode)"
          # Sticky failover: on sustained tunnel-down the validator switches wg0
          # to the backup peer (and never on a leak-type breach).
          - "'FAILOVER_STATE_FILE=' in (validator.content | b64decode)"
          - "'peer \"${BACKUP_PEER}\" endpoint' in (validator.content | b64decode)"
          - "'peer \"${PRIMARY_PEER}\" remove' in (validator.content | b64decode)"
        fail_msg: "Runtime validator does not cover both address families, fail closed, or sticky failover."

    - name: Clean up the loaded killswitch table
      ansible.builtin.command:
        cmd: nft delete table inet killswitch
      changed_when: true
      failed_when: false

    # --- Unattended security upgrades -----------------------------------------
    # The guest fetches updates over the tunnel; these apt drop-ins are what
    # make them APPLY. Reboot must stay manual so a kernel update can never
    # bounce the tunnel unattended.
    - name: Read the unattended-upgrades apt drop-ins
      ansible.builtin.slurp:
        src: "{{ item }}"
      register: _unattended_dropins
      loop:
        - /etc/apt/apt.conf.d/20auto-upgrades
        - /etc/apt/apt.conf.d/52unattended-upgrades-local

    - name: Assert unattended security upgrades are enabled and reboot-free
      ansible.builtin.assert:
        that:
          - "'APT::Periodic::Unattended-Upgrade \"1\";' in (_unattended_dropins.results[0].content | b64decode)"
          - "'APT::Periodic::Update-Package-Lists \"1\";' in (_unattended_dropins.results[0].content | b64decode)"
          - "'Unattended-Upgrade::Automatic-Reboot \"false\";' in (_unattended_dropins.results[1].content | b64decode)"
        fail_msg: >-
          The unattended-upgrades apt drop-ins regressed (periodic apply off,
          or auto-reboot no longer pinned off).

# --- 5. persistent-storage guards (unit-style — gated on manage_services, ----
# never live in this scenario since there is no real Proton tunnel in CI) -----
# download_vpn_manage_services is false here (see converge.yml), so the guard
# tasks never execute against the container. Assert their shape directly
# against the role source instead: a mountpoint check for each critical
# directory, an ntfy alert, and a hard fail — not just a warning.
- name: Verify the persistent-storage guards are fail-loud (unit-style)
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    _role_tasks_path: "{{ playbook_dir }}/../../roles/download_vpn/tasks/main.yml"

  tasks:
    - name: Read the download_vpn role's tasks/main.yml
      ansible.builtin.slurp:
        src: "{{ _role_tasks_path }}"
      register: _download_vpn_tasks_raw

    - name: Decode tasks/main.yml
      ansible.builtin.set_fact:
        _download_vpn_tasks: "{{ _download_vpn_tasks_raw.content | b64decode }}"

    # The role's tasks are un-rendered Jinja on disk (the {{ }} placeholders are
    # literal text here, not resolved values) — {% raw %} keeps THIS assert's own
    # templating pass from consuming them so the search strings match verbatim.
    - name: Compute the literal, un-rendered guard snippets to search for
      ansible.builtin.set_fact:
        _data_mountpoint_snippet: "mountpoint -q {% raw %}{{ download_vpn_data_dir }}{% endraw %}"
        _prowlarr_mountpoint_snippet: "mountpoint -q {% raw %}{{ download_vpn_prowlarr_data_dir }}{% endraw %}"

    - name: Assert both persistent-storage guards check, alert, then fail
      ansible.builtin.assert:
        that:
          - _data_mountpoint_snippet in _download_vpn_tasks
          - _prowlarr_mountpoint_snippet in _download_vpn_tasks
          - "'ansible.builtin.fail' in _download_vpn_tasks"
          - (_download_vpn_tasks.count('ansible.builtin.fail')) >= 2
          - (_download_vpn_tasks.count('download_vpn_ntfy_url')) >= 2
        fail_msg: >-
          The download_vpn role no longer has a fatal mountpoint guard (with an
          ntfy alert) for both /data and the Prowlarr data dir.
