---
dependency:
  name: galaxy
  options:
    requirements-file: ${MOLECULE_PROJECT_DIRECTORY}/requirements.yml

driver:
  name: docker

platforms:
  - name: sortarr-test
    # No stable version tags available; geerlingguy only publishes :latest
    image: geerlingguy/docker-debian12-ansible:latest
    privileged: true
    command: ""
    pre_build_image: true
    tmpfs:
      - /run
      - /tmp
      - /run/lock
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    groups:
      - sortarr_group
      - lxc_containers

provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
      roles_path: ${MOLECULE_PROJECT_DIRECTORY}/roles
  env:
    # Deterministic test values. Real values come from the secret store in production.
    SONARR_API_KEY: "${SONARR_API_KEY:-0123456789abcdef0123456789abcdef}"
    RADARR_API_KEY: "${RADARR_API_KEY:-fedcba9876543210fedcba9876543210}"
    SORTARR_BASIC_AUTH_PASS: "${SORTARR_BASIC_AUTH_PASS:-test-only-password}"
    SORTARR_SECRET_KEY: "${SORTARR_SECRET_KEY:-default-molecule-secret-key-32-chars}"

verifier:
  name: ansible

scenario:
  name: sortarr
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy
