---
# Molecule converge for the sortarr scenario.
#
# Runs the role with sortarr_manage_services=false: Docker is installed and
# all config (docker-compose.yml) is rendered, but the live container run is
# skipped — there is no running Sortarr (nor live Sonarr/Radarr/Plex) in CI.
# verify.yml asserts on the rendered artifacts.

- name: Converge
  hosts: all
  become: true
  gather_facts: true

  vars:
    sortarr_manage_services: false
    # Mirror load_tofu.yml so the role's tofu_data lookups resolve.
    container_ip: "192.168.55.10"
    tofu_data:
      constants:
        media_ports:
          sortarr_web: 8787
          sonarr_web: 8989
          radarr_web: 7878
          plex_web: 32400
      containers: {}

  tasks:
    - name: Include sortarr role
      ansible.builtin.include_role:
        name: sortarr
