---
# Molecule verification for technitium_dns (no live DNS server).
#
# Re-runs the role with technitium_dns_apply=false to populate the derived facts,
# then asserts the HA topology resolved correctly across the two-node group:
#   - the primary is the lowest-vmid member (technitium-1 / .10);
#   - each host's role matches its identity (primary vs secondary);
#   - the secondary-IP list excludes the primary and includes the peer;
#   - inventory A-records were built for both hosts;
#   - the authoritative zone is the subdomain and forwarders point at the gateway.

- name: Verify
  hosts: all
  gather_facts: false

  vars:
    technitium_dns_apply: false
    technitium_dns_host: "{{ container_ip | default(ansible_host) }}"
    tofu_data:
      ingress: []

  tasks:
    # import_role (not include_role) so the role's defaults (zone, apex_domain,
    # forwarders) are exposed to the assertions below, alongside the set_fact
    # outputs (primary_ip, role, secondary_ips, a_records).
    - name: Re-run technitium_dns role to populate derived facts (no live API)
      ansible.builtin.import_role:
        name: technitium_dns

    - name: Assert the primary is the lowest-vmid node (technitium-1 / .10)
      ansible.builtin.assert:
        that:
          - technitium_dns_primary_ip == '192.168.5.10'
        fail_msg: >-
          Expected primary 192.168.5.10, got '{{ technitium_dns_primary_ip }}'.

    - name: Assert this host's role matches its identity
      ansible.builtin.assert:
        that:
          - >-
            technitium_dns_role ==
            ('primary' if container_ip == '192.168.5.10' else 'secondary')
        fail_msg: >-
          Role mismatch on {{ inventory_hostname }} ({{ container_ip }}):
          got '{{ technitium_dns_role }}'.

    - name: Assert the secondary-IP list excludes the primary and includes the peer
      ansible.builtin.assert:
        that:
          - "'192.168.5.10' not in technitium_dns_secondary_ips"
          - "'192.168.5.11' in technitium_dns_secondary_ips"
        fail_msg: >-
          Unexpected secondary IPs: {{ technitium_dns_secondary_ips }}.

    - name: Assert inventory A-records were built for both hosts
      ansible.builtin.assert:
        that:
          - technitium_dns_a_records | length >= 2
          - "'technitium-1' in (technitium_dns_a_records | map(attribute='name') | list)"
          - "'technitium-2' in (technitium_dns_a_records | map(attribute='name') | list)"
        fail_msg: >-
          A-records not built as expected: {{ technitium_dns_a_records }}.

    # dhcp-first guest contract: when container_reserved_ip is set (technitium-2),
    # the A record must point at it — container_ip carries the FQDN for real dhcp
    # guests, never a valid A-record target. Static guests (technitium-1, no
    # reserved_ip) keep resolving to container_ip.
    - name: Assert reserved_ip wins over container_ip for dhcp-first guests
      ansible.builtin.assert:
        that:
          - >-
            (technitium_dns_a_records | selectattr('name', 'equalto', 'technitium-2')
             | map(attribute='ip') | first) == '192.168.5.111'
          - >-
            (technitium_dns_a_records | selectattr('name', 'equalto', 'technitium-1')
             | map(attribute='ip') | first) == '192.168.5.10'
        fail_msg: >-
          A-record target precedence wrong: {{ technitium_dns_a_records }}.

    - name: Assert the query-log export target derives from the syslog CNAME + tofu port
      ansible.builtin.assert:
        that:
          - technitium_dns_query_log_enabled | bool
          - technitium_dns_query_log_syslog_host == 'syslog.svc.example.net'
          # No dns_query family in the molecule tofu_data stand-in -> the
          # guarded default (the family's standard frontend, 522) applies.
          - technitium_dns_query_log_syslog_port | int == 522
          # Key is `enabled` (the LogExporterApp dnsApp.config schema), not
          # `enable` — the earlier `enable` shape was silently ignored.
          - technitium_dns_query_log_config.syslog.enabled | bool
          - technitium_dns_query_log_config.syslog.protocol == 'TCP'
          - technitium_dns_query_log_config.syslog.address == 'syslog.svc.example.net'
          - technitium_dns_query_log_config.syslog.port | int == 522
          - not (technitium_dns_query_log_config.file.enabled | bool)
          - not (technitium_dns_query_log_config.http.enabled | bool)
        fail_msg: >-
          Query-log export vars did not derive as expected:
          host='{{ technitium_dns_query_log_syslog_host }}'
          port='{{ technitium_dns_query_log_syslog_port }}'
          config={{ technitium_dns_query_log_config }}.

    - name: Assert authoritative zone is the subdomain and forwarders -> gateway
      ansible.builtin.assert:
        that:
          - technitium_dns_zone == 'svc.example.net'
          - >-
            technitium_dns_forwarders ==
            ["https://cloudflare-dns.com/dns-query (1.1.1.1)",
            "https://dns.google/dns-query (8.8.8.8)"]
        fail_msg: >-
          Zone/forwarder mismatch: zone='{{ technitium_dns_zone }}'
          forwarders={{ technitium_dns_forwarders }}.

    - name: Assert Proxmox endpoint apex A records are built from env
      ansible.builtin.assert:
        that:
          - technitium_dns_proxmox_endpoint_ips == ['192.168.5.10', '192.168.5.11']
          - technitium_dns_proxmox_endpoint_a_records | length == 2
          - >-
            technitium_dns_proxmox_endpoint_a_records
            | map(attribute='domain') | unique | list == ['svc.example.net']
          - >-
            technitium_dns_proxmox_endpoint_a_records
            | map(attribute='ip') | list == ['192.168.5.10', '192.168.5.11']
        fail_msg: >-
          Proxmox endpoint apex records were not built from PROXMOX_IP_ADDRESSES:
          {{ technitium_dns_proxmox_endpoint_a_records }}.

    # Extra CNAME records (verbatim FQDN target): an entry with an empty target
    # (e.g. an unset LLM_LARGE_RUNNER_HOST) must be dropped so converge never
    # POSTs a blank alias.
    - name: Assert extra-CNAME filtering drops empty-target entries
      vars:
        technitium_dns_extra_cname_records:
          - { name: llm-large, target: 'host.example.net' }
          - { name: unset-runner, target: '' }
      ansible.builtin.assert:
        that:
          - >-
            (technitium_dns_extra_cname_records | selectattr('target', 'truthy')
             | list | length) == 1
          - >-
            (technitium_dns_extra_cname_records | selectattr('target', 'truthy')
             | map(attribute='name') | list) == ['llm-large']
        fail_msg: >-
          Extra-CNAME truthy filter did not drop the empty-target entry:
          {{ technitium_dns_extra_cname_records }}.

    # Extra A records (verbatim IPv4 target): blank IPs are skipped the same way
    # so a reserved-address hook can be wired in without risking a broken record.
    - name: Assert extra-A filtering drops empty-ip entries
      vars:
        technitium_dns_extra_a_records:
          - { name: jevans-ms, ip: '10.0.50.10' }
          - { name: jevans-ms, zone: 'example.net', ip: '10.0.50.10' }
          - { name: unset-runner, ip: '' }
      ansible.builtin.assert:
        that:
          - >-
            (technitium_dns_extra_a_records | selectattr('ip', 'truthy')
             | list | length) == 2
          - >-
            (technitium_dns_extra_a_records | selectattr('ip', 'truthy')
             | map(attribute='name') | list) == ['jevans-ms', 'jevans-ms']
          - >-
            (technitium_dns_extra_a_records | selectattr('ip', 'truthy')
             | selectattr('zone', 'defined') | map(attribute='zone') | list)
            == ['example.net']
        fail_msg: >-
          Extra-A truthy filter did not drop the empty-ip entry:
          {{ technitium_dns_extra_a_records }}.
