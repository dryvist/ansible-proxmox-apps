---
# Molecule converge for the seerr scenario.
#
# Runs the role with seerr_manage_services=false: Docker is installed and
# all config (docker-compose.yml, the settings.json API-key seed) is rendered,
# but the live container run + Seerr API registration are skipped — there
# is no running Seerr (nor live Sonarr/Radarr/Plex) in CI. verify.yml
# asserts on the rendered artifacts.

- name: Converge
  hosts: all
  become: true
  gather_facts: true

  vars:
    seerr_manage_services: false
    # Docker-in-Docker needs the vfs storage driver, not fuse-overlayfs.
    seerr_storage_driver: vfs
    # Mirror load_terraform.yml so the role's terraform_data lookups resolve.
    container_ip: "192.168.0.214"
    terraform_data:
      constants:
        media_ports:
          seerr_web: 5055
          sonarr_web: 8989
          radarr_web: 7878
          plex_web: 32400

  tasks:
    - name: Include seerr role
      ansible.builtin.include_role:
        name: seerr
