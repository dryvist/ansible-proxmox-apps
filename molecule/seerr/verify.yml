---
# Molecule verification for seerr (render-only — no live container in CI).
#
# Proves:
#   1. docker-compose.yml references the image, publishes 5055, mounts config.
#   2. settings.json was seeded with the DETERMINISTIC API key (main.apiKey),
#      so downstream tooling knows the key before the container ever runs.
#   3. The seed is the documented minimal shape (radarr/sonarr arrays present).

- name: Verify
  hosts: all
  become: true
  gather_facts: false

  vars:
    seerr_data_dir: /opt/seerr
    seerr_config_dir: /opt/seerr/config
    seerr_image: "ghcr.io/seerr-team/seerr:v3.3.0"
    seerr_container_name: seerr
    # Must match molecule.yml provisioner.env SEERR_API_KEY default.
    seerr_expected_api_key: "0123456789abcdef0123456789abcdef"

  tasks:
    # --- 1. docker-compose.yml --------------------------------------------
    - name: Check docker-compose.yml was deployed
      ansible.builtin.stat:
        path: "{{ seerr_data_dir }}/docker-compose.yml"
      register: seerr_compose_stat

    - name: Assert docker-compose.yml exists
      ansible.builtin.assert:
        that:
          - seerr_compose_stat.stat.exists
        fail_msg: "docker-compose.yml not found - template was not deployed"

    - name: Read docker-compose.yml
      ansible.builtin.slurp:
        src: "{{ seerr_data_dir }}/docker-compose.yml"
      register: seerr_compose

    - name: Assert docker-compose.yml references image, port 5055, config mount
      ansible.builtin.assert:
        that:
          - "seerr_image in (seerr_compose.content | b64decode)"
          - "seerr_container_name in (seerr_compose.content | b64decode)"
          - "'5055:5055' in (seerr_compose.content | b64decode)"
          - "'/app/config' in (seerr_compose.content | b64decode)"
        fail_msg: "docker-compose.yml is missing image, port 5055, or the config mount"

    # --- 2. settings.json deterministic API-key seed ----------------------
    - name: Check settings.json seed exists
      ansible.builtin.stat:
        path: "{{ seerr_config_dir }}/settings.json"
      register: seerr_settings_stat

    - name: Assert settings.json seed exists
      ansible.builtin.assert:
        that:
          - seerr_settings_stat.stat.exists
        fail_msg: "settings.json seed not found - the API-key seed was not written"

    - name: Read settings.json seed
      ansible.builtin.slurp:
        src: "{{ seerr_config_dir }}/settings.json"
      register: seerr_settings

    - name: Parse settings.json
      ansible.builtin.set_fact:
        seerr_settings_json: "{{ seerr_settings.content | b64decode | from_json }}"

    - name: Assert the deterministic API key was seeded and shape is minimal
      ansible.builtin.assert:
        that:
          - seerr_settings_json.main.apiKey == seerr_expected_api_key
          - "'radarr' in seerr_settings_json"
          - "'sonarr' in seerr_settings_json"
          - seerr_settings_json.radarr | length == 0
          - seerr_settings_json.sonarr | length == 0
        fail_msg: >-
          settings.json seed does not carry the deterministic main.apiKey or is
          not the expected minimal shape.

    # NOTE: file-mode is deliberately NOT asserted here. The role seeds the file
    # with mode 0640 (and real deploys land at 0640), but this Docker-in-Docker
    # molecule container does not reliably apply or persist chmod bits across the
    # converge/idempotence cycle — it reports 0644 regardless of template/file
    # mode, which tests the container's filesystem, not the role. The seed's
    # restrictive permissions are a deployment guarantee verified out-of-band, not
    # an assertion we can make meaningfully in this ephemeral container.

# --- 3. persistence guard (unit-style — gated on seerr_manage_services, -----
# never live in this scenario since there is no running container in CI) -----
# seerr_manage_services is false here (see converge.yml), so the guard task
# never executes against the container. Assert its shape directly against the
# role source instead: a mountpoint check, an ntfy alert, and a hard fail —
# not just a render.
- name: Verify the Seerr persistence guard is fail-loud (unit-style)
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    _role_tasks_path: "{{ playbook_dir }}/../../roles/seerr/tasks/main.yml"

  tasks:
    - name: Read the seerr role's tasks/main.yml
      ansible.builtin.slurp:
        src: "{{ _role_tasks_path }}"
      register: _seerr_tasks_raw

    - name: Decode tasks/main.yml
      ansible.builtin.set_fact:
        _seerr_tasks: "{{ _seerr_tasks_raw.content | b64decode }}"

    # The role's tasks are un-rendered Jinja on disk (the {{ }} placeholder is
    # literal text here, not a resolved value) — {% raw %} keeps THIS assert's
    # own templating pass from consuming it so the search string matches verbatim.
    - name: Compute the literal, un-rendered guard snippet to search for
      ansible.builtin.set_fact:
        _config_mountpoint_snippet: "mountpoint -q {% raw %}{{ seerr_config_dir }}{% endraw %}"

    - name: Assert the persistence guard checks, alerts, then fails
      ansible.builtin.assert:
        that:
          - _config_mountpoint_snippet in _seerr_tasks
          - "'ansible.builtin.fail' in _seerr_tasks"
          - (_seerr_tasks.count('seerr_ntfy_url')) >= 1
        fail_msg: >-
          The seerr role no longer has a fatal mountpoint guard (with an ntfy
          alert) for seerr_config_dir.
