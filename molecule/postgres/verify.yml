---
# Verify the cluster is up, the nautobot role can authenticate over TCP with
# scram from its allowed CIDR, the database exists and is owned correctly, and
# the backup timer is scheduled.
- name: Verify
  hosts: all
  become: true
  gather_facts: false

  vars:
    nautobot_db_password: molecule-nautobot-pw
    postgres_cluster_name: main

  tasks:
    - name: Discover installed PostgreSQL major
      ansible.builtin.command:
        argv:
          - psql
          - --version
      register: postgres_psql_version
      changed_when: false

    - name: Set PostgreSQL config directory
      ansible.builtin.set_fact:
        postgres_conf_dir: >-
          /etc/postgresql/{{
            postgres_psql_version.stdout | regex_search('[0-9]+')
          }}/{{ postgres_cluster_name }}

    - name: Ping the cluster as the postgres superuser
      become: true
      become_user: postgres
      community.postgresql.postgresql_ping:
        db: postgres
      register: postgres_ping
      changed_when: false

    - name: Assert the cluster answered
      ansible.builtin.assert:
        that:
          - postgres_ping.is_available | bool
        fail_msg: "PostgreSQL did not answer postgresql_ping"

    - name: Connect as the nautobot role over TCP with scram
      community.postgresql.postgresql_query:
        login_host: 127.0.0.1
        login_user: nautobot
        login_password: "{{ nautobot_db_password }}"
        db: nautobot
        query: "SELECT current_user AS who, current_database() AS db"
      register: nautobot_conn
      changed_when: false

    - name: Assert the nautobot role reached its own database
      ansible.builtin.assert:
        that:
          - nautobot_conn.query_result[0].who == 'nautobot'
          - nautobot_conn.query_result[0].db == 'nautobot'
        fail_msg: "nautobot role could not authenticate to the nautobot database over TCP"

    - name: Read pg_hba.conf
      ansible.builtin.slurp:
        src: "{{ postgres_conf_dir }}/pg_hba.conf"
      register: pg_hba

    - name: Assert pg_hba carries the scram rule for nautobot
      ansible.builtin.assert:
        that:
          - "'nautobot' in hba"
          - "'scram-sha-256' in hba"
        fail_msg: "pg_hba.conf is missing the scram host rule for nautobot"
      vars:
        hba: "{{ pg_hba.content | b64decode }}"

    - name: Stat the backup timer unit
      ansible.builtin.stat:
        path: /etc/systemd/system/pg-backup.timer
      register: pg_backup_timer

    - name: Assert the backup timer is installed
      ansible.builtin.assert:
        that:
          - pg_backup_timer.stat.exists
        fail_msg: "pg-backup.timer was not installed"

    # --- Replication-slot orphan reconcile (Zammad #17050) ---
    # converge created standby_fake_standby (the one expected standby). Seed a
    # stale slot with no matching standby, re-run the role, and prove the
    # reconcile drops the orphan while keeping the expected (also inactive) slot.
    - name: Gather facts before re-running the role
      ansible.builtin.setup:

    - name: Seed a stale orphan physical slot with no matching standby
      become: true
      become_user: postgres
      community.postgresql.postgresql_slot:
        name: standby_stale_orphan
        slot_type: physical
        state: present

    - name: Re-run the role so the primary reconcile drops the orphan
      ansible.builtin.include_role:
        name: postgres
      vars:
        postgres_listen_addresses: localhost
        postgres_primary_host: postgres-test
        postgres_replication_password: molecule-replication-pw
        postgres_expected_replication_slots:
          - standby_fake_standby
        postgres_managed_databases:
          - name: nautobot
            user: nautobot
            password: molecule-nautobot-pw
            client_cidr: 127.0.0.1/32

    - name: Query physical replication slots after reconcile
      become: true
      become_user: postgres
      community.postgresql.postgresql_query:
        db: postgres
        query: "SELECT slot_name FROM pg_replication_slots WHERE slot_type = 'physical'"
      register: postgres_slots_after
      changed_when: false

    # A genuinely active=true slot needs a streaming standby, impossible
    # single-node. The expected-but-inactive standby_fake_standby covers the same
    # keep-guard (active=false slots that ARE expected must survive) that protects
    # a live standby briefly down; add a two-container scenario only if it regresses.
    - name: Assert the orphan was dropped and the expected slot kept
      ansible.builtin.assert:
        that:
          - "'standby_stale_orphan' not in slot_names"
          - "'standby_fake_standby' in slot_names"
        fail_msg: >-
          reconcile did not drop the orphan or dropped an expected slot;
          slots present: {{ slot_names }}
      vars:
        slot_names: "{{ postgres_slots_after.query_result | map(attribute='slot_name') | list }}"
