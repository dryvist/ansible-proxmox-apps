---
# Pre-playbook that loads OpenTofu infrastructure data dynamically
# This playbook runs first to populate the Ansible inventory from OpenTofu outputs,
# eliminating hardcoded VM IDs and IPs from Ansible configuration.
#
# It expects tofu_inventory.json to be present (generated via:
# terragrunt output -json ansible_inventory > inventory/tofu_inventory.json)

- name: Load OpenTofu Infrastructure Inventory
  hosts: localhost
  become: false
  gather_facts: false
  tags: always

  vars:
    # Override global ansible_become for localhost tasks
    ansible_become: false

  tasks:
    - name: Verify tofu inventory exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../inventory/tofu_inventory.json"
      register: tofu_inventory_check

    - name: Fail if tofu inventory is missing
      ansible.builtin.fail:
        msg: |
          tofu_inventory.json not found!

          Generate it by running from terraform-proxmox:
            terragrunt output -json ansible_inventory > \
              ~/git/ansible-proxmox-apps/main/inventory/tofu_inventory.json

          Or sync from existing deployment.
      when: not tofu_inventory_check.stat.exists

    - name: Load OpenTofu inventory JSON
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../inventory/tofu_inventory.json"
        name: tofu_data

    - name: Validate tofu_data constants structure
      ansible.builtin.assert:
        that:
          - tofu_data is defined
          - tofu_data.constants is defined
          - tofu_data.constants.service_ports is defined
          - tofu_data.constants.syslog_ports is defined
        fail_msg: |
          tofu_data.constants is missing or incomplete in tofu_inventory.json.

          Expected tofu_inventory.json (generated from OpenTofu outputs) to include:
            - tofu_data.constants.service_ports
            - tofu_data.constants.syslog_ports

          Please ensure OpenTofu outputs (including pipeline_constants) are correctly
          generated and merged into ansible_inventory, e.g. by re-running:
            terragrunt output -json ansible_inventory > \
              ~/git/ansible-proxmox-apps/main/inventory/tofu_inventory.json

    - name: Validate Docker VM SSH key path is set when Docker VMs are present
      ansible.builtin.assert:
        that:
          - lookup('env', 'PROXMOX_DKR_SSH_KEY_PATH') | length > 0
        fail_msg: |
          PROXMOX_DKR_SSH_KEY_PATH environment variable is not set but Docker VM hosts exist.
          Docker VMs use direct SSH with a dedicated key separate from the Proxmox host key.
          Store it in Doppler (iac-conf-mgmt/prd) or SOPS (secrets.enc.yaml).
      when:
        - tofu_data.docker_vms is defined
        - tofu_data.docker_vms | length > 0

    - name: Add LXC containers to inventory (proxmox_pct_remote connection)
      ansible.builtin.add_host:
        name: "{{ item.key }}"
        groups: >-
          {{
            ['lxc_containers', 'all'] +
            (
              ['haproxy_group']
              if ('haproxy' in (item.value.tags | default([]))
                  or 'loadbalancer' in (item.value.tags | default([])))
              else []
            ) +
            (
              ['cribl_edge']
              if (
                'edge' in (item.value.tags | default([])) and
                'cribl' in (item.value.tags | default([]))
              )
              else []
            ) +
            (
              ['cribl_stream_group']
              if (
                'stream' in (item.value.tags | default([])) and
                'cribl' in (item.value.tags | default([]))
              )
              else []
            ) +
            (
              ['mailpit_group']
              if 'smtp' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['ntfy_group']
              if 'push' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['mssql_group']
              if 'database' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['qdrant_group']
              if 'vectordb' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['llamaindex_group']
              if 'rag' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['ollama_group']
              if 'ollama' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['open_webui_group']
              if 'open-webui' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['apt_cacher_group']
              if 'apt-cache' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['registry_group']
              if 'registry' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['minio_group']
              if 'minio' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['technitium_dns_group']
              if 'dns' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['openproject_group']
              if 'openproject' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['infisical_group']
              if 'infisical' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['healthchecks_group']
              if 'healthcheck' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['download_vpn_group']
              if 'vpn' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['sonarr_group']
              if 'sonarr' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['radarr_group']
              if 'radarr' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['plex_group']
              if 'plex' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['seerr_group']
              if 'seerr' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['immich_group']
              if 'immich' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['traefik_group']
              if 'traefik' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['media_group']
              if 'media' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['idrac_kvm_group']
              if 'idrac' in (item.value.tags | default([]))
              else []
            )
          }}
        proxmox_vmid: "{{ item.value.vmid }}"
        ansible_host: "{{ lookup('env', 'PROXMOX_VE_HOSTNAME') }}"
        ansible_connection: "{{ item.value.ansible_connection }}"
        ansible_user: root
        ansible_ssh_private_key_file: "{{ lookup('env', 'PROXMOX_SSH_KEY_PATH') }}"
        hostname: "{{ item.value.hostname }}"
        container_ip: "{{ item.value.ip }}"
        host_tags: "{{ item.value.tags | default([]) }}"
      loop: "{{ tofu_data.containers | dict2items }}"
      when:
        - tofu_data.containers is defined
        - tofu_data.containers | length > 0

    - name: Add VMs to inventory (SSH connection)
      ansible.builtin.add_host:
        name: "{{ item.key }}"
        groups:
          - vms
          - all
        ansible_host: "{{ item.value.ip }}"
        ansible_connection: "{{ item.value.ansible_connection }}"
        ansible_user: debian
        ansible_ssh_private_key_file: "{{ lookup('env', 'PROXMOX_SSH_KEY_PATH') }}"
        hostname: "{{ item.value.hostname }}"
        host_tags: "{{ item.value.tags | default([]) }}"
      loop: "{{ tofu_data.vms | dict2items }}"
      when:
        - tofu_data.vms is defined
        - tofu_data.vms | length > 0

    - name: Add Splunk VM to inventory (SSH connection)
      ansible.builtin.add_host:
        name: splunk
        groups:
          - splunk_group
          - splunk_vms
          - all
        ansible_host: "{{ tofu_data.splunk_vm.splunk.ip }}"
        ansible_connection: "{{ tofu_data.splunk_vm.splunk.ansible_connection }}"
        ansible_user: debian
        ansible_ssh_private_key_file: "{{ lookup('env', 'PROXMOX_SSH_KEY_PATH') }}"
        hostname: "{{ tofu_data.splunk_vm.splunk.hostname }}"
        vmid: "{{ tofu_data.splunk_vm.splunk.vmid }}"
      when: tofu_data.splunk_vm.splunk is defined

    # NOTE: Docker VMs (docker-host) are for TESTING/DEV ONLY.
    # Production syslog/netflow pipelines use native Cribl Edge/Stream
    # on LXC containers (cribl_edge, cribl_stream_group).
    # (idrac-kvm is now a Docker-in-LXC, joined to idrac_kvm_group by the LXC task above.)
    - name: Add Docker VMs to inventory (SSH connection — testing/dev only)
      ansible.builtin.add_host:
        name: "{{ item.key }}"
        groups: >-
          {{
            ['docker_vms', 'cribl_docker_group', 'all']
          }}
        ansible_host: "{{ item.value.ip }}"
        ansible_connection: "{{ item.value.ansible_connection }}"
        ansible_user: debian
        ansible_ssh_private_key_file: "{{ lookup('env', 'PROXMOX_DKR_SSH_KEY_PATH') }}"
        hostname: "{{ item.value.hostname }}"
        vmid: "{{ item.value.vmid }}"
        host_tags: "{{ item.value.tags | default([]) }}"
      loop: "{{ tofu_data.docker_vms | dict2items }}"
      when:
        - tofu_data.docker_vms is defined
        - tofu_data.docker_vms | length > 0

    # Push tofu_data onto every dynamically-added host so roles can access
    # tofu_data.constants.* directly without hostvars['localhost'] indirection.
    - name: Propagate tofu_data to all inventory hosts
      ansible.builtin.set_fact:
        tofu_data: "{{ tofu_data }}"
      delegate_to: "{{ item }}"
      delegate_facts: true
      loop: "{{ groups['all'] | reject('equalto', 'localhost') | list }}"
      when: tofu_data is defined
