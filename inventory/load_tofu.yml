---
# Pre-playbook that loads OpenTofu infrastructure data dynamically
# This playbook runs first to populate the Ansible inventory from OpenTofu outputs,
# eliminating hardcoded VM IDs and IPs from Ansible configuration.

- name: Load OpenTofu Infrastructure Inventory
  hosts: localhost
  become: false
  gather_facts: false
  tags: always

  # Inventory source resolution (priority order, first that resolves wins):
  #   1. TOFU_INVENTORY_PATH  — explicit local path / pin (tests, overrides)
  #   2. S3 published artifact — `terragrunt apply` publishes the RAW tofu output
  #      to the terraform-proxmox state bucket; fetched natively (amazon.aws,
  #      boto3 from the dev shell — no aws CLI, no checkout, no toolchain).
  #      Location override: TOFU_INVENTORY_S3_URI, else derived from the account.
  #   3. inventory/tofu_inventory.json — the local gitignored cache the
  #      terraform-proxmox after-hook writes.
  vars:
    # Override global ansible_become for localhost tasks
    ansible_become: false
    # The global inventory pins ansible_python_interpreter to /usr/bin/python3
    # (correct for the Debian LXC targets). That system python lacks boto3, so
    # the amazon.aws S3 fetch below fails to import it. Discover the interpreter
    # for this localhost play instead, so it picks the dev-shell python that
    # carries boto3/botocore. Scoped to this play only — remote-host resolution
    # is untouched. (ansible-proxmox sets interpreter_python=auto_silent globally
    # and has no such pin, which is why its identical loader already works.)
    ansible_python_interpreter: auto_silent

  tasks:
    # Inventory resolution (TOFU_INVENTORY_PATH -> on-prem store -> legacy AWS
    # bucket -> opt-in local cache) is delegated to the shared inventory_resolve
    # role (dryvist/homelab-contracts), which ends with `tofu_data` loaded. The
    # role's amazon.aws S3 fetch runs on this localhost play, so it inherits the
    # ansible_python_interpreter: auto_silent set above (dev-shell boto3). The
    # repo-specific asserts and add_host group mapping stay below.
    - name: Resolve the published OpenTofu inventory
      ansible.builtin.include_role:
        name: inventory_resolve
      vars:
        inventory_resolve_required_keys: [constants, nodes, domain]

    - name: Validate tofu_data constants structure
      ansible.builtin.assert:
        that:
          - tofu_data is defined
          - tofu_data.constants is defined
          - tofu_data.constants.service_ports is defined
          - tofu_data.constants.syslog_ports is defined
        fail_msg: |
          tofu_data.constants is missing or incomplete in tofu_inventory.json.

          Expected tofu_inventory.json (generated from OpenTofu outputs) to include:
            - tofu_data.constants.service_ports
            - tofu_data.constants.syslog_ports

          Please ensure OpenTofu outputs (including pipeline_constants) are
          correctly generated and merged into ansible_inventory — run
          terraform-proxmox `terragrunt apply` so the inventory is republished
          to S3 and the local cache is refreshed by the after-hook.

    - name: Validate tofu_data carries the node-FQDN derivation inputs
      ansible.builtin.assert:
        that:
          - tofu_data.nodes is defined
          - tofu_data.domain is defined
          - tofu_data.domain | length > 0
        fail_msg: |
          tofu_data.nodes and/or tofu_data.domain are missing from
          tofu_inventory.json. Every LXC container's ansible_host is DERIVED as
          {node-role}.{domain} (the per-node management FQDN) — a missing or
          empty domain would silently produce a broken host (a bare
          "{node-role}." with no domain suffix).

          Re-run terraform-proxmox `terragrunt apply` so the inventory is
          republished with `nodes` and `domain` populated.

    - name: Validate Docker VM SSH key path is set when Docker VMs are present
      ansible.builtin.assert:
        that:
          - lookup('env', 'PROXMOX_DKR_SSH_KEY_PATH') | length > 0
        fail_msg: |
          PROXMOX_DKR_SSH_KEY_PATH environment variable is not set but Docker VM hosts exist.
          Docker VMs use direct SSH with a dedicated key separate from the Proxmox host key.
          Store it in Doppler or SOPS (secrets.enc.yaml).
      when:
        - tofu_data.docker_vms is defined
        - tofu_data.docker_vms | length > 0

    # NOTE (issue #138): postgres_group is keyed on the SPECIFIC `postgres` tag,
    # not the generic `database` tag (which already selects mssql_group) — so the
    # postgres guest must NOT carry `database`, or mssql_docker would run on it.
    - name: Add LXC containers to inventory (proxmox_pct_remote connection)
      ansible.builtin.add_host:
        name: "{{ item.key }}"
        groups: >-
          {{
            ['lxc_containers', 'all'] +
            (
              ['haproxy_group']
              if ('haproxy' in (item.value.tags | default([]))
                  or 'loadbalancer' in (item.value.tags | default([])))
              else []
            ) +
            (
              ['cribl_edge']
              if (
                'edge' in (item.value.tags | default([])) and
                'cribl' in (item.value.tags | default([]))
              )
              else []
            ) +
            (
              ['cribl_stream_group']
              if (
                'stream' in (item.value.tags | default([])) and
                'cribl' in (item.value.tags | default([]))
              )
              else []
            ) +
            (
              ['mailpit_group']
              if 'smtp' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['ntfy_group']
              if 'push' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['mssql_group']
              if 'database' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['postgres_group']
              if 'postgres' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['nautobot_group']
              if 'nautobot' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['qdrant_group']
              if 'vectordb' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['llamaindex_group']
              if 'rag' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['ollama_group']
              if 'ollama' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['open_webui_group']
              if 'open-webui' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['hermes_agent_group']
              if 'hermes-agent' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['llm_fast_group']
              if 'llm-fast' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['llm_router_group']
              if 'llm-router' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['ai_orchestration_group']
              if 'ai-orchestration' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['dify_group']
              if 'dify' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['langflow_group']
              if 'langflow' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['n8n_group']
              if 'n8n' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['langgraph_group']
              if 'langgraph' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['agent_exec_group']
              if 'agent-exec' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['langfuse_group']
              if 'langfuse' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['agentgateway_group']
              if 'agentgateway' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['apt_cacher_group']
              if 'apt-cache' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['registry_group']
              if 'registry' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['minio_group']
              if 'minio' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['object_storage_group']
              if 'object-storage' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['openbao_group']
              if 'openbao' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['technitium_dns_group']
              if 'dns' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['openproject_group']
              if 'openproject' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['infisical_group']
              if 'infisical' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['healthchecks_group']
              if 'healthcheck' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['netmon_group']
              if 'netmon' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['unifi_metrics_group']
              if 'unifi_metrics' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['prometheus_group']
              if 'prometheus' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['download_vpn_group']
              if 'vpn' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['sonarr_group']
              if 'sonarr' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['radarr_group']
              if 'radarr' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['plex_group']
              if 'plex' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['seerr_group']
              if 'seerr' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['sortarr_group']
              if 'sortarr' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['immich_group']
              if 'immich' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['homeassistant_group']
              if 'homeassistant' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['phpipam_group']
              if 'ipam' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['traefik_group']
              if 'traefik' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['media_group']
              if 'media' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['idrac_kvm_group']
              if 'idrac' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['vikunja_group']
              if 'vikunja' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['zammad_group']
              if 'zammad' in (item.value.tags | default([]))
              else []
            )
          }}
        proxmox_vmid: "{{ item.value.vmid }}"
        # Per-node management FQDN, DERIVED — never a hand-pinned global host.
        # A guest reaches its own node at {node-role}.{domain}, the same pattern
        # terraform-proxmox ingress.tf uses for the Proxmox-UI apex pool; those
        # names resolve internally while the bare cluster member name does not.
        # The container's `node` field already carries the role form; the
        # nodes-map lookup additionally corrects a legacy bare node key to its
        # role, and falls back to the node value itself when the map omits the
        # key (e.g. the generic test-fixture node key).
        ansible_host: >-
          {{ (tofu_data.nodes[item.value.node] | default({})).role
             | default(item.value.node, true) }}.{{ tofu_data.domain }}
        ansible_connection: "{{ item.value.ansible_connection }}"
        ansible_user: root
        ansible_ssh_private_key_file: "{{ lookup('env', 'PROXMOX_SSH_KEY_PATH') }}"
        # NOTE: no `hostname:` here — add_host treats it as an alias of `name`
        # and silently consumes it (it never becomes a hostvar). The hostname
        # fact is set for every guest by the propagate task at the bottom.
        container_ip: "{{ item.value.ip }}"
        # DHCP-first guests (tofu contract): `ip` carries the FQDN (DNS-first),
        # `reserved_ip` the DHCP-reservation address an A record must point at.
        # Static guests carry reserved_ip = null (or pre-contract inventories
        # omit it entirely) — both normalize to '' here.
        container_reserved_ip: "{{ item.value.reserved_ip | default('', true) }}"
        host_tags: "{{ item.value.tags | default([]) }}"
      loop: "{{ tofu_data.containers | dict2items }}"
      changed_when: false
      when:
        - tofu_data.containers is defined
        - tofu_data.containers | length > 0

    - name: Add VMs to inventory (SSH connection)
      ansible.builtin.add_host:
        name: "{{ item.key }}"
        groups:
          - vms
          - all
        ansible_host: "{{ item.value.ip }}"
        ansible_connection: "{{ item.value.ansible_connection }}"
        ansible_user: debian
        ansible_ssh_private_key_file: "{{ lookup('env', 'PROXMOX_SSH_KEY_PATH') }}"
        host_tags: "{{ item.value.tags | default([]) }}"
      loop: "{{ tofu_data.vms | dict2items }}"
      changed_when: false
      when:
        - tofu_data.vms is defined
        - tofu_data.vms | length > 0

    - name: Add Splunk VM to inventory (SSH connection)
      ansible.builtin.add_host:
        name: splunk
        groups:
          - splunk_group
          - splunk_vms
          - all
        ansible_host: "{{ tofu_data.splunk_vm.splunk.ip }}"
        ansible_connection: "{{ tofu_data.splunk_vm.splunk.ansible_connection }}"
        ansible_user: debian
        ansible_ssh_private_key_file: "{{ lookup('env', 'PROXMOX_SSH_KEY_PATH') }}"
        vmid: "{{ tofu_data.splunk_vm.splunk.vmid }}"
      changed_when: false
      when: tofu_data.splunk_vm.splunk is defined

    # NOTE: Docker VMs (docker-host) are for TESTING/DEV ONLY.
    # Production syslog/netflow pipelines use native Cribl Edge/Stream
    # on LXC containers (cribl_edge, cribl_stream_group).
    # (idrac-kvm is now a Docker-in-LXC, joined to idrac_kvm_group by the LXC task above.)
    - name: Add Docker VMs to inventory (SSH connection — testing/dev only)
      ansible.builtin.add_host:
        name: "{{ item.key }}"
        groups: >-
          {{
            ['docker_vms', 'cribl_docker_group', 'all']
          }}
        ansible_host: "{{ item.value.ip }}"
        ansible_connection: "{{ item.value.ansible_connection }}"
        ansible_user: debian
        ansible_ssh_private_key_file: "{{ lookup('env', 'PROXMOX_DKR_SSH_KEY_PATH') }}"
        vmid: "{{ item.value.vmid }}"
        host_tags: "{{ item.value.tags | default([]) }}"
      loop: "{{ tofu_data.docker_vms | dict2items }}"
      changed_when: false
      when:
        - tofu_data.docker_vms is defined
        - tofu_data.docker_vms | length > 0

    # Push tofu_data onto every dynamically-added host so roles can access
    # tofu_data.constants.* directly without hostvars['localhost'] indirection.
    - name: Propagate tofu_data to all inventory hosts
      ansible.builtin.set_fact:
        tofu_data: "{{ tofu_data }}"
      delegate_to: "{{ item }}"
      delegate_facts: true
      loop: "{{ groups['all'] | reject('equalto', 'localhost') | list }}"
      when: tofu_data is defined

    # add_host CANNOT set a host var literally named `hostname`: it is an alias
    # of add_host's `name` option (aliases: host, hostname) and gets silently
    # consumed instead of becoming a hostvar. Consumers of `hostname`
    # (technitium_dns A-record builder, *_docker site-URL defaults) therefore
    # never saw it — set it as a real per-host fact here instead.
    - name: Set the guest hostname fact on all inventory hosts
      vars:
        tofu_guests: >-
          {{ (tofu_data.containers | default({}))
             | combine(tofu_data.vms | default({}))
             | combine(tofu_data.docker_vms | default({}))
             | combine(tofu_data.splunk_vm | default({})) }}
      ansible.builtin.set_fact:
        hostname: "{{ tofu_guests[item].hostname }}"
        # DHCP-first VMs advertise an FQDN as `ip`, exactly like containers.
        # The containers' add_host block sets container_reserved_ip; the VM
        # blocks predate DHCP-first VMs and don't — set it generically here so
        # the technitium_dns A-record builder targets the reservation address
        # for every guest kind (idempotent overwrite for containers: same
        # inventory source value).
        container_reserved_ip: "{{ tofu_guests[item].reserved_ip | default('', true) }}"
      delegate_to: "{{ item }}"
      delegate_facts: true
      loop: "{{ groups['all'] | reject('equalto', 'localhost') | list }}"
      when: item in tofu_guests
