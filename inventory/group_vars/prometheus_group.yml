---
# group_vars for prometheus_group — the monitoring LXC that runs prometheus_stack
# AND network_quality (smokeping_prober) co-located.
#
# Wire the co-located smokeping_prober scrape job into Prometheus: prometheus_stack
# appends prometheus_stack_extra_scrape_configs to prometheus.yml and the
# "Reload prometheus config" handler hot-reloads (no restart, no scrape gap).
#
# This lives in group_vars (not the network_quality role defaults) because the
# prometheus_stack play does not load network_quality's defaults — the scrape job
# must be visible to whichever play renders prometheus.yml. The port comes from the
# tofu service_ports constant (default 9374), DRY with the network_quality role.
smokeping_scrape_port: >-
  {{ hostvars['localhost']['tofu_data']['constants']['service_ports']['smokeping_prober']
     | default(9374) }}

# PVE host metrics (B9): scrape each commissioned node's pinned node_exporter
# through this container's Prometheus + the existing remote_write leg —
# the Cribl prometheus SCRAPER source is not allowed on the standalone
# Edge/Stream deployments, so the scrape has to happen here. Targets derive
# from the inventory nodes map (role + domain, never a literal hostname);
# Stream's prometheus_to_netmon pipeline splits this job into the
# host_metrics metric index.
node_exporter_scrape_port: >-
  {{ hostvars['localhost']['tofu_data']['constants']['service_ports']['node_exporter']
     | default(9100) }}
pve_node_exporter_scrape_targets: >-
  {%- set out = [] -%}
  {%- for name, node in (hostvars['localhost']['tofu_data']['nodes'] | default({})) | dictsort -%}
  {%- if node.commissioned | default(false) -%}
  {%- set _ = out.append((node.role | default(name)) ~ '.'
      ~ hostvars['localhost']['tofu_data']['domain'] ~ ':' ~ node_exporter_scrape_port) -%}
  {%- endif -%}
  {%- endfor -%}
  {{ out }}

prometheus_stack_extra_scrape_configs: |
  - job_name: smokeping
    static_configs:
      - targets: ["127.0.0.1:{{ smokeping_scrape_port }}"]
  - job_name: pve_node_exporter
    scrape_interval: 60s
    static_configs:
      - targets: {{ pve_node_exporter_scrape_targets | to_json }}

# Forward blackbox + smokeping metrics to Cribl Stream → Splunk (index=netmon_metrics).
# Points at cribl-stream-01 directly (no HAProxy — WAL provides delivery durability).
prometheus_stack_remote_write_url: >-
  http://{{ hostvars['localhost']['tofu_data']['containers']['cribl-stream-01']['ip']
  }}:9201/api/v1/write

# The remote_write keep relabel must also pass the PVE host-metrics job —
# Stream's prometheus_to_netmon pipeline splits it into index=host_metrics.
prometheus_stack_remote_write_keep_jobs:
  - blackbox_.*
  - smokeping
  - pve_node_exporter
