---
systemd_restart_policy_services:
  - haproxy
  - nginx

# HTTP/HTTPS reverse-proxy frontends.
#
# Flip haproxy_http_enabled to true ONLY after terraform-proxmox PR #320
# has been activated and the per-service ACME cert has been delivered to
# /etc/ssl/private/<name>.pem on this LXC. With the flag off (default),
# the haproxy role renders the TCP-only config and ignores the frontends
# list entirely.
#
# server_name uses {{ tofu_data.domain }} so the same group_vars
# work across environments. backend_host/port come from the upstream
# host's inventory entry + the pipeline_constants port map (DRY).
haproxy_http_enabled: false
haproxy_http_frontends: []

# Split HAProxy's own logs into the proxy syslog family (-> Splunk index=proxy).
# NOTE: currently inert — the site.yml syslog_forwarder play excludes
# haproxy_group (the LB must not forward into the receiver it fronts). Kept
# wired so the route takes effect the moment the forwarder is enabled here
# with a loop-safe design (e.g. direct-to-Edge target).
syslog_forwarder_program_routes:
  - program: haproxy
    port: "{{ tofu_data.constants.syslog_port_map.proxy.standard | default(523) }}"
