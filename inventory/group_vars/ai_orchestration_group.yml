---
# Shared config for the AI-orchestration emitters (n8n, Dify, LangFlow, agent-exec).
# These guests carry the `ai-orchestration` tag → ai_orchestration_group (load_tofu.yml).
# Langfuse is NOT here — it receives telemetry, it does not emit.

# Cribl Edge OTLP/HTTP receiver for OpenTelemetry emission. The native OTEL source
# on Cribl Edge and the Langfuse trace fan-out are configured LIVE (this Cribl
# version cannot split one input across multiple outputs, so the fork is built and
# verified against the running Cribl + Langfuse). Apps emit here regardless; the
# OTLP exporter tolerates an unreachable endpoint (retry/drop), so converge is safe
# before the source exists. Port is DRY from the tofu_data constants.
ai_orchestration_otel_endpoint: >-
  http://cribl-edge.{{ lookup('env', 'PROXMOX_SUBDOMAIN') | mandatory('PROXMOX_SUBDOMAIN is required') }}:{{ hostvars['localhost']['tofu_data']['constants']['service_ports']['otel_traces_http'] }}

# Optional local OpenAI-compatible model endpoint (hermes-infer Ollama). Each tool
# MAY point at this or at external provider APIs per its own config — never forced.
ai_orchestration_ollama_base_url: >-
  https://ollama.{{ lookup('env', 'PROXMOX_SUBDOMAIN') | mandatory('PROXMOX_SUBDOMAIN is required') }}/v1

# Restart the Docker stack on failure (Phase 9 systemd restart policy).
systemd_restart_policy_services:
  - docker
