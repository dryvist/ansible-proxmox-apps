---
# Global variables for all hosts

# System
ansible_become: true
ansible_become_method: sudo

# NTP: point at the self-hosted Proxmox stratum-2 servers when Doppler
# provides PROXMOX_NTP_SERVERS (comma-separated bare IPs/hostnames).
# The regex_replace appends "iburst" to entries that contain no spaces
# (i.e., bare addresses) so initial sync is fast; entries that already
# include chrony options (e.g. "192.168.0.10 iburst prefer") are passed
# through unchanged. Empty value falls back to the role's ntp_pools
# default plus the public Debian pool acts as fallback when present.
ntp_servers: >-
  {{ lookup('env', 'PROXMOX_NTP_SERVERS')
     | split(',') | map('trim') | reject('equalto', '')
     | map('regex_replace', '^([^ ]+)$', '\1 iburst') | list }}

# Cribl Edge HEC input listener port for the netmon Telegraf push path
# (roles/netmon -> roles/cribl_edge). Reuses the standard Splunk-HEC port from
# the tofu constants so the value stays DRY across both roles; falls back to
# 8088 when tofu_data is absent (e.g. molecule).
cribl_hec_input_port: >-
  {{ hostvars['localhost']['tofu_data']['constants']['service_ports']['splunk_hec']
     | default(8088) }}

# Shared Cribl Edge OTLP/HTTP receiver — every OTEL-emitting component (not just
# the ai-orchestration tier) points here, so this is global rather than scoped to
# ai_orchestration_group.yml (previously host-only there; roles outside that
# group, e.g. hermes_agent/open_webui, hit an undefined-var fatal referencing it).
# Split out so the composed URL stays under the 120-char yaml line limit.
ai_subdomain: "{{ lookup('env', 'PROXMOX_SUBDOMAIN') | mandatory('PROXMOX_SUBDOMAIN required') }}"
ai_otel_http_port: >-
  {{ hostvars['localhost']['tofu_data']['constants']['service_ports']['otel_traces_http'] }}
ai_orchestration_otel_endpoint: "http://cribl-edge.{{ ai_subdomain }}:{{ ai_otel_http_port }}"

# Heavy-tier LLM serving host (the Mac Studio) — SINGLE SOURCE OF TRUTH for its
# short hostname and reserved IP, so neither literal is repeated across roles or
# group_vars (llm_router, technitium_dns). The host is a tofu-unifi fixed_ips.json
# reservation and is NOT a PVE guest, so it is absent from the tofu ansible
# inventory; parameterize it from the environment instead (LLM_LARGE_RUNNER_HOST
# is the FQDN used for the llm-large alias below — take its short host here). The
# defaults are the current live values, so with the env unset the rendered output
# is byte-identical to before.
llm_large_serving_host: "{{ (lookup('env', 'LLM_LARGE_RUNNER_HOST') or 'jevans-ms') | split('.') | first }}"
# IP default is the local Studio reservation ONLY when no external runner host is
# configured. If LLM_LARGE_RUNNER_HOST points at an external host without an
# explicit LLM_LARGE_RUNNER_IP, resolve to empty so the A-record truthy filter
# skips it (never point an external name at the local IP).
llm_large_serving_ip: >-
  {{ lookup('env', 'LLM_LARGE_RUNNER_IP')
     or ('' if lookup('env', 'LLM_LARGE_RUNNER_HOST') else '10.0.50.10') }}

# NOTE: the `llm-large` CNAME record lives in group_vars/technitium_dns_group.yml,
# NOT here — an `extra_cname_records` list defined in the more-specific group file
# REPLACES (not merges) any list here, so a definition here would be silently
# ignored for the technitium hosts. Keep the single authoritative definition there.

# SINGLE SOURCE OF TRUTH for the fabric's default chat/agent model. Both the
# Hermes Agent brain (hermes_agent_model) and Open WebUI's default chat model
# (open_webui_default_model) resolve to this, so the human chat UI and the
# autonomous agent always run the same default by construction. The value is a
# router model id (alias or passthrough physical id) served via
# https://llm.<subdomain>/v1. Change it here — never re-pin it per consumer.
#
# Current value: Qwen3.6-35B-A3B-OptiQ-4bit, chosen by the 2026-07-08 agentic
# tool-calling benchmark (8 candidates, results in HF dataset
# JacobPEvans/mlx-benchmarks). OptiQ-4bit scored 100% valid tool calls with
# 0/20 multi-turn degradation at concurrency 4 + thinking + large context, at
# ~7.4 tok/s single-stream large-ctx — the same clean tool-calling as the stock
# 4-bit brain (PR #753) but ~1.8x its 4.1 tok/s, so it supersedes it. The whole
# Qwen3.6-35B-A3B family ran under continuous batching at concurrency 4 with
# zero crashes, retiring the old "qwen3_5_moe batching crash rules out Qwen3.6"
# claim for good. Qwen3-Coder-30B stays faster single-stream but emits malformed
# tool calls under agentic load ("repairing tool_call with empty function.name",
# unreliable multi-turn), so it is not the brain. The stock 4-bit alias
# (Qwen3.6-35B-A3B-4bit) remains defined in the router for any other consumer.
ai_default_model: Qwen3.6-35B-A3B-OptiQ-4bit

# Resource-domain secrets fetched from OpenBao by the openbao_secrets pre-play,
# one dict per domain. Defaults to an empty dict for each so every consumer's
# `bao_<domain>_secrets.X | default(lookup('env','X'), true)` resolves even
# when the fetch is skipped (BAO_ADDR unset, or that domain's role_id/secret_id
# envs unset) or the host is outside the openbao_secrets play. The pre-play
# overrides these per host when active. `local-llm` replaces the old
# `ai-readonly`-backed `bao_ai_secrets` for the LLM serving stack — ai-readonly
# is now reserved for AI AGENT identities, not the serving stack itself.
bao_local_llm_secrets: {}
bao_observability_secrets: {}
bao_local_cloud_secrets: {}
bao_monitoring_secrets: {}
bao_media_secrets: {}
