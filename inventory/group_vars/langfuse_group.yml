---
# Langfuse LLM-observability config (langfuse_group).

# Internal subdomain + RustFS S3 port, split out so the composed endpoint stays
# under the 120-char yaml line limit. Port is DRY from the tofu_data constants.
langfuse_subdomain: "{{ lookup('env', 'PROXMOX_SUBDOMAIN') | mandatory('PROXMOX_SUBDOMAIN required') }}"
langfuse_s3_port: >-
  {{ hostvars['localhost']['tofu_data']['constants']['service_ports']['object_storage_s3'] }}

# RustFS S3-compatible endpoint for Langfuse blob storage (event + media uploads).
# The `langfuse` bucket is created in the live apply step; FORCE_PATH_STYLE=true is
# set in the role (RustFS/MinIO require path-style). Scheme/port are verified live
# against the running object store.
ai_orchestration_s3_endpoint: "http://s3.{{ langfuse_subdomain }}:{{ langfuse_s3_port }}"

# Restart the Docker stack on failure (Phase 9 systemd restart policy).
systemd_restart_policy_services:
  - docker
