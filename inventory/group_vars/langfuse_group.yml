---
# Langfuse LLM-observability config (langfuse_group).

langfuse_subdomain: "{{ lookup('env', 'PROXMOX_SUBDOMAIN') | mandatory('PROXMOX_SUBDOMAIN required') }}"

# RustFS S3-compatible endpoint for Langfuse blob storage (event + media uploads).
# The s3 name is a Traefik ingress alias serving the S3 API over TLS on 443 —
# NOT the backend's native port (s3.<zone>:9000 resolves to Traefik, where 9000
# is unserved and uploads hang until the client times out). The `langfuse`
# bucket is created in the live apply step; FORCE_PATH_STYLE=true is set in the
# role (RustFS/MinIO require path-style).
ai_orchestration_s3_endpoint: "https://s3.{{ langfuse_subdomain }}"

# Restart the Docker stack on failure (Phase 9 systemd restart policy).
systemd_restart_policy_services:
  - docker
