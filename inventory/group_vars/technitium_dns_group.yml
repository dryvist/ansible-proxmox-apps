---
# Technitium DNS overrides for the technitium_dns_group.

# Guest hostnames retired for good: their A records are deleted from the zone so
# they stop resolving to addresses no longer in service. The record-add path is
# add/overwrite-only and never removes a name, so a name only stops resolving
# once it is listed here. Bare hostnames only. A name being rebuilt under the
# SAME hostname is refreshed by the overwrite path and must NOT be listed here.
technitium_dns_retired_records:
  - hermes-infer
  - hermes-chat
  - claude-code-01
  - claude-code-02
  - gemini-01
  - gemini-02

# Neutral capability name for the heavy-tier serving gate on the Studio:
# llm-large.<zone> -> the machine's own cert-covered hostname (verbatim FQDN
# target; the router pool dials this name with the gate bearer). The Studio's
# name lives at the APEX (parent of the guest zone), so derive it from
# PROXMOX_SUBDOMAIN — PROXMOX_DOMAIN holds the guest zone in this environment.
# The Studio host itself comes from `llm_large_serving_host` (all.yml single
# source), never a literal repeated here.
technitium_dns_extra_cname_records:
  - name: llm-large
    # An external LLM_LARGE_RUNNER_HOST is already a full FQDN — use it verbatim.
    # Otherwise build the local record from the single-source short host + apex.
    target: >-
      {{ lookup('env', 'LLM_LARGE_RUNNER_HOST')
      or (llm_large_serving_host ~ '.' ~ (lookup('env', 'PROXMOX_SUBDOMAIN')
      | mandatory('PROXMOX_SUBDOMAIN required')
      | split('.', 1) | last)) }}

# Mac Studio reservation from tofu-unifi fixed_ips.json. Hostname + IP come from
# the `llm_large_serving_*` single source in all.yml (env-overridable), so the
# reservation literals live in exactly one place. Because `llm_large_serving_host`
# defaults to `jevans-ms`, this publishes the apex A record the router chain uses.
#
# cribl-stream-01: INC-17123 band-aid. Guest FQDNs are built from the bare apex
# domain (tofu_data.domain), but the automatic per-guest record builder in the
# technitium_dns role only ever writes into the PROXMOX_SUBDOMAIN child zone —
# Technitium is separately authoritative for the apex too, so an unlisted apex
# name hard-NXDOMAINs there instead of falling through anywhere. This publishes
# cribl-stream-01 directly at the apex via the same escape hatch as the Mac
# Studio above. IP comes from the live tofu reservation, not a literal, so it
# tracks any future re-IP automatically. The underlying domain-naming mismatch
# (every guest using bare-apex FQDNs is exposed to the same gap) is tracked
# separately — see ansible-proxmox-apps issue (INC-17123 follow-up).
technitium_dns_extra_a_records:
  - name: "{{ llm_large_serving_host }}"
    ip: "{{ llm_large_serving_ip }}"
  - name: cribl-stream-01
    # default('') so an incomplete inventory during a rebuild (cribl-stream-01 not
    # yet loaded / no reservation) yields a blank IP that the writer's truthy filter
    # skips, instead of an undefined-var error that aborts the whole play (#17136).
    ip: "{{ hostvars['cribl-stream-01'].container_reserved_ip | default('', true) }}"
    zone: "{{ technitium_dns_apex_domain }}"
