---
# Per-host override for the idrac_kvm_docker role.
# LXC 253 hosts the domistyle/idrac6 viewer for the R710.
# keycode_hack is enabled because the R710's iDRAC6 Java viewer drops
# keystrokes on this host without it (verified manually 2026-05-27).
idrac_kvm_docker_targets:
  - name: r710
    host_port: 5800
    env_prefix: IDRAC_R710
    keycode_hack: true
