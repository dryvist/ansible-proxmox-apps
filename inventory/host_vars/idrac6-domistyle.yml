---
# Per-host override for the idrac_kvm_docker role.
# LXC 252 hosts the domistyle/idrac6 viewer for the R410.
# Hostname kept as "idrac6-domistyle" historically; the R410-vs-R710 split
# is encoded by the targets list, not the hostname.
# keycode_hack is required: without it the Avocent Java viewer drops the
# arrow keys on this iDRAC6 (verified 2026-05-27 — Tab/Enter/F-keys work,
# arrows dead until IDRAC_KEYCODE_HACK=TRUE).
idrac_kvm_docker_targets:
  - name: r410
    host_port: 5800
    env_prefix: IDRAC_R410
    keycode_hack: true
