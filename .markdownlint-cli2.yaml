---
# dryvist organization-wide markdownlint canonical.
#
# Single source of truth for markdown linting across every dryvist repo.
# Consumer repos copy this file at scaffold time. (Renovate sync mechanism TBD;
# currently manual copy. Track via Renovate's custom manager when wired.)
#
# Tooling pairing: Biome handles JS/TS/JSON/CSS at lineWidth 100 (see biome.jsonc).
# markdownlint-cli2 covers .md prose at the wider line_length below because prose
# does not need to wrap to the same width as code.
#
# Per-file rule overrides are NOT a top-level markdownlint-cli2 schema key
# (verified against schema). For auto-generated files that would trigger
# unavoidable rule violations (e.g., CHANGELOG.md from release-please), we
# add to `ignores` instead. MD024 stays strict-by-default everywhere it
# actually lints — never disabled across the board.
#
# Schema: https://github.com/DavidAnson/markdownlint-cli2/blob/main/schema/markdownlint-cli2-config-schema.json

config:
  MD013:
    line_length: 160
    tables: true
    strict: true
    # `heading_line_length` and `code_block_line_length` deliberately not set.
    # An 80-character ceiling is an anti-pattern for modern displays and obscures
    # rather than aids readability for prose. Code wrapping is Biome's domain.

# Files to skip entirely. CHANGELOG.md is auto-generated by release-please and
# its commit-link lines (MD013) plus cross-version section headers (MD024)
# would force unavoidable violations. Consumer repos may extend this with
# their own ignores (e.g., `.github/aw/**` for gh-aw-generated artifacts).
ignores:
  - "CHANGELOG.md"
