---
# Ansible collections required for this repository
# Note: ansible.builtin is not listed as it's included with ansible-core
collections:
  - name: amazon.aws
    version: ">=9.0.0"  # RustFS inventory resolver: s3_object

  - name: ansible.posix
    version: ">=1.3.0"

  - name: ansible.utils
    version: ">=2.10.0"  # ipaddr/ipv4 filters used by the download_vpn role

  - name: community.general
    version: ">=10.3.0"  # Required for proxmox_pct_remote connection plugin

  # Better proxmox_pct_remote implementation. Ceiling at <2.0.0: validate_certs
  # default flips to true at 2.0.0; opt in deliberately rather than inherit
  # the change silently.
  - name: community.proxmox
    version: ">=2.0.0,<2.1.0"

  - name: community.docker
    version: ">=3.6.0"  # docker_compose_v2 module added in 3.6.0

  - name: community.hashi_vault
    version: ">=6.0.0"  # openbao_secrets role: vault_login (approle) + vault_kv2_get (needs python hvac)

  - name: community.postgresql
    version: ">=3.4.0"  # postgres role: postgresql_user/_db/_privs idempotent role+db creation

roles:
  # Shared inventory resolver consumed by inventory/load_tofu.yml — replaces the
  # per-repo resolution-tier copy-paste. Pinned to the release that first ships
  # the role.
  - name: inventory_resolve
    src: https://github.com/dryvist/homelab-contracts.git
    scm: git
    version: 9aba451e9de0956f9c308d72a65e86924e243f23
