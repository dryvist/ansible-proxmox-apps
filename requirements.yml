---
# Ansible collections required for this repository
# Note: ansible.builtin is not listed as it's included with ansible-core
collections:
  - name: amazon.aws
    version: ">=9.0.0"  # S3 inventory resolver (inventory/load_tofu.yml): aws_caller_info + s3_object

  - name: ansible.posix
    version: ">=1.3.0"

  - name: ansible.utils
    version: ">=2.10.0"  # ipaddr/ipv4 filters used by the download_vpn role

  - name: community.general
    version: ">=10.3.0"  # Required for proxmox_pct_remote connection plugin

  - name: community.proxmox
    version: ">=1.4.0"  # Better proxmox_pct_remote implementation

  - name: community.docker
    version: ">=3.6.0"  # docker_compose_v2 module added in 3.6.0

  - name: community.hashi_vault
    version: ">=6.0.0"  # openbao_secrets role: vault_login (approle) + vault_kv2_get (needs python hvac)
