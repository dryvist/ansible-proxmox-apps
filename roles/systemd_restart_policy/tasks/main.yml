---
- name: Create systemd override directory
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ item }}.service.d"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: "{{ systemd_restart_policy_services }}"

- name: Deploy restart policy override
  ansible.builtin.template:
    src: restart-override.conf.j2
    dest: "/etc/systemd/system/{{ item }}.service.d/99-restart-policy.conf"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ systemd_restart_policy_services }}"
  notify: Reload systemd daemon
