---
# Dify (LLMOps platform) deployment.
#
# Installs Docker + Compose on the target LXC, generates (and persists) a
# SECRET_KEY on first run, renders the bundled compose stack (api/worker/
# worker_beat/web/db/redis/weaviate/sandbox/ssrf_proxy/nginx) plus the nginx and
# squid configs, then deploys via Docker Compose and waits for the web UI.
#
# Mirrors the infisical_docker / healthchecks_docker roles (Docker repo +
# fuse-overlayfs + Python venv for community.docker, then compose deploy +
# health check).

# =============================================================================
# Docker Installation
# =============================================================================

- name: Gather OS facts
  ansible.builtin.setup:
    filter: ansible_distribution*

- name: Install Docker prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Set Docker repository distribution
  ansible.builtin.set_fact:
    dify_docker_distro: "{{ ansible_distribution | lower }}"

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ dify_docker_distro }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ dify_docker_distro }}
      {{ ansible_distribution_release }} stable
    state: present
    filename: docker

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Install fuse-overlayfs for Docker on ZFS-backed LXC containers
  ansible.builtin.apt:
    name: fuse-overlayfs
    state: present

- name: Configure Docker to use fuse-overlayfs storage driver (required for ZFS-backed LXC)
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "storage-driver": "fuse-overlayfs"
      }
    owner: root
    group: root
    mode: "0644"
  register: dify_docker_daemon_config

- name: Restart Docker to apply fuse-overlayfs configuration
  ansible.builtin.systemd:  # noqa: no-handler
    name: docker
    state: restarted
  when: dify_docker_daemon_config.changed

- name: Ensure Docker service is running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

# =============================================================================
# Data Directories
# Container entrypoints (postgres, redis, weaviate) run as their own UIDs; in an
# unprivileged LXC those map to subuids, so leave ownership defaults — chown
# happens inside each container against the bind mount.
# =============================================================================

- name: Create Dify data subdirectories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ dify_docker_data_dir }}"
    - "{{ dify_docker_data_dir }}/postgres"
    - "{{ dify_docker_data_dir }}/redis"
    - "{{ dify_docker_data_dir }}/weaviate"
    - "{{ dify_docker_data_dir }}/plugin_daemon"
    - "{{ dify_docker_data_dir }}/postgres-init"
    - "{{ dify_docker_data_dir }}/sandbox/dependencies"
    - "{{ dify_docker_data_dir }}/ssrf_proxy"
    - "{{ dify_docker_data_dir }}/nginx"

# The api/worker images run as uid 1001 ("dify"), not root, and write privkeys/
# uploads into this bind mount — it must be writable by that uid.
- name: Create Dify app storage directory (api/worker run as uid 1001)
  ansible.builtin.file:
    path: "{{ dify_docker_data_dir }}/storage"
    state: directory
    owner: "1001"
    group: "1001"
    mode: "0755"

# =============================================================================
# SECRET_KEY (generate-once, persist on disk)
# The api/worker sign sessions with SECRET_KEY; randomizing it per play would
# invalidate every active session. Persist it root-only on first run and reuse.
# =============================================================================

- name: Check for existing Dify SECRET_KEY
  ansible.builtin.stat:
    path: "{{ dify_docker_data_dir }}/.secret_key"
  register: dify_docker_secret_key_stat

- name: Generate Dify SECRET_KEY (first run only)
  ansible.builtin.copy:
    dest: "{{ dify_docker_data_dir }}/.secret_key"
    # 50 alphanumeric chars; boolean flags pin the character set unambiguously.
    content: >-
      {{ lookup('community.general.random_string',
                length=50,
                upper=true, lower=true, numbers=true,
                special=false) }}
    owner: root
    group: root
    mode: "0600"
  when: not dify_docker_secret_key_stat.stat.exists
  no_log: true

- name: Read Dify SECRET_KEY into memory
  ansible.builtin.slurp:
    src: "{{ dify_docker_data_dir }}/.secret_key"
  register: dify_docker_secret_key_file
  no_log: true

- name: Resolve effective SECRET_KEY (inventory override or persisted file)
  ansible.builtin.set_fact:
    dify_docker_secret_key: >-
      {{ dify_docker_secret_key
         if dify_docker_secret_key | length > 0
         else (dify_docker_secret_key_file.content | b64decode | trim) }}
  no_log: true

# =============================================================================
# Config + Compose Files
# =============================================================================

- name: Render Dify squid (ssrf_proxy) configuration
  ansible.builtin.template:
    src: squid.conf.j2
    dest: "{{ dify_docker_data_dir }}/ssrf_proxy/squid.conf"
    owner: root
    group: root
    mode: "0644"
  notify: Restart dify

- name: Render Dify nginx routing configuration
  ansible.builtin.template:
    src: nginx-default.conf.j2
    dest: "{{ dify_docker_data_dir }}/nginx/default.conf"
    owner: root
    group: root
    mode: "0644"
  notify: Restart dify

# Only consumed on first postgres init (empty PGDATA); no notify because postgres
# never re-runs initdb.d against an existing cluster.
- name: Render Dify postgres plugin-database init script
  ansible.builtin.template:
    src: postgres-init-plugin-db.sql.j2
    dest: "{{ dify_docker_data_dir }}/postgres-init/create-plugin-db.sql"
    owner: root
    group: root
    mode: "0644"

- name: Render Dify docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ dify_docker_data_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0600"  # contains SECRET_KEY + DB/Redis/sandbox/weaviate secrets
  no_log: true
  notify: Restart dify

# =============================================================================
# Python venv for Ansible Docker modules
# Scope the venv interpreter to the community.docker tasks via task-level vars —
# setting it via set_fact would leak the venv (which only has `docker`) to later
# plays that need system Python.
# =============================================================================

- name: Install Python venv and pip for dependencies
  ansible.builtin.apt:
    name:
      - python3-pip
      - python3-venv
      - python3-full
    state: present
    update_cache: true

- name: Create virtualenv for Ansible Python dependencies
  ansible.builtin.pip:
    name:
      - docker
    state: present
    virtualenv: /opt/ansible-venv
    virtualenv_command: python3 -m venv

# =============================================================================
# Deploy via Docker Compose
# =============================================================================

- name: Deploy Dify via docker compose
  community.docker.docker_compose_v2:
    project_src: "{{ dify_docker_data_dir }}"
    state: present
  register: dify_docker_compose_result
  changed_when: >-
    (dify_docker_compose_result.actions | default([]))
    | selectattr('status', 'in', ['Creating', 'Recreating', 'Pulling', 'Building'])
    | list | length > 0
  vars:
    ansible_python_interpreter: /opt/ansible-venv/bin/python
  no_log: true

# =============================================================================
# Health Check
# First boot can take several minutes: image pulls, postgres initdb, the api
# running migrations against the fresh DB, and weaviate warming up.
# =============================================================================

- name: Wait for Dify web port to accept TCP connections
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ dify_docker_web_port }}"
    timeout: 300

- name: Verify Dify web UI renders through nginx
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ dify_docker_web_port }}/"
    method: GET
    status_code: 200
  register: dify_docker_health
  retries: 30
  delay: 10
  until: dify_docker_health.status == 200
  changed_when: false

# --- Headless first-run provisioning ------------------------------------------
# GET /console/api/setup reports {"step":"not_started"} until installation is
# finished; the POST creates the admin workspace and completes setup so the UI
# never shows /install. Skipped on every converge after the first.
- name: Check whether Dify setup is finished
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ dify_docker_web_port }}/console/api/setup"
    return_content: true
  register: dify_docker_setup_state

- name: Complete Dify setup (create admin)
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ dify_docker_web_port }}/console/api/setup"
    method: POST
    body_format: json
    body:
      email: "{{ dify_docker_admin_email }}"
      name: "admin"
      password: "{{ dify_docker_admin_password }}"
    status_code: [200, 201]
  when: dify_docker_setup_state.json.step | default('') == 'not_started'
  changed_when: true
  no_log: true
