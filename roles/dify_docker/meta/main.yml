---
galaxy_info:
  author: Jacob Evans
  description: >-
    Self-hosted Dify (https://dify.ai) LLMOps platform on an LXC container via
    Docker Compose. Bundled stack: api, worker, worker_beat, web, postgres,
    redis, weaviate (default vector store), sandbox, ssrf_proxy, and nginx.
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: Debian
      versions:
        - bookworm
  galaxy_tags:
    - llmops
    - ai
    - docker
    - dify

dependencies:
  # Shared Docker-in-LXC bootstrap (docker-ce + compose plugin, LXC-conditional
  # fuse-overlayfs). configure_daemon_json pins the fuse-overlayfs storage driver
  # (required on ZFS-backed LXC). No venv: deploys via docker_compose_v2 (CLI).
  - role: docker_engine
    docker_engine_configure_daemon_json: true

collections:
  - community.docker
