---
# Use state: present with recreate: always so config-only changes (compose,
# nginx, or squid) trigger a full recreate against the new files. state:
# restarted would only restart the existing containers with their old config.
- name: Restart dify
  community.docker.docker_compose_v2:
    project_src: "{{ dify_docker_data_dir }}"
    state: present
    recreate: always
  no_log: true
