---
galaxy_info:
  author: Jacob Evans
  description: >-
    Self-hosted Langfuse v3 (LLM observability — traces, evals, prompt
    management) on an LXC container via Docker Compose. Bundles
    postgres + clickhouse + redis; blob storage points at the homelab
    RustFS S3 instead of the upstream-bundled MinIO.
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: Debian
      versions:
        - bookworm
  galaxy_tags:
    - observability
    - llm
    - monitoring
    - docker

dependencies:
  # Shared Docker-in-LXC bootstrap (docker-ce + compose plugin, LXC-conditional
  # fuse-overlayfs). configure_daemon_json pins the fuse-overlayfs storage driver
  # (required on ZFS-backed LXC). No venv: deploys via docker_compose_v2 (CLI).
  - role: docker_engine
    docker_engine_configure_daemon_json: true

collections:
  - community.docker
  - community.general
