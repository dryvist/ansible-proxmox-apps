---
# Use state: present with recreate: always so config-only changes (which don't
# restart healthy containers) trigger a full recreate against the new compose
# file. state: restarted only restarts the existing containers with old config.
- name: Restart langfuse
  community.docker.docker_compose_v2:
    project_src: "{{ langfuse_docker_data_dir }}"
    state: present
    recreate: always
  no_log: true
