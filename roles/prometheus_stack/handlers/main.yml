---
# prometheus_stack handlers

# Config-only change to prometheus.yml: hot-reload via the lifecycle API (no
# restart, no scrape gap, TSDB untouched). Requires --web.enable-lifecycle.
- name: Reload prometheus config
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ prometheus_stack_port }}/-/reload"
    method: POST
    status_code: [200, 204]

# Compose change (or blackbox.yml change, which the exporter only reads at start):
# recreate the stack against the rendered files. The TSDB persists in the named
# volume across the recreate.
- name: Restart prometheus stack
  community.docker.docker_compose_v2:
    project_src: "{{ prometheus_stack_data_dir }}"
    state: present
    recreate: always
