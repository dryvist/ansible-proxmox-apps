---
galaxy_info:
  author: JacobPEvans
  description: >-
    Prometheus + blackbox_exporter as a single Docker-in-LXC compose stack (one
    project, two services). System of record for the Prometheus-native
    network-quality stack: active WAN/ISP probing (ICMP/HTTP/TLS/DNS) scraped via
    the multi-target /probe pattern. smokeping_prober / irtt / snmp_exporter jobs
    append as those roles land. See terraform-proxmox docs/SMOKEPING.md.
  license: Apache-2.0
  min_ansible_version: "2.15"

  platforms:
    - name: Debian
      versions:
        - bookworm
        - trixie
    - name: Ubuntu
      versions:
        - jammy
        - noble

  galaxy_tags:
    - prometheus
    - blackbox
    - monitoring
    - metrics
    - network
    - docker

dependencies:
  # Shared Docker-in-LXC bootstrap (docker-ce + compose plugin, LXC-conditional
  # fuse-overlayfs). No daemon.json (the registry-mirror play in site.yml owns
  # /etc/docker/daemon.json) and no venv: deploys via docker_compose_v2 (CLI).
  - role: docker_engine
