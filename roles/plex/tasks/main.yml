---
# plex — LAN-only install from the official Plex apt repo, then an idempotent +
# non-fatal server claim from a SOPS-sourced PLEX_CLAIM_TOKEN.

- name: Install Plex prerequisites
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create media group
  ansible.builtin.group:
    name: "{{ plex_group }}"
    gid: "{{ plex_group_gid }}"
    system: true
    state: present

- name: Ensure /etc/apt/keyrings exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

# Plex moved repos in Plex Media Server 1.43.0 (v2 key, ed25519, repo.plex.tv).
# The legacy RSA/SHA-1 PlexSign.key fails on Debian 13 (sqv) after 2026-02-01.
# Strip any stale v1 artifacts before installing the v2 key/repo so apt does
# not keep refusing updates on hosts that previously used the old layout.
- name: Remove legacy Plex v1 apt keyring (if present)
  ansible.builtin.file:
    path: /etc/apt/keyrings/plex.asc
    state: absent

- name: Remove legacy Plex v1 apt repo file (if present)
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/plexmediaserver.list
    state: absent
  register: plex_legacy_repo

- name: Add Plex apt signing key (v2, ed25519)
  ansible.builtin.get_url:
    url: "{{ plex_apt_key_url }}"
    dest: "{{ plex_apt_keyring_path }}"
    mode: "0644"

- name: Add Plex apt repository
  ansible.builtin.apt_repository:
    repo: "{{ plex_apt_repo }}"
    filename: plexmediaserver
    state: present
  register: plex_repo

- name: Refresh apt cache after Plex repo changes
  ansible.builtin.apt:
    update_cache: true
  when: plex_repo is changed or plex_legacy_repo is changed

- name: Install Plex Media Server
  ansible.builtin.apt:
    name: "{{ plex_package }}"
    state: present

- name: Ensure plex user is in the media group (read tank/media)
  ansible.builtin.user:
    name: "{{ plex_user }}"
    groups: "{{ plex_group }}"
    append: true
  register: plex_user_group
  failed_when: false

# The /data library roots (and their movies/tv subdirs) are created host-side by
# the media_lxc_features role (owner root, group media/gid 13000, setgid +
# group-writable) and exposed via the unprivileged-LXC idmap. Plex is added to
# the media group above and reads them via group/other perms, so only ensure
# they EXIST here — never chown/chmod the shared bind-mount (its host-root owner
# is unmapped inside the container -> EPERM).
- name: Ensure the shared /data library roots exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    # Declares the host-side contract (media_lxc_features sets 2775 + setgid);
    # a match means no chmod is attempted, so the unmapped-owner mount is never
    # touched. Owner/group are deliberately NOT enforced here.
    mode: "2775"
  loop: "{{ [plex_media_dir] + (plex_library_subdirs | map('regex_replace', '^', plex_media_dir ~ '/') | list) }}"
  failed_when: false

- name: Enable + start Plex Media Server
  ansible.builtin.systemd:
    name: plexmediaserver.service
    state: started
    enabled: true
    daemon_reload: true
  when: plex_manage_services

# Idempotent + non-fatal server claim (see tasks/claim.yml). Only attempted on a
# live host (plex_manage_services), since it talks to the running Plex API.
- name: Claim the Plex server (idempotent, non-fatal)
  ansible.builtin.import_tasks: claim.yml
  when: plex_manage_services

# Idempotent + non-fatal library creation (see tasks/libraries.yml). Turns the
# scaffolded dirs into actual Plex library sections so imported media is visible
# (incl. on Roku). Needs an account token; skips cleanly without one.
- name: Ensure Plex libraries exist (idempotent, non-fatal)
  ansible.builtin.import_tasks: libraries.yml
  when: plex_manage_services

# Advertise the Traefik HTTPS hostname (https://plex.<domain>) so apps/Roku
# connect over the valid wildcard cert. Reuses plex_effective_token from
# libraries.yml; skips cleanly without a token or domain.
- name: Advertise the Traefik hostname as Plex custom access URL (idempotent, non-fatal)
  ansible.builtin.import_tasks: customconnections.yml
  when: plex_manage_services

# Publish the claimed server to plex.tv so the Plex app on Roku / app.plex.tv can
# DISCOVER it. A claimed server with libraries stays invisible to account clients
# while PublishServerOnPlexOnlineKey is 0 — this reconciles it. Reuses
# plex_effective_token; skips cleanly without one.
- name: Ensure the Plex server is published to plex.tv (idempotent, non-fatal)
  ansible.builtin.import_tasks: publish.yml
  when: plex_manage_services

# Re-share this server's libraries to Plex Home members so a rebuilt server (fresh
# machineIdentifier) re-grants access FROM CODE — fixes the "second profile on the
# same Roku shows unavailable" symptom. Reuses plex_effective_token; idempotent +
# non-fatal; only ADDS shares (never removes access).
- name: Ensure Plex libraries are shared to Home members (idempotent, non-fatal)
  ansible.builtin.import_tasks: sharing.yml
  when: plex_manage_services

# Loud end-of-role status: claim/publish are non-fatal, so without this a server
# left UNCLAIMED or UNPUBLISHED (invisible on Roku) would slip by silently. Warns
# unmissably and can hard-fail when plex_require_onboarded is set.
- name: Report Plex onboarding status (loud; opt-in strict)
  ansible.builtin.import_tasks: status.yml
  when: plex_manage_services
