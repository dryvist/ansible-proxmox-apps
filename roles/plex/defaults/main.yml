---
# plex role defaults — LAN-only Plex Media Server. No VPN.
# Install from Plex's official apt repo, enable the service, and (idempotently +
# non-fatally) claim the server from a SOPS-sourced claim token. Library content
# add can still be finished in the Plex web UI / API after deploy.
plex_user: plex
plex_group: media
plex_group_gid: 13000
# TRaSH single-filesystem layout: ONE bind-mounted /data dataset; the library
# roots live at /data/media/{movies,tv} (the unified layout renames the old
# "shows" tree to "tv" — the Plex library NAME stays "Shows").
plex_media_dir: /data/media
# Media library roots scaffolded under plex_media_dir; these entries just
# guarantee the dirs exist with right ownership.
plex_library_subdirs:
  - movies
  - tv
# Web UI / server port from tofu constants (no hardcoded port).
plex_web_port: "{{ tofu_data.constants.media_ports.plex_web }}"

# Custom server access URL advertised to clients so apps/Roku connect over the
# Traefik HTTPS hostname (valid wildcard cert) instead of the raw IP. Uses the
# PROXMOX_SUBDOMAIN ingress base (plex.<PROXMOX_SUBDOMAIN>), matching the traefik
# role. Empty when unset (e.g. CI) -> the customConnections task skips.
plex_custom_access_url: >-
  {{ ('https://plex.' ~ lookup('env', 'PROXMOX_SUBDOMAIN') ~ ':443')
     if (lookup('env', 'PROXMOX_SUBDOMAIN') | default('', true) | length > 0) else '' }}

# --- Library sections (account token required) --------------------------------
# Scaffolding the dirs is not enough: Plex only shows media that belongs to a
# LIBRARY SECTION, so tasks/libraries.yml creates one per path. This needs an
# account-scoped X-Plex-Token (NOT the ~4-min claim token), sourced from
# SOPS/Doppler env (PLEX_TOKEN); never committed. Empty => library creation is
# skipped and surfaced as a manual UI step (same posture as the claim flow).
plex_account_token: "{{ lookup('env', 'PLEX_TOKEN') | default('', true) }}"
# Library sections to ensure exist (idempotent, matched by name). Modern Plex
# agents/scanners; type is movie | show. Paths are the scaffolded roots above.
plex_libraries:
  - name: Movies
    type: movie
    location: "{{ plex_media_dir }}/movies"
    agent: tv.plex.agents.movie
    scanner: Plex Movie
    language: en-US
  - name: Shows
    type: show
    location: "{{ plex_media_dir }}/tv"
    agent: tv.plex.agents.series
    scanner: Plex TV Series
    language: en-US

# --- Server claim (account linking) ------------------------------------------
# Plex claim tokens are account-scoped and EXPIRE ~4 minutes after generation
# (https://www.plex.tv/claim), so a stored token is usually already stale. The
# role consumes it idempotently AND non-fatally:
#   - already claimed (Preferences.xml has PlexOnlineToken) -> skip
#   - token present + still valid                           -> claim, then done
#   - token absent or expired/invalid                       -> log + continue
# Because the token expires in ~4 min it is NOT stored in SOPS/secrets — pass a
# fresh one straight to the converge (`-e plex_claim_token=claim-XXXX`) or claim
# in the web UI. PLEX_CLAIM_TOKEN is still honoured from the env if present.
plex_claim_token: "{{ lookup('env', 'PLEX_CLAIM_TOKEN') | default('', true) }}"
# Local Plex API for the claim exchange (loopback — the claim is submitted from
# the server itself). 32400 is the fixed Plex Media Server API port.
plex_local_api_port: 32400
# Where apt-installed Plex persists Preferences.xml (holds PlexOnlineToken once
# the server is claimed).
plex_preferences_path: >-
  /var/lib/plexmediaserver/Library/Application Support/Plex Media Server/Preferences.xml
# Official Plex apt repo — v2 (ed25519 key, repo.plex.tv).
# Required on Debian 13 (trixie): apt-via-Sequoia (sqv) rejects the legacy
# RSA/SHA-1 PlexSign key as of 2026-02-01. The v2 key/repo are the official
# Plex replacement documented at:
#   https://support.plex.tv/articles/235974187-enable-repository-updating-for-supported-linux-server-distributions/
plex_apt_key_url: https://downloads.plex.tv/plex-keys/PlexSign.v2.key
plex_apt_keyring_path: /etc/apt/keyrings/plexmediaserver.v2.asc
plex_apt_repo: "deb [signed-by={{ plex_apt_keyring_path }}] https://repo.plex.tv/deb/ public main"
plex_package: plexmediaserver
plex_manage_services: true
