---
# NousResearch Hermes Agent — native install + headless gateway daemon. Idempotent.
#
# The agent runs arbitrary terminal + web tools, so it runs as a NON-root dedicated
# user; the LXC is the blast-radius boundary. Ansible owns the PLATFORM (user,
# install, config, systemd); the Hermes daemon owns its own app lifecycle
# (`hermes update`) — install once behind a `creates` guard and never pin a moving
# 'latest' (Agy: avoids the self-update vs idempotency conflict).
#
# NOT YET LIVE-VALIDATED (verify on first converge): (a) install.sh running clean
# non-interactively as root on a minimal Debian LXC; (b) `hermes gateway run
# --replace` staying up headless with no messaging platform; (c) Hindsight
# provider init from config.yaml alone (it may need its client package on
# first run).

- name: Install role prerequisites (installer + clone)
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - git
      - sudo
    state: present
    update_cache: true
    cache_valid_time: 3600

# Fetch the installer from the pinned release tag's immutable raw URL and verify
# its sha256 BEFORE running it — no `curl <url> | bash` of a moving remote script.
# A checksum mismatch (upstream changed the tag, MITM, rug-pull) fails here, loud.
- name: Fetch the pinned Hermes installer (checksum-verified)
  ansible.builtin.get_url:
    url: "{{ hermes_agent_installer_url }}"
    dest: "{{ hermes_agent_installer_path }}"
    checksum: "sha256:{{ hermes_agent_installer_sha256 }}"
    owner: root
    group: root
    mode: "0644"

# Run the VERIFIED local installer (root + play become: true) -> system-wide FHS
# layout: binary /usr/local/bin/hermes, code /usr/local/lib/hermes-agent. Do NOT
# pass --dir: an explicit dir disables the root-FHS auto-layout and drops the
# launcher in /root/.local/bin instead of /usr/local/bin (breaks hermes_agent_bin).
# --branch {{ version }}: the installer git-clones the app at this release TAG
# (`git clone --depth 1 --branch <tag>`), pinning the app checkout too. The
# installer handles its own Python/uv/venv/Node/ripgrep/ffmpeg deps.
# `creates` guard installs once; the Hermes daemon self-updates the app after.
# --skip-setup: the installer's final step is an INTERACTIVE `hermes setup` wizard
# that reads /dev/tty and hangs forever under Ansible (no controlling TTY). We skip
# it and configure declaratively via the config.yaml/.env templates below;
# --non-interactive defaults any remaining prompt instead of blocking.
- name: Install Hermes Agent system-wide (once; daemon self-updates thereafter)
  ansible.builtin.command:
    cmd: >-
      bash {{ hermes_agent_installer_path }}
      --branch {{ hermes_agent_version }} --skip-setup --non-interactive
    creates: "{{ hermes_agent_bin }}"

# The base install skips optional messaging-platform extras (they pull in
# platform SDKs like slack-bolt that most converges never need). Without this,
# the gateway logs "Platform 'Slack' requirements not met" and refuses to
# create the Slack adapter even with valid tokens configured. `uv pip install`
# is a no-op re-run when already satisfied; changed_when keys off its own
# "Installed"/"Uninstalled" summary line so idempotency reporting stays honest.
# uv writes that summary to STDERR, not stdout — check stderr (an empty-repo
# reinstall of nothing leaves both blank, correctly reporting ok/unchanged).
- name: Install the Slack platform extra into the Hermes venv
  ansible.builtin.command:
    cmd: >-
      {{ hermes_agent_uv_bin }} pip install
      --python {{ hermes_agent_venv_python }}
      "hermes-agent[slack] @ {{ hermes_agent_install_dir }}"
  register: hermes_agent_slack_extra_install
  changed_when: >-
    'Installed' in hermes_agent_slack_extra_install.stderr
    or 'Uninstalled' in hermes_agent_slack_extra_install.stderr
  when: hermes_agent_slack_bot_token | length > 0 and hermes_agent_slack_app_token | length > 0

- name: Create the hermes runtime user (HERMES_HOME on the data volume)
  ansible.builtin.user:
    name: "{{ hermes_agent_user }}"
    home: "{{ hermes_agent_home }}"
    system: true
    shell: /bin/bash # the agent's terminal tool needs a real shell
    create_home: true

# The home is a pre-existing ZFS data-volume mount (deployment.json mount_point),
# so `create_home` above is a no-op for it — the dir already exists, owned by
# root:root from the mount. Claim it for the hermes user explicitly, or the agent
# can't write its own $HOME (shell sessions, tool scratch, hermes self-update).
- name: Ensure the hermes home directory is owned by the runtime user
  ansible.builtin.file:
    path: "{{ hermes_agent_home }}"
    state: directory
    owner: "{{ hermes_agent_user }}"
    group: "{{ hermes_agent_user }}"
    mode: "0750"

- name: Ensure HERMES_HOME exists
  ansible.builtin.file:
    path: "{{ hermes_agent_hermes_home }}"
    state: directory
    owner: "{{ hermes_agent_user }}"
    group: "{{ hermes_agent_user }}"
    mode: "0750"

- name: Deploy the Hermes secrets file (.env)
  ansible.builtin.template:
    src: hermes-env.j2
    dest: "{{ hermes_agent_hermes_home }}/.env"
    owner: "{{ hermes_agent_user }}"
    group: "{{ hermes_agent_user }}"
    mode: "0600"
  no_log: true
  notify: Restart hermes-gateway

- name: Deploy the Hermes config.yaml (brain -> LiteLLM router, memory -> Hindsight, budget)
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ hermes_agent_hermes_home }}/config.yaml"
    owner: "{{ hermes_agent_user }}"
    group: "{{ hermes_agent_user }}"
    mode: "0640"
  notify: Restart hermes-gateway

- name: Deploy the hermes-gateway systemd unit
  ansible.builtin.template:
    src: hermes-gateway.service.j2
    dest: /etc/systemd/system/hermes-gateway.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart hermes-gateway

- name: Enable and start the Hermes gateway
  ansible.builtin.systemd:
    name: hermes-gateway
    state: started
    enabled: true
    daemon_reload: true

- name: Flush handlers so config/unit changes apply before verification
  ansible.builtin.meta: flush_handlers

# Type=simple reports 'active' the instant the daemon forks, so a single check
# can pass a service that crashes a moment later. Poll until ActiveState settles
# on 'active' to confirm the gateway actually stays up.
- name: Verify the Hermes gateway is active
  ansible.builtin.systemd:
    name: hermes-gateway
  register: hermes_agent_gateway_state
  until: hermes_agent_gateway_state.status.ActiveState | default('') == 'active'
  retries: 5
  delay: 2

# Best-effort: surface the active memory provider. Non-fatal so a Hindsight
# first-run hiccup doesn't fail the whole converge (verify/fix live).
- name: Check the active memory provider (non-fatal)
  ansible.builtin.command: "{{ hermes_agent_bin }} memory status"
  environment:
    HERMES_HOME: "{{ hermes_agent_hermes_home }}"
  become: true
  become_user: "{{ hermes_agent_user }}"
  register: hermes_agent_memory_status
  changed_when: false
  failed_when: false

- name: Report the active memory provider
  ansible.builtin.debug:
    var: hermes_agent_memory_status.stdout_lines
