---
galaxy_info:
  author: JacobPEvans
  description: Deploy phpIPAM (IP address management) via Docker Compose in LXC
  license: Apache-2.0
  min_ansible_version: "2.15"

  platforms:
    - name: Debian
      versions:
        - bookworm
        - trixie

  galaxy_tags:
    - phpipam
    - docker
    - ipam
    - networking

dependencies:
  # Shared Docker-in-LXC bootstrap (docker-ce + compose plugin, LXC-conditional
  # fuse-overlayfs). Writes daemon.json with the role's storage driver. No venv:
  # deploys via docker_compose_v2 (CLI).
  - role: docker_engine
    docker_engine_configure_daemon_json: true
    docker_engine_storage_driver: "{{ phpipam_storage_driver }}"
