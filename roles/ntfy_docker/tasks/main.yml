---
# ntfy Docker Deployment Tasks
# Deploys ntfy push notification server as a Docker container

# Docker itself (docker-ce + compose plugin, fuse-overlayfs, the fuse-overlayfs
# daemon.json) is installed by the docker_engine meta dependency (meta/main.yml).
# No venv: ntfy deploys via docker_compose_v2, which uses the docker compose CLI
# (not the docker SDK), so compose runs under the system interpreter.

# =============================================================================
# ntfy Data Directories
# =============================================================================

- name: Create ntfy cache directory
  ansible.builtin.file:
    path: "{{ ntfy_docker_data_dir }}/cache"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create ntfy config directory
  ansible.builtin.file:
    path: "{{ ntfy_docker_data_dir }}/config"
    state: directory
    owner: root
    group: root
    mode: "0755"

# =============================================================================
# ntfy Configuration
# =============================================================================

- name: Deploy ntfy server configuration
  ansible.builtin.template:
    src: server.yml.j2
    dest: "{{ ntfy_docker_data_dir }}/config/server.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart ntfy

- name: Deploy ntfy docker-compose template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ ntfy_docker_data_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart ntfy

# =============================================================================
# Deploy via Docker Compose
# =============================================================================

- name: Deploy ntfy via docker compose
  community.docker.docker_compose_v2:
    project_src: "{{ ntfy_docker_data_dir }}"
    state: present

# =============================================================================
# Health Check
# =============================================================================

- name: Wait for ntfy HTTP port to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ ntfy_docker_http_port }}"
    timeout: 60

- name: Verify ntfy health endpoint
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ ntfy_docker_http_port }}/v1/health"
    method: GET
    status_code: 200
  register: ntfy_docker_health
  retries: 10
  delay: 5
  until: ntfy_docker_health.status == 200
  changed_when: false
