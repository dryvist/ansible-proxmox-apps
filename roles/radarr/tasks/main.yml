---
# radarr — minimal LAN-only install (skeleton).

- name: Install Radarr prerequisites
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - sqlite3
      - libicu-dev
      # Required by community.general.xml (servarr_wiring sets <ApiKey> in
      # config.xml on this host); without it the wiring fails to import lxml.
      - python3-lxml
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create media group
  ansible.builtin.group:
    name: "{{ radarr_group }}"
    gid: "{{ radarr_group_gid }}"
    system: true
    state: present

- name: Create radarr service user
  ansible.builtin.user:
    name: "{{ radarr_user }}"
    group: "{{ radarr_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ radarr_data_dir }}"
    create_home: false
    state: present

# Container-local app dir — owned by the service user (chownable: it lives on
# the container rootfs, not the shared mount).
- name: Ensure radarr data directory exists
  ansible.builtin.file:
    path: "{{ radarr_data_dir }}"
    state: directory
    owner: "{{ radarr_user }}"
    group: "{{ radarr_group }}"
    mode: "2775"

# Shared /data library roots are created host-side by the media_lxc_features
# role (owner root, group media/gid 13000, setgid + group-writable) and exposed
# via the unprivileged-LXC idmap. Radarr reaches them through media-group
# membership, so only ensure they EXIST here — never chown/chmod the shared
# bind-mount (its host-root owner is unmapped inside the container -> EPERM).
- name: Ensure the shared /data library roots exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    # Declares the host-side contract (media_lxc_features sets 2775 + setgid);
    # a match means no chmod is attempted, so the unmapped-owner mount is never
    # touched. Owner/group are deliberately NOT enforced here.
    mode: "2775"
  loop:
    - "{{ radarr_media_dir }}"
    - "{{ radarr_movies_dir }}"

- name: Check if Radarr is already installed
  ansible.builtin.stat:
    path: "{{ radarr_install_dir }}/Radarr"
  register: radarr_bin

- name: Download + extract Radarr
  ansible.builtin.unarchive:
    src: "{{ radarr_tarball_url }}"
    dest: /opt
    remote_src: true
    owner: "{{ radarr_user }}"
    group: "{{ radarr_group }}"
  when: not radarr_bin.stat.exists

- name: Deploy Radarr systemd unit
  ansible.builtin.template:
    src: radarr.service.j2
    dest: /etc/systemd/system/radarr.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart radarr

- name: Enable + start Radarr
  ansible.builtin.systemd:
    name: radarr.service
    state: started
    enabled: true
    daemon_reload: true
  when: radarr_manage_services
