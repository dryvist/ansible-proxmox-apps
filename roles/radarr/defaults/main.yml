---
# radarr role defaults — LAN-only movie PVR. No VPN.
# Skeleton: minimal install + service; flesh out indexers/download clients via
# the Radarr UI (it talks to Prowlarr + qBittorrent on download-vpn over LAN).
radarr_user: media
radarr_group: media
radarr_group_gid: 13000
radarr_install_dir: /opt/Radarr
radarr_data_dir: /var/lib/radarr
# TRaSH single-filesystem layout: media + torrents live on ONE bind-mounted
# /data dataset so imports hardlink (zero-copy). Radarr's library root is
# /data/media/movies.
radarr_media_dir: /data/media
radarr_movies_dir: "{{ radarr_media_dir }}/movies"
radarr_downloads_dir: /data/torrents
# Web UI port from tofu constants (no hardcoded port).
radarr_web_port: "{{ tofu_data.constants.media_ports.radarr_web }}"
radarr_tarball_url: >-
  https://radarr.servarr.com/v1/update/master/updatefile?os=linux&runtime=netcore&arch=x64
radarr_manage_services: true

# --- Self-owned deterministic API key + auth (decoupled from servarr_wiring) --
# Radarr sets its OWN <ApiKey> + auth method in config.xml right after install,
# so it answers on the deterministic key as soon as this role runs — without
# waiting on download_vpn / servarr_wiring (which run from behind the Proton
# VPN). Consumers like Seerr can then authenticate against Radarr regardless of
# VPN/ordering. servarr_wiring still owns ALL cross-app wiring; it no longer
# touches Radarr's own key. From SOPS env; never committed.
radarr_api_key: "{{ lookup('env', 'RADARR_API_KEY') | default('', true) }}"
# v4 refuses to serve the UI with AuthenticationMethod=None. "External" delegates
# auth to the reverse proxy and "DisabledForLocalAddresses" lets LAN requests
# through without a login prompt — matching the servarr_wiring defaults.
radarr_auth_method: External
radarr_auth_required: DisabledForLocalAddresses

# ntfy alert target for the persistent-mount guard (tasks/main.yml). Mirrors
# the repo's ntfy LXC + push topic convention (see download_vpn/service_deadman).
radarr_ntfy_url: >-
  http://{{ hostvars['ntfy']['container_ip'] | default('ntfy') }}:{{
  tofu_data.constants.notification_ports.ntfy_http }}/{{ radarr_ntfy_topic }}
radarr_ntfy_topic: "persistence"
