---
# Zammad ITSM/ticketing + knowledge base — the homelab's incident-management
# system of record. Native DEB from the packager.io apt repo (Rails web/worker/
# websocket) with a colocated Elasticsearch (full-text incident search) and a
# colocated Redis; state lives in the shared native Postgres cluster (#138).
#
# Two layers, mirroring the nautobot role:
#   * always: apt repos, Elasticsearch, Redis, nginx, systemd wiring —
#     deterministic, molecule-safe.
#   * zammad_manage_app (default true): the Zammad DEB install, external-DB
#     migrate/seed, search-index rebuild, and rails-runner bootstrap. Skipped
#     by molecule (needs a real package + DB); validated live at converge.
zammad_manage_app: true

# --- System user / paths ------------------------------------------------------
# The packager.io DEB creates the zammad user and installs under /opt/zammad
# (a persistent ZFS bind mount from terraform-proxmox). Attachments live under
# /opt/zammad/storage; the ES index is derived state on the rootfs.
zammad_user: zammad
zammad_group: zammad
zammad_root: /opt/zammad

# --- Network ------------------------------------------------------------------
# nginx listens on zammad_web (8080), Traefik-fronted. Port is DERIVED from the
# published constants, never a literal.
zammad_web_port: "{{ tofu_data.constants.service_ports.zammad_web }}"
# Public UI FQDN (Traefik router base domain) — Zammad uses it for the fqdn
# Setting, generated links, and http_type. group_vars supplies the real value.
zammad_ui_fqdn: "zammad.{{ lookup('env', 'PROXMOX_SUBDOMAIN') }}"

# --- Database: the shared native Postgres cluster (#138) ----------------------
# FQDN + port are DERIVED, never literals. The zammad database/role itself is
# provisioned by roles/postgres's postgres_managed_databases list — this role
# only connects. pool sized small to fit the shared cluster's default
# max_connections alongside nautobot + vikunja (see PR notes / open risk #2).
zammad_db_host: "postgres.{{ tofu_data.domain }}"
zammad_db_port: "{{ tofu_data.constants.service_ports.postgres_default }}"
zammad_db_name: zammad
zammad_db_user: zammad
# pool is a per-process CEILING (Rails opens lazily up to this), not steady
# usage — a small instance opens far fewer. 15 keeps the web/worker/websocket
# processes under a shared max_connections=100 alongside nautobot + vikunja.
zammad_db_pool: 15
zammad_db_password: "{{ lookup('env', 'ZAMMAD_DB_PASSWORD') }}"

# --- Redis: colocated, loopback only (nautobot precedent) --------------------
zammad_redis_host: 127.0.0.1
zammad_redis_port: 6379
zammad_redis_url: "redis://{{ zammad_redis_host }}:{{ zammad_redis_port }}"

# --- Elasticsearch: colocated single node, loopback only ---------------------
# Zammad's full-text search backend (a core reason for choosing Zammad over a
# task queue). ES 8.x bundles ingest-attachment, so no plugin install. Dev-mode
# (network.host 127.0.0.1) keeps ES's bootstrap checks as warnings, not errors,
# in the unprivileged LXC (vm.max_map_count is host-global — see open risk #3).
zammad_es_apt_channel: "8.x"
zammad_es_package: elasticsearch
zammad_es_host: 127.0.0.1
zammad_es_port: 9200
zammad_es_url: "http://{{ zammad_es_host }}:{{ zammad_es_port }}"
zammad_es_heap: 2g

# --- Admin + per-actor AI service accounts ------------------------------------
# Admin account seeded once (idempotent create-or-find) and stays HUMAN-ONLY.
# Each machine actor gets its own Agent-role, token-only user (no password
# login) so Zammad's activity stream attributes every write to the real actor:
#   hermes = the autonomous Hermes agent
#   ai     = interactive AI sessions (Claude Code, Codex, ...)
# Token values come from the secret store (group_vars, bao-first).
zammad_admin_user: admin
zammad_admin_email: "{{ zammad_admin_user }}@{{ tofu_data.domain }}"
zammad_admin_firstname: Zammad
zammad_admin_lastname: Admin
zammad_admin_password: "{{ lookup('env', 'ZAMMAD_ADMIN_PASSWORD') }}"
zammad_hermes_email: "hermes@{{ tofu_data.domain }}"
zammad_ai_email: "ai@{{ tofu_data.domain }}"
zammad_hermes_api_token: "{{ lookup('env', 'ZAMMAD_API_TOKEN') }}"
zammad_ai_api_token: "{{ lookup('env', 'ZAMMAD_AI_API_TOKEN') }}"

# --- AI provider: Zammad AI on Hermes' brain (the LiteLLM router) -------------
# Zammad's built-in AI features (ticket summaries, writing assistant) run against
# the SAME LLM front door Hermes and n8n use — the LiteLLM router at
# https://llm.<subdomain>/v1 — NOT through the Hermes agent. Provider type is
# `custom_open_ai` (Zammad's "Custom (OpenAI-compatible)" option); the URL MUST
# include `/v1` because that provider appends `/chat/completions` and `/models`
# itself. Seeded idempotently by zammad_bootstrap.rb with validate:false so an
# unreachable brain at converge time cannot abort essential seeding (the
# validated path pings the endpoint). Turn the whole block off with
# zammad_ai_enabled: false (molecule/dry runs never reach it — bootstrap is
# gated on zammad_manage_app).
#
# AI *Agents* (AI::Agent records) are intentionally NOT seeded here yet: their
# prompts belong in the canonical dryvist/ai-llm-prompts registry (see
# docs/ai-prompt-format.md), consumed once migration resumes after the main push.
zammad_ai_enabled: true
zammad_ai_provider_name: custom_open_ai
zammad_ai_provider_url: "https://llm.{{ lookup('env', 'PROXMOX_SUBDOMAIN') }}/v1"
# Model to request. Defaults to the router alias n8n already uses; override via
# ZAMMAD_AI_MODEL to match Hermes' ai_default_model (the "OptiQ brain") when they
# differ. Zammad needs a model that reliably emits strict JSON.
zammad_ai_model: "{{ lookup('env', 'ZAMMAD_AI_MODEL') | default('gpt-oss-120b', true) }}"
# Bearer for the router. custom_open_ai treats the token as optional, but our
# router requires it — group_vars supplies it bao-first (ai/llm's
# LLM_ROUTER_MASTER_KEY); this env-only default is the fallback.
zammad_ai_provider_token: "{{ lookup('env', 'LLM_ROUTER_MASTER_KEY') }}"
# Per-feature toggles enabled once the provider is configured. Names match
# zammad/zammad (Setting area AI::Assistance).
zammad_ai_features:
  - ai_assistance_ticket_summary
  - ai_assistance_text_tools

# --- GitHub issue-linking (opt-in) -------------------------------------------
# Zammad's native GitHub integration links tickets to GitHub issues. OFF by
# default; the operator flips zammad_configure_github with -e once a read-tier
# token is in the converge environment. PLUGINS-FIRST (binding rule): GitHub has
# a live OpenBao engine, so this PAT is NEVER seeded into secret/* KV — it is
# minted per converge from github/token/read-* and passed as ZAMMAD_GITHUB_API_TOKEN,
# re-asserted each run (short-lived, attributable, re-minted). endpoint is the
# public GraphQL API; override only for GitHub Enterprise Server.
zammad_configure_github: false
zammad_github_endpoint: "https://api.github.com/graphql"
zammad_github_api_token: "{{ lookup('env', 'ZAMMAD_GITHUB_API_TOKEN') | default('', true) }}"
# --- Human SSO account (Authelia forwardAuth identity) ------------------------
# `login` MUST equal the Authelia username verbatim: Zammad's create_sso does
# User.lookup(login: ...) on the Remote-User header value, so the email is
# metadata and the login is the join key. admin@ above stays the break-glass
# password login for when Authelia itself is unavailable.
zammad_sso_login: jevans
zammad_sso_email: "{{ zammad_sso_login }}@{{ tofu_data.domain }}"
zammad_sso_firstname: Jacob
zammad_sso_lastname: Evans
# Which SOURCE addresses may assert an SSO login. This is NOT the primary
# control — Traefik stripping client-supplied Remote-* headers is (a request can
# only carry Remote-User if Authelia put it there). It still must be non-empty:
# Zammad's verify_sso_trusted_ip! does `return if trusted_ips.blank?`, so a blank
# value silently skips the check entirely.
# Scoped to RFC1918 rather than Traefik's address on purpose: Rails resolves
# request.remote_ip from X-Forwarded-For, so it is the BROWSER's address here,
# not the proxy's. Comma-separated string; CIDRs allowed.
zammad_sso_trusted_ips: >-
  {{ lookup('env', 'ZAMMAD_SSO_TRUSTED_IPS')
     | default('10.0.0.0/8,192.168.0.0/16,172.16.0.0/12', true) }}

# Incident-management groups + severity priorities. Hermes maps its P-levels to
# these priority ids: P1->4 critical, P2->3 high, P3->2 normal, P4->1 low. The
# built-in 1/2/3 are kept; only "4 critical" is added.
zammad_groups:
  - Incidents
  - Homelab Infrastructure
  - AI/LLM Serving
  - Hermes Agent
  # User-facing media stack (Plex playback, *arr pipeline) — related to but
  # distinct from Homelab Infrastructure.
  - Media
# Top-level customer organization the admin belongs to.
zammad_organization: dryvist
# Dedicated non-shared org for the Hermes agent: the zammad-incidents skill
# files tickets without a customer, so Zammad makes the hermes user the
# customer and the ticket inherits this org — the 24/7 auto-filed noise stays
# in its own container, bulk-manageable without touching anything else.
zammad_hermes_organization: Hermes

# Agent-role overviews (saved filtered views), seeded idempotently by name.
# Declarative keys map onto Zammad's Overview condition schema in the
# bootstrap: open_only (state category), priority_ids, tag, updated_within_days.
#
# Tag taxonomy convention (controlled vocabulary, applied by seeds + agents;
# filter with tags:"<tag>" in search or via the tag-based overviews):
#   system:  macos screenpipe vllm-mlx llama-swap postgres zammad vikunja plex
#            hermes splunk wireguard windowserver
#   class:   kernel-panic oom memory wedge outage degradation data-loss
#            config-drift auth network wifi wan monitoring-gap llm-serving
#   series:  rc-series (the Mac-performance root-cause investigation series)
zammad_overviews:
  - name: Open incidents
    link: open_incidents
    prio: 1010
    open_only: true
    order_by: priority_id
    order_direction: DESC
  - name: Critical & high (open)
    link: critical_high_open
    prio: 1020
    open_only: true
    priority_ids: [3, 4]
    order_by: priority_id
    order_direction: DESC
  - name: RC series (Mac performance)
    link: rc_series
    prio: 1030
    tag: rc-series
    order_by: created_at
    order_direction: ASC
  - name: Recently updated
    link: recently_updated
    prio: 1040
    updated_within_days: 7
    order_by: updated_at
    order_direction: DESC
  - name: Hermes (auto-filed)
    link: hermes_auto
    prio: 1050
    organization: Hermes
    order_by: updated_at
    order_direction: DESC
zammad_extra_priority:
  id: 4
  name: 4 critical

# Incident-response ticket templates (prefill the create form), seeded
# idempotently by name — mirrors the zammad_overviews declarative-data pattern.
# `group`/`priority` are resolved to ids by NAME in the bootstrap (so the YAML
# stays free of Zammad internal ids). `detection_method` is applied only when
# the opt-in incident custom field exists, so a template still seeds cleanly on
# an instance that never ran the zammad_seed_incidents field seed.
zammad_ticket_templates:
  - name: "Incident — Homelab Infrastructure"
    group: Homelab Infrastructure
    priority: 3 high
    title: "Incident: "
    detection_method: alert
  - name: "Incident — AI/LLM Serving"
    group: AI/LLM Serving
    priority: 3 high
    title: "Incident: "
    detection_method: alert
  - name: "Incident — critical outage"
    group: Incidents
    priority: 4 critical
    title: "Outage: "
    detection_method: user-report

# Knowledge-base answers that link OUT to the docs site. Zammad has no dedicated
# redirect field, so each answer's rich-HTML body carries the outbound link.
# Seeded idempotently by title into a "Documentation" category. Data-driven so
# the docs URLs live here, not in the Ruby. Best-effort in the bootstrap.
zammad_kb_docs_category: Documentation
zammad_kb_answers:
  - title: "Deployment state contract"
    url: "https://docs.jacobpevans.com/infrastructure/deployment-state-contract"
    blurb: "The upstream desired-state ACID single-writer contract for the estate."
  - title: "Infrastructure docs (home)"
    url: "https://docs.jacobpevans.com/infrastructure"
    blurb: "Top-level infrastructure documentation for the homelab + AI estate."

# --- Outbound email via the Mailpit relay (no real mail) ---------------------
zammad_smtp_host: "mailpit.{{ tofu_data.domain }}"
zammad_smtp_port: "{{ tofu_data.constants.notification_ports.mailpit_smtp }}"
zammad_notification_sender: "Zammad <zammad@{{ tofu_data.domain }}>"

# --- apt: controller-staged, sha256-pinned signing keys ----------------------
# LXCs are firewalled outbound-internal-only and reach these HTTPS repos through
# the apt-cacher-ng proxy (which allows go/dl.packager.io + artifacts.elastic.co
# via PassThroughPattern). The signing keys are fetched + checksum-verified on
# the CONTROLLER, then copied to the guest — same pattern as roles/postgres.
# ASCII-armored keys are stored directly as the keyring; apt signed-by accepts
# a .asc keyring, so no dearmor step is needed.
zammad_packager_key_url: "https://go.packager.io/srv/deb/zammad/zammad/gpg-key.asc"
zammad_packager_key_staging_path: /tmp/zammad-packager-key.asc
zammad_packager_keyring: /usr/share/keyrings/zammad.asc
zammad_packager_key_sha256: "a429c0ce1f0e2304fdcced83d0d541ad57a38c9c315e734f6f0927feef521376"
# packager.io keys the pool by the numeric release (e.g. `12`), not the codename.
zammad_packager_repo: >-
  deb [signed-by={{ zammad_packager_keyring }}]
  https://go.packager.io/srv/deb/zammad/zammad/stable/debian
  {{ ansible_distribution_major_version }} main

zammad_elastic_key_url: "https://artifacts.elastic.co/GPG-KEY-elasticsearch"
zammad_elastic_key_staging_path: /tmp/zammad-elastic-key.asc
zammad_elastic_keyring: /usr/share/keyrings/elasticsearch.asc
zammad_elastic_key_sha256: "db52809c5f6b27f9c2bed45cb43e398c659275f3d35305653c6750a0db90f5eb"
zammad_elastic_repo: >-
  deb [signed-by={{ zammad_elastic_keyring }}]
  https://artifacts.elastic.co/packages/{{ zammad_es_apt_channel }}/apt stable main

# HTTP liveness poll for the nginx front after the app is up.
zammad_api_timeout: 30
zammad_health_retries: 30
zammad_health_delay: 10

# --- MCP connection publish -> OpenBao (task #12) ----------------------------
# Publish the shared Zammad MCP connection (URL + Hermes API token) to OpenBao
# secret/ai/mcp/zammad for doppler-mcp to inject into the Zammad MCP server.
# Inert by default — the converge enables it with
# -e '{"zammad_token_publish_openbao": true}' once a write-capable OpenBao
# AppRole (BAO_ADDR/BAO_TOKEN) is in the CONTROLLER environment.
zammad_token_publish_openbao: false

# --- Incident schema + backdated history seed --------------------------------
# Adds the Ticket custom fields incident tracking needs (incident_start/end,
# affected_services, root_cause, detection_method, source_issue) and seeds the
# backdated incident history. Zammad's REST API ignores created_at on create,
# so the seed is a rails runner using update_column — the same escape hatch
# zammad_bootstrap.rb already uses for API tokens.
# Inert by default — the operator enables it with
# -e '{"zammad_seed_incidents": true}' to backfill history. Both scripts are
# idempotent (find-or-create; existing tickets get changed fields backfilled).
zammad_seed_incidents: false

zammad_token_openbao_addr: "{{ lookup('env', 'BAO_ADDR') | default('', true) }}"
zammad_token_openbao_token: "{{ lookup('env', 'BAO_TOKEN') | default('', true) }}"
zammad_token_openbao_mount: "secret"
zammad_token_openbao_path: "ai/mcp/zammad"
zammad_url_openbao_key: "ZAMMAD_MCP_URL"
zammad_token_openbao_key: "ZAMMAD_MCP_TOKEN"
# MCP connection URL — the Zammad API base. The MCP server needs /api/v1 IN the
# URL value (nix-ai catalog finding). Reuses the role's own ingress FQDN so it
# can't drift from the host Zammad advertises for links.
zammad_mcp_url: "https://{{ zammad_ui_fqdn }}/api/v1"
