---
- name: Install HAProxy package
  ansible.builtin.apt:
    name: "{{ haproxy_package_name }}"
    state: present
    update_cache: true

- name: Install Nginx packages
  ansible.builtin.apt:
    name: "{{ haproxy_nginx_packages }}"
    state: present

- name: Ensure Nginx streams.d directory exists
  ansible.builtin.file:
    path: /etc/nginx/streams.d
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Backup original HAProxy configuration
  ansible.builtin.copy:
    src: "{{ haproxy_config_file }}"
    dest: "{{ haproxy_config_file }}.backup"
    remote_src: true
    backup: true
    mode: '0644'
  changed_when: false

- name: Deploy HAProxy configuration (TCP syslog and optional HTTP/HTTPS reverse proxy)
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: "{{ haproxy_config_file }}"
    owner: root
    group: root
    mode: '0644'
    backup: true
    validate: haproxy -f %s -c
  notify: Reload haproxy
  no_log: true  # rendered config contains haproxy_stats_password

- name: Deploy Nginx main configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ haproxy_nginx_config_file }}"
    owner: root
    group: root
    mode: '0644'
    backup: true
    validate: nginx -t -c %s
  notify: Restart nginx

- name: Deploy Nginx stream configuration (UDP load balancing)
  ansible.builtin.template:
    src: nginx-stream.conf.j2
    dest: "{{ haproxy_nginx_stream_config_file }}"
    owner: root
    group: root
    mode: '0644'
  notify: Restart nginx

- name: Create HAProxy systemd override directory
  ansible.builtin.file:
    path: /etc/systemd/system/haproxy.service.d
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: "'lxc_containers' in group_names"

- name: Deploy HAProxy LXC systemd override
  ansible.builtin.copy:
    dest: /etc/systemd/system/haproxy.service.d/lxc-override.conf
    content: |
      # HAProxy systemd override for LXC containers
      # BindReadOnlyPaths is not supported in LXC namespaces
      #
      # StartLimitIntervalSec=0: the backends are DNS names, and at container
      # boot the resolver may not answer yet — haproxy then burns the default
      # 5-start budget and stays dead until someone restarts it by hand
      # (post-reboot TCP-ingest outage, 2026-07-08). Unlimited retries at a
      # gentle pace ride out the DNS warm-up instead.
      [Unit]
      StartLimitIntervalSec=0
      [Service]
      BindReadOnlyPaths=
      Restart=on-failure
      RestartSec=5s
    owner: root
    group: root
    mode: '0644'
  when: "'lxc_containers' in group_names"
  notify: Reload haproxy

- name: Create Nginx systemd override directory
  ansible.builtin.file:
    path: /etc/systemd/system/nginx.service.d
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Deploy Nginx restart-on-failure systemd override
  # The Debian nginx.service unit ships no Restart= directive, so a crash of
  # the syslog/NetFlow UDP load balancer leaves it down until a manual
  # converge. A drop-in adds crash recovery without forking the vendor unit.
  ansible.builtin.copy:
    dest: /etc/systemd/system/nginx.service.d/restart-on-failure.conf
    content: |
      # Managed by Ansible (haproxy role) — crash recovery for the Nginx LB.
      [Service]
      Restart=on-failure
      RestartSec={{ haproxy_nginx_restart_sec }}
    owner: root
    group: root
    mode: '0644'
  notify: Restart nginx

- name: Ensure HAProxy socket directory exists
  ansible.builtin.file:
    path: /run/haproxy
    state: directory
    owner: haproxy
    group: haproxy
    mode: '0755'

- name: Apply pending HAProxy/Nginx config reloads before verification
  # Config-deploy tasks above only `notify` the Reload handlers, which by
  # default run at the END of the play — after the verification tasks below.
  # A config change (e.g. a newly added syslog port mapping) would then be
  # unverified: "Start ... service" is a no-op when the service is already
  # active, so the running process still serves the OLD config and the
  # wait_for checks below either pass against stale ports or time out on
  # ports that only exist in the config that hasn't been loaded yet. Flush
  # here so Reload haproxy/Reload nginx run before anything is verified.
  ansible.builtin.meta: flush_handlers

- name: Start HAProxy service
  ansible.builtin.systemd:
    name: "{{ haproxy_service_name }}"
    state: "{{ haproxy_service_state }}"
    enabled: "{{ haproxy_service_enabled }}"
    daemon_reload: true

- name: Start Nginx service
  ansible.builtin.systemd:
    name: "{{ haproxy_nginx_service_name }}"
    state: "{{ haproxy_nginx_service_state }}"
    enabled: "{{ haproxy_nginx_service_enabled }}"
    daemon_reload: true

- name: Verify HAProxy is running
  ansible.builtin.systemd:
    name: "{{ haproxy_service_name }}"
  register: haproxy_status
  changed_when: false
  failed_when: haproxy_status.status.ActiveState != 'active'

- name: Verify Nginx is running
  ansible.builtin.systemd:
    name: "{{ haproxy_nginx_service_name }}"
  register: haproxy_nginx_status
  changed_when: false
  failed_when: haproxy_nginx_status.status.ActiveState != 'active'

- name: Verify HAProxy is listening on TCP ports
  ansible.builtin.wait_for:
    port: "{{ item }}"
    host: 127.0.0.1
    timeout: 10
  loop: "{{ haproxy_listen_ports }}"
  changed_when: false

- name: Verify HAProxy is listening on HTTP/HTTPS ports
  ansible.builtin.wait_for:
    port: "{{ item }}"
    host: 127.0.0.1
    timeout: 10
  loop:
    - "{{ haproxy_http_port }}"
    - "{{ haproxy_https_port }}"
  when: haproxy_http_enabled and (haproxy_http_frontends | length > 0)
  changed_when: false

# Self-heal the reload-inheritance trap: `nginx -s reload` re-execs the master
# with only the sockets in the inherited NGINX env (the HTTP fds), so newly
# added stream `listen … udp` directives are NEVER bound — nginx stays active
# with valid config and zero UDP listeners (observed live on a fresh guest:
# "using inherited sockets from 5;6;"). A full systemd restart starts a clean
# master with no inherited fd set and binds every listen socket. Detect the gap
# and restart only when it exists, so this stays idempotent once bound.
- name: Detect Nginx UDP listeners that failed to bind
  ansible.builtin.shell: |
    set -o pipefail
    missing=0
    for p in {{ haproxy_nginx_udp_ports | join(' ') }}; do
      ss -ulnH "sport = :$p" | grep -q . || missing=$((missing + 1))
    done
    echo "$missing"
  register: haproxy_nginx_udp_missing
  changed_when: false

- name: Restart Nginx to bind UDP listeners when any are missing
  ansible.builtin.systemd:
    name: "{{ haproxy_nginx_service_name }}"
    state: restarted
    daemon_reload: true
  when: (haproxy_nginx_udp_missing.stdout | trim | int) > 0

- name: Verify Nginx is listening on UDP ports
  ansible.builtin.shell: |
    set -o pipefail
    ss -ulnH "sport = :{{ item }}" | grep -q . || exit 1
  loop: "{{ haproxy_nginx_udp_ports }}"
  changed_when: false
  retries: 3
  delay: 2
  register: haproxy_nginx_udp_port_check
  until: haproxy_nginx_udp_port_check.rc == 0
  args:
    executable: /bin/bash
