---
# HAProxy + Nginx Stream Load Balancer role defaults

# Package management
haproxy_package_name: haproxy
haproxy_nginx_packages:
  - nginx
  - libnginx-mod-stream

# Service configuration
haproxy_service_name: haproxy
haproxy_service_state: started
haproxy_service_enabled: true

haproxy_nginx_service_name: nginx
haproxy_nginx_service_state: started
haproxy_nginx_service_enabled: true

# Syslog port mappings: frontend (HAProxy/Nginx) -> backend (Cribl Edge),
# derived from tofu constants syslog_port_map (single source of truth in
# terraform-proxmox locals — no hardcoded ports here). Standard frontends
# (514-518) forward to high backend ports (1514-1518); high-port frontends
# are kept as passthrough for backwards compatibility.
haproxy_syslog_routing: >-
  {{ hostvars['localhost']['tofu_data']['constants']['syslog_port_map'] }}
haproxy_syslog_port_mappings: >-
  {%- set out = [] -%}
  {%- for family, entry in haproxy_syslog_routing | dictsort -%}
  {%- set _ = out.append({'frontend': entry.standard, 'backend': entry.high, 'name': family}) -%}
  {%- endfor -%}
  {%- for family, entry in haproxy_syslog_routing | dictsort -%}
  {%- set _ = out.append({'frontend': entry.high, 'backend': entry.high, 'name': family ~ '_high'}) -%}
  {%- endfor -%}
  {{ out }}

# NetFlow port (unchanged - no standard port equivalent)
haproxy_netflow_port:
  frontend: 2055
  backend: 2055

# Cribl-to-Cribl (S2S) TCP: remote Edge nodes -> HAProxy -> Cribl Stream.
# Same port on both sides; from tofu constants (single source of truth).
haproxy_cribl_s2s_port: >-
  {{ hostvars['localhost']['tofu_data']['constants']['service_ports']['cribl_s2s'] }}

# Backend servers - Cribl Edge LXC containers (syslog traffic)
# IP addresses derived from inventory (NEVER hardcoded)
haproxy_syslog_backend_servers: "{{ groups['cribl_edge'] | default([]) | map('extract', hostvars) | list }}"

# Backend servers - Cribl Stream LXC containers (IPFIX/NetFlow traffic)
haproxy_ipfix_backend_servers: "{{ groups['cribl_stream_group'] | default([]) | map('extract', hostvars) | list }}"

# Legacy variables for backwards compatibility (derived from mappings)
haproxy_listen_ports: >-
  {{ haproxy_syslog_port_mappings | map(attribute='frontend') | list }}
haproxy_nginx_udp_ports: >-
  {{ haproxy_syslog_port_mappings | map(attribute='frontend') | list
     + [haproxy_netflow_port.frontend] }}
haproxy_backend_servers: "{{ haproxy_syslog_backend_servers }}"
haproxy_backends: "{{ haproxy_syslog_backend_servers }}"

# Health check configuration
haproxy_health_check_interval: 5000
haproxy_health_check_timeout: 5000

# Statistics dashboard
haproxy_stats_enabled: true
haproxy_stats_port: 8404
haproxy_stats_user: admin
# NOTE: Use a strong password from Doppler secrets in production
# This default is intentionally weak - override with vault lookup
haproxy_stats_password: "{{ lookup('env', 'HAPROXY_STATS_PASSWORD') }}"

# Load balancing algorithm (used by both HAProxy and Nginx)
haproxy_algorithm: roundrobin

# Configuration files
haproxy_config_file: /etc/haproxy/haproxy.cfg
haproxy_nginx_config_file: /etc/nginx/nginx.conf
haproxy_nginx_stream_config_file: /etc/nginx/streams.d/syslog-lb.conf

# Protocol modes (referenced by all frontends/backends; never inlined)
haproxy_mode_tcp: tcp
haproxy_mode_http: http

# Logging options (mode-specific; pair with the matching mode)
haproxy_log_option_tcp: tcplog
haproxy_log_option_http: httplog

# Global SSL material locations
haproxy_ssl_ca_base: /etc/ssl/certs
haproxy_ssl_crt_base: /etc/ssl/private

# Global timeouts (ms unless suffixed)
haproxy_timeout_connect: 5000
haproxy_timeout_client: 60000
haproxy_timeout_server: 60000
haproxy_stats_timeout: 30s
haproxy_stats_refresh: 10s

# HTTP/HTTPS frontend support (web reverse proxy for Infisical and similar)
haproxy_http_enabled: false
haproxy_http_port: 80
haproxy_https_port: 443
haproxy_http_redirect_code: 301
haproxy_http_forwardfor: true

# Each entry must follow this shape; set in group_vars or inventory:
# - name: infisical
#   server_name: "infisical.{{ tofu_data.domain }}"
#   backend_host: "{{ hostvars['infisical'].container_ip }}"
#   backend_port: "{{ tofu_data.constants.service_ports.infisical_api }}"
#   cert_path: "{{ haproxy_ssl_crt_base }}/infisical.pem"
haproxy_http_frontends: []
