---
galaxy_info:
  author: JacobPEvans
  description: >-
    Full UniFi controller telemetry into Splunk — unpoller (Docker-in-LXC)
    polls the controller API and exposes Prometheus; a Telegraf inputs.prometheus
    scrape ships Splunk-HEC to Cribl Edge -> Splunk unifi_metrics index.
  license: Apache-2.0
  min_ansible_version: "2.15"

  platforms:
    - name: Debian
      versions:
        - bookworm
        - trixie
    - name: Ubuntu
      versions:
        - jammy
        - noble

  galaxy_tags:
    - unifi
    - telegraf
    - unpoller
    - monitoring
    - network
    - docker

dependencies: []
  # community.docker collection is specified in requirements.yml
