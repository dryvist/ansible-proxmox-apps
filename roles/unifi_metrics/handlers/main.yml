---
# unifi_metrics handlers

# state: present + recreate: always so a config-only change (new telegraf.conf
# or compose) triggers a full recreate against the rendered config, not just a
# restart of the existing container with its old config.
- name: Restart unifi_metrics stack
  community.docker.docker_compose_v2:
    project_src: "{{ unifi_metrics_data_dir }}"
    state: present
    recreate: always
