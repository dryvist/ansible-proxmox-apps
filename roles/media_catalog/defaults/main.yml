---
# media_catalog role defaults — rebuild Sonarr/Radarr catalog state from SOPS.
#
# This role owns wanted media membership only. Root folders/download clients come
# from the devopsarr servarr-config tofu module, quality profiles/custom formats
# from configarr, and indexers/app sync from servarr_wiring.

media_catalog_file: "{{ playbook_dir }}/../media_catalog.enc.yaml"
media_catalog_manage_services: true
media_catalog_rescan_after_reconcile: true

media_catalog_sonarr_host: "{{ servarr_wiring_sonarr_host }}"
media_catalog_sonarr_port: "{{ servarr_wiring_sonarr_port }}"
media_catalog_sonarr_api_key: "{{ servarr_wiring_sonarr_api_key }}"

media_catalog_radarr_host: "{{ servarr_wiring_radarr_host }}"
media_catalog_radarr_port: "{{ servarr_wiring_radarr_port }}"
media_catalog_radarr_api_key: "{{ servarr_wiring_radarr_api_key }}"
