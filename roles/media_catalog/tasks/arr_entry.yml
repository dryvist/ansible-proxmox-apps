---
- name: Resolve existing item by stable ID for {{ media_catalog_arr_app_name | title }}
  ansible.builtin.set_fact:
    media_catalog_arr_existing_matches: >-
      {{
        (media_catalog_arr_items_list.json
         | selectattr('tvdbId', 'equalto', media_catalog_arr_item.tvdb_id | default(0) | int)
         | list)
        if media_catalog_arr_app_name == 'sonarr'
        else
        ((media_catalog_arr_items_list.json
          | selectattr('tmdbId', 'equalto', media_catalog_arr_item.tmdb_id | default(0) | int)
          | list)
         if media_catalog_arr_item.tmdb_id is defined
         else
         (media_catalog_arr_items_list.json
          | selectattr('imdbId', 'equalto', media_catalog_arr_item.imdb_id) | list))
      }}
    media_catalog_arr_profile_id: >-
      {{
        (media_catalog_arr_profiles.json
         | selectattr('name', 'equalto', media_catalog_arr_item.quality_profile)
         | map(attribute='id') | list + [0]) | first
      }}
    media_catalog_arr_tag_ids: >-
      {{
        media_catalog_arr_tags.json
        | selectattr('label', 'in', media_catalog_arr_item.tags)
        | map(attribute='id') | list
      }}

- name: Select existing item match for {{ media_catalog_arr_app_name | title }}
  ansible.builtin.set_fact:
    media_catalog_arr_existing: "{{ (media_catalog_arr_existing_matches + [{}]) | first }}"

- name: Assert quality profile exists for {{ media_catalog_arr_app_name | title }}
  ansible.builtin.assert:
    that:
      - media_catalog_arr_profile_id | int > 0
    fail_msg: >-
      {{ media_catalog_arr_app_name | title }} quality profile
      '{{ media_catalog_arr_item.quality_profile }}' was not found.
    quiet: true

- name: Look up item by stable ID for {{ media_catalog_arr_app_name | title }}
  ansible.builtin.uri:
    url: >-
      http://{{ media_catalog_arr_host }}:{{ media_catalog_arr_port
      }}/api/v3/{{ media_catalog_arr_type }}/lookup?term={{
        'tvdb:' ~ media_catalog_arr_item.tvdb_id if media_catalog_arr_app_name == 'sonarr'
        else 'tmdb:' ~ media_catalog_arr_item.tmdb_id if media_catalog_arr_item.tmdb_id is defined
        else 'imdb:' ~ media_catalog_arr_item.imdb_id
      }}
    method: GET
    headers:
      X-Api-Key: "{{ media_catalog_arr_api_key }}"
    status_code: 200
  register: media_catalog_arr_lookup
  changed_when: false
  when: media_catalog_arr_existing == {}

- name: Assert lookup found the stable ID for {{ media_catalog_arr_app_name | title }}
  ansible.builtin.assert:
    that:
      - media_catalog_arr_lookup.json | length > 0
    fail_msg: >-
      {{ media_catalog_arr_app_name | title }} lookup found no item for
      {{ media_catalog_arr_item.tvdb_id | default(media_catalog_arr_item.tmdb_id | default('')) }}.
    quiet: true
  when: media_catalog_arr_existing == {}

- name: Define payload dictionary for add/update for {{ media_catalog_arr_app_name | title }}
  ansible.builtin.set_fact:
    media_catalog_arr_payload_diff: >-
      {{
        {
          'qualityProfileId': media_catalog_arr_profile_id | int,
          'rootFolderPath': media_catalog_arr_item.root_folder,
          'monitored': media_catalog_arr_item.monitored | bool,
          'tags': media_catalog_arr_tag_ids
        }
        | combine({'seasonFolder': media_catalog_arr_item.season_folder | default(true) | bool}
          if media_catalog_arr_app_name == 'sonarr' else {})
        | combine({'minimumAvailability': (
            media_catalog_arr_item.minimum_availability
            | default(media_catalog_arr_existing.minimumAvailability | default('released'))
          )} if media_catalog_arr_app_name == 'radarr' else {})
      }}

- name: Add missing catalog item for {{ media_catalog_arr_app_name | title }}
  ansible.builtin.uri:
    url: "http://{{ media_catalog_arr_host }}:{{ media_catalog_arr_port }}/api/v3/{{ media_catalog_arr_type }}"
    method: POST
    headers:
      X-Api-Key: "{{ media_catalog_arr_api_key }}"
    body_format: json
    body: >-
      {{
        (media_catalog_arr_lookup.json | first)
        | combine(media_catalog_arr_payload_diff, recursive=True)
        | combine({'addOptions': {
            'monitor': media_catalog_arr_item.season_policy,
            'searchForMissingEpisodes': media_catalog_arr_item.search_missing_after_add | bool
          }} if media_catalog_arr_app_name == 'sonarr' else {'addOptions': {
            'searchForMovie': media_catalog_arr_item.search_missing_after_add | bool
          }}, recursive=True)
      }}
    status_code: [200, 201]
  register: media_catalog_arr_add
  changed_when: media_catalog_arr_add.status in [200, 201]
  when: media_catalog_arr_existing == {}

- name: Reconcile existing catalog item for {{ media_catalog_arr_app_name | title }}
  ansible.builtin.uri:
    url: >-
      http://{{ media_catalog_arr_host }}:{{ media_catalog_arr_port
      }}/api/v3/{{ media_catalog_arr_type }}/{{ media_catalog_arr_existing.id }}
    method: PUT
    headers:
      X-Api-Key: "{{ media_catalog_arr_api_key }}"
    body_format: json
    body: "{{ media_catalog_arr_existing | combine(media_catalog_arr_payload_diff, recursive=True) }}"
    status_code: [200, 202]
  register: media_catalog_arr_update
  changed_when: >-
    media_catalog_arr_existing.qualityProfileId | int != media_catalog_arr_profile_id | int
    or media_catalog_arr_existing.monitored | bool != media_catalog_arr_item.monitored | bool
    or (media_catalog_arr_app_name == 'sonarr'
        and media_catalog_arr_existing.seasonFolder | bool
        != (media_catalog_arr_item.season_folder | default(true) | bool))
    or (media_catalog_arr_app_name == 'radarr'
        and media_catalog_arr_existing.minimumAvailability
        != (media_catalog_arr_item.minimum_availability
            | default(media_catalog_arr_existing.minimumAvailability | default('released'))))
    or (media_catalog_arr_existing.tags | default([]) | sort) != (media_catalog_arr_tag_ids | default([]) | sort)
  when: media_catalog_arr_existing != {}

- name: Resolve reconciled item ID for {{ media_catalog_arr_app_name | title }}
  ansible.builtin.set_fact:
    media_catalog_arr_reconciled_id: >-
      {{ media_catalog_arr_add.json.id | default(media_catalog_arr_existing.id) }}

- name: Trigger rescan for the reconciled item for {{ media_catalog_arr_app_name | title }}
  ansible.builtin.uri:
    url: "http://{{ media_catalog_arr_host }}:{{ media_catalog_arr_port }}/api/v3/command"
    method: POST
    headers:
      X-Api-Key: "{{ media_catalog_arr_api_key }}"
    body_format: json
    body:
      name: "{{ 'RescanSeries' if media_catalog_arr_app_name == 'sonarr' else 'RescanMovie' }}"
      "{{ 'seriesId' if media_catalog_arr_app_name == 'sonarr' else 'movieId' }}": >-
        {{ media_catalog_arr_reconciled_id | int }}
    status_code: [200, 201]
  changed_when: true
  when:
    - media_catalog_rescan_after_reconcile | bool
    - (media_catalog_arr_add is changed) or (media_catalog_arr_update is changed)
