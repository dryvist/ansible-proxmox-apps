---
- name: Resolve existing Sonarr series by TVDB ID
  ansible.builtin.set_fact:
    media_catalog_sonarr_existing: >-
      {{
        (media_catalog_sonarr_series.json
         | selectattr('tvdbId', 'equalto', media_catalog_sonarr_item.tvdb_id | int)
         | list + [{}]) | first
      }}
    media_catalog_sonarr_profile_id: >-
      {{
        (media_catalog_sonarr_profiles.json
         | selectattr('name', 'equalto', media_catalog_sonarr_item.quality_profile)
         | map(attribute='id') | list + [0]) | first
      }}
    media_catalog_sonarr_tag_ids: >-
      {{
        media_catalog_sonarr_tags.json
        | selectattr('label', 'in', media_catalog_sonarr_item.tags)
        | map(attribute='id') | list
      }}

- name: Assert Sonarr quality profile exists
  ansible.builtin.assert:
    that:
      - media_catalog_sonarr_profile_id | int > 0
    fail_msg: >-
      Sonarr quality profile '{{ media_catalog_sonarr_item.quality_profile }}'
      was not found. Configarr must run before media_catalog.
    quiet: true

- name: Look up Sonarr series by TVDB ID
  ansible.builtin.uri:
    url: >-
      http://{{ media_catalog_sonarr_host }}:{{ media_catalog_sonarr_port
      }}/api/v3/series/lookup?term=tvdb:{{ media_catalog_sonarr_item.tvdb_id }}
    method: GET
    headers:
      X-Api-Key: "{{ media_catalog_sonarr_api_key }}"
    status_code: 200
  register: media_catalog_sonarr_lookup
  changed_when: false
  when: media_catalog_sonarr_existing == {}

- name: Assert Sonarr lookup found the TVDB ID
  ansible.builtin.assert:
    that:
      - media_catalog_sonarr_lookup.json | length > 0
    fail_msg: "Sonarr lookup found no series for TVDB ID {{ media_catalog_sonarr_item.tvdb_id }}."
    quiet: true
  when: media_catalog_sonarr_existing == {}

- name: Add missing Sonarr catalog series
  ansible.builtin.uri:
    url: "http://{{ media_catalog_sonarr_host }}:{{ media_catalog_sonarr_port }}/api/v3/series"
    method: POST
    headers:
      X-Api-Key: "{{ media_catalog_sonarr_api_key }}"
    body_format: json
    body: >-
      {{
        (media_catalog_sonarr_lookup.json | first)
        | combine({
          'qualityProfileId': media_catalog_sonarr_profile_id | int,
          'rootFolderPath': media_catalog_sonarr_item.root_folder,
          'monitored': media_catalog_sonarr_item.monitored | bool,
          'seasonFolder': media_catalog_sonarr_item.season_folder | default(true) | bool,
          'tags': media_catalog_sonarr_tag_ids,
          'addOptions': {
            'monitor': media_catalog_sonarr_item.season_policy,
            'searchForMissingEpisodes': media_catalog_sonarr_item.search_missing_after_add | bool
          }
        }, recursive=True)
      }}
    status_code: [200, 201]
  register: media_catalog_sonarr_add
  changed_when: media_catalog_sonarr_add.status in [200, 201]
  when: media_catalog_sonarr_existing == {}

- name: Reconcile existing Sonarr catalog series
  ansible.builtin.uri:
    url: >-
      http://{{ media_catalog_sonarr_host }}:{{ media_catalog_sonarr_port
      }}/api/v3/series/{{ media_catalog_sonarr_existing.id }}
    method: PUT
    headers:
      X-Api-Key: "{{ media_catalog_sonarr_api_key }}"
    body_format: json
    body: >-
      {{
        media_catalog_sonarr_existing
        | combine({
          'qualityProfileId': media_catalog_sonarr_profile_id | int,
          'rootFolderPath': media_catalog_sonarr_item.root_folder,
          'monitored': media_catalog_sonarr_item.monitored | bool,
          'seasonFolder': media_catalog_sonarr_item.season_folder | default(true) | bool,
          'tags': media_catalog_sonarr_tag_ids
        }, recursive=True)
      }}
    status_code: [200, 202]
  register: media_catalog_sonarr_update
  changed_when: false
  when: media_catalog_sonarr_existing != {}

- name: Resolve reconciled Sonarr series ID
  ansible.builtin.set_fact:
    media_catalog_sonarr_reconciled_id: >-
      {{
        media_catalog_sonarr_add.json.id
        | default(media_catalog_sonarr_existing.id)
      }}

- name: Trigger Sonarr rescan for the reconciled series
  ansible.builtin.uri:
    url: "http://{{ media_catalog_sonarr_host }}:{{ media_catalog_sonarr_port }}/api/v3/command"
    method: POST
    headers:
      X-Api-Key: "{{ media_catalog_sonarr_api_key }}"
    body_format: json
    body:
      name: RescanSeries
      seriesId: "{{ media_catalog_sonarr_reconciled_id | int }}"
    status_code: [200, 201]
  changed_when: true
  when: media_catalog_rescan_after_reconcile | bool
