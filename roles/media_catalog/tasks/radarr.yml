---
- name: Fetch Radarr quality profiles
  ansible.builtin.uri:
    url: "http://{{ media_catalog_radarr_host }}:{{ media_catalog_radarr_port }}/api/v3/qualityprofile"
    method: GET
    headers:
      X-Api-Key: "{{ media_catalog_radarr_api_key }}"
    status_code: 200
  register: media_catalog_radarr_profiles
  changed_when: false

- name: Fetch Radarr tags
  ansible.builtin.uri:
    url: "http://{{ media_catalog_radarr_host }}:{{ media_catalog_radarr_port }}/api/v3/tag"
    method: GET
    headers:
      X-Api-Key: "{{ media_catalog_radarr_api_key }}"
    status_code: 200
  register: media_catalog_radarr_tags
  changed_when: false

- name: Build desired Radarr tag list
  ansible.builtin.set_fact:
    media_catalog_radarr_tag_names: "{{ media_catalog_radarr | map(attribute='tags') | flatten | unique | list }}"

- name: Create missing Radarr tags
  ansible.builtin.uri:
    url: "http://{{ media_catalog_radarr_host }}:{{ media_catalog_radarr_port }}/api/v3/tag"
    method: POST
    headers:
      X-Api-Key: "{{ media_catalog_radarr_api_key }}"
    body_format: json
    body:
      label: "{{ item }}"
    status_code: [200, 201]
  loop: "{{ media_catalog_radarr_tag_names }}"
  when: item not in (media_catalog_radarr_tags.json | map(attribute='label') | list)
  changed_when: true

- name: Re-read Radarr tags after reconciliation
  ansible.builtin.uri:
    url: "http://{{ media_catalog_radarr_host }}:{{ media_catalog_radarr_port }}/api/v3/tag"
    method: GET
    headers:
      X-Api-Key: "{{ media_catalog_radarr_api_key }}"
    status_code: 200
  register: media_catalog_radarr_tags
  changed_when: false

- name: Fetch Radarr movie catalog
  ansible.builtin.uri:
    url: "http://{{ media_catalog_radarr_host }}:{{ media_catalog_radarr_port }}/api/v3/movie"
    method: GET
    headers:
      X-Api-Key: "{{ media_catalog_radarr_api_key }}"
    status_code: 200
  register: media_catalog_radarr_movies
  changed_when: false

- name: Reconcile each Radarr movie
  ansible.builtin.include_tasks: radarr_entry.yml
  loop: "{{ media_catalog_radarr }}"
  loop_control:
    loop_var: media_catalog_radarr_item
    label: >-
      {{ media_catalog_radarr_item.tmdb_id | default(media_catalog_radarr_item.imdb_id) }}
      {{ media_catalog_radarr_item.title }}
