---
galaxy_info:
  author: JacobPEvans
  description: >-
    Shared Docker-in-LXC bootstrap — install Docker CE + the compose plugin,
    the ZFS-backed-LXC fuse-overlayfs storage driver, and an optional Python
    venv for the community.docker Ansible modules. Consumed as a meta
    dependency by the *_docker app roles.
  license: Apache-2.0
  min_ansible_version: "2.15"

  platforms:
    - name: Debian
      versions:
        - bookworm
        - trixie
    - name: Ubuntu
      versions:
        - jammy
        - noble

  galaxy_tags:
    - docker
    - lxc
    - bootstrap

dependencies: []
  # community.docker collection is specified in requirements.yml
