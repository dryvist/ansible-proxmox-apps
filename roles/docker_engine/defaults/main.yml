---
# Install a Python venv (/opt/ansible-venv) with the docker SDK. Default off:
# community.docker.docker_compose_v2 shells out to the `docker compose` CLI and
# does NOT need the SDK. Enable only for roles that use the SDK-based modules
# (docker_container/_exec/_info, docker_image, docker_swarm/_stack, docker_prune).
docker_engine_manage_venv: false

# When true (and the venv is managed), set ansible_python_interpreter to the venv
# globally for the rest of the play. Leave false to scope the venv interpreter
# per task so the role's own apt/dbus tasks keep the system interpreter.
docker_engine_set_global_interpreter: false

# Install fuse-overlayfs (LXC-conditional). Required for Docker on ZFS-backed
# LXC; disable for roles that run Docker where the host storage driver is fine.
docker_engine_install_fuse_overlayfs: true

# When true, write /etc/docker/daemon.json to pin the storage driver. Leave
# false to use Docker's auto-selected driver.
docker_engine_configure_daemon_json: false

# Storage driver written to /etc/docker/daemon.json when
# docker_engine_configure_daemon_json is true. fuse-overlayfs is required for
# Docker on ZFS-backed LXC; molecule scenarios override this with vfs.
docker_engine_storage_driver: fuse-overlayfs

# Extra pip packages installed into the venv alongside the docker SDK (only when
# docker_engine_manage_venv is true). Roles whose SDK modules need more than the
# docker SDK add them here, e.g. jsondiff for docker_stack/docker_swarm change
# detection, or packaging for docker_compose_v2 version comparison.
docker_engine_venv_extra_packages: []
