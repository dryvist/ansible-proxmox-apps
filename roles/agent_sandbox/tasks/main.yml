---
# Agent sandbox egress boundary: internal docker network + allowlisting
# CONNECT proxy on the docker-host VM. Agent containers are NOT managed here —
# dryvist/nix-agent-sandbox's `agent run --host` spawns them ad hoc.

# The nix-agent-sandbox launcher spawns containers over DOCKER_HOST=ssh://
# as this user, which needs direct daemon access (no sudo in that path).
- name: Grant the launcher SSH user docker daemon access
  ansible.builtin.user:
    name: "{{ agent_sandbox_operator_user }}"
    groups: docker
    append: true

- name: Create agent sandbox directory
  ansible.builtin.file:
    path: "{{ agent_sandbox_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy squid configuration
  ansible.builtin.template:
    src: squid.conf.j2
    dest: "{{ agent_sandbox_dir }}/squid.conf"
    owner: root
    group: root
    mode: "0644"
  notify: Restart agent sandbox proxy

- name: Deploy egress domain allowlist
  ansible.builtin.template:
    src: allowed-domains.txt.j2
    dest: "{{ agent_sandbox_dir }}/allowed-domains.txt"
    owner: root
    group: root
    mode: "0644"
  notify: Restart agent sandbox proxy

# --- Transcript spool + Cribl Edge (Phase D) --------------------------------
# The launcher (nix-agent-sandbox `agent run --host`) creates the per-run leaves
# with a throwaway uid-1000 container, which needs this root to already exist
# world-writable (1777). The Cribl Edge below tails the tree read-only.
- name: Create agent transcript spool root
  ansible.builtin.file:
    path: "{{ agent_sandbox_spool_dir }}"
    state: directory
    owner: root
    group: root
    mode: "1777"

- name: Create Cribl Edge config directory
  ansible.builtin.file:
    path: "{{ agent_sandbox_cribl_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy Cribl Edge inputs configuration
  ansible.builtin.template:
    src: cribl/inputs.yml.j2
    dest: "{{ agent_sandbox_cribl_config_dir }}/inputs.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart agent sandbox proxy

- name: Deploy Cribl Edge outputs configuration
  ansible.builtin.template:
    src: cribl/outputs.yml.j2
    dest: "{{ agent_sandbox_cribl_config_dir }}/outputs.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart agent sandbox proxy

- name: Deploy Cribl Edge event breaker
  ansible.builtin.template:
    src: cribl/breakers.yml.j2
    dest: "{{ agent_sandbox_cribl_config_dir }}/breakers.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart agent sandbox proxy

# Worker-level pack pipelines, taken verbatim from the released pack .crbls.
# Fetched on the controller (unrestricted egress) then extracted onto the host —
# the same controller-stage pattern as the cribl_packs role, since docker-host
# has no guaranteed path to github.com.
- name: Create Cribl Edge pipeline directories
  ansible.builtin.file:
    path: "{{ agent_sandbox_cribl_config_dir }}/pipelines/{{ item.pipeline }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: "{{ agent_sandbox_cribl_packs }}"
  loop_control:
    label: "{{ item.pipeline }}"

- name: Fetch transcript pack .crbl to controller
  ansible.builtin.get_url:
    url: >-
      https://github.com/{{ item.repo }}/releases/download/{{
      item.version }}/{{ item.name }}-{{ item.version }}.crbl
    dest: "/tmp/agent-sandbox-{{ item.name }}-{{ item.version }}.crbl"
    mode: "0644"
  loop: "{{ agent_sandbox_cribl_packs }}"
  loop_control:
    label: "{{ item.name }} {{ item.version }}"
  delegate_to: localhost
  connection: local
  become: false
  vars:
    ansible_become: false

# Extract only the one pipeline conf each pack contributes; --strip-components=3
# drops the `default/pipelines/<pipeline>/` prefix so conf.yml lands directly in
# the pipeline dir the container bind-mounts.
- name: Install pack pipeline conf as a worker-level pipeline
  ansible.builtin.unarchive:
    src: "/tmp/agent-sandbox-{{ item.name }}-{{ item.version }}.crbl"
    dest: "{{ agent_sandbox_cribl_config_dir }}/pipelines/{{ item.pipeline }}"
    remote_src: false
    include:
      - "default/pipelines/{{ item.pipeline }}/conf.yml"
    extra_opts:
      - "--strip-components=3"
    owner: root
    group: root
  loop: "{{ agent_sandbox_cribl_packs }}"
  loop_control:
    label: "{{ item.name }} -> {{ item.pipeline }}"
  notify: Restart agent sandbox proxy

- name: Remove pack staging files from controller
  ansible.builtin.file:
    path: "/tmp/agent-sandbox-{{ item.name }}-{{ item.version }}.crbl"
    state: absent
  loop: "{{ agent_sandbox_cribl_packs }}"
  loop_control:
    label: "{{ item.name }}"
  delegate_to: localhost
  connection: local
  become: false
  vars:
    ansible_become: false

- name: Deploy agent sandbox docker-compose template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ agent_sandbox_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart agent sandbox proxy

- name: Deploy agent sandbox networks and proxy via docker compose
  community.docker.docker_compose_v2:
    project_src: "{{ agent_sandbox_dir }}"
    state: present

- name: Flush handlers so the proxy restarts before validation
  ansible.builtin.meta: flush_handlers

- name: Validate squid parses the deployed configuration
  community.docker.docker_container_exec:
    container: "{{ agent_sandbox_proxy_container }}"
    command: squid -k parse
  changed_when: false

# Functional probes from INSIDE the internal network — the same path agent
# containers use. Allow = an origin HTTP status comes back through the CONNECT
# tunnel ('000' means no tunnel); deny = curl fails on the proxy's refusal.
- name: Probe an allowlisted domain through the proxy
  ansible.builtin.command:
    cmd: >-
      docker run --rm --network {{ agent_sandbox_network }}
      {{ agent_sandbox_probe_image }}
      -sS -o /dev/null -w '%{http_code}' --max-time 20
      -x http://{{ agent_sandbox_proxy_alias }}:{{ agent_sandbox_proxy_port }}
      https://api.anthropic.com
  register: agent_sandbox_allow_probe
  changed_when: false
  failed_when: agent_sandbox_allow_probe.rc != 0 or agent_sandbox_allow_probe.stdout == '000'

- name: Probe a non-allowlisted domain through the proxy (expect denial)
  ansible.builtin.command:
    cmd: >-
      docker run --rm --network {{ agent_sandbox_network }}
      {{ agent_sandbox_probe_image }}
      -sS -o /dev/null --max-time 20
      -x http://{{ agent_sandbox_proxy_alias }}:{{ agent_sandbox_proxy_port }}
      https://example.com
  register: agent_sandbox_deny_probe
  changed_when: false
  failed_when: agent_sandbox_deny_probe.rc == 0

# --- Spool retention (Phase D) ----------------------------------------------
# Each <run-id> dir is a self-contained run; a daily timer drops whole runs
# past the retention window. Cheap `find -mtime` prune, no state to track.
- name: Deploy transcript spool prune service
  ansible.builtin.template:
    src: spool-prune.service.j2
    dest: /etc/systemd/system/agent-sandbox-spool-prune.service
    owner: root
    group: root
    mode: "0644"

- name: Deploy transcript spool prune timer
  ansible.builtin.template:
    src: spool-prune.timer.j2
    dest: /etc/systemd/system/agent-sandbox-spool-prune.timer
    owner: root
    group: root
    mode: "0644"

- name: Enable transcript spool prune timer
  ansible.builtin.systemd:
    name: agent-sandbox-spool-prune.timer
    state: started
    enabled: true
    daemon_reload: true
