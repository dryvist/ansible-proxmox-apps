---
# Forward this host's logs (the systemd journal + everything rsyslog ingests) to
# the central syslog pipeline: HAProxy syslog VIP -> Cribl Edge -> Splunk (os
# index). rsyslog reads the journal by default on Debian, so installing it and
# adding one forward rule captures host logs plus every systemd service (and
# Docker containers whose compose log-driver is journald).
#
# No literals: the port comes from the tofu constants and the target from the
# stable `syslog` CNAME (-> haproxy). See .claude/rules/ip-addressing.md.

# Stable syslog entry point: the `syslog` CNAME the technitium_dns role creates
# (-> the HAProxy VIP). Sized off PROXMOX_SUBDOMAIN, never a committed literal.
syslog_forwarder_target_host: "syslog.{{ lookup('env', 'PROXMOX_SUBDOMAIN') }}"

# Linux syslog port from tofu pipeline_constants (routes to the Splunk os index).
syslog_forwarder_target_port: "{{ tofu_data.constants.syslog_ports.linux }}"

# tcp (omfwd protocol=tcp) is reliable; udp drops under load. Cribl accepts both.
syslog_forwarder_protocol: tcp

# Drop-in rsyslog config file owned by this role.
syslog_forwarder_config_path: /etc/rsyslog.d/10-forward-cribl.conf

# Disk-assisted action queue: buffer through a HAProxy/Cribl outage instead of
# dropping logs (capped so a long outage can't fill the root filesystem).
syslog_forwarder_queue_max_disk_space: 256m

# Optional per-program routes rendered ABOVE the catch-all rule: logs whose
# $programname matches go to the SAME syslog target but on a family-specific
# port (then `stop`, so they never also hit the catch-all). Lets one guest
# split a service's logs into its own syslog family (e.g. traefik -> the
# proxy family port) while everything else keeps flowing to the linux/os port.
# Format: [{program: <rsyslog $programname>, port: <target port>}]. Ports come
# from tofu constants (syslog_port_map / ai_log_routing), never literals.
syslog_forwarder_program_routes: []

# Optional imfile inputs: tail a service's own log FILE into rsyslog for apps
# that only log to a file (no journald/console path), so those lines still ride
# the catch-all forward to Cribl/Splunk. Each input's `tag` becomes the
# $programname on the emitted messages (so a program route above can also split
# it onto a family port). Empty by default — set per group_vars for guests with
# a file-only logger (e.g. qbittorrent-nox).
# Format: [{file: <abs path>, tag: <programname>}].
syslog_forwarder_imfile_inputs: []

# Debian's rsyslog package default (matches the base /etc/rsyslog.conf
# $WorkDirectory). The config-validate step checks the rendered drop-in
# standalone, so imfile's own working-dir requirement isn't satisfied by the
# base file's directive already being in scope — restating it here is required,
# not redundant.
syslog_forwarder_imfile_work_directory: /var/spool/rsyslog
