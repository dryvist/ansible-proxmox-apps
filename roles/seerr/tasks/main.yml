---
# =============================================================================
# One-time rename migration (jellyseerr -> seerr)
# =============================================================================
# Runs before the new /opt/seerr path is created so the live settings.json + db
# survive the rename. seerr_config_dir is nested under seerr_data_dir, so moving
# the parent dir carries the config along with it. Idempotent: the mv `creates`
# guard plus the `when` stat make this a no-op once the new path exists.

- name: Check whether the pre-rename data dir exists
  ansible.builtin.stat:
    path: /opt/jellyseerr
  register: seerr_old_data_dir

- name: Migrate the pre-rename data dir to {{ seerr_data_dir }}
  ansible.builtin.command:
    cmd: "mv /opt/jellyseerr {{ seerr_data_dir }}"
    creates: "{{ seerr_data_dir }}"
  when: seerr_old_data_dir.stat.exists

# =============================================================================
# Preflight: deterministic API key must be present
# =============================================================================

- name: Assert Seerr API key is set
  ansible.builtin.assert:
    that:
      - seerr_api_key | length > 0
    fail_msg: >-
      SEERR_API_KEY is not set. Generate a 32-char hex key
      (openssl rand -hex 16), add it to SOPS (secrets.enc.yaml), and run under
      `sops exec-env`. The key is templated into settings.json so it is known
      to downstream tooling, not auto-generated.
    quiet: true

# Docker itself is installed by the docker_engine meta dependency (see
# meta/main.yml). No daemon.json and no venv: seerr deploys via
# docker_compose_v2, which uses the docker compose CLI (not the docker SDK).

# =============================================================================
# Data directories + config
# =============================================================================

# Seerr runs as the node user (UID 1000), so the config dir it reads/writes must
# be owned by 1000 (Jellyseerr ran as root; the live migration chowned it).
- name: Create Seerr data + config directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"
  loop:
    - "{{ seerr_data_dir }}"
    - "{{ seerr_config_dir }}"

# ---------------------------------------------------------------------------
# Persistence guard — refuse to start Seerr on a non-persistent config dir
# ---------------------------------------------------------------------------
# seerr_config_dir is bind-mounted to the container's /app/config and holds
# settings.json (the deterministic API key + all request/registration state).
# Without a persistent mount there, a container rebuild silently resets Seerr
# to a fresh install (lost requests, re-registration needed) — so fail the
# converge instead of starting fresh silently.
- name: Check whether the Seerr config dir is on a persistent mount
  ansible.builtin.command:
    cmd: mountpoint -q {{ seerr_config_dir }}
  register: seerr_config_mountpoint
  changed_when: false
  failed_when: false
  when: seerr_manage_services | bool

- name: Alert ntfy when the Seerr config dir is NOT persistent
  ansible.builtin.uri:
    url: "{{ seerr_ntfy_url }}"
    method: POST
    headers:
      Title: "seerr persistence guard"
      Priority: urgent
      Tags: rotating_light
    body_format: raw
    body: >-
      {{ seerr_config_dir }} on {{ inventory_hostname }} is NOT a persistent
      mount. Refusing to start Seerr before the mount is fixed.
  failed_when: false
  when:
    - seerr_manage_services | bool
    - seerr_config_mountpoint.rc | default(0) != 0

- name: Fail when the Seerr config dir is NOT persistent
  ansible.builtin.fail:
    msg: >-
      {{ seerr_config_dir }} is NOT a persistent mount. Seerr's settings and
      request history are on the disposable LXC rootfs and would be LOST on
      the next container rebuild. Bind-mount a persistent dataset onto
      {{ seerr_config_dir }}, then re-run this converge.
  when:
    - seerr_manage_services | bool
    - seerr_config_mountpoint.rc | default(0) != 0

# One-time seed: set ONLY the deterministic main.apiKey, then leave the file to
# Seerr (it rewrites settings.json at runtime). Guard on the file not yet
# existing instead of `template force: false`: some ansible-core versions, with
# force:false, both skip applying `mode` on creation (leaving the API-key file
# world-readable at 0644) AND re-touch the mode on every converge (breaking
# idempotence). A normal templated create under a not-exists guard applies 0640
# correctly and runs exactly once.
- name: Check whether the Seerr settings seed already exists
  ansible.builtin.stat:
    path: "{{ seerr_config_dir }}/settings.json"
  register: seerr_settings_seed_stat

- name: Seed settings.json with the deterministic API key (one-time)
  ansible.builtin.template:
    src: settings.json.j2
    dest: "{{ seerr_config_dir }}/settings.json"
    owner: "1000"
    group: "1000"
    mode: "0640"
  when: not seerr_settings_seed_stat.stat.exists
  no_log: true

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ seerr_data_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart seerr

# =============================================================================
# Deploy via Docker Compose (live only)
# =============================================================================

- name: Deploy Seerr container via docker compose
  community.docker.docker_compose_v2:
    project_src: "{{ seerr_data_dir }}"
    state: present
    pull: always
  when: seerr_manage_services | bool

# =============================================================================
# Health check + service registration (live only)
# =============================================================================

- name: Wait for Seerr web port to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ seerr_web_port }}"
    timeout: 120
  when: seerr_manage_services | bool

- name: Verify Seerr HTTP endpoint responds
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ seerr_web_port }}/api/v1/status"
    method: GET
    status_code: 200
  register: seerr_status
  retries: 20
  delay: 10
  until: seerr_status.status == 200
  changed_when: false
  when: seerr_manage_services | bool

- name: Register Sonarr / Radarr / Plex via the Seerr settings API
  ansible.builtin.import_tasks: register.yml
  when:
    - seerr_manage_services | bool
    - seerr_register_services | bool
