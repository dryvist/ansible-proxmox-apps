---
# seerr role defaults — Seerr request UI (Docker in LXC 214).
#
# Docker-in-LXC, mirrors the idrac_kvm_docker role pattern: install Docker,
# run a single container via Compose, persist config to a host dir. Seerr
# is config-only (no /tank bind-mounts); it reaches Sonarr/Radarr/Plex over the
# LAN. The web UI port comes from terraform constants (no hardcoded port).
# Seerr is the maintained successor to Jellyseerr/Overseerr (those two projects
# merged into Seerr in Feb 2026; Jellyseerr is deprecated and no longer updated).
# Pinned to a tag so it's reproducible AND Renovate can bump it. Seerr runs as the
# node user (UID 1000) and auto-migrates an existing Jellyseerr config on first start.
seerr_image: "ghcr.io/seerr-team/seerr:v3.3.0"
seerr_container_name: seerr
seerr_data_dir: /opt/seerr
# Host dir bind-mounted to the container's /app/config (settings.json, db).
seerr_config_dir: "{{ seerr_data_dir }}/config"
seerr_bind_address: "0.0.0.0"
seerr_tz: "UTC"
seerr_log_level: "info"
# Web UI / API port from terraform constants (media_ports.seerr_web = 5055).
seerr_web_port: "{{ terraform_data.constants.media_ports.seerr_web }}"

# --- Deterministic API key ---------------------------------------------------
# Templated into settings.json (main.apiKey) BEFORE first start so the value is
# known to downstream wiring, not auto-generated. Sourced from SOPS env
# (SEERR_API_KEY) — never committed. Empty => the role asserts and fails.
seerr_api_key: "{{ lookup('env', 'SEERR_API_KEY') | default('', true) }}"

# --- Service registration (Sonarr / Radarr / Plex) ---------------------------
# Seerr registers Sonarr + Radarr + Plex via its settings API after the
# container is healthy. Hosts/keys are derived from inventory + SOPS; ports come
# from terraform constants. These default to the media-stack LXC hostnames so
# nothing is hardcoded — override per environment if names differ.
seerr_register_services: true

# Sonarr target (LAN-only PVR LXC 211).
seerr_sonarr_hostname: >-
  {{ hostvars['sonarr'].container_ip | default('sonarr') }}
seerr_sonarr_port: "{{ terraform_data.constants.media_ports.sonarr_web }}"
seerr_sonarr_api_key: "{{ lookup('env', 'SONARR_API_KEY') | default('', true) }}"
seerr_sonarr_use_ssl: false

# Radarr target (LAN-only PVR LXC 212).
seerr_radarr_hostname: >-
  {{ hostvars['radarr'].container_ip | default('radarr') }}
seerr_radarr_port: "{{ terraform_data.constants.media_ports.radarr_web }}"
seerr_radarr_api_key: "{{ lookup('env', 'RADARR_API_KEY') | default('', true) }}"
seerr_radarr_use_ssl: false

# Root folders inside the *arr LXCs. movies + shows are separate ZFS datasets
# mounted under /mnt/media (Sonarr -> shows, Radarr -> movies).
seerr_sonarr_root_folder: "/mnt/media/shows"
seerr_radarr_root_folder: "/mnt/media/movies"

# Plex registration needs an ACCOUNT-scoped Plex token (X-Plex-Token). Rather than
# requiring it by hand, the role DISCOVERS it from the Plex server's
# Preferences.xml (the `PlexOnlineToken` present once the server is claimed —
# https://www.plexopedia.com/plex-media-server/general/plex-token/). PLEX_TOKEN is
# only an optional override. When neither is available (server not claimed),
# registration is SKIPPED and surfaced as a manual step (see role README).
seerr_plex_token: "{{ lookup('env', 'PLEX_TOKEN') | default('', true) }}"
# Where to read PlexOnlineToken from, and on which inventory host (the plex LXC).
seerr_plex_inventory_host: plex
seerr_plex_preferences_path: >-
  /var/lib/plexmediaserver/Library/Application Support/Plex Media Server/Preferences.xml
seerr_plex_hostname: >-
  {{ hostvars['plex'].container_ip | default('plex') }}
seerr_plex_port: "{{ terraform_data.constants.media_ports.plex_web }}"
seerr_plex_use_ssl: false

# When true (default), the play FAILS if a Plex token is available but Seerr
# still has no owner after sign-in (registration could not complete) — surfacing a
# broken setup instead of silently leaving the wizard. Set false to keep non-fatal.
seerr_require_registration: true

# Public URL Seerr advertises in links/notifications — the Traefik HTTPS hostname
# (https://seerr.<PROXMOX_SUBDOMAIN>), matching the traefik role's ingress base.
# Empty when unset (e.g. CI) -> the set-URL task skips. Requires traefik + DNS.
seerr_application_url: >-
  {{ ('https://seerr.' ~ lookup('env', 'PROXMOX_SUBDOMAIN'))
     if (lookup('env', 'PROXMOX_SUBDOMAIN') | default('', true) | length > 0) else '' }}

# --- Test / orchestration toggle ---------------------------------------------
# When false (Molecule), the role renders all config (compose, settings.json
# seed) but skips the live Docker build/run + Seerr API registration that
# need a running container. The live deploy leaves it true.
seerr_manage_services: true
