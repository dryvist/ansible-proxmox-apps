---
galaxy_info:
  author: JacobPEvans
  description: Deploy Seerr (request UI) as Docker-in-LXC; register Sonarr/Radarr/Plex via its API
  license: Apache-2.0
  min_ansible_version: "2.15"

  platforms:
    - name: Debian
      versions:
        - bookworm
        - trixie
    - name: Ubuntu
      versions:
        - jammy
        - noble

  galaxy_tags:
    - seerr
    - media
    - request
    - docker

dependencies:
  # community.docker collection is specified in requirements.yml.
  # Shared Docker-in-LXC bootstrap; defaults (no daemon.json, no venv). seerr
  # deploys via docker_compose_v2, which uses the docker compose CLI (not the
  # docker SDK), so no venv interpreter override is needed.
  - role: docker_engine
