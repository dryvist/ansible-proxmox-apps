---
# Technitium DNS Server Configuration role defaults

# Technitium API endpoint (internal DNS server)
technitium_dns_api_url: "http://{{ technitium_dns_host }}:5380"

# API token from SOPS secrets (not in Doppler)
technitium_dns_api_token: "{{ lookup('env', 'TECHNITIUM_DNS_API_TOKEN') }}"

# Internal domain for A records (from Doppler)
technitium_dns_internal_domain: "{{ lookup('env', 'PROXMOX_DOMAIN') }}"

# DNS zone configuration
technitium_dns_zone_type: "Primary"
technitium_dns_zone_ttl: 3600

# A records to create - derived from OpenTofu inventory
# Format: hostname -> IP mapping
# These are populated dynamically from hostvars in tasks
technitium_dns_a_records: []

# CNAME aliases for services
# Maps service name to canonical hostname
technitium_dns_cname_records:
  - name: cribl-edge
    target: docker
  - name: cribl-stream
    target: docker
  # Stable syslog entry point - always points to HAProxy load balancer
  # Clients should send syslog to: syslog.{domain}:514 (or 515-518 for specific sources)
  - name: syslog
    target: haproxy

# Traefik HTTPS ingress aliases. Each fronted service name resolves to the
# Traefik LXC (A record -> traefik's IP), so clients reach the service over TLS
# at https://<name>.{domain}. The name list is NOT hand-maintained here — it is
# derived from the single tofu-owned ingress table `tofu_data.ingress`
# (the SAME source the traefik role uses), so there is one list, not two. These
# names are EXCLUDED from the inventory A-record builder above (a fronted host's
# own name points at Traefik, not the host — safe because all internal
# service-to-service traffic uses container IPs, not these DNS names).
technitium_dns_ingress_host: traefik
technitium_dns_ingress_aliases: >-
  {{ tofu_data.ingress | default([]) | map(attribute='name') | list }}
# Ingress lives under PROXMOX_SUBDOMAIN (matches the traefik role's
# traefik_base_domain): aliases resolve as <name>.<PROXMOX_SUBDOMAIN>, with the
# records created in the parent internal zone. Keeps ingress off the apex.
technitium_dns_ingress_domain: "{{ lookup('env', 'PROXMOX_SUBDOMAIN') }}"

# Upstream DNS servers (for forwarding non-local queries)
technitium_dns_forwarders:
  - "8.8.8.8"
  - "8.8.4.4"

# DNS server settings
technitium_dns_recursion: true
technitium_dns_cache_enabled: true

# Timeout for API requests (seconds)
technitium_dns_api_timeout: 30
