---
# Technitium DNS Server Configuration role defaults

# Technitium API endpoint (internal DNS server)
technitium_dns_api_url: "http://{{ technitium_dns_host }}:5380"

# Per-host API auth. Technitium tokens are PER-INSTANCE, so one shared token only
# authenticates the node that minted it — it cannot configure the HA secondaries.
# The config role logs into EACH node's API with the shared admin password (set
# identically on every member by technitium_install) to obtain that node's own
# session token at runtime (see tasks/main.yml), which overrides the default below.
technitium_dns_admin_user: admin
technitium_dns_admin_password: "{{ lookup('env', 'TECHNITIUM_DNS_ADMIN_PASSWORD') }}"
technitium_dns_api_token: "{{ lookup('env', 'TECHNITIUM_DNS_API_TOKEN') }}"

# Authoritative zone = the homelab SUBDOMAIN only (a child zone). Technitium is
# authoritative for this and forwards everything else (the apex + public) to the
# encrypted upstreams below. All internal A-records and service CNAMEs live under
# this subdomain.
technitium_dns_zone: "{{ lookup('env', 'PROXMOX_SUBDOMAIN') }}"

# DNS zone configuration
technitium_dns_zone_type: "Primary"
technitium_dns_zone_ttl: 3600

# A records to create - derived from OpenTofu inventory
# Format: hostname -> IP mapping
# These are populated dynamically from hostvars in tasks
technitium_dns_a_records: []

# Bare hostnames whose A records are DELETED from the zone when present. The
# record-add tasks are add/overwrite-only and never remove a name, so a hostname
# that is gone for good keeps resolving until it is listed here. This list is
# EXPLICIT and never inferred: it is the only way to retire a guest name without
# touching unrelated or static records (node A records, for example, are static
# entries the role must never prune). Each name is looked up and its A record
# removed if found; an absent name is a no-op. Bare hostnames only, no zone suffix.
technitium_dns_retired_records: []

# CNAME aliases for services
# Maps service name to canonical hostname
technitium_dns_cname_records:
  # Cribl Edge moved from the docker host to the cribl-edge-01/02 LXCs; the
  # alias is the stable OTLP/collector entry point for routers and apps.
  # ponytail: single-edge target; repoint to an LB when edge HA matters.
  - name: cribl-edge
    target: cribl-edge-01
  - name: cribl-stream
    target: docker
  # Stable syslog entry point - always points to HAProxy load balancer.
  # Clients send syslog to: syslog.<PROXMOX_SUBDOMAIN>:514 (or 515-518 per source).
  - name: syslog
    target: haproxy

# Extra CNAME records whose target is a FULL hostname used verbatim (NOT suffixed
# with the zone) — e.g. a neutral alias for a host that resolves outside this zone.
# Format: [{name, target}]. Targets are hostnames/FQDNs from the environment,
# never IPs; an entry with an empty target is skipped. Empty by default.
technitium_dns_extra_cname_records: []

# Extra A records for static hosts that are not part of the Proxmox inventory
# (e.g. the Mac Studio serving host). Format: [{name, ip, zone?}]. The IP comes
# from existing reservation config, not from ad-hoc guessing; blank IPs are
# skipped. `zone` defaults to the Technitium subdomain zone, but can be
# overridden for parent-apex records that already exist in this server.
technitium_dns_extra_a_records: []

# Parent apex domain above the Technitium subdomain zone.
technitium_dns_apex_domain: >-
  {{ lookup('env', 'PROXMOX_SUBDOMAIN')
     | mandatory('PROXMOX_SUBDOMAIN required')
     | split('.', 1) | last }}

# Traefik HTTPS ingress aliases. Each fronted service name resolves to the
# Traefik LXC (A record -> traefik's IP), so clients reach the service over TLS
# at https://<name>.{domain}. The name list is NOT hand-maintained here — it is
# derived from the single tofu-owned ingress table `tofu_data.ingress`
# (the SAME source the traefik role uses), so there is one list, not two. These
# names are EXCLUDED from the inventory A-record builder above (a fronted host's
# own name points at Traefik, not the host — safe because all internal
# service-to-service traffic uses container IPs, not these DNS names).
technitium_dns_ingress_host: traefik
# Ingress HA: fronted-service aliases resolve to the keepalived VRRP virtual IP
# (tofu_data.ingress_vip) so a Traefik node loss never breaks name resolution —
# the VIP floats to a surviving instance. Falls back to the single Traefik LXC's
# own IP when no VIP is published (single-ingress / pre-HA deployments),
# preserving the prior behavior exactly.
technitium_dns_ingress_target_ip: >-
  {{ (tofu_data['ingress_vip'] | default('', true))
     if (tofu_data['ingress_vip'] | default('', true)) | length > 0
     else (hostvars[technitium_dns_ingress_host].container_ip | default('')) }}
# Apex ingress rows (the Proxmox cluster UI fronted at the bare subdomain) are
# EXCLUDED here — they resolve at the zone root, not as <name>.<subdomain> — and
# are handled by technitium_dns_ingress_apex below instead.
technitium_dns_ingress_aliases: >-
  {{ tofu_data.ingress | default([]) | rejectattr('apex', 'defined')
     | map(attribute='name') | list }}
# Apex ingress rows: a fronted service that lives at the subdomain zone root
# itself, e.g. the Proxmox cluster UI load-balanced across the nodes.
# Selected from the SAME tofu ingress table; gets an A record AT the zone apex
# (-> Traefik), never a <name>.<subdomain> alias.
technitium_dns_ingress_apex: >-
  {{ tofu_data.ingress | default([]) | selectattr('apex', 'defined')
     | selectattr('apex') | list }}

# Proxmox API/UI endpoint IPs for the subdomain apex itself. When set, the
# apex A record is published as DNS round-robin directly to the Proxmox nodes
# instead of pointing at Traefik. Keep this sourced from the same Doppler value
# used by terraform-proxmox/aws-infra Route53 so public and local DNS agree.
technitium_dns_proxmox_endpoint_ips: >-
  {{ lookup('env', 'PROXMOX_IP_ADDRESSES') | default('', true)
     | split(',') | map('trim') | reject('equalto', '') | list }}
technitium_dns_proxmox_endpoint_a_records: []

# Ingress lives under PROXMOX_SUBDOMAIN (matches the traefik role's
# traefik_base_domain): aliases resolve as <name>.<PROXMOX_SUBDOMAIN>. This is the
# SAME value as the authoritative technitium_dns_zone, so the records land in the
# subdomain zone directly.
technitium_dns_ingress_domain: "{{ lookup('env', 'PROXMOX_SUBDOMAIN') }}"

# Upstream forwarders for every non-authoritative query (the apex + public
# names). Encrypted DNS-over-HTTPS (DoH) to Cloudflare + Google so the
# resolver->upstream hop is never sent in plaintext. The IP in parentheses is
# the bootstrap endpoint: Technitium dials that address directly instead of
# resolving the DoH hostname through itself (avoids a chicken-and-egg lookup),
# while still validating the TLS certificate against the hostname. These DoH
# URLs and resolver IPs are public constants, not secrets.
technitium_dns_forwarder_protocol: "Https" # Udp | Tcp | Tls | Https | Quic
technitium_dns_forwarders:
  - "https://cloudflare-dns.com/dns-query (1.1.1.1)"
  - "https://dns.google/dns-query (8.8.8.8)"
# Do not volunteer the client subnet (EDNS Client Subnet) to upstream resolvers.
technitium_dns_edns_client_subnet: false

# DNS server settings
technitium_dns_recursion: true
technitium_dns_cache_enabled: true

# --- Query-log export to the central syslog pipeline --------------------------
# Ship every DNS query log to the dns_query syslog family (syslog CNAME ->
# HAProxy -> Cribl Edge -> Splunk index=dns). Implemented via Technitium's
# "Log Exporter" DNS app (installed per node from the DNS App Store — apps are
# per-instance, like API tokens). The app hooks the query-log pipeline and
# forwards each entry to the syslog target below; no separate "enable query
# logging" server setting is required once the app is installed and configured.
technitium_dns_query_log_enabled: true
# App is installed from the INTERNAL object-storage mirror, never the public
# Technitium DNS App Store: the resolver containers carry the outbound-internal
# firewall (RFC1918 only) and cannot reach download.technitium.com — a live
# `listStoreApps` against them times out. Same air-gap the cribl-edge and
# technitium_install mirrors already solve. `downloadAndInstall` makes the
# SERVER fetch this URL, and the object-storage endpoint is internal, so no new
# firewall rule is needed (outbound-internal already permits it).
technitium_dns_query_log_app_name: "Log Exporter"
# Mirror endpoint = the object store's HTTPS S3 ingress (`s3.<subdomain>`),
# same artifacts bucket + technitium/ prefix the server binary mirrors to.
# MUST be https, not the raw http://<ip>:<port> endpoint technitium_install
# uses for controller-side get_url: this URL is handed to the Technitium
# server's /api/apps/downloadAndInstall, which REJECTS any url not starting
# with https:// (WebServiceAppsApi.cs). The `s3` Traefik ingress serves the
# bucket over 443 with a valid wildcard cert the resolver already trusts.
technitium_dns_query_log_app_mirror_endpoint: >-
  https://s3.{{ lookup('env', 'PROXMOX_SUBDOMAIN') }}/artifacts
# App version tracks the Technitium server release cycle. As with the server
# tarball, a Renovate bump here is only a SIGNAL — it cannot re-host a private
# object. On every bump the operator MUST re-seed
# artifacts/technitium/<this filename> in object-storage from the official
# store zip (capture LogExporterApp.zip from download.technitium.com on a host
# with egress, or extract it from the matching technitium/dns-server image).
# renovate: datasource=docker depName=technitium/dns-server
technitium_dns_query_log_app_version: "3.0.1"
technitium_dns_query_log_app_filename: "LogExporterApp-{{ technitium_dns_query_log_app_version }}.zip"
technitium_dns_query_log_app_url: >-
  {{ technitium_dns_query_log_app_mirror_endpoint }}/technitium/{{
  technitium_dns_query_log_app_filename }}
# Same stable syslog entry point the syslog_forwarder role uses (the `syslog`
# CNAME this very role creates -> HAProxy). Never a committed literal.
technitium_dns_query_log_syslog_host: "syslog.{{ lookup('env', 'PROXMOX_SUBDOMAIN') }}"
# dns_query standard frontend port from tofu constants; guarded so inventories
# predating the dns_query family still render (522 is that family's standard).
technitium_dns_query_log_syslog_port: >-
  {{ tofu_data.constants.syslog_port_map.dns_query.standard | default(522) }}
technitium_dns_query_log_syslog_protocol: "TCP"
# Desired Log Exporter app config. Key set matches the app's own dnsApp.config
# schema (LogExporterApp v3.x): the enable flag is `enabled` (NOT `enable`),
# and a top-level `enableEdnsLogging` exists. The earlier best-effort shape used
# `enable`, which the app silently ignored — every exporter stayed off and
# nothing shipped despite a clean config/set. file + http exporters off, syslog
# exporter on (TCP to the dns_query family frontend).
technitium_dns_query_log_config:
  maxQueueSize: 1000000
  enableEdnsLogging: false
  file:
    path: "./dns_logs.json"
    enabled: false
  http:
    endpoint: ""
    headers: {}
    enabled: false
  syslog:
    address: "{{ technitium_dns_query_log_syslog_host }}"
    port: "{{ technitium_dns_query_log_syslog_port | int }}"
    protocol: "{{ technitium_dns_query_log_syslog_protocol }}"
    enabled: true

# --- HA: primary / secondary roles (native AXFR/IXFR zone transfer) -----------
# The role runs across the whole technitium_dns_group. The PRIMARY authors the
# zone + records and allows zone transfer (AXFR) to the secondaries; each
# SECONDARY creates a Secondary zone (master = primary) and skips record writes
# (records replicate via zone transfer). The primary is the lowest-vmid member
# of the group (terraform pins technitium-1 to the lowest vmid). All three are
# derived in tasks when left empty, so a single-node group degenerates to "this
# host is its own primary" and behavior is UNCHANGED. No IP literal is committed.
technitium_dns_role: ""            # auto: 'primary' | 'secondary'
technitium_dns_primary_ip: ""      # auto: lowest-vmid member's container_ip
technitium_dns_secondary_ips: []   # auto: group member IPs minus the primary
# Protocol the secondaries use to pull the zone from the primary.
technitium_dns_zone_transfer_protocol: "Tcp"

# Existing zones discovered from the API at runtime. The default keeps the
# technitium_dns_apply=false path (molecule/CI) from referencing an undefined
# register when the discovery API call is skipped.
technitium_dns_existing_zones: []

# When false, skip every live Technitium API call and run only the fact-building
# logic. Used by molecule/CI to exercise the role's branching without a live
# server; always true in production.
technitium_dns_apply: true

# Timeout for API requests (seconds)
technitium_dns_api_timeout: 30
