---
# DNS query-log export via the Technitium "Log Exporter" DNS app.
#
# Every node exports its OWN query log (DNS apps are per-instance, exactly like
# API tokens), so this file runs on primary AND secondaries — no role gate.
# Flow: list installed apps -> install from the DNS App Store only when absent
# -> read the app's live config -> write the desired config only on drift.
# Everything is skipped under technitium_dns_apply=false (molecule/CI).
#
# Install source is the INTERNAL object-storage mirror, not the public DNS App
# Store: the resolvers are outbound-internal (RFC1918 only) and cannot reach
# download.technitium.com, so a live listStoreApps against them times out.
# `downloadAndInstall` takes an arbitrary `url` — we point it at the mirrored
# app zip (technitium_dns_query_log_app_url, artifacts bucket) instead of a
# store URL. The object-storage endpoint is internal, so outbound-internal
# already permits the fetch (no firewall change). Seed the mirror per the
# re-seed note in defaults/main.yml before first apply.

- name: List installed DNS apps
  ansible.builtin.uri:
    url: "{{ technitium_dns_api_url }}/api/apps/list?token={{ technitium_dns_api_token }}"
    method: GET
    return_content: true
    timeout: "{{ technitium_dns_api_timeout }}"
  register: technitium_dns_apps_installed
  changed_when: false
  failed_when: >-
    technitium_dns_apps_installed.failed or
    technitium_dns_apps_installed.json is not defined or
    technitium_dns_apps_installed.json.status != "ok"
  when: technitium_dns_apply | bool
  no_log: true

- name: Determine whether the Log Exporter app is already installed
  ansible.builtin.set_fact:
    technitium_dns_query_log_app_installed: >-
      {{ technitium_dns_query_log_app_name in
         (technitium_dns_apps_installed.json.response.apps | default([])
          | map(attribute='name') | list) }}
    # The server renders this from the app assembly's version with trailing
    # zero components dropped (DnsWebService.GetCleanVersion), so it compares
    # equal to the plain pin: assembly 3.0.1.0 -> "3.0.1". Empty when absent.
    technitium_dns_query_log_app_live_version: >-
      {{ technitium_dns_apps_installed.json.response.apps | default([])
         | selectattr('name', 'eq', technitium_dns_query_log_app_name)
         | map(attribute='version') | first | default('', true) }}
  when: technitium_dns_apply | bool

- name: Install the Log Exporter app from the internal object-storage mirror
  ansible.builtin.uri:
    url: >-
      {{ technitium_dns_api_url }}/api/apps/downloadAndInstall?token={{
      technitium_dns_api_token }}&name={{
      technitium_dns_query_log_app_name | urlencode }}&url={{
      technitium_dns_query_log_app_url | urlencode }}
    method: GET
    return_content: true
    timeout: "{{ technitium_dns_api_timeout }}"
  register: technitium_dns_query_log_install
  changed_when: technitium_dns_query_log_install.json.status == "ok"
  failed_when: >-
    technitium_dns_query_log_install.failed or
    technitium_dns_query_log_install.json is not defined or
    technitium_dns_query_log_install.json.status != "ok"
  when:
    - technitium_dns_apply | bool
    - not technitium_dns_query_log_app_installed
  no_log: true

# The install above only fires when the app is ABSENT, so an already-installed
# app would keep its old build forever; this drift-gated update carries a
# re-pinned version across. It is NOT needed to follow a server upgrade — the
# DNS app API is stable across majors and the pinned build is verified on both
# 14.3 and 15.4 (see defaults/main.yml). Firing only on drift is what keeps the
# converge idempotent.
- name: Update the Log Exporter app to the pinned version
  ansible.builtin.uri:
    url: >-
      {{ technitium_dns_api_url }}/api/apps/downloadAndUpdate?token={{
      technitium_dns_api_token }}&name={{
      technitium_dns_query_log_app_name | urlencode }}&url={{
      technitium_dns_query_log_app_url | urlencode }}
    method: GET
    return_content: true
    timeout: "{{ technitium_dns_api_timeout }}"
  register: technitium_dns_query_log_update
  changed_when: technitium_dns_query_log_update.json.status == "ok"
  failed_when: >-
    technitium_dns_query_log_update.failed or
    technitium_dns_query_log_update.json is not defined or
    technitium_dns_query_log_update.json.status != "ok"
  when:
    - technitium_dns_apply | bool
    - technitium_dns_query_log_app_installed
    - technitium_dns_query_log_app_live_version != technitium_dns_query_log_app_version
  no_log: true

# A broken app build is INVISIBLE to every check above: downloadAndInstall /
# downloadAndUpdate return status ok as long as the zip unpacks, and the app
# keeps showing up in /api/apps/list. But if its assembly fails to load, the
# server registers zero app classes, reports the version as "0.0", and silently
# exports nothing — query logs just stop reaching the syslog pipeline with no
# error anywhere. A self-built 3.0.1 zip did exactly this on 15.4. Re-read the
# list after install/update and fail loudly on that state.
- name: Re-read the DNS app list after install or update
  ansible.builtin.uri:
    url: "{{ technitium_dns_api_url }}/api/apps/list?token={{ technitium_dns_api_token }}"
    method: GET
    return_content: true
    timeout: "{{ technitium_dns_api_timeout }}"
  register: technitium_dns_apps_verify
  changed_when: false
  failed_when: >-
    technitium_dns_apps_verify.failed or
    technitium_dns_apps_verify.json is not defined or
    technitium_dns_apps_verify.json.status != "ok"
  when: technitium_dns_apply | bool
  no_log: true

- name: Require the Log Exporter app to have actually loaded
  vars:
    technitium_dns_query_log_app_entry: >-
      {{ technitium_dns_apps_verify.json.response.apps | default([])
         | selectattr('name', 'eq', technitium_dns_query_log_app_name)
         | first | default({}, true) }}
  ansible.builtin.assert:
    that:
      - technitium_dns_query_log_app_entry.dnsApps | default([]) | length > 0
      - technitium_dns_query_log_app_entry.version | default('0.0') != "0.0"
    fail_msg: >-
      The '{{ technitium_dns_query_log_app_name }}' app is installed but loaded
      NO app classes (version reported as
      '{{ technitium_dns_query_log_app_entry.version | default('none') }}').
      Its assembly failed to load, so query-log export is silently dead on this
      host. The pinned zip is not a working build for this server — check the
      DNS server log for an assembly load exception, and pin a version whose
      OFFICIAL vendor-built zip is mirrored (never a hand-built one).
    quiet: true
  when: technitium_dns_apply | bool

- name: Read the live Log Exporter app config
  ansible.builtin.uri:
    url: >-
      {{ technitium_dns_api_url }}/api/apps/config/get?token={{
      technitium_dns_api_token }}&name={{
      technitium_dns_query_log_app_name | urlencode }}
    method: GET
    return_content: true
    timeout: "{{ technitium_dns_api_timeout }}"
  register: technitium_dns_query_log_live
  changed_when: false
  failed_when: >-
    technitium_dns_query_log_live.failed or
    technitium_dns_query_log_live.json is not defined or
    technitium_dns_query_log_live.json.status != "ok"
  when: technitium_dns_apply | bool
  no_log: true

# Manage ONLY the syslog exporter block: merge our syslog settings over the
# app's own live config and write that back. This role never has to mirror the
# app's other keys (maxQueueSize/file/http and the version-specific
# `ebableEdnsLogging` typo v2.x ships / `enableEdnsLogging` v3.x uses), so it
# stays idempotent AND correct across app versions — the drift compare is our
# merged desired vs live, and only the syslog keys we set can differ.
- name: Compute the desired Log Exporter config (app config + our syslog block)
  ansible.builtin.set_fact:
    technitium_dns_query_log_live_config: >-
      {{ technitium_dns_query_log_live.json.response.config
         | default('{}', true) | from_json }}
    technitium_dns_query_log_desired_config: >-
      {{ (technitium_dns_query_log_live.json.response.config
          | default('{}', true) | from_json)
         | combine({'syslog': technitium_dns_query_log_syslog}, recursive=true) }}
  when: technitium_dns_apply | bool

# config/set is an unconditional overwrite on the Technitium side — the drift
# compare (merged desired vs live) is what keeps re-runs change-free.
- name: Configure Log Exporter syslog export (drift-gated)
  ansible.builtin.uri:
    url: >-
      {{ technitium_dns_api_url }}/api/apps/config/set?token={{
      technitium_dns_api_token }}
    method: POST
    body_format: form-urlencoded
    body:
      name: "{{ technitium_dns_query_log_app_name }}"
      config: "{{ technitium_dns_query_log_desired_config | to_json }}"
    return_content: true
    timeout: "{{ technitium_dns_api_timeout }}"
  register: technitium_dns_query_log_set
  changed_when: technitium_dns_query_log_set.json.status == "ok"
  failed_when: >-
    technitium_dns_query_log_set.failed or
    technitium_dns_query_log_set.json is not defined or
    technitium_dns_query_log_set.json.status != "ok"
  when:
    - technitium_dns_apply | bool
    - technitium_dns_query_log_desired_config != technitium_dns_query_log_live_config
  no_log: true
