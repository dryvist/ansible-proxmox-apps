---
# Technitium DNS Configuration Tasks
# Configures internal DNS zone with A records for all infrastructure hosts

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - technitium_dns_admin_password | length > 0
      - technitium_dns_zone | length > 0
      - technitium_dns_host is defined
    fail_msg: >-
      Required variables not set. Check: (1) TECHNITIUM_DNS_ADMIN_PASSWORD must be in Doppler
      (add via: doppler secrets set TECHNITIUM_DNS_ADMIN_PASSWORD='<password>');
      (2) PROXMOX_SUBDOMAIN is available via Doppler; (3) technitium_dns_host must be set in
      the play vars.
    quiet: true

# Technitium API tokens are PER-INSTANCE — one shared token only authenticates the
# node that minted it, so the HA secondaries could not be configured. Log into THIS
# node's API with the shared admin password (technitium_install sets it identically
# on every member) to obtain this node's OWN session token, and use it for every
# API call below. Skipped under technitium_dns_apply=false (molecule/CI, no live API).
- name: Authenticate to this node's Technitium API (per-host session token)
  ansible.builtin.uri:
    url: "{{ technitium_dns_api_url }}/api/user/login"
    method: POST
    body_format: form-urlencoded
    body:
      user: "{{ technitium_dns_admin_user }}"
      pass: "{{ technitium_dns_admin_password }}"
    return_content: true
    timeout: "{{ technitium_dns_api_timeout }}"
  register: technitium_dns_login
  changed_when: false
  failed_when: technitium_dns_login.json.status | default('') != "ok"
  when: technitium_dns_apply | bool
  no_log: true

- name: Use this node's session token for subsequent API calls
  ansible.builtin.set_fact:
    technitium_dns_api_token: "{{ technitium_dns_login.json.token }}"
  when: technitium_dns_apply | bool
  no_log: true

- name: Build A records from inventory
  # Iterate over groups['all'] explicitly. Iterating `hostvars | dict2items`
  # in Ansible 2.19 returns HostVarsVars proxy objects whose attribute
  # `is defined` checks behave differently from plain dicts and silently
  # skip every host. Using groups + hostvars[host] is the supported pattern.
  #
  # DHCP-first guests (tofu contract): `container_ip` carries the guest's FQDN
  # (DNS-first addressing), so it is NOT a valid A-record target — the record
  # would point a name at a name. For those guests `container_reserved_ip`
  # holds the DHCP-reservation address (the same address tofu-unifi pins the
  # deterministic MAC to), so it wins whenever set. Static guests carry an
  # empty reserved_ip and keep using container_ip / ansible_host unchanged.
  ansible.builtin.set_fact:
    technitium_dns_a_records: >-
      {{
        technitium_dns_a_records | default([]) +
        [{
          'name': hostvars[item].hostname,
          'ip': (hostvars[item].container_reserved_ip | default('', true))
                if (hostvars[item].container_reserved_ip | default('', true) | length > 0)
                else (hostvars[item].container_ip | default(hostvars[item].ansible_host))
        }]
      }}
  loop: "{{ groups['all'] | default([]) | reject('equalto', 'localhost') | list }}"
  when:
    - hostvars[item].hostname is defined
    - (hostvars[item].container_ip is defined) or (hostvars[item].ansible_host is defined)
    # Fronted-service names are owned by the Traefik ingress A-records below
    # (they resolve to Traefik, not the backend host), so skip them here.
    - hostvars[item].hostname not in (technitium_dns_ingress_aliases | default([]))
  loop_control:
    label: "{{ item }}"

# Fail loud, not silent: a builder that skips every host (e.g. the hostname
# fact missing from the dynamic inventory) yields an empty list and the role
# would "succeed" while creating nothing. There is always at least one guest
# (this DNS host itself), so zero records is always a bug.
- name: Assert the A-record builder produced records
  ansible.builtin.assert:
    that:
      - technitium_dns_a_records | default([]) | length > 0
    fail_msg: >-
      The A-record builder produced ZERO records — every inventory host was
      skipped. Check that inventory/load_tofu.yml set the `hostname` fact and
      `container_ip`/`ansible_host` on the dynamically-added guests.
    quiet: true

# Fail loud, not silent: a dhcp guest with no reserved_ip would land here with
# its FQDN as the record target and Technitium would store a broken A record.
# Reject any non-IPv4 target before a single API call is made.
- name: Assert every A-record target is an IPv4 address
  ansible.builtin.assert:
    that:
      - >-
        technitium_dns_a_records | default([])
        | rejectattr('ip', 'match', '^\d{1,3}(\.\d{1,3}){3}$')
        | list | length == 0
    fail_msg: >-
      dhcp guest(s) [{{ technitium_dns_a_records | default([])
      | rejectattr('ip', 'match', '^\d{1,3}(\.\d{1,3}){3}$')
      | map(attribute='name') | join(', ') }}] have no reserved_ip —
      an A record must point at an IPv4 address, not a hostname.
      Add reserved_host to each guest in terraform-proxmox deployment.json
      and re-apply so the inventory exports reserved_ip.
    quiet: true

- name: Build Proxmox endpoint apex A records
  ansible.builtin.set_fact:
    technitium_dns_proxmox_endpoint_a_records: >-
      {{
        technitium_dns_proxmox_endpoint_a_records | default([]) +
        [{ 'domain': technitium_dns_zone, 'ip': item }]
      }}
  loop: "{{ technitium_dns_proxmox_endpoint_ips | default([]) }}"
  loop_control:
    label: "{{ technitium_dns_zone }} -> {{ item }}"

- name: Assert every Proxmox endpoint A-record target is an IPv4 address
  ansible.builtin.assert:
    that:
      - >-
        technitium_dns_proxmox_endpoint_a_records | default([])
        | rejectattr('ip', 'match', '^\d{1,3}(\.\d{1,3}){3}$')
        | list | length == 0
    fail_msg: >-
      PROXMOX_IP_ADDRESSES contains non-IPv4 target(s): {{
      technitium_dns_proxmox_endpoint_a_records | default([])
      | rejectattr('ip', 'match', '^\d{1,3}(\.\d{1,3}){3}$')
      | map(attribute='ip') | join(', ') }}.
    quiet: true

# --- Derive HA topology (primary = lowest-vmid technitium_dns_group member) ---
# Build a {vmid, ip} list for the group so the primary is the lowest vmid
# (terraform pins technitium-1 lowest). vmid is int-cast so it sorts numerically.
# A single-node group yields one member, so that host becomes its own primary
# and the prior single-node behavior is preserved.
- name: Build Technitium group member list
  ansible.builtin.set_fact:
    technitium_dns_members: >-
      {{
        technitium_dns_members | default([]) +
        [{
          'vmid': hostvars[item].proxmox_vmid | default(0) | int,
          'ip': hostvars[item].container_ip | default(hostvars[item].ansible_host)
        }]
      }}
  loop: "{{ groups['technitium_dns_group'] | default([]) | reject('equalto', 'localhost') | list }}"
  when: (hostvars[item].container_ip is defined) or (hostvars[item].ansible_host is defined)
  loop_control:
    label: "{{ item }}"

- name: Resolve Technitium primary IP (lowest vmid)
  ansible.builtin.set_fact:
    technitium_dns_primary_ip: >-
      {{ technitium_dns_primary_ip if (technitium_dns_primary_ip | length > 0)
         else ((technitium_dns_members | default([]) | sort(attribute='vmid')
                | map(attribute='ip') | list | first) | default(technitium_dns_host)) }}

- name: Resolve Technitium role and secondary IPs
  ansible.builtin.set_fact:
    technitium_dns_role: >-
      {{ technitium_dns_role if (technitium_dns_role | length > 0)
         else ('primary' if technitium_dns_host == technitium_dns_primary_ip else 'secondary') }}
    technitium_dns_secondary_ips: >-
      {{ technitium_dns_secondary_ips if (technitium_dns_secondary_ips | length > 0)
         else (technitium_dns_members | default([]) | map(attribute='ip')
               | reject('equalto', technitium_dns_primary_ip) | list) }}

# Technitium authenticates API calls via `?token=...` query parameter,
# NOT via an X-Api-Token header. The header is silently ignored and
# the server responds with "Parameter 'token' missing."
- name: Check if DNS zone exists
  ansible.builtin.uri:
    url: "{{ technitium_dns_api_url }}/api/zones/list?token={{ technitium_dns_api_token }}"
    method: GET
    return_content: true
    timeout: "{{ technitium_dns_api_timeout }}"
  register: technitium_dns_zones_response
  changed_when: false
  when: technitium_dns_apply | bool
  no_log: true

- name: Parse existing zones
  ansible.builtin.set_fact:
    technitium_dns_existing_zones: >-
      {{ technitium_dns_zones_response.json.response.zones | default([]) | map(attribute='name') | list }}
  when: technitium_dns_apply | bool

# Forward every non-authoritative query (the apex + public names) over encrypted
# DoH to the configured upstreams, with EDNS Client Subnet disabled so the
# client subnet is never sent to upstream resolvers. DNSSEC validation stays on.
# This is a server-level setting, so it runs on EVERY node: each instance is a
# full resolver — authoritative/secondary for the subdomain, forward the rest.
- name: Configure upstream forwarders (encrypted DoH)
  ansible.builtin.uri:
    url: "{{ technitium_dns_api_url }}/api/settings/set?token={{ technitium_dns_api_token }}"
    method: POST
    body_format: form-urlencoded
    body:
      forwarders: "{{ technitium_dns_forwarders | join(',') }}"
      forwarderProtocol: "{{ technitium_dns_forwarder_protocol }}"
      eDnsClientSubnet: "{{ technitium_dns_edns_client_subnet | string | lower }}"
      dnssecValidation: "true"
    return_content: true
    timeout: "{{ technitium_dns_api_timeout }}"
  register: technitium_dns_forwarders_result
  changed_when: technitium_dns_forwarders_result.json.status == "ok"
  when: technitium_dns_apply | bool
  no_log: true

# NOTE: this role deliberately does NOT delete the apex zone (jacobpevans.com).
# A prior "remove stale apex Primary zone" task deleted the WHOLE apex zone
# whenever it existed, on the false premise that (a) a pre-existing apex zone
# was leftover cruft and (b) the subdomain-zone create would 400 while it
# existed. Both are wrong: the apex Route53-mirrored zone can hold live records
# (the pve node A records), and a parent Primary + child Primary coexist fine
# (this server runs both jacobpevans.com and pve.jacobpevans.com simultaneously
# today). Deleting the apex was purely destructive and once caused a live
# outage. Non-authoritative apex names already FORWARD to the upstream
# resolvers (configured above) whether or not any apex zone exists locally, so
# there is nothing to "clean up" here.
- name: Create authoritative subdomain DNS zone (primary)
  ansible.builtin.uri:
    url: "{{ technitium_dns_api_url }}/api/zones/create?token={{ technitium_dns_api_token }}"
    method: POST
    body_format: form-urlencoded
    body:
      zone: "{{ technitium_dns_zone }}"
      type: "{{ technitium_dns_zone_type }}"
    return_content: true
    timeout: "{{ technitium_dns_api_timeout }}"
    status_code: [200, 400]
  register: technitium_dns_zone_create
  changed_when: technitium_dns_zone_create.json.status == "ok"
  failed_when:
    - technitium_dns_zone_create.json.status | default('') != "ok"
    - "'already exists' not in (technitium_dns_zone_create.json.errorMessage | default(''))"
  when:
    - technitium_dns_role == 'primary'
    - technitium_dns_apply | bool
    - technitium_dns_zone not in technitium_dns_existing_zones
  no_log: true

# Secondaries replicate the zone from the primary via native AXFR/IXFR zone
# transfer; they create a Secondary zone (master = primary) and skip all record
# writes below. Only functions once the primary + secondary LXCs exist.
- name: Create Secondary DNS zone (secondary)
  ansible.builtin.uri:
    url: "{{ technitium_dns_api_url }}/api/zones/create?token={{ technitium_dns_api_token }}"
    method: POST
    body_format: form-urlencoded
    body:
      zone: "{{ technitium_dns_zone }}"
      type: "Secondary"
      primaryNameServerAddresses: "{{ technitium_dns_primary_ip }}"
      zoneTransferProtocol: "{{ technitium_dns_zone_transfer_protocol }}"
    return_content: true
    timeout: "{{ technitium_dns_api_timeout }}"
    status_code: [200, 400]
  register: technitium_dns_secondary_zone_create
  changed_when: technitium_dns_secondary_zone_create.json.status == "ok"
  when:
    - technitium_dns_role == 'secondary'
    - technitium_dns_apply | bool
    - technitium_dns_zone not in technitium_dns_existing_zones
  no_log: true

- name: Get existing A records for zone
  ansible.builtin.uri:
    url: >-
      {{ technitium_dns_api_url }}/api/zones/records/get?token={{
      technitium_dns_api_token }}&domain={{
      technitium_dns_zone | urlencode }}&zone={{
      technitium_dns_zone | urlencode }}
    method: GET
    return_content: true
    timeout: "{{ technitium_dns_api_timeout }}"
  register: technitium_dns_existing_records
  changed_when: false
  when:
    - technitium_dns_role == 'primary'
    - technitium_dns_apply | bool
  no_log: true

- name: Create A records for infrastructure hosts
  ansible.builtin.uri:
    url: "{{ technitium_dns_api_url }}/api/zones/records/add?token={{ technitium_dns_api_token }}"
    method: POST
    body_format: form-urlencoded
    body:
      domain: "{{ item.name }}.{{ technitium_dns_zone }}"
      zone: "{{ technitium_dns_zone }}"
      type: A
      ipAddress: "{{ item.ip }}"
      ttl: "{{ technitium_dns_zone_ttl }}"
      overwrite: "true"
    return_content: true
    timeout: "{{ technitium_dns_api_timeout }}"
  loop: "{{ technitium_dns_a_records }}"
  loop_control:
    label: "{{ item.name }} -> {{ item.ip }}"
  register: technitium_dns_a_record_result
  changed_when: technitium_dns_a_record_result.json.status == "ok"
  failed_when:
    - technitium_dns_a_record_result.json.status | default('') != "ok"
    - "'already exists' not in (technitium_dns_a_record_result.json.errorMessage | default(''))"
  when:
    - technitium_dns_role == 'primary'
    - technitium_dns_apply | bool
  no_log: true

# --- Prune retired guest A records -------------------------------------------
# The record-add tasks above are add/overwrite-only, so a hostname that is gone
# for good would keep resolving unless its A record is deleted here.
# technitium_dns_retired_records lists the bare hostnames to remove (explicit,
# never inferred — static entries such as node A records must never be pruned).
# The delete API needs the record's ipAddress, so each name is looked up first
# and only the A rdata actually present is deleted. A name with no record yields
# an empty lookup, no delete is issued, and the run reports no change — the prune
# is idempotent by construction.
- name: Look up retired guest A records
  ansible.builtin.uri:
    url: >-
      {{ technitium_dns_api_url }}/api/zones/records/get?token={{
      technitium_dns_api_token }}&domain={{
      (item ~ '.' ~ technitium_dns_zone) | urlencode }}&zone={{
      technitium_dns_zone | urlencode }}
    method: GET
    return_content: true
    timeout: "{{ technitium_dns_api_timeout }}"
  loop: "{{ technitium_dns_retired_records }}"
  loop_control:
    label: "{{ item }}"
  register: technitium_dns_retired_lookup
  changed_when: false
  when:
    - technitium_dns_role == 'primary'
    - technitium_dns_apply | bool
  no_log: true

# Flatten the per-name lookups into the concrete A records to delete. Each record
# carries its own fully-qualified `name` and `rData.ipAddress` — the two values
# the delete API needs. An empty result means every retired name was already
# absent, so the delete task below loops zero times.
- name: Build retired A-record deletion list
  ansible.builtin.set_fact:
    technitium_dns_retired_deletions: >-
      {{ technitium_dns_retired_lookup.results | default([])
         | map(attribute='json.response.records', default=[])
         | flatten | selectattr('type', 'equalto', 'A') | list }}
  when:
    - technitium_dns_role == 'primary'
    - technitium_dns_apply | bool

- name: Delete retired guest A records
  ansible.builtin.uri:
    url: "{{ technitium_dns_api_url }}/api/zones/records/delete?token={{ technitium_dns_api_token }}"
    method: POST
    body_format: form-urlencoded
    body:
      domain: "{{ item.name }}"
      zone: "{{ technitium_dns_zone }}"
      type: A
      ipAddress: "{{ item.rData.ipAddress }}"
    return_content: true
    timeout: "{{ technitium_dns_api_timeout }}"
  loop: "{{ technitium_dns_retired_deletions | default([]) }}"
  loop_control:
    label: "{{ item.name }} -> {{ item.rData.ipAddress }}"
  register: technitium_dns_retired_delete_result
  changed_when: technitium_dns_retired_delete_result.json.status == "ok"
  failed_when: technitium_dns_retired_delete_result.json.status | default('') != "ok"
  when:
    - technitium_dns_role == 'primary'
    - technitium_dns_apply | bool
  no_log: true

- name: Create CNAME records for service aliases
  ansible.builtin.uri:
    url: "{{ technitium_dns_api_url }}/api/zones/records/add?token={{ technitium_dns_api_token }}"
    method: POST
    body_format: form-urlencoded
    body:
      domain: "{{ item.name }}.{{ technitium_dns_zone }}"
      zone: "{{ technitium_dns_zone }}"
      type: CNAME
      cname: "{{ item.target }}.{{ technitium_dns_zone }}"
      ttl: "{{ technitium_dns_zone_ttl }}"
      overwrite: "true"
    return_content: true
    timeout: "{{ technitium_dns_api_timeout }}"
  loop: "{{ technitium_dns_cname_records }}"
  loop_control:
    label: "{{ item.name }} -> {{ item.target }}"
  register: technitium_dns_cname_result
  changed_when: technitium_dns_cname_result.json.status == "ok"
  failed_when:
    - technitium_dns_cname_result.json.status | default('') != "ok"
    - "'already exists' not in (technitium_dns_cname_result.json.errorMessage | default(''))"
  when:
    - technitium_dns_role == 'primary'
    - technitium_dns_apply | bool
  no_log: true

- name: Create extra CNAME records (verbatim FQDN target)
  ansible.builtin.uri:
    url: "{{ technitium_dns_api_url }}/api/zones/records/add?token={{ technitium_dns_api_token }}"
    method: POST
    body_format: form-urlencoded
    body:
      domain: "{{ item.name }}.{{ technitium_dns_zone }}"
      zone: "{{ technitium_dns_zone }}"
      type: CNAME
      cname: "{{ item.target }}"
      ttl: "{{ technitium_dns_zone_ttl }}"
      overwrite: "true"
    return_content: true
    timeout: "{{ technitium_dns_api_timeout }}"
  loop: "{{ technitium_dns_extra_cname_records | selectattr('target', 'truthy') | list }}"
  loop_control:
    label: "{{ item.name }} -> {{ item.target }}"
  register: technitium_dns_extra_cname_result
  changed_when: technitium_dns_extra_cname_result.json.status == "ok"
  failed_when:
    - technitium_dns_extra_cname_result.json.status | default('') != "ok"
    - "'already exists' not in (technitium_dns_extra_cname_result.json.errorMessage | default(''))"
    # A missing target zone (e.g. the apex zone on a fresh rebuild) must NOT abort
    # the play before the critical ingress-alias records run (Zammad #17136 art.439).
    - "'no such zone' not in (technitium_dns_extra_cname_result.json.errorMessage | default('') | lower)"
  when:
    - technitium_dns_role == 'primary'
    - technitium_dns_apply | bool
  no_log: true

# Static host A records that live outside the Proxmox inventory use the same
# add/overwrite path. This keeps the Mac Studio's canonical hostname in DNS even
# though it is not a guest managed by load_tofu.yml. Records may optionally
# target a different zone (for parent-apex names that already exist here).
- name: Create extra A records (verbatim IPv4 target)
  vars:
    technitium_dns_extra_a_record_zone: "{{ item.zone | default(technitium_dns_zone) }}"
    technitium_dns_extra_a_record_domain: "{{ item.name }}.{{ technitium_dns_extra_a_record_zone }}"
  ansible.builtin.uri:
    url: "{{ technitium_dns_api_url }}/api/zones/records/add?token={{ technitium_dns_api_token }}"
    method: POST
    body_format: form-urlencoded
    body:
      domain: "{{ technitium_dns_extra_a_record_domain }}"
      zone: "{{ technitium_dns_extra_a_record_zone }}"
      type: A
      ipAddress: "{{ item.ip }}"
      ttl: "{{ technitium_dns_zone_ttl }}"
      overwrite: "true"
    return_content: true
    timeout: "{{ technitium_dns_api_timeout }}"
  loop: "{{ technitium_dns_extra_a_records | selectattr('ip', 'truthy') | list }}"
  loop_control:
    label: "{{ technitium_dns_extra_a_record_domain }} -> {{ item.ip }}"
  register: technitium_dns_extra_a_result
  changed_when: technitium_dns_extra_a_result.json.status == "ok"
  failed_when:
    - technitium_dns_extra_a_result.json.status | default('') != "ok"
    - "'already exists' not in (technitium_dns_extra_a_result.json.errorMessage | default(''))"
    # A missing target zone (e.g. the apex zone on a fresh rebuild) must NOT abort
    # the play before the critical ingress-alias records run (Zammad #17136 art.439).
    - "'no such zone' not in (technitium_dns_extra_a_result.json.errorMessage | default('') | lower)"
  notify: Restart Technitium DNS
  when:
    - technitium_dns_role == 'primary'
    - technitium_dns_apply | bool
  no_log: true

# Point each Traefik-fronted service name at the Traefik LXC so clients reach it
# over TLS at https://<name>.{domain}. A-records (not CNAMEs) to avoid A/CNAME
# coexistence issues and to cleanly overwrite any prior host record. Skipped
# entirely until the Traefik LXC exists in the inventory.
- name: Create Traefik ingress alias A records
  ansible.builtin.uri:
    url: "{{ technitium_dns_api_url }}/api/zones/records/add?token={{ technitium_dns_api_token }}"
    method: POST
    body_format: form-urlencoded
    body:
      domain: "{{ item }}.{{ technitium_dns_ingress_domain }}"
      zone: "{{ technitium_dns_zone }}"
      type: A
      ipAddress: "{{ technitium_dns_ingress_target_ip }}"
      ttl: "{{ technitium_dns_zone_ttl }}"
      overwrite: "true"
    return_content: true
    timeout: "{{ technitium_dns_api_timeout }}"
  loop: "{{ technitium_dns_ingress_aliases | default([]) }}"
  loop_control:
    label: "{{ item }} -> {{ technitium_dns_ingress_target_ip }}"
  register: technitium_dns_ingress_result
  changed_when: technitium_dns_ingress_result.json.status == "ok"
  failed_when:
    - technitium_dns_ingress_result.json.status | default('') != "ok"
    - "'already exists' not in (technitium_dns_ingress_result.json.errorMessage | default(''))"
  no_log: true
  when:
    - technitium_dns_role == 'primary'
    - technitium_dns_apply | bool
    # Points at the ingress VIP when published, else the single Traefik LXC's IP.
    - technitium_dns_ingress_target_ip | length > 0

# The Proxmox API/UI apex (the subdomain zone root itself) resolves directly to
# the Proxmox node endpoint IPs when PROXMOX_IP_ADDRESSES is set. Delete the old
# apex A set first so the authoritative answer exactly matches the desired node
# list, then add one A record per endpoint.
- name: Delete existing Proxmox endpoint apex A records
  ansible.builtin.uri:
    url: "{{ technitium_dns_api_url }}/api/zones/records/delete?token={{ technitium_dns_api_token }}"
    method: POST
    body_format: form-urlencoded
    body:
      domain: "{{ item.name }}"
      zone: "{{ technitium_dns_zone }}"
      type: A
      ipAddress: "{{ item.rData.ipAddress }}"
    return_content: true
    timeout: "{{ technitium_dns_api_timeout }}"
  loop: >-
    {{ technitium_dns_existing_records.json.response.records | default([])
       | selectattr('type', 'equalto', 'A')
       | selectattr('name', 'equalto', technitium_dns_zone)
       | list }}
  loop_control:
    label: "{{ item.name }} -> {{ item.rData.ipAddress }}"
  register: technitium_dns_proxmox_endpoint_delete_result
  changed_when: technitium_dns_proxmox_endpoint_delete_result.json.status == "ok"
  failed_when: technitium_dns_proxmox_endpoint_delete_result.json.status | default('') != "ok"
  no_log: true
  when:
    - technitium_dns_proxmox_endpoint_a_records | default([]) | length > 0
    - technitium_dns_role == 'primary'
    - technitium_dns_apply | bool

- name: Create Proxmox endpoint apex A records
  ansible.builtin.uri:
    url: "{{ technitium_dns_api_url }}/api/zones/records/add?token={{ technitium_dns_api_token }}"
    method: POST
    body_format: form-urlencoded
    body:
      domain: "{{ item.domain }}"
      zone: "{{ technitium_dns_zone }}"
      type: A
      ipAddress: "{{ item.ip }}"
      ttl: "{{ technitium_dns_zone_ttl }}"
    return_content: true
    timeout: "{{ technitium_dns_api_timeout }}"
  loop: "{{ technitium_dns_proxmox_endpoint_a_records | default([]) }}"
  loop_control:
    label: "{{ item.domain }} -> {{ item.ip }}"
  register: technitium_dns_proxmox_endpoint_result
  changed_when: technitium_dns_proxmox_endpoint_result.json.status == "ok"
  failed_when:
    - technitium_dns_proxmox_endpoint_result.json.status | default('') != "ok"
    - "'already exists' not in (technitium_dns_proxmox_endpoint_result.json.errorMessage | default(''))"
  no_log: true
  when:
    - technitium_dns_role == 'primary'
    - technitium_dns_apply | bool

# Fallback: if no direct Proxmox endpoint IP list is configured, the Proxmox
# cluster-UI apex resolves to the Traefik LXC, same target as the per-service
# aliases above, so the bare apex https://<subdomain> reaches Traefik's backend
# pool over TLS. domain == the zone name writes the A record AT the zone apex.
- name: Create Traefik apex A record (zone root -> Traefik)
  ansible.builtin.uri:
    url: "{{ technitium_dns_api_url }}/api/zones/records/add?token={{ technitium_dns_api_token }}"
    method: POST
    body_format: form-urlencoded
    body:
      domain: "{{ technitium_dns_zone }}"
      zone: "{{ technitium_dns_zone }}"
      type: A
      ipAddress: "{{ technitium_dns_ingress_target_ip }}"
      ttl: "{{ technitium_dns_zone_ttl }}"
      overwrite: "true"
    return_content: true
    timeout: "{{ technitium_dns_api_timeout }}"
  register: technitium_dns_apex_result
  changed_when: technitium_dns_apex_result.json.status == "ok"
  failed_when:
    - technitium_dns_apex_result.json.status | default('') != "ok"
    - "'already exists' not in (technitium_dns_apex_result.json.errorMessage | default(''))"
  no_log: true
  when:
    - technitium_dns_ingress_apex | default([]) | length > 0
    - technitium_dns_proxmox_endpoint_a_records | default([]) | length == 0
    - technitium_dns_role == 'primary'
    - technitium_dns_apply | bool
    # Points at the ingress VIP when published, else the single Traefik LXC's IP.
    - technitium_dns_ingress_target_ip | length > 0

# Authorize the secondaries to pull the zone via AXFR. UseSpecifiedNetworkACL
# restricts transfer to exactly the secondary IPs (default-deny otherwise).
# No-op for a single-node group (no secondaries).
- name: Allow AXFR zone transfer to secondaries (primary)
  ansible.builtin.uri:
    url: "{{ technitium_dns_api_url }}/api/zones/options/set?token={{ technitium_dns_api_token }}"
    method: POST
    body_format: form-urlencoded
    body:
      zone: "{{ technitium_dns_zone }}"
      zoneTransfer: "UseSpecifiedNetworkACL"
      zoneTransferNetworkACL: "{{ technitium_dns_secondary_ips | join(',') }}"
    return_content: true
    timeout: "{{ technitium_dns_api_timeout }}"
  register: technitium_dns_axfr_result
  changed_when: technitium_dns_axfr_result.json.status == "ok"
  when:
    - technitium_dns_role == 'primary'
    - technitium_dns_apply | bool
    - technitium_dns_secondary_ips | length > 0
  no_log: true

# Ship each node's DNS query log to the central syslog pipeline (dns_query
# family -> Splunk index=dns). Runs on every node — DNS apps are per-instance.
- name: Export DNS query logs to the syslog pipeline (Log Exporter app)
  ansible.builtin.include_tasks: query_log.yml
  when: technitium_dns_query_log_enabled | bool

- name: Verify DNS zone is active
  ansible.builtin.uri:
    url: "{{ technitium_dns_api_url }}/api/zones/list?token={{ technitium_dns_api_token }}"
    method: GET
    return_content: true
    timeout: "{{ technitium_dns_api_timeout }}"
  register: technitium_dns_final_zones
  changed_when: false
  failed_when: >-
    technitium_dns_zone not in
    (technitium_dns_final_zones.json.response.zones | default([]) | map(attribute='name') | list)
  when: technitium_dns_apply | bool
  no_log: true
