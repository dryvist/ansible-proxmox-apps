---
galaxy_info:
  author: JacobPEvans
  description: >-
    Deploy Infisical self-hosted secrets-management (postgres + redis + app)
    via Docker Compose in LXC.
  license: Apache-2.0
  min_ansible_version: "2.15"

  platforms:
    - name: Debian
      versions:
        - bookworm
        - trixie
    - name: Ubuntu
      versions:
        - jammy
        - noble

  galaxy_tags:
    - infisical
    - docker
    - secrets
    - secretsmanagement

dependencies:
  # Shared Docker-in-LXC bootstrap (docker-ce + compose plugin, LXC-conditional
  # fuse-overlayfs). configure_daemon_json pins the fuse-overlayfs storage driver
  # (required on ZFS-backed LXC). No venv: deploys via docker_compose_v2 (CLI).
  - role: docker_engine
    docker_engine_configure_daemon_json: true
