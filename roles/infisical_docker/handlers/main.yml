---
- name: Restart docker
  ansible.builtin.systemd:
    name: docker
    state: restarted

- name: Restart infisical
  community.docker.docker_compose_v2:
    project_src: "{{ infisical_docker_data_dir }}"
    state: present
    recreate: always
  vars:
    ansible_python_interpreter: /opt/ansible-venv/bin/python
