---
# Technitium DNS Server Installation
# Installs the server and bootstraps credentials from Doppler.
# Idempotent: skips installation if already running, skips password
# change if default password no longer works (already changed).

- name: Validate admin password is defined
  ansible.builtin.assert:
    that:
      - technitium_install_admin_password | length > 0
    fail_msg: >-
      TECHNITIUM_DNS_ADMIN_PASSWORD must be set in Doppler before first deploy.
      Add via: doppler secrets set TECHNITIUM_DNS_ADMIN_PASSWORD=<password>
    quiet: true

- name: Check if Technitium is already running
  ansible.builtin.uri:
    url: "{{ technitium_install_api_url }}/api/user/login"
    method: GET
    status_code: [200, 400, 405]
    timeout: "{{ technitium_install_api_timeout }}"
  register: technitium_install_check
  failed_when: false
  changed_when: false

- name: Install Technitium DNS server (bare-metal from mirror)
  when: technitium_install_check.status == -1
  block:
    - name: Gather minimal facts (Debian version for the Microsoft apt repo)
      ansible.builtin.setup:
        gather_subset:
          - "!all"
          - "min"

    - name: Install base dependencies
      ansible.builtin.apt:
        name:
          - curl
          - ca-certificates
          - libicu-dev
        state: present
        update_cache: true

    - name: Register the Microsoft package repository (.NET runtime source)
      # The config .deb installs the apt source list + signing key; this
      # replaces the dead vendor host as the runtime source.
      ansible.builtin.apt:
        deb: >-
          https://packages.microsoft.com/config/debian/{{
          ansible_facts.distribution_major_version }}/packages-microsoft-prod.deb

    - name: Install the ASP.NET Core runtime
      ansible.builtin.apt:
        name: "{{ technitium_install_dotnet_pkg }}"
        state: present
        update_cache: true

    - name: Ensure the Technitium app directory exists
      ansible.builtin.file:
        path: "{{ technitium_install_app_dir }}"
        state: directory
        mode: "0755"

    - name: Download the Technitium app from the mirror (checksum-pinned)
      ansible.builtin.get_url:
        url: "{{ technitium_install_app_url }}"
        dest: /tmp/technitium-app.tgz
        checksum: "sha256:{{ technitium_install_app_sha256 }}"
        mode: "0644"

    - name: Extract the Technitium app distribution
      ansible.builtin.unarchive:
        src: /tmp/technitium-app.tgz
        dest: "{{ technitium_install_app_dir }}"
        remote_src: true
        creates: "{{ technitium_install_app_dir }}/dns/DnsServerApp.dll"

    - name: Remove the downloaded tarball
      ansible.builtin.file:
        path: /tmp/technitium-app.tgz
        state: absent

    - name: Install the dns.service systemd unit
      ansible.builtin.template:
        src: dns.service.j2
        dest: /etc/systemd/system/dns.service
        mode: "0644"

    - name: Enable and start Technitium DNS
      ansible.builtin.systemd_service:
        name: dns.service
        enabled: true
        state: started
        daemon_reload: true

    - name: Wait for Technitium to start
      ansible.builtin.uri:
        url: "{{ technitium_install_api_url }}"
        method: GET
        status_code: [200, 301, 302]
        timeout: "{{ technitium_install_api_timeout }}"
      register: technitium_install_wait
      retries: 12
      delay: 5
      until: technitium_install_wait.status in [200, 301, 302]

- name: Try login with default password
  ansible.builtin.uri:
    url: "{{ technitium_install_api_url }}/api/user/login"
    method: POST
    body_format: form-urlencoded
    body:
      user: "{{ technitium_install_admin_user }}"
      pass: "{{ technitium_install_default_password }}"
    return_content: true
    timeout: "{{ technitium_install_api_timeout }}"
    status_code: [200]
  register: technitium_install_default_login
  failed_when: false
  changed_when: false
  no_log: true

- name: Bootstrap credentials (default password still active)
  when: >-
    technitium_install_default_login.status == 200 and
    (technitium_install_default_login.json.status | default('')) == 'ok'
  block:
    - name: Change admin password
      # Technitium /api/user/changePassword requires THREE parameters:
      # token (session), pass (current/old password), newPass (new password).
      # Sending only token+pass silently rejects with
      # "Parameter 'newPass' missing." Previously the role used `pass`
      # alone, treating it as the new value, so the password change
      # never actually took effect — bootstrap appeared to succeed
      # while leaving the default admin/admin credentials active.
      ansible.builtin.uri:
        url: "{{ technitium_install_api_url }}/api/user/changePassword"
        method: POST
        body_format: form-urlencoded
        body:
          token: "{{ technitium_install_default_login.json.token }}"
          pass: "{{ technitium_install_default_password }}"
          newPass: "{{ technitium_install_admin_password }}"
        return_content: true
        timeout: "{{ technitium_install_api_timeout }}"
      register: technitium_install_password_change
      changed_when: technitium_install_password_change.json.status == "ok"
      failed_when: technitium_install_password_change.json.status | default('') != "ok"
      no_log: true

- name: Verify login with configured password
  # Confirms the password change took effect (or that the password was
  # already set on a prior run). Failing here means the configured admin
  # password disagrees with what's actually on the server.
  ansible.builtin.uri:
    url: "{{ technitium_install_api_url }}/api/user/login"
    method: POST
    body_format: form-urlencoded
    body:
      user: "{{ technitium_install_admin_user }}"
      pass: "{{ technitium_install_admin_password }}"
    return_content: true
    timeout: "{{ technitium_install_api_timeout }}"
  register: technitium_install_login
  changed_when: false
  failed_when: technitium_install_login.json.status | default('') != "ok"
  no_log: true

- name: Create API token
  # Technitium /api/user/createToken takes user/pass directly (not a
  # session token) and produces a long-lived token that does not expire.
  # The previous role passed a session token in `token` along with `user`
  # but no `pass`, which the server interprets as a malformed login and
  # rejects with "Parameter 'pass' missing."
  ansible.builtin.uri:
    url: "{{ technitium_install_api_url }}/api/user/createToken"
    method: POST
    body_format: form-urlencoded
    body:
      user: "{{ technitium_install_admin_user }}"
      pass: "{{ technitium_install_admin_password }}"
      tokenName: "{{ technitium_install_token_name }}"
    return_content: true
    timeout: "{{ technitium_install_api_timeout }}"
  register: technitium_install_token_result
  changed_when: technitium_install_token_result.json.status == "ok"
  failed_when: technitium_install_token_result.json.status | default('') != "ok"
  no_log: true

- name: Verify Technitium DNS is healthy
  # Technitium authenticates API calls via ?token=... query parameter,
  # NOT via an X-Api-Token header. The header is silently ignored and
  # the server responds with "Parameter 'token' missing."
  ansible.builtin.uri:
    url: "{{ technitium_install_api_url }}/api/zones/list?token={{ technitium_install_token_result.json.token }}"
    method: GET
    return_content: true
    timeout: "{{ technitium_install_api_timeout }}"
  register: technitium_install_health
  changed_when: false
  failed_when: technitium_install_health.json.status | default('') != "ok"
  no_log: true
