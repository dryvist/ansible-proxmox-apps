---
galaxy_info:
  author: Jacob Evans
  description: >-
    Self-hosted Healthchecks (https://healthchecks.io/docs/self_hosted)
    on an LXC container via Docker Compose. Receives heartbeats from
    cribl-edge-watchdog and alerts via SMTP on missed pings.
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: Debian
      versions:
        - bookworm
  galaxy_tags:
    - monitoring
    - alerting
    - deadman

dependencies:
  # Shared Docker-in-LXC bootstrap (docker-ce + compose plugin, LXC-conditional
  # fuse-overlayfs). configure_daemon_json pins the fuse-overlayfs storage driver
  # (required on ZFS-backed LXC). No venv: deploys via docker_compose_v2 (CLI).
  - role: docker_engine
    docker_engine_configure_daemon_json: true

collections:
  - community.docker
