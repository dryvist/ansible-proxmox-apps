---
github_runner_image_name: "github-runner"
github_runner_work_dir: "/opt/github-runner"

# github_runner_image_tag is NOT set here — tasks/main.yml derives it from a
# hash of the build context. A fixed tag is what let a host serve jobs from an
# image built out of a different Dockerfile: the tag never changed, so compose
# saw no config change and never recreated the containers. Pass it as an extra
# var only to pin a known-good build during an incident.

# ---------------------------------------------------------------------------
# Multi-repo runner list (preferred)
# Each entry: { repo, replicas, labels, name_prefix, cpu_limit, memory_limit }
# Omitted keys fall back to the github_runner_default_* values below.
# ---------------------------------------------------------------------------
# github_runner_repositories:
#   - repo: "Owner/repo-name"
#     replicas: 2
#     labels: "self-hosted,Linux,X64,proxmox"

# Legacy single-repo mode — auto-converted to a one-entry list at runtime.
# Ignored when github_runner_repositories is defined.
github_runner_repository: ""

# Defaults applied when per-repo overrides are omitted
github_runner_default_replicas: 1
github_runner_default_labels: "self-hosted,Linux,X64,proxmox"
github_runner_default_name_prefix: "proxmox-runner"
github_runner_default_cpu_limit: "1.0"
github_runner_default_memory_limit: "2g"

# Admin PAT (fine-grained, Administration: Read & Write).
# Stored in Doppler project gh-workflow-tokens; injected via chained
# `doppler run -p gh-workflow-tokens -c prd --` at deploy time.
# Each runner container uses this to auto-generate ephemeral registration
# tokens at startup — no manual token rotation needed.
github_runner_admin_token: "{{ lookup('env', 'GH_PAT_RUNNER_TOKEN') | default(omit, true) }}"

# SOPS age private key (raw key content, not path).
# Passed into runner containers so E2E tests can decrypt secrets.enc.yaml.
github_runner_sops_age_key: "{{ lookup('env', 'SOPS_AGE_KEY') | default(omit, true) }}"

# Legacy registration token (deprecated — use admin token instead).
# Kept for backward compatibility; expires in 1h and is single-repo.
github_runner_token: "{{ lookup('env', 'GITHUB_RUNNER_TOKEN') | default(omit, true) }}"
