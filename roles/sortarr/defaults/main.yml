---
# sortarr role defaults — Sortarr media-library insights dashboard (Docker in LXC).
#
# Docker-in-LXC, mirrors the seerr role pattern: install Docker, run a single
# container via Compose, persist config to a host dir. Sortarr is READ-ONLY —
# it never moves, renames, or deletes media. It reaches Sonarr/Radarr/Plex over
# the LAN using their existing API keys; no new *arr-side wiring is required.
# Pinned to a tag so it's reproducible AND Renovate can bump it.
sortarr_image: "ghcr.io/jaredharper1/sortarr:latest"
sortarr_container_name: sortarr
sortarr_data_dir: /opt/sortarr
# Host dir bind-mounted to the container's /data (Sortarr's persistent config +
# cache, incl. its own Sortarr.env).
sortarr_config_dir: "{{ sortarr_data_dir }}/data"
sortarr_bind_address: "0.0.0.0"
# Web UI port from tofu constants (media_ports.sortarr_web = 8787).
sortarr_web_port: "{{ tofu_data.constants.media_ports.sortarr_web }}"

# --- Sonarr / Radarr / Plex sources -----------------------------------------
# Address resolution: prefer the HTTPS FQDN under the PVE subdomain when
# PROXMOX_SUBDOMAIN is configured, falling back to direct internal LAN HTTP
# addressing in other environments (e.g. Molecule/CI).
sortarr_subdomain: "{{ lookup('env', 'PROXMOX_SUBDOMAIN') | default('', true) }}"

sortarr_sonarr_url: >-
  {{ 'https://sonarr.' ~ sortarr_subdomain if sortarr_subdomain | length > 0
     else 'http://' ~ (tofu_data.containers['sonarr'].ip
       | default(hostvars['sonarr'].container_ip) | default('sonarr'))
       ~ ':' ~ (tofu_data.constants.media_ports.sonarr_web | default(8989)) }}
sortarr_sonarr_api_key: "{{ lookup('env', 'SONARR_API_KEY') | default('', true) }}"

sortarr_radarr_url: >-
  {{ 'https://radarr.' ~ sortarr_subdomain if sortarr_subdomain | length > 0
     else 'http://' ~ (tofu_data.containers['radarr'].ip
       | default(hostvars['radarr'].container_ip) | default('radarr'))
       ~ ':' ~ (tofu_data.constants.media_ports.radarr_web | default(7878)) }}
sortarr_radarr_api_key: "{{ lookup('env', 'RADARR_API_KEY') | default('', true) }}"

sortarr_plex_url: >-
  {{ 'https://plex.' ~ sortarr_subdomain if sortarr_subdomain | length > 0
     else 'http://' ~ (tofu_data.containers['plex'].ip
       | default(hostvars['plex'].container_ip) | default('plex'))
       ~ ':' ~ (tofu_data.constants.media_ports.plex_web | default(32400)) }}
# Optional: Sortarr works Arr-only with this empty (Plex overlay is additive).
sortarr_plex_token: "{{ lookup('env', 'PLEX_TOKEN') | default('', true) }}"

# --- Auth (basic_local_bypass): password required from outside Traefik, -----
# bypassed for LAN/proxy clients. See docs/Sortarr.minimal.env.example upstream.
sortarr_basic_auth_user: "admin"
sortarr_basic_auth_pass: "{{ lookup('env', 'SORTARR_BASIC_AUTH_PASS') | default('', true) }}"
sortarr_local_auth_bypass: true

# DHCP-first inventory contract (same as download_vpn/seerr): container_ip
# carries the guest's FQDN under DNS-first addressing, container_reserved_ip
# the actual DHCP-reservation address; static guests put the IP in
# container_ip. All LAN IP math below uses this resolved address.
sortarr_lan_ip: >-
  {{ container_reserved_ip
     if (container_reserved_ip | default('', true) | length > 0)
     else (container_ip | default(ansible_default_ipv4.address)) }}

# CIDRs allowed to bypass basic auth. Derived from the container's own IP —
# never a hardcoded literal (see feedback_no_committed_ips). The /16 supernet
# (not just the media VLAN's own /24) mirrors download_vpn's
# qbittorrent_auth_whitelist: Sortarr is reached via Traefik, whose proxied
# requests originate from a DIFFERENT VLAN (3rd octet = VLAN id), so a /24-only
# whitelist would wrongly force the login prompt on every Traefik-proxied
# request. Narrow to "{{ sortarr_lan_ip }}/24" for a tighter, media-VLAN-only
# boundary if Traefik is ever bypassed.
sortarr_local_auth_bypass_cidrs: >-
  {{ (sortarr_lan_ip ~ '/16') | ansible.utils.ipaddr('network/prefix') }}

# --- Reverse proxy -----------------------------------------------------------
# Sortarr sits behind Traefik on the standard TLS entrypoint (single proxy hop).
sortarr_proxy_mode: "single"
sortarr_waitress_trusted_proxy: "traefik"

# --- Test / orchestration toggle ---------------------------------------------
# When false (Molecule), the role renders all config (compose) but skips the
# live Docker build/run that needs a running container. The live deploy
# leaves it true.
sortarr_manage_services: true

# ntfy alert target for the persistent-mount guard (tasks/main.yml). Mirrors
# the seerr/download_vpn/service_deadman convention.
sortarr_ntfy_url: >-
  http://{{ hostvars['ntfy']['container_ip'] | default('ntfy') }}:{{
  tofu_data.constants.notification_ports.ntfy_http }}/{{ sortarr_ntfy_topic }}

# --- Security & Session Persistence -------------------------------------------
# Sourced from the Doppler/SOPS environment if present, otherwise generated
# dynamically on each run.
sortarr_secret_key: >-
  {{ lookup('env', 'SORTARR_SECRET_KEY') |
  default(lookup('password', '/dev/null length=32 chars=ascii_letters,digits'), true) }}
sortarr_ntfy_topic: "persistence"
