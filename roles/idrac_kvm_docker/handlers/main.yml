---
- name: Restart docker
  ansible.builtin.systemd:
    name: docker
    state: restarted

- name: Restart idrac-kvm
  community.docker.docker_compose_v2:
    project_src: "{{ idrac_kvm_docker_data_dir }}"
    state: present
    recreate: always
  no_log: true
  vars:
    ansible_python_interpreter: /opt/ansible-venv/bin/python
