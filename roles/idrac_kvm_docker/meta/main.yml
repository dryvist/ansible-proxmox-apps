---
galaxy_info:
  author: JacobPEvans
  description: Deploy domistyle/idrac6 HTML5 iDRAC KVM viewer as Docker containers (one per iDRAC)
  license: Apache-2.0
  min_ansible_version: "2.15"

  platforms:
    - name: Debian
      versions:
        - bookworm
        - trixie
    - name: Ubuntu
      versions:
        - jammy
        - noble

  galaxy_tags:
    - idrac
    - kvm
    - docker
    - oob
    - management

dependencies:
  # Shared Docker-in-LXC bootstrap (docker-ce + compose plugin, LXC-conditional
  # fuse-overlayfs). configure_daemon_json pins the fuse-overlayfs storage driver.
  # Manages a venv (docker_image / docker_prune are SDK-based); the role scopes
  # that venv interpreter per-task (it also runs its own apt task for ipmitool,
  # which must keep the system interpreter), so no global set_fact.
  - role: docker_engine
    docker_engine_configure_daemon_json: true
    docker_engine_manage_venv: true
