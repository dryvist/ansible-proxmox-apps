---
idrac_kvm_docker_image: "domistyle/idrac6"
idrac_kvm_docker_data_dir: /opt/idrac-kvm
idrac_kvm_docker_bind_address: "0.0.0.0"
idrac_kvm_docker_tz: "UTC"
idrac_kvm_docker_prune_unused: false

# Path that the LXC bind-mounts from the PVE host so the iDRAC viewer's
# Virtual Media dialog can browse to ISO/IMG files. Set to null to omit
# the bind. Configured per-host by terraform-proxmox (pct set --mp0).
idrac_kvm_docker_iso_dir: /iso

# One entry per physical iDRAC managed by THIS host. Set via per-host
# host_vars (inventory/host_vars/<hostname>.yml) — one host per physical
# iDRAC. Credentials come from env vars at playbook runtime (sops exec-env
# on ansible-proxmox-apps secrets.enc.yaml). env_prefix drives
# IDRAC_<PREFIX>_HOST / _USER / _PASSWORD lookups in env.j2.
#
# Optional keys per target:
#   keycode_hack: true       # enables IDRAC_KEYCODE_HACK=TRUE inside container
#                            # (workaround for non-US keyboards / stuck modifier keys)
idrac_kvm_docker_targets: []
