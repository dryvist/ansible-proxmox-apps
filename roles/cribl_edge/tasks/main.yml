---
# Cribl Edge native installation on LXC containers

- name: Ensure temp directories exist for Ansible
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "1777"
  loop:
    - /tmp/.ansible-tmp
    - /var/tmp/.ansible

- name: Install required packages
  # sudo is required because later tasks use `become_user:
  # {{ cribl_edge_user }}` to run `cribl mode-edge` as the non-root
  # service user. The Proxmox LXC base image does not ship sudo —
  # without this the task fails with `/bin/sh: 1: sudo: not found`.
  ansible.builtin.apt:
    name:
      - curl
      - tar
      - sudo
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create cribl system group
  ansible.builtin.group:
    name: "{{ cribl_edge_group }}"
    system: true
    state: present

- name: Create cribl system user
  ansible.builtin.user:
    name: "{{ cribl_edge_user }}"
    group: "{{ cribl_edge_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ cribl_edge_install_dir }}"
    create_home: false
    state: present

- name: Check if Cribl Edge is already installed
  ansible.builtin.stat:
    path: "{{ cribl_edge_install_dir }}/bin/cribl"
  register: cribl_edge_binary

- name: Create install directory parent
  ansible.builtin.file:
    path: /opt
    state: directory
    mode: "0755"

- name: Download and extract Cribl Edge tarball
  ansible.builtin.unarchive:
    src: "{{ cribl_edge_tarball_url }}"
    dest: /opt
    remote_src: true
    owner: "{{ cribl_edge_user }}"
    group: "{{ cribl_edge_group }}"
  when: not cribl_edge_binary.stat.exists

# Fresh-install only: recursing over a RUNNING Edge races its persistent
# queues (queue *.ndjson.tmp files rotate mid-walk -> ENOENT) and pointlessly
# rewalks gigabytes of PQ data. The unarchive above already sets ownership,
# and nothing changes it post-install.
- name: Set ownership on Cribl Edge directory
  ansible.builtin.file:
    path: "{{ cribl_edge_install_dir }}"
    owner: "{{ cribl_edge_user }}"
    group: "{{ cribl_edge_group }}"
    recurse: true
    state: directory
  when: not cribl_edge_binary.stat.exists

- name: Check current Cribl mode
  ansible.builtin.slurp:
    src: "{{ cribl_edge_install_dir }}/local/_system/instance.yml"
  register: cribl_edge_instance
  failed_when: false

# `cribl mode-edge` rewrites local config to defaults on every invocation
# (including the API bind deployed below) — only run it when the recorded
# mode in local/_system/instance.yml differs.
- name: Set Cribl to Edge mode
  ansible.builtin.command:
    cmd: "{{ cribl_edge_install_dir }}/bin/cribl mode-edge"
  become: true
  become_user: "{{ cribl_edge_user }}"
  changed_when: true
  when: >-
    ((cribl_edge_instance.content | default('') | b64decode | from_yaml)
     | default({}, true)).get('distributed', {}).get('mode', '') != 'edge'

- name: Ensure Edge config directories exist
  # Cribl Edge worker (LEADER process) loads ALL config (inputs, outputs,
  # pipelines) from local/edge/, not local/cribl/. The local/edge/ dir is
  # created by `cribl mode-edge` but we ensure the full tree here.
  ansible.builtin.file:
    path: "{{ item }}"
    owner: "{{ cribl_edge_user }}"
    group: "{{ cribl_edge_group }}"
    mode: "0755"
    state: directory
  loop:
    - "{{ cribl_edge_install_dir }}/local/edge"
    - "{{ cribl_edge_install_dir }}/local/edge/pipelines/syslog"
    - "{{ cribl_edge_install_dir }}/local/edge/pipelines/netmon"
    - "{{ cribl_edge_install_dir }}/local/edge/pipelines/otel_traces"
    - "{{ cribl_edge_install_dir }}/local/edge/pipelines/otel_splunk"

- name: Deploy Cribl Edge outputs configuration
  ansible.builtin.template:
    src: outputs.yml.j2
    dest: "{{ cribl_edge_install_dir }}/local/edge/outputs.yml"
    owner: "{{ cribl_edge_user }}"
    group: "{{ cribl_edge_group }}"
    mode: "0600"
  no_log: true
  notify: Restart cribl edge

- name: Deploy Cribl Edge inputs configuration
  ansible.builtin.template:
    src: inputs.yml.j2
    dest: "{{ cribl_edge_install_dir }}/local/edge/inputs.yml"
    owner: "{{ cribl_edge_user }}"
    group: "{{ cribl_edge_group }}"
    mode: "0644"
  notify: Restart cribl edge

- name: Deploy syslog pipeline configuration
  ansible.builtin.template:
    src: pipelines/syslog/conf.yml.j2
    dest: "{{ cribl_edge_install_dir }}/local/edge/pipelines/syslog/conf.yml"
    owner: "{{ cribl_edge_user }}"
    group: "{{ cribl_edge_group }}"
    mode: "0644"
  notify: Restart cribl edge

- name: Deploy netmon pipeline configuration
  ansible.builtin.template:
    src: pipelines/netmon/conf.yml.j2
    dest: "{{ cribl_edge_install_dir }}/local/edge/pipelines/netmon/conf.yml"
    owner: "{{ cribl_edge_user }}"
    group: "{{ cribl_edge_group }}"
    mode: "0644"
  notify: Restart cribl edge

- name: Deploy otel trace-filter pipeline configuration
  ansible.builtin.template:
    src: pipelines/otel_traces/conf.yml.j2
    dest: "{{ cribl_edge_install_dir }}/local/edge/pipelines/otel_traces/conf.yml"
    owner: "{{ cribl_edge_user }}"
    group: "{{ cribl_edge_group }}"
    mode: "0644"
  notify: Restart cribl edge

- name: Deploy otel Splunk-leg pipeline configuration
  ansible.builtin.template:
    src: pipelines/otel_splunk/conf.yml.j2
    dest: "{{ cribl_edge_install_dir }}/local/edge/pipelines/otel_splunk/conf.yml"
    owner: "{{ cribl_edge_user }}"
    group: "{{ cribl_edge_group }}"
    mode: "0644"
  notify: Restart cribl edge

# Routes table (4.12+): the otel input sends to routes, which CAN split one
# input across outputs now — otel_langfuse (non-final -> Langfuse) then
# otel_splunk (final -> Splunk, index=otel). Every other input still pins a
# direct connection and never reaches the table. This REPLACES the old
# "remove stale routes.yml" cleanup that the 4.8.0-alpha limitation forced;
# only the passthru pipeline removal remains.
- name: Deploy Cribl Edge routes table (otel fan-out)
  ansible.builtin.template:
    src: routes.yml.j2
    dest: "{{ cribl_edge_install_dir }}/local/edge/routes.yml"
    owner: "{{ cribl_edge_user }}"
    group: "{{ cribl_edge_group }}"
    mode: "0644"
  notify: Restart cribl edge

- name: Remove stale Cribl Edge passthru pipeline
  ansible.builtin.file:
    path: "{{ cribl_edge_install_dir }}/local/edge/pipelines/passthru"
    state: absent
  notify: Restart cribl edge

- name: Deploy Cribl Edge instance settings (API bind)
  ansible.builtin.template:
    src: cribl.yml.j2
    dest: "{{ cribl_edge_install_dir }}/local/edge/cribl.yml"
    owner: "{{ cribl_edge_user }}"
    group: "{{ cribl_edge_group }}"
    mode: "0644"
  notify: Restart cribl edge

- name: Enable Cribl Edge systemd service
  # `cribl boot-start enable` installs the unit file with a name derived
  # from the operating mode. After `cribl mode-edge` the unit is
  # cribl-edge.service, not cribl.service.
  ansible.builtin.command:
    cmd: "{{ cribl_edge_install_dir }}/bin/cribl boot-start enable -m systemd -u {{ cribl_edge_user }}"
    creates: "/etc/systemd/system/{{ cribl_edge_service_name }}.service"

- name: Start Cribl Edge service
  ansible.builtin.systemd:
    name: "{{ cribl_edge_service_name }}"
    state: started
    enabled: true
    daemon_reload: true

- name: Verify Cribl Edge service is running
  ansible.builtin.systemd:
    name: "{{ cribl_edge_service_name }}"
  register: cribl_edge_status
  changed_when: false
  failed_when: cribl_edge_status.status.ActiveState != 'active'
