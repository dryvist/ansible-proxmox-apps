---
# Cribl Edge native installation defaults

# Installation
cribl_edge_version: "latest"
# Upstream release URL. Cribl's CDN uses two different filename patterns:
#   - versioned release: https://cdn.cribl.io/dl/4.12.2/cribl-4.12.2-linux-x64.tgz
#   - rolling "latest":  https://cdn.cribl.io/dl/latest/cribl-linux-x64.tgz    (no version in filename)
# Group vars for the `cribl_edge` group override this with a MinIO mirror URL
# because the cribl-edge containers have the `outbound-internal` firewall and
# cannot reach cdn.cribl.io directly.
cribl_edge_tarball_url: >-
  https://cdn.cribl.io/dl/{{ cribl_edge_version }}/{{
  'cribl-linux-x64.tgz' if cribl_edge_version == 'latest'
  else 'cribl-' + cribl_edge_version + '-linux-x64.tgz' }}
cribl_edge_install_dir: /opt/cribl

# Service user
cribl_edge_user: cribl
cribl_edge_group: cribl

# Systemd service — the unit file is created by `cribl boot-start enable`,
# which derives the service name from the Cribl operating mode. With
# `cribl mode-edge`, the unit is installed as `cribl-edge.service`.
cribl_edge_service_name: cribl-edge

# Syslog routing from tofu constants (no hardcoded values): per source
# family — standard frontend, high backend (this Edge's listener), and the
# Splunk index/sourcetype the syslog pipeline stamps.
cribl_edge_syslog_routing: >-
  {{ hostvars['localhost']['tofu_data']['constants']['syslog_port_map'] }}

# Edge listeners: high backend ports only. HAProxy owns the standard
# frontends (514-518) and forwards here.
cribl_edge_syslog_port_mappings: >-
  {%- set out = {} -%}
  {%- for family, entry in cribl_edge_syslog_routing | dictsort -%}
  {%- set _ = out.update({family: entry.high}) -%}
  {%- endfor -%}
  {{ out }}
cribl_edge_syslog_ports: "{{ cribl_edge_syslog_port_mappings.values() | list }}"

# UniFi firewall/IPS split: raw-content match (JS regex BODY, no slashes)
# applied to events arriving on the unifi syslog family port. Lines matching
# this pattern are UniFi gateway firewall/IPS traffic and are re-routed to
# index=firewall sourcetype=ubiquiti:firewall BEFORE the plain unifi branch;
# everything else on the port stays index=unifi.
#
# PLACEHOLDER PATTERN — covers the common UniFi kernel iptables rule-hit tag
# ("[WAN_LOCAL-4001-D]" / "[LAN_IN-RET-A]"-style), the kernel packet-header
# dump ("IN=eth0 OUT= MAC=..."), and suricata IPS alerts. L9 finalizes this
# from live gateway samples — adjust HERE only (single source of truth), the
# pipeline template just interpolates it.
cribl_edge_unifi_fw_match: >-
  \[[A-Z][A-Z0-9_-]*-[AD]\]|\bIN=\S* OUT=\S* MAC=|suricata

# Edge API bind port from tofu constants (no hardcoded values).
# Templated into local/edge/cribl.yml with host 0.0.0.0 so the API is
# reachable from the internal network, not just 127.0.0.1.
cribl_edge_api_port: >-
  {{ hostvars['localhost']['tofu_data']['constants']['service_ports']['cribl_edge_api'] }}

# Splunk HEC configuration — FQDN, never an IP. HEC goes through the
# dedicated splunk-hec Traefik ingress on 443: the splunk.<zone> alias
# resolves to Traefik, which serves nothing on a raw 8088, so dialing
# <alias>:8088 black-holed every HEC POST (the queue backlog in apps#588).
cribl_edge_splunk_host: >-
  splunk-hec.{{ lookup('env', 'PROXMOX_SUBDOMAIN')
  | mandatory('PROXMOX_SUBDOMAIN environment variable is required (Doppler)') }}
cribl_edge_hec_url: "https://{{ cribl_edge_splunk_host }}"
cribl_edge_hec_token: "{{ lookup('env', 'SPLUNK_HEC_TOKEN') }}"

# Per-index HEC tokens (one index = one HEC). When HEC_NAMESPACE (Doppler) is
# set, each index gets a dedicated output whose token is derived the SAME way
# ansible-splunk derives it — uuid5('splunk-hec-<index>', HEC_NAMESPACE) — so no
# token value is ever shared or stored, only the namespace UUID. Empty namespace
# = every input keeps using the shared cribl_edge_hec_token (legacy) output.
cribl_edge_hec_namespace: "{{ lookup('env', 'HEC_NAMESPACE') | default('', true) }}"
# Indexes this Edge writes (syslog families + the netmon-HEC streams). Each gets
# a splunk_hec_<index> output; senders route to their index's output.
cribl_edge_per_index_indexes:
  - unifi
  - firewall
  - os
  - netmon
  - unifi_metrics

# netmon Telegraf HEC ingestion. The per-WAN probers (roles/netmon) push
# Splunk-HEC to this Edge on cribl_hec_input_port (group_vars/all.yml); the
# netmon pipeline stamps index=netmon_metrics and reuses the splunk_hec output above.
# Token is optional — empty accepts unauthenticated pushes from the mgmt VLAN.
cribl_edge_hec_input_port: "{{ cribl_hec_input_port | default(8088) }}"
cribl_edge_hec_input_token: "{{ lookup('env', 'NETMON_HEC_TOKEN') | default('', true) }}"

# =============================================================================
# OTLP/HTTP source for the LLM fabric (LiteLLM routers + orchestration apps
# emit OTel to this Edge) and its Langfuse destination. Port from tofu
# constants; project keys from Doppler env (pre-provisioned via the langfuse
# role's LANGFUSE_INIT_*). Rendering is gated on the keys being present, so a
# host without them keeps its existing pipeline untouched. Splunk fan-out of
# the same stream is deferred: this Cribl version cannot split one input
# across outputs (see the in_netmon_hec note in inputs.yml.j2).
# =============================================================================
cribl_edge_otel_port: >-
  {{ hostvars['localhost']['tofu_data']['constants']['service_ports']['otel_traces_http'] }}
cribl_edge_langfuse_url: >-
  https://langfuse.{{ lookup('env', 'PROXMOX_SUBDOMAIN')
  | mandatory('PROXMOX_SUBDOMAIN required') }}/api/public/otel
cribl_edge_langfuse_public_key: "{{ lookup('env', 'LANGFUSE_PUBLIC_KEY') | default('', true) }}"
cribl_edge_langfuse_secret_key: "{{ lookup('env', 'LANGFUSE_SECRET_KEY') | default('', true) }}"
