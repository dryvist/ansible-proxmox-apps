---
# Cribl Edge native installation defaults

# Installation
cribl_edge_version: "latest"
# Upstream release URL. Cribl's CDN uses two different filename patterns:
#   - versioned release: https://cdn.cribl.io/dl/4.12.2/cribl-4.12.2-linux-x64.tgz
#   - rolling "latest":  https://cdn.cribl.io/dl/latest/cribl-linux-x64.tgz    (no version in filename)
# Group vars for the `cribl_edge` group override this with a MinIO mirror URL
# because the cribl-edge containers have the `outbound-internal` firewall and
# cannot reach cdn.cribl.io directly.
cribl_edge_tarball_url: >-
  https://cdn.cribl.io/dl/{{ cribl_edge_version }}/{{
  'cribl-linux-x64.tgz' if cribl_edge_version == 'latest'
  else 'cribl-' + cribl_edge_version + '-linux-x64.tgz' }}
cribl_edge_install_dir: /opt/cribl

# Service user
cribl_edge_user: cribl
cribl_edge_group: cribl

# Systemd service — the unit file is created by `cribl boot-start enable`,
# which derives the service name from the Cribl operating mode. With
# `cribl mode-edge`, the unit is installed as `cribl-edge.service`.
cribl_edge_service_name: cribl-edge

# Syslog ports from tofu constants (no hardcoded values)
cribl_edge_syslog_ports: >-
  {{ hostvars['localhost']['tofu_data']['constants']['syslog_ports'].values() | list }}

# Syslog port mappings with names (for input/pipeline config)
cribl_edge_syslog_port_mappings: >-
  {{ hostvars['localhost']['tofu_data']['constants']['syslog_ports'] }}

# Edge API bind port from tofu constants (no hardcoded values).
# Templated into local/edge/cribl.yml with host 0.0.0.0 so the API is
# reachable from the internal network, not just 127.0.0.1.
cribl_edge_api_port: >-
  {{ hostvars['localhost']['tofu_data']['constants']['service_ports']['cribl_edge_api'] }}

# Splunk HEC configuration - derived from inventory
cribl_edge_splunk_host: "{{ hostvars['splunk']['ansible_host'] }}"
cribl_edge_hec_url: "https://{{ cribl_edge_splunk_host }}:8088"
cribl_edge_hec_token: "{{ lookup('env', 'SPLUNK_HEC_TOKEN') }}"

# netmon Telegraf HEC ingestion. The per-WAN probers (roles/netmon) push
# Splunk-HEC to this Edge on cribl_hec_input_port (group_vars/all.yml); the
# netmon pipeline stamps index=netmon and reuses the splunk_hec output above.
# Token is optional — empty accepts unauthenticated pushes from the mgmt VLAN.
cribl_edge_hec_input_port: "{{ cribl_hec_input_port | default(8088) }}"
cribl_edge_hec_input_token: "{{ lookup('env', 'NETMON_HEC_TOKEN') | default('', true) }}"
