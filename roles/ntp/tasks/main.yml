---
# NTP time synchronization role using chrony

- name: Install chrony and tzdata
  ansible.builtin.apt:
    name:
      - chrony
      - tzdata
    state: present
    update_cache: true
    cache_valid_time: 3600
  tags:
    - ntp


# Stage the rendered config, validate it, then promote — so the live file is
# replaced only after validation passes (transactional). An inline template
# `validate:` cannot be used: chronyd validates with dropped privileges (the
# _chrony user) and cannot read the template module's temp file under a
# non-root become-user's 0700 home (e.g. /home/debian/.ansible/tmp). The
# staged file lives in chronyd's own config dir and is world-readable (0644),
# so the privilege-dropped validator can read it.
- name: Render the chrony configuration to a staging file
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: "{{ ntp_config_file }}.staged"
    owner: root
    group: root
    mode: "0644"
  tags:
    - ntp

- name: Validate the staged chrony configuration
  ansible.builtin.command: "chronyd -p -f {{ ntp_config_file }}.staged"
  changed_when: false
  check_mode: false
  tags:
    - ntp

- name: Promote the validated chrony configuration
  ansible.builtin.copy:
    src: "{{ ntp_config_file }}.staged"
    dest: "{{ ntp_config_file }}"
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  notify: Restart chrony
  tags:
    - ntp

- name: Detect if running inside a system container
  # systemd-detect-virt --container: exit 0 = inside a container, exit 1 = not.
  # More reliable than ansible_virtualization_type, which LXC containers with
  # extra capabilities (e.g. nftables/WireGuard) often mis-report.
  # Proxmox host syncs the clock for LXC guests, so chrony needn't start there.
  ansible.builtin.command: systemd-detect-virt --container
  register: _ntp_virt_container
  changed_when: false
  failed_when: false
  tags:
    - ntp

- name: Enable and start chrony service
  ansible.builtin.systemd:
    name: chrony
    state: "{{ ntp_service_state }}"
    enabled: "{{ ntp_service_enabled }}"
  when: _ntp_virt_container.rc != 0
  tags:
    - ntp
