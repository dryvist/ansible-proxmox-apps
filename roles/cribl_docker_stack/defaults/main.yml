---
# Cribl Docker Stack role defaults
# Deploys Cribl Edge and Stream on Docker Swarm

# Stack name for docker stack deploy
cribl_docker_stack_name: cribl

# Docker Swarm initialization
cribl_docker_stack_swarm_advertise_addr: "{{ ansible_default_ipv4.address }}"

# Cribl image settings
cribl_docker_stack_image: "cribl/cribl:latest"

# Cribl Edge configuration
# Note: Sized for 4GB VM with 4 total replicas (2 Edge + 2 Stream)
# Memory increased from 768M to 1024M to prevent OOM kills (exit 137)
cribl_docker_stack_edge_replicas: 2
cribl_docker_stack_edge_cpu_limit: "1"
cribl_docker_stack_edge_memory_limit: "1024M"
cribl_docker_stack_edge_cpu_reservation: "0.5"
cribl_docker_stack_edge_memory_reservation: "256M"

# Cribl Stream configuration
# Memory increased from 768M to 1024M to prevent OOM kills (exit 137)
# Single replica sufficient for current workload
cribl_docker_stack_stream_replicas: 1
cribl_docker_stack_stream_cpu_limit: "1"
cribl_docker_stack_stream_memory_limit: "1024M"
cribl_docker_stack_stream_cpu_reservation: "0.5"
cribl_docker_stack_stream_memory_reservation: "256M"

# Syslog ports - matches the port assignment table
cribl_docker_stack_syslog_ports:
  - 1514  # UniFi
  - 1515  # Palo Alto
  - 1516  # Cisco ASA
  - 1517  # Linux hosts
  - 1518  # Windows

# NetFlow port
cribl_docker_stack_netflow_port: 2055

# Cribl web UI ports
cribl_docker_stack_edge_web_port: 9000
cribl_docker_stack_stream_web_port: 9100

# Internal domain for hostname resolution. Currently unconsumed (no template or
# task references it), repointed to PROXMOX_SUBDOMAIN to match the DNS split
# (Technitium is authoritative for the subdomain; the apex forwards to the gateway).
cribl_docker_stack_internal_domain: "{{ lookup('env', 'PROXMOX_SUBDOMAIN') }}"

# Health check settings - lenient for slow startup and edge cases
cribl_docker_stack_healthcheck_interval: "60s"
cribl_docker_stack_healthcheck_timeout: "30s"
cribl_docker_stack_healthcheck_retries: 5
cribl_docker_stack_healthcheck_start_period: "120s"

# Splunk HEC configuration
# IP derived from inventory (NEVER hardcoded)
cribl_docker_stack_splunk_host: "{{ hostvars['splunk']['ansible_host'] }}"
cribl_docker_stack_hec_url: "https://{{ cribl_docker_stack_splunk_host }}:8088"
cribl_docker_stack_hec_token: "{{ lookup('env', 'SPLUNK_HEC_TOKEN') }}"
# TLS verification for HEC endpoint (disable for self-signed certs)
cribl_docker_stack_hec_tls_verify: false

# Config directory on host for bind mounts
cribl_docker_stack_config_dir: /opt/cribl/config
