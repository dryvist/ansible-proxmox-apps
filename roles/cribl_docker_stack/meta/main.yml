---
galaxy_info:
  author: JacobPEvans
  description: Deploy Cribl Edge and Stream on Docker Swarm with HA
  license: Apache-2.0
  min_ansible_version: "2.15"

  platforms:
    - name: Debian
      versions:
        - bookworm
        - trixie
    - name: Ubuntu
      versions:
        - jammy
        - noble

  galaxy_tags:
    - cribl
    - docker
    - swarm
    - logging
    - syslog
    - observability

dependencies:
  # Shared Docker-in-LXC bootstrap (docker-ce + compose plugin). Swarm runs on the
  # host storage driver, so fuse-overlayfs and daemon.json are skipped. Manages a
  # venv (docker_stack / docker_swarm* are SDK-based) and sets it as the global
  # interpreter for the whole role; jsondiff is required for stack change
  # detection. The role has no apt tasks of its own, so a global venv interpreter
  # is safe.
  - role: docker_engine
    docker_engine_install_fuse_overlayfs: false
    docker_engine_manage_venv: true
    docker_engine_set_global_interpreter: true
    docker_engine_venv_extra_packages:
      - jsondiff
