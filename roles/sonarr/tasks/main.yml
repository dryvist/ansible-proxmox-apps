---
# sonarr — minimal LAN-only install (skeleton).

- name: Install Sonarr prerequisites
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - sqlite3
      - libicu-dev
      # Required by community.general.xml (servarr_wiring sets <ApiKey> in
      # config.xml on this host); without it the wiring fails to import lxml.
      - python3-lxml
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create media group
  ansible.builtin.group:
    name: "{{ sonarr_group }}"
    gid: "{{ sonarr_group_gid }}"
    system: true
    state: present

- name: Create sonarr service user
  ansible.builtin.user:
    name: "{{ sonarr_user }}"
    group: "{{ sonarr_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ sonarr_data_dir }}"
    create_home: false
    state: present

# Container-local app dir — owned by the service user (chownable: it lives on
# the container rootfs, not the shared mount).
- name: Ensure sonarr data directory exists
  ansible.builtin.file:
    path: "{{ sonarr_data_dir }}"
    state: directory
    owner: "{{ sonarr_user }}"
    group: "{{ sonarr_group }}"
    mode: "2775"

# Shared /data library roots are created host-side by the media_lxc_features
# role (owner root, group media/gid 13000, setgid + group-writable) and exposed
# via the unprivileged-LXC idmap. Sonarr reaches them through media-group
# membership, so only ensure they EXIST here — never chown/chmod the shared
# bind-mount (its host-root owner is unmapped inside the container -> EPERM).
- name: Ensure the shared /data library roots exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    # Declares the host-side contract (media_lxc_features sets 2775 + setgid);
    # a match means no chmod is attempted, so the unmapped-owner mount is never
    # touched. Owner/group are deliberately NOT enforced here.
    mode: "2775"
  loop:
    - "{{ sonarr_media_dir }}"
    - "{{ sonarr_tv_dir }}"

# ---------------------------------------------------------------------------
# Persistence guard — refuse to start Sonarr on a non-persistent data dir
# ---------------------------------------------------------------------------
# sonarr_data_dir holds Sonarr's own database and config.xml (deterministic API
# key, auth method). Without a persistent mount there, a container rebuild
# silently resets Sonarr to a fresh install (lost history, re-provisioning
# needed) — so fail the converge instead of starting fresh silently.
- name: Check whether the Sonarr data dir is on a persistent mount
  ansible.builtin.command:
    cmd: mountpoint -q {{ sonarr_data_dir }}
  register: sonarr_data_mountpoint
  changed_when: false
  failed_when: false
  when: sonarr_manage_services

- name: Alert ntfy when the Sonarr data dir is NOT persistent
  ansible.builtin.uri:
    url: "{{ sonarr_ntfy_url }}"
    method: POST
    headers:
      Title: "sonarr persistence guard"
      Priority: urgent
      Tags: rotating_light
    body_format: raw
    body: >-
      {{ sonarr_data_dir }} on {{ inventory_hostname }} is NOT a persistent
      mount. Refusing to start Sonarr before the mount is fixed.
  failed_when: false
  when:
    - sonarr_manage_services
    - sonarr_data_mountpoint.rc | default(0) != 0

- name: Fail when the Sonarr data dir is NOT persistent
  ansible.builtin.fail:
    msg: >-
      {{ sonarr_data_dir }} is NOT a persistent mount. Sonarr's database and
      config are on the disposable LXC rootfs and would be LOST on the next
      container rebuild. Bind-mount a persistent dataset onto
      {{ sonarr_data_dir }}, then re-run this converge.
  when:
    - sonarr_manage_services
    - sonarr_data_mountpoint.rc | default(0) != 0

- name: Check if Sonarr is already installed
  ansible.builtin.stat:
    path: "{{ sonarr_install_dir }}/Sonarr"
  register: sonarr_bin

- name: Download + extract Sonarr
  ansible.builtin.unarchive:
    src: "{{ sonarr_tarball_url }}"
    dest: /opt
    remote_src: true
    owner: "{{ sonarr_user }}"
    group: "{{ sonarr_group }}"
  register: sonarr_download
  until: sonarr_download is succeeded
  retries: "{{ sonarr_download_retries }}"
  delay: "{{ sonarr_download_retry_delay }}"
  when: not sonarr_bin.stat.exists

- name: Deploy Sonarr systemd unit
  ansible.builtin.template:
    src: sonarr.service.j2
    dest: /etc/systemd/system/sonarr.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart sonarr

- name: Enable + start Sonarr
  ansible.builtin.systemd:
    name: sonarr.service
    state: started
    enabled: true
    daemon_reload: true
  when: sonarr_manage_services

# Self-own the deterministic API key + auth so Sonarr answers on SONARR_API_KEY
# immediately — independent of download_vpn / servarr_wiring ordering.
- name: Self-own Sonarr's deterministic API key + auth
  ansible.builtin.include_tasks: api_key.yml
