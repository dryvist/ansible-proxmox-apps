---
# sonarr — minimal LAN-only install (skeleton).

- name: Install Sonarr prerequisites
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - sqlite3
      - libicu-dev
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create media group
  ansible.builtin.group:
    name: "{{ sonarr_group }}"
    gid: "{{ sonarr_group_gid }}"
    system: true
    state: present

- name: Create sonarr service user
  ansible.builtin.user:
    name: "{{ sonarr_user }}"
    group: "{{ sonarr_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ sonarr_data_dir }}"
    create_home: false
    state: present

- name: Ensure sonarr data + media directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ sonarr_user }}"
    group: "{{ sonarr_group }}"
    mode: "2775"
  loop:
    - "{{ sonarr_data_dir }}"
    - "{{ sonarr_media_dir }}"
    - "{{ sonarr_tv_dir }}"

- name: Check if Sonarr is already installed
  ansible.builtin.stat:
    path: "{{ sonarr_install_dir }}/Sonarr"
  register: sonarr_bin

- name: Download + extract Sonarr
  ansible.builtin.unarchive:
    src: "{{ sonarr_tarball_url }}"
    dest: /opt
    remote_src: true
    owner: "{{ sonarr_user }}"
    group: "{{ sonarr_group }}"
  when: not sonarr_bin.stat.exists

- name: Deploy Sonarr systemd unit
  ansible.builtin.template:
    src: sonarr.service.j2
    dest: /etc/systemd/system/sonarr.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart sonarr

- name: Enable + start Sonarr
  ansible.builtin.systemd:
    name: sonarr.service
    state: started
    enabled: true
    daemon_reload: true
  when: sonarr_manage_services
