---
# sonarr role defaults — LAN-only TV PVR. No VPN.
# Skeleton: minimal install + service; flesh out indexers/download clients via
# the Sonarr UI (it talks to Prowlarr + qBittorrent on download-vpn over LAN).
sonarr_user: media
sonarr_group: media
sonarr_group_gid: 13000
sonarr_install_dir: /opt/Sonarr
sonarr_data_dir: /var/lib/sonarr
# TRaSH single-filesystem layout: media + torrents live on ONE bind-mounted
# /data dataset so imports hardlink (zero-copy). Sonarr's library root is
# /data/media/tv (the unified layout renames the old "shows" tree to "tv").
sonarr_media_dir: /data/media
sonarr_tv_dir: "{{ sonarr_media_dir }}/tv"
sonarr_downloads_dir: /data/torrents
# Web UI port from tofu constants (no hardcoded port).
sonarr_web_port: "{{ tofu_data.constants.media_ports.sonarr_web }}"
sonarr_tarball_url: >-
  https://services.sonarr.tv/v1/download/main/latest?version=4&os=linux&arch=x64
sonarr_manage_services: true

# --- Self-owned deterministic API key + auth (decoupled from servarr_wiring) --
# Sonarr sets its OWN <ApiKey> + auth method in config.xml right after install,
# so it answers on the deterministic key as soon as this role runs — without
# waiting on download_vpn / servarr_wiring (which run from behind the Proton
# VPN). Consumers like Seerr can then authenticate against Sonarr regardless of
# VPN/ordering. servarr_wiring still owns ALL cross-app wiring; it no longer
# touches Sonarr's own key. From SOPS env; never committed.
sonarr_api_key: "{{ lookup('env', 'SONARR_API_KEY') | default('', true) }}"
# v4 refuses to serve the UI with AuthenticationMethod=None. "External" delegates
# auth to the reverse proxy and "DisabledForLocalAddresses" lets LAN requests
# through without a login prompt — matching the servarr_wiring defaults.
sonarr_auth_method: External
sonarr_auth_required: DisabledForLocalAddresses

# ntfy alert target for the persistent-mount guard (tasks/main.yml) —
# FQDN-first: the Traefik-fronted service name (see service_deadman).
sonarr_ntfy_url: >-
  https://ntfy.{{ tofu_data.domain }}/{{ sonarr_ntfy_topic }}
sonarr_ntfy_topic: "persistence"
