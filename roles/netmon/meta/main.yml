---
galaxy_info:
  author: JacobPEvans
  description: >-
    Per-WAN network-diagnosis prober — Telegraf (Docker-in-LXC) running native
    active probes plus per-uplink device telemetry (DOCSIS SNMP / Starlink gRPC),
    shipped Splunk-HEC to Cribl Edge -> Splunk netmon index.
  license: Apache-2.0
  min_ansible_version: "2.15"

  platforms:
    - name: Debian
      versions:
        - bookworm
        - trixie
    - name: Ubuntu
      versions:
        - jammy
        - noble

  galaxy_tags:
    - netmon
    - telegraf
    - monitoring
    - network
    - docker

dependencies:
  # community.docker collection is specified in requirements.yml.
  # Shared Docker-in-LXC bootstrap. netmon deploys via docker_compose_v2 (CLI,
  # no docker SDK / venv needed); it only pins the storage driver via
  # daemon.json (netmon_docker_storage_driver is vfs under molecule).
  - role: docker_engine
    docker_engine_configure_daemon_json: true
    docker_engine_storage_driver: "{{ netmon_docker_storage_driver }}"
