---
# netmon handlers

# Use state: present with recreate: always so config-only changes (a new
# telegraf.conf or compose file that doesn't restart the running container)
# trigger a full recreate against the rendered config. state: restarted only
# restarts the existing container with its old config.
- name: Restart netmon stack
  community.docker.docker_compose_v2:
    project_src: "{{ netmon_data_dir }}"
    state: present
    recreate: always
