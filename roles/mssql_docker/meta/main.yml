---
galaxy_info:
  author: JacobPEvans
  description: Deploy Microsoft SQL Server 2022 in Docker on an LXC container
  license: Apache-2.0
  min_ansible_version: "2.15"

  platforms:
    - name: Debian
      versions:
        - bookworm
        - trixie
    - name: Ubuntu
      versions:
        - jammy
        - noble

  galaxy_tags:
    - mssql
    - sqlserver
    - docker
    - database

dependencies:
  # Shared Docker-in-LXC bootstrap (docker-ce + compose plugin). Runs on the host
  # storage driver, so fuse-overlayfs and daemon.json are skipped. Manages a venv
  # (the health check uses the SDK-based docker_container_exec) and sets it as the
  # global interpreter; the role has no apt tasks of its own, so that is safe.
  - role: docker_engine
    docker_engine_install_fuse_overlayfs: false
    docker_engine_manage_venv: true
    docker_engine_set_global_interpreter: true
