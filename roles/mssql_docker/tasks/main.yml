---
# Docker itself (docker-ce + compose plugin) is installed by the docker_engine
# meta dependency (meta/main.yml), which also creates the SDK venv and sets it as
# the global interpreter used by the docker_container_exec health check below.

# =============================================================================
# Data Directory Setup
# =============================================================================

- name: Create MSSQL data directories
  # Microsoft's official SQL Server 2022 Linux container runs as UID 10001
  # (internal user `mssql`) and GID 0 (root group). The host directories
  # mounted at /var/opt/mssql/{data,log,backup} must be writable by that
  # UID or SQL Server fails to bootstrap with:
  #   ERROR: Setup FAILED copying system data file 'C:\templatedata\master.mdf'
  #   to '/var/opt/mssql/data/master.mdf':  5(Access is denied.)
  # owner: "10001" grants write access without relying on world-writable dirs.
  # Source: https://learn.microsoft.com/en-us/sql/linux/quickstart-install-connect-docker
  ansible.builtin.file:
    path: "{{ mssql_docker_data_dir }}/{{ item }}"
    state: directory
    owner: "10001"
    group: root
    mode: "0770"
  loop:
    - data
    - log
    - backup

# =============================================================================
# Docker Compose Deployment
# =============================================================================

- name: Deploy docker-compose template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ mssql_docker_data_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: restart mssql

- name: Deploy SQL Server via docker-compose
  community.docker.docker_compose_v2:
    project_src: "{{ mssql_docker_data_dir }}"
    state: present
  no_log: true
  changed_when: false

# =============================================================================
# Health Check
# =============================================================================

- name: Wait for SQL Server port to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ mssql_docker_port }}"
    timeout: 120
    delay: 10

- name: Verify SQL Server is accepting connections
  community.docker.docker_container_exec:
    container: "{{ mssql_docker_container_name }}"
    argv:
      - /opt/mssql-tools18/bin/sqlcmd
      - -S
      - localhost
      - -U
      - sa
      - -Q
      - SELECT @@VERSION
      - -C
      - -l
      - "30"
    env:
      SQLCMDPASSWORD: "{{ mssql_docker_sa_password }}"
  register: mssql_docker_version_check
  retries: 6
  delay: 10
  until: (mssql_docker_version_check.rc | default(-1)) == 0
  changed_when: false
  no_log: true
  tags: [molecule-notest]

- name: Show SQL Server version
  ansible.builtin.debug:
    msg: "{{ mssql_docker_version_check.stdout_lines[0] }}"
  tags: [molecule-notest]

# =============================================================================
# Sample Database Restoration
# =============================================================================

- name: Restore sample databases
  ansible.builtin.include_tasks: restore_samples.yml
  when: mssql_docker_restore_samples | bool
