---
galaxy_info:
  author: Jacob Evans
  description: >-
    Self-hosted, zero-cloud LangGraph on an LXC via Docker Compose: the
    open-source in-memory `langgraph dev` server (langgraph-cli[inmem]) serving a
    seed ReAct graph, plus a self-hosted Agent Chat UI built from source. No
    LangSmith key and no cloud egress; runs are traced to the homelab Cribl OTLP
    pipeline. Wired to the LiteLLM router for its model backend.
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: Debian
      versions:
        - bookworm
  galaxy_tags:
    - ai
    - llm
    - langgraph
    - docker

dependencies:
  # Shared Docker-in-LXC bootstrap (docker-ce + compose plugin, LXC-conditional
  # fuse-overlayfs). configure_daemon_json pins the fuse-overlayfs storage driver
  # (required on ZFS-backed LXC). No venv: deploys via docker_compose_v2 (CLI).
  - role: docker_engine
    docker_engine_configure_daemon_json: true

collections:
  - community.docker
