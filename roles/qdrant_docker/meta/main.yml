---
galaxy_info:
  author: JacobPEvans
  description: Deploy Qdrant vector database as a Docker container
  license: Apache-2.0
  min_ansible_version: "2.15"

  platforms:
    - name: Debian
      versions:
        - bookworm
        - trixie
    - name: Ubuntu
      versions:
        - jammy
        - noble

  galaxy_tags:
    - qdrant
    - docker
    - vectordb
    - ai

dependencies:
  # Shared Docker-in-LXC bootstrap (docker-ce + compose plugin, LXC-conditional
  # fuse-overlayfs). Writes daemon.json with the role's storage driver. No venv:
  # deploys via docker_compose_v2 (CLI).
  - role: docker_engine
    docker_engine_configure_daemon_json: true
    docker_engine_storage_driver: "{{ qdrant_docker_storage_driver }}"
