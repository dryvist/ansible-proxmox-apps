---
# Idempotent Jellyseerr service registration via its settings API.
#
# Pattern (matches the repo's house style — GET-then-POST, no bespoke scripts):
#   1. GET the current Jellyseerr settings for each service type.
#   2. Resolve the target *arr's first quality profile id (Jellyseerr requires
#      activeProfileId on a Radarr/Sonarr server entry).
#   3. POST the server only when no entry with the same hostname exists yet.
#
# All calls authenticate with the deterministic X-Api-Key. Plex registration is
# skipped unless a Plex token is provided (documented manual step otherwise).

- name: Register Radarr in Jellyseerr
  when: jellyseerr_radarr_api_key | length > 0
  block:
    - name: Get Radarr quality profiles (for activeProfileId)
      ansible.builtin.uri:
        url: "http://{{ jellyseerr_radarr_hostname }}:{{ jellyseerr_radarr_port }}/api/v3/qualityprofile"
        method: GET
        headers:
          X-Api-Key: "{{ jellyseerr_radarr_api_key }}"
        status_code: 200
      register: jellyseerr_radarr_profiles
      changed_when: false
      no_log: true

    - name: Read existing Jellyseerr Radarr servers
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ jellyseerr_web_port }}/api/v1/settings/radarr"
        method: GET
        headers:
          X-Api-Key: "{{ jellyseerr_api_key }}"
        status_code: 200
      register: jellyseerr_radarr_existing
      changed_when: false
      no_log: true

    - name: Add Radarr to Jellyseerr (idempotent)
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ jellyseerr_web_port }}/api/v1/settings/radarr"
        method: POST
        headers:
          X-Api-Key: "{{ jellyseerr_api_key }}"
        body_format: json
        body:
          name: radarr
          hostname: "{{ jellyseerr_radarr_hostname }}"
          port: "{{ jellyseerr_radarr_port | int }}"
          useSsl: "{{ jellyseerr_radarr_use_ssl }}"
          apiKey: "{{ jellyseerr_radarr_api_key }}"
          activeProfileId: "{{ (jellyseerr_radarr_profiles.json | first).id }}"
          activeProfileName: "{{ (jellyseerr_radarr_profiles.json | first).name }}"
          activeDirectory: "{{ jellyseerr_radarr_root_folder }}"
          is4k: false
          isDefault: true
          syncEnabled: true
          preventSearch: false
          minimumAvailability: released
        status_code: [200, 201]
      register: jellyseerr_radarr_add
      changed_when: jellyseerr_radarr_add.status in [200, 201]
      no_log: true
      when:
        - jellyseerr_radarr_profiles.json | length > 0
        - >-
          jellyseerr_radarr_existing.json
          | selectattr('hostname', 'equalto', jellyseerr_radarr_hostname)
          | list | length == 0

- name: Register Sonarr in Jellyseerr
  when: jellyseerr_sonarr_api_key | length > 0
  block:
    - name: Get Sonarr quality profiles (for activeProfileId)
      ansible.builtin.uri:
        url: "http://{{ jellyseerr_sonarr_hostname }}:{{ jellyseerr_sonarr_port }}/api/v3/qualityprofile"
        method: GET
        headers:
          X-Api-Key: "{{ jellyseerr_sonarr_api_key }}"
        status_code: 200
      register: jellyseerr_sonarr_profiles
      changed_when: false
      no_log: true

    - name: Read existing Jellyseerr Sonarr servers
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ jellyseerr_web_port }}/api/v1/settings/sonarr"
        method: GET
        headers:
          X-Api-Key: "{{ jellyseerr_api_key }}"
        status_code: 200
      register: jellyseerr_sonarr_existing
      changed_when: false
      no_log: true

    - name: Add Sonarr to Jellyseerr (idempotent)
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ jellyseerr_web_port }}/api/v1/settings/sonarr"
        method: POST
        headers:
          X-Api-Key: "{{ jellyseerr_api_key }}"
        body_format: json
        body:
          name: sonarr
          hostname: "{{ jellyseerr_sonarr_hostname }}"
          port: "{{ jellyseerr_sonarr_port | int }}"
          useSsl: "{{ jellyseerr_sonarr_use_ssl }}"
          apiKey: "{{ jellyseerr_sonarr_api_key }}"
          activeProfileId: "{{ (jellyseerr_sonarr_profiles.json | first).id }}"
          activeProfileName: "{{ (jellyseerr_sonarr_profiles.json | first).name }}"
          activeDirectory: "{{ jellyseerr_sonarr_root_folder }}"
          is4k: false
          isDefault: true
          syncEnabled: true
          preventSearch: false
        status_code: [200, 201]
      register: jellyseerr_sonarr_add
      changed_when: jellyseerr_sonarr_add.status in [200, 201]
      no_log: true
      when:
        - jellyseerr_sonarr_profiles.json | length > 0
        - >-
          jellyseerr_sonarr_existing.json
          | selectattr('hostname', 'equalto', jellyseerr_sonarr_hostname)
          | list | length == 0

# Plex registration needs an account-scoped Plex token. Skipped (and surfaced as
# a manual step in the README) unless PLEX_CLAIM_TOKEN is populated in SOPS.
- name: Note that Plex registration is a manual step (no token provided)
  ansible.builtin.debug:
    msg: >-
      Jellyseerr Plex registration SKIPPED — PLEX_CLAIM_TOKEN is unset. Link Plex
      in the Jellyseerr UI (Settings -> Plex) or populate PLEX_CLAIM_TOKEN in SOPS
      to automate it. See roles/jellyseerr/README.md.
  when: jellyseerr_plex_token | length == 0
