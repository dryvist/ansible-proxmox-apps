---
# Idempotent, self-healing Jellyseerr service registration via its settings API.
#
# Jellyseerr's /api/v1/settings/* endpoints require the OWNER user (id 1), which
# only exists after a Plex sign-in. On a fresh install there is no owner, so those
# endpoints return 403 even with a valid X-Api-Key. So we:
#   1. Discover the Plex account token (PlexOnlineToken from the claimed server, or
#      the PLEX_TOKEN override).
#   2. Sign the owner in via /api/v1/auth/plex (the same call the UI's "Sign in
#      with Plex" makes) — this creates the owner on first call.
#   3. Only once an owner exists, register Sonarr/Radarr (GET-then-PUT-always, so a
#      SOPS key rotation reconciles), then point Plex + sync libraries.
#
# Everything is NON-FATAL: with no token / unclaimed Plex there is no owner and we
# skip registration with a clear note instead of failing the play. Re-running
# after claiming Plex completes it. This wiring is also OFF the path to watching
# on Roku — Plex serves Roku directly.

# --- Live API key -----------------------------------------------------------
# Jellyseerr 2.7.x generates its OWN apiKey on first init and ignores the seeded
# main.apiKey, so the deterministic key never authenticates. Read the live key
# straight from the running settings.json and use it for every Jellyseerr API
# call below (the *arr GETs still use their own deterministic keys).

- name: Read the live Jellyseerr API key (the app regenerates it on init)
  ansible.builtin.slurp:
    src: "{{ jellyseerr_config_dir }}/settings.json"
  register: jellyseerr_live_settings
  no_log: true

- name: Use the live API key for all Jellyseerr API calls
  ansible.builtin.set_fact:
    jellyseerr_api_key: "{{ (jellyseerr_live_settings.content | b64decode | from_json).main.apiKey }}"
  no_log: true

# --- Owner bootstrap ---------------------------------------------------------

- name: Discover the Plex server token from Preferences.xml (on the plex host)
  ansible.builtin.slurp:
    src: "{{ jellyseerr_plex_preferences_path }}"
  delegate_to: "{{ jellyseerr_plex_inventory_host }}"
  register: jellyseerr_plex_prefs
  failed_when: false
  no_log: true

- name: Resolve the effective Plex token (PLEX_TOKEN override, else PlexOnlineToken)
  ansible.builtin.set_fact:
    jellyseerr_plex_effective_token: >-
      {{ jellyseerr_plex_token if (jellyseerr_plex_token | length > 0)
         else (jellyseerr_plex_prefs.content | default('') | b64decode
               | regex_findall('PlexOnlineToken="([^"]+)"') | first | default('')) }}
  no_log: true

- name: Check whether Jellyseerr has an admin owner yet
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ jellyseerr_web_port }}/api/v1/settings/main"
    method: GET
    headers:
      X-Api-Key: "{{ jellyseerr_api_key }}"
    status_code: [200, 401, 403]
  register: jellyseerr_owner_probe
  changed_when: false
  failed_when: false
  no_log: true

- name: Sign the owner in with the Plex token (creates owner on first call)
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ jellyseerr_web_port }}/api/v1/auth/plex"
    method: POST
    headers:
      X-Api-Key: "{{ jellyseerr_api_key }}"
    body_format: json
    body:
      authToken: "{{ jellyseerr_plex_effective_token }}"
    status_code: [200, 201, 403, 500]
  register: jellyseerr_owner_signin
  changed_when: jellyseerr_owner_signin.status in [200, 201]
  failed_when: false
  no_log: true
  when:
    - jellyseerr_owner_probe.status != 200
    - jellyseerr_plex_effective_token | length > 0

- name: Re-check whether Jellyseerr has an admin owner
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ jellyseerr_web_port }}/api/v1/settings/main"
    method: GET
    headers:
      X-Api-Key: "{{ jellyseerr_api_key }}"
    status_code: [200, 401, 403]
  register: jellyseerr_owner_probe2
  changed_when: false
  failed_when: false
  no_log: true
  when: jellyseerr_owner_probe.status != 200

- name: Decide whether registration can proceed (owner present)
  ansible.builtin.set_fact:
    jellyseerr_registration_ready: >-
      {{ (jellyseerr_owner_probe.status == 200)
         or (jellyseerr_owner_probe2.status | default(0) == 200) }}

# A token WAS available but the owner still does not exist => registration truly
# failed (invalid/expired token, sign-in error). Fail loudly instead of silently
# leaving Jellyseerr at its setup wizard. Gated by jellyseerr_require_registration.
- name: Fail when a Plex token was available but the owner could not be created
  ansible.builtin.fail:
    msg: >-
      Jellyseerr owner sign-in FAILED despite a Plex token being available
      (sign-in HTTP {{ jellyseerr_owner_signin.status | default('n/a') }}). The
      Plex token (PLEX_TOKEN / PlexOnlineToken) is likely invalid or expired —
      fix it and re-run. Leaving Jellyseerr at its setup wizard is not acceptable.
  when:
    - not (jellyseerr_registration_ready | bool)
    - jellyseerr_plex_effective_token | length > 0
    - jellyseerr_require_registration | bool

- name: Note that Jellyseerr registration is skipped (no Plex token to create an owner)
  ansible.builtin.debug:
    msg: >-
      Jellyseerr service registration SKIPPED — the app has no admin owner and no
      Plex token was available to create one. Set PLEX_TOKEN in SOPS (or claim Plex
      so Preferences.xml has a PlexOnlineToken), then re-run. Non-fatal.
  when:
    - not (jellyseerr_registration_ready | bool)
    - jellyseerr_plex_effective_token | length == 0

# --- Service registration (only once an owner exists) ------------------------

- name: Register Radarr in Jellyseerr
  when:
    - jellyseerr_registration_ready | bool
    - jellyseerr_radarr_api_key | length > 0
  block:
    - name: Get Radarr quality profiles (for activeProfileId)
      ansible.builtin.uri:
        url: "http://{{ jellyseerr_radarr_hostname }}:{{ jellyseerr_radarr_port }}/api/v3/qualityprofile"
        method: GET
        headers:
          X-Api-Key: "{{ jellyseerr_radarr_api_key }}"
        status_code: 200
      register: jellyseerr_radarr_profiles
      changed_when: false
      no_log: true

    - name: Read existing Jellyseerr Radarr servers
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ jellyseerr_web_port }}/api/v1/settings/radarr"
        method: GET
        headers:
          X-Api-Key: "{{ jellyseerr_api_key }}"
        status_code: 200
      register: jellyseerr_radarr_existing
      changed_when: false
      no_log: true

    - name: Resolve the existing Radarr entry for this hostname (if any)
      ansible.builtin.set_fact:
        jellyseerr_radarr_entry: >-
          {{
            (jellyseerr_radarr_existing.json
             | selectattr('hostname', 'equalto', jellyseerr_radarr_hostname)
             | list | first) | default({}, true)
          }}
      no_log: true

    - name: Add Radarr to Jellyseerr (create — no entry yet)
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ jellyseerr_web_port }}/api/v1/settings/radarr"
        method: POST
        headers:
          X-Api-Key: "{{ jellyseerr_api_key }}"
        body_format: json
        body:
          name: radarr
          hostname: "{{ jellyseerr_radarr_hostname }}"
          port: "{{ jellyseerr_radarr_port | int }}"
          useSsl: "{{ jellyseerr_radarr_use_ssl }}"
          apiKey: "{{ jellyseerr_radarr_api_key }}"
          activeProfileId: "{{ (jellyseerr_radarr_profiles.json | first).id }}"
          activeProfileName: "{{ (jellyseerr_radarr_profiles.json | first).name }}"
          activeDirectory: "{{ jellyseerr_radarr_root_folder }}"
          is4k: false
          isDefault: true
          syncEnabled: true
          preventSearch: false
          minimumAvailability: released
        status_code: [200, 201]
      register: jellyseerr_radarr_add
      changed_when: jellyseerr_radarr_add.status in [200, 201]
      no_log: true
      when:
        - jellyseerr_radarr_profiles.json | length > 0
        - jellyseerr_radarr_entry == {}

    # Self-heal: PUT only when the stored entry drifts from the SOPS-sourced
    # credentials/connection (apiKey rotation, port or SSL change). Comparing
    # before PUT keeps the task idempotent — no change on a converged host. The
    # PUT body preserves the entry's existing fields (combine) and overlays only
    # the reconciled connection values, so unrelated settings are untouched.
    - name: Update Radarr in Jellyseerr (reconcile drifted apiKey/port/ssl)
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ jellyseerr_web_port }}/api/v1/settings/radarr/{{ jellyseerr_radarr_entry.id }}"
        method: PUT
        headers:
          X-Api-Key: "{{ jellyseerr_api_key }}"
        body_format: json
        body: >-
          {{
            jellyseerr_radarr_entry | combine({
              'hostname': jellyseerr_radarr_hostname,
              'port': jellyseerr_radarr_port | int,
              'useSsl': jellyseerr_radarr_use_ssl,
              'apiKey': jellyseerr_radarr_api_key
            })
          }}
        status_code: [200, 201]
      register: jellyseerr_radarr_update
      changed_when: jellyseerr_radarr_update.status in [200, 201]
      no_log: true
      when:
        - jellyseerr_radarr_entry != {}
        - >-
          jellyseerr_radarr_entry.apiKey | default('') != jellyseerr_radarr_api_key
          or (jellyseerr_radarr_entry.port | default(0) | int) != (jellyseerr_radarr_port | int)
          or (jellyseerr_radarr_entry.useSsl | default(false) | bool) != (jellyseerr_radarr_use_ssl | bool)

- name: Register Sonarr in Jellyseerr
  when:
    - jellyseerr_registration_ready | bool
    - jellyseerr_sonarr_api_key | length > 0
  block:
    - name: Get Sonarr quality profiles (for activeProfileId)
      ansible.builtin.uri:
        url: "http://{{ jellyseerr_sonarr_hostname }}:{{ jellyseerr_sonarr_port }}/api/v3/qualityprofile"
        method: GET
        headers:
          X-Api-Key: "{{ jellyseerr_sonarr_api_key }}"
        status_code: 200
      register: jellyseerr_sonarr_profiles
      changed_when: false
      no_log: true

    - name: Read existing Jellyseerr Sonarr servers
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ jellyseerr_web_port }}/api/v1/settings/sonarr"
        method: GET
        headers:
          X-Api-Key: "{{ jellyseerr_api_key }}"
        status_code: 200
      register: jellyseerr_sonarr_existing
      changed_when: false
      no_log: true

    - name: Resolve the existing Sonarr entry for this hostname (if any)
      ansible.builtin.set_fact:
        jellyseerr_sonarr_entry: >-
          {{
            (jellyseerr_sonarr_existing.json
             | selectattr('hostname', 'equalto', jellyseerr_sonarr_hostname)
             | list | first) | default({}, true)
          }}
      no_log: true

    # Jellyseerr's Sonarr server entry requires a language profile id (Sonarr-only;
    # Radarr has none) and enableSeasonFolders, or the POST 400s.
    - name: Get Sonarr language profiles (for activeLanguageProfileId)
      ansible.builtin.uri:
        url: "http://{{ jellyseerr_sonarr_hostname }}:{{ jellyseerr_sonarr_port }}/api/v3/languageprofile"
        method: GET
        headers:
          X-Api-Key: "{{ jellyseerr_sonarr_api_key }}"
        status_code: [200, 404]
      register: jellyseerr_sonarr_langprofiles
      changed_when: false
      no_log: true

    - name: Add Sonarr to Jellyseerr (create — no entry yet)
      vars:
        _sonarr_langprofile_id: >-
          {{ (jellyseerr_sonarr_langprofiles.json | default([{'id': 1}])
              | first).id | default(1) }}
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ jellyseerr_web_port }}/api/v1/settings/sonarr"
        method: POST
        headers:
          X-Api-Key: "{{ jellyseerr_api_key }}"
        body_format: json
        body:
          name: sonarr
          hostname: "{{ jellyseerr_sonarr_hostname }}"
          port: "{{ jellyseerr_sonarr_port | int }}"
          useSsl: "{{ jellyseerr_sonarr_use_ssl }}"
          apiKey: "{{ jellyseerr_sonarr_api_key }}"
          activeProfileId: "{{ (jellyseerr_sonarr_profiles.json | first).id }}"
          activeProfileName: "{{ (jellyseerr_sonarr_profiles.json | first).name }}"
          activeLanguageProfileId: "{{ _sonarr_langprofile_id }}"
          activeDirectory: "{{ jellyseerr_sonarr_root_folder }}"
          enableSeasonFolders: true
          is4k: false
          isDefault: true
          syncEnabled: true
          preventSearch: false
        status_code: [200, 201]
      register: jellyseerr_sonarr_add
      changed_when: jellyseerr_sonarr_add.status in [200, 201]
      no_log: true
      when:
        - jellyseerr_sonarr_profiles.json | length > 0
        - jellyseerr_sonarr_entry == {}

    # Self-heal: PUT only when the stored entry drifts from the SOPS-sourced
    # credentials/connection (apiKey rotation, port or SSL change). Body preserves
    # the existing entry (combine) and overlays only the reconciled connection.
    - name: Update Sonarr in Jellyseerr (reconcile drifted apiKey/port/ssl)
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ jellyseerr_web_port }}/api/v1/settings/sonarr/{{ jellyseerr_sonarr_entry.id }}"
        method: PUT
        headers:
          X-Api-Key: "{{ jellyseerr_api_key }}"
        body_format: json
        body: >-
          {{
            jellyseerr_sonarr_entry | combine({
              'hostname': jellyseerr_sonarr_hostname,
              'port': jellyseerr_sonarr_port | int,
              'useSsl': jellyseerr_sonarr_use_ssl,
              'apiKey': jellyseerr_sonarr_api_key
            })
          }}
        status_code: [200, 201]
      register: jellyseerr_sonarr_update
      changed_when: jellyseerr_sonarr_update.status in [200, 201]
      no_log: true
      when:
        - jellyseerr_sonarr_entry != {}
        - >-
          jellyseerr_sonarr_entry.apiKey | default('') != jellyseerr_sonarr_api_key
          or (jellyseerr_sonarr_entry.port | default(0) | int) != (jellyseerr_sonarr_port | int)
          or (jellyseerr_sonarr_entry.useSsl | default(false) | bool) != (jellyseerr_sonarr_use_ssl | bool)

# --- Plex server settings + library sync (owner already signed in above) -----

- name: Link Plex in Jellyseerr (owner present + token available)
  when:
    - jellyseerr_registration_ready | bool
    - jellyseerr_plex_effective_token | length > 0
  block:
    - name: Point Jellyseerr's Plex server settings at the LAN Plex
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ jellyseerr_web_port }}/api/v1/settings/plex"
        method: POST
        headers:
          X-Api-Key: "{{ jellyseerr_api_key }}"
        body_format: json
        body:
          ip: "{{ jellyseerr_plex_hostname }}"
          port: "{{ jellyseerr_plex_port | int }}"
          useSsl: "{{ jellyseerr_plex_use_ssl }}"
        status_code: [200, 201, 400, 500]
      register: jellyseerr_plex_settings
      changed_when: jellyseerr_plex_settings.status in [200, 201]
      failed_when: false
      no_log: true

    - name: Sync Plex libraries into Jellyseerr
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ jellyseerr_web_port }}/api/v1/settings/plex/library?sync=true"
        method: GET
        headers:
          X-Api-Key: "{{ jellyseerr_api_key }}"
        status_code: [200, 500]
      register: jellyseerr_plex_libsync
      changed_when: false
      failed_when: false
      no_log: true

    - name: Report Jellyseerr Plex link outcome (non-fatal)
      ansible.builtin.debug:
        msg: >-
          Jellyseerr Plex link: server-settings HTTP
          {{ jellyseerr_plex_settings.status | default('n/a') }}. If not 200/201,
          finish the link once in the Jellyseerr UI (Settings -> Plex).

# --- Finalize setup (flip `initialized` → no setup wizard) -------------------
# The owner + servers can all be configured while settings.main.initialized is
# still unset, so the UI keeps showing the first-run wizard. The wizard's final
# "Finish Setup" button POSTs /api/v1/settings/initialize; do the same so the app
# comes up fully set up. Idempotent — re-calling just returns the settings.
- name: Finalize Jellyseerr setup (mark initialized, skip the wizard)
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ jellyseerr_web_port }}/api/v1/settings/initialize"
    method: POST
    headers:
      X-Api-Key: "{{ jellyseerr_api_key }}"
    status_code: [200, 201]
  register: jellyseerr_initialize
  changed_when: jellyseerr_initialize.status in [200, 201]
  failed_when: false
  no_log: true
  when: jellyseerr_registration_ready | bool

- name: Assert Jellyseerr finished initialization (no wizard left)
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ jellyseerr_web_port }}/api/v1/settings/public"
    method: GET
    status_code: 200
  register: jellyseerr_public
  changed_when: false
  failed_when: >-
    jellyseerr_require_registration | bool
    and jellyseerr_registration_ready | bool
    and not (jellyseerr_public.json.initialized | default(false) | bool)
  when: jellyseerr_registration_ready | bool
