---
# Deploy the media playback monitor (Plex transcode session probe) on the Plex
# host: one script driven by a systemd timer, alerting ntfy.

# Retire the weekly codec-audit half of this role (the AC3 pipeline it fed was
# proven unnecessary — Zammad #17040). Stop/disable/remove its live units so a
# converge cleans them up instead of leaving an orphaned timer running.
- name: Retire the codec-audit systemd timer
  ansible.builtin.systemd:
    name: plex-codec-audit.timer
    state: stopped
    enabled: false
  failed_when: false
  when: media_monitor_manage | bool

- name: Remove the retired codec-audit units + script
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/systemd/system/plex-codec-audit.timer
    - /etc/systemd/system/plex-codec-audit.service
    - "{{ media_monitor_bin_dir }}/plex-codec-audit.sh"
  notify: Reload systemd for media monitor
  when: media_monitor_manage | bool

- name: Ensure the monitor state directory exists
  ansible.builtin.file:
    path: "{{ media_monitor_state_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: media_monitor_manage | bool

- name: Deploy the media monitor scripts
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "{{ media_monitor_bin_dir }}/{{ item }}"
    owner: root
    group: root
    mode: "0755"
  loop:
    - plex-session-probe.sh
  when: media_monitor_manage | bool

- name: Deploy the media monitor systemd service units
  ansible.builtin.template:
    src: "{{ item }}.service.j2"
    dest: "/etc/systemd/system/{{ item }}.service"
    owner: root
    group: root
    mode: "0644"
  loop:
    - plex-session-probe
  notify: Reload systemd for media monitor
  when: media_monitor_manage | bool

- name: Deploy the media monitor systemd timer units
  ansible.builtin.template:
    src: "{{ item }}.timer.j2"
    dest: "/etc/systemd/system/{{ item }}.timer"
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd for media monitor
  loop:
    - plex-session-probe
  when: media_monitor_manage | bool

- name: Enable + start the media monitor timers
  ansible.builtin.systemd:
    name: "{{ item }}.timer"
    state: started
    enabled: true
    daemon_reload: true
  loop:
    - plex-session-probe
  when: media_monitor_manage | bool
