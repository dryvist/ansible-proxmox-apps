---
# download_vpn deploy-time validation (validation layer 2).
#
# Imported at the END of the role so it runs on EVERY ansible-playbook run.
# Any failed assertion FAILS the play — the killswitch is a merge/deploy gate,
# not advisory. Covers IPv4 AND IPv6 egress.
#
# Skipped when services are not managed (download_vpn_manage_services=false) —
# i.e. render-only runs such as Molecule converge, where there is no live tunnel
# or loaded killswitch to validate. In that case the molecule verify.yml
# exercises the killswitch logic directly. On a real deploy manage_services is
# true, so these fail-closed leak assertions run and gate the play.

- name: Validate killswitch + VPN lock (deploy-time, fail-closed)
  when: download_vpn_manage_services | bool
  block:
    # --- A. nftables killswitch present + default drop ---------------------
    - name: Read killswitch output chain
      ansible.builtin.command:
        cmd: nft list chain inet killswitch output
      register: download_vpn_nft_output
      changed_when: false

    - name: Assert killswitch table present + output policy is DROP
      ansible.builtin.assert:
        that:
          - "'policy drop' in download_vpn_nft_output.stdout"
        fail_msg: >-
          KILLSWITCH NOT ACTIVE: 'inet killswitch' output chain is missing or
          its policy is not 'drop'. Refusing to proceed.
        success_msg: "Killswitch output policy is DROP."

    - name: Assert killswitch allows ONLY loopback/LAN/endpoint/wg0
      # No accept rule may reference a non-loopback, non-wg0, non-LAN, non-endpoint
      # destination. We assert the expected allow rules exist and that the chain
      # contains a terminal drop (the policy) plus the explicit log+drop.
      ansible.builtin.assert:
        that:
          - "'oif \"lo\" accept' in download_vpn_nft_output.stdout"
          - "download_vpn_wg_interface in download_vpn_nft_output.stdout"
          - "download_vpn_lan_subnet.split('/')[0] in download_vpn_nft_output.stdout"
          - "'counter packets' in download_vpn_nft_output.stdout or 'drop' in download_vpn_nft_output.stdout"
        fail_msg: "Killswitch ruleset is missing one of the required allow rules."

    - name: Assert every configured Proton endpoint is permitted (failover-ready)
      # Each primary+backup endpoint must have an accept rule; otherwise a
      # failover to that endpoint would be blocked fail-closed by the killswitch.
      ansible.builtin.assert:
        that:
          - item.host in download_vpn_nft_output.stdout
        fail_msg: >-
          Killswitch does not permit Proton endpoint {{ item.host }} — a failover
          to it would be blocked fail-closed.
        quiet: true
      loop: "{{ download_vpn_endpoints_resolved }}"
      loop_control:
        label: "{{ item.host }}"

    # --- B. internet-bound IPv4 traffic egresses via wg0 (Table=auto) ------
    # wg-quick `Table = auto` installs the tunnel default in a SEPARATE fwmark
    # routing table (51820), not the main table — so the main-table default stays
    # on the LAN NIC by design, and the WireGuard-encrypted packets (fwmark-tagged)
    # intentionally use it to reach the Proton endpoint. The correct invariant is
    # therefore behavioural: an unmarked, internet-bound packet must resolve out
    # wg0 via the policy rule. `ip route get` performs that lookup without sending
    # anything.
    - name: Resolve the egress route for internet-bound IPv4 traffic
      ansible.builtin.command:
        cmd: ip -4 route get {{ download_vpn_route_probe_ip }}
      register: download_vpn_route_get
      changed_when: false

    - name: Assert internet-bound IPv4 traffic egresses via wg0
      ansible.builtin.assert:
        that:
          - "'dev ' ~ download_vpn_wg_interface in download_vpn_route_get.stdout"
        fail_msg: >-
          Internet-bound IPv4 traffic does not route via {{ download_vpn_wg_interface }}
          (Table=auto policy routing missing/broken): {{ download_vpn_route_get.stdout }}
        success_msg: "Internet-bound IPv4 traffic egresses via {{ download_vpn_wg_interface }}."

    # --- C. no IPv6 default route ------------------------------------------
    - name: Read IPv6 default routes
      ansible.builtin.command:
        cmd: ip -6 route show default
      register: download_vpn_v6_route
      changed_when: false

    - name: Assert there is NO IPv6 default route
      ansible.builtin.assert:
        that:
          - download_vpn_v6_route.stdout | trim | length == 0
        fail_msg: >-
          An IPv6 default route exists (must be none — IPv6 is disabled):
          {{ download_vpn_v6_route.stdout }}

    # --- D. qBittorrent bound to wg0 ---------------------------------------
    - name: Log in to qBittorrent WebUI
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ download_vpn_qbittorrent_web_port }}/api/v2/auth/login"
        method: POST
        body_format: form-urlencoded
        body:
          username: admin
          password: "{{ download_vpn_qbittorrent_admin_password }}"
        status_code: 200
      register: download_vpn_qbt_login
      no_log: true
      changed_when: false

    - name: Read qBittorrent preferences
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ download_vpn_qbittorrent_web_port }}/api/v2/app/preferences"
        method: GET
        headers:
          Cookie: "{{ download_vpn_qbt_login.set_cookie | default('') }}"
        return_content: true
        status_code: 200
      register: download_vpn_qbt_prefs
      changed_when: false

    - name: Assert qBittorrent is bound to wg0
      ansible.builtin.assert:
        that:
          - download_vpn_wg_interface in (download_vpn_qbt_prefs.json.current_network_interface | default(''))
        fail_msg: >-
          qBittorrent is bound to
          '{{ download_vpn_qbt_prefs.json.current_network_interface | default("(unset)") }}',
          expected '{{ download_vpn_wg_interface }}'.

    # --- E. live IPv4 egress via the VPN exit works ------------------------
    # noqa command-instead-of-module: the uri module cannot bind a request to a
    # specific source interface (curl --interface). Interface-scoped egress is
    # the whole point of these leak tests, so curl is required, not get_url/uri.
    - name: Check public IPv4 egress via the tunnel  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: curl -fsS --max-time 10 --interface {{ download_vpn_wg_interface }} {{ download_vpn_ip_probe_url }}
      register: download_vpn_vpn_ip
      changed_when: false
      failed_when: download_vpn_vpn_ip.rc != 0 or (download_vpn_vpn_ip.stdout | trim | length == 0)

    # --- F. forced non-VPN IPv4 egress is REFUSED --------------------------
    # Bind to the derived primary LAN interface (the NIC holding the LAN IP),
    # not a hard-coded eth0 — otherwise the test could pass for the wrong reason
    # (a non-existent eth0 simply fails to bind) if the NIC is named differently.
    - name: Attempt a forced non-VPN IPv4 egress (must be refused)  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: curl -fsS --max-time 8 --interface {{ download_vpn_lan_interface }} {{ download_vpn_ip_probe_url }}
      register: download_vpn_leak_probe
      changed_when: false
      failed_when: false

    - name: Assert non-VPN IPv4 egress is blocked
      ansible.builtin.assert:
        that:
          - download_vpn_leak_probe.rc != 0
          - (download_vpn_leak_probe.stdout | trim | length) == 0
        fail_msg: >-
          IPv4 LEAK: forced egress via {{ download_vpn_lan_interface }} succeeded
          ({{ download_vpn_leak_probe.stdout | trim }}). Killswitch is NOT
          fail-closed.

    # --- G. IPv6 egress is REFUSED -----------------------------------------
    # noqa command-instead-of-module: the uri module cannot force IPv6-only
    # (curl -6). Forcing the v6 family is the point of this leak test.
    - name: Attempt IPv6 egress (must be refused)  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: curl -fsS -6 --max-time 8 {{ download_vpn_ip_probe_url_v6 }}
      register: download_vpn_v6_probe
      changed_when: false
      failed_when: false

    - name: Assert IPv6 egress is blocked
      ansible.builtin.assert:
        that:
          - download_vpn_v6_probe.rc != 0
          - (download_vpn_v6_probe.stdout | trim | length) == 0
        fail_msg: >-
          IPv6 LEAK: egress over IPv6 succeeded
          ({{ download_vpn_v6_probe.stdout | trim }}). IPv6 must have no path.

    # --- H. LAN-reply policy routing present (functional gate, not a leak) --
    # Cross-subnet clients (e.g. Traefik) reach the web UIs only if the connmark
    # mangle table + fwmark rule + table-default route are all in place. A missing
    # route is a FUNCTIONAL failure (UIs unreachable), NOT a leak — checks A-G
    # above already prove no egress escapes the VPN — but we still gate the deploy
    # so a half-applied role is caught here rather than as a silent timeout.
    - name: Read the LAN-reply policy-routing state
      ansible.builtin.command:
        cmd: "{{ item }}"
      loop:
        - nft list table inet vpn_lanroute
        - ip rule show
        - ip route show table {{ download_vpn_lanroute_table }}
      register: download_vpn_lanroute_state
      changed_when: false
      failed_when: false

    - name: Assert LAN-reply policy routing is in place
      ansible.builtin.assert:
        that:
          - "'vpn_lanroute' in download_vpn_lanroute_state.results[0].stdout"
          - "'fwmark ' ~ download_vpn_lanroute_mark in download_vpn_lanroute_state.results[1].stdout"
          - "'lookup ' ~ download_vpn_lanroute_table in download_vpn_lanroute_state.results[1].stdout"
          - "'dev ' ~ download_vpn_lan_interface in download_vpn_lanroute_state.results[2].stdout"
          - "'unreachable default' in download_vpn_lanroute_state.results[2].stdout"
          - "'default via' not in download_vpn_lanroute_state.results[2].stdout"
        fail_msg: >-
          LAN-reply policy routing is incomplete or unsafe — expected the inet
          vpn_lanroute table, an `ip rule` for fwmark {{ download_vpn_lanroute_mark }}
          -> table {{ download_vpn_lanroute_table }}, RFC1918 reply routes via
          {{ download_vpn_lan_interface }}, and an `unreachable default` (NOT a
          `default via` clearnet route) in that table.
        success_msg: "LAN-reply policy routing present + fail-closed (no clearnet default)."

    # --- H2. syslog log-shipping egress actually routes via LAN, not wg0 -----
    # 2026-07-17 incident: rsyslog's own outbound connection to the syslog LB
    # was nftables-accepted (killswitch.nft.j2 rule 4c) but the DEFAULT route
    # still pointed at wg0, so the RFC1918 destination was black-holed toward
    # Proton and no logs ever reached Cribl/Splunk. download-vpn-lanroute.service
    # now installs a /32 for the LB in the MAIN table (step 3), so an ordinary
    # UNMARKED lookup resolves out the LAN NIC. Prove it here — no mark, because
    # the fix is deliberately mark-free (immune to wg-quick's rule ordering).
    - name: Resolve the route a NEW connection to the syslog LB would take
      vars:
        _syslog_lb: "{{ download_vpn_syslog_hosts_resolved | first | default('127.0.0.1') }}"
      ansible.builtin.command:
        cmd: ip -4 route get {{ _syslog_lb }}
      register: download_vpn_syslog_route
      changed_when: false
      failed_when: false
      when: download_vpn_syslog_hosts_resolved | default([]) | length > 0

    - name: Assert syslog log-shipping egresses via the LAN NIC, not wg0
      ansible.builtin.assert:
        that:
          - "'dev ' ~ download_vpn_lan_interface in download_vpn_syslog_route.stdout"
        fail_msg: >-
          Log shipping is silently broken: the route to the syslog LB
          ({{ download_vpn_syslog_hosts_resolved | first | default('127.0.0.1') }}) does not resolve out
          {{ download_vpn_lan_interface }} ({{ download_vpn_syslog_route.stdout | trim }}).
          It would be encapsulated toward the VPN and black-holed — this guest's
          logs would never reach Cribl/Splunk. Check the /32 main-table route in
          download-vpn-lanroute.service.
        success_msg: "Syslog log-shipping egresses via the LAN NIC (reaches Cribl/Splunk)."
      when: download_vpn_syslog_hosts_resolved | default([]) | length > 0

    # --- I. marked-path leak check (closes the validator blind spot) --------
    # Checks A-G probe only UNMARKED traffic, so they never exercise the table
    # that the lanroute fwmark rule selects. Prove that a packet carrying the
    # lanroute mark but destined for the public internet can NEVER egress the LAN
    # NIC: with the RFC1918-only + `unreachable default` table it resolves to
    # unreachable (rc != 0, empty) or wg0 — but never `dev <lan_interface>`.
    - name: Resolve the marked-reply route for an internet-bound IPv4 packet
      ansible.builtin.command:
        cmd: ip -4 route get {{ download_vpn_route_probe_ip }} mark {{ download_vpn_lanroute_mark }}
      register: download_vpn_marked_route
      changed_when: false
      failed_when: false

    - name: Assert a marked packet to the internet cannot egress the LAN NIC
      ansible.builtin.assert:
        that:
          - "'dev ' ~ download_vpn_lan_interface not in download_vpn_marked_route.stdout"
        fail_msg: >-
          LEAK SURFACE: a packet carrying the lanroute mark
          ({{ download_vpn_lanroute_mark }}) to a public dest resolves out
          {{ download_vpn_lan_interface }} ({{ download_vpn_marked_route.stdout | trim }}).
          The lanroute table must route only RFC1918 + unreachable default.
        success_msg: "Marked internet-bound packets cannot egress the LAN NIC (fail-closed)."

    # --- J. FlareSolverr egresses the SAME VPN exit IP as the tunnel --------
    # CloudFlare binds the cf_clearance cookie FlareSolverr returns to the IP
    # that solved the challenge. Prowlarr (VPN-egressing) then reuses that
    # clearance — so if FlareSolverr's Chromium ever exited a different IP than
    # wg0, every CF-gated search would fail the moment the clearance was reused.
    # Section E already fetched the tunnel's public IP (download_vpn_vpn_ip);
    # here we make FlareSolverr fetch the same probe and assert the IPs match.
    - name: Wait for FlareSolverr to be listening (headless Chromium init takes seconds)
      ansible.builtin.wait_for:
        host: "{{ download_vpn_flaresolverr_bind_host }}"
        port: "{{ download_vpn_flaresolverr_port }}"
        timeout: 90
      when: download_vpn_flaresolverr_enabled

    - name: Solve the IP-probe URL through FlareSolverr
      ansible.builtin.uri:
        url: "http://{{ download_vpn_flaresolverr_bind_host }}:{{ download_vpn_flaresolverr_port }}/v1"
        method: POST
        body_format: json
        body:
          cmd: request.get
          url: "{{ download_vpn_ip_probe_url }}"
          maxTimeout: 60000
        status_code: 200
      register: download_vpn_fs_probe
      changed_when: false
      # The port opening precedes Chromium being ready to solve the first
      # request; retry until the response actually carries an IPv4.
      retries: 5
      delay: 6
      until: >-
        (download_vpn_fs_probe.status | default(0)) == 200
        and (download_vpn_fs_probe.json.solution.response | default('', true)
             | regex_search('(\d{1,3}\.){3}\d{1,3}')) is not none
      when: download_vpn_flaresolverr_enabled

    - name: Assert FlareSolverr's egress IP equals the tunnel exit IP
      vars:
        _fs_ip: >-
          {{ (download_vpn_fs_probe.json.solution.response | default('', true)
              | regex_search('(\d{1,3}\.){3}\d{1,3}')) | default('', true) }}
        _wg_ip: "{{ download_vpn_vpn_ip.stdout | trim }}"
      ansible.builtin.assert:
        that:
          - _fs_ip | length > 0
          - _fs_ip == _wg_ip
        fail_msg: >-
          FlareSolverr egress IP ({{ _fs_ip | default('(none)') }}) does not match
          the wg0 tunnel exit IP ({{ _wg_ip }}). CloudFlare clearance solved by
          FlareSolverr would be rejected when Prowlarr reuses it — and a mismatch
          means FlareSolverr is not exiting the VPN.
        success_msg: "FlareSolverr egresses the tunnel exit IP ({{ _wg_ip }})."
      when: download_vpn_flaresolverr_enabled

    - name: Report killswitch validation success
      ansible.builtin.debug:
        msg: >-
          download-vpn killswitch validated: nft DROP active; internet-bound IPv4
          routes via {{ download_vpn_wg_interface }} (Table=auto); no IPv6 default
          route; qBittorrent bound to {{ download_vpn_wg_interface }}; VPN IPv4
          egress works; non-VPN IPv4 + all IPv6 egress refused; LAN-reply routing
          present (web UIs reachable cross-subnet); FlareSolverr egress IP matches
          the tunnel.
