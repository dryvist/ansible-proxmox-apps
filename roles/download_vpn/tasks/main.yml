---
# download_vpn — qBittorrent + Prowlarr behind Proton WireGuard with a
# fail-closed nftables killswitch. See defaults/main.yml for the security model.

# --- Phase -1: secret pre-flight (fail loud before a blank wg0.conf) ----------
# The four PROTON_WG_* values come from Doppler at runtime. If the converge runs
# under the WRONG Doppler project they resolve to empty strings and the role
# silently renders a blank/broken wg0.conf (the tunnel never comes up). Assert
# they are non-empty FIRST — before the endpoint split below uses them — and name
# the most likely cause. Gated on download_vpn_manage_services so render-only
# runs (Molecule) are unaffected; Molecule injects test PROTON_WG_* values
# regardless.
- name: Assert the Proton WireGuard secrets are present (fail loud, live only)
  ansible.builtin.assert:
    that:
      - download_vpn_wg_private_key | length > 0
      - download_vpn_wg_address | length > 0
      - download_vpn_wg_peer_public_key | length > 0
      - download_vpn_wg_endpoint | length > 0
    fail_msg: >-
      One or more PROTON_WG_* secrets are empty
      (PROTON_WG_IFACE_PRIVATE_KEY / PROTON_WG_IFACE_ADDRESS /
      PROTON_WG_PEER_PUBLIC_KEY / PROTON_WG_PEER_ENDPOINT). Rendering wg0.conf now
      would produce a blank, non-functional tunnel. This almost always means the
      converge ran under the wrong Doppler config — run under
      `doppler run`.
    quiet: true
  when: download_vpn_manage_services | bool

# The backup peer is optional, but a PARTIAL config (some backup secrets set,
# others empty) would silently disable failover while looking configured. Fail
# loud: all three backup values, or none.
- name: Assert the backup Proton secrets are all-or-nothing (fail loud on partial)
  ansible.builtin.assert:
    that:
      - >-
        ((download_vpn_wg_backup_private_key | length > 0)
         == (download_vpn_wg_backup_peer_public_key | length > 0))
        and ((download_vpn_wg_backup_private_key | length > 0)
             == (download_vpn_wg_backup_endpoint | length > 0))
    fail_msg: >-
      Partial backup Proton config. Set ALL of
      PROTON_WG_BACKUP_IFACE_PRIVATE_KEY / PROTON_WG_BACKUP_PEER_PUBLIC_KEY /
      PROTON_WG_BACKUP_PEER_ENDPOINT to enable sticky failover, or none to
      disable it.
    quiet: true
  when: download_vpn_manage_services | bool

# --- Phase 0: resolve endpoint family (v4 vs v6) ----------------------------
- name: Resolve Proton endpoint host/port
  ansible.builtin.set_fact:
    download_vpn_endpoint_host: "{{ download_vpn_wg_endpoint.split(':')[0] }}"
    download_vpn_endpoint_port: "{{ download_vpn_wg_endpoint.split(':')[1] }}"

- name: Classify Proton endpoint address family
  ansible.builtin.set_fact:
    download_vpn_endpoint_is_ipv4: "{{ download_vpn_endpoint_host is ansible.utils.ipv4 }}"

# Every Proton endpoint the killswitch must PERMIT — primary plus the backup when
# failover is configured. The fail-closed ruleset has to allow the backup
# handshake too, or a failover would be blocked by its own killswitch. Built from
# the endpoint vars — NO hardcoded IPs. host/port split mirrors the primary above.
- name: Resolve every Proton endpoint (primary + backup) for the killswitch
  ansible.builtin.set_fact:
    download_vpn_endpoints_resolved: "{{ download_vpn_endpoints_resolved | default([]) + [_ep] }}"
  vars:
    _ep:
      host: "{{ item.split(':')[0] }}"
      port: "{{ item.split(':')[1] }}"
      is_ipv4: "{{ item.split(':')[0] is ansible.utils.ipv4 }}"
  loop: >-
    {{ [download_vpn_wg_endpoint]
       + ([download_vpn_wg_backup_endpoint]
          if (download_vpn_wg_failover_enabled | bool) else []) }}

- name: Derive the IPv4-only tunnel address (drop any v6 half Proton issues)
  # Proton's Address is dual-stack ("10.2.0.2/32,fd00::.../128"); keep only the
  # IPv4 entry on the wg0 Address line so no v6 address is configured.
  ansible.builtin.set_fact:
    download_vpn_wg_address_v4: >-
      {{ download_vpn_wg_address.split(',') | map('trim')
         | select('ansible.utils.ipv4') | list | first
         | default(download_vpn_wg_address.split(',')[0] | trim) }}

# Derive the primary LAN interface — the NIC that actually holds the container's
# LAN IP — so the leak tests force non-VPN egress out the RIGHT interface even
# when the NIC is not named eth0. We must NOT use ansible_default_ipv4.interface
# (that is wg0 once the tunnel is up). Match container_ip against the gathered
# interface facts; honour an explicit override; fall back to eth0 last so
# behaviour is identical when the NIC IS eth0.
- name: Derive the primary LAN interface (the NIC holding the LAN IP)
  ansible.builtin.set_fact:
    download_vpn_lan_interface: >-
      {{ download_vpn_lan_interface
         if (download_vpn_lan_interface | length > 0)
         else (
           ansible_facts.interfaces
           | map('extract', ansible_facts)
           | selectattr('ipv4', 'defined')
           | selectattr('ipv4.address', 'defined')
           | selectattr('ipv4.address', 'equalto',
                        (download_vpn_lan_ip | default(ansible_default_ipv4.address | default(''))))
           | map(attribute='device') | list | first
           | default('eth0', true)
         ) }}

- name: Show the derived LAN interface used by the leak tests
  ansible.builtin.debug:
    msg: >-
      download-vpn leak tests will force non-VPN egress via
      '{{ download_vpn_lan_interface }}' (derived from the LAN IP, not assumed
      eth0).

# --- Phase 1: packages -------------------------------------------------------
- name: Check whether the apt proxy is reachable
  ansible.builtin.wait_for:
    host: "{{ download_vpn_apt_cacher_host }}"
    port: "{{ download_vpn_apt_cacher_port }}"
    timeout: 5
  register: download_vpn_apt_proxy
  ignore_errors: true
  changed_when: false
  when: download_vpn_apt_cacher_host | length > 0

- name: Install media + VPN + firewall packages
  ansible.builtin.apt:
    name:
      - wireguard-tools
      - openresolv  # provides /usr/sbin/resolvconf so wg-quick honours DNS=
      - nftables
      - "{{ download_vpn_qbittorrent_package }}"
      - natpmpc
      - curl
      - ca-certificates
      - iproute2
      - sqlite3
      - libicu-dev
      - gnupg
      # Required by community.general.xml (servarr_wiring sets Prowlarr's
      # <ApiKey> in config.xml on this host); without it the wiring fails on lxml.
      - python3-lxml
    state: present
    # Only refresh the cache when the proxy is reachable. A locked-down box can't
    # reach it and already has its packages, so it must not block on a fetch.
    update_cache: >-
      {{ (download_vpn_apt_cacher_host | length == 0)
         or (not (download_vpn_apt_proxy.failed | default(false))) }}
    cache_valid_time: 3600

# --- Phase 1a: unattended security upgrades ----------------------------------
# apt egress works in steady state (the default route rides the tunnel), but
# nothing ever APPLIED the downloaded updates, leaving the most
# internet-exposed guest unpatched between converges. Debian's own
# unattended-upgrades closes that: security-origin-only by default, native apt
# machinery, no bespoke scheduler. Reboots stay manual — the killswitch
# validator and the BindsTo unit chain recover services, not kernels.
- name: Install unattended-upgrades
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present
  when: download_vpn_unattended_upgrades | bool

- name: Enable periodic unattended upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      // Managed by Ansible (download_vpn role). List refresh + the
      // unattended-upgrades apply both ride the stock apt-daily timers.
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    owner: root
    group: root
    mode: "0644"
  when: download_vpn_unattended_upgrades | bool

- name: Keep unattended upgrades reboot-free
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/52unattended-upgrades-local
    content: |
      // Managed by Ansible (download_vpn role). The stock origin allowlist
      // (security only) is kept; make the no-reboot contract explicit so a
      // kernel update can never bounce the tunnel unattended.
      Unattended-Upgrade::Automatic-Reboot "false";
    owner: root
    group: root
    mode: "0644"
  when: download_vpn_unattended_upgrades | bool

# --- Phase 1b: timezone -----------------------------------------------------
# The qBittorrent scheduler evaluates SYSTEM LOCAL time, so pin the container to
# UTC (default) and express the throttle window in UTC. glibc reads the zone at
# process start, so a change restarts qBittorrent via the handler.
- name: Set container timezone (qBittorrent scheduler uses local time)
  community.general.timezone:
    name: "{{ download_vpn_timezone }}"
  notify: Restart qbittorrent

# --- Phase 2: service user / group + storage --------------------------------
- name: Create media group (shared GID with *arr LXCs)
  ansible.builtin.group:
    name: "{{ download_vpn_group }}"
    gid: "{{ download_vpn_group_gid }}"
    system: true
    state: present

- name: Create qbittorrent service user
  ansible.builtin.user:
    name: "{{ download_vpn_user }}"
    group: "{{ download_vpn_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "/home/{{ download_vpn_user }}"
    create_home: true
    state: present

- name: Ensure qbittorrent home is traversable in unprivileged LXC
  ansible.builtin.file:
    path: "/home/{{ download_vpn_user }}"
    state: directory
    mode: "0711"

# The whole shared /data tree — the /data/media library AND /data/torrents
# (incomplete/tv/movies) — is created host-side by the media_lxc_features role
# (owner root, group media/gid 13000, setgid + group-writable) and exposed via
# the unprivileged-LXC idmap. qBittorrent runs as the media user and writes via
# group membership, so only ensure the torrents roots EXIST here — never
# chown/chmod the shared bind-mount (its host-root owner is unmapped inside the
# container -> EPERM).
- name: Ensure the shared /data torrents roots exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    # Declares the host-side contract (media_lxc_features sets 2775 + setgid);
    # a match means no chmod is attempted, so the unmapped-owner mount is never
    # touched. Owner/group are deliberately NOT enforced here.
    mode: "2775"
  loop:
    - "{{ download_vpn_downloads_dir }}"
    - "{{ download_vpn_downloads_dir }}/incomplete"
    - "{{ download_vpn_downloads_dir }}/tv"
    - "{{ download_vpn_downloads_dir }}/movies"

# --- Phase 2b: persistent-storage guards (fail loud, before any app starts) -
# qBittorrent's session/queue state and Prowlarr's indexer database are only
# safe from a container rebuild if their directories are REAL persistent
# mounts, not the disposable container rootfs. This does not block destroying
# the container — it only refuses to let the app START in a state that would
# silently look fine while quietly losing its data path.
- name: Check whether the shared /data volume is a persistent mount
  ansible.builtin.command:
    cmd: mountpoint -q {{ download_vpn_data_dir }}
  register: download_vpn_data_mountpoint
  changed_when: false
  failed_when: false
  when: download_vpn_manage_services

- name: Alert ntfy when /data is NOT persistent
  ansible.builtin.uri:
    url: "{{ download_vpn_ntfy_url }}"
    method: POST
    headers:
      Title: "download-vpn persistence guard"
      Priority: urgent
      Tags: rotating_light
    body_format: raw
    body: >-
      {{ download_vpn_data_dir }} on {{ inventory_hostname }} is NOT a
      persistent mount. Refusing to start qBittorrent before the mount is fixed.
  failed_when: false
  when:
    - download_vpn_manage_services
    - download_vpn_data_mountpoint.rc | default(0) != 0

- name: Fail when /data is NOT persistent
  ansible.builtin.fail:
    msg: >-
      {{ download_vpn_data_dir }} is NOT a persistent mount. qBittorrent's
      session/queue state (rooted under {{ download_vpn_qbittorrent_profile_dir }})
      and the shared media library are on the disposable LXC rootfs and would
      be LOST on the next container rebuild. Bind-mount the persistent dataset
      onto {{ download_vpn_data_dir }}, then re-run this converge.
  when:
    - download_vpn_manage_services
    - download_vpn_data_mountpoint.rc | default(0) != 0

- name: Check whether the Prowlarr data dir is a persistent mount
  ansible.builtin.command:
    cmd: mountpoint -q {{ download_vpn_prowlarr_data_dir }}
  register: download_vpn_prowlarr_mountpoint
  changed_when: false
  failed_when: false
  when: download_vpn_manage_services

- name: Alert ntfy when the Prowlarr data dir is NOT persistent
  ansible.builtin.uri:
    url: "{{ download_vpn_ntfy_url }}"
    method: POST
    headers:
      Title: "download-vpn persistence guard"
      Priority: urgent
      Tags: rotating_light
    body_format: raw
    body: >-
      {{ download_vpn_prowlarr_data_dir }} on {{ inventory_hostname }} is NOT a
      persistent mount. Refusing to start Prowlarr before the mount is fixed.
  failed_when: false
  when:
    - download_vpn_manage_services
    - download_vpn_prowlarr_mountpoint.rc | default(0) != 0

- name: Fail when the Prowlarr data dir is NOT persistent
  ansible.builtin.fail:
    msg: >-
      {{ download_vpn_prowlarr_data_dir }} is NOT a persistent mount.
      Prowlarr's indexer database is on the disposable LXC rootfs and would be
      LOST on the next container rebuild. Bind-mount the persistent dataset
      onto {{ download_vpn_prowlarr_data_dir }}, then re-run this converge.
  when:
    - download_vpn_manage_services
    - download_vpn_prowlarr_mountpoint.rc | default(0) != 0

# --- Phase 3: KILL IPv6 at the kernel ---------------------------------------
# Proton is dual-stack; we forbid IPv6 entirely so qBittorrent has no v6 path.
# nft ip6 coverage (below) is the belt to this suspenders.
- name: Disable IPv6 (sysctl, persistent)
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: "1"
    sysctl_set: true
    state: present
    reload: true
    sysctl_file: /etc/sysctl.d/99-download-vpn-no-ipv6.conf
  loop:
    - net.ipv6.conf.all.disable_ipv6
    - net.ipv6.conf.default.disable_ipv6
    - net.ipv6.conf.lo.disable_ipv6

# --- Phase 4: killswitch ruleset (rendered FIRST, before anything routes) ----
- name: Ensure nftables include directory exists
  ansible.builtin.file:
    path: "{{ download_vpn_nft_ruleset_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Deploy nftables killswitch ruleset
  ansible.builtin.template:
    src: killswitch.nft.j2
    dest: "{{ download_vpn_nft_ruleset_path }}"
    owner: root
    group: root
    mode: "0600"
    validate: "/usr/sbin/nft -c -f %s"
  notify: Reload killswitch

- name: Deploy killswitch systemd unit
  ansible.builtin.template:
    src: download-vpn-killswitch.service.j2
    dest: /etc/systemd/system/download-vpn-killswitch.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Enable + start the killswitch (must be active before the tunnel)
  ansible.builtin.systemd:
    name: download-vpn-killswitch.service
    state: started
    enabled: true
    daemon_reload: true
  when: download_vpn_manage_services

# --- Phase 5: WireGuard tunnel ----------------------------------------------
- name: Deploy WireGuard wg0 config
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: "{{ download_vpn_wg_config_path }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart wg tunnel

- name: Deploy the backup WireGuard private key (root-only, for validator failover)
  # Written to a root-only file (NOT wg0.conf, which stays PRIMARY) so the
  # validator can `wg set wg0 private-key <file>` on failover. Absent when no
  # backup is configured, so a disabled-failover container carries no stray key.
  ansible.builtin.copy:
    content: "{{ download_vpn_wg_backup_private_key }}\n"
    dest: "{{ download_vpn_wg_backup_key_path }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  when: download_vpn_wg_failover_enabled | bool

- name: Remove the backup WireGuard key when failover is disabled
  ansible.builtin.file:
    path: "{{ download_vpn_wg_backup_key_path }}"
    state: absent
  when: not (download_vpn_wg_failover_enabled | bool)

- name: Deploy WireGuard systemd unit
  ansible.builtin.template:
    src: download-vpn-wg.service.j2
    dest: /etc/systemd/system/download-vpn-wg.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Enable + start the WireGuard tunnel
  ansible.builtin.systemd:
    name: download-vpn-wg.service
    state: started
    enabled: true
    daemon_reload: true
  when: download_vpn_manage_services

# Sticky-failover failback. The validator may have switched wg0 to the BACKUP
# peer at runtime (recorded in the state marker). wg0.conf on disk is always the
# PRIMARY, so a converge is the deliberate reset point: if we are currently on the
# backup, restart the tunnel (reloads the primary from wg0.conf) and clear the
# runtime markers. No-op on a container that never failed over.
- name: Read the current failover state marker
  ansible.builtin.slurp:
    src: "{{ download_vpn_failover_state_file }}"
  register: download_vpn_failover_state
  failed_when: false
  when: download_vpn_manage_services

- name: Fail back to the primary Proton peer if currently on the backup
  ansible.builtin.systemd:
    name: download-vpn-wg.service
    state: restarted
    daemon_reload: true
  when:
    - download_vpn_manage_services
    - "'backup' in (download_vpn_failover_state.content | default('') | b64decode)"

- name: Clear the runtime failover markers after failback
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ download_vpn_failover_state_file }}"
    - "{{ download_vpn_failover_counter_file }}"
  when:
    - download_vpn_manage_services
    - "'backup' in (download_vpn_failover_state.content | default('') | b64decode)"

# --- Phase 5b: LAN-reply policy routing (cross-subnet web UI reachability) ---
# Lets cross-subnet clients (Traefik on the management VLAN) reach the
# qBittorrent/Prowlarr web UIs without opening any non-VPN egress: a connmark
# marks inbound UI connections, the mark is restored on their replies, and only
# those replies are policy-routed out the LAN NIC. App-initiated egress is never
# marked, so it still leaves via wg0 (or is dropped by the killswitch).
- name: Deploy LAN-reply connmark mangle ruleset
  ansible.builtin.template:
    src: mangle.nft.j2
    dest: "{{ download_vpn_mangle_ruleset_path }}"
    owner: root
    group: root
    mode: "0600"
    validate: "/usr/sbin/nft -c -f %s"
  notify: Restart download-vpn lanroute

- name: Deploy LAN-reply policy-routing systemd unit
  ansible.builtin.template:
    src: download-vpn-lanroute.service.j2
    dest: /etc/systemd/system/download-vpn-lanroute.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Enable + start LAN-reply policy routing
  ansible.builtin.systemd:
    name: download-vpn-lanroute.service
    state: started
    enabled: true
    daemon_reload: true
  when: download_vpn_manage_services

# --- Phase 6: qBittorrent ----------------------------------------------------
# Pre-create every level of the --profile tree (see defaults/main.yml) with the
# correct owner BEFORE the daemon starts, so it never has to mkdir its own tree
# the first time it runs as the unprivileged qbittorrent user.
- name: Ensure the qBittorrent profile tree exists on persistent storage  # noqa: command-instead-of-module
  # /data is a bind-mount owned by the host's root (uid 0), which is UNMAPPED
  # inside this unprivileged LXC — so container-root's CAP_DAC_OVERRIDE does not
  # reach it (the kernel grants file capabilities only when the file's uid AND
  # gid both map into the namespace; the idmap maps gid 13000 but not host uid 0).
  # Creating a new entry directly under /data writes the /data inode, and
  # container-root is neither its (unmapped) owner nor in gid 13000, leaving only
  # the mode-2775 "other" bits (r-x, no write) -> EPERM. The service user IS in
  # gid 13000 (media), which has group-write via the idmap, so create the tree AS
  # that user. runuser (not become_user: sudo is absent in this container, and
  # the service user's shell is nologin, which runuser -u bypasses). Ordered
  # parent-first so each dir's parent exists before mkdir -m sets its mode.
  ansible.builtin.command:
    cmd: "runuser -u {{ download_vpn_user }} -- mkdir -p -m 0750 {{ item }}"
    creates: "{{ item }}"
  loop:
    - "{{ download_vpn_qbittorrent_profile_dir }}"
    - "{{ download_vpn_qbittorrent_profile_base_dir }}"
    - "{{ download_vpn_qbittorrent_config_dir }}"
    - "{{ download_vpn_qbittorrent_profile_data_dir }}"
    - "{{ download_vpn_qbittorrent_export_dir }}"

- name: Deploy qBittorrent configuration (bound to wg0)
  ansible.builtin.template:
    src: qBittorrent.conf.j2
    dest: "{{ download_vpn_qbittorrent_config_dir }}/qBittorrent.conf"
    owner: "{{ download_vpn_user }}"
    group: "{{ download_vpn_group }}"
    mode: "0640"
  notify: Restart qbittorrent

- name: Deploy qBittorrent systemd unit
  ansible.builtin.template:
    src: qbittorrent-nox.service.j2
    dest: /etc/systemd/system/qbittorrent-nox.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart qbittorrent

- name: Enable + start qBittorrent
  ansible.builtin.systemd:
    name: qbittorrent-nox.service
    state: started
    enabled: true
    daemon_reload: true
  when: download_vpn_manage_services

- name: Apply the pending qBittorrent restart before the setPreferences API writes
  # On re-runs the daemon is already running with the OLD in-memory config; the
  # setPreferences calls below would make it flush that stale config back over the
  # freshly templated qBittorrent.conf, silently reverting template-managed
  # settings (port, interface binding, encryption). Flushing the queued handlers
  # here reloads the new conf first; the WebUI readiness wait below covers the
  # restart. flush_handlers ignores `when`, but Restart is only queued when the
  # conf or unit template reported changed, so this is a no-op on unchanged runs.
  ansible.builtin.meta: flush_handlers

- name: Wait for the qBittorrent WebUI to answer
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ download_vpn_qbittorrent_web_port }}/api/v2/app/version"
    status_code: [200, 403]
  register: download_vpn_qbt_up
  until: download_vpn_qbt_up.status in [200, 403]
  retries: 10
  delay: 3
  changed_when: false
  when: download_vpn_manage_services

- name: Assert the qBittorrent admin password is available
  # A missing SOPS env makes the lookup return "", which would silently set an
  # empty WebUI password. Fail loudly instead — this is the most likely cause of
  # the live password drifting from SOPS. Run the play via `sops exec-env`.
  ansible.builtin.assert:
    that:
      - download_vpn_qbittorrent_admin_password | length > 0
    fail_msg: >-
      QBITTORRENT_ADMIN_PASSWORD is empty — SOPS env not injected. Run the play
      via `sops exec-env secrets.enc.yaml '...'` so the WebUI password is set.
    quiet: true
  when: download_vpn_manage_services

- name: Set the qBittorrent WebUI admin password + auth whitelist via API
  # The auth subnet whitelist is set HERE (not in qBittorrent.conf.j2): qBittorrent
  # rewrites its conf from in-memory prefs on every setPreferences call, so a
  # template-written whitelist is clobbered by the QoS write below. Setting it via
  # the API lands it in memory, where it survives subsequent writes and the flush.
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ download_vpn_qbittorrent_web_port }}/api/v2/app/setPreferences"
    method: POST
    body_format: form-urlencoded
    body:
      json: >-
        {"web_ui_password":"{{ download_vpn_qbittorrent_admin_password }}",
         "bypass_auth_subnet_whitelist_enabled":true,
         "bypass_auth_subnet_whitelist":"{{ download_vpn_qbittorrent_auth_whitelist }}"}
    status_code: 200
  no_log: true
  changed_when: false
  when: download_vpn_manage_services

# QoS: bandwidth + concurrency limits + work-hours scheduler via the API (the
# .conf keys are version-fragile and the daemon overwrites them — see
# qBittorrent.conf.j2). Speed limits are BYTES/s (the WebUI API contract — the
# daemon stores KiB/s); concurrency + connection caps are plain counts. The
# scheduler applies the alt_* limits during the window and the normal limits
# outside it, in the container's local time (pinned to UTC in Phase 1b).
# LocalHostAuth=false lets 127.0.0.1 POST without a login cookie. limit_lan_peers
# is required for the caps to apply over the VPN interface (see the docs-starlight
# media-download runbook for the rationale).
- name: Apply qBittorrent bandwidth + concurrency limits + scheduler via API
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ download_vpn_qbittorrent_web_port }}/api/v2/app/setPreferences"
    method: POST
    body_format: form-urlencoded
    body:
      json: >-
        {"up_limit":{{ download_vpn_qbittorrent_up_limit | int }},
         "dl_limit":{{ download_vpn_qbittorrent_dl_limit | int }},
         "alt_up_limit":{{ download_vpn_qbittorrent_alt_up_limit | int }},
         "alt_dl_limit":{{ download_vpn_qbittorrent_alt_dl_limit | int }},
         "scheduler_enabled":{{ download_vpn_qbittorrent_scheduler_enabled | bool | lower }},
         "schedule_from_hour":{{ download_vpn_qbittorrent_schedule_from_hour | int }},
         "schedule_from_min":{{ download_vpn_qbittorrent_schedule_from_min | int }},
         "schedule_to_hour":{{ download_vpn_qbittorrent_schedule_to_hour | int }},
         "schedule_to_min":{{ download_vpn_qbittorrent_schedule_to_min | int }},
         "scheduler_days":{{ download_vpn_qbittorrent_scheduler_days | int }},
         "queueing_enabled":true,
         "max_active_downloads":{{ download_vpn_qbittorrent_max_active_downloads | int }},
         "max_active_uploads":{{ download_vpn_qbittorrent_max_active_uploads | int }},
         "max_active_torrents":{{ download_vpn_qbittorrent_max_active_torrents | int }},
         "dont_count_slow_torrents":{{ download_vpn_qbittorrent_dont_count_slow_torrents | bool | lower }},
         "max_connec":{{ download_vpn_qbittorrent_max_connec | int }},
         "max_connec_per_torrent":{{ download_vpn_qbittorrent_max_connec_per_torrent | int }},
         "limit_utp_rate":true,
         "limit_tcp_overhead":true,
         "limit_lan_peers":true}
    status_code: 200
  changed_when: false
  when: download_vpn_manage_services

# Categories with explicit save paths (TRaSH layout). Same WebUI-API mechanism
# as the prefs above (the categories store is daemon-owned; a template write
# would be clobbered).
# Idempotent: GET the category map, create only the missing ones, edit only on
# save-path drift.
- name: Read existing qBittorrent categories
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ download_vpn_qbittorrent_web_port }}/api/v2/torrents/categories"
    method: GET
    status_code: 200
  register: download_vpn_qbt_categories
  changed_when: false
  when: download_vpn_manage_services

- name: Create qBittorrent categories with per-category save paths
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ download_vpn_qbittorrent_web_port }}/api/v2/torrents/createCategory"
    method: POST
    body_format: form-urlencoded
    body:
      category: "{{ item.key }}"
      savePath: "{{ item.value }}"
    status_code: 200
  loop: "{{ download_vpn_qbittorrent_categories | dict2items }}"
  when:
    - download_vpn_manage_services
    - item.key not in download_vpn_qbt_categories.json
  changed_when: true

- name: Align save paths of existing qBittorrent categories
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ download_vpn_qbittorrent_web_port }}/api/v2/torrents/editCategory"
    method: POST
    body_format: form-urlencoded
    body:
      category: "{{ item.key }}"
      savePath: "{{ item.value }}"
    status_code: 200
  loop: "{{ download_vpn_qbittorrent_categories | dict2items }}"
  when:
    - download_vpn_manage_services
    - item.key in download_vpn_qbt_categories.json
    - (download_vpn_qbt_categories.json[item.key].savePath | default('')) != item.value
  changed_when: true

# --- Phase 7: Prowlarr -------------------------------------------------------
- name: Check if Prowlarr is already installed
  ansible.builtin.stat:
    path: "{{ download_vpn_prowlarr_install_dir }}/Prowlarr"
  register: download_vpn_prowlarr_bin

- name: Create Prowlarr data directory
  ansible.builtin.file:
    path: "{{ download_vpn_prowlarr_data_dir }}"
    state: directory
    owner: "{{ download_vpn_user }}"
    # Explicit group (the shared media gid): a from-scratch create must never
    # inherit the connecting user's default group — the mapped-ownership
    # contract with media_lxc_features' config-dataset chown assumes owner and
    # group are both the app's own ids.
    group: "{{ download_vpn_group }}"
    mode: "0750"

- name: Download + extract Prowlarr
  ansible.builtin.unarchive:
    src: "{{ download_vpn_prowlarr_tarball_url }}"
    dest: /opt
    remote_src: true
    owner: "{{ download_vpn_user }}"
    group: "{{ download_vpn_group }}"
  when: not download_vpn_prowlarr_bin.stat.exists

- name: Deploy Prowlarr systemd unit
  ansible.builtin.template:
    src: prowlarr.service.j2
    dest: /etc/systemd/system/prowlarr.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Enable + start Prowlarr
  ansible.builtin.systemd:
    name: prowlarr.service
    state: started
    enabled: true
    daemon_reload: true
  when: download_vpn_manage_services

# --- Phase 8: NAT-PMP port forwarding ---------------------------------------
- name: Deploy NAT-PMP env file (qBittorrent admin password)
  ansible.builtin.copy:
    dest: "{{ download_vpn_natpmp_env_path }}"
    owner: root
    group: root
    mode: "0600"
    content: |
      QBITTORRENT_ADMIN_PASSWORD={{ download_vpn_qbittorrent_admin_password }}
  no_log: true

- name: Deploy NAT-PMP forward script
  ansible.builtin.template:
    src: natpmp-forward.sh.j2
    dest: "{{ download_vpn_natpmp_script_path }}"
    owner: root
    group: root
    mode: "0755"
  notify: Restart natpmp

- name: Deploy NAT-PMP systemd unit
  ansible.builtin.template:
    src: download-vpn-natpmp.service.j2
    dest: /etc/systemd/system/download-vpn-natpmp.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Enable + start NAT-PMP keeper
  ansible.builtin.systemd:
    name: download-vpn-natpmp.service
    state: "{{ 'started' if download_vpn_natpmp_enabled else 'stopped' }}"
    enabled: "{{ download_vpn_natpmp_enabled }}"
    daemon_reload: true
  when: download_vpn_manage_services

# --- Phase 9: continuous runtime validator (systemd timer) ------------------
- name: Deploy killswitch validator script
  ansible.builtin.template:
    src: killswitch-validate.sh.j2
    dest: "{{ download_vpn_validator_script_path }}"
    owner: root
    group: root
    mode: "0755"

- name: Deploy validator systemd service + timer
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "/etc/systemd/system/{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - { src: download-vpn-validate.service.j2, dest: download-vpn-validate.service }
    - { src: download-vpn-validate.timer.j2, dest: download-vpn-validate.timer }
  notify: Reload systemd

- name: Enable + start the validator timer
  ansible.builtin.systemd:
    name: download-vpn-validate.timer
    state: started
    enabled: true
    daemon_reload: true
  when: download_vpn_manage_services

# --- Phase 9b: re-assert LAN-reply policy routing before the fail-closed gate -
# The lanroute unit is Type=oneshot + RemainAfterExit=yes, so the Phase 5b
# `state: started` is a no-op once active and never reconciles a drifted table
# 100; the "Restart download-vpn lanroute" handler fires only on a mangle change
# AND only at end-of-play (after validate.yml). So a table 100 drifted to a
# clearnet `default via` (the leak-surface state) is never healed before the gate
# inspects it. Read the table and force the atomic ExecStop(flush)->ExecStart
# (rebuild) only when it has drifted — deterministic, idempotent, ordered before
# validation. Refs #367.
- name: Read the LAN-reply policy-routing table before validation
  ansible.builtin.command:
    cmd: ip route show table {{ download_vpn_lanroute_table }}
  register: download_vpn_lanroute_pre
  changed_when: false
  when: download_vpn_manage_services

- name: Re-assert LAN-reply policy routing if table 100 has drifted
  ansible.builtin.systemd:
    name: download-vpn-lanroute.service
    state: restarted
  when:
    - download_vpn_manage_services
    - >-
      'default via' in (download_vpn_lanroute_pre.stdout | default(''))
      or 'unreachable default' not in (download_vpn_lanroute_pre.stdout | default(''))

# --- Phase 10: MANDATORY deploy-time validation -----------------------------
# Runs at the END of every play. FAILS the run on any killswitch/leak violation.
- name: Run fail-closed deploy-time validation
  ansible.builtin.import_tasks: validate.yml
