---
galaxy_info:
  author: Jacob Evans
  description: >-
    Self-hosted LangFlow visual flow-builder (https://docs.langflow.org)
    on an LXC container via Docker Compose, backed by PostgreSQL. Builds and
    serves LLM agent flows for the homelab AI-orchestration stack.
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: Debian
      versions:
        - bookworm
  galaxy_tags:
    - ai
    - llm
    - langflow
    - docker

dependencies:
  # Shared Docker-in-LXC bootstrap (docker-ce + compose plugin, LXC-conditional
  # fuse-overlayfs). configure_daemon_json pins the fuse-overlayfs storage driver
  # (required on ZFS-backed LXC). No venv: deploys via docker_compose_v2 (CLI).
  - role: docker_engine
    docker_engine_configure_daemon_json: true

collections:
  - community.docker
