---
# Native PostgreSQL role defaults (issue #138). Installs the PGDG apt build so
# the homelab tracks a current major independent of the Debian base, and keeps
# all persistent state (cluster + pg_dump backups) on the container's ZFS bind
# mount so a ChaosMonkey rebuild reconstructs everything from Ansible while the
# data survives.

# PGDG package. The unversioned metapackage tracks PGDG's current stable major;
# set postgres_version only for tests or emergency pinning.
postgres_version: ""
postgres_package: >-
  {{ ('postgresql-' ~ postgres_version)
     if (postgres_version | string | length > 0)
     else 'postgresql' }}
postgres_cluster_name: main

# Persistent state root. The LXC bind-mounts a ZFS dataset here (provided by
# terraform-proxmox), so the PGDG-default cluster path AND the backup dir below
# both land on persistent storage without moving PGDATA off the packaged
# location. WS-C must bind-mount the dataset at this exact path.
postgres_data_root: /var/lib/postgresql
postgres_data_dir: >-
  {{ postgres_data_root }}/{{ postgres_cluster_version | default(postgres_version) }}/{{ postgres_cluster_name }}
postgres_conf_dir: >-
  /etc/postgresql/{{ postgres_cluster_version | default(postgres_version) }}/{{ postgres_cluster_name }}

# Listener. Access is gated by pg_hba (scram, per-CIDR) + the host firewall,
# NOT by the bind address, so the wildcard below is safe. This used to be
# narrowed per-group to the guest's live ansible_default_ipv4 address to
# minimize the bind surface, but that traded safety for a boot-time race: on
# these ip=dhcp LXCs, systemd's network-online.target is reached before DHCP
# actually completes (no functional wait-online service), so postgres could
# start before the fact existed, silently degrade to loopback-only, and the
# converge still reported healthy (INC-17124). A postgresql@.service
# After=network-online.target drop-in was tried first and proved
# insufficient — ordering can't fix a target that lies about being ready.
# listen_addresses='*' sidesteps the timing problem entirely: a wildcard bind
# never depends on address-assignment timing. Port is standard 5432.
postgres_port: 5432
# Seconds the post-restart probe waits for the cluster to answer over the
# network. Generous enough for a cold start after a restart, short enough that
# a genuinely unreachable listener fails the converge promptly.
postgres_listener_probe_timeout: 30
postgres_listen_addresses: "*"
# scram-sha-256 for every stored password (no md5). Applied cluster-wide via
# postgresql_set; each managed role is created with the scram hash.
postgres_password_encryption: scram-sha-256

# PGDG apt repository. Key is dearmored into a dedicated keyring and referenced
# with signed-by so the repo is trusted narrowly (no global apt-key).
postgres_pgdg_key_url: "https://www.postgresql.org/media/keys/ACCC4CF8.asc"
# ASCII-armored key stored directly; apt signed-by accepts a .asc keyring, so no
# non-idempotent gpg --dearmor step is needed.
postgres_pgdg_keyring: /usr/share/keyrings/pgdg.asc
# Controller-side staging path + pinned checksum for the key (the guest cannot
# fetch it itself — outbound-internal-only firewall; see tasks/main.yml).
postgres_pgdg_key_staging_path: /tmp/pgdg-ACCC4CF8.asc
postgres_pgdg_key_sha256: "0144068502a1eddd2a0280ede10ef607d1ec592ce819940991203941564e8e76"
postgres_pgdg_repo: >-
  deb [signed-by={{ postgres_pgdg_keyring }}]
  https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main

# Managed databases. One entry per app sharing this cluster; extensible so
# Vikunja (P3) / EspoCRM (P4) append here without a new role. Populated by
# inventory/group_vars/postgres_group.yml (bao-first password, apps-subnet
# client_cidr). Each entry:
#   name        - database name (owner is a role of the same name)
#   user        - login role that owns the db and connects remotely
#   password    - bao-first with env fallback (never a literal here)
#   client_cidr - CIDR the user may connect from (the app's LXC subnet); the
#                 ONLY place an IP literal is legitimate (pg_hba needs a CIDR,
#                 not an FQDN), and even then it is env-derived, not hard-coded.
#   extensions  - optional list of PostgreSQL extensions to enable in the
#                 database (e.g. [vector]); the matching PGDG package is
#                 installed via postgres_extension_packages below.
postgres_managed_databases: []

# Extension name -> PGDG apt package suffix (postgresql-<major>-<suffix>).
# Only extensions that ship as separate PGDG packages need an entry; contrib
# extensions resolve to the empty string and skip the package install.
postgres_extension_packages:
  vector: pgvector

# pg_dump backups via a systemd timer, written to the persistent mount.
postgres_backup_enabled: true
postgres_backup_dir: "{{ postgres_data_root }}/backups"
# Daily at 02:30 with a small randomized delay (set on the timer) to avoid a
# thundering herd if more timers land on the same minute.
postgres_backup_on_calendar: "*-*-* 02:30:00"
postgres_backup_randomized_delay_sec: 900
postgres_backup_retention_days: 14

# SSH public key(s) the standby node's puller (ansible-proxmox
# roles/postgres_standby) uses to rsync the backup directory. One key per
# line; env-sourced (a public key, not a secret — but node-identifying, so
# never a committed literal). Empty -> no trust installed.
postgres_standby_pull_pubkeys: "{{ lookup('env', 'POSTGRES_STANDBY_SSH_PUBKEYS') | default('', true) }}"

# DR restore inputs (docs/DATABASE_DR_STANDARD.md in ansible-proxmox; tagged
# `never,dr_restore` — runs only on explicit invocation). `_dump` is a
# CONTROLLER-side path (fetched from the replicated archive or the Tier-2
# cloud copy); `_db` is the database to restore into — point it at a scratch
# database for the mandatory restore drill.
postgres_dr_restore_db: ""
postgres_dr_restore_dump: ""

# =============================================================================
# Streaming replication (issue #138). Disabled by default: with
# postgres_primary_host empty this role behaves exactly as a single primary and
# creates every managed database here. Set postgres_primary_host (group_vars/all,
# env POSTGRES_PRIMARY_HOST) to the primary guest's inventory hostname to enable
# — the primary then gains a replication role + slot + pg_hba line, and every
# OTHER postgres-tagged guest reinitializes as a hot standby streaming from it.
# =============================================================================
# Floor for postgres_primary_host so the role resolves standalone (group_vars/all
# overrides with the env value). A host is the primary when no primary is named,
# or when it IS the named primary; anything else is a standby.
postgres_primary_host: ""
postgres_role: >-
  {{ 'standby'
     if (postgres_primary_host | length > 0 and inventory_hostname != postgres_primary_host)
     else 'primary' }}
postgres_replication_enabled: "{{ (postgres_primary_host | length > 0) | bool }}"
# Inventory group holding THIS cluster's members. The primary creates one
# replication slot per standby in this group, so it must name the cluster
# being converged — the role backs more than one (postgres_group,
# postgres_ai_group), and a cluster whose standbys live elsewhere would get
# no slots while its siblings' names were created against the wrong primary.
# Not derived from the play hosts: `--limit primary` would then resolve to an
# empty standby list and silently skip slot creation.
postgres_cluster_group: postgres_group

# The standby authenticates to the primary as this LOGIN + REPLICATION role. The
# password is bao-first with an env fallback — never a literal.
postgres_replication_user: replicator
postgres_replication_password: >-
  {{ bao_apps_secrets.replication_password
     | default(lookup('env', 'POSTGRES_REPLICATION_PASSWORD'), true) }}
# One physical slot per standby, so the primary retains WAL while a standby is
# down instead of relying on wal_keep_size guesswork.
postgres_replication_slot: "standby_{{ inventory_hostname | regex_replace('[^A-Za-z0-9]', '_') }}"
# Final physical-slot names the primary must have — one per standby in this
# cluster. Single source of truth for the create loop and the orphan reconcile,
# so the name transform can never drift between them. Lazily evaluated, so
# groups[...] resolves per-host at runtime and stays overridable (molecule).
postgres_expected_replication_slots: >-
  {{ groups.get(postgres_cluster_group, [])
     | difference([postgres_primary_host])
     | map('regex_replace', '[^A-Za-z0-9]', '_')
     | map('regex_replace', '^', 'standby_') | list }}
# CIDR the primary accepts replication connections from (the standby's subnet).
# Same env-derived pg_hba pattern as the app client_cidrs — pg_hba needs a CIDR,
# not an FQDN, so this is the one legitimate place for one, and even here it is
# env-sourced. The demoted standby (CT 303000) lives on the data VLAN.
postgres_replication_cidr: "{{ lookup('env', 'NETWORK_CIDR_DATA') | default('', true) }}"
# The primary's FQDN the standby streams from — by name, never an address.
postgres_primary_fqdn: >-
  {{ lookup('env', 'POSTGRES_PRIMARY_FQDN')
     | default(postgres_primary_host ~ '.' ~ (tofu_data.domain | default('')), true) }}
# Data-loss interlock. The standby bootstrap REFUSES to wipe a populated PGDATA
# unless this is true, so a stray role flip can never destroy a live primary. A
# fresh/empty standby bootstraps with no interlock. Set true ONLY after the
# migration to the new primary is confirmed; env-gated so it is deliberate and
# ephemeral.
postgres_standby_reinit: "{{ lookup('env', 'POSTGRES_STANDBY_REINIT') | default(false, true) | bool }}"

# =============================================================================
# Object-storage PITR backups (pgBackRest -> S3). A SECOND, independent tier
# from the pg_dump layer above: pgBackRest archives WAL continuously
# (archive_command) and takes scheduled full/incremental base backups to an
# S3-compatible endpoint (the homelab RustFS instance; the same objects are
# replicated to Backblaze B2 by an out-of-band job), giving point-in-time
# recovery that logical dumps cannot. Primary-only, and OFF by default so the
# merge is inert — flip postgres_pgbackrest_enabled at bring-up.
#
# Flag name: task #7 asked for `postgres_backup_enabled`, but that is already
# the pg_dump tier's switch (default true). Repurposing it would silently
# disable pg_dump, so this tier owns its own flag.
postgres_pgbackrest_enabled: false

# Stanza + repo layout. The stanza is named for the HOST, not the cluster: every
# Debian host names its cluster `main`, so deriving from postgres_cluster_name
# gave each host the same stanza AND the same repo path, colliding them in one
# shared repo (#1017). The repo path is the in-bucket prefix, so objects land at
# s3://<bucket>/postgres/<inventory_hostname>/... — one prefix per host.
#
# The bucket name is identical on RustFS and Backblaze B2 — B2's namespace is
# global, so one globally-unique name satisfies the 1:1 RustFS<->B2 parity rule.
postgres_pgbackrest_stanza: "{{ inventory_hostname }}"
postgres_backup_s3_bucket: dryvist-homelab-backups
postgres_pgbackrest_repo_path: "/postgres/{{ postgres_pgbackrest_stanza }}"

# S3-compatible endpoint + credentials. Injection-agnostic: the role reads env,
# never a specific secret backend. RustFS/MinIO ignore the region but the AWS
# SDK pgBackRest embeds requires a non-empty value, and they need path-style
# URIs (bucket in the path, not the hostname).
postgres_backup_s3_endpoint: "{{ lookup('env', 'POSTGRES_BACKUP_S3_ENDPOINT') | default('', true) }}"
postgres_backup_s3_region: "{{ lookup('env', 'POSTGRES_BACKUP_S3_REGION') | default('us-east-1', true) }}"
postgres_backup_s3_uri_style: path
postgres_backup_s3_access_key_id: "{{ lookup('env', 'POSTGRES_BACKUP_S3_ACCESS_KEY_ID') | default('', true) }}"
postgres_backup_s3_secret_access_key: "{{ lookup('env', 'POSTGRES_BACKUP_S3_SECRET_ACCESS_KEY') | default('', true) }}"

# Offsite repo (repo2). pgBackRest writes every backup and WAL segment to both
# repos itself, which is what makes the 1:1 parity rule structural instead of
# aspirational: there is no out-of-band mirror to drift, truncate, or silently
# copy a subset (#1027). Restores read it with `--repo=2`, and `check` validates
# archiving against every configured repo.
#
# Do NOT reach for `pgbackrest verify` as the offsite gate: it exits 0 against a
# repo it cannot read at all, printing only "No usable backup.info file" (#1027).
#
# OFF by default so the merge is inert; needs the offsite credentials in env.
postgres_pgbackrest_repo2_enabled: false
postgres_pgbackrest_repo2_path: "{{ postgres_pgbackrest_repo_path }}"
postgres_backup_repo2_s3_bucket: "{{ postgres_backup_s3_bucket }}"
postgres_backup_repo2_s3_endpoint: "{{ lookup('env', 'POSTGRES_BACKUP_REPO2_S3_ENDPOINT') | default('', true) }}"
# Backblaze's S3 endpoint embeds its region (s3.<region>.backblazeb2.com), so
# derive it rather than making the operator restate it in a second variable.
postgres_backup_repo2_s3_region: >-
  {{ lookup('env', 'POSTGRES_BACKUP_REPO2_S3_REGION')
     | default(postgres_backup_repo2_s3_endpoint
               | regex_replace('^s3\.([^.]+)\..*$', '\1'), true) }}
postgres_backup_repo2_s3_uri_style: path
postgres_backup_repo2_s3_access_key_id: >-
  {{ lookup('env', 'POSTGRES_BACKUP_REPO2_S3_ACCESS_KEY_ID') | default('', true) }}
postgres_backup_repo2_s3_secret_access_key: >-
  {{ lookup('env', 'POSTGRES_BACKUP_REPO2_S3_SECRET_ACCESS_KEY') | default('', true) }}
postgres_pgbackrest_repo2_retention_full: "{{ postgres_pgbackrest_retention_full }}"

# Retention: number of full backups to keep. pgBackRest expires the WAL that
# predates the oldest retained full automatically, so this one knob bounds both
# base-backup and WAL storage.
postgres_pgbackrest_retention_full: 4

# Backup schedule. pgBackRest's standard pattern is a weekly full plus daily
# incrementals (the first backup is always promoted to full). Each entry deploys
# a pgbackrest-backup@<type>.timer that triggers pgbackrest-backup@<type>.service.
postgres_pgbackrest_schedules:
  - type: full
    on_calendar: "Sun *-*-* 01:00:00"
  - type: incr
    on_calendar: "Mon..Sat *-*-* 01:00:00"
postgres_pgbackrest_randomized_delay_sec: 900

# PITR restore (explicit invocation only; tags never,pgbackrest_restore). Stops
# the cluster, restores the repo into PGDATA with --delta, and starts it to
# replay WAL. Arm with postgres_pgbackrest_restore=true; optionally pin a target
# with postgres_pgbackrest_restore_target (e.g. an ISO timestamp) and
# _target_type (time/name/xid/lsn). Point a drill at a scratch cluster/stanza,
# NEVER the live primary.
postgres_pgbackrest_restore: false
postgres_pgbackrest_restore_target: ""
postgres_pgbackrest_restore_target_type: "time"
