---
# Native PostgreSQL (PGDG) for the shared homelab database backend (issue #138).
# All persistent state lives on the container's ZFS bind mount at
# postgres_data_root, so a ChaosMonkey rebuild reconstructs the cluster config,
# roles, and databases from Ansible while the data on the mount survives.

# =============================================================================
# Phase 1: PGDG apt repository
# =============================================================================
- name: Install apt prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - gpg                # apt_repository needs a gpg binary on minimal templates
      - sudo               # become_user: postgres de-escalation on minimal templates
      - python3-psycopg2   # community.postgresql modules connect via psycopg2
      - acl                # become_user:postgres file ops on unprivileged tmp
      - rsync              # standby node pulls the backup dir (postgres_standby)
    state: present
    update_cache: true

# The key is staged on the controller because the LXC is firewalled
# outbound-internal-only (same pattern as the openbao role's artifact staging);
# a guest-side get_url to www.postgresql.org would be dropped.
- name: Stage the PGDG repository signing key on the controller
  ansible.builtin.get_url:
    url: "{{ postgres_pgdg_key_url }}"
    dest: "{{ postgres_pgdg_key_staging_path }}"
    checksum: "sha256:{{ postgres_pgdg_key_sha256 }}"
    mode: "0644"
  delegate_to: localhost
  connection: local
  become: false
  vars:
    ansible_become: false
  run_once: true

- name: Install the PGDG repository signing key
  ansible.builtin.copy:
    src: "{{ postgres_pgdg_key_staging_path }}"
    dest: "{{ postgres_pgdg_keyring }}"
    mode: "0644"
    owner: root
    group: root

- name: Add the PGDG apt repository
  ansible.builtin.apt_repository:
    repo: "{{ postgres_pgdg_repo }}"
    filename: pgdg
    state: present
    update_cache: true

# =============================================================================
# Phase 2: Install PostgreSQL
# The postgresql-common postinst creates the `postgres` user and usually creates
# the default cluster. Use the config directory as the existence test because
# pg_createcluster refuses to run when /etc/postgresql/<major>/<name> exists.
# =============================================================================
- name: Install PostgreSQL from PGDG
  ansible.builtin.apt:
    name: "{{ postgres_package }}"
    state: present
    update_cache: true

- name: Discover installed PostgreSQL major
  ansible.builtin.command:
    argv:
      - psql
      - --version
  register: postgres_psql_version
  changed_when: false

- name: Set the PostgreSQL cluster version fact
  ansible.builtin.set_fact:
    postgres_cluster_version: >-
      {{ postgres_version
         if (postgres_version | string | length > 0)
         else (postgres_psql_version.stdout | regex_search('[0-9]+')) }}

- name: Fail when PostgreSQL major discovery failed
  ansible.builtin.fail:
    msg: >-
      PostgreSQL package {{ postgres_package }} installed, but psql --version
      did not expose a server major version: {{ postgres_psql_version.stdout }}
  when: postgres_cluster_version | string | length == 0

# Extension packages must be present on primary AND standbys (the standby
# replays the catalog state but still needs the shared library on disk).
- name: Install PGDG extension packages required by managed databases
  ansible.builtin.apt:
    name: >-
      postgresql-{{ postgres_cluster_version }}-{{ postgres_extension_packages[item] }}
    state: present
  loop: >-
    {{ postgres_managed_databases | map(attribute='extensions', default=[])
       | flatten | unique | select('in', postgres_extension_packages) | list }}
  # Contrib extensions map to an empty suffix — nothing to apt-install.
  when: postgres_extension_packages[item] | length > 0

- name: Check whether the PostgreSQL cluster config exists
  ansible.builtin.stat:
    path: "{{ postgres_conf_dir }}"
  register: postgres_cluster_config

- name: Check whether the persistent data directory already has a cluster
  ansible.builtin.stat:
    path: "{{ postgres_data_dir }}/PG_VERSION"
  register: postgres_existing_data_version

- name: Read the persistent data directory version
  ansible.builtin.slurp:
    src: "{{ postgres_data_dir }}/PG_VERSION"
  register: postgres_existing_data_pg_version
  when: postgres_existing_data_version.stat.exists

- name: Fail when persistent data belongs to a different PostgreSQL major
  ansible.builtin.fail:
    msg: >-
      Existing PostgreSQL data directory {{ postgres_data_dir }} belongs to
      major version {{ postgres_existing_data_pg_version.content | b64decode | trim }},
      but the installed server version selected for cluster
      {{ postgres_cluster_name }} is {{ postgres_cluster_version }}. Pin
      postgres_version or perform a controlled PostgreSQL upgrade before
      recreating the postgresql-common cluster config.
  when:
    - postgres_existing_data_version.stat.exists
    - (postgres_existing_data_pg_version.content | b64decode | trim) !=
      (postgres_cluster_version | string)

- name: Set pg_createcluster data directory
  ansible.builtin.set_fact:
    postgres_createcluster_data_dir: >-
      {{ postgres_data_root ~ '/.ansible-pg-createcluster-' ~
         postgres_cluster_version ~ '-' ~ postgres_cluster_name
         if postgres_existing_data_version.stat.exists
         else postgres_data_dir }}
  when: not postgres_cluster_config.stat.exists

- name: Remove stale temporary pg_createcluster data directory
  ansible.builtin.file:
    path: "{{ postgres_createcluster_data_dir }}"
    state: absent
  when:
    - not postgres_cluster_config.stat.exists
    - postgres_existing_data_version.stat.exists

- name: Create the PostgreSQL cluster when config is absent
  ansible.builtin.command:
    argv:
      - pg_createcluster
      - --datadir
      - "{{ postgres_createcluster_data_dir }}"
      - "{{ postgres_cluster_version }}"
      - "{{ postgres_cluster_name }}"
  changed_when: true
  when: not postgres_cluster_config.stat.exists

- name: Point recreated cluster config at existing persistent data
  ansible.builtin.lineinfile:
    path: "{{ postgres_conf_dir }}/postgresql.conf"
    regexp: "^data_directory\\s*="
    line: "data_directory = '{{ postgres_data_dir }}'"
  when:
    - not postgres_cluster_config.stat.exists
    - postgres_existing_data_version.stat.exists

- name: Remove temporary pg_createcluster data directory
  ansible.builtin.file:
    path: "{{ postgres_createcluster_data_dir }}"
    state: absent
  when:
    - not postgres_cluster_config.stat.exists
    - postgres_existing_data_version.stat.exists

- name: Ensure the PostgreSQL cluster config exists
  ansible.builtin.stat:
    path: "{{ postgres_conf_dir }}/postgresql.conf"
  register: postgres_cluster_config_file
  failed_when: not postgres_cluster_config_file.stat.exists

# A host reboot can start postgresql@ before DHCP hands the guest its address;
# the packaged unit has no network ordering, so PostgreSQL binds loopback-only
# and answers nothing off-box until the next converge notices (INC-17124).
# Instance-generic (postgresql@.service.d) so a PostgreSQL major bump never
# orphans the drop-in the way a version-pinned path would.
- name: Create the postgresql@ systemd drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/system/postgresql@.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy the postgresql@ network-online drop-in
  ansible.builtin.copy:
    src: postgresql-network-online.conf
    dest: /etc/systemd/system/postgresql@.service.d/network-online.conf
    owner: root
    group: root
    mode: "0644"
  register: postgres_network_online_dropin

- name: Ensure the PostgreSQL cluster service is started and enabled
  ansible.builtin.systemd:
    name: "postgresql@{{ postgres_cluster_version }}-{{ postgres_cluster_name }}"
    state: started
    enabled: true
    daemon_reload: "{{ postgres_network_online_dropin.changed }}"

# =============================================================================
# Phase 2b: Standby bootstrap (streaming replication, issue #138)
# Only a replication standby with no standby.signal yet. Reinitializes PGDATA
# from a fresh pg_basebackup of the primary, then the cluster comes back up in
# standby mode (pg_basebackup --write-recovery-conf drops standby.signal +
# primary_conninfo). Idempotent: once standby.signal exists this is skipped.
# Converge the PRIMARY first so its replication role + slot exist — a stray
# out-of-order run cannot corrupt data: the basebackup lands in a temp dir and
# only replaces PGDATA on success, and the interlock below refuses to touch a
# populated PGDATA unless the demotion is explicitly confirmed.
# =============================================================================
- name: Bootstrap the streaming standby
  when:
    - postgres_replication_enabled | bool
    - postgres_role == 'standby'
  block:
    - name: Check whether this guest is already a standby
      ansible.builtin.stat:
        path: "{{ postgres_data_dir }}/standby.signal"
      register: postgres_standby_signal

    - name: Reinitialize PGDATA as a streaming standby
      when: not postgres_standby_signal.stat.exists
      block:
        # postgres_existing_data_version (Phase 2) stat'd PGDATA/PG_VERSION.
        - name: Refuse to wipe populated data without an explicit reinit
          ansible.builtin.fail:
            msg: >-
              {{ postgres_data_dir }} already holds a PostgreSQL cluster and
              this guest is being demoted to a standby. Reinitializing wipes it.
              Set postgres_standby_reinit=true (env POSTGRES_STANDBY_REINIT)
              only AFTER confirming its data is migrated to
              {{ postgres_primary_fqdn }}.
          when:
            - postgres_existing_data_version.stat.exists
            - not (postgres_standby_reinit | bool)

        - name: Write the replicator .pgpass for the postgres user
          ansible.builtin.copy:
            # `>` folds the split back to one line and keeps a single trailing
            # newline; the fold-space lands inside `{{ ... }}` so it is inert.
            dest: /var/lib/postgresql/.pgpass
            content: >
              {{ postgres_primary_fqdn }}:{{ postgres_port }}:replication:{{ postgres_replication_user
              }}:{{ postgres_replication_password }}
            owner: postgres
            group: postgres
            mode: "0600"
          no_log: true

        - name: Verify the primary is reachable before touching PGDATA
          ansible.builtin.command:
            argv:
              - pg_isready
              - --host={{ postgres_primary_fqdn }}
              - --port={{ postgres_port }}
              - --timeout=10
          changed_when: false

        - name: Stop the cluster before reinitializing PGDATA
          ansible.builtin.systemd:
            name: "postgresql@{{ postgres_cluster_version }}-{{ postgres_cluster_name }}"
            state: stopped

        - name: Remove any stale basebackup staging directory
          ansible.builtin.file:
            path: "{{ postgres_data_root }}/.ansible-standby-basebackup"
            state: absent

        - name: Take a base backup from the primary
          become: true
          become_user: postgres
          ansible.builtin.command:
            argv:
              - pg_basebackup
              - --pgdata={{ postgres_data_root }}/.ansible-standby-basebackup
              - --wal-method=stream
              - --slot={{ postgres_replication_slot }}
              - --write-recovery-conf
              - --checkpoint=fast
              - --no-password
              - --host={{ postgres_primary_fqdn }}
              - --port={{ postgres_port }}
              - --username={{ postgres_replication_user }}
          changed_when: true

        - name: Replace PGDATA with the base backup
          ansible.builtin.shell:
            cmd: >-
              rm -rf {{ postgres_data_dir }} &&
              mv {{ postgres_data_root }}/.ansible-standby-basebackup {{ postgres_data_dir }}
          changed_when: true

        - name: Start the cluster in standby mode
          ansible.builtin.systemd:
            name: "postgresql@{{ postgres_cluster_version }}-{{ postgres_cluster_name }}"
            state: started

# =============================================================================
# Phase 3: Cluster configuration (idempotent GUCs)
# postgresql_set only writes when the value differs, so the idempotence run is
# clean. listen_addresses/port need a restart; password_encryption reloads.
# =============================================================================
- name: Configure cluster GUCs
  become: true
  become_user: postgres
  vars:
    ansible_ssh_pipelining: true
  block:
    - name: Set listen_addresses
      community.postgresql.postgresql_set:
        name: listen_addresses
        value: "{{ postgres_listen_addresses }}"
      notify: Restart postgresql

    - name: Set port
      community.postgresql.postgresql_set:
        name: port
        value: "{{ postgres_port }}"
      notify: Restart postgresql

    - name: Enforce scram-sha-256 password encryption
      community.postgresql.postgresql_set:
        name: password_encryption
        value: "{{ postgres_password_encryption }}"
      notify: Reload postgresql

# Apply a pending restart NOW so the remote listener + scram are live before we
# create roles and run the health check (handlers otherwise flush at play end).
- name: Apply pending PostgreSQL restart/reload
  ansible.builtin.meta: flush_handlers

# A cluster that comes up listening only on loopback is invisible to every
# other guest, and nothing downstream notices until an app tier starts timing
# out — which is how this surfaced once already: apps could not reach the
# shared database, and the failure looked like connection-pool exhaustion
# rather than a missing listener. The GUC being set is not proof the listener
# is live; only a bind off loopback is. Assert it here, right after the
# restart, so a divergence fails this converge instead of a later outage.
# Read the bound sockets on the guest itself. Deliberately NOT a connect from
# the control node: a workstation controller is often firewalled off the guest
# VLAN, so that would fail for hosts that are perfectly healthy. What the guest
# is bound to is the fact that matters, and it is knowable locally.
- name: List the bound PostgreSQL sockets
  ansible.builtin.command:
    argv: [ss, -H, -ltn, "sport = :{{ postgres_port }}"]
  register: postgres_bound_sockets
  changed_when: false
  failed_when: false

# ss prints the local address in column 4 (host:port). Anything bound to
# 0.0.0.0, [::] or a real interface address is reachable off-box; only
# 127.0.0.1/[::1] is not.
#
# Why a restart rather than going straight to the assert: postgresql_set is
# idempotent against the STORED setting, not the runtime bind. ALTER SYSTEM
# writes $PGDATA/postgresql.auto.conf, so once the correct value is stored
# every later converge is a no-op — changed=false, the restart handler never
# fires, and flush_handlers has nothing to flush. If the server started before
# the container NIC was up it binds loopback, fails to bind the real address,
# and does NOT exit (a partial bind failure is a warning; only a total failure
# is fatal). The config is right and the process is wrong, which is a state
# Ansible can repair on its own. Restart, re-read, and let the assert below
# fail only if the restart did not fix it.
- name: Restart the cluster when it is bound loopback-only
  vars:
    postgres_local_addrs: >-
      {{ postgres_bound_sockets.stdout_lines | default([])
         | map('split') | map(attribute=3)
         | map('regex_replace', ':[0-9]+$', '') | list }}
  ansible.builtin.systemd:
    name: "postgresql@{{ postgres_cluster_version }}-{{ postgres_cluster_name }}"
    state: restarted
  when:
    - postgres_listen_addresses not in ['localhost', '127.0.0.1', '::1']
    - postgres_local_addrs | reject('in', ['127.0.0.1', '[::1]']) | list | length == 0

- name: Re-read the bound PostgreSQL sockets after the repair restart
  ansible.builtin.command:
    argv: [ss, -H, -ltn, "sport = :{{ postgres_port }}"]
  register: postgres_bound_sockets
  changed_when: false
  failed_when: false

- name: Fail when the cluster is still listening on loopback only
  vars:
    postgres_local_addrs: >-
      {{ postgres_bound_sockets.stdout_lines | default([])
         | map('split') | map(attribute=3)
         | map('regex_replace', ':[0-9]+$', '') | list }}
  ansible.builtin.assert:
    that:
      - postgres_local_addrs | reject('in', ['127.0.0.1', '[::1]']) | list | length > 0
    fail_msg: >-
      PostgreSQL on {{ inventory_hostname }} is bound only to
      {{ postgres_local_addrs | default([], true) }} even after a restart, so
      no other guest can reach it on port {{ postgres_port }}. Expected a
      listener matching
      postgres_listen_addresses={{ postgres_listen_addresses }}. Since the
      restart did not fix it, the stored setting itself is wrong or the address
      does not exist on this guest — check
      `SHOW listen_addresses` and the interface addresses, not just the config.
    success_msg: >-
      PostgreSQL is reachable off loopback (bound: {{ postgres_local_addrs }}).
  when: postgres_listen_addresses not in ['localhost', '127.0.0.1', '::1']

# =============================================================================
# Phase 3b: Primary replication config (streaming replication, issue #138)
# Primary-only. Creates the replication login role, one physical slot per
# standby (so WAL is retained while a standby is down), and the replication
# pg_hba line. Converge the primary before any standby so these exist when the
# standby's pg_basebackup connects.
# =============================================================================
- name: Configure the replication primary
  become: true
  become_user: postgres
  when:
    - postgres_replication_enabled | bool
    - postgres_role == 'primary'
  block:
    - name: Ensure wal_level supports replication
      community.postgresql.postgresql_set:
        name: wal_level
        value: replica
      notify: Restart postgresql

    - name: Ensure the replication login role exists
      community.postgresql.postgresql_user:
        name: "{{ postgres_replication_user }}"
        password: "{{ postgres_replication_password }}"
        role_attr_flags: LOGIN,REPLICATION
        state: present
      no_log: true

    - name: Ensure a physical replication slot exists for each standby
      community.postgresql.postgresql_slot:
        name: "{{ item }}"
        slot_type: physical
        state: present
      loop: "{{ postgres_expected_replication_slots }}"
      loop_control:
        label: "{{ item }}"

    # Reconcile: a standby removed from the cluster leaves its slot behind, and
    # an inactive slot retains WAL forever. Drop any inactive physical slot with
    # no matching converged standby. The active = false filter means a live
    # standby's slot (even one briefly down but still expected) is never a drop
    # candidate; postgresql_slot state=absent also refuses an active slot.
    - name: Enumerate inactive physical replication slots
      community.postgresql.postgresql_query:
        db: postgres
        query: >-
          SELECT slot_name FROM pg_replication_slots
          WHERE slot_type = 'physical' AND active = false
      register: postgres_inactive_slots
      changed_when: false

    - name: Drop inactive slots with no converged standby (orphan reconcile)
      community.postgresql.postgresql_slot:
        name: "{{ item }}"
        state: absent
      loop: >-
        {{ postgres_inactive_slots.query_result | map(attribute='slot_name') | list
           | difference(postgres_expected_replication_slots) }}
      loop_control:
        label: "{{ item }}"

    - name: Allow the replicator to connect from the standby subnet (scram)
      community.postgresql.postgresql_pg_hba:
        dest: "{{ postgres_conf_dir }}/pg_hba.conf"
        contype: host
        databases: replication
        users: "{{ postgres_replication_user }}"
        source: "{{ postgres_replication_cidr }}"
        method: scram-sha-256
        state: present
      when: postgres_replication_cidr | length > 0
      notify: Reload postgresql

- name: Apply pending replication restart/reload
  ansible.builtin.meta: flush_handlers
  when: postgres_replication_enabled | bool

# =============================================================================
# Phase 4: Roles, databases, and host-based auth
# Credentials come from the source secret store; apply them on each run so an
# app cutover can rotate from bootstrap SOPS values without manual SQL.
# Primary-only: a standby is read-only and inherits every role and database
# through streaming (they are catalog state carried in the WAL), so running
# these writes there would fail against the read-only replica.
# =============================================================================
- name: Provision managed roles and databases
  become: true
  become_user: postgres
  when: postgres_role == 'primary'
  block:
    # Every managed password resolves through
    # `bao_apps_secrets.<app>_db_password | default(lookup('env', '<APP>_DB_PASSWORD'), true)`.
    # `bao_apps_secrets` defaults to {} (group_vars/all.yml), so a converge run
    # WITHOUT the secrets environment (sops exec-env / doppler run) silently
    # resolves every password to '' and rewrites the role with an empty one —
    # the app then fails auth against a password only this play knows it broke.
    # Fail loudly instead: an absent secret is an operator error, never an
    # empty password.
    - name: Assert every managed role has a non-empty source password
      ansible.builtin.assert:
        that:
          - item.password | default('', true) | length > 0
        fail_msg: >-
          No password resolved for the '{{ item.user }}' role. Re-run under the
          secrets environment (sops exec-env secrets.enc.yaml 'doppler run -- ...')
          or populate bao_apps_secrets — converging without it would set an empty
          password and lock the app out of its own database.
        quiet: true
      loop: "{{ postgres_managed_databases }}"
      loop_control:
        label: "{{ item.user }}"
      no_log: true

    - name: Ensure each managed login role exists with the source password
      community.postgresql.postgresql_user:
        name: "{{ item.user }}"
        password: "{{ item.password }}"
        role_attr_flags: LOGIN
        state: present
      loop: "{{ postgres_managed_databases }}"
      loop_control:
        label: "{{ item.user }}"
      no_log: true

    - name: Create each managed database owned by its role
      community.postgresql.postgresql_db:
        name: "{{ item.name }}"
        owner: "{{ item.user }}"
        encoding: UTF-8
        # The minimal LXC template has no locale, so initdb built the cluster
        # SQL_ASCII; template1 inherits that and refuses UTF-8 children. Build
        # from template0 with an explicit C.UTF-8 locale instead.
        template: template0
        lc_collate: C.UTF-8
        lc_ctype: C.UTF-8
        state: present
      loop: "{{ postgres_managed_databases }}"
      loop_control:
        label: "{{ item.name }}"
      no_log: true

    - name: Grant the owning role all privileges on its database
      community.postgresql.postgresql_privs:
        database: "{{ item.name }}"
        roles: "{{ item.user }}"
        type: database
        privs: ALL
        state: present
      loop: "{{ postgres_managed_databases }}"
      loop_control:
        label: "{{ item.name }}"
      no_log: true

    - name: Enable each managed database's extensions
      community.postgresql.postgresql_ext:
        db: "{{ item.0.name }}"
        name: "{{ item.1 }}"
        state: present
      loop: >-
        {{ postgres_managed_databases
           | subelements('extensions', skip_missing=True) }}
      loop_control:
        label: "{{ item.0.name }}: {{ item.1 }}"

    - name: Allow each managed user to connect from its client CIDR (scram)
      community.postgresql.postgresql_pg_hba:
        dest: "{{ postgres_conf_dir }}/pg_hba.conf"
        contype: host
        databases: "{{ item.name }}"
        users: "{{ item.user }}"
        source: "{{ item.client_cidr }}"
        method: scram-sha-256
        state: present
      loop: "{{ postgres_managed_databases }}"
      loop_control:
        label: "{{ item.name }} <- {{ item.client_cidr }}"
      no_log: true
      notify: Reload postgresql

- name: Apply pending pg_hba reload
  ansible.builtin.meta: flush_handlers

# =============================================================================
# Phase 5: pg_dump backups on the persistent mount, via a systemd timer
# =============================================================================
- name: Configure pg_dump backups
  when: postgres_backup_enabled | bool
  block:
    - name: Create the backup directory on the persistent mount
      ansible.builtin.file:
        path: "{{ postgres_backup_dir }}"
        state: directory
        owner: postgres
        group: postgres
        mode: "0750"

    - name: Deploy the pg_dump backup script
      ansible.builtin.template:
        src: pg-backup.sh.j2
        dest: /usr/local/bin/pg-backup.sh
        owner: root
        group: root
        mode: "0755"

    - name: Deploy the pg_dump backup systemd service
      ansible.builtin.template:
        src: pg-backup.service.j2
        dest: /etc/systemd/system/pg-backup.service
        owner: root
        group: root
        mode: "0644"

    - name: Deploy the pg_dump backup systemd timer
      ansible.builtin.template:
        src: pg-backup.timer.j2
        dest: /etc/systemd/system/pg-backup.timer
        owner: root
        group: root
        mode: "0644"

    - name: Enable and start the pg_dump backup timer
      ansible.builtin.systemd:
        name: pg-backup.timer
        state: started
        enabled: true
        daemon_reload: true

# Trust the standby node's puller so ansible-proxmox roles/postgres_standby can
# rsync the backup directory into the replicated archive (Tier 1 of the
# Database DR Standard). Env-gated: no key supplied, no trust installed.
- name: Authorize the standby puller's SSH key(s) for root
  ansible.posix.authorized_key:
    user: root
    key: "{{ postgres_standby_pull_pubkeys }}"
  when: postgres_standby_pull_pubkeys | length > 0

# =============================================================================
# Phase 5b: Object-storage PITR backups (pgBackRest -> S3). Primary-only and
# flag-gated inside the imported file; also carries the tagged PITR restore.
# =============================================================================
- name: Configure object-storage PITR backups
  ansible.builtin.import_tasks: pgbackrest.yml

# =============================================================================
# DR restore (explicit invocation only — the Database DR Standard's per-engine
# restore path). Runs a controller-fetched dump into the named database:
#   ansible-playbook ... --tags dr_restore \
#     -e postgres_dr_restore_db=<db> -e postgres_dr_restore_dump=<local path>
# Point _db at a scratch database for the mandatory restore drill.
# =============================================================================
# Var-gated, not just `never`-tagged: the role include's `postgres` tag is
# inherited by this block, so a plain `--tags postgres` converge still selects
# it despite `never` — the empty-input skip is what actually keeps it inert.
- name: DR restore from a logical dump
  when:
    - postgres_dr_restore_db | length > 0
    - postgres_dr_restore_dump | length > 0
  tags:
    - never
    - dr_restore
  block:
    - name: Stage the dump on the guest
      ansible.builtin.copy:
        src: "{{ postgres_dr_restore_dump }}"
        dest: /tmp/pg-dr-restore.dump
        owner: postgres
        group: postgres
        mode: "0600"

    - name: Ensure the restore target database exists
      become: true
      become_user: postgres
      community.postgresql.postgresql_db:
        name: "{{ postgres_dr_restore_db }}"
        state: present

    - name: Restore the dump (clean, if-exists)
      become: true
      become_user: postgres
      ansible.builtin.command:
        cmd: >-
          pg_restore --clean --if-exists
          --dbname={{ postgres_dr_restore_db }} /tmp/pg-dr-restore.dump
      changed_when: true

    - name: Remove the staged dump
      ansible.builtin.file:
        path: /tmp/pg-dr-restore.dump
        state: absent

# =============================================================================
# Phase 6: Health check
# =============================================================================
- name: Verify PostgreSQL answers a trivial query
  become: true
  become_user: postgres
  community.postgresql.postgresql_ping:
    db: postgres
  register: postgres_ping
  failed_when: not postgres_ping.is_available
  changed_when: false
