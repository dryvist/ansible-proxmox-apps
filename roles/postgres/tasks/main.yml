---
# Native PostgreSQL (PGDG) for the shared homelab database backend (issue #138).
# All persistent state lives on the container's ZFS bind mount at
# postgres_data_root, so a ChaosMonkey rebuild reconstructs the cluster config,
# roles, and databases from Ansible while the data on the mount survives.

# =============================================================================
# Phase 1: PGDG apt repository
# =============================================================================
- name: Install apt prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - gpg                # apt_repository needs a gpg binary on minimal templates
      - sudo               # become_user: postgres de-escalation on minimal templates
      - python3-psycopg2   # community.postgresql modules connect via psycopg2
      - acl                # become_user:postgres file ops on unprivileged tmp
      - rsync              # standby node pulls the backup dir (postgres_standby)
    state: present
    update_cache: true

# The key is staged on the controller because the LXC is firewalled
# outbound-internal-only (same pattern as the openbao role's artifact staging);
# a guest-side get_url to www.postgresql.org would be dropped.
- name: Stage the PGDG repository signing key on the controller
  ansible.builtin.get_url:
    url: "{{ postgres_pgdg_key_url }}"
    dest: "{{ postgres_pgdg_key_staging_path }}"
    checksum: "sha256:{{ postgres_pgdg_key_sha256 }}"
    mode: "0644"
  delegate_to: localhost
  connection: local
  become: false
  vars:
    ansible_become: false
  run_once: true

- name: Install the PGDG repository signing key
  ansible.builtin.copy:
    src: "{{ postgres_pgdg_key_staging_path }}"
    dest: "{{ postgres_pgdg_keyring }}"
    mode: "0644"
    owner: root
    group: root

- name: Add the PGDG apt repository
  ansible.builtin.apt_repository:
    repo: "{{ postgres_pgdg_repo }}"
    filename: pgdg
    state: present
    update_cache: true

# =============================================================================
# Phase 2: Install PostgreSQL
# The postgresql-common postinst creates the `postgres` user and usually creates
# the default cluster. Use the config directory as the existence test because
# pg_createcluster refuses to run when /etc/postgresql/<major>/<name> exists.
# =============================================================================
- name: Install PostgreSQL from PGDG
  ansible.builtin.apt:
    name: "{{ postgres_package }}"
    state: present
    update_cache: true

- name: Discover installed PostgreSQL major
  ansible.builtin.command:
    argv:
      - psql
      - --version
  register: postgres_psql_version
  changed_when: false

- name: Set the PostgreSQL cluster version fact
  ansible.builtin.set_fact:
    postgres_cluster_version: >-
      {{ postgres_version
         if (postgres_version | string | length > 0)
         else (postgres_psql_version.stdout | regex_search('[0-9]+')) }}

- name: Fail when PostgreSQL major discovery failed
  ansible.builtin.fail:
    msg: >-
      PostgreSQL package {{ postgres_package }} installed, but psql --version
      did not expose a server major version: {{ postgres_psql_version.stdout }}
  when: postgres_cluster_version | string | length == 0

- name: Check whether the PostgreSQL cluster config exists
  ansible.builtin.stat:
    path: "{{ postgres_conf_dir }}"
  register: postgres_cluster_config

- name: Check whether the persistent data directory already has a cluster
  ansible.builtin.stat:
    path: "{{ postgres_data_dir }}/PG_VERSION"
  register: postgres_existing_data_version

- name: Read the persistent data directory version
  ansible.builtin.slurp:
    src: "{{ postgres_data_dir }}/PG_VERSION"
  register: postgres_existing_data_pg_version
  when: postgres_existing_data_version.stat.exists

- name: Fail when persistent data belongs to a different PostgreSQL major
  ansible.builtin.fail:
    msg: >-
      Existing PostgreSQL data directory {{ postgres_data_dir }} belongs to
      major version {{ postgres_existing_data_pg_version.content | b64decode | trim }},
      but the installed server version selected for cluster
      {{ postgres_cluster_name }} is {{ postgres_cluster_version }}. Pin
      postgres_version or perform a controlled PostgreSQL upgrade before
      recreating the postgresql-common cluster config.
  when:
    - postgres_existing_data_version.stat.exists
    - (postgres_existing_data_pg_version.content | b64decode | trim) !=
      (postgres_cluster_version | string)

- name: Set pg_createcluster data directory
  ansible.builtin.set_fact:
    postgres_createcluster_data_dir: >-
      {{ postgres_data_root ~ '/.ansible-pg-createcluster-' ~
         postgres_cluster_version ~ '-' ~ postgres_cluster_name
         if postgres_existing_data_version.stat.exists
         else postgres_data_dir }}
  when: not postgres_cluster_config.stat.exists

- name: Remove stale temporary pg_createcluster data directory
  ansible.builtin.file:
    path: "{{ postgres_createcluster_data_dir }}"
    state: absent
  when:
    - not postgres_cluster_config.stat.exists
    - postgres_existing_data_version.stat.exists

- name: Create the PostgreSQL cluster when config is absent
  ansible.builtin.command:
    argv:
      - pg_createcluster
      - --datadir
      - "{{ postgres_createcluster_data_dir }}"
      - "{{ postgres_cluster_version }}"
      - "{{ postgres_cluster_name }}"
  changed_when: true
  when: not postgres_cluster_config.stat.exists

- name: Point recreated cluster config at existing persistent data
  ansible.builtin.lineinfile:
    path: "{{ postgres_conf_dir }}/postgresql.conf"
    regexp: "^data_directory\\s*="
    line: "data_directory = '{{ postgres_data_dir }}'"
  when:
    - not postgres_cluster_config.stat.exists
    - postgres_existing_data_version.stat.exists

- name: Remove temporary pg_createcluster data directory
  ansible.builtin.file:
    path: "{{ postgres_createcluster_data_dir }}"
    state: absent
  when:
    - not postgres_cluster_config.stat.exists
    - postgres_existing_data_version.stat.exists

- name: Ensure the PostgreSQL cluster config exists
  ansible.builtin.stat:
    path: "{{ postgres_conf_dir }}/postgresql.conf"
  register: postgres_cluster_config_file
  failed_when: not postgres_cluster_config_file.stat.exists

# =============================================================================
# Phase 2b: Standby bootstrap (postgres_role == 'standby')
# The Debian postinst always pre-creates a fresh cluster at PGDATA, so "empty
# PGDATA" never holds literally. The guard is therefore: clone only when there
# is no standby.signal (an established standby is left alone — idempotent
# rebuild) AND the pre-existing cluster holds zero user databases (a former
# primary's data is never destroyed). pg_basebackup -R writes standby.signal +
# primary_conninfo; role/database provisioning is skipped (Phase 4 is gated).
# =============================================================================
- name: Bootstrap this node as a streaming standby
  when: postgres_role == 'standby'
  block:
    - name: Check for an existing standby.signal
      ansible.builtin.stat:
        path: "{{ postgres_data_dir }}/standby.signal"
      register: postgres_standby_signal

    - name: Clone from the primary when no standby is established yet
      when: not postgres_standby_signal.stat.exists
      block:
        - name: Require the primary FQDN and replicator password for the clone
          ansible.builtin.assert:
            that:
              - postgres_replication_primary_host | length > 0
              - postgres_replication_password | length > 0
            fail_msg: >-
              postgres_role=standby needs postgres_replication_primary_host and
              POSTGRES_REPLICATOR_PASSWORD (env) set before it can pg_basebackup.
            quiet: true

        - name: Ensure the freshly-installed cluster is up so it can be inspected
          ansible.builtin.systemd:
            name: "postgresql@{{ postgres_cluster_version }}-{{ postgres_cluster_name }}"
            state: started

        - name: Count user databases in the pre-existing cluster
          become: true
          become_user: postgres
          community.postgresql.postgresql_query:
            db: postgres
            query: >-
              SELECT count(*) AS n FROM pg_database
              WHERE datistemplate = false AND datname <> 'postgres'
          register: postgres_preexisting_userdbs

        - name: Refuse to clone over a cluster that already holds user data
          ansible.builtin.assert:
            that: postgres_preexisting_userdbs.query_result[0].n | int == 0
            fail_msg: >-
              {{ postgres_data_dir }} already contains user databases; refusing
              to overwrite it with a base backup. Remove the data deliberately
              if this node is meant to become a standby.
            quiet: true

        - name: Stop the cluster so PGDATA can be replaced by the base backup
          ansible.builtin.systemd:
            name: "postgresql@{{ postgres_cluster_version }}-{{ postgres_cluster_name }}"
            state: stopped

        - name: Empty PGDATA for pg_basebackup
          ansible.builtin.file:
            path: "{{ postgres_data_dir }}"
            state: "{{ item }}"
            owner: postgres
            group: postgres
            mode: "0700"
          loop:
            - absent
            - directory

        - name: Base-backup PGDATA from the primary (streaming, self-configuring)
          become: true
          become_user: postgres
          ansible.builtin.command:
            argv: >-
              {{ ['pg_basebackup',
                  '--host', postgres_replication_primary_host,
                  '--username', postgres_replication_user,
                  '--pgdata', postgres_data_dir,
                  '--wal-method', 'stream',
                  '--write-recovery-conf']
                 + (['--slot', postgres_replication_slot]
                    if postgres_replication_slot | length > 0 else []) }}
            creates: "{{ postgres_data_dir }}/standby.signal"
          environment:
            PGPASSWORD: "{{ postgres_replication_password }}"
          no_log: true

        - name: Start the cluster as a standby
          ansible.builtin.systemd:
            name: "postgresql@{{ postgres_cluster_version }}-{{ postgres_cluster_name }}"
            state: started

- name: Ensure the PostgreSQL cluster service is started and enabled
  ansible.builtin.systemd:
    name: "postgresql@{{ postgres_cluster_version }}-{{ postgres_cluster_name }}"
    state: started
    enabled: true

# =============================================================================
# Phase 3: Cluster configuration (idempotent GUCs)
# postgresql_set only writes when the value differs, so the idempotence run is
# clean. listen_addresses/port need a restart; password_encryption reloads.
# =============================================================================
- name: Configure cluster GUCs
  become: true
  become_user: postgres
  vars:
    ansible_ssh_pipelining: true
  block:
    - name: Set listen_addresses
      community.postgresql.postgresql_set:
        name: listen_addresses
        value: "{{ postgres_listen_addresses }}"
      notify: Restart postgresql

    - name: Set port
      community.postgresql.postgresql_set:
        name: port
        value: "{{ postgres_port }}"
      notify: Restart postgresql

    - name: Enforce scram-sha-256 password encryption
      community.postgresql.postgresql_set:
        name: password_encryption
        value: "{{ postgres_password_encryption }}"
      notify: Reload postgresql

# =============================================================================
# Phase 3b: Primary replication config (postgres_role == 'primary' with a
# standby FQDN set). wal_level/max_wal_senders need a restart, folded into the
# flush below. The replicator role + hostname pg_hba entry let exactly the named
# standby stream. Off by default (empty standby host), so a plain primary is
# untouched.
# =============================================================================
- name: Configure the primary for streaming replication
  become: true
  become_user: postgres
  when:
    - postgres_role == 'primary'
    - postgres_replication_standby_host | length > 0
  vars:
    ansible_ssh_pipelining: true
  block:
    - name: Require the replicator password before enabling replication
      ansible.builtin.assert:
        that: postgres_replication_password | length > 0
        fail_msg: >-
          postgres_replication_standby_host is set but POSTGRES_REPLICATOR_PASSWORD
          (env) is empty; refusing to create a passwordless replication role.
        quiet: true

    - name: Set wal_level to replica
      community.postgresql.postgresql_set:
        name: wal_level
        value: replica
      notify: Restart postgresql

    - name: Set max_wal_senders
      community.postgresql.postgresql_set:
        name: max_wal_senders
        value: "{{ postgres_max_wal_senders }}"
      notify: Restart postgresql

    - name: Ensure the replicator login/replication role exists
      community.postgresql.postgresql_user:
        name: "{{ postgres_replication_user }}"
        password: "{{ postgres_replication_password }}"
        role_attr_flags: LOGIN,REPLICATION
        state: present
      no_log: true

    - name: Ensure the physical replication slot exists
      community.postgresql.postgresql_slot:
        name: "{{ postgres_replication_slot }}"
        slot_type: physical
        state: present
      when: postgres_replication_slot | length > 0

    - name: Allow the standby to stream replication (hostname pg_hba, scram)
      community.postgresql.postgresql_pg_hba:
        dest: "{{ postgres_conf_dir }}/pg_hba.conf"
        contype: host
        databases: replication
        users: "{{ postgres_replication_user }}"
        source: "{{ postgres_replication_standby_host }}"
        method: scram-sha-256
        state: present
      notify: Reload postgresql

# Apply a pending restart NOW so the remote listener + scram are live before we
# create roles and run the health check (handlers otherwise flush at play end).
- name: Apply pending PostgreSQL restart/reload
  ansible.builtin.meta: flush_handlers

# =============================================================================
# Phase 4: Roles, databases, and host-based auth
# Credentials come from the source secret store; apply them on each run so an
# app cutover can rotate from bootstrap SOPS values without manual SQL.
# Primary only: a standby is read-only and receives roles/databases over the
# replication stream, so provisioning them there would fail.
# =============================================================================
- name: Provision managed roles and databases
  become: true
  become_user: postgres
  when: postgres_role == 'primary'
  block:
    - name: Ensure each managed login role exists with the source password
      community.postgresql.postgresql_user:
        name: "{{ item.user }}"
        password: "{{ item.password }}"
        role_attr_flags: LOGIN
        state: present
      loop: "{{ postgres_managed_databases }}"
      loop_control:
        label: "{{ item.user }}"
      no_log: true

    - name: Create each managed database owned by its role
      community.postgresql.postgresql_db:
        name: "{{ item.name }}"
        owner: "{{ item.user }}"
        encoding: UTF-8
        # The minimal LXC template has no locale, so initdb built the cluster
        # SQL_ASCII; template1 inherits that and refuses UTF-8 children. Build
        # from template0 with an explicit C.UTF-8 locale instead.
        template: template0
        lc_collate: C.UTF-8
        lc_ctype: C.UTF-8
        state: present
      loop: "{{ postgres_managed_databases }}"
      loop_control:
        label: "{{ item.name }}"
      no_log: true

    - name: Grant the owning role all privileges on its database
      community.postgresql.postgresql_privs:
        database: "{{ item.name }}"
        roles: "{{ item.user }}"
        type: database
        privs: ALL
        state: present
      loop: "{{ postgres_managed_databases }}"
      loop_control:
        label: "{{ item.name }}"
      no_log: true

    - name: Allow each managed user to connect from its client CIDR (scram)
      community.postgresql.postgresql_pg_hba:
        dest: "{{ postgres_conf_dir }}/pg_hba.conf"
        contype: host
        databases: "{{ item.name }}"
        users: "{{ item.user }}"
        source: "{{ item.client_cidr }}"
        method: scram-sha-256
        state: present
      loop: "{{ postgres_managed_databases }}"
      loop_control:
        label: "{{ item.name }} <- {{ item.client_cidr }}"
      no_log: true
      notify: Reload postgresql

- name: Apply pending pg_hba reload
  ansible.builtin.meta: flush_handlers

# =============================================================================
# Phase 5: pg_dump backups on the persistent mount, via a systemd timer
# =============================================================================
- name: Configure pg_dump backups
  when: postgres_backup_enabled | bool
  block:
    - name: Create the backup directory on the persistent mount
      ansible.builtin.file:
        path: "{{ postgres_backup_dir }}"
        state: directory
        owner: postgres
        group: postgres
        mode: "0750"

    - name: Deploy the pg_dump backup script
      ansible.builtin.template:
        src: pg-backup.sh.j2
        dest: /usr/local/bin/pg-backup.sh
        owner: root
        group: root
        mode: "0755"

    - name: Deploy the pg_dump backup systemd service
      ansible.builtin.template:
        src: pg-backup.service.j2
        dest: /etc/systemd/system/pg-backup.service
        owner: root
        group: root
        mode: "0644"

    - name: Deploy the pg_dump backup systemd timer
      ansible.builtin.template:
        src: pg-backup.timer.j2
        dest: /etc/systemd/system/pg-backup.timer
        owner: root
        group: root
        mode: "0644"

    - name: Enable and start the pg_dump backup timer
      ansible.builtin.systemd:
        name: pg-backup.timer
        state: started
        enabled: true
        daemon_reload: true

# Trust the standby node's puller so ansible-proxmox roles/postgres_standby can
# rsync the backup directory into the replicated archive (Tier 1 of the
# Database DR Standard). Env-gated: no key supplied, no trust installed.
- name: Authorize the standby puller's SSH key(s) for root
  ansible.posix.authorized_key:
    user: root
    key: "{{ postgres_standby_pull_pubkeys }}"
  when: postgres_standby_pull_pubkeys | length > 0

# =============================================================================
# DR restore (explicit invocation only — the Database DR Standard's per-engine
# restore path). Runs a controller-fetched dump into the named database:
#   ansible-playbook ... --tags dr_restore \
#     -e postgres_dr_restore_db=<db> -e postgres_dr_restore_dump=<local path>
# Point _db at a scratch database for the mandatory restore drill.
# =============================================================================
# Var-gated, not just `never`-tagged: the role include's `postgres` tag is
# inherited by this block, so a plain `--tags postgres` converge still selects
# it despite `never` — the empty-input skip is what actually keeps it inert.
- name: DR restore from a logical dump
  when:
    - postgres_dr_restore_db | length > 0
    - postgres_dr_restore_dump | length > 0
  tags:
    - never
    - dr_restore
  block:
    - name: Stage the dump on the guest
      ansible.builtin.copy:
        src: "{{ postgres_dr_restore_dump }}"
        dest: /tmp/pg-dr-restore.dump
        owner: postgres
        group: postgres
        mode: "0600"

    - name: Ensure the restore target database exists
      become: true
      become_user: postgres
      community.postgresql.postgresql_db:
        name: "{{ postgres_dr_restore_db }}"
        state: present

    - name: Restore the dump (clean, if-exists)
      become: true
      become_user: postgres
      ansible.builtin.command:
        cmd: >-
          pg_restore --clean --if-exists
          --dbname={{ postgres_dr_restore_db }} /tmp/pg-dr-restore.dump
      changed_when: true

    - name: Remove the staged dump
      ansible.builtin.file:
        path: /tmp/pg-dr-restore.dump
        state: absent

# =============================================================================
# Phase 6: Health check
# =============================================================================
- name: Verify PostgreSQL answers a trivial query
  become: true
  become_user: postgres
  community.postgresql.postgresql_ping:
    db: postgres
  register: postgres_ping
  failed_when: not postgres_ping.is_available
  changed_when: false
