---
# Audit-log shipping plumbing. Runs on EVERY node (each node writes its own
# local audit file once the device is live cluster-wide). The device itself is
# DECLARATIVE: an `audit` stanza in openbao.hcl (this OpenBao build rejects
# `sys/audit` API writes outright — "cannot enable audit device via API",
# verified live 2026-07-18). The active node materializes the stanza on
# start/SIGHUP, so no privileged token and no API call are needed here.

- name: Create the OpenBao audit log directory
  ansible.builtin.file:
    path: "{{ openbao_audit_log_dir }}"
    state: directory
    owner: "{{ openbao_user }}"
    group: "{{ openbao_group }}"
    mode: "0750"

- name: Deploy the audit logrotate policy
  ansible.builtin.template:
    src: openbao-audit-logrotate.j2
    dest: "{{ openbao_audit_logrotate_path }}"
    owner: root
    group: root
    mode: "0644"

# --- Ship the audit file via a dedicated rsyslog ruleset ----------------------
# rsyslog is already present on these guests (site.yml applies syslog_forwarder
# to all non-pipeline LXCs), but install defensively so this role stands alone.
# update_cache stays false: these guests are firewalled to internal-only
# egress (see the WAN-free note in main.yml) — a cache refresh would wedge.
- name: Install rsyslog
  ansible.builtin.apt:
    name: rsyslog
    state: present
    update_cache: false

# The audit dir is 0750 openbao:openbao and the file 0640 — rsyslog runs as
# the syslog user, so group membership is what grants read access.
- name: Add the syslog user to the openbao group for audit-log read access
  ansible.builtin.user:
    name: syslog
    groups: "{{ openbao_group }}"
    append: true
  notify: Restart rsyslog

- name: Deploy the audit-log rsyslog imfile shipping ruleset
  ansible.builtin.template:
    src: openbao-audit-rsyslog.conf.j2
    dest: "{{ openbao_audit_rsyslog_config_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart rsyslog

# Full-config check, not a fragment `validate: rsyslogd -N1 -f %s`: the
# fragment alone has no global workDirectory in scope (it lives in
# rsyslog.conf), and imfile hard-fails validation without one. Checking the
# master config picks the fragment up from rsyslog.d with the global applied.
# On failure the play aborts here, so the notified restart never flushes and
# the running rsyslog keeps its previous config.
- name: Validate the full rsyslog configuration
  ansible.builtin.command: rsyslogd -N1
  changed_when: false

# No unit files are written here, so no daemon_reload.
- name: Enable and start rsyslog
  ansible.builtin.systemd:
    name: rsyslog
    state: started
    enabled: true
