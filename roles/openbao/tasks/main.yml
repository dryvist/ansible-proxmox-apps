---
# OpenBao install + configure. Native single Go binary on Debian; no Docker.
# Idempotent and safe to re-run. Bootstrap (init/unseal/AppRole) is delegated
# to tasks/init.yml, included after the service is up.

# --- Phase 1: prerequisites --------------------------------------------------
# These containers have narrowly-scoped runtime HTTPS egress for the AWS and
# GitHub APIs, but package installation remains controller-staged. Do not turn
# runtime API access into a target-side apt dependency: every package is either
# in the Debian base template or copied from the controller.
- name: Ensure OpenBao base prerequisites are present (no WAN; base-template pkgs)
  ansible.builtin.apt:
    name:
      - ca-certificates
    state: present
    update_cache: false

# --- Phase 2: system user / group -------------------------------------------
- name: Create openbao system group
  ansible.builtin.group:
    name: "{{ openbao_group }}"
    system: true
    state: present

- name: Create openbao system user
  ansible.builtin.user:
    name: "{{ openbao_user }}"
    group: "{{ openbao_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ openbao_data_dir }}"
    create_home: false
    state: present

# --- Phase 3: detect an existing install ------------------------------------
# The upstream .deb ships its own /etc/openbao (with package-owned perms) plus a
# default unit/user. So we (a) gate the download/copy/install/remove on whether
# the target version is already present, and (b) assert our own directories +
# perms AFTER install. Together that keeps the role idempotent — no re-copy of
# the .deb and no perms tug-of-war with the package on re-runs.
- name: Check the installed OpenBao version
  ansible.builtin.command: bao version
  register: openbao_installed_version
  changed_when: false
  failed_when: false

- name: Record whether the target OpenBao version is already installed
  ansible.builtin.set_fact:
    openbao_already_installed: >-
      {{ openbao_installed_version.rc == 0
         and openbao_version in (openbao_installed_version.stdout | default('')) }}

# --- Phase 4: download + verify the .deb on the controller -------------------
# Mirrors the minio role: stage on the controller (unrestricted egress), verify
# the SHA256 against the upstream checksums file, then copy to the target. LXC
# hosts in the outbound-internal firewall group cannot reach GitHub directly.
#
# ansible_become: false on the delegated tasks is REQUIRED — Ansible inherits
# the play's become: true on delegated tasks regardless of task-level become,
# which fails with "sudo: a password is required" on the controller.
- name: Stage OpenBao release checksums on controller
  ansible.builtin.get_url:
    url: "{{ openbao_checksums_url }}"
    dest: "/tmp/openbao-{{ openbao_version }}-checksums-linux.txt"
    mode: "0644"
    force: true
  delegate_to: localhost
  connection: local
  become: false
  vars:
    ansible_become: false
  run_once: true

- name: Read the expected SHA256 for the amd64 .deb
  ansible.builtin.set_fact:
    openbao_deb_sha256: >-
      {{ (lookup('file', '/tmp/openbao-' ~ openbao_version ~ '-checksums-linux.txt')
          | regex_search('([0-9a-f]{64})\s+' ~ (openbao_deb_filename | regex_escape), '\1')
          | first) }}
  run_once: true

- name: Assert a checksum was found for the .deb
  ansible.builtin.assert:
    that:
      - openbao_deb_sha256 is defined
      - openbao_deb_sha256 | length == 64
    fail_msg: >-
      Could not find a SHA256 for {{ openbao_deb_filename }} in the upstream
      checksums file. Did the asset naming change for v{{ openbao_version }}?
  run_once: true

- name: Stage the OpenBao .deb on controller (checksum-verified)
  ansible.builtin.get_url:
    url: "{{ openbao_deb_url }}"
    dest: "/tmp/{{ openbao_deb_filename }}"
    checksum: "sha256:{{ openbao_deb_sha256 }}"
    mode: "0644"
    force: true
  delegate_to: localhost
  connection: local
  become: false
  vars:
    ansible_become: false
  run_once: true

- name: Copy the OpenBao .deb to the target
  ansible.builtin.copy:
    src: "/tmp/{{ openbao_deb_filename }}"
    dest: "/tmp/{{ openbao_deb_filename }}"
    owner: root
    group: root
    mode: "0644"
  when: not openbao_already_installed

# --- Phase 5: install the package -------------------------------------------
# Installing the upstream .deb pulls in the `bao` binary. The package also ships
# its own openbao user/unit; we override the config + unit below so the role
# stays the single source of truth (User/Group already created above match).
# Skipped when the target version is already present (idempotent re-runs).
- name: Install OpenBao package
  ansible.builtin.apt:
    deb: "/tmp/{{ openbao_deb_filename }}"
    state: present
  when: not openbao_already_installed

- name: Remove the staged .deb from the target
  ansible.builtin.file:
    path: "/tmp/{{ openbao_deb_filename }}"
    state: absent
  when: not openbao_already_installed

# --- Phase 5b: directories (AFTER install so our perms are the final state) --
# Created here, not before install, because the .deb ships /etc/openbao with
# package-owned perms; asserting our perms afterwards means re-runs (which skip
# install) find the directory already correct → no change.
- name: Create OpenBao config directory
  ansible.builtin.file:
    path: "{{ openbao_config_dir }}"
    state: directory
    owner: root
    group: "{{ openbao_group }}"
    mode: "0750"

- name: Create OpenBao data directory (0700, owned by openbao)
  ansible.builtin.file:
    path: "{{ openbao_data_dir }}"
    state: directory
    owner: "{{ openbao_user }}"
    group: "{{ openbao_group }}"
    mode: "0700"

# Always created (openbao.hcl sets plugin_directory unconditionally, and the
# server refuses to start if the configured path is absent). Root-owned and
# never group-writable: the server validates each plugin launch against the
# catalog sha256, but a writable directory would still invite tampering.
- name: Create OpenBao plugin directory (0750, root-owned, openbao-exec)
  ansible.builtin.file:
    path: "{{ openbao_plugin_dir }}"
    state: directory
    owner: root
    group: "{{ openbao_group }}"
    mode: "0750"

# --- Phase 5c: stage the AWS secrets engine plugin (external, all nodes) -----
# The AWS engine is not builtin (see defaults) — stage its checksum-verified
# release tarball from the controller exactly like the server .deb, on EVERY
# node: the plugin catalog is cluster-replicated but each node execs its OWN
# copy of the binary, which must match the registered sha256.
- name: Stage the AWS plugin checksums file on controller
  ansible.builtin.get_url:
    url: "{{ openbao_aws_plugin_checksums_url }}"
    dest: "/tmp/openbao-{{ openbao_aws_plugin_release_tag }}-checksums.txt"
    mode: "0644"
    force: true
  delegate_to: localhost
  connection: local
  become: false
  vars:
    ansible_become: false
  run_once: true
  when: openbao_aws_engine_enabled

- name: Stage the AWS plugin detached signature on controller
  ansible.builtin.get_url:
    url: "{{ openbao_aws_plugin_signature_url }}"
    dest: "/tmp/{{ openbao_aws_plugin_tarball }}.sig"
    mode: "0644"
    force: true
  delegate_to: localhost
  connection: local
  become: false
  vars:
    ansible_become: false
  run_once: true
  when: openbao_aws_engine_enabled

- name: Build the OpenBao release verification keyring on controller
  ansible.builtin.command:
    argv:
      - gpg
      - --batch
      - --yes
      - --dearmor
      - --output
      - /tmp/openbao-release.gpg
      - "{{ role_path }}/files/openbao-release.asc"
  delegate_to: localhost
  connection: local
  become: false
  vars:
    ansible_become: false
  run_once: true
  changed_when: false
  when: openbao_aws_engine_enabled

- name: Read the expected SHA256 values for the AWS plugin release
  ansible.builtin.set_fact:
    openbao_aws_plugin_sha256: >-
      {{ (lookup('file', '/tmp/openbao-' ~ openbao_aws_plugin_release_tag ~ '-checksums.txt')
          | regex_search('([0-9a-f]{64})\s+' ~ (openbao_aws_plugin_tarball | regex_escape), '\1')
          | first) }}
    openbao_aws_plugin_binary_sha256: >-
      {{ (lookup('file', '/tmp/openbao-' ~ openbao_aws_plugin_release_tag ~ '-checksums.txt')
          | regex_search('([0-9a-f]{64})\s+' ~ (openbao_aws_plugin_binary | regex_escape) ~ '$', '\1', multiline=True)
          | first) }}
  run_once: true
  when: openbao_aws_engine_enabled

- name: Assert a checksum was found for the AWS plugin tarball
  ansible.builtin.assert:
    that:
      - openbao_aws_plugin_sha256 is defined
      - openbao_aws_plugin_sha256 | length == 64
      - openbao_aws_plugin_binary_sha256 is defined
      - openbao_aws_plugin_binary_sha256 | length == 64
    fail_msg: >-
      Could not find a SHA256 for {{ openbao_aws_plugin_tarball }} in the
      upstream checksums file. Did the asset naming change for
      {{ openbao_aws_plugin_release_tag }}?
  run_once: true
  when: openbao_aws_engine_enabled

- name: Stage the AWS plugin tarball on controller (checksum-verified)
  ansible.builtin.get_url:
    url: "{{ openbao_aws_plugin_tarball_url }}"
    dest: "/tmp/{{ openbao_aws_plugin_tarball }}"
    checksum: "sha256:{{ openbao_aws_plugin_sha256 }}"
    mode: "0644"
    force: true
  delegate_to: localhost
  connection: local
  become: false
  vars:
    ansible_become: false
  run_once: true
  when: openbao_aws_engine_enabled

- name: Verify the AWS plugin release signature
  ansible.builtin.command:
    argv:
      - gpgv
      - --keyring
      - /tmp/openbao-release.gpg
      - "/tmp/{{ openbao_aws_plugin_tarball }}.sig"
      - "/tmp/{{ openbao_aws_plugin_tarball }}"
  delegate_to: localhost
  connection: local
  become: false
  vars:
    ansible_become: false
  run_once: true
  changed_when: false
  when: openbao_aws_engine_enabled

- name: Extract the AWS plugin binary into the plugin directory
  ansible.builtin.unarchive:
    src: "/tmp/{{ openbao_aws_plugin_tarball }}"
    dest: "{{ openbao_plugin_dir }}"
    include:
      - "{{ openbao_aws_plugin_binary }}"
    owner: root
    group: "{{ openbao_group }}"
    mode: "0750"
  when: openbao_aws_engine_enabled

- name: Verify the extracted AWS plugin binary
  ansible.builtin.stat:
    path: "{{ openbao_plugin_dir }}/{{ openbao_aws_plugin_binary }}"
    checksum_algorithm: sha256
  register: openbao_aws_extracted_plugin
  when: openbao_aws_engine_enabled

- name: Assert the extracted AWS plugin matches the signed release
  ansible.builtin.assert:
    that:
      - openbao_aws_extracted_plugin.stat.checksum == openbao_aws_plugin_binary_sha256
    fail_msg: "The extracted AWS plugin SHA256 does not match the signed release manifest"
  when: openbao_aws_engine_enabled

- name: Install the immutable AWS plugin command
  ansible.builtin.copy:
    src: "{{ openbao_plugin_dir }}/{{ openbao_aws_plugin_binary }}"
    dest: "{{ openbao_plugin_dir }}/{{ openbao_aws_plugin_command }}"
    remote_src: true
    owner: root
    group: "{{ openbao_group }}"
    mode: "0750"
  when: openbao_aws_engine_enabled

# --- Phase 5d: stage the GitHub secrets engine plugin (external, all nodes) --
- name: Stage the GitHub plugin checksum manifest on controller
  ansible.builtin.get_url:
    url: "{{ openbao_github_plugin_checksums_url }}"
    dest: "/tmp/openbao-github-{{ openbao_github_plugin_checksums_filename }}"
    mode: "0644"
    force: true
  delegate_to: localhost
  connection: local
  become: false
  vars:
    ansible_become: false
  run_once: true
  when: openbao_github_engine_enabled

- name: Stage the GitHub plugin checksum signature on controller
  ansible.builtin.get_url:
    url: "{{ openbao_github_plugin_checksums_signature_url }}"
    dest: "/tmp/openbao-github-{{ openbao_github_plugin_checksums_filename }}.sig"
    mode: "0644"
    force: true
  delegate_to: localhost
  connection: local
  become: false
  vars:
    ansible_become: false
  run_once: true
  when: openbao_github_engine_enabled

- name: Build the GitHub plugin release verification keyring on controller
  ansible.builtin.command:
    argv:
      - gpg
      - --batch
      - --yes
      - --dearmor
      - --output
      - /tmp/martin-baillie-release.gpg
      - "{{ role_path }}/files/martin-baillie-release.asc"
  delegate_to: localhost
  connection: local
  become: false
  vars:
    ansible_become: false
  run_once: true
  changed_when: false
  when: openbao_github_engine_enabled

- name: Verify the GitHub plugin checksum manifest signature
  ansible.builtin.command:
    argv:
      - gpgv
      - --keyring
      - /tmp/martin-baillie-release.gpg
      - "/tmp/openbao-github-{{ openbao_github_plugin_checksums_filename }}.sig"
      - "/tmp/openbao-github-{{ openbao_github_plugin_checksums_filename }}"
  delegate_to: localhost
  connection: local
  become: false
  vars:
    ansible_become: false
  run_once: true
  changed_when: false
  when: openbao_github_engine_enabled

- name: Read the expected SHA256 for the GitHub plugin binary
  ansible.builtin.set_fact:
    openbao_github_plugin_sha256: >-
      {{ (lookup('file', '/tmp/openbao-github-' ~ openbao_github_plugin_checksums_filename)
          | regex_search('([0-9a-f]{64})\s+' ~ (openbao_github_plugin_asset | regex_escape) ~ '$', '\1', multiline=True)
          | first) }}
  run_once: true
  when: openbao_github_engine_enabled

- name: Assert a checksum was found for the GitHub plugin binary
  ansible.builtin.assert:
    that:
      - openbao_github_plugin_sha256 is defined
      - openbao_github_plugin_sha256 | length == 64
    fail_msg: >-
      Could not find {{ openbao_github_plugin_asset }} in the signed GitHub
      plugin checksum manifest for {{ openbao_github_plugin_release_tag }}.
  run_once: true
  when: openbao_github_engine_enabled

- name: Stage the GitHub plugin binary on controller
  ansible.builtin.get_url:
    url: "{{ openbao_github_plugin_asset_url }}"
    dest: "/tmp/{{ openbao_github_plugin_asset }}"
    checksum: "sha256:{{ openbao_github_plugin_sha256 }}"
    mode: "0750"
    force: true
  delegate_to: localhost
  connection: local
  become: false
  vars:
    ansible_become: false
  run_once: true
  when: openbao_github_engine_enabled

- name: Install the immutable GitHub plugin command
  ansible.builtin.copy:
    src: "/tmp/{{ openbao_github_plugin_asset }}"
    dest: "{{ openbao_plugin_dir }}/{{ openbao_github_plugin_command }}"
    owner: root
    group: "{{ openbao_group }}"
    mode: "0750"
  when: openbao_github_engine_enabled

# --- Phase 6: configuration --------------------------------------------------
- name: Render OpenBao server config
  ansible.builtin.template:
    src: openbao.hcl.j2
    dest: "{{ openbao_config_file }}"
    owner: root
    group: "{{ openbao_group }}"
    mode: "0640"
  notify: Restart openbao

- name: Render OpenBao static-seal EnvironmentFile
  ansible.builtin.template:
    src: openbao.env.j2
    dest: "{{ openbao_env_file }}"
    owner: root
    group: "{{ openbao_group }}"
    mode: "0600"
  no_log: true
  notify: Restart openbao

- name: Install OpenBao systemd unit
  ansible.builtin.template:
    src: openbao.service.j2
    dest: /etc/systemd/system/openbao.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart openbao

# --- Phase 7: enable + start -------------------------------------------------
# Skipped under Docker so the role can be molecule-tested in containers without
# a functional systemd init; the init/bootstrap phase is likewise gated.
- name: Enable and start OpenBao
  ansible.builtin.systemd:
    name: openbao
    state: "{{ openbao_service_state }}"
    enabled: "{{ openbao_service_enabled }}"
    daemon_reload: true
  when: ansible_virtualization_type | default('') != 'docker'

# Flush so the restart handler fires before init.yml probes the live socket.
- name: Apply any pending OpenBao restart before bootstrap
  ansible.builtin.meta: flush_handlers

# --- Phase 8: wait for the API ----------------------------------------------
# A sealed-but-up OpenBao still answers /v1/sys/health with 200/429/501/503.
# With static-key auto-unseal a joined node reaches 200 (initialized+unsealed)
# or 429 (standby); a fresh node returns 501 (not initialized). Any of those
# means the listener is accepting connections, which is all we need before
# init.yml runs (on the bootstrap host only).
- name: Wait for the OpenBao listener to accept connections
  ansible.builtin.uri:
    url: "{{ openbao_api_addr }}/v1/sys/health"
    method: GET
    status_code: [200, 429, 472, 473, 501, 503]
  register: openbao_health
  until: openbao_health.status is defined
  retries: 10
  delay: 3
  changed_when: false
  when: ansible_virtualization_type | default('') != 'docker'

# --- Phase 9: bootstrap (idempotent, bootstrap host only) -------------------
# Only the bootstrap host runs init/provisioning. The other Raft peers join the
# leader automatically (retry_join) and self-unseal via the static seal, so they
# need nothing here.
- name: Bootstrap OpenBao (init, KV, policies, AppRoles)
  ansible.builtin.include_tasks: init.yml
  when:
    - ansible_virtualization_type | default('') != 'docker'
    - inventory_hostname == openbao_bootstrap_host

# --- Phase 10: audit device + shipping (all nodes) ---------------------------
# File audit device (enable is token-gated + bootstrap-host-gated inside) plus
# the rsyslog imfile ruleset that ships each node's audit log to the
# openbao_audit AI ingest listener. Skipped under Docker (no systemd/live API),
# matching the bootstrap/snapshot phases.
- name: Enable the audit device and ship the audit log
  ansible.builtin.include_tasks: audit.yml
  when:
    - openbao_audit_enabled | bool
    - ansible_virtualization_type | default('') != 'docker'

# --- Phase 11: automated raft snapshots (all nodes; script leader-gates) -----
# Deployed on every openbao node so the surviving nodes keep snapshotting after
# a leadership change. Gated on the snapshot AppRole creds being present: they
# are emitted by init.yml at bootstrap and injected at converge from tier-0, so
# a first-bootstrap converge (creds not yet minted) skips this cleanly instead
# of rendering an empty-cred EnvironmentFile that would fail every cycle.
- name: Deploy the automated raft snapshot timer
  ansible.builtin.include_tasks: snapshot.yml
  when:
    - openbao_snapshot_enabled | bool
    - openbao_snapshot_role_id | length > 0
    - openbao_snapshot_secret_id | length > 0
