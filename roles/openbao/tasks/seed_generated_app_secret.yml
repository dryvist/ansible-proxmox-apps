---
# Generate-if-absent seeding of one app's service secrets in OpenBao. When
# secret/apps/<app> does not yet exist, generate a random value per field and
# write the secret atomically. An existing secret is left untouched, so a live
# credential is never rotated. Called per app from init.yml with openbao_seed_app
# + openbao_seed_fields. Replaces the retired terraform-proxmox vault-secrets root.
- name: Reset the per-app OpenBao seed accumulator
  ansible.builtin.set_fact:
    openbao_seed_desired: {}

- name: Check whether the app secret already exists in OpenBao
  ansible.builtin.command:
    cmd: "bao kv get -format=json {{ openbao_kv_mount }}/apps/{{ openbao_seed_app }}"
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  register: openbao_seed_current
  failed_when: false
  changed_when: false
  no_log: true

- name: Generate a random value per field for the app secret (absent only)
  ansible.builtin.set_fact:
    openbao_seed_desired: >-
      {{ openbao_seed_desired | combine({
           item: lookup('community.general.random_string',
                        length=(openbao_app_secret_key_length if item == 'secret_key'
                                else openbao_app_secret_length),
                        special=false) }) }}
  loop: "{{ openbao_seed_fields }}"
  no_log: true
  when: openbao_seed_current.rc != 0

- name: Write the generated app secret to OpenBao (absent only)
  ansible.builtin.command:
    argv: >-
      {{ ['bao', 'kv', 'put', openbao_kv_mount ~ '/apps/' ~ openbao_seed_app]
         + (openbao_seed_desired.keys() | zip(openbao_seed_desired.values())
            | map('join', '=') | list) }}
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  changed_when: true
  no_log: true
  when: openbao_seed_current.rc != 0
