---
# OpenBao bootstrap — runs ONLY on the bootstrap host (gated by the include in
# main.yml: inventory_hostname == openbao_bootstrap_host). It initializes the
# cluster, then provisions the KV mount, the RBAC policies, and the AppRoles
# (terraform-apply / Terrakube JWT / ansible-converge / observability /
# local-cloud / monitoring / media / local-llm / public / ai-readonly /
# ai-elevated / snapshot — see docs/SECRETS_HIERARCHY.md). The other Raft
# peers never run this: they join the leader automatically (retry_join in
# openbao.hcl) and self-unseal via the static seal. Every step is guarded so
# re-runs are no-ops: nothing is created if it already exists, and break-glass
# material is only emitted for AppRoles that were newly created THIS run —
# whether that's the very first bootstrap or a later run against an
# already-live cluster (supplied a privileged BAO_TOKEN) that only grows the
# RBAC surface with a few more identities.
#
# Break-glass safety: recovery shares + root token (and every new AppRole's
# role_id/secret_id) are written ONLY to 0600 files on the Ansible CONTROLLER
# under playbook_dir, and a LOUD warning tells the operator to transcribe to
# paper / load into the right store and delete. These values are NEVER
# written into the repo or onto a target host, and the `bao` invocations that
# touch them run with no_log: true.

# `bao status` exit codes: 0 = unsealed, 2 = sealed, 1 = error. For an
# uninitialized node the command still exits 0/2 with "initialized": false in
# the JSON body, so we parse the body rather than trust the exit code alone.
- name: Read OpenBao status
  ansible.builtin.command:
    cmd: bao status -format=json
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
  register: openbao_status_raw
  changed_when: false
  failed_when: openbao_status_raw.rc not in [0, 2]

- name: Parse OpenBao status
  ansible.builtin.set_fact:
    openbao_status: "{{ openbao_status_raw.stdout | from_json }}"

# --- Data-loss guard: never fresh-init on top of an existing cluster ---------
# A rolling expansion of a LIVE cluster must JOIN, never re-init. Before the
# bootstrap host would run `bao operator init`, probe every configured peer: if
# ANY already reports initialized=true, a real cluster exists and its data must
# be preserved, so we do NOT init (the peers' retry_join pulls this node in and
# the data replicates). Fresh init is allowed ONLY when no peer is initialized
# AND the operator explicitly opted in (openbao_allow_fresh_init) — so a
# mis-scoped node list fails loudly instead of silently orphaning the secrets.
- name: Probe peers for an already-initialized cluster
  ansible.builtin.uri:
    url: "http://{{ item }}:{{ openbao_api_port }}/v1/sys/health?standbyok=true&uninitcode=200&sealedcode=200"
    method: GET
    timeout: 5
    return_content: true
  loop: "{{ openbao_raft_peer_ips | reject('equalto', openbao_bind_address) | list }}"
  loop_control:
    label: "{{ item }}"
  register: openbao_peer_health
  changed_when: false
  failed_when: false
  when: not openbao_status.initialized

- name: Determine whether a live cluster already exists among the peers
  ansible.builtin.set_fact:
    openbao_existing_cluster_present: >-
      {{ (openbao_peer_health.results | default([]))
         | selectattr('json', 'defined')
         | map(attribute='json.initialized') | select('equalto', true)
         | list | length > 0 }}
  when: not openbao_status.initialized

- name: Refuse to fresh-init when a cluster may already exist (data-loss guard)
  ansible.builtin.fail:
    msg: >-
      This bootstrap host is not initialized, no already-initialized peer was
      reachable, and openbao_allow_fresh_init is false. Refusing `bao operator
      init` — it would create a NEW empty cluster and orphan any existing
      secrets. If this is a genuine first bootstrap, re-run with
      -e openbao_allow_fresh_init=true. If this is a rolling expansion, ensure
      the existing openbao nodes are in openbao_group and reachable, then re-run.
  when:
    - not openbao_status.initialized
    - not (openbao_existing_cluster_present | default(false))
    - not (openbao_allow_fresh_init | bool)

- name: Decide fresh-init vs join (join preserves an existing cluster's data)
  ansible.builtin.set_fact:
    openbao_do_fresh_init: >-
      {{ (not openbao_status.initialized)
         and (not (openbao_existing_cluster_present | default(false)))
         and (openbao_allow_fresh_init | bool) }}

# --- Initialization (only on a genuine first bootstrap) ---------------------
# With an auto-unseal seal (static key) `bao operator init` produces RECOVERY
# shares (not classic unseal keys); the static seal unwraps the root key on
# every start, so the bootstrap node self-unseals and the peers do too on join.
- name: Initialize OpenBao (recovery keys via static-key auto-unseal)
  ansible.builtin.command:
    cmd: >-
      bao operator init
      -recovery-shares={{ openbao_recovery_shares }}
      -recovery-threshold={{ openbao_recovery_threshold }}
      -format=json
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
  register: openbao_init_raw
  no_log: true
  changed_when: true
  when: openbao_do_fresh_init

- name: Capture init result
  ansible.builtin.set_fact:
    openbao_init: "{{ openbao_init_raw.stdout | from_json }}"
  no_log: true
  when: openbao_do_fresh_init

# Break-glass: write recovery shares + root token to a 0600 file ON THE
# CONTROLLER (gitignored), then shout at the operator to move it to paper.
- name: Write break-glass recovery material to controller (0600)
  ansible.builtin.copy:
    content: "{{ openbao_init | to_nice_json }}\n"
    dest: "{{ openbao_recovery_file }}"
    mode: "0600"
  delegate_to: localhost
  connection: local
  become: false
  vars:
    ansible_become: false
  no_log: true
  when: openbao_do_fresh_init

- name: WARN — transcribe recovery material to paper, then delete the file
  ansible.builtin.debug:
    msg: >-
      ============================================================
      OpenBao cluster INITIALIZED on the bootstrap node
      {{ inventory_hostname }}. Recovery shares + the initial root
      token were written to:
        {{ openbao_recovery_file }}
      (0600, on this controller, gitignored). TRANSCRIBE the
      recovery shares to PAPER, store them offline split across
      custodians, then SECURELY DELETE this file. With static-key
      auto-unseal the recovery shares are the break-glass path if
      the seal key is ever lost. Do NOT commit it. Do NOT leave it
      on disk.
      ============================================================
  when: openbao_do_fresh_init

# Root token: from this run's init output on the FIRST bootstrap. On a cluster
# that's already initialized, provisioning (new policies/AppRoles) only runs
# if the operator supplies a privileged token out-of-band via BAO_TOKEN (see
# openbao_admin_token in defaults) — without one, every step below skips
# cleanly, so a routine converge that isn't adding RBAC stays a no-op.
- name: Set the bootstrap token for provisioning (first init)
  ansible.builtin.set_fact:
    openbao_bootstrap_token: "{{ openbao_init.root_token }}"
  no_log: true
  when: openbao_do_fresh_init

- name: Use the externally-supplied admin token for provisioning against a live cluster
  ansible.builtin.set_fact:
    openbao_bootstrap_token: "{{ openbao_admin_token }}"
  no_log: true
  when:
    - openbao_status.initialized
    - openbao_admin_token | length > 0

# --- KV v2 mount (add-if-missing) -------------------------------------------
- name: List enabled secrets engines
  ansible.builtin.command:
    cmd: bao secrets list -format=json
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  register: openbao_mounts_raw
  no_log: true
  changed_when: false
  when: openbao_bootstrap_token is defined

- name: Enable KV v2 at the configured mount
  ansible.builtin.command:
    cmd: "bao secrets enable -path={{ openbao_kv_mount }} -version=2 kv"
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  no_log: true
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - (openbao_kv_mount ~ '/') not in (openbao_mounts_raw.stdout | from_json).keys()

# --- App-secret seeding (write-if-changed) ----------------------------------
# Promote Vikunja MCP service credentials (minted by the vikunja role, stored
# in SOPS) into secret/apps/vikunja so OpenBao is their canonical home. Values
# come from the converge environment (SOPS via `sops exec-env`), mapped by
# openbao_vikunja_secrets. Runs only on the bootstrap host under the admin
# token; writes only when a value differs from what is already stored.
- name: Assemble the desired vikunja app-secret map from the converge environment
  ansible.builtin.set_fact:
    openbao_vikunja_desired: >-
      {{ openbao_vikunja_desired | default({})
         | combine({ item.key: lookup('env', item.value) }) }}
  loop: "{{ openbao_vikunja_secrets | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  no_log: true
  when:
    - openbao_bootstrap_token is defined
    - lookup('env', item.value) | length > 0

- name: Read the current vikunja app secrets from OpenBao
  ansible.builtin.command:
    cmd: "bao kv get -format=json {{ openbao_kv_mount }}/apps/vikunja"
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  register: openbao_vikunja_current
  failed_when: false
  changed_when: false
  no_log: true
  when:
    - openbao_bootstrap_token is defined
    - (openbao_vikunja_desired | default({})) | length > 0

- name: Seed or update the vikunja app secrets in OpenBao (write-if-changed)
  ansible.builtin.command:
    argv: >-
      {{ ['bao', 'kv', 'put', openbao_kv_mount ~ '/apps/vikunja']
         + (openbao_vikunja_desired.keys() | zip(openbao_vikunja_desired.values())
            | map('join', '=') | list) }}
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  no_log: true
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - (openbao_vikunja_desired | default({})) | length > 0
    - >-
      (openbao_vikunja_current.rc | default(1)) != 0
      or (openbao_vikunja_current.stdout | default('{}') | from_json).data.data | default({})
         != (openbao_vikunja_desired | default({}))

# --- App-secret generation (generate-if-absent) -----------------------------
# Generate + seed each app's service credentials directly in OpenBao, replacing
# the retired terraform-proxmox vault-secrets root. Human-gated: runs only on
# the bootstrap host under the admin token. Each secret is created ONCE when
# absent and never rewritten, so a live credential is never rotated (same
# create-once contract the tofu root had via random_password + ignore_changes).
- name: Generate + seed per-app service secrets in OpenBao (generate-if-absent)
  ansible.builtin.include_tasks: seed_generated_app_secret.yml
  loop: "{{ openbao_generated_app_secrets | dict2items }}"
  loop_control:
    loop_var: openbao_seed_item
    label: "{{ openbao_seed_item.key }}"
  vars:
    openbao_seed_app: "{{ openbao_seed_item.key }}"
    openbao_seed_fields: "{{ openbao_seed_item.value }}"
  when: openbao_bootstrap_token is defined

# --- AWS secrets engine (external plugin: register + enable, add-if-missing) -
# Dynamic STS creds for role/tf-proxmox — replaces the laptop's static
# aws-vault base key. The engine is NOT builtin: main.yml staged the plugin
# binary on every node; here the bootstrap host registers it in the
# cluster-replicated catalog (pinned to the staged binary's sha256), then
# mounts it. See defaults/main.yml for the var docs.
- name: Read the staged AWS plugin binary's sha256
  ansible.builtin.stat:
    path: "{{ openbao_plugin_dir }}/{{ openbao_aws_plugin_command }}"
    checksum_algorithm: sha256
  register: openbao_aws_plugin_stat
  when:
    - openbao_bootstrap_token is defined
    - openbao_aws_engine_enabled | bool

- name: Assert the AWS plugin binary is staged
  ansible.builtin.assert:
    that:
      - openbao_aws_plugin_stat.stat.exists
    fail_msg: >-
      {{ openbao_plugin_dir }}/{{ openbao_aws_plugin_command }} is missing —
      the staging phase in main.yml should have extracted it. Re-run the full
      role (not init in isolation).
  when:
    - openbao_bootstrap_token is defined
    - openbao_aws_engine_enabled | bool

- name: Check whether the AWS plugin is already registered
  ansible.builtin.command:
    cmd: >-
      bao plugin info -format=json
      -version={{ openbao_aws_plugin_catalog_version }}
      secret {{ openbao_aws_plugin_name }}
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  register: openbao_aws_plugin_check
  no_log: true
  changed_when: false
  failed_when: false
  when:
    - openbao_bootstrap_token is defined
    - openbao_aws_engine_enabled | bool

- name: Register the AWS plugin (pinned to the staged binary's sha256)
  ansible.builtin.command:
    cmd: >-
      bao plugin register
      -sha256={{ openbao_aws_plugin_stat.stat.checksum }}
      -command={{ openbao_aws_plugin_command }}
      -version={{ openbao_aws_plugin_catalog_version }}
      secret {{ openbao_aws_plugin_name }}
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  no_log: true
  register: openbao_aws_plugin_register
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - openbao_aws_engine_enabled | bool
    - (openbao_aws_plugin_check.rc | default(1)) != 0

- name: Enable the AWS secrets engine
  ansible.builtin.command:
    cmd: >-
      bao secrets enable -path={{ openbao_aws_mount }}
      -plugin-version={{ openbao_aws_plugin_catalog_version }}
      {{ openbao_aws_plugin_name }}
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  no_log: true
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - openbao_aws_engine_enabled | bool
    - (openbao_aws_mount ~ '/') not in (openbao_mounts_raw.stdout | from_json).keys()

- name: Tune the existing AWS mount to the declared plugin version
  ansible.builtin.command:
    cmd: >-
      bao secrets tune -plugin-version={{ openbao_aws_plugin_catalog_version }}
      {{ openbao_aws_mount }}/
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  no_log: true
  register: openbao_aws_plugin_tune
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - openbao_aws_engine_enabled | bool
    - (openbao_aws_mount ~ '/') in (openbao_mounts_raw.stdout | from_json).keys()
    - >-
      ((openbao_mounts_raw.stdout | from_json)[openbao_aws_mount ~ '/'].plugin_version
       | default('')) != openbao_aws_plugin_catalog_version

- name: Reload the AWS plugin across the Raft cluster after an upgrade
  ansible.builtin.command:
    cmd: "bao plugin reload -plugin={{ openbao_aws_plugin_name }} -scope=global"
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  no_log: true
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - openbao_aws_engine_enabled | bool
    - openbao_aws_plugin_tune is changed

# Root config holds the ONE long-lived AWS base-user key OpenBao uses to call
# sts:AssumeRole. Checked via `bao read`, not the mounts list above — a mount
# can exist with no root config yet configured (fresh `secrets enable`).
- name: Check whether the AWS engine root config already exists
  ansible.builtin.command:
    cmd: "bao read -format=json {{ openbao_aws_mount }}/config/root"
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  register: openbao_aws_root_check
  no_log: true
  changed_when: false
  failed_when: false
  when:
    - openbao_bootstrap_token is defined
    - openbao_aws_engine_enabled | bool

# Fail loudly rather than silently leave a mounted-but-unconfigured engine: a
# skip here would make `bao read aws/sts/tf-proxmox` fail later with a much
# more confusing error, and a routine converge that forgot the root key would
# look green while doing nothing.
- name: Refuse to leave the AWS engine mounted with no root config and no key supplied
  ansible.builtin.fail:
    msg: >-
      The AWS secrets engine at {{ openbao_aws_mount }}/ has no root config yet,
      and OPENBAO_AWS_ROOT_ACCESS_KEY_ID/OPENBAO_AWS_ROOT_SECRET_ACCESS_KEY are
      unset. Seed the base-user key (minted via an independent admin path, NOT
      the key being rotated out) into Doppler tier-0 and re-run with those env
      vars set, or set openbao_aws_engine_enabled: false to skip AWS entirely.
  when:
    - openbao_bootstrap_token is defined
    - openbao_aws_engine_enabled | bool
    - (openbao_aws_root_check.rc | default(1)) != 0
    - (openbao_aws_root_access_key_id | length == 0) or (openbao_aws_root_secret_access_key | length == 0)

# Write-once: a routine converge with root already configured never
# overwrites/rotates it silently (mirrors the seal-key pattern) — rotation is a
# deliberate, separate operator action.
- name: Configure the AWS engine root credentials (first configuration only)
  ansible.builtin.uri:
    url: "{{ openbao_api_addr }}/v1/{{ openbao_aws_mount }}/config/root"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_bootstrap_token }}"
    body_format: json
    body:
      access_key: "{{ openbao_aws_root_access_key_id }}"
      secret_key: "{{ openbao_aws_root_secret_access_key }}"
      region: "{{ openbao_aws_root_region }}"
    status_code:
      - 200
      - 204
  no_log: true
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - openbao_aws_engine_enabled | bool
    - (openbao_aws_root_check.rc | default(1)) != 0
    - openbao_aws_root_access_key_id | length > 0
    - openbao_aws_root_secret_access_key | length > 0

- name: Check whether the tf-proxmox AWS role already exists
  ansible.builtin.command:
    cmd: "bao read -format=json {{ openbao_aws_mount }}/roles/{{ openbao_aws_role_name }}"
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  register: openbao_aws_role_check
  no_log: true
  changed_when: false
  failed_when: false
  when:
    - openbao_bootstrap_token is defined
    - openbao_aws_engine_enabled | bool

- name: Create the tf-proxmox AWS role (assumed_role, add-if-missing)
  ansible.builtin.command:
    cmd: >-
      bao write {{ openbao_aws_mount }}/roles/{{ openbao_aws_role_name }}
      credential_type=assumed_role
      role_arns={{ openbao_aws_role_arn }}
      default_sts_ttl={{ openbao_aws_default_sts_ttl }}
      max_sts_ttl={{ openbao_aws_max_sts_ttl }}
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  no_log: true
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - openbao_aws_engine_enabled | bool
    - (openbao_aws_role_check.rc | default(1)) != 0
    - openbao_aws_role_arn | length > 0

- name: Check whether the openbao-iac-admin AWS role already exists
  ansible.builtin.command:
    cmd: "bao read -format=json {{ openbao_aws_mount }}/roles/{{ openbao_aws_iac_admin_role_name }}"
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  register: openbao_aws_iac_admin_role_check
  no_log: true
  changed_when: false
  failed_when: false
  when:
    - openbao_bootstrap_token is defined
    - openbao_aws_engine_enabled | bool

- name: Create the openbao-iac-admin AWS role (assumed_role, add-if-missing)
  ansible.builtin.command:
    cmd: >-
      bao write {{ openbao_aws_mount }}/roles/{{ openbao_aws_iac_admin_role_name }}
      credential_type=assumed_role
      role_arns={{ openbao_aws_iac_admin_role_arn }}
      default_sts_ttl={{ openbao_aws_iac_admin_default_sts_ttl }}
      max_sts_ttl={{ openbao_aws_iac_admin_max_sts_ttl }}
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  no_log: true
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - openbao_aws_engine_enabled | bool
    - (openbao_aws_iac_admin_role_check.rc | default(1)) != 0
    - openbao_aws_iac_admin_role_arn | length > 0

# --- GitHub secrets engine (independent GitHub App token broker) ------------
- name: Read the staged GitHub plugin binary's sha256
  ansible.builtin.stat:
    path: "{{ openbao_plugin_dir }}/{{ openbao_github_plugin_command }}"
    checksum_algorithm: sha256
  register: openbao_github_plugin_stat
  when:
    - openbao_bootstrap_token is defined
    - openbao_github_engine_enabled | bool

- name: Assert the GitHub plugin binary is staged
  ansible.builtin.assert:
    that:
      - openbao_github_plugin_stat.stat.exists
    fail_msg: >-
      {{ openbao_plugin_dir }}/{{ openbao_github_plugin_command }} is missing.
      Re-run the full role so every Raft voter receives the plugin first.
  when:
    - openbao_bootstrap_token is defined
    - openbao_github_engine_enabled | bool

- name: Check whether the GitHub plugin version is registered
  ansible.builtin.command:
    cmd: >-
      bao plugin info -format=json
      -version={{ openbao_github_plugin_catalog_version }}
      secret {{ openbao_github_plugin_name }}
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  register: openbao_github_plugin_check
  no_log: true
  changed_when: false
  failed_when: false
  when:
    - openbao_bootstrap_token is defined
    - openbao_github_engine_enabled | bool

- name: Register the GitHub secrets plugin version
  ansible.builtin.command:
    cmd: >-
      bao plugin register
      -sha256={{ openbao_github_plugin_stat.stat.checksum }}
      -command={{ openbao_github_plugin_command }}
      -version={{ openbao_github_plugin_catalog_version }}
      secret {{ openbao_github_plugin_name }}
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  register: openbao_github_plugin_register
  no_log: true
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - openbao_github_engine_enabled | bool
    - (openbao_github_plugin_check.rc | default(1)) != 0

- name: Enable the GitHub secrets engine
  ansible.builtin.command:
    cmd: >-
      bao secrets enable -path={{ openbao_github_mount }}
      -plugin-version={{ openbao_github_plugin_catalog_version }}
      {{ openbao_github_plugin_name }}
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  no_log: true
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - openbao_github_engine_enabled | bool
    - (openbao_github_mount ~ '/') not in (openbao_mounts_raw.stdout | from_json).keys()

- name: Tune the existing GitHub mount to the declared plugin version
  ansible.builtin.command:
    cmd: >-
      bao secrets tune -plugin-version={{ openbao_github_plugin_catalog_version }}
      {{ openbao_github_mount }}/
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  register: openbao_github_plugin_tune
  no_log: true
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - openbao_github_engine_enabled | bool
    - (openbao_github_mount ~ '/') in (openbao_mounts_raw.stdout | from_json).keys()
    - >-
      ((openbao_mounts_raw.stdout | from_json)[openbao_github_mount ~ '/'].plugin_version
       | default('')) != openbao_github_plugin_catalog_version

- name: Reload the GitHub plugin across the Raft cluster after an upgrade
  ansible.builtin.command:
    cmd: "bao plugin reload -plugin={{ openbao_github_plugin_name }} -scope=global"
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  no_log: true
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - openbao_github_engine_enabled | bool
    - openbao_github_plugin_tune is changed

- name: Read the GitHub engine configuration
  ansible.builtin.command:
    cmd: "bao read -format=json {{ openbao_github_mount }}/config"
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  register: openbao_github_config_check
  no_log: true
  changed_when: false
  failed_when: false
  when:
    - openbao_bootstrap_token is defined
    - openbao_github_engine_enabled | bool

- name: Require the GitHub App credentials for first configuration
  ansible.builtin.assert:
    that:
      - openbao_github_app_id | length > 0
      - openbao_github_app_private_key | length > 0
    fail_msg: >-
      The GitHub secrets engine is unconfigured. Supply OPENBAO_GITHUB_APP_ID
      and OPENBAO_GITHUB_APP_PRIVATE_KEY for this one-time sealed write.
  when:
    - openbao_bootstrap_token is defined
    - openbao_github_engine_enabled | bool
    - (openbao_github_config_check.rc | default(1)) != 0

- name: Configure the GitHub App credentials (first configuration only)
  ansible.builtin.uri:
    url: "{{ openbao_api_addr }}/v1/{{ openbao_github_mount }}/config"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_bootstrap_token }}"
    body_format: json
    body:
      app_id: "{{ openbao_github_app_id | int }}"
      prv_key: "{{ openbao_github_app_private_key }}"
      exclude_repository_metadata: true
    status_code:
      - 200
      - 204
  no_log: true
  when:
    - openbao_bootstrap_token is defined
    - openbao_github_engine_enabled | bool
    - (openbao_github_config_check.rc | default(1)) != 0
    - openbao_github_app_id | length > 0
    - openbao_github_app_private_key | length > 0

- name: Refuse an unexpected GitHub App ID drift
  ansible.builtin.assert:
    that:
      - >-
        (openbao_github_config_check.stdout | from_json).data.app_id | string
        == openbao_github_app_id | string
    fail_msg: >-
      The configured GitHub App ID differs from OPENBAO_GITHUB_APP_ID. Rotate
      the App key deliberately; a routine converge will not replace it.
  when:
    - openbao_bootstrap_token is defined
    - openbao_github_engine_enabled | bool
    - (openbao_github_config_check.rc | default(1)) == 0
    - openbao_github_app_id | length > 0

- name: Require both GitHub App installation IDs
  ansible.builtin.assert:
    that:
      - openbao_github_dryvist_installation_id | int > 0
      - openbao_github_personal_installation_id | int > 0
    fail_msg: >-
      Supply OPENBAO_GITHUB_DRYVIST_INSTALLATION_ID and
      OPENBAO_GITHUB_PERSONAL_INSTALLATION_ID after installing the dedicated
      App on both accounts.
  when:
    - openbao_bootstrap_token is defined
    - openbao_github_engine_enabled | bool

- name: Read the GitHub token permission sets
  ansible.builtin.command:
    cmd: >-
      bao read -format=json
      {{ openbao_github_mount }}/permissionset/{{ item.name }}
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  loop: "{{ openbao_github_permission_sets }}"
  loop_control:
    label: "{{ item.name }}"
  register: openbao_github_permission_set_checks
  no_log: true
  changed_when: false
  failed_when: false
  when:
    - openbao_bootstrap_token is defined
    - openbao_github_engine_enabled | bool

- name: Reconcile the GitHub token permission sets
  ansible.builtin.uri:
    url: >-
      {{ openbao_api_addr }}/v1/{{ openbao_github_mount
      }}/permissionset/{{ item.0.name }}
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_bootstrap_token }}"
    body_format: json
    body:
      installation_id: "{{ item.0.installation_id | int }}"
    status_code:
      - 200
      - 204
  loop: >-
    {{ openbao_github_permission_sets
       | zip(openbao_github_permission_set_checks.results | default([])) | list }}
  loop_control:
    label: "{{ item.0.name }}"
  no_log: true
  when:
    - openbao_bootstrap_token is defined
    - openbao_github_engine_enabled | bool
    - >-
      (item.1.rc | default(1)) != 0
      or ((item.1.stdout | from_json).data.installation_id | int)
         != (item.0.installation_id | int)

# --- Fail-closed guard: no AI capability leaf for the control plane / kernel --
# The base read-/write- leaves are rendered blindly from openbao_ai_domains +
# openbao_ai_readonly_extra_subtrees. A typo or malicious entry naming the IaC
# kernel or a control-plane mount (infra / sys / auth) would mint a leaf granting
# it, and every rollup composed of leaves would inherit it — the one way the
# enumerated-allowlist proof could be subverted. Refuse before rendering anything.
- name: Assert no AI capability subtree names a forbidden control-plane path
  ansible.builtin.assert:
    that:
      - (openbao_ai_domains + openbao_ai_readonly_extra_subtrees)
        | map('lower') | select('in', openbao_ai_forbidden_subtrees) | list | length == 0
    fail_msg: >-
      An AI capability subtree names a forbidden control-plane/kernel path
      ({{ openbao_ai_forbidden_subtrees | join(', ') }}). Refusing to render base
      read-/write- leaves — this would grant the IaC kernel or the policy/auth
      control plane and break the self-escalation invariant.
    success_msg: "AI capability subtrees are all outside the control plane/kernel."
  when: openbao_bootstrap_token is defined

# --- RBAC policies (write-if-missing-or-changed) ----------------------------
# Rendered on the TARGET: `bao policy write` below executes there and reads
# the file from its local filesystem (a controller-side render is unreachable
# from the target). Policy HCL is non-secret — it comes from the committed
# templates. Rendered into openbao_config_dir (/etc/openbao, 0750 root:openbao)
# rather than world-writable /tmp, so the write is not exposed to symlink races
# or other local users on the host.
- name: Render the RBAC policies to the target
  ansible.builtin.template:
    src: "{{ item.template }}"
    dest: "{{ openbao_config_dir }}/.policy-{{ item.name }}.hcl"
    mode: "0600"
  loop: "{{ openbao_policies }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: false
  when: openbao_bootstrap_token is defined

- name: List existing policies
  ansible.builtin.command:
    cmd: bao policy list -format=json
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  register: openbao_policies_raw
  no_log: true
  changed_when: false
  when: openbao_bootstrap_token is defined

- name: Read rendered RBAC policy contents from the target
  ansible.builtin.slurp:
    src: "{{ openbao_config_dir }}/.policy-{{ item.name }}.hcl"
  loop: "{{ openbao_policies }}"
  loop_control:
    label: "{{ item.name }}"
  register: openbao_rendered_policy_reads
  changed_when: false
  when: openbao_bootstrap_token is defined

- name: Build the rendered RBAC policy content map
  ansible.builtin.set_fact:
    openbao_rendered_policy_map: >-
      {{ openbao_rendered_policy_map | default({})
         | combine({ item.item.name: (item.content | default('') | b64decode) }) }}
  loop: "{{ openbao_rendered_policy_reads.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}"
  when:
    - openbao_bootstrap_token is defined
    - not (item.skipped | default(false))

- name: Read existing RBAC policy contents
  ansible.builtin.command:
    cmd: "bao policy read -format=json {{ item.name }}"
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  loop: "{{ openbao_policies }}"
  loop_control:
    label: "{{ item.name }}"
  register: openbao_existing_policy_reads
  no_log: true
  changed_when: false
  when:
    - openbao_bootstrap_token is defined
    - item.name in (openbao_policies_raw.stdout | from_json)

- name: Build the existing RBAC policy content map
  ansible.builtin.set_fact:
    openbao_existing_policy_map: >-
      {{ openbao_existing_policy_map | default({})
         | combine({ item.item.name: ((item.stdout | default('{}') | from_json).data.policy | default('')) }) }}
  loop: "{{ openbao_existing_policy_reads.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}"
  no_log: true
  when:
    - openbao_bootstrap_token is defined
    - not (item.skipped | default(false))
    - (item.rc | default(1)) == 0

- name: Write the RBAC policies that are missing or changed
  ansible.builtin.command:
    cmd: >-
      bao policy write {{ item.name }}
      {{ openbao_config_dir }}/.policy-{{ item.name }}.hcl
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  loop: "{{ openbao_policies }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - >-
      item.name not in (openbao_policies_raw.stdout | from_json)
      or
      (openbao_existing_policy_map | default({})).get(item.name, '')
      !=
      (openbao_rendered_policy_map | default({})).get(item.name, '')

- name: Remove the rendered policies from the target
  ansible.builtin.file:
    path: "{{ openbao_config_dir }}/.policy-{{ item.name }}.hcl"
    state: absent
  loop: "{{ openbao_policies }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: false
  when: openbao_bootstrap_token is defined

# --- AppRole auth method (add-if-missing) -----------------------------------
- name: List enabled auth methods
  ansible.builtin.command:
    cmd: bao auth list -format=json
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  register: openbao_auth_raw
  no_log: true
  changed_when: false
  when: openbao_bootstrap_token is defined

- name: Enable the AppRole auth method
  ansible.builtin.command:
    cmd: bao auth enable approle
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  no_log: true
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - "'approle/' not in (openbao_auth_raw.stdout | from_json).keys()"

# --- Terrakube native JWT workload identity --------------------------------
- name: Enable the Terrakube JWT auth method
  ansible.builtin.command:
    cmd: "bao auth enable -path={{ openbao_terrakube_jwt_auth_path }} jwt"
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  no_log: true
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - (openbao_terrakube_jwt_auth_path ~ '/') not in (openbao_auth_raw.stdout | from_json).keys()

- name: Read the Terrakube JWT auth configuration
  ansible.builtin.command:
    cmd: "bao read -format=json auth/{{ openbao_terrakube_jwt_auth_path }}/config"
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  register: openbao_terrakube_jwt_config_current
  no_log: true
  changed_when: false
  failed_when: false
  when: openbao_bootstrap_token is defined

- name: Configure Terrakube as the JWT issuer
  ansible.builtin.command:
    cmd: "bao write auth/{{ openbao_terrakube_jwt_auth_path }}/config -"
    stdin: >-
      {{ {'oidc_discovery_url': openbao_terrakube_jwt_issuer,
            'bound_issuer': openbao_terrakube_jwt_issuer} | to_json }}
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  no_log: true
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - >-
      (openbao_terrakube_jwt_config_current.rc | default(1)) != 0
      or ((openbao_terrakube_jwt_config_current.stdout | default('{}') | from_json).data
          | default({}, true)).oidc_discovery_url | default('')
         != openbao_terrakube_jwt_issuer
      or ((openbao_terrakube_jwt_config_current.stdout | default('{}') | from_json).data
          | default({}, true)).bound_issuer | default('')
         != openbao_terrakube_jwt_issuer

- name: Read Terrakube workspace JWT roles
  ansible.builtin.command:
    cmd: "bao read -format=json auth/{{ openbao_terrakube_jwt_auth_path }}/role/terrakube-{{ item.name }}"
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  loop: "{{ openbao_terrakube_workspaces }}"
  loop_control:
    label: "{{ item.name }}"
  register: openbao_terrakube_jwt_role_reads
  no_log: true
  changed_when: false
  failed_when: false
  when: openbao_bootstrap_token is defined

- name: Reconcile exact-claim Terrakube workspace JWT roles
  ansible.builtin.command:
    cmd: "bao write auth/{{ openbao_terrakube_jwt_auth_path }}/role/terrakube-{{ item.0.name }} -"
    stdin: >-
      {{ {'role_type': 'jwt',
            'bound_audiences': [openbao_terrakube_jwt_audience],
            'bound_claims': {
              'sub': 'organization:' ~ openbao_terrakube_organization ~ ':workspace:' ~ item.0.name
            },
            'user_claim': 'sub',
            'policies': ['terrakube-' ~ item.0.name],
            'token_ttl': openbao_terrakube_jwt_token_ttl} | to_json }}
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  loop: "{{ openbao_terrakube_workspaces | zip(openbao_terrakube_jwt_role_reads.results | default([])) | list }}"
  loop_control:
    label: "{{ item.0.name }}"
  no_log: true
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - >-
      (item.1.rc | default(1)) != 0
      or ((item.1.stdout | default('{}') | from_json).data
          | default({}, true)).bound_audiences | default([])
         != [openbao_terrakube_jwt_audience]
      or (((item.1.stdout | default('{}') | from_json).data
           | default({}, true)).bound_claims | default({}, true)).sub | default('')
         != 'organization:' ~ openbao_terrakube_organization ~ ':workspace:' ~ item.0.name
      or ((item.1.stdout | default('{}') | from_json).data
          | default({}, true)).token_policies | default([])
         != ['terrakube-' ~ item.0.name]
      or ((item.1.stdout | default('{}') | from_json).data
          | default({}, true)).token_ttl | default(0) | int
         != (openbao_terrakube_jwt_token_ttl | regex_replace('m$', '') | int) * 60

# --- AppRoles (add-if-missing), one per RBAC group --------------------------
- name: Check whether each AppRole already exists
  ansible.builtin.command:
    cmd: "bao read -format=json auth/approle/role/{{ item.name }}"
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  loop: "{{ openbao_approles }}"
  loop_control:
    label: "{{ item.name }}"
  register: openbao_approle_checks
  no_log: true
  changed_when: false
  failed_when: false
  when: openbao_bootstrap_token is defined

- name: Create the missing AppRoles bound to their policy
  ansible.builtin.command:
    cmd: >-
      bao write auth/approle/role/{{ item.0.name }}
      token_policies={{ (item.0.token_policies | default([item.0.policy])) | join(',') }}
      token_ttl={{ item.0.token_ttl | default(openbao_approle_token_ttl) }}
      token_max_ttl={{ item.0.token_max_ttl | default(openbao_approle_token_max_ttl) }}
      secret_id_ttl={{ item.0.secret_id_ttl | default('0') }}
      secret_id_num_uses={{ item.0.secret_id_num_uses | default('0') }}
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  loop: "{{ openbao_approles | zip(openbao_approle_checks.results | default([])) | list }}"
  loop_control:
    label: "{{ item.0.name }}"
  no_log: true
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - (item.1.rc | default(0)) != 0

# Surface role_id + a fresh secret_id only for AppRoles that were JUST created
# THIS run (the check above found them missing) — so re-runs never mint new
# credentials silently, whether this is the very first bootstrap (everything
# is new) or a later run against an already-live cluster that only adds a few
# new identities (only those get creds; existing ones are untouched). Each
# task below loops over the SAME zipped (approle, existence-check) pairs as
# "Create the missing AppRoles" above, with the SAME per-item `when` guard, so
# every registered .results list lines up positionally — skipped iterations
# stay skipped in lockstep across role_id read, secret_id generation, and the
# final break-glass write.
- name: Read newly-created AppRole role_ids
  ansible.builtin.command:
    cmd: "bao read -format=json auth/approle/role/{{ item.0.name }}/role-id"
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  loop: "{{ openbao_approles | zip(openbao_approle_checks.results | default([])) | list }}"
  loop_control:
    label: "{{ item.0.name }}"
  register: openbao_role_ids
  no_log: true
  changed_when: false
  when:
    - openbao_bootstrap_token is defined
    - (item.1.rc | default(0)) != 0
    # Inert (manage_secret_id:false) roles are excluded from role_id read,
    # secret_id mint, break-glass write, AND the derived "newly created" list, so
    # the "publish creds to Doppler" instruction never names a role with no
    # standing creds. Their role_id is retrievable on demand at grant time.
    - item.0.manage_secret_id | default(true)

# manage_secret_id:false roles (ai-apply-<domain>, ai-admin) deliberately get NO
# standing secret_id — the human-gated access model mints a single-use,
# response-wrapped secret_id on demand instead. The role is created inert above;
# skipping here (and in the break-glass write below) keeps a skipped result in
# .results at this index so the positional zip in the break-glass write stays
# aligned, exactly like an already-existing role is skipped.
- name: Generate newly-created AppRole secret_ids
  ansible.builtin.command:
    cmd: "bao write -f -format=json auth/approle/role/{{ item.0.name }}/secret-id"
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  loop: "{{ openbao_approles | zip(openbao_approle_checks.results | default([])) | list }}"
  loop_control:
    label: "{{ item.0.name }}"
  register: openbao_secret_ids
  no_log: true
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - (item.1.rc | default(0)) != 0
    - item.0.manage_secret_id | default(true)

- name: Write each newly-created AppRole's break-glass material to controller (0600)
  ansible.builtin.copy:
    content: |
      {
        "approle": "{{ item.0.0.name }}",
        "policy": "{{ (item.0.0.token_policies | default([item.0.0.policy])) | join(',') }}",
        "vault_addr": "{{ openbao_api_addr }}",
        "role_id": "{{ (item.1.stdout | from_json).data.role_id }}",
        "secret_id": "{{ (item.2.stdout | from_json).data.secret_id }}"
      }
    dest: "{{ openbao_approle_file_prefix }}-{{ item.0.0.name }}-{{ inventory_hostname }}.json"
    mode: "0600"
  loop: >-
    {{ (openbao_approles | zip(openbao_approle_checks.results | default([])) | list)
       | zip(openbao_role_ids.results | default([]),
             openbao_secret_ids.results | default([]))
       | list }}
  loop_control:
    label: "{{ item.0.0.name }}"
  delegate_to: localhost
  connection: local
  become: false
  vars:
    ansible_become: false
  no_log: true
  when:
    - openbao_bootstrap_token is defined
    - (item.0.1.rc | default(0)) != 0
    - item.0.0.manage_secret_id | default(true)

# Derive the list of names actually created THIS run (for the instruction
# message below) from the role_id-read results: Ansible preserves `item` on
# every registered loop result including skipped ones, so filtering out
# entries with `skipped` defined leaves exactly the AppRoles that were new.
- name: Determine which AppRole names were newly created this run
  ansible.builtin.set_fact:
    openbao_new_approle_names: >-
      {{ openbao_role_ids.results | default([])
         | rejectattr('skipped', 'defined')
         | map(attribute='item')
         | map(attribute='0')
         | map(attribute='name')
         | list }}
  when: openbao_bootstrap_token is defined

- name: INSTRUCT — publish each new AppRole's creds to Doppler tier-0, then delete
  ansible.builtin.debug:
    msg: >-
      ============================================================
      New AppRoles created: {{ (openbao_new_approle_names | default([])) | join(', ') }}.
      Each role_id + secret_id was written to a 0600 file on this
      controller: {{ openbao_approle_file_prefix }}-<role>-{{ inventory_hostname }}.json
      (gitignored). Publish each to Doppler tier-0, consumed as ambient
      env under `doppler run` (see terraform-proxmox
      docs/SECRETS_HIERARCHY.md), except:
        - `public` -> ships ambiently, needs no secret-zero (it's the
          anonymous, non-exploitable-facts identity)
      Then SECURELY DELETE these files. Prefer the OpenBao ingress
      FQDN for BAO_ADDR (node-independent, survives a single node
      loss) over a raw node IP. Do NOT commit these files. Do NOT
      leave them on disk.
      ============================================================
  when:
    - openbao_bootstrap_token is defined
    - (openbao_new_approle_names | default([])) | length > 0
