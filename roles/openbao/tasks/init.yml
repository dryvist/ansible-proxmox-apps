---
# OpenBao bootstrap — runs ONLY on the bootstrap host (gated by the include in
# main.yml: inventory_hostname == openbao_bootstrap_host). It initializes the
# cluster, then provisions the KV mount, the RBAC policies, and the AppRoles
# (terraform-apply / terrakube-plan / ansible-converge / observability /
# local-cloud / monitoring / media / local-llm / public / ai-readonly /
# ai-elevated / snapshot — see docs/SECRETS_HIERARCHY.md). The other two Raft
# peers never run this: they join the leader automatically (retry_join in
# openbao.hcl) and self-unseal via the static seal. Every step is guarded so
# re-runs are no-ops: nothing is created if it already exists, and break-glass
# material is only emitted for AppRoles that were newly created THIS run —
# whether that's the very first bootstrap or a later run against an
# already-live cluster (supplied a privileged BAO_TOKEN) that only grows the
# RBAC surface with a few more identities.
#
# Break-glass safety: recovery shares + root token (and every new AppRole's
# role_id/secret_id) are written ONLY to 0600 files on the Ansible CONTROLLER
# under playbook_dir, and a LOUD warning tells the operator to transcribe to
# paper / load into the right store and delete. These values are NEVER
# written into the repo or onto a target host, and the `bao` invocations that
# touch them run with no_log: true.

# `bao status` exit codes: 0 = unsealed, 2 = sealed, 1 = error. For an
# uninitialized node the command still exits 0/2 with "initialized": false in
# the JSON body, so we parse the body rather than trust the exit code alone.
- name: Read OpenBao status
  ansible.builtin.command:
    cmd: bao status -format=json
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
  register: openbao_status_raw
  changed_when: false
  failed_when: openbao_status_raw.rc not in [0, 2]

- name: Parse OpenBao status
  ansible.builtin.set_fact:
    openbao_status: "{{ openbao_status_raw.stdout | from_json }}"

# --- Initialization (only when not yet initialized) -------------------------
# With an auto-unseal seal (static key) `bao operator init` produces RECOVERY
# shares (not classic unseal keys); the static seal unwraps the root key on
# every start, so the bootstrap node self-unseals and the peers do too on join.
- name: Initialize OpenBao (recovery keys via static-key auto-unseal)
  ansible.builtin.command:
    cmd: >-
      bao operator init
      -recovery-shares={{ openbao_recovery_shares }}
      -recovery-threshold={{ openbao_recovery_threshold }}
      -format=json
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
  register: openbao_init_raw
  no_log: true
  changed_when: true
  when: not openbao_status.initialized

- name: Capture init result
  ansible.builtin.set_fact:
    openbao_init: "{{ openbao_init_raw.stdout | from_json }}"
  no_log: true
  when: not openbao_status.initialized

# Break-glass: write recovery shares + root token to a 0600 file ON THE
# CONTROLLER (gitignored), then shout at the operator to move it to paper.
- name: Write break-glass recovery material to controller (0600)
  ansible.builtin.copy:
    content: "{{ openbao_init | to_nice_json }}\n"
    dest: "{{ openbao_recovery_file }}"
    mode: "0600"
  delegate_to: localhost
  connection: local
  become: false
  vars:
    ansible_become: false
  no_log: true
  when: not openbao_status.initialized

- name: WARN — transcribe recovery material to paper, then delete the file
  ansible.builtin.debug:
    msg: >-
      ============================================================
      OpenBao cluster INITIALIZED on the bootstrap node
      {{ inventory_hostname }}. Recovery shares + the initial root
      token were written to:
        {{ openbao_recovery_file }}
      (0600, on this controller, gitignored). TRANSCRIBE the
      recovery shares to PAPER, store them offline split across
      custodians, then SECURELY DELETE this file. With static-key
      auto-unseal the recovery shares are the break-glass path if
      the seal key is ever lost. Do NOT commit it. Do NOT leave it
      on disk.
      ============================================================
  when: not openbao_status.initialized

# Root token: from this run's init output on the FIRST bootstrap. On a cluster
# that's already initialized, provisioning (new policies/AppRoles) only runs
# if the operator supplies a privileged token out-of-band via BAO_TOKEN (see
# openbao_admin_token in defaults) — without one, every step below skips
# cleanly, so a routine converge that isn't adding RBAC stays a no-op.
- name: Set the bootstrap token for provisioning (first init)
  ansible.builtin.set_fact:
    openbao_bootstrap_token: "{{ openbao_init.root_token }}"
  no_log: true
  when: not openbao_status.initialized

- name: Use the externally-supplied admin token for provisioning against a live cluster
  ansible.builtin.set_fact:
    openbao_bootstrap_token: "{{ openbao_admin_token }}"
  no_log: true
  when:
    - openbao_status.initialized
    - openbao_admin_token | length > 0

# --- KV v2 mount (add-if-missing) -------------------------------------------
- name: List enabled secrets engines
  ansible.builtin.command:
    cmd: bao secrets list -format=json
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  register: openbao_mounts_raw
  no_log: true
  changed_when: false
  when: openbao_bootstrap_token is defined

- name: Enable KV v2 at the configured mount
  ansible.builtin.command:
    cmd: "bao secrets enable -path={{ openbao_kv_mount }} -version=2 kv"
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  no_log: true
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - (openbao_kv_mount ~ '/') not in (openbao_mounts_raw.stdout | from_json).keys()

# --- RBAC policies (write-if-missing) ---------------------------------------
# Rendered on the TARGET: `bao policy write` below executes there and reads
# the file from its local filesystem (a controller-side render is unreachable
# from the target). Policy HCL is non-secret — it comes from the committed
# templates. Rendered into openbao_config_dir (/etc/openbao, 0750 root:openbao)
# rather than world-writable /tmp, so the write is not exposed to symlink races
# or other local users on the host.
- name: Render the RBAC policies to the target
  ansible.builtin.template:
    src: "{{ item.template }}"
    dest: "{{ openbao_config_dir }}/.policy-{{ item.name }}.hcl"
    mode: "0600"
  loop: "{{ openbao_policies }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: false
  when: openbao_bootstrap_token is defined

- name: List existing policies
  ansible.builtin.command:
    cmd: bao policy list -format=json
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  register: openbao_policies_raw
  no_log: true
  changed_when: false
  when: openbao_bootstrap_token is defined

- name: Write the RBAC policies that are missing
  ansible.builtin.command:
    cmd: >-
      bao policy write {{ item.name }}
      {{ openbao_config_dir }}/.policy-{{ item.name }}.hcl
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  loop: "{{ openbao_policies }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - item.name not in (openbao_policies_raw.stdout | from_json)

- name: Remove the rendered policies from the target
  ansible.builtin.file:
    path: "{{ openbao_config_dir }}/.policy-{{ item.name }}.hcl"
    state: absent
  loop: "{{ openbao_policies }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: false
  when: openbao_bootstrap_token is defined

# --- AppRole auth method (add-if-missing) -----------------------------------
- name: List enabled auth methods
  ansible.builtin.command:
    cmd: bao auth list -format=json
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  register: openbao_auth_raw
  no_log: true
  changed_when: false
  when: openbao_bootstrap_token is defined

- name: Enable the AppRole auth method
  ansible.builtin.command:
    cmd: bao auth enable approle
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  no_log: true
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - "'approle/' not in (openbao_auth_raw.stdout | from_json).keys()"

# --- AppRoles (add-if-missing), one per RBAC group --------------------------
- name: Check whether each AppRole already exists
  ansible.builtin.command:
    cmd: "bao read -format=json auth/approle/role/{{ item.name }}"
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  loop: "{{ openbao_approles }}"
  loop_control:
    label: "{{ item.name }}"
  register: openbao_approle_checks
  no_log: true
  changed_when: false
  failed_when: false
  when: openbao_bootstrap_token is defined

- name: Create the missing AppRoles bound to their policy
  ansible.builtin.command:
    cmd: >-
      bao write auth/approle/role/{{ item.0.name }}
      token_policies={{ item.0.policy }}
      token_ttl={{ openbao_approle_token_ttl }}
      token_max_ttl={{ openbao_approle_token_max_ttl }}
      secret_id_ttl=0
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  loop: "{{ openbao_approles | zip(openbao_approle_checks.results | default([])) | list }}"
  loop_control:
    label: "{{ item.0.name }}"
  no_log: true
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - (item.1.rc | default(0)) != 0

# Surface role_id + a fresh secret_id only for AppRoles that were JUST created
# THIS run (the check above found them missing) — so re-runs never mint new
# credentials silently, whether this is the very first bootstrap (everything
# is new) or a later run against an already-live cluster that only adds a few
# new identities (only those get creds; existing ones are untouched). Each
# task below loops over the SAME zipped (approle, existence-check) pairs as
# "Create the missing AppRoles" above, with the SAME per-item `when` guard, so
# every registered .results list lines up positionally — skipped iterations
# stay skipped in lockstep across role_id read, secret_id generation, and the
# final break-glass write.
- name: Read newly-created AppRole role_ids
  ansible.builtin.command:
    cmd: "bao read -format=json auth/approle/role/{{ item.0.name }}/role-id"
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  loop: "{{ openbao_approles | zip(openbao_approle_checks.results | default([])) | list }}"
  loop_control:
    label: "{{ item.0.name }}"
  register: openbao_role_ids
  no_log: true
  changed_when: false
  when:
    - openbao_bootstrap_token is defined
    - (item.1.rc | default(0)) != 0

- name: Generate newly-created AppRole secret_ids
  ansible.builtin.command:
    cmd: "bao write -f -format=json auth/approle/role/{{ item.0.name }}/secret-id"
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_token }}"
  loop: "{{ openbao_approles | zip(openbao_approle_checks.results | default([])) | list }}"
  loop_control:
    label: "{{ item.0.name }}"
  register: openbao_secret_ids
  no_log: true
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - (item.1.rc | default(0)) != 0

- name: Write each newly-created AppRole's break-glass material to controller (0600)
  ansible.builtin.copy:
    content: |
      {
        "approle": "{{ item.0.0.name }}",
        "policy": "{{ item.0.0.policy }}",
        "vault_addr": "{{ openbao_api_addr }}",
        "role_id": "{{ (item.1.stdout | from_json).data.role_id }}",
        "secret_id": "{{ (item.2.stdout | from_json).data.secret_id }}"
      }
    dest: "{{ openbao_approle_file_prefix }}-{{ item.0.0.name }}-{{ inventory_hostname }}.json"
    mode: "0600"
  loop: >-
    {{ (openbao_approles | zip(openbao_approle_checks.results | default([])) | list)
       | zip(openbao_role_ids.results | default([]),
             openbao_secret_ids.results | default([]))
       | list }}
  loop_control:
    label: "{{ item.0.0.name }}"
  delegate_to: localhost
  connection: local
  become: false
  vars:
    ansible_become: false
  no_log: true
  when:
    - openbao_bootstrap_token is defined
    - (item.0.1.rc | default(0)) != 0

# Derive the list of names actually created THIS run (for the instruction
# message below) from the role_id-read results: Ansible preserves `item` on
# every registered loop result including skipped ones, so filtering out
# entries with `skipped` defined leaves exactly the AppRoles that were new.
- name: Determine which AppRole names were newly created this run
  ansible.builtin.set_fact:
    openbao_new_approle_names: >-
      {{ openbao_role_ids.results | default([])
         | rejectattr('skipped', 'defined')
         | map(attribute='item')
         | map(attribute='0')
         | map(attribute='name')
         | list }}
  when: openbao_bootstrap_token is defined

- name: INSTRUCT — load each new AppRole's creds into its keychain item, then delete
  ansible.builtin.debug:
    msg: >-
      ============================================================
      New AppRoles created: {{ (openbao_new_approle_names | default([])) | join(', ') }}.
      Each role_id + secret_id was written to a 0600 file on this
      controller: {{ openbao_approle_file_prefix }}-<role>-{{ inventory_hostname }}.json
      (gitignored). Load each into its own item in the dedicated
      openbao.keychain-db keychain (see terraform-proxmox
      docs/SECRETS_HIERARCHY.md), except:
        - `public` -> ships ambiently, NOT keychain-gated (it's the
          anonymous, non-exploitable-facts identity)
      Then SECURELY DELETE these files. Prefer the OpenBao ingress
      FQDN for BAO_ADDR (node-independent, survives a single node
      loss) over a raw node IP. Do NOT commit these files. Do NOT
      leave them on disk.
      ============================================================
  when:
    - openbao_bootstrap_token is defined
    - (openbao_new_approle_names | default([])) | length > 0
