---
# OpenBao single-binary secrets manager — role defaults.
#
# OpenBao is a native Go binary on Debian; no Docker. This role installs the
# upstream .deb (checksum-verified), renders a Raft HA + on-prem
# static-key auto-unseal config, runs it under systemd, and (in init.yml)
# bootstraps the cluster, the secret hierarchy, the RBAC policies, and the
# AppRoles — one per resource-domain identity (terraform-apply / flow-lock /
# ansible-converge / observability / local-cloud / monitoring /
# media / local-llm / hermes / hermes-write / public / ai-readonly /
# ai-elevated / snapshot).

# --- Version ----------------------------------------------------------------
# Pinned to a known-good upstream release. Version bumps follow the repo's
# pinning convention (Renovate keeps the .deb/checksums pin fresh; see
# renovate.json and AGENTS.md "Version management"). Do NOT scatter the
# version across multiple files — change it here only.
openbao_version: "2.5.5"

# --- Download (checksum-verified .deb from GitHub releases) ------------------
# The controller stages the .deb + the release checksums file, verifies the
# SHA256, then the .deb is installed on the target. This mirrors the minio
# role's controller-staging pattern so containers in the outbound-internal
# firewall group (RFC1918-only egress) don't need direct egress to GitHub.
openbao_release_base_url: "https://github.com/openbao/openbao/releases/download"
openbao_deb_filename: "openbao_{{ openbao_version }}_linux_amd64.deb"
openbao_deb_url: >-
  {{ openbao_release_base_url }}/v{{ openbao_version }}/{{ openbao_deb_filename }}
# SHA256SUMS-format file ("<digest>  <filename>" per line) for the linux build.
openbao_checksums_filename: "checksums-linux.txt"
openbao_checksums_url: >-
  {{ openbao_release_base_url }}/v{{ openbao_version }}/{{ openbao_checksums_filename }}

# --- System user / group ----------------------------------------------------
openbao_user: openbao
openbao_group: openbao

# --- Paths ------------------------------------------------------------------
openbao_data_dir: /opt/openbao/data
openbao_config_dir: /etc/openbao
openbao_config_file: "{{ openbao_config_dir }}/openbao.hcl"
# EnvironmentFile holding the static seal key for the systemd unit (0600).
openbao_env_file: "{{ openbao_config_dir }}/openbao.env"
# CLI talks to the local node over loopback by default for bootstrap tasks.
openbao_install_dir: /usr/bin

# --- Listener / cluster ports -----------------------------------------------
openbao_api_port: 8200
openbao_cluster_port: 8201

# --- Node identity & addresses ----------------------------------------------
# Raft node_id: stable per-node identifier. Defaults to the inventory hostname.
openbao_node_id: "{{ inventory_hostname }}"
# The node's VLAN IP. LXC hosts expose this as `container_ip` (set by
# inventory/load_tofu.yml from the Terraform-exported inventory). Fall back to
# ansible_host (VMs) so the role works on either. The listener binds to THIS
# address, never 0.0.0.0 — TLS terminates at Traefik on the internal VLAN.
openbao_bind_address: >-
  {{ container_ip | default(ansible_host) | default(ansible_default_ipv4.address) }}
# Advertised addresses other nodes / clients use to reach this node.
# tls_disable=1 today (Traefik fronts TLS), so api_addr is http://. End-to-end
# TLS is a later hardening step — see templates/openbao.hcl.j2.
openbao_api_addr: "http://{{ openbao_bind_address }}:{{ openbao_api_port }}"
openbao_cluster_addr: "https://{{ openbao_bind_address }}:{{ openbao_cluster_port }}"

# --- Raft HA: peers + bootstrap election ------------------------------------
# Every node carries a retry_join for each peer (built from the openbao_group
# hostvars' container_ip), so a node that is not yet part of a cluster finds the
# leader and joins automatically. Self in the list is harmless (ignored).
openbao_raft_peer_ips: >-
  {{ groups['openbao_group'] | default([])
     | map('extract', hostvars)
     | map(attribute='container_ip', default='')
     | reject('equalto', '') | list }}
# Exactly one node runs `bao operator init` — the bootstrap host (the
# alphabetically-first group member, deterministic across runs). Every other
# node only ever joins + auto-unseals; it never initializes. KV/policy/AppRole
# provisioning is likewise gated to this host.
openbao_bootstrap_host: >-
  {{ (groups['openbao_group'] | default([inventory_hostname]) | sort | first) }}

# DATA-LOSS GUARD. `bao operator init` creates a BRAND-NEW empty cluster. On a
# homelab that already holds live secrets, a fresh init on a mis-scoped run (a
# node list that dropped the existing members, or a bootstrap host that can't
# reach them) would orphan the real data into a second, empty cluster. So fresh
# init is OPT-IN. For a ROLLING EXPANSION of a live cluster (add nodes, preserve
# data) leave this false — the new nodes join via retry_join and the existing
# data replicates to them. Set true ONLY for the very first cluster creation.
# See roles/openbao/README.md ("Rolling expansion / migration").
openbao_allow_fresh_init: false

# --- Seal: on-prem static-key auto-unseal (no cloud) ------------------------
# A single 32-byte AES-256 key (base64), shared by all nodes, unwraps the root
# key on every start so each node self-unseals without operator key entry and
# without any cloud KMS. The key is injected at runtime from Doppler tier-0
# (NOT hardcoded, NOT committed) and lands in the 0600 EnvironmentFile.
# Generate once:  openssl rand -base64 32
openbao_seal_key_id: "{{ lookup('env', 'OPENBAO_STATIC_SEAL_KEY_ID') | default('static-1', true) }}"
openbao_static_seal_key: "{{ lookup('env', 'OPENBAO_STATIC_SEAL_KEY') }}"
# Rotation (n-1 → n): set the previous key + id during a seal-rewrap, then clear.
openbao_seal_previous_key_id: "{{ lookup('env', 'OPENBAO_STATIC_SEAL_PREVIOUS_KEY_ID') | default('', true) }}"
openbao_static_seal_previous_key: "{{ lookup('env', 'OPENBAO_STATIC_SEAL_PREVIOUS_KEY') | default('', true) }}"

# --- KV hierarchy / RBAC policies + AppRoles ---------------------------------
# Secret hierarchy (see terraform-proxmox docs/SECRETS_HIERARCHY.md):
#   secret/infra/*     IaC kernel (proxmox/aws/network) — terraform-apply writes
#   secret/platform/*  shared platform services (dns/traefik/terrakube/splunk/
#                      cribl/object-storage/compute/...)
#   secret/apps/*      application credentials (media/monitoring/home-automation)
#   secret/ai/*        LLM stack + AI-agent creds
#   secret/public/*    non-secret, non-exploitable facts (domain/subdomain) —
#                      readable by a fixed, low-privilege AppRole
#   secret/ci/*        CI/CD tokens
openbao_kv_mount: secret
# Legacy demo subtree the terraform-proxmox vault-secrets proof writes to; kept
# writable by the terraform-apply policy so that read/write proof keeps working.
openbao_homelab_path: homelab

# App secrets promoted into secret/apps/vikunja so OpenBao is their canonical
# home. Maps each KV key to the converge-env var that carries its value (the
# vikunja role mints these and stores them in SOPS; a converge run under
# `sops exec-env` exposes them). The seed step (init.yml) runs only on the
# bootstrap host under the admin token, writes only when a value differs from
# what is already stored, and skips any key whose env var is empty — so a
# converge without the SOPS values (or with unchanged values) writes nothing.
openbao_vikunja_secrets:
  token_ro: VIKUNJA_MCP_TOKEN_RO
  token_rw: VIKUNJA_MCP_TOKEN_RW
  token_admin: VIKUNJA_MCP_TOKEN_ADMIN
  svc_mcp_ro_password: VIKUNJA_SVC_MCP_RO_PASSWORD
  svc_mcp_rw_password: VIKUNJA_SVC_MCP_RW_PASSWORD
  # App-namespaced DB password (matches the postgres_managed_databases +
  # vikunja_group.yml consumers reading bao_apps_secrets.vikunja_db_password).
  vikunja_db_password: VIKUNJA_DB_PASSWORD

# App service secrets GENERATED (random, generate-if-absent) in OpenBao itself,
# replacing the retired terraform-proxmox vault-secrets root. Each app maps to
# its field list; every field gets a random alnum value created once at
# secret/apps/<app> and never rotated (init.yml → seed_generated_app_secret.yml).
# openbao_secrets then exposes these paths to the nautobot/zammad roles.
openbao_generated_app_secrets:
  nautobot: [db_password, secret_key, superuser_password]
  # Zammad fields are app-namespaced (zammad_*) so the flat merge into
  # bao_apps_secrets (openbao_secrets reads apps/nautobot + apps/zammad +
  # apps/vikunja into one dict) never collides with Nautobot's bare
  # db_password. The consumers already read the namespaced names
  # (inventory/group_vars/{zammad_group,postgres_group}.yml).
  zammad: [zammad_db_password, zammad_admin_password, zammad_hermes_api_token]
  # Streaming-replication credential for the shared-apps Postgres pair (the
  # postgres role's primary creates the replicator login with it; the standby
  # puts it in .pgpass). Bare name is safe in the flat bao_apps_secrets merge —
  # no other app path carries a replication_password field.
  postgres: [replication_password]
  # Hindsight agent-memory service (ai VLAN): its dedicated ai-VLAN Postgres
  # cluster's DB + replication credentials plus the Control Plane UI access
  # key. App-namespaced for the flat bao_apps_secrets merge. The service's LLM
  # key is NOT here — it reuses ai/llm's LLM_ROUTER_MASTER_KEY (local-llm
  # domain), same router credential every ai-VLAN consumer uses.
  hindsight: [hindsight_db_password, hindsight_replication_password, hindsight_cp_access_key]
# Random length for generated app credentials (alnum). secret_key needs more
# entropy than a login credential, so it gets its own length (matches the 64-char
# key the nautobot role generates locally when none is supplied).
openbao_app_secret_length: 40
openbao_app_secret_key_length: 64

# --- AWS secrets engine (dynamic STS creds, no static laptop key) -----------
# Replaces the aws-vault `tf-proxmox` static base-user key with short-lived STS
# creds minted on demand. OpenBao holds ONE long-lived base-user key server-side
# (Doppler tier-0, secret/infra/aws in spirit — actually stored in the engine's
# own config, not KV); the `terraform-apply` AppRole reads aws/sts/tf-proxmox to
# get an assumed_role STS session for role/tf-proxmox. See roles/openbao/README.md.
#
# The AWS engine is NOT builtin to OpenBao (dropped at the Vault fork) — it
# ships as an external plugin from openbao/openbao-plugins with prebuilt,
# checksum-verified release binaries. The role stages the binary from the
# controller (same WAN-firewall pattern as the server .deb) onto EVERY node
# (the catalog sha256 must match the on-disk binary wherever a request lands),
# then init.yml registers it once and mounts it.
openbao_aws_engine_enabled: true
openbao_aws_mount: aws
# Catalog name the plugin is registered under; `bao secrets enable aws`
# resolves to it (no builtin shadows the name).
openbao_aws_plugin_name: aws
openbao_aws_role_name: tf-proxmox
# The tf-proxmox IAM role ARN (assumes via the OpenBao-held base user, same
# relationship aws-vault used). Not a tofu constant today — set via env/extra-vars
# per the account; see AGENTS.md IP-addressing-style rule (never hardcode).
openbao_aws_role_arn: "{{ lookup('env', 'OPENBAO_AWS_TF_PROXMOX_ROLE_ARN') }}"
openbao_aws_root_region: us-east-2
openbao_aws_default_sts_ttl: 1h
openbao_aws_max_sts_ttl: 2h
# Second assumed_role broker: a broad IaC/admin identity capped by its own AWS
# permissions boundary (not tf-proxmox-scoped). Mirrors the tf-proxmox role
# above — same env-var indirection, same add-if-missing create task.
openbao_aws_iac_admin_role_name: openbao-iac-admin
openbao_aws_iac_admin_role_arn: "{{ lookup('env', 'OPENBAO_AWS_IAC_ADMIN_ROLE_ARN') | default('', true) }}"
openbao_aws_iac_admin_default_sts_ttl: 1h
# 1h, not 2h like tf-proxmox: this role's AWS MaxSessionDuration is 3600s.
openbao_aws_iac_admin_max_sts_ttl: 1h
# The base-user key OpenBao uses to call sts:AssumeRole. Minted via an
# independent admin path (never the key being rotated out), seeded from Doppler
# tier-0. Written to aws/config/root ONLY on first configuration — a routine
# converge never overwrites/rotates it silently (mirrors the seal-key pattern).
openbao_aws_root_access_key_id: "{{ lookup('env', 'OPENBAO_AWS_ROOT_ACCESS_KEY_ID') | default('', true) }}"
openbao_aws_root_secret_access_key: "{{ lookup('env', 'OPENBAO_AWS_ROOT_SECRET_ACCESS_KEY') | default('', true) }}"

# --- External plugin staging (openbao/openbao-plugins releases) --------------
# Every external plugin binary lives here; openbao.hcl points plugin_directory
# at it. Root-owned, openbao-group-exec, never world/group-writable (the server
# validates the catalog sha256 against the file before every plugin launch).
openbao_plugin_dir: /opt/openbao/plugins
# Version bumps follow the .deb pinning convention: change the version here.
# Commands are version-qualified on disk and in the catalog so a new release
# never overwrites the executable used by the currently-running plugin.
openbao_aws_plugin_version: "0.3.0"
openbao_aws_plugin_catalog_version: "v{{ openbao_aws_plugin_version }}"
openbao_aws_plugin_release_base_url: "https://github.com/openbao/openbao-plugins/releases/download"
openbao_aws_plugin_release_tag: "secrets-aws-v{{ openbao_aws_plugin_version }}"
# Exact goreleaser asset/member names (verified against the release):
# tarball openbao-plugin-secrets-aws_linux_amd64_v1.tar.gz contains LICENSE +
# the binary, which keeps its platform suffix.
openbao_aws_plugin_tarball: "openbao-plugin-secrets-aws_linux_amd64_v1.tar.gz"
openbao_aws_plugin_binary: "openbao-plugin-secrets-aws_linux_amd64_v1"
openbao_aws_plugin_command: "{{ openbao_aws_plugin_binary }}-v{{ openbao_aws_plugin_version }}"
openbao_aws_plugin_tarball_url: >-
  {{ openbao_aws_plugin_release_base_url }}/{{ openbao_aws_plugin_release_tag }}/{{ openbao_aws_plugin_tarball }}
# SHA256SUMS-format file covering the release tarballs.
openbao_aws_plugin_checksums_filename: "checksums-secrets-aws.txt"
openbao_aws_plugin_checksums_url: >-
  {{ openbao_aws_plugin_release_base_url }}/{{ openbao_aws_plugin_release_tag
  }}/{{ openbao_aws_plugin_checksums_filename }}
openbao_aws_plugin_signature_url: "{{ openbao_aws_plugin_tarball_url }}.sig"

# --- GitHub secrets engine (ephemeral GitHub App installation tokens) ------
# Independent from the AWS engine: it has its own mount, catalog entry,
# configuration, permission sets, policy grant, and leases. The App private key
# is required only for first configuration/rotation and is never stored in KV.
openbao_github_engine_enabled: true
openbao_github_mount: github
openbao_github_plugin_name: vault-plugin-secrets-github
openbao_github_plugin_version: "2.3.2"
openbao_github_plugin_catalog_version: "v{{ openbao_github_plugin_version }}"
openbao_github_plugin_release_base_url: >-
  https://github.com/martinbaillie/vault-plugin-secrets-github/releases/download
openbao_github_plugin_release_tag: "v{{ openbao_github_plugin_version }}"
openbao_github_plugin_asset: vault-plugin-secrets-github-linux-amd64
openbao_github_plugin_command: >-
  {{ openbao_github_plugin_asset }}-v{{ openbao_github_plugin_version }}
openbao_github_plugin_asset_url: >-
  {{ openbao_github_plugin_release_base_url }}/{{ openbao_github_plugin_release_tag
  }}/{{ openbao_github_plugin_asset }}
openbao_github_plugin_checksums_filename: SHA256SUMS
openbao_github_plugin_checksums_url: >-
  {{ openbao_github_plugin_release_base_url }}/{{ openbao_github_plugin_release_tag
  }}/{{ openbao_github_plugin_checksums_filename }}
openbao_github_plugin_checksums_signature_url: >-
  {{ openbao_github_plugin_checksums_url }}.sig
openbao_github_app_id: "{{ lookup('env', 'OPENBAO_GITHUB_APP_ID') | default('', true) }}"
openbao_github_app_private_key: >-
  {{ lookup('env', 'OPENBAO_GITHUB_APP_PRIVATE_KEY') | default('', true) }}
openbao_github_dryvist_installation_id: >-
  {{ lookup('env', 'OPENBAO_GITHUB_DRYVIST_INSTALLATION_ID') | default('', true) }}
openbao_github_personal_installation_id: >-
  {{ lookup('env', 'OPENBAO_GITHUB_PERSONAL_INSTALLATION_ID') | default('', true) }}
# Read-tier permission map: what a group-scoped read token may do. Applied to
# ALL repos of the installation (no repositories list on the read sets — the
# blast radius of a leaked read token is "can read", not "can change").
openbao_github_read_permissions:
  contents: read
  metadata: read
  pull_requests: read
  issues: read
  actions: read
  checks: read
  statuses: read
# tier drives which identities may mint a set (see the github-*-policy
# templates): `read` sets are ambient; `admin` sets (installation-wide, full
# App ceiling) are minted only through the inert, human-gated github-admin
# identity. Per-repo WRITE tokens intentionally have NO set here — they use
# the raw github/token endpoint, parameter-pinned by the github-write policy
# to exactly one allowlisted repository per request (a stored set cannot be
# narrowed by the request body at plugin v2.3.2, so per-repo scoping must
# ride the raw endpoint).
openbao_github_permission_sets:
  - name: dryvist-full-automation
    tier: admin
    installation_id: "{{ openbao_github_dryvist_installation_id }}"
  - name: personal-full-automation
    tier: admin
    installation_id: "{{ openbao_github_personal_installation_id }}"
  - name: read-dryvist-all
    tier: read
    installation_id: "{{ openbao_github_dryvist_installation_id }}"
    permissions: "{{ openbao_github_read_permissions }}"
  - name: read-personal-all
    tier: read
    installation_id: "{{ openbao_github_personal_installation_id }}"
    permissions: "{{ openbao_github_read_permissions }}"

# --- SSH secrets engine (signed client certificates — the SSH CA) -----------
# Implements the ssh-certificate-authority ADR (docs-starlight): automation
# authenticates to estate hosts with short-TTL SSH certificates signed by an
# OpenBao CA; humans stay on static authorized_keys (a CA outage must never
# lock humans out). SSH is a BUILTIN engine — no plugin staging, unlike
# aws/github above. The CA keypair is generated INSIDE OpenBao on first
# configuration and is never exported; a routine converge never regenerates it
# (write-once, mirrors aws config/root). Host-side trust (TrustedUserCAKeys +
# AuthorizedPrincipalsFile) is distributed by ansible-proxmox's ssh_ca_trust
# role against a PINNED CA fingerprint recorded at mint time.
openbao_ssh_engine_enabled: true
openbao_ssh_mount: ssh-client-ca
# CA key type per the ADR. If the deployed OpenBao rejects key_type on
# config/ca, the converge fails loudly — override to '' to generate the
# engine default (RSA) and track an ed25519 rotation via the multi-issuer API.
openbao_ssh_ca_key_type: ed25519
# Per-principal-class signing roles (ADR table). Cert TTL == max TTL; a sign
# request may pass a SHORTER ttl per task, never longer. automation-ai signs
# interactive agent certs (permit-pty); automation-ansible and ci-runner are
# exec-channel only — NO extensions (a host that genuinely needs a tty for
# become opts in via its own role data, not a blanket grant here).
openbao_ssh_roles:
  - name: automation-ai
    principal: ai-agent
    ttl: 1h
    extensions: { "permit-pty": "" }
  - name: automation-ansible
    principal: ansible
    ttl: 1h
    extensions: {}
  - name: ci-runner
    principal: ci
    ttl: 30m
    extensions: {}
# source-address critical option: comma-separated CIDRs certificates are valid
# FROM (management + compute VLANs). Delivered via env (Doppler, same channel
# as NETWORK_CIDR_*) because real CIDRs are never committed. Empty = the
# converge warns loudly and the residual is compensated by the guest-firewall
# default-deny layer (SSH ingress only from management paths).
openbao_ssh_source_address_cidrs: "{{ lookup('env', 'OPENBAO_SSH_SOURCE_CIDRS') | default('', true) }}"

# Policy + AppRole names, one per RBAC identity (see docs/SECRETS_HIERARCHY.md
# for the full rationale). Split by resource domain, least-privilege:
#   terraform-apply  — human-triggered IaC apply (was "terraform"); read+write
#                      secret/infra/*, secret/platform/{dns,traefik}, narrow
#                      secret/apps/nautobot/* seed grant for Nautobot P1, plus
#                      read+update aws/sts/tf-proxmox (dynamic AWS STS creds for
#                      the tf-proxmox IAM role — replaces the laptop's static
#                      aws-vault base key)
#   flow-lock        — cross-repo apply lock holder; read/write only the global
#                      lock record, metadata-delete for release, and read-only
#                      secret/infra/* context for lock decisions
#   Terrakube jobs authenticate through the exact-claim JWT roles below;
#   there is no stored Terrakube AppRole credential.
#   ansible-converge — config-management pulls (was "ansible"); read-only,
#                      secret/platform/*, secret/apps/*
#   observability    — splunk + cribl; read-only, secret/platform/{splunk,cribl}
#   local-cloud      — object-storage/S3/compute; read-only,
#                      secret/platform/{object-storage,compute}
#   monitoring       — read-only, secret/apps/monitoring
#   media            — read-only, secret/apps/media
#   local-llm        — LLM serving stack; read-only, secret/ai/* MINUS the
#                      ai/saas/* carve-out (paid-SaaS provider keys)
#   ai-saas-openrouter — per-provider read leaf for the paid-SaaS key area
#                      secret/ai/saas/<provider> (anthropic/google/openai/
#                      openrouter, one field per MODEL). Attached to local-llm
#                      so the llm_router converge reads OpenRouter keys only;
#                      future providers get their own sibling policy.
#   hermes           — Hermes AI agent; read-only, exact secret/ai/hermes and
#                      secret/ai/mcp/splunk paths, NOT the broad ai subtree
#   hermes-write     — least-privilege WRITE to exact secret/ai/hermes and
#                      secret/ai/mcp/splunk paths (no wildcard, no other paths).
#                      Used for ansible-splunk publication + one-time Hermes seed. A narrow
#                      complement to the broad ai-orchestrator
#                      writer — scoped down to just the Hermes secret.
#   public           — anonymous, non-exploitable facts (domain/subdomain);
#                      read-only, secret/public/*; needs no secret-zero —
#                      shipped ambiently like other non-secret internal config
#   ai-orchestrator  — AI agent/orchestrator WRITE identity; read + create/update
#                      secret/ai/* (the one AI identity that may write). Its
#                      role_id/secret_id are operator-held in Doppler tier-0
#                      (services BAO_AI_ORCHESTRATOR_ROLE_ID / _SECRET_ID),
#                      consumed as ambient env under `doppler run`. The secret_id
#                      is non-expiring and IN ACTIVE USE — converges must stay
#                      idempotent-existence-only for it and must NEVER regenerate
#                      it (init.yml only mints creds for AppRoles missing this
#                      run, so an already-live ai-orchestrator is left untouched).
#   ai-readonly / ai-elevated / snapshot — unchanged, kept as-is
openbao_terraform_apply_policy_name: terraform-apply
openbao_terraform_apply_approle_name: terraform-apply
openbao_flow_lock_policy_name: flow-lock
openbao_flow_lock_approle_name: flow-lock
# GitHub token tiers for the workstation git/gh path — engine-minted App
# installation tokens, NEVER stored PATs (there is no secret/github/* KV path;
# see .claude/rules/openbao-plugins-first.md). nix-darwin's
# `openbao-github-creds` logs in as one of these; the AppRole IS the tier:
#
#   github-read  -> github/token/read-*        all-repo, read-only permission
#                                              sets; standing ambient identity
#   github-write -> github/token (raw)         ONE allowlisted repository per
#                                              request (policy-pinned params) +
#                                              the write-lease lock subtree;
#                                              standing ambient identity
#   github-admin -> github/token/*-full-automation  installation-wide, full
#                                              App ceiling; INERT — minted only
#                                              via a human response-wrapped
#                                              single-use secret_id
#
# Deliberately NOT members of openbao_ai_domains: estate AI identities mint
# via the `github-mint` capability policy (read-tier sets only) instead.
openbao_github_read_policy_name: github-read
openbao_github_read_approle_name: github-read
openbao_github_write_policy_name: github-write
openbao_github_write_approle_name: github-write
openbao_github_admin_policy_name: github-admin
openbao_github_admin_approle_name: github-admin
# Repositories a github-write identity may name (exactly one per request; the
# wrapper sends `repositories` as a plain STRING, `installation_id` as a
# STRING). Values are repository NAMES resolved within whichever installation
# the request names — a name existing in both accounts is therefore
# allowlisted in both (accepted, documented). Editing this list + converging
# IS the write-grant process; anything off-list needs the human-gated
# github-admin tier.
#
# EXPLICIT LITERALS ONLY — never add a glob (verified live 2026-07-18):
#   * OpenBao's ACL does not element-match LIST-valued request parameters, so
#     the wrapper sends `repositories` as a comma-capable STRING the ACL can
#     compare. Exact literals make comma smuggling impossible
#     ("docs,evil" != "docs"), but a prefix glob like "nix-*" would match
#     "nix-a,evil-repo" and hand the caller an off-list repo.
#   * `installation_id` must be allowlisted (and sent) in STRING form — the
#     JSON-number form matches neither a quoted nor an unquoted policy value.
openbao_github_write_repo_allowlist:
  # dryvist (org installation)
  - ".github"
  - ai-assistant-instructions
  - ai-workflows
  - ansible-proxmox
  - ansible-proxmox-ai
  - ansible-proxmox-apps
  - ansible-splunk
  - cc-edge-claude-code-io
  - cc-edge-pack-template
  - cc-edge-the-mac-pack-io
  - claude-code-best-practice
  - claude-code-plugins
  - claude-code-routines
  - cribl-migration
  - docs
  - docs-starlight
  - homelab
  - homelab-contracts
  - iac-platform
  - int_homelab
  - mlx-benchmarks
  - nix-agent-sandbox
  - nix-ai
  - nix-ai-open-harness
  - nix-ai-server
  - nix-claude-code
  - nix-darwin
  - nix-darwin-host
  - nix-devenv
  - nix-hermes
  - nix-home
  - nix-mac-performance
  - nix-pxe-bootstrap
  - nixos-ai
  - orbstack-kubernetes
  - python-template
  - raycast-smart-issue
  - routine-state
  - splunk-ui-dev
  - tofu-aws
  - tofu-aws-templates
  - tofu-github
  - tofu-proxmox
  - tofu-runs-on
  - tofu-splunk-aws
  - tofu-unifi
  - unifi-config
  # JacobPEvans-personal (user installation) — names not already above
  - cc-edge-claude-code-otel
  - cc-edge-copilot-otel
  - cc-edge-gemini-antigravity-io
  - cc-edge-vscode-io
  - tofu-aws-bedrock
  - tofu-aws-static-website
  - tofu-static-website
# Deadman TTL on the per-repo write lease (KV lock under
# secret/locks/github-write/): a crashed holder's claim self-expires via KV-v2
# delete_version_after — no janitor process.
openbao_github_write_lock_ttl: 15m
# Terrakube native workload identity. The API signs a short-lived JWT per job;
# OpenBao verifies it through internal OIDC discovery and binds the exact
# organization/workspace `sub` claim before issuing a short-lived token.
openbao_terrakube_jwt_auth_path: terrakube
openbao_terrakube_jwt_issuer: "https://terrakube-api.{{ lookup('env', 'PROXMOX_SUBDOMAIN') | default('local', true) }}"
openbao_terrakube_jwt_audience: openbao.workload.identity
openbao_terrakube_jwt_token_ttl: 90m
# Org login that Terrakube stamps into the JWT `sub`
# (`organization:<name>:workspace:<name>`, from job.getOrganization().getName()).
# Must equal the Terrakube organization name — set by iac-platform's
# `organization_name` var (mirrors the GitHub org login). The tofu inventory
# does not carry an `organization` key, so this is sourced directly here;
# override in group_vars/host_vars for a different environment.
openbao_terrakube_organization: dryvist
openbao_terrakube_workspaces:
  - name: iac-platform
    kv_read: [platform/terrakube/main]
  - name: tofu-github
    kv_read: [infrastructure/github]
  - name: tofu-unifi
    kv_read: [infrastructure/unifi]
  - name: tofu-aws-production
    api_update: [aws/sts/tofu-aws-production]
  - name: tofu-runs-on
    api_update: [aws/sts/tofu-runs-on]
  - name: tofu-proxmox
    kv_read: [infrastructure/proxmox, platform/object-storage]
  - name: tofu-proxmox-aws-infra
    api_update: [aws/sts/tf-proxmox]
  - name: tofu-proxmox-servarr-config
    kv_read: [apps/media]
openbao_ansible_converge_policy_name: ansible-converge
openbao_ansible_converge_approle_name: ansible-converge
openbao_observability_policy_name: observability
openbao_observability_approle_name: observability
openbao_local_cloud_policy_name: local-cloud
openbao_local_cloud_approle_name: local-cloud
openbao_monitoring_policy_name: monitoring
openbao_monitoring_approle_name: monitoring
openbao_media_policy_name: media
openbao_media_approle_name: media
# apps — read-side AppRole for the shared-Postgres application tier
# (openbao_secrets domain "apps": Nautobot, Zammad). apps-seed above is the
# WRITER; this is the enumerated read-only consumer the converge logs in with
# via APPS_VAULT_ROLE_ID / APPS_VAULT_SECRET_ID.
openbao_apps_policy_name: apps
openbao_apps_approle_name: apps
# Apps the read-side `apps` policy grants read on = the generate-if-absent apps
# (nautobot, zammad) PLUS vikunja, whose secret/apps/vikunja is seeded from the
# SOPS->bao promotion map (openbao_vikunja_secrets), not generate-if-absent. The
# apps-policy template loops this so vikunja's read grant is not silently missed.
openbao_apps_read_apps: "{{ ((openbao_generated_app_secrets.keys() | list) + ['vikunja']) | sort }}"
openbao_local_llm_policy_name: local-llm
openbao_local_llm_approle_name: local-llm
openbao_ai_saas_openrouter_policy_name: ai-saas-openrouter
openbao_hermes_policy_name: hermes
openbao_hermes_approle_name: hermes
openbao_hermes_write_policy_name: hermes-write
openbao_hermes_write_approle_name: hermes-write
openbao_public_policy_name: public
openbao_public_approle_name: public
openbao_ai_orchestrator_policy_name: ai-orchestrator
openbao_ai_orchestrator_approle_name: ai-orchestrator
# ai-readonly / ai-elevated are now ACTOR ROLES that ATTACH base capability
# policies (below) — they no longer own a standalone `ai-*` policy object. Only
# the AppRole names survive as vars; their token_policies are composed rollups.
openbao_ai_readonly_approle_name: ai-readonly
openbao_ai_elevated_approle_name: ai-elevated
# --- AI-agent access model: CAPABILITY (actor-agnostic) vs ACTOR (ai-*) --------
# Three layers, all driven by the single source-of-truth list below:
#   1. BASE CAPABILITY policies (un-prefixed, reusable by ANY actor):
#        read-<svc>  = read/list on secret/<svc>/*
#        write-<svc> = create/update/delete/patch on secret/<svc>/*
#        github-mint = mint the administrator-defined GitHub App permission sets
#      One read+write pair is rendered per openbao_ai_domains entry; one read-only
#      leaf per openbao_ai_readonly_extra_subtrees entry (see kv-capability-policy
#      + github-mint templates). "Broad on services, specific on users."
#   2. ROLLUP composition groups (lists of base policy NAMES — NOT new policy
#        objects; OpenBao composes at the token layer, so there are no duplicated
#        path rules): read-all, read-write-all (derived below).
#   3. ACTOR ROLES (`ai-*` AppRoles) that ATTACH the capabilities/rollups they are
#        allowed, plus actor mechanics (TTLs, inert human-gated secret_id):
#        ai-readonly    -> [read-all]                       (standing, ambient)
#        ai-elevated    -> [read-all + read-<extra>]        (standing, ambient)
#        ai-apply-<svc> -> [read-<svc>, write-<svc>, github-mint]  (per-task, <=1h)
#        ai-apply-all   -> [read-write-all, github-mint]           (per-task, <=1h)
#        ai-admin       -> [ai-admin]                        (break-glass, <=10m)
# Authorization is scoped by TASK / BLAST-RADIUS and gated by a HUMAN, never by
# model capability; the model is an AUDIT claim, never a key. Every apply/admin
# role is provisioned manage_secret_id:false below, so the converge creates the
# INERT role but never mints/stores a standing secret_id — a token exists only
# after a human response-wraps a single-use secret_id on demand
# (`bao write -wrap-ttl=90s -f auth/approle/role/<role>/secret-id`). See the
# docs.dryvist.com "AI Agent Access (OpenBao)" runbook for the full grant flow.
#
# SINGLE SOURCE OF TRUTH: add a writable service = ONE entry here. It renders a
# new read-<svc>+write-<svc> pair, which auto-joins read-all/read-write-all and
# every actor role that references them, and mints an ai-apply-<svc> role — no
# other edit needed. (Formerly openbao_ai_apply_domains; renamed because the list
# now drives read capabilities and rollups too, not only the apply tier.)
openbao_ai_domains: [ai, apps]
# Read-only subtrees the ELEVATED actor may additionally read but which are NOT
# writable/applyable (they get a read-<svc> leaf only — no write leaf, no apply
# role). One entry = one extra read leaf, auto-attached to ai-elevated.
openbao_ai_readonly_extra_subtrees: [platform]
# Fail-closed guard: no AI capability leaf may ever be minted for the IaC kernel
# or a control-plane mount. init.yml asserts the two lists above contain none of
# these before rendering anything. (Belt-and-braces with the enumerated-allowlist
# proof; a typo like `infra` fails the converge instead of granting the kernel.)
openbao_ai_forbidden_subtrees: [infra, sys, auth]
# --- Derived rollups + generated policy/approle fragments (do NOT edit; add a
# service to openbao_ai_domains instead). read-all / read-write-all are lists of
# base policy NAMES attached to actor roles' token_policies — composition, not
# duplicated path rules. ---
openbao_ai_read_subtrees: "{{ (openbao_ai_domains + openbao_ai_readonly_extra_subtrees) | unique }}"
openbao_read_all_policies: "{{ openbao_ai_domains | map('regex_replace', '^(.+)$', 'read-\\1') | list }}"
openbao_read_write_all_policies: >-
  {{ (openbao_ai_domains | map('regex_replace', '^(.+)$', 'read-\1') | list)
     + (openbao_ai_domains | map('regex_replace', '^(.+)$', 'write-\1') | list) }}
# Base capability policy fragments for the render loop (one read leaf per read
# subtree, one write leaf per writable domain, plus the shared github-mint leaf).
openbao_ai_capability_policies: >-
  {{ (openbao_ai_read_subtrees | map('regex_replace', '^(.+)$',
        '{"name": "read-\1", "template": "kv-capability-policy.hcl.j2", "subtree": "\1", "mode": "read"}')
      | map('from_json') | list)
     + (openbao_ai_domains | map('regex_replace', '^(.+)$',
        '{"name": "write-\1", "template": "kv-capability-policy.hcl.j2", "subtree": "\1", "mode": "write"}')
      | map('from_json') | list)
     + [{"name": "github-mint", "template": "github-mint-policy.hcl.j2"}] }}
# ssh-sign-<role> capability leaves: one per SSH signing role, granting ONLY
# the sign endpoint of that role. These are DELIBERATE enumerated grants
# outside secret/ — the kv-leaf self-escalation proof still holds for the KV
# rollups (read-all / read-write-all stay pure KV); an ssh-sign leaf adds
# exactly one non-KV path (<mount>/sign/<role>) and nothing else, asserted
# fail-closed in init.yml before rendering.
openbao_ssh_sign_policies: >-
  {{ openbao_ssh_roles | map(attribute='name') | map('regex_replace', '^(.+)$',
       '{"name": "ssh-sign-\1", "template": "ssh-sign-policy.hcl.j2", "ssh_role": "\1"}')
     | map('from_json') | list
     if openbao_ssh_engine_enabled else [] }}
# ai-apply-<svc> actor roles: one per writable domain, scoped to that service's
# read+write leaves plus per-run GitHub attribution and interactive SSH-cert
# signing (ssh-sign-automation-ai — 1h certs, non-root principals, audited).
# Inert (no standing secret_id).
openbao_ai_apply_approles: >-
  {{ openbao_ai_domains | map('regex_replace', '^(.+)$',
       '{"name": "ai-apply-\1", "token_policies": ["read-\1", "write-\1", "github-mint", "ssh-sign-automation-ai"],
         "token_ttl": "1h", "token_max_ttl": "1h",
         "manage_secret_id": false, "secret_id_ttl": "15m", "secret_id_num_uses": 1}')
     | map('from_json') | list }}
openbao_ai_admin_policy_name: ai-admin
openbao_ai_admin_approle_name: ai-admin
# Token/secret_id bounds for the elevated tiers. secret_id_ttl bounds an UNUSED
# minted grant; num_uses=1 makes the wrapped secret_id single-login.
openbao_ai_apply_token_ttl: 1h
openbao_ai_admin_token_ttl: 10m
openbao_ai_elevated_secret_id_ttl: 15m
openbao_snapshot_policy_name: snapshot
openbao_snapshot_approle_name: snapshot
# apps-seed — the automated WRITER for per-app service secrets under
# secret/apps/* (create/update/read only, no other domain). Terraform
# (terraform-proxmox vault-secrets) authenticates as this role to generate +
# store each app's credentials at the source. Doppler-published creds
# (APPS_SEED_VAULT_ROLE_ID / _SECRET_ID), the same delivery as terraform-apply.
openbao_apps_seed_policy_name: apps-seed
openbao_apps_seed_approle_name: apps-seed
# llm-gate — the Mac Studio's llm-large Caddy gate. Dedicated least-privilege
# reader for EXACTLY the two secrets it injects into Caddy: the bearer token
# (secret/ai/llm) and the Route53 ACME creds (secret/platform/acme). role_id/
# secret_id are delivered to the Studio's auto-readable keychain and consumed
# by openbao-run (the doppler-free replacement for the gate's ~/.doppler token).
openbao_llm_gate_policy_name: llm-gate
openbao_llm_gate_approle_name: llm-gate

# The set of non-root AppRoles to provision, each {name, policy}. Driving the
# bootstrap from this list keeps init.yml DRY as groups are added. Per-identity
# `secret_id_bound_cidrs` hardening is left as a tracked follow-up: the real
# per-domain consumer VLAN CIDRs aren't yet surfaced as Ansible vars in this
# repo (they live in terraform-proxmox's locals.tf), and a wrong CIDR would
# silently break legitimate access — worse than the hardening it buys.
openbao_base_approles:
  - name: "{{ openbao_terraform_apply_approle_name }}"
    policy: "{{ openbao_terraform_apply_policy_name }}"
  - name: "{{ openbao_flow_lock_approle_name }}"
    policy: "{{ openbao_flow_lock_policy_name }}"
  # ansible-converge additionally signs automation-ansible SSH certs: the
  # pre-play mint in each repo's run-ansible.sh replaces the shared static key.
  - name: "{{ openbao_ansible_converge_approle_name }}"
    token_policies: >-
      {{ [openbao_ansible_converge_policy_name]
         + (['ssh-sign-automation-ansible'] if openbao_ssh_engine_enabled else []) }}
  - name: "{{ openbao_observability_approle_name }}"
    policy: "{{ openbao_observability_policy_name }}"
  - name: "{{ openbao_local_cloud_approle_name }}"
    policy: "{{ openbao_local_cloud_policy_name }}"
  - name: "{{ openbao_monitoring_approle_name }}"
    policy: "{{ openbao_monitoring_policy_name }}"
  - name: "{{ openbao_media_approle_name }}"
    policy: "{{ openbao_media_policy_name }}"
  - name: "{{ openbao_apps_approle_name }}"
    policy: "{{ openbao_apps_policy_name }}"
  # local-llm additionally attaches the OpenRouter SaaS read leaf: the
  # llm_router converge renders per-model OpenRouter keys, while the
  # local-llm policy itself denies the rest of the ai/saas/* provider area.
  - name: "{{ openbao_local_llm_approle_name }}"
    token_policies:
      - "{{ openbao_local_llm_policy_name }}"
      - "{{ openbao_ai_saas_openrouter_policy_name }}"
  - name: "{{ openbao_hermes_approle_name }}"
    policy: "{{ openbao_hermes_policy_name }}"
  - name: "{{ openbao_hermes_write_approle_name }}"
    policy: "{{ openbao_hermes_write_policy_name }}"
  - name: "{{ openbao_public_approle_name }}"
    policy: "{{ openbao_public_policy_name }}"
  # GitHub token tiers: engine mints, tokens never stored. github-read and
  # github-write are standing ambient identities consumed by nix-darwin's
  # `openbao-github-creds` (role_id/secret_id operator-held in Doppler,
  # injected as ambient env, same shape as ai-orchestrator). github-write is
  # bounded by the per-repo allowlist + the write-lease lock rather than a
  # human gate (user decision 2026-07-17: ambient for allowlisted repos).
  # github-admin is INERT break-glass like ai-admin: no standing secret_id; a
  # human wraps a single-use secret_id per elevation.
  - name: "{{ openbao_github_read_approle_name }}"
    policy: "{{ openbao_github_read_policy_name }}"
  - name: "{{ openbao_github_write_approle_name }}"
    policy: "{{ openbao_github_write_policy_name }}"
    token_ttl: 30m  # write identity gets a short token TTL
  - name: "{{ openbao_github_admin_approle_name }}"
    policy: "{{ openbao_github_admin_policy_name }}"
    token_ttl: "{{ openbao_ai_admin_token_ttl }}"
    token_max_ttl: "{{ openbao_ai_admin_token_ttl }}"
    manage_secret_id: false
    secret_id_ttl: "{{ openbao_ai_elevated_secret_id_ttl }}"
    secret_id_num_uses: 1
  # ai-orchestrator: role_id/secret_id are operator-held in Doppler tier-0
  # (services BAO_AI_ORCHESTRATOR_ROLE_ID / _SECRET_ID), consumed as ambient env.
  # This AppRole already exists LIVE with a non-expiring secret_id in active
  # use; init.yml only creates + mints creds for AppRoles missing this run, so
  # a converge leaves the live role and its secret_id untouched (existence-only).
  - name: "{{ openbao_ai_orchestrator_approle_name }}"
    policy: "{{ openbao_ai_orchestrator_policy_name }}"
    token_ttl: 30m  # demoted: broad-write identity gets a short token TTL
  # ai-readonly / ai-elevated ACTOR roles: standing (ambient) READ tiers. Their
  # token_policies ATTACH composed rollups — no standalone ai-* policy object.
  # ai-readonly = read-all (every read-<svc>); ai-elevated = read-all + the
  # read-only extras (secret/platform/*). Adding a service to openbao_ai_domains
  # auto-widens read-all, so both tiers grow from one list entry.
  - name: "{{ openbao_ai_readonly_approle_name }}"
    token_policies: "{{ openbao_read_all_policies }}"
  # ai-elevated additionally attaches ssh-sign-automation-ai: the STANDING
  # ability to mint 1h ai-agent SSH certs. Deliberate, documented tradeoff
  # (agents must pull SSH access friction-free) — bounded by non-root
  # principals, default-deny host opt-in, cert TTL, and audit-logged signs.
  - name: "{{ openbao_ai_elevated_approle_name }}"
    token_policies: >-
      {{ openbao_read_all_policies
         + (openbao_ai_readonly_extra_subtrees | map('regex_replace', '^(.+)$', 'read-\1') | list)
         + (['ssh-sign-automation-ai'] if openbao_ssh_engine_enabled else []) }}
  # ai-apply-all: the read-write-all rollup consumer — a scoped-but-broad WRITE
  # actor for a genuinely cross-domain task. Composed ONLY of KV read+write base
  # leaves (+ github-mint), so by construction it CANNOT touch sys/policies, auth,
  # token/create, or the IaC kernel — the union of leaves has no control-plane
  # path. Still human-gated + inert like every apply tier (no standing secret_id).
  - name: ai-apply-all
    token_policies: >-
      {{ openbao_read_write_all_policies + ['github-mint']
         + (['ssh-sign-automation-ai'] if openbao_ssh_engine_enabled else []) }}
    token_ttl: "{{ openbao_ai_apply_token_ttl }}"
    token_max_ttl: "{{ openbao_ai_apply_token_ttl }}"
    manage_secret_id: false
    secret_id_ttl: "{{ openbao_ai_elevated_secret_id_ttl }}"
    secret_id_num_uses: 1
  # ai-admin: break-glass, the ONE self-modify-capable role (policy/auth/token
  # admin). NO standing secret_id; a token exists only after a human one-shot grant
  # and lives <=10m, alerted on every use.
  - name: "{{ openbao_ai_admin_approle_name }}"
    policy: "{{ openbao_ai_admin_policy_name }}"
    token_ttl: "{{ openbao_ai_admin_token_ttl }}"
    token_max_ttl: "{{ openbao_ai_admin_token_ttl }}"
    manage_secret_id: false
    secret_id_ttl: "{{ openbao_ai_elevated_secret_id_ttl }}"
    secret_id_num_uses: 1
  - name: "{{ openbao_snapshot_approle_name }}"
    policy: "{{ openbao_snapshot_policy_name }}"
  # apps-seed: Doppler-published writer for secret/apps/* (Terraform vault-secrets).
  - name: "{{ openbao_apps_seed_approle_name }}"
    policy: "{{ openbao_apps_seed_policy_name }}"
  # llm-gate: role_id/secret_id delivered to the Studio's auto-readable keychain
  # (openbao-run secret-zero); reads only the bearer + ACME creds it injects.
  - name: "{{ openbao_llm_gate_approle_name }}"
    policy: "{{ openbao_llm_gate_policy_name }}"
# Full AppRole set = the static base above + the per-service ai-apply-<svc> actor
# roles generated from openbao_ai_domains. init.yml loops this combined list.
openbao_approles: "{{ openbao_base_approles + openbao_ai_apply_approles }}"
# Policy templates rendered + written on the bootstrap host. Each entry maps a
# policy name to its template; add a row to grow the RBAC surface.
#
# BEFORE ADDING A ROW, read .claude/rules/openbao-plugins-first.md. A policy
# granting KV read for a resource that has a secrets engine is manual credential
# control and is rejected. GitHub has one (mount `github`) and AWS has one (mount
# `aws`), both enabled by default. A GitHub token grant is ALWAYS the existing
# `github-mint` capability policy attached via token_policies — never a new
# template, never a secret/github/* path. AWS is always aws/sts/<role>.
openbao_base_policies:
  - name: terrakube-iac-platform
    template: terrakube-workspace-policy.hcl.j2
    workspace: "{{ openbao_terrakube_workspaces[0] }}"
  - name: terrakube-tofu-github
    template: terrakube-workspace-policy.hcl.j2
    workspace: "{{ openbao_terrakube_workspaces[1] }}"
  - name: terrakube-tofu-unifi
    template: terrakube-workspace-policy.hcl.j2
    workspace: "{{ openbao_terrakube_workspaces[2] }}"
  - name: terrakube-tofu-aws-production
    template: terrakube-workspace-policy.hcl.j2
    workspace: "{{ openbao_terrakube_workspaces[3] }}"
  - name: terrakube-tofu-runs-on
    template: terrakube-workspace-policy.hcl.j2
    workspace: "{{ openbao_terrakube_workspaces[4] }}"
  - name: terrakube-tofu-proxmox
    template: terrakube-workspace-policy.hcl.j2
    workspace: "{{ openbao_terrakube_workspaces[5] }}"
  - name: terrakube-tofu-proxmox-aws-infra
    template: terrakube-workspace-policy.hcl.j2
    workspace: "{{ openbao_terrakube_workspaces[6] }}"
  - name: terrakube-tofu-proxmox-servarr-config
    template: terrakube-workspace-policy.hcl.j2
    workspace: "{{ openbao_terrakube_workspaces[7] }}"
  - name: "{{ openbao_terraform_apply_policy_name }}"
    template: terraform-apply-policy.hcl.j2
  - name: "{{ openbao_flow_lock_policy_name }}"
    template: flow-lock-policy.hcl.j2
  - name: "{{ openbao_ansible_converge_policy_name }}"
    template: ansible-converge-policy.hcl.j2
  - name: "{{ openbao_observability_policy_name }}"
    template: observability-policy.hcl.j2
  - name: "{{ openbao_local_cloud_policy_name }}"
    template: local-cloud-policy.hcl.j2
  - name: "{{ openbao_monitoring_policy_name }}"
    template: monitoring-policy.hcl.j2
  - name: "{{ openbao_media_policy_name }}"
    template: media-policy.hcl.j2
  - name: "{{ openbao_apps_policy_name }}"
    template: apps-policy.hcl.j2
  - name: "{{ openbao_local_llm_policy_name }}"
    template: local-llm-policy.hcl.j2
  - name: "{{ openbao_ai_saas_openrouter_policy_name }}"
    template: ai-saas-openrouter-policy.hcl.j2
  - name: "{{ openbao_hermes_policy_name }}"
    template: hermes-policy.hcl.j2
  - name: "{{ openbao_hermes_write_policy_name }}"
    template: hermes-write-policy.hcl.j2
  - name: "{{ openbao_public_policy_name }}"
    template: public-policy.hcl.j2
  # GitHub token tiers (workstation git/gh). Engine mints only — each template
  # names its own boundary: read-* sets, the parameter-pinned raw token path,
  # or the human-gated *-full-automation sets.
  - name: "{{ openbao_github_read_policy_name }}"
    template: github-read-policy.hcl.j2
  - name: "{{ openbao_github_write_policy_name }}"
    template: github-write-policy.hcl.j2
  - name: "{{ openbao_github_admin_policy_name }}"
    template: github-admin-policy.hcl.j2
  - name: "{{ openbao_ai_orchestrator_policy_name }}"
    template: ai-orchestrator-policy.hcl.j2
  # ai-readonly / ai-elevated / ai-apply-<svc> no longer own standalone policies —
  # they are ACTOR roles that attach the base read-/write- capability leaves
  # (generated below into openbao_ai_capability_policies). ai-admin remains a
  # standalone policy: it is the sole self-modify tier and is NOT composed leaves.
  # ai-admin: break-glass. Intentionally root-ish; contained by TTL + human grant.
  - name: "{{ openbao_ai_admin_policy_name }}"
    template: ai-admin-policy.hcl.j2
  - name: "{{ openbao_snapshot_policy_name }}"
    template: snapshot-policy.hcl.j2
  - name: "{{ openbao_apps_seed_policy_name }}"
    template: apps-seed-policy.hcl.j2
  - name: "{{ openbao_llm_gate_policy_name }}"
    template: llm-gate-policy.hcl.j2
# Full policy set = the static base above + the base read-/write-/github-mint
# capability leaves generated from openbao_ai_domains + the ssh-sign-<role>
# leaves generated from openbao_ssh_roles. init.yml renders this list.
# NOTE: ssh-sign-ci-runner is rendered but attached to no identity yet — no CI
# AppRole/JWT identity exists in this role today; attach it when one does.
openbao_policies: >-
  {{ openbao_base_policies + openbao_ai_capability_policies + openbao_ssh_sign_policies }}

# --- External admin token (provisioning against an ALREADY-LIVE cluster) -----
# The initial `bao operator init` only happens once; after that, adding new
# policies/AppRoles (e.g. growing openbao_approles/openbao_policies above)
# needs a privileged token supplied out-of-band, since there is no longer a
# fresh root token to mint one from. Set via env, never committed/logged.
openbao_admin_token: "{{ lookup('env', 'BAO_TOKEN') | default('', true) }}"

# --- AppRole token TTLs -------------------------------------------------------
# Short-lived tokens; secret_id_ttl=0 means the secret_id itself does not expire
# (rotate manually). Tune per-identity if needed.
openbao_approle_token_ttl: 1h
openbao_approle_token_max_ttl: 4h

# --- Raft snapshots (automated, on-box timer) -------------------------------
# An on-box systemd timer takes a raft snapshot on the ACTIVE node (leader-gated
# at runtime via /v1/sys/leader is_self; standby nodes no-op), authenticating
# with the least-privilege `snapshot` AppRole over the node's OWN api_addr (its
# VLAN IP — there is no loopback listener; see openbao.hcl.j2), NOT the Traefik
# ingress VIP. Each snapshot is integrity-checked (gzip -t, since raft snapshots
# are gzipped tar) and written under the data volume, which sits on a ZFS/PBS-
# backed dataset that replicates OFF-BOX; the newest N are kept. Success/failure
# pings the healthchecks deadman + ntfy, reusing the service_deadman alert stack.
#
# Deliberately deferred (tracked follow-ups, see roles/openbao/README.md):
#   * a SECOND off-box copy into the RustFS `openbao-snapshots` S3 bucket +
#     HeadObject/size/sha256 verify — these WAN-firewalled (outbound-internal)
#     nodes can't be handed a checksum-verifiable S3 client WAN-free the way the
#     .deb is, and hand-rolling SigV4 is out; ZFS replication already carries
#     snapshots off-box in the meantime.
#   * a full restore-to-scratch-node drill (needs a scratch node that does not
#     exist yet). gzip -t is the strongest safe on-box integrity check today.
# "Never lost" already holds regardless: Raft HA live copies + recovery
# shares (paper) + the seal key (Doppler tier-0) + the ZFS/PBS-backed data dir.
openbao_snapshot_enabled: true
# Reserved for the S3 follow-up above (bucket already created by object_storage).
openbao_snapshot_s3_bucket: openbao-snapshots
# Timer cadence (systemd OnUnitActiveSec) and how many local snapshots to keep.
openbao_snapshot_interval: "6h"
openbao_snapshot_retain: 14
# Deployed paths. Staging lives under the data dir so it inherits the ZFS/PBS
# off-box replication of the data volume.
openbao_snapshot_dir: "{{ openbao_data_dir }}/snapshots"
openbao_snapshot_script_path: /usr/local/bin/openbao-snapshot.sh
openbao_snapshot_env_file: "{{ openbao_config_dir }}/openbao-snapshot.env"
openbao_snapshot_service_name: openbao-snapshot
# Snapshot AppRole creds the timer logs in with. Emitted by init.yml at
# bootstrap; injected at converge from tier-0 (Doppler / break-glass file),
# never committed. When unset the daemon is skipped so a pre-provisioning
# converge stays green (see the include guard in tasks/main.yml).
openbao_snapshot_role_id: "{{ lookup('env', 'OPENBAO_SNAPSHOT_ROLE_ID') | default('', true) }}"
openbao_snapshot_secret_id: "{{ lookup('env', 'OPENBAO_SNAPSHOT_SECRET_ID') | default('', true) }}"
# ntfy alert target — FQDN-first: the Traefik-fronted service name
# (matching service_deadman). Topic 'openbao'.
openbao_snapshot_ntfy_url: >-
  https://ntfy.{{ tofu_data.domain }}/openbao
# healthchecks deadman ping URL for the snapshot job; EMPTY => ping skipped
# (ntfy + journal alert still fire). Set per-node from the healthchecks LXC.
openbao_snapshot_healthcheck_url: "{{ lookup('env', 'OPENBAO_SNAPSHOT_HC_URL') | default('', true) }}"

# --- Audit device + shipping (file device -> rsyslog imfile -> AI listener) --
# Enable the file audit device (every node writes its OWN local audit log —
# the device config replicates cluster-wide, the file does not) and tail it
# with a dedicated rsyslog imfile ruleset that forwards to the openbao_audit
# AI ingest listener (syslog CNAME -> HAProxy -> Cribl Stream ai_stamp ->
# Splunk index=openbao_audit). The dedicated ruleset is load-bearing: audit
# lines must NOT also hit the syslog_forwarder catch-all (linux/os family) or
# every secret access would be double-shipped into index=os.
openbao_audit_enabled: true
openbao_audit_device_name: file
openbao_audit_log_dir: /var/log/openbao
openbao_audit_log_path: "{{ openbao_audit_log_dir }}/audit.log"
# The device is DECLARATIVE — an `audit` stanza in openbao.hcl (this OpenBao
# build rejects `sys/audit` API writes). No token needed: the active node
# materializes the stanza on start/SIGHUP; dir/logrotate/rsyslog converge
# alongside so shipping starts the moment the device is live.
openbao_audit_rsyslog_config_path: /etc/rsyslog.d/20-openbao-audit.conf
openbao_audit_syslog_host: "syslog.{{ lookup('env', 'PROXMOX_SUBDOMAIN') }}"
# openbao_audit AI ingest port from tofu constants; guarded default = the
# family's assigned port for inventories that predate ai_log_routing.
openbao_audit_syslog_port: >-
  {{ tofu_data.constants.ai_log_routing.openbao_audit.port | default(10331) }}
openbao_audit_queue_max_disk_space: 256m
# Logrotate: copytruncate so the running server keeps its file handle (the
# file audit device only reopens on SIGHUP; truncating in place avoids racing
# a reload against audit writes).
openbao_audit_logrotate_path: /etc/logrotate.d/openbao-audit
openbao_audit_logrotate_rotate: 7
openbao_audit_logrotate_frequency: daily

# --- Break-glass / bootstrap output (controller-side, never committed) -------
# init.yml writes recovery shares + root token, and each AppRole's creds, to
# 0600 files UNDER playbook_dir ON THE CONTROLLER, then prints a LOUD warning to
# transcribe to paper / load into the right tier-0 store and delete. These paths
# are gitignored (.openbao-recovery-*.json / .openbao-approle-*.json).
openbao_recovery_shares: 5
openbao_recovery_threshold: 3
openbao_recovery_file: "{{ playbook_dir }}/.openbao-recovery-{{ inventory_hostname }}.json"
# One file per AppRole: .openbao-approle-<role>-<host>.json
openbao_approle_file_prefix: "{{ playbook_dir }}/.openbao-approle"

# --- systemd hardening -------------------------------------------------------
# NOTE: OpenBao 2.x dropped mlock support (a `disable_mlock` line is a fatal
# config error since 2.5), so there is no mlock toggle here. Swap hygiene comes
# from the guest itself: the OpenBao LXCs set memory_swap = 0 in deployment.json.
openbao_service_state: started
openbao_service_enabled: true

# --- UI ----------------------------------------------------------------------
openbao_enable_ui: true
