---
# OpenBao single-binary secrets manager — role defaults.
#
# OpenBao is a native Go binary on Debian; no Docker. This role installs the
# upstream .deb (checksum-verified), renders a Raft HA + on-prem
# static-key auto-unseal config, runs it under systemd, and (in init.yml)
# bootstraps the cluster, the secret hierarchy, the RBAC policies, and the
# AppRoles — one per resource-domain identity (terraform-apply / flow-lock /
# terrakube-plan / ansible-converge / observability / local-cloud / monitoring /
# media / local-llm / hermes / hermes-write / public / ai-readonly /
# ai-elevated / snapshot).

# --- Version ----------------------------------------------------------------
# Pinned to a known-good upstream release. Version bumps follow the repo's
# pinning convention (Renovate keeps the .deb/checksums pin fresh; see
# renovate.json and AGENTS.md "Version management"). Do NOT scatter the
# version across multiple files — change it here only.
openbao_version: "2.5.5"

# --- Download (checksum-verified .deb from GitHub releases) ------------------
# The controller stages the .deb + the release checksums file, verifies the
# SHA256, then the .deb is installed on the target. This mirrors the minio
# role's controller-staging pattern so containers in the outbound-internal
# firewall group (RFC1918-only egress) don't need direct egress to GitHub.
openbao_release_base_url: "https://github.com/openbao/openbao/releases/download"
openbao_deb_filename: "openbao_{{ openbao_version }}_linux_amd64.deb"
openbao_deb_url: >-
  {{ openbao_release_base_url }}/v{{ openbao_version }}/{{ openbao_deb_filename }}
# SHA256SUMS-format file ("<digest>  <filename>" per line) for the linux build.
openbao_checksums_filename: "checksums-linux.txt"
openbao_checksums_url: >-
  {{ openbao_release_base_url }}/v{{ openbao_version }}/{{ openbao_checksums_filename }}

# --- System user / group ----------------------------------------------------
openbao_user: openbao
openbao_group: openbao

# --- Paths ------------------------------------------------------------------
openbao_data_dir: /opt/openbao/data
openbao_config_dir: /etc/openbao
openbao_config_file: "{{ openbao_config_dir }}/openbao.hcl"
# EnvironmentFile holding the static seal key for the systemd unit (0600).
openbao_env_file: "{{ openbao_config_dir }}/openbao.env"
# CLI talks to the local node over loopback by default for bootstrap tasks.
openbao_install_dir: /usr/bin

# --- Listener / cluster ports -----------------------------------------------
openbao_api_port: 8200
openbao_cluster_port: 8201

# --- Node identity & addresses ----------------------------------------------
# Raft node_id: stable per-node identifier. Defaults to the inventory hostname.
openbao_node_id: "{{ inventory_hostname }}"
# The node's VLAN IP. LXC hosts expose this as `container_ip` (set by
# inventory/load_tofu.yml from the Terraform-exported inventory). Fall back to
# ansible_host (VMs) so the role works on either. The listener binds to THIS
# address, never 0.0.0.0 — TLS terminates at Traefik on the internal VLAN.
openbao_bind_address: >-
  {{ container_ip | default(ansible_host) | default(ansible_default_ipv4.address) }}
# Advertised addresses other nodes / clients use to reach this node.
# tls_disable=1 today (Traefik fronts TLS), so api_addr is http://. End-to-end
# TLS is a later hardening step — see templates/openbao.hcl.j2.
openbao_api_addr: "http://{{ openbao_bind_address }}:{{ openbao_api_port }}"
openbao_cluster_addr: "https://{{ openbao_bind_address }}:{{ openbao_cluster_port }}"

# --- Raft HA: peers + bootstrap election ------------------------------------
# Every node carries a retry_join for each peer (built from the openbao_group
# hostvars' container_ip), so a node that is not yet part of a cluster finds the
# leader and joins automatically. Self in the list is harmless (ignored).
openbao_raft_peer_ips: >-
  {{ groups['openbao_group'] | default([])
     | map('extract', hostvars)
     | map(attribute='container_ip', default='')
     | reject('equalto', '') | list }}
# Exactly one node runs `bao operator init` — the bootstrap host (the
# alphabetically-first group member, deterministic across runs). Every other
# node only ever joins + auto-unseals; it never initializes. KV/policy/AppRole
# provisioning is likewise gated to this host.
openbao_bootstrap_host: >-
  {{ (groups['openbao_group'] | default([inventory_hostname]) | sort | first) }}

# DATA-LOSS GUARD. `bao operator init` creates a BRAND-NEW empty cluster. On a
# homelab that already holds live secrets, a fresh init on a mis-scoped run (a
# node list that dropped the existing members, or a bootstrap host that can't
# reach them) would orphan the real data into a second, empty cluster. So fresh
# init is OPT-IN. For a ROLLING EXPANSION of a live cluster (add nodes, preserve
# data) leave this false — the new nodes join via retry_join and the existing
# data replicates to them. Set true ONLY for the very first cluster creation.
# See roles/openbao/README.md ("Rolling expansion / migration").
openbao_allow_fresh_init: false

# --- Seal: on-prem static-key auto-unseal (no cloud) ------------------------
# A single 32-byte AES-256 key (base64), shared by all nodes, unwraps the root
# key on every start so each node self-unseals without operator key entry and
# without any cloud KMS. The key is injected at runtime from Doppler tier-0
# (NOT hardcoded, NOT committed) and lands in the 0600 EnvironmentFile.
# Generate once:  openssl rand -base64 32
openbao_seal_key_id: "{{ lookup('env', 'OPENBAO_STATIC_SEAL_KEY_ID') | default('static-1', true) }}"
openbao_static_seal_key: "{{ lookup('env', 'OPENBAO_STATIC_SEAL_KEY') }}"
# Rotation (n-1 → n): set the previous key + id during a seal-rewrap, then clear.
openbao_seal_previous_key_id: "{{ lookup('env', 'OPENBAO_STATIC_SEAL_PREVIOUS_KEY_ID') | default('', true) }}"
openbao_static_seal_previous_key: "{{ lookup('env', 'OPENBAO_STATIC_SEAL_PREVIOUS_KEY') | default('', true) }}"

# --- KV hierarchy / RBAC policies + AppRoles ---------------------------------
# Secret hierarchy (see terraform-proxmox docs/SECRETS_HIERARCHY.md):
#   secret/infra/*     IaC kernel (proxmox/aws/network) — terraform-apply writes
#   secret/platform/*  shared platform services (dns/traefik/terrakube/splunk/
#                      cribl/object-storage/compute/...)
#   secret/apps/*      application credentials (media/monitoring/home-automation)
#   secret/ai/*        LLM stack + AI-agent creds
#   secret/public/*    non-secret, non-exploitable facts (domain/subdomain) —
#                      readable by a fixed, non-keychain-gated AppRole
#   secret/ci/*        CI/CD tokens
openbao_kv_mount: secret
# Legacy demo subtree the terraform-proxmox vault-secrets proof writes to; kept
# writable by the terraform-apply policy so that read/write proof keeps working.
openbao_homelab_path: homelab

# App secrets promoted into secret/apps/vikunja so OpenBao is their canonical
# home. Maps each KV key to the converge-env var that carries its value (the
# vikunja role mints these and stores them in SOPS; a converge run under
# `sops exec-env` exposes them). The seed step (init.yml) runs only on the
# bootstrap host under the admin token, writes only when a value differs from
# what is already stored, and skips any key whose env var is empty — so a
# converge without the SOPS values (or with unchanged values) writes nothing.
openbao_vikunja_secrets:
  token_ro: VIKUNJA_MCP_TOKEN_RO
  token_rw: VIKUNJA_MCP_TOKEN_RW
  token_admin: VIKUNJA_MCP_TOKEN_ADMIN
  svc_mcp_ro_password: VIKUNJA_SVC_MCP_RO_PASSWORD
  svc_mcp_rw_password: VIKUNJA_SVC_MCP_RW_PASSWORD

# Policy + AppRole names, one per RBAC identity (see docs/SECRETS_HIERARCHY.md
# for the full rationale). Split by resource domain, least-privilege:
#   terraform-apply  — human-triggered IaC apply (was "terraform"); read+write
#                      secret/infra/*, secret/platform/{dns,traefik}, plus
#                      narrow secret/apps/nautobot/* seed grant for Nautobot P1
#   flow-lock        — cross-repo apply lock holder; read/write only the global
#                      lock record, metadata-delete for release, and read-only
#                      secret/infra/* context for lock decisions
#   terrakube-plan   — Terrakube VCS-driven plan/apply runs; read-only,
#                      secret/platform/terrakube ONLY — deliberately walled off
#                      from secret/infra/* (untrusted-plan surface)
#   ansible-converge — config-management pulls (was "ansible"); read-only,
#                      secret/platform/*, secret/apps/*
#   observability    — splunk + cribl; read-only, secret/platform/{splunk,cribl}
#   local-cloud      — object-storage/S3/compute; read-only,
#                      secret/platform/{object-storage,compute}
#   monitoring       — read-only, secret/apps/monitoring
#   media            — read-only, secret/apps/media
#   local-llm        — LLM serving stack; read-only, secret/ai/*
#   hermes           — Hermes AI agent; read-only, secret/ai/hermes ONLY —
#                      dedicated least-privilege reader, NOT the broad ai subtree
#   hermes-write     — least-privilege WRITE to secret/ai/hermes ONLY
#                      (create/update/read that single path; no wildcard, no
#                      other paths). Doppler-published, for ansible-splunk
#                      token-publish + one-time Hermes cred seed. A narrow
#                      complement to the broad, keychain-held ai-orchestrator
#                      writer — scoped down to just the Hermes secret.
#   public           — anonymous, non-exploitable facts (domain/subdomain);
#                      read-only, secret/public/*; creds NOT keychain-gated —
#                      shipped ambiently like other non-secret internal config
#   ai-orchestrator  — AI agent/orchestrator WRITE identity; read + create/update
#                      secret/ai/* (the one AI identity that may write). Its
#                      role_id/secret_id are OPERATOR-HELD in the macOS keychain
#                      (services BAO_AI_ORCHESTRATOR_ROLE_ID / _SECRET_ID),
#                      externally managed and NOT Doppler-managed. The secret_id
#                      is non-expiring and IN ACTIVE USE — converges must stay
#                      idempotent-existence-only for it and must NEVER regenerate
#                      it (init.yml only mints creds for AppRoles missing this
#                      run, so an already-live ai-orchestrator is left untouched).
#   ai-readonly / ai-elevated / snapshot — unchanged, kept as-is
openbao_terraform_apply_policy_name: terraform-apply
openbao_terraform_apply_approle_name: terraform-apply
openbao_flow_lock_policy_name: flow-lock
openbao_flow_lock_approle_name: flow-lock
openbao_terrakube_plan_policy_name: terrakube-plan
openbao_terrakube_plan_approle_name: terrakube-plan
openbao_ansible_converge_policy_name: ansible-converge
openbao_ansible_converge_approle_name: ansible-converge
openbao_observability_policy_name: observability
openbao_observability_approle_name: observability
openbao_local_cloud_policy_name: local-cloud
openbao_local_cloud_approle_name: local-cloud
openbao_monitoring_policy_name: monitoring
openbao_monitoring_approle_name: monitoring
openbao_media_policy_name: media
openbao_media_approle_name: media
openbao_local_llm_policy_name: local-llm
openbao_local_llm_approle_name: local-llm
openbao_hermes_policy_name: hermes
openbao_hermes_approle_name: hermes
openbao_hermes_write_policy_name: hermes-write
openbao_hermes_write_approle_name: hermes-write
openbao_public_policy_name: public
openbao_public_approle_name: public
openbao_ai_orchestrator_policy_name: ai-orchestrator
openbao_ai_orchestrator_approle_name: ai-orchestrator
openbao_ai_readonly_policy_name: ai-readonly
openbao_ai_readonly_approle_name: ai-readonly
openbao_ai_elevated_policy_name: ai-elevated
openbao_ai_elevated_approle_name: ai-elevated
openbao_snapshot_policy_name: snapshot
openbao_snapshot_approle_name: snapshot

# The set of non-root AppRoles to provision, each {name, policy}. Driving the
# bootstrap from this list keeps init.yml DRY as groups are added. Per-identity
# `secret_id_bound_cidrs` hardening is left as a tracked follow-up: the real
# per-domain consumer VLAN CIDRs aren't yet surfaced as Ansible vars in this
# repo (they live in terraform-proxmox's locals.tf), and a wrong CIDR would
# silently break legitimate access — worse than the hardening it buys.
openbao_approles:
  - name: "{{ openbao_terraform_apply_approle_name }}"
    policy: "{{ openbao_terraform_apply_policy_name }}"
  - name: "{{ openbao_flow_lock_approle_name }}"
    policy: "{{ openbao_flow_lock_policy_name }}"
  - name: "{{ openbao_terrakube_plan_approle_name }}"
    policy: "{{ openbao_terrakube_plan_policy_name }}"
  - name: "{{ openbao_ansible_converge_approle_name }}"
    policy: "{{ openbao_ansible_converge_policy_name }}"
  - name: "{{ openbao_observability_approle_name }}"
    policy: "{{ openbao_observability_policy_name }}"
  - name: "{{ openbao_local_cloud_approle_name }}"
    policy: "{{ openbao_local_cloud_policy_name }}"
  - name: "{{ openbao_monitoring_approle_name }}"
    policy: "{{ openbao_monitoring_policy_name }}"
  - name: "{{ openbao_media_approle_name }}"
    policy: "{{ openbao_media_policy_name }}"
  - name: "{{ openbao_local_llm_approle_name }}"
    policy: "{{ openbao_local_llm_policy_name }}"
  - name: "{{ openbao_hermes_approle_name }}"
    policy: "{{ openbao_hermes_policy_name }}"
  - name: "{{ openbao_hermes_write_approle_name }}"
    policy: "{{ openbao_hermes_write_policy_name }}"
  - name: "{{ openbao_public_approle_name }}"
    policy: "{{ openbao_public_policy_name }}"
  # ai-orchestrator: role_id/secret_id are OPERATOR-HELD in the macOS keychain
  # (services BAO_AI_ORCHESTRATOR_ROLE_ID / _SECRET_ID), NOT Doppler-managed.
  # This AppRole already exists LIVE with a non-expiring secret_id in active
  # use; init.yml only creates + mints creds for AppRoles missing this run, so
  # a converge leaves the live role and its secret_id untouched (existence-only).
  - name: "{{ openbao_ai_orchestrator_approle_name }}"
    policy: "{{ openbao_ai_orchestrator_policy_name }}"
  - name: "{{ openbao_ai_readonly_approle_name }}"
    policy: "{{ openbao_ai_readonly_policy_name }}"
  - name: "{{ openbao_ai_elevated_approle_name }}"
    policy: "{{ openbao_ai_elevated_policy_name }}"
  - name: "{{ openbao_snapshot_approle_name }}"
    policy: "{{ openbao_snapshot_policy_name }}"
# Policy templates rendered + written on the bootstrap host. Each entry maps a
# policy name to its template; add a row to grow the RBAC surface.
openbao_policies:
  - name: "{{ openbao_terraform_apply_policy_name }}"
    template: terraform-apply-policy.hcl.j2
  - name: "{{ openbao_flow_lock_policy_name }}"
    template: flow-lock-policy.hcl.j2
  - name: "{{ openbao_terrakube_plan_policy_name }}"
    template: terrakube-plan-policy.hcl.j2
  - name: "{{ openbao_ansible_converge_policy_name }}"
    template: ansible-converge-policy.hcl.j2
  - name: "{{ openbao_observability_policy_name }}"
    template: observability-policy.hcl.j2
  - name: "{{ openbao_local_cloud_policy_name }}"
    template: local-cloud-policy.hcl.j2
  - name: "{{ openbao_monitoring_policy_name }}"
    template: monitoring-policy.hcl.j2
  - name: "{{ openbao_media_policy_name }}"
    template: media-policy.hcl.j2
  - name: "{{ openbao_local_llm_policy_name }}"
    template: local-llm-policy.hcl.j2
  - name: "{{ openbao_hermes_policy_name }}"
    template: hermes-policy.hcl.j2
  - name: "{{ openbao_hermes_write_policy_name }}"
    template: hermes-write-policy.hcl.j2
  - name: "{{ openbao_public_policy_name }}"
    template: public-policy.hcl.j2
  - name: "{{ openbao_ai_orchestrator_policy_name }}"
    template: ai-orchestrator-policy.hcl.j2
  - name: "{{ openbao_ai_readonly_policy_name }}"
    template: ai-readonly-policy.hcl.j2
  - name: "{{ openbao_ai_elevated_policy_name }}"
    template: ai-elevated-policy.hcl.j2
  - name: "{{ openbao_snapshot_policy_name }}"
    template: snapshot-policy.hcl.j2

# --- External admin token (provisioning against an ALREADY-LIVE cluster) -----
# The initial `bao operator init` only happens once; after that, adding new
# policies/AppRoles (e.g. growing openbao_approles/openbao_policies above)
# needs a privileged token supplied out-of-band, since there is no longer a
# fresh root token to mint one from. Set via env, never committed/logged.
openbao_admin_token: "{{ lookup('env', 'BAO_TOKEN') | default('', true) }}"

# --- AppRole token TTLs -------------------------------------------------------
# Short-lived tokens; secret_id_ttl=0 means the secret_id itself does not expire
# (rotate manually). Tune per-identity if needed.
openbao_approle_token_ttl: 1h
openbao_approle_token_max_ttl: 4h

# --- Raft snapshots (automated, on-box timer) -------------------------------
# An on-box systemd timer takes a raft snapshot on the ACTIVE node (leader-gated
# at runtime via /v1/sys/leader is_self; standby nodes no-op), authenticating
# with the least-privilege `snapshot` AppRole over the node's OWN api_addr (its
# VLAN IP — there is no loopback listener; see openbao.hcl.j2), NOT the Traefik
# ingress VIP. Each snapshot is integrity-checked (gzip -t, since raft snapshots
# are gzipped tar) and written under the data volume, which sits on a ZFS/PBS-
# backed dataset that replicates OFF-BOX; the newest N are kept. Success/failure
# pings the healthchecks deadman + ntfy, reusing the service_deadman alert stack.
#
# Deliberately deferred (tracked follow-ups, see roles/openbao/README.md):
#   * a SECOND off-box copy into the RustFS `openbao-snapshots` S3 bucket +
#     HeadObject/size/sha256 verify — these WAN-firewalled (outbound-internal)
#     nodes can't be handed a checksum-verifiable S3 client WAN-free the way the
#     .deb is, and hand-rolling SigV4 is out; ZFS replication already carries
#     snapshots off-box in the meantime.
#   * a full restore-to-scratch-node drill (needs a scratch node that does not
#     exist yet). gzip -t is the strongest safe on-box integrity check today.
# "Never lost" already holds regardless: Raft HA live copies + recovery
# shares (paper) + the seal key (Doppler tier-0) + the ZFS/PBS-backed data dir.
openbao_snapshot_enabled: true
# Reserved for the S3 follow-up above (bucket already created by object_storage).
openbao_snapshot_s3_bucket: openbao-snapshots
# Timer cadence (systemd OnUnitActiveSec) and how many local snapshots to keep.
openbao_snapshot_interval: "6h"
openbao_snapshot_retain: 14
# Deployed paths. Staging lives under the data dir so it inherits the ZFS/PBS
# off-box replication of the data volume.
openbao_snapshot_dir: "{{ openbao_data_dir }}/snapshots"
openbao_snapshot_script_path: /usr/local/bin/openbao-snapshot.sh
openbao_snapshot_env_file: "{{ openbao_config_dir }}/openbao-snapshot.env"
openbao_snapshot_service_name: openbao-snapshot
# Snapshot AppRole creds the timer logs in with. Emitted by init.yml at
# bootstrap; injected at converge from tier-0 (Doppler / break-glass file),
# never committed. When unset the daemon is skipped so a pre-provisioning
# converge stays green (see the include guard in tasks/main.yml).
openbao_snapshot_role_id: "{{ lookup('env', 'OPENBAO_SNAPSHOT_ROLE_ID') | default('', true) }}"
openbao_snapshot_secret_id: "{{ lookup('env', 'OPENBAO_SNAPSHOT_SECRET_ID') | default('', true) }}"
# ntfy alert target (reuses the repo's ntfy LXC + notification-port convention,
# matching service_deadman). Topic 'openbao'.
openbao_snapshot_ntfy_url: >-
  http://{{ hostvars['ntfy']['container_ip'] | default('ntfy') }}:{{
  tofu_data.constants.notification_ports.ntfy_http }}/openbao
# healthchecks deadman ping URL for the snapshot job; EMPTY => ping skipped
# (ntfy + journal alert still fire). Set per-node from the healthchecks LXC.
openbao_snapshot_healthcheck_url: "{{ lookup('env', 'OPENBAO_SNAPSHOT_HC_URL') | default('', true) }}"

# --- Audit device + shipping (file device -> rsyslog imfile -> AI listener) --
# Enable the file audit device (every node writes its OWN local audit log —
# the device config replicates cluster-wide, the file does not) and tail it
# with a dedicated rsyslog imfile ruleset that forwards to the openbao_audit
# AI ingest listener (syslog CNAME -> HAProxy -> Cribl Stream ai_stamp ->
# Splunk index=openbao_audit). The dedicated ruleset is load-bearing: audit
# lines must NOT also hit the syslog_forwarder catch-all (linux/os family) or
# every secret access would be double-shipped into index=os.
openbao_audit_enabled: true
openbao_audit_device_name: file
openbao_audit_log_dir: /var/log/openbao
openbao_audit_log_path: "{{ openbao_audit_log_dir }}/audit.log"
# `bao audit enable` needs a privileged token (BAO_TOKEN via Doppler tier-0 /
# break-glass, same as openbao_admin_token). When empty the enable step is
# skipped cleanly — dir/logrotate/rsyslog still converge so the device starts
# shipping the moment it is enabled.
openbao_audit_rsyslog_config_path: /etc/rsyslog.d/20-openbao-audit.conf
openbao_audit_syslog_host: "syslog.{{ lookup('env', 'PROXMOX_SUBDOMAIN') }}"
# openbao_audit AI ingest port from tofu constants; guarded default = the
# family's assigned port for inventories that predate ai_log_routing.
openbao_audit_syslog_port: >-
  {{ tofu_data.constants.ai_log_routing.openbao_audit.port | default(10331) }}
openbao_audit_queue_max_disk_space: 256m
# Logrotate: copytruncate so the running server keeps its file handle (the
# file audit device only reopens on SIGHUP; truncating in place avoids racing
# a reload against audit writes).
openbao_audit_logrotate_path: /etc/logrotate.d/openbao-audit
openbao_audit_logrotate_rotate: 7
openbao_audit_logrotate_frequency: daily

# --- Break-glass / bootstrap output (controller-side, never committed) -------
# init.yml writes recovery shares + root token, and each AppRole's creds, to
# 0600 files UNDER playbook_dir ON THE CONTROLLER, then prints a LOUD warning to
# transcribe to paper / load into the right tier-0 store and delete. These paths
# are gitignored (.openbao-recovery-*.json / .openbao-approle-*.json).
openbao_recovery_shares: 5
openbao_recovery_threshold: 3
openbao_recovery_file: "{{ playbook_dir }}/.openbao-recovery-{{ inventory_hostname }}.json"
# One file per AppRole: .openbao-approle-<role>-<host>.json
openbao_approle_file_prefix: "{{ playbook_dir }}/.openbao-approle"

# --- systemd hardening -------------------------------------------------------
# NOTE: OpenBao 2.x dropped mlock support (a `disable_mlock` line is a fatal
# config error since 2.5), so there is no mlock toggle here. Swap hygiene comes
# from the guest itself: the OpenBao LXCs set memory_swap = 0 in deployment.json.
openbao_service_state: started
openbao_service_enabled: true

# --- UI ----------------------------------------------------------------------
openbao_enable_ui: true
