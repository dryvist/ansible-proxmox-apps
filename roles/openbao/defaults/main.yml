# --- External admin token (provisioning against an ALREADY-LIVE cluster) -----
# The initial `bao operator init` only happens once; after that, adding new
# policies/AppRoles (e.g. growing openbao_approles/openbao_policies above)
# needs a privileged token supplied out-of-band, since there is no longer a
# fresh root token to mint one from. Set via env, never committed/logged.
openbao_admin_token: "{{ lookup('env', 'BAO_TOKEN') | default('', true) }}"

# --- AppRole token TTLs -------------------------------------------------------
# Short-lived tokens; secret_id_ttl=0 means the secret_id itself does not expire
# (rotate manually). Tune per-identity if needed.
openbao_approle_token_ttl: 1h
openbao_approle_token_max_ttl: 4h

# --- Raft snapshots (automated, on-box timer) -------------------------------
# An on-box systemd timer takes a raft snapshot on the ACTIVE node (leader-gated
# at runtime via /v1/sys/leader is_self; standby nodes no-op), authenticating
# with the least-privilege `snapshot` AppRole over the node's OWN api_addr (its
# VLAN IP — there is no loopback listener; see openbao.hcl.j2), NOT the Traefik
# ingress VIP. Each snapshot is integrity-checked (gzip -t, since raft snapshots
# are gzipped tar) and written under the data volume, which sits on a ZFS/PBS-
# backed dataset that replicates OFF-BOX; the newest N are kept. Success/failure
# pings the healthchecks deadman + ntfy, reusing the service_deadman alert stack.
#
# Deliberately deferred (tracked follow-ups, see roles/openbao/README.md):
#   * a SECOND off-box copy into the RustFS `openbao-snapshots` S3 bucket +
#     HeadObject/size/sha256 verify — these WAN-firewalled (outbound-internal)
#     nodes can't be handed a checksum-verifiable S3 client WAN-free the way the
#     .deb is, and hand-rolling SigV4 is out; ZFS replication already carries
#     snapshots off-box in the meantime.
#   * a full restore-to-scratch-node drill (needs a scratch node that does not
#     exist yet). gzip -t is the strongest safe on-box integrity check today.
# "Never lost" already holds regardless: Raft HA live copies + recovery
# shares (paper) + the seal key (Doppler tier-0) + the ZFS/PBS-backed data dir.
openbao_snapshot_enabled: true
# Reserved for the S3 follow-up above (bucket already created by object_storage).
openbao_snapshot_s3_bucket: openbao-snapshots
# Timer cadence (systemd OnUnitActiveSec) and how many local snapshots to keep.
openbao_snapshot_interval: "6h"
openbao_snapshot_retain: 14
# Deployed paths. Staging lives under the data dir so it inherits the ZFS/PBS
# off-box replication of the data volume.
openbao_snapshot_dir: "{{ openbao_data_dir }}/snapshots"
openbao_snapshot_script_path: /usr/local/bin/openbao-snapshot.sh
openbao_snapshot_env_file: "{{ openbao_config_dir }}/openbao-snapshot.env"
openbao_snapshot_service_name: openbao-snapshot
# Snapshot AppRole creds the timer logs in with. Emitted by init.yml at
# bootstrap; injected at converge from tier-0 (Doppler / break-glass file),
# never committed. When unset the daemon is skipped so a pre-provisioning
# converge stays green (see the include guard in tasks/main.yml).
openbao_snapshot_role_id: "{{ lookup('env', 'OPENBAO_SNAPSHOT_ROLE_ID') | default('', true) }}"
openbao_snapshot_secret_id: "{{ lookup('env', 'OPENBAO_SNAPSHOT_SECRET_ID') | default('', true) }}"
# ntfy alert target — FQDN-first: the Traefik-fronted service name
# (matching service_deadman). Topic 'openbao'.
openbao_snapshot_ntfy_url: >-
  https://ntfy.{{ tofu_data.domain }}/openbao
# healthchecks deadman ping URL for the snapshot job; EMPTY => ping skipped
# (ntfy + journal alert still fire). Set per-node from the healthchecks LXC.
openbao_snapshot_healthcheck_url: "{{ lookup('env', 'OPENBAO_SNAPSHOT_HC_URL') | default('', true) }}"

# --- Audit device + shipping (file device -> rsyslog imfile -> AI listener) --
# Enable the file audit device (every node writes its OWN local audit log —
# the device config replicates cluster-wide, the file does not) and tail it
# with a dedicated rsyslog imfile ruleset that forwards to the openbao_audit
# AI ingest listener (syslog CNAME -> HAProxy -> Cribl Stream ai_stamp ->
# Splunk index=openbao_audit). The dedicated ruleset is load-bearing: audit
# lines must NOT also hit the syslog_forwarder catch-all (linux/os family) or
# every secret access would be double-shipped into index=os.
openbao_audit_enabled: true
openbao_audit_device_name: file
openbao_audit_log_dir: /var/log/openbao
openbao_audit_log_path: "{{ openbao_audit_log_dir }}/audit.log"
# `bao audit enable` needs a privileged token (BAO_TOKEN via Doppler tier-0 /
# break-glass, same as openbao_admin_token). When empty the enable step is
# skipped cleanly — dir/logrotate/rsyslog still converge so the device starts
# shipping the moment it is enabled.
openbao_audit_rsyslog_config_path: /etc/rsyslog.d/20-openbao-audit.conf
openbao_audit_syslog_host: "syslog.{{ lookup('env', 'PROXMOX_SUBDOMAIN') }}"
# openbao_audit AI ingest port from tofu constants; guarded default = the
# family's assigned port for inventories that predate ai_log_routing.
openbao_audit_syslog_port: >-
  {{ tofu_data.constants.ai_log_routing.openbao_audit.port | default(10331) }}
openbao_audit_queue_max_disk_space: 256m
# Logrotate: copytruncate so the running server keeps its file handle (the
# file audit device only reopens on SIGHUP; truncating in place avoids racing
# a reload against audit writes).
openbao_audit_logrotate_path: /etc/logrotate.d/openbao-audit
openbao_audit_logrotate_rotate: 7
openbao_audit_logrotate_frequency: daily

# --- Break-glass / bootstrap output (controller-side, never committed) -------
# init.yml writes recovery shares + root token, and each AppRole's creds, to
# 0600 files UNDER playbook_dir ON THE CONTROLLER, then prints a LOUD warning to
# transcribe to paper / load into the right tier-0 store and delete. These paths
# are gitignored (.openbao-recovery-*.json / .openbao-approle-*.json).
openbao_recovery_shares: 5
openbao_recovery_threshold: 3
openbao_recovery_file: "{{ playbook_dir }}/.openbao-recovery-{{ inventory_hostname }}.json"
# One file per AppRole: .openbao-approle-<role>-<host>.json
openbao_approle_file_prefix: "{{ playbook_dir }}/.openbao-approle"

# --- systemd hardening -------------------------------------------------------
# NOTE: OpenBao 2.x dropped mlock support (a `disable_mlock` line is a fatal
# config error since 2.5), so there is no mlock toggle here. Swap hygiene comes
# from the guest itself: the OpenBao LXCs set memory_swap = 0 in deployment.json.
openbao_service_state: started
openbao_service_enabled: true

# --- UI ----------------------------------------------------------------------
openbao_enable_ui: true
