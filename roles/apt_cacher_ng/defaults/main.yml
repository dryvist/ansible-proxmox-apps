---
# Apt-Cacher-NG role defaults

# Service configuration
apt_cacher_ng_port: 3142
apt_cacher_ng_cache_dir: /var/cache/apt-cacher-ng
apt_cacher_ng_log_dir: /var/log/apt-cacher-ng

# Crash-recovery backoff. The Debian apt-cacher-ng.service already ships
# Restart=on-failure and WantedBy=multi-user.target, but no RestartSec, so a
# crash-loop hammers restarts with systemd's ~100ms default. A drop-in adds a
# sensible backoff without forking the vendor unit (survives package upgrades).
apt_cacher_ng_restart_sec: 5

# Cache settings
apt_cacher_ng_expiry_threshold: 4

# Network settings
apt_cacher_ng_bind_address: "0.0.0.0"

# Passthrough HTTPS (for repos that require it)
# Disabled by default to preserve caching benefits. Enable only for
# repositories that cannot be cached (e.g., HTTPS with authentication).
#
# apt-cacher-ng matches this regex against the CONNECT target — `host:port`,
# e.g. `registry-1.docker.io:443`. Host-only or URL-style patterns will NOT
# match real CONNECT requests; each alternation must end in `:<port>$`.
# Example: `(^|\.)(registry-1\.docker\.io|gcr\.io|quay\.io):443$`
apt_cacher_ng_passthrough_enabled: false
apt_cacher_ng_passthrough_pattern: "(^|\\.)(registry-1\\.docker\\.io|gcr\\.io|quay\\.io):443$"

# Admin interface
apt_cacher_ng_admin_enabled: false
apt_cacher_ng_report_page: acng-report.html

# Upstream mirrors (Debian defaults)
apt_cacher_ng_debian_mirrors:
  - http://deb.debian.org/debian

apt_cacher_ng_debian_security_mirrors:
  - http://security.debian.org/debian-security

# Upstream mirrors (Ubuntu defaults)
apt_cacher_ng_ubuntu_mirrors:
  - http://archive.ubuntu.com/ubuntu

apt_cacher_ng_ubuntu_security_mirrors:
  - http://security.ubuntu.com/ubuntu

# Docker mirror passthrough
apt_cacher_ng_docker_passthrough: true

# Plex media-server repo passthrough. The Plex apt repo (repo.plex.tv) and key
# host (downloads.plex.tv) are HTTPS-only and cannot be cached, so apt tunnels
# them via CONNECT — which apt-cacher-ng denies unless the target is in
# PassThroughPattern. Without this the plex role fails at "Add Plex apt
# repository" with "403 CONNECT denied (ask the admin to allow HTTPS tunnels)".
apt_cacher_ng_plex_passthrough: true

# Microsoft package repo passthrough. packages.microsoft.com (used by the
# .NET/ASP.NET Core apt repo — e.g. technitium_install's aspnetcore-runtime)
# is HTTPS-only and cannot be cached, so apt tunnels it via CONNECT — which
# apt-cacher-ng denies unless the target is in PassThroughPattern. Without
# this, any client behind this proxy fails at "apt-get update" with "403
# CONNECT denied (ask the admin to allow HTTPS tunnels)" for that repo.
apt_cacher_ng_microsoft_passthrough: true

# Logging
apt_cacher_ng_verbose_log: 1
apt_cacher_ng_debug_log: 0

# UFW firewall integration
apt_cacher_ng_firewall_enabled: false
