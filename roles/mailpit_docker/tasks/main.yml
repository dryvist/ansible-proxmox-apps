---
# Mailpit Docker Deployment Tasks
# Deploys Mailpit SMTP relay as a Docker container

# Docker itself (docker-ce + compose plugin, fuse-overlayfs, the fuse-overlayfs
# daemon.json) is installed by the docker_engine meta dependency (meta/main.yml).
# No venv: Mailpit deploys via docker_compose_v2, which uses the docker compose
# CLI (not the docker SDK).

# =============================================================================
# Mailpit Data Directory
# =============================================================================

- name: Create Mailpit data directory
  ansible.builtin.file:
    path: "{{ mailpit_docker_data_dir }}/data"
    state: directory
    owner: root
    group: root
    mode: "0755"

# =============================================================================
# Docker Compose Configuration
# =============================================================================

- name: Deploy Mailpit docker-compose template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ mailpit_docker_data_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
  no_log: true
  notify: Restart mailpit

# =============================================================================
# Deploy via Docker Compose
# =============================================================================

- name: Deploy Mailpit via docker compose
  community.docker.docker_compose_v2:
    project_src: "{{ mailpit_docker_data_dir }}"
    state: present

# =============================================================================
# Health Check
# =============================================================================

- name: Wait for Mailpit web UI to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ mailpit_docker_web_port }}"
    timeout: 60

- name: Verify Mailpit web UI health
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ mailpit_docker_web_port }}"
    method: GET
    status_code: 200
  register: mailpit_docker_health
  retries: 10
  delay: 5
  until: mailpit_docker_health.status == 200
  changed_when: false
