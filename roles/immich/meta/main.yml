---
galaxy_info:
  author: JacobPEvans
  description: Deploy Immich (self-hosted photo/video backup) as Docker-in-LXC
  license: Apache-2.0
  min_ansible_version: "2.15"
  platforms:
    - name: Debian
      versions:
        - bookworm
        - trixie
  galaxy_tags:
    - immich
    - photos
    - backup
    - docker

dependencies:
  # Shared Docker-in-LXC bootstrap (docker-ce + compose plugin, LXC-conditional
  # fuse-overlayfs). Defaults: no daemon.json, no venv — immich deploys via
  # docker_compose_v2, which uses the docker compose CLI (not the docker SDK).
  - role: docker_engine
