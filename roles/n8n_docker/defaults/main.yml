---
# n8n workflow-automation platform (Docker Compose in LXC).
# https://docs.n8n.io/hosting/installation/docker/
#
# Bundled stack: postgres + n8n app. Mirrors the infisical_docker /
# healthchecks_docker Docker-in-LXC pattern (install Docker + fuse-overlayfs,
# Python venv for community.docker, render compose, deploy, health check).
# All literals live here; the template references vars only (DRY).

# Image tags — single source of truth. Bump via Renovate or manual review.
n8n_docker_app_image: "docker.n8n.io/n8nio/n8n:2.27.4"
n8n_docker_postgres_image: "postgres:16-alpine"

n8n_docker_container_name: n8n
n8n_docker_data_dir: /opt/n8n
n8n_docker_postgres_data_dir: "{{ n8n_docker_data_dir }}/postgres"

# Container-internal mount paths (image contracts — set once, referenced in template).
n8n_docker_app_internal_data: /home/node/.n8n
n8n_docker_postgres_internal_data: /var/lib/postgresql/data

# Named Docker volume for n8n application state (encryption config, binary data).
# A named volume (not a host bind) sidesteps the n8n UID-1000 write-permission
# gotcha on unprivileged LXC: Docker seeds it from the image's node-owned
# /home/node/.n8n. Postgres stays a host bind (its entrypoint chowns the dir,
# and the workflow/credential DB belongs on the snapshotted host dataset).
n8n_docker_app_volume: n8n_data

# Compose service names (also used as Docker DNS hostnames in env vars).
n8n_docker_app_service: n8n
n8n_docker_db_service: postgres

# Restart policy applied to every service in the stack.
n8n_docker_restart_policy: unless-stopped

# Ports pulled from the OpenTofu pipeline_constants (DRY: no port literal here).
_n8n_docker_web_port_err: >-
  tofu_data.constants.service_ports.n8n_web missing —
  regenerate tofu_inventory.json via
  `terragrunt output -json ansible_inventory`.
n8n_docker_web_port: >-
  {{ hostvars['localhost']['tofu_data']
     ['constants']['service_ports']['n8n_web']
     | mandatory(_n8n_docker_web_port_err) }}
_n8n_docker_postgres_port_err: >-
  tofu_data.constants.service_ports.postgres_default missing —
  regenerate tofu_inventory.json via
  `terragrunt output -json ansible_inventory`.
n8n_docker_postgres_port: >-
  {{ hostvars['localhost']['tofu_data']
     ['constants']['service_ports']['postgres_default']
     | mandatory(_n8n_docker_postgres_port_err) }}

# Public address composition. Auto-derived from inventory hostname +
# PROXMOX_SUBDOMAIN (Technitium authoritative). HTTPS because the canonical
# path is HAProxy → n8n with TLS terminated at the frontend.
n8n_docker_host: "{{ inventory_hostname }}.{{ lookup('env', 'PROXMOX_SUBDOMAIN') }}"
n8n_docker_protocol: https
n8n_docker_webhook_url: "https://{{ n8n_docker_host }}/"

# Database identity. Password MUST come from env (SOPS/Doppler) — never
# committed (matches the infisical_docker INFISICAL_DB_PASSWORD pattern). Note:
# lookup('env') returns '' when unset, so mandatory() does NOT trip — postgres
# itself fails closed on an empty POSTGRES_PASSWORD (refuses to initialize).
n8n_docker_db_name: n8n
n8n_docker_db_user: n8n
n8n_docker_db_password: >-
  {{ lookup('env', 'N8N_DB_PASSWORD')
     | mandatory('N8N_DB_PASSWORD must be set (openssl rand -base64 24; store in SOPS)') }}

# OpenTelemetry. The endpoint is the ai_orchestration_otel_endpoint group_var
# (defined at the group level, NOT in this role) — referenced only.
n8n_docker_otel_enabled: true
n8n_docker_otel_endpoint: "{{ ai_orchestration_otel_endpoint }}"

# N8N_ENCRYPTION_KEY. Generated once on the LXC and persisted to
# {{ n8n_docker_data_dir }}/.encryption_key (root:root 0600), then reused so
# stored credentials stay decryptable across redeploys. Override only to share
# an explicit value across hosts.
n8n_docker_encryption_key: ""
