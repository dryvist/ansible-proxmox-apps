---
# state: present + recreate: always so a re-rendered compose (new image tag,
# env change) forces a full recreate, not just a restart of the old container.
- name: Restart n8n
  community.docker.docker_compose_v2:
    project_src: "{{ n8n_docker_data_dir }}"
    state: present
    recreate: always
  no_log: true  # compose carries N8N_ENCRYPTION_KEY + DB password env vars
  vars:
    ansible_python_interpreter: /opt/ansible-venv/bin/python
