---
# n8n workflow-automation deployment.
# Bundled stack: postgres + n8n app via Docker Compose in LXC. Generates and
# persists an N8N_ENCRYPTION_KEY on first run (healthchecks_docker SECRET_KEY
# pattern), then deploys via community.docker.docker_compose_v2.

# =============================================================================
# Docker Installation
# =============================================================================

- name: Gather OS facts
  ansible.builtin.setup:
    filter: ansible_distribution*

- name: Install Docker prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Set Docker repository distribution
  ansible.builtin.set_fact:
    n8n_docker_distro: "{{ ansible_distribution | lower }}"

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ n8n_docker_distro }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ n8n_docker_distro }}
      {{ ansible_distribution_release }} stable
    state: present
    filename: docker

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Install fuse-overlayfs for Docker on ZFS-backed LXC containers
  ansible.builtin.apt:
    name: fuse-overlayfs
    state: present

- name: Configure Docker to use fuse-overlayfs storage driver (ZFS-backed LXC)
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "storage-driver": "fuse-overlayfs"
      }
    owner: root
    group: root
    mode: "0644"
  register: n8n_docker_daemon_config

- name: Restart Docker to apply fuse-overlayfs configuration
  ansible.builtin.systemd:  # noqa: no-handler
    name: docker
    state: restarted
  when: n8n_docker_daemon_config.changed

- name: Ensure Docker service is running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

# =============================================================================
# Data Directories
# Postgres writes to a bind-mounted volume under {{ n8n_docker_data_dir }}.
# Its entrypoint runs as UID 999 and chowns the data dir itself; in an
# unprivileged LXC the host UIDs map to subuids, so leave ownership defaults.
# =============================================================================

- name: Create n8n data subdirectories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ n8n_docker_data_dir }}"
    - "{{ n8n_docker_postgres_data_dir }}"

# =============================================================================
# N8N_ENCRYPTION_KEY (generate-once, persist on disk)
# n8n encrypts stored credentials with this key; if it changed per play, every
# redeploy would orphan all saved credentials. Persist it in a root-only file
# on first run and reuse it thereafter.
# =============================================================================

- name: Check for existing n8n encryption key
  ansible.builtin.stat:
    path: "{{ n8n_docker_data_dir }}/.encryption_key"
  register: n8n_docker_encryption_key_stat

- name: Generate n8n encryption key (first run only)
  ansible.builtin.copy:
    dest: "{{ n8n_docker_data_dir }}/.encryption_key"
    content: >-
      {{ lookup('community.general.random_string',
                length=48,
                upper=true, lower=true, numbers=true,
                special=false) }}
    owner: root
    group: root
    mode: "0600"
  when: not n8n_docker_encryption_key_stat.stat.exists
  no_log: true

- name: Read n8n encryption key into memory
  ansible.builtin.slurp:
    src: "{{ n8n_docker_data_dir }}/.encryption_key"
  register: n8n_docker_encryption_key_file
  no_log: true

- name: Resolve effective encryption key (inventory override or persisted file)
  ansible.builtin.set_fact:
    n8n_docker_encryption_key: >-
      {{ n8n_docker_encryption_key
         if n8n_docker_encryption_key | length > 0
         else (n8n_docker_encryption_key_file.content | b64decode | trim) }}
  no_log: true

# =============================================================================
# Compose File
# =============================================================================

- name: Render n8n docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ n8n_docker_data_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0600"  # carries N8N_ENCRYPTION_KEY + DB password env vars
  no_log: true
  notify: Restart n8n

# =============================================================================
# Python venv for Ansible Docker modules
# Scope the venv interpreter to the docker_compose_v2 tasks via task-level vars
# so it does NOT leak to subsequent tasks (wait_for / uri) that need system
# Python.
# =============================================================================

- name: Install Python venv and pip for dependencies
  ansible.builtin.apt:
    name:
      - python3-pip
      - python3-venv
      - python3-full
    state: present
    update_cache: true

- name: Create virtualenv for Ansible Python dependencies
  ansible.builtin.pip:
    name:
      - docker
    state: present
    virtualenv: /opt/ansible-venv
    virtualenv_command: python3 -m venv

# =============================================================================
# Deploy via Docker Compose
# =============================================================================

- name: Deploy n8n via docker compose
  community.docker.docker_compose_v2:
    project_src: "{{ n8n_docker_data_dir }}"
    state: present
  no_log: true
  vars:
    ansible_python_interpreter: /opt/ansible-venv/bin/python

# =============================================================================
# Health Check
# First boot can take 30-90 seconds: postgres initdb, then n8n running its
# migrations against the fresh DB before /healthz returns 200.
# =============================================================================

- name: Wait for the n8n web port to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ n8n_docker_web_port }}"
    timeout: 180

- name: Verify the n8n health endpoint responds
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ n8n_docker_web_port }}/healthz"
    method: GET
    status_code: 200
  register: n8n_docker_health
  retries: 20
  delay: 10
  until: n8n_docker_health.status == 200
  changed_when: false
