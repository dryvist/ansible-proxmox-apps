---
galaxy_info:
  author: Jacob Evans
  description: >-
    Self-hosted n8n workflow automation, Community Edition
    (https://docs.n8n.io/hosting/) on an LXC container via Docker Compose,
    backed by PostgreSQL. Builds and runs LLM/automation workflows for the
    homelab AI-orchestration stack, wired to the LiteLLM router.
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: Debian
      versions:
        - bookworm
  galaxy_tags:
    - ai
    - automation
    - n8n
    - docker

dependencies:
  # Shared Docker-in-LXC bootstrap (docker-ce + compose plugin, LXC-conditional
  # fuse-overlayfs). configure_daemon_json pins the fuse-overlayfs storage driver
  # (required on ZFS-backed LXC). No venv: deploys via docker_compose_v2 (CLI).
  - role: docker_engine
    docker_engine_configure_daemon_json: true

collections:
  - community.docker
