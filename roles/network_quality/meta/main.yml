---
galaxy_info:
  author: JacobPEvans
  description: >-
    Network-quality probing via smokeping_prober (ICMP latency-distribution
    histograms, scraped by Prometheus) as a Docker-in-LXC compose stack. Co-located
    on the monitoring LXC alongside prometheus_stack; adds the loss/latency-
    distribution leg that blackbox's binary probe_success does not provide. irtt
    (jitter/MOS) is deferred (no official image). See terraform-proxmox
    docs/SMOKEPING.md.
  license: Apache-2.0
  min_ansible_version: "2.15"

  platforms:
    - name: Debian
      versions:
        - bookworm
        - trixie
    - name: Ubuntu
      versions:
        - jammy
        - noble

  galaxy_tags:
    - smokeping
    - monitoring
    - network
    - docker

dependencies:
  # Shared Docker-in-LXC bootstrap (docker-ce + compose plugin, LXC-conditional
  # fuse-overlayfs). No daemon.json (the registry-mirror play owns it). Manages a
  # venv because the health check uses the SDK-based docker_container_info; the
  # role scopes that venv interpreter per-block (no global set_fact). packaging +
  # requests are pinned into the venv for docker_compose_v2 version comparison.
  - role: docker_engine
    docker_engine_manage_venv: true
    docker_engine_venv_extra_packages:
      - packaging
      - requests
