---
# Cribl Stream native installation in LXC containers

- name: Install required packages
  # sudo is required because later tasks use `become_user:
  # {{ cribl_stream_user }}` to run `cribl mode-single` as the non-root
  # service user. The Proxmox LXC base image does not ship sudo —
  # without this those tasks fail with `/bin/sh: 1: sudo: not found`.
  # (curl is intentionally omitted — this role uses get_url, not the
  # curl CLI, and the tarball is extracted with ansible.builtin.unarchive.)
  ansible.builtin.apt:
    name:
      - tar
      - sudo
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create cribl system group
  ansible.builtin.group:
    name: "{{ cribl_stream_group }}"
    system: true
    state: present

- name: Create cribl system user
  ansible.builtin.user:
    name: "{{ cribl_stream_user }}"
    group: "{{ cribl_stream_group }}"
    system: true
    create_home: false
    home: "{{ cribl_stream_install_dir }}"
    shell: /usr/sbin/nologin
    state: present

- name: Check if Cribl Stream is already installed
  ansible.builtin.stat:
    path: "{{ cribl_stream_install_dir }}/bin/cribl"
  register: cribl_stream_binary

- name: Download Cribl Stream tarball
  ansible.builtin.get_url:
    url: "{{ cribl_stream_tarball_url }}"
    dest: /tmp/cribl-stream.tgz
    mode: "0644"
  when: not cribl_stream_binary.stat.exists

- name: Create install directory
  ansible.builtin.file:
    path: "{{ cribl_stream_install_dir }}"
    state: directory
    owner: "{{ cribl_stream_user }}"
    group: "{{ cribl_stream_group }}"
    mode: "0755"

- name: Extract Cribl Stream tarball
  ansible.builtin.unarchive:
    src: /tmp/cribl-stream.tgz
    dest: /opt
    remote_src: true
    owner: "{{ cribl_stream_user }}"
    group: "{{ cribl_stream_group }}"
  when: not cribl_stream_binary.stat.exists

- name: Remove downloaded tarball
  ansible.builtin.file:
    path: /tmp/cribl-stream.tgz
    state: absent

- name: Set Cribl Stream to single-instance mode
  ansible.builtin.command:
    cmd: "{{ cribl_stream_install_dir }}/bin/cribl mode-single"
  become: true
  become_user: "{{ cribl_stream_user }}"
  changed_when: true
  when: not cribl_stream_binary.stat.exists

- name: Ensure pipeline config directories exist
  ansible.builtin.file:
    path: "{{ cribl_stream_install_dir }}/local/cribl/pipelines/{{ item }}"
    state: directory
    owner: "{{ cribl_stream_user }}"
    group: "{{ cribl_stream_group }}"
    mode: "0755"
  loop:
    - ipfix
    - force_splunk_meta
    - prometheus_to_netmon
    - ai_stamp

- name: Deploy Cribl Stream inputs configuration
  ansible.builtin.template:
    src: inputs.yml.j2
    dest: "{{ cribl_stream_install_dir }}/local/cribl/inputs.yml"
    owner: "{{ cribl_stream_user }}"
    group: "{{ cribl_stream_group }}"
    mode: "0644"
  notify: Restart cribl stream

# Cribl Stream rewrites local/cribl/outputs.yml at startup (strips comments,
# materializes defaults), so an unconditional template re-diffs and bounces
# the service on every converge. Deploy only when a managed field drifts.
- name: Read live Cribl Stream outputs configuration
  ansible.builtin.slurp:
    src: "{{ cribl_stream_install_dir }}/local/cribl/outputs.yml"
  register: cribl_stream_outputs_live
  failed_when: false
  no_log: true  # file contains the HEC token

- name: Extract live Splunk HEC output settings
  ansible.builtin.set_fact:
    cribl_stream_hec_live: >-
      {{ ((cribl_stream_outputs_live.content | default('') | b64decode | from_yaml)
          | default({}, true)).get('outputs', {}).get('splunk_hec', {}) }}
    # Live output ids, so a NEW per-index output (a fresh index in
    # ai_log_routing) counts as drift — the url/token compare below only sees
    # the legacy shared output and left outputs.yml stale when hermes was added.
    cribl_stream_outputs_live_ids: >-
      {{ ((cribl_stream_outputs_live.content | default('') | b64decode | from_yaml)
          | default({}, true)).get('outputs', {}).keys() | list }}
  no_log: true

- name: Deploy Cribl Stream outputs configuration
  ansible.builtin.template:
    src: outputs.yml.j2
    dest: "{{ cribl_stream_install_dir }}/local/cribl/outputs.yml"
    owner: "{{ cribl_stream_user }}"
    group: "{{ cribl_stream_group }}"
    mode: "0600"
  no_log: true
  notify: Restart cribl stream
  when:
    - cribl_stream_splunk_hec_token != ''
    - >-
      cribl_stream_hec_live.get('url', '') != cribl_stream_splunk_hec_url
      or cribl_stream_hec_live.get('token', '') != cribl_stream_splunk_hec_token
      or cribl_stream_hec_live.get('rejectUnauthorized', none) | bool
         != cribl_stream_splunk_hec_tls_verify | bool
      or cribl_stream_hec_live.get('pqEnabled', none) | bool
         != cribl_stream_pq_enabled | bool
      or ((cribl_stream_hec_namespace | default('')) | length > 0
          and (cribl_stream_per_index_indexes
               | map('regex_replace', '^', 'splunk_hec_') | list)
              | difference(cribl_stream_outputs_live_ids) | length > 0)

- name: Deploy IPFIX pipeline configuration
  ansible.builtin.template:
    src: pipelines/ipfix/conf.yml.j2
    dest: "{{ cribl_stream_install_dir }}/local/cribl/pipelines/ipfix/conf.yml"
    owner: "{{ cribl_stream_user }}"
    group: "{{ cribl_stream_group }}"
    mode: "0644"
  notify: Restart cribl stream

- name: Deploy force_splunk_meta pipeline configuration
  ansible.builtin.template:
    src: pipelines/force_splunk_meta/conf.yml.j2
    dest: "{{ cribl_stream_install_dir }}/local/cribl/pipelines/force_splunk_meta/conf.yml"
    owner: "{{ cribl_stream_user }}"
    group: "{{ cribl_stream_group }}"
    mode: "0644"
  notify: Restart cribl stream

- name: Deploy ai_stamp pipeline configuration
  ansible.builtin.template:
    src: pipelines/ai_stamp/conf.yml.j2
    dest: "{{ cribl_stream_install_dir }}/local/cribl/pipelines/ai_stamp/conf.yml"
    owner: "{{ cribl_stream_user }}"
    group: "{{ cribl_stream_group }}"
    mode: "0644"
  notify: Restart cribl stream

- name: Deploy prometheus_to_netmon pipeline configuration
  ansible.builtin.template:
    src: pipelines/prometheus_to_netmon/conf.yml.j2
    dest: "{{ cribl_stream_install_dir }}/local/cribl/pipelines/prometheus_to_netmon/conf.yml"
    owner: "{{ cribl_stream_user }}"
    group: "{{ cribl_stream_group }}"
    mode: "0644"
  notify: Restart cribl stream

- name: Enable Cribl Stream boot-start via systemd
  ansible.builtin.command:
    cmd: "{{ cribl_stream_install_dir }}/bin/cribl boot-start enable -m systemd -u {{ cribl_stream_user }}"
    creates: /etc/systemd/system/cribl.service

- name: Ensure Cribl Stream service is running
  ansible.builtin.systemd:
    name: "{{ cribl_stream_service_name }}"
    state: "{{ cribl_stream_service_state }}"
    enabled: "{{ cribl_stream_service_enabled }}"
    daemon_reload: true
