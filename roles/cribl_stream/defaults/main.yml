---
# Cribl Stream native install role defaults

# Installation
# Pinned to 4.12.2 alongside Cribl Edge (single fleet version; routes-based
# input fan-out requires >= 4.12). GATED on the L19 single-node 4.12.2 spike.
# NOTE: the cribl_stream_group group_vars override the tarball URL with the
# MinIO mirror; re-stage the mirrored object with the 4.12.2 build together
# with this bump.
cribl_stream_version: "4.12.2"
cribl_stream_tarball_base: "https://cdn.cribl.io/dl"
# Upstream release URL. Cribl's CDN uses two different filename patterns:
#   - versioned release: https://cdn.cribl.io/dl/4.12.2/cribl-4.12.2-linux-x64.tgz
#   - rolling "latest":  https://cdn.cribl.io/dl/latest/cribl-linux-x64.tgz    (no version in filename)
# Group vars for the `cribl_stream_group` override this with a MinIO mirror URL
# because the cribl-stream containers have the `outbound-internal` firewall
# and cannot reach cdn.cribl.io directly.
cribl_stream_tarball_url: >-
  {{ cribl_stream_tarball_base }}/{{ cribl_stream_version }}/{{
  'cribl-linux-x64.tgz' if cribl_stream_version == 'latest'
  else 'cribl-' + cribl_stream_version + '-linux-x64.tgz' }}
cribl_stream_install_dir: /opt/cribl

# Service user
cribl_stream_user: cribl
cribl_stream_group: cribl

# Service configuration
cribl_stream_service_name: cribl
cribl_stream_service_state: started
cribl_stream_service_enabled: true

# NetFlow port from tofu constants
cribl_stream_netflow_port: >-
  {{ hostvars['localhost']['tofu_data']['constants']['netflow_ports']['unifi'] }}

# Cribl-to-Cribl (S2S) listener for remote Edge nodes, fronted by HAProxy.
# Port from tofu constants (single source of truth).
cribl_stream_s2s_port: >-
  {{ hostvars['localhost']['tofu_data']['constants']['service_ports']['cribl_s2s'] }}

# Splunk HEC output configuration — FQDN, never an IP. HEC goes through
# the dedicated splunk-hec Traefik ingress on 443: the splunk.<zone> alias
# resolves to Traefik, which serves nothing on a raw 8088, so dialing
# <alias>:8088 black-holed every HEC POST (apps#588).
cribl_stream_splunk_host: >-
  splunk-hec.{{ lookup('env', 'PROXMOX_SUBDOMAIN')
  | mandatory('PROXMOX_SUBDOMAIN environment variable is required (Doppler)') }}
cribl_stream_splunk_hec_token: "{{ lookup('env', 'SPLUNK_HEC_TOKEN') }}"
# Per-index HEC (one index = one token). When HEC_NAMESPACE (Doppler) is set,
# single-index inputs send to a dedicated splunk_hec_<index> output whose token
# is derived as uuid5('splunk-hec-<index>', HEC_NAMESPACE) — identical to the
# Splunk side. Only netflow (in_ipfix) is single-index; the S2S input
# (in_cribl_s2s) fans one TCP stream into many indexes by datatype and stays
# on the shared legacy output. Since 4.12 a routes table COULD split it per
# index (the Edge otel input already fans out that way) — kept as-is here
# because the per-datatype token split is a separate migration.
cribl_stream_hec_namespace: "{{ lookup('env', 'HEC_NAMESPACE') | default('', true) }}"

# AI/LLM log routing from tofu constants (single source of truth): per source
# name — HAProxy-fronted TCP port plus the Splunk index/sourcetype the ai_stamp
# pipeline stamps. Guarded with default({}) so an inventory that predates
# ai_log_routing renders no AI inputs instead of failing.
cribl_stream_ai_log_routing: >-
  {{ hostvars['localhost']['tofu_data']['constants']['ai_log_routing']
     | default({}) }}

# Input type per AI source. Default is tcpjson (agent CLIs / serving hosts ship
# newline-delimited JSON over TCP). rsyslog senders (omfwd) speak RFC3164/5424,
# so their inputs must be syslog-type instead — override per name here.
cribl_stream_ai_input_types:
  homelab_llm: syslog
  openbao_audit: syslog

# Per-index HEC outputs to render: netflow (in_ipfix) plus every unique index
# named in ai_log_routing (claude/codex/gemini/openai/vscode/llm/openbao_audit
# with the current tofu constants) — derived, never hand-maintained.
cribl_stream_per_index_indexes: >-
  {{ (['netflow']
      + (cribl_stream_ai_log_routing.values() | map(attribute='index') | list))
     | unique | list }}
cribl_stream_splunk_hec_tls: true
cribl_stream_splunk_hec_tls_verify: false  # Self-signed cert in lab
# Single definition shared by the template and the drift check in tasks.
# No port: the splunk-hec ingress serves on the standard TLS entrypoint.
# Generic /services/collector, NOT /services/collector/event: the events-only
# endpoint silently discards metric payloads, which kept every metric index
# (host_metrics/netmon_metrics/unifi_metrics/llm_metrics) empty. The generic
# endpoint accepts event and metric payloads alike.
cribl_stream_splunk_hec_url: >-
  {{ 'https' if cribl_stream_splunk_hec_tls else 'http'
  }}://{{ cribl_stream_splunk_host }}/services/collector

# Persistent queue
cribl_stream_pq_enabled: true

# Prometheus remote_write receiver — port for the prometheus_rw HTTP input.
# Not in Terraform service_ports (internal-only; no Traefik/DNS needed).
cribl_stream_prometheus_rw_port: 9201
# API path Cribl listens on for Prometheus remote_write POST requests.
# Must match the path in prometheus_stack_remote_write_url (/api/v1/write).
cribl_stream_prometheus_rw_api_path: /api/v1/write
