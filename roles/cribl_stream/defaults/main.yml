---
# Cribl Stream native install role defaults

# Installation
cribl_stream_version: latest
cribl_stream_tarball_base: "https://cdn.cribl.io/dl"
# Upstream release URL. Cribl's CDN uses two different filename patterns:
#   - versioned release: https://cdn.cribl.io/dl/4.12.2/cribl-4.12.2-linux-x64.tgz
#   - rolling "latest":  https://cdn.cribl.io/dl/latest/cribl-linux-x64.tgz    (no version in filename)
# Group vars for the `cribl_stream_group` override this with a MinIO mirror URL
# because the cribl-stream containers have the `outbound-internal` firewall
# and cannot reach cdn.cribl.io directly.
cribl_stream_tarball_url: >-
  {{ cribl_stream_tarball_base }}/{{ cribl_stream_version }}/{{
  'cribl-linux-x64.tgz' if cribl_stream_version == 'latest'
  else 'cribl-' + cribl_stream_version + '-linux-x64.tgz' }}
cribl_stream_install_dir: /opt/cribl

# Service user
cribl_stream_user: cribl
cribl_stream_group: cribl

# Service configuration
cribl_stream_service_name: cribl
cribl_stream_service_state: started
cribl_stream_service_enabled: true

# NetFlow port from tofu constants
cribl_stream_netflow_port: >-
  {{ hostvars['localhost']['tofu_data']['constants']['netflow_ports']['unifi'] }}

# Cribl-to-Cribl (S2S) listener for remote Edge nodes, fronted by HAProxy.
# Port from tofu constants (single source of truth).
cribl_stream_s2s_port: >-
  {{ hostvars['localhost']['tofu_data']['constants']['service_ports']['cribl_s2s'] }}

# Splunk HEC output configuration — FQDN, never an IP (see cribl_edge
# defaults for rationale).
cribl_stream_splunk_host: >-
  splunk.{{ lookup('env', 'PROXMOX_SUBDOMAIN')
  | mandatory('PROXMOX_SUBDOMAIN environment variable is required (Doppler)') }}
cribl_stream_splunk_hec_port: >-
  {{ hostvars['localhost']['tofu_data']['constants']['service_ports']['splunk_hec'] }}
cribl_stream_splunk_hec_token: "{{ lookup('env', 'SPLUNK_HEC_TOKEN') }}"
cribl_stream_splunk_hec_tls: true
cribl_stream_splunk_hec_tls_verify: false  # Self-signed cert in lab
# Single definition shared by the template and the drift check in tasks.
cribl_stream_splunk_hec_url: >-
  {{ 'https' if cribl_stream_splunk_hec_tls else 'http'
  }}://{{ cribl_stream_splunk_host }}:{{ cribl_stream_splunk_hec_port
  }}/services/collector/event

# Persistent queue
cribl_stream_pq_enabled: true
