---
# servarr_wiring role defaults — idempotent cross-app API "self-wiring".
#
# Runs AFTER the download_vpn (Prowlarr + qBittorrent), sonarr, and radarr roles
# have installed their apps. It:
#   1. Sets a DETERMINISTIC API key in each app's config.xml (so cross-app
#      wiring keys are known before converge — never auto-generated).
#   2. Wires Prowlarr -> Sonarr/Radarr Applications (full sync).
#   3. Wires Sonarr/Radarr -> qBittorrent download client (on download-vpn).
#   4. Ensures root folders (/data/media/tv, /data/media/movies).
#   5. Ensures a default quality profile exists.
#
# All API config is idempotent (GET-then-POST/PUT). No bespoke scripts: this is
# ansible.builtin.uri, the same house pattern the download_vpn role uses for
# qBittorrent.

# --- Deterministic API keys (from SOPS env; never committed) -----------------
servarr_wiring_sonarr_api_key: "{{ lookup('env', 'SONARR_API_KEY') | default('', true) }}"
servarr_wiring_radarr_api_key: "{{ lookup('env', 'RADARR_API_KEY') | default('', true) }}"
servarr_wiring_prowlarr_api_key: "{{ lookup('env', 'PROWLARR_API_KEY') | default('', true) }}"

# --- App data dirs (config.xml lives here; match the app roles' -data dirs) ---
servarr_wiring_sonarr_data_dir: /var/lib/sonarr
servarr_wiring_radarr_data_dir: /var/lib/radarr
servarr_wiring_prowlarr_data_dir: /var/lib/prowlarr
servarr_wiring_sonarr_user: media
servarr_wiring_radarr_user: media
servarr_wiring_prowlarr_user: qbittorrent
servarr_wiring_group: media

# --- Endpoints (hostname:port). Hosts from inventory, ports from OpenTofu. ---
# Sonarr / Radarr are LAN-only LXCs; Prowlarr + qBittorrent live in download-vpn.
# Address resolution: prefer the per-guest `ip` field from the tofu
# inventory — under the dhcp-first rebuild that field IS the FQDN — and fall
# back to the static container_ip hostvar. NEVER a hardcoded IP and never a
# vmid-derived literal.
servarr_wiring_sonarr_host: >-
  {{ tofu_data.containers['sonarr'].ip
     | default(hostvars['sonarr'].container_ip)
     | default('127.0.0.1') }}
servarr_wiring_radarr_host: >-
  {{ tofu_data.containers['radarr'].ip
     | default(hostvars['radarr'].container_ip)
     | default('127.0.0.1') }}
servarr_wiring_prowlarr_host: >-
  {{ tofu_data.containers['download-vpn'].ip
     | default(hostvars['download-vpn'].container_ip)
     | default('127.0.0.1') }}
servarr_wiring_qbittorrent_host: >-
  {{ tofu_data.containers['download-vpn'].ip
     | default(hostvars['download-vpn'].container_ip)
     | default('127.0.0.1') }}

servarr_wiring_sonarr_port: "{{ tofu_data.constants.media_ports.sonarr_web }}"
servarr_wiring_radarr_port: "{{ tofu_data.constants.media_ports.radarr_web }}"
servarr_wiring_prowlarr_port: "{{ tofu_data.constants.media_ports.prowlarr_web }}"
servarr_wiring_qbittorrent_port: "{{ tofu_data.constants.media_ports.qbittorrent_web }}"

# qBittorrent WebUI auth (same SOPS secret the download_vpn role uses).
servarr_wiring_qbittorrent_username: admin
servarr_wiring_qbittorrent_password: "{{ lookup('env', 'QBITTORRENT_ADMIN_PASSWORD') | default('', true) }}"

# --- Wiring parameters -------------------------------------------------------
# Root folders inside the *arr LXCs — the TRaSH single-filesystem layout: one
# /data dataset bind-mounted into download-vpn, sonarr, radarr, and plex, so
# imports HARDLINK from /data/torrents/<category> into /data/media/<library>
# (zero-copy, atomic). The unified layout renames the old "shows" tree to "tv".
# Full organization is preserved — Sonarr builds Series (Year)/Season NN/ trees
# and Radarr builds Title (Year)/ trees inside the root folder automatically.
servarr_wiring_sonarr_root_folder: "/data/media/tv"
servarr_wiring_radarr_root_folder: "/data/media/movies"
# qBittorrent categories per app.
servarr_wiring_sonarr_category: "tv"
servarr_wiring_radarr_category: "movies"
# Prowlarr Application sync level: disabled | addOnly | fullSync.
servarr_wiring_sync_level: "fullSync"

# --- Seed criteria (Prowlarr → *arr → qBittorrent per-torrent share limits) --
# Pushed to each Prowlarr indexer's advanced fields. On grab, *arr translates
# them into per-torrent qBittorrent share limits, overriding the global floor
# for that torrent. Private indexers can be stricter than these defaults (set
# manually in the Prowlarr UI per private indexer, or add indexer-specific vars
# here). Caveat: Sonarr #5759 — API-pushed seed criteria may not always
# propagate; verify in *arr > Indexers > Edit > Advanced after converge.
servarr_wiring_seed_ratio: 2.0
servarr_wiring_seed_time_minutes: 4320

# --- Public Prowlarr indexers ------------------------------------------------
# Without at least one indexer, Prowlarr has nothing to sync and Sonarr/Radarr
# can never find releases. These are PUBLIC, non-Cloudflare trackers (no
# FlareSolverr needed). Names MUST match Prowlarr's indexer DEFINITION names
# exactly (Indexers -> Add Indexer). The Pirate Bay (general, apibay API) covers
# TV + movies; YTS adds a movie-focused source. Both are reachable without a
# Cloudflare solver. Add/remove freely — but Cloudflare-gated trackers (EZTV,
# 1337x, TorrentGalaxy, …) require FlareSolverr, which is out of scope; adding
# them here just logs a non-fatal warning at converge.
servarr_wiring_prowlarr_indexers:
  - "The Pirate Bay"
  - "YTS"
# Prowlarr app/sync profile applied to each indexer (1 = the default profile).
servarr_wiring_indexer_app_profile_id: 1

# --- Authentication (Sonarr/Radarr/Prowlarr v4 require a valid auth method) ---
# v4 refuses to serve the UI with AuthenticationMethod=None (it walls off the UI
# until a method is chosen). "External" delegates auth to the reverse proxy, and
# "DisabledForLocalAddresses" lets LAN requests through with no login prompt —
# satisfying the requirement while keeping local access friction-free, and
# forward-compatible with the planned Traefik ingress. Set to Forms/Basic for a
# built-in login instead.
servarr_wiring_auth_method: External
servarr_wiring_auth_required: DisabledForLocalAddresses

# --- Recycler bin (prevents immediate deletion on unmonitor/delete) -----------
# Path on the *arr LXC filesystem. Must be on the same volume as the root folder
# so moves are atomic (no cross-filesystem copy).
servarr_wiring_recycler_bin_path: "/data/media/.recycle"
# Days to keep items in the bin before auto-purge. 0 = keep forever.
servarr_wiring_recycler_bin_days: 14

# --- Minimum free space when importing (MB) -----------------------------------
# *arr's native min-free-space knob (qBittorrent has none): each PVR refuses to
# import when the destination volume has less than this free, so a runaway
# download burst pauses imports instead of filling /data to 0 bytes (which
# previously killed qBittorrent for days). 25600 MB = 25 GiB headroom.
servarr_wiring_min_free_space_mb: 25600

# --- Quality profile ----------------------------------------------------------
# Created once per app (POST if not present; existing profile left untouched on
# re-converge so manual UI tweaks survive). Delete in the *arr UI + re-run to reset.
servarr_wiring_quality_profile_name: "High Quality"
# Minimum resolution accepted (1080 = 1080p and above; 2160 = 4K only).
servarr_wiring_min_quality_resolution: 1080
# Quality at which *arr stops seeking upgrades. "Bluray-2160p" means: keep
# upgrading until a 4K BluRay is found, then stop. Override to "Bluray-1080p"
# to stop at 1080p BluRay and never auto-upgrade to 4K.
servarr_wiring_quality_cutoff_name: "Bluray-2160p"

# --- Test / orchestration toggle ---------------------------------------------
# When false (Molecule), the role only validates inputs and renders nothing
# live — there are no running *arr apps in CI. The live deploy leaves it true.
servarr_wiring_manage_services: true
