---
# Servarr API self-wiring orchestrator.
#
# Runs from a single coordinator host (the download_vpn LXC — it can reach every
# media app over the LAN). config.xml edits + service restarts are delegated to
# each app's own host; the cross-app API wiring hits each app's LAN endpoint.
#
# Idempotent throughout: config.xml keys are set with community.general.xml
# (no-op when already correct); every API object is GET-checked before POST.

# =============================================================================
# Preflight: deterministic API keys must be present
# =============================================================================

- name: Assert all Servarr API keys are set
  ansible.builtin.assert:
    that:
      - servarr_wiring_sonarr_api_key | length > 0
      - servarr_wiring_radarr_api_key | length > 0
      - servarr_wiring_prowlarr_api_key | length > 0
    fail_msg: >-
      SONARR_API_KEY / RADARR_API_KEY / PROWLARR_API_KEY must all be set.
      Generate each with `openssl rand -hex 16` (32 hex chars), add to SOPS
      (secrets.enc.yaml), and run under `sops exec-env`. Templating them means
      cross-app wiring keys are known before converge, not auto-generated.
    quiet: true

- name: Wire Servarr stack (live only)
  when: servarr_wiring_manage_services | bool
  block:
    # -------------------------------------------------------------------------
    # 1. Deterministic API keys into each app's config.xml (delegated per host)
    # -------------------------------------------------------------------------
    - name: Set deterministic API keys in config.xml
      ansible.builtin.include_tasks: api_keys.yml

    # -------------------------------------------------------------------------
    # 1a. Retire the two profiles previously managed by Configarr. Each task
    # migrates only matching legacy assignments before deleting the profile.
    # -------------------------------------------------------------------------
    - name: Retire the legacy Sonarr quality profile
      ansible.builtin.include_tasks: retire_quality_profile.yml
      vars:
        _quality_profile_app: sonarr
        _quality_profile_api_key: "{{ servarr_wiring_sonarr_api_key }}"
        _quality_profile_host: "{{ servarr_wiring_sonarr_host }}"
        _quality_profile_port: "{{ servarr_wiring_sonarr_port }}"
        _quality_profile_content_endpoint: series
        _quality_profile_native_name: "{{ servarr_wiring_sonarr_native_quality_profile }}"
        _quality_profile_legacy_name: "{{ servarr_wiring_sonarr_legacy_quality_profile }}"

    - name: Retire the legacy Radarr quality profile
      ansible.builtin.include_tasks: retire_quality_profile.yml
      vars:
        _quality_profile_app: radarr
        _quality_profile_api_key: "{{ servarr_wiring_radarr_api_key }}"
        _quality_profile_host: "{{ servarr_wiring_radarr_host }}"
        _quality_profile_port: "{{ servarr_wiring_radarr_port }}"
        _quality_profile_content_endpoint: movie
        _quality_profile_native_name: "{{ servarr_wiring_radarr_native_quality_profile }}"
        _quality_profile_legacy_name: "{{ servarr_wiring_radarr_legacy_quality_profile }}"

    # -------------------------------------------------------------------------
    # 2a. FlareSolverr indexer proxy + tag (so CF indexers can be routed)
    # -------------------------------------------------------------------------
    - name: Wire the FlareSolverr indexer proxy
      ansible.builtin.include_tasks: prowlarr_proxies.yml
      when: servarr_wiring_flaresolverr_enabled | bool

    # -------------------------------------------------------------------------
    # 2b. Public + CF-gated indexers into Prowlarr (Application full-sync content)
    # -------------------------------------------------------------------------
    - name: Add indexers to Prowlarr
      ansible.builtin.include_tasks: prowlarr_indexers.yml

    # -------------------------------------------------------------------------
    # 3. Prowlarr -> Sonarr/Radarr Applications (full sync)
    # -------------------------------------------------------------------------
    - name: Wire Prowlarr applications (Sonarr + Radarr)
      ansible.builtin.include_tasks: prowlarr_apps.yml

    # -------------------------------------------------------------------------
    # 4. Media management: copyUsingHardlinks + recycler bin
    # -------------------------------------------------------------------------
    - name: Apply media management settings for Sonarr
      ansible.builtin.include_tasks: media_management.yml
      vars:
        _arr_name: sonarr
        _arr_host: "{{ servarr_wiring_sonarr_host }}"
        _arr_port: "{{ servarr_wiring_sonarr_port }}"
        _arr_api_key: "{{ servarr_wiring_sonarr_api_key }}"

    - name: Apply media management settings for Radarr
      ansible.builtin.include_tasks: media_management.yml
      vars:
        _arr_name: radarr
        _arr_host: "{{ servarr_wiring_radarr_host }}"
        _arr_port: "{{ servarr_wiring_radarr_port }}"
        _arr_api_key: "{{ servarr_wiring_radarr_api_key }}"
