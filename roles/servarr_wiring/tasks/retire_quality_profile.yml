---
# One-time retirement of the profiles previously created by Configarr. Only
# items on the named legacy profile are migrated; explicit user selections,
# including higher-resolution profiles, remain untouched.

- name: Get quality profiles for retirement - {{ _quality_profile_app }}
  ansible.builtin.uri:
    url: "http://{{ _quality_profile_host }}:{{ _quality_profile_port }}/api/v3/qualityprofile"
    method: GET
    headers:
      X-Api-Key: "{{ _quality_profile_api_key }}"
    status_code: 200
  register: servarr_wiring_retire_profiles
  changed_when: false
  no_log: true

- name: Resolve native and legacy profiles for {{ _quality_profile_app }}
  ansible.builtin.set_fact:
    servarr_wiring_retire_native_profile: >-
      {{ (servarr_wiring_retire_profiles.json
          | selectattr('name', 'equalto', _quality_profile_native_name)
          | list | first) | default({}, true) }}
    servarr_wiring_retire_legacy_profile: >-
      {{ (servarr_wiring_retire_profiles.json
          | selectattr('name', 'equalto', _quality_profile_legacy_name)
          | list | first) | default({}, true) }}
  no_log: true

- name: Require native profile before migration - {{ _quality_profile_app }}
  ansible.builtin.assert:
    that:
      - servarr_wiring_retire_native_profile.id | default(0) | int > 0
    fail_msg: >-
      {{ _quality_profile_app }} does not expose the required native quality
      profile {{ _quality_profile_native_name }}; refusing to migrate or remove
      {{ _quality_profile_legacy_name }}.
    quiet: true
  when: servarr_wiring_retire_legacy_profile != {}

- name: List items before profile retirement - {{ _quality_profile_app }}
  ansible.builtin.uri:
    url: "http://{{ _quality_profile_host }}:{{ _quality_profile_port }}/api/v3/{{ _quality_profile_content_endpoint }}"
    method: GET
    headers:
      X-Api-Key: "{{ _quality_profile_api_key }}"
    status_code: 200
  register: servarr_wiring_retire_items
  changed_when: false
  no_log: true
  when: servarr_wiring_retire_legacy_profile != {}

- name: Migrate legacy-profile items to native HD for {{ _quality_profile_app }}
  ansible.builtin.uri:
    url: >-
      http://{{ _quality_profile_host }}:{{ _quality_profile_port }}/api/v3/{{
      _quality_profile_content_endpoint }}/{{ item.id }}
    method: PUT
    headers:
      X-Api-Key: "{{ _quality_profile_api_key }}"
    body_format: json
    body: >-
      {{ item | combine({'qualityProfileId':
         servarr_wiring_retire_native_profile.id | int}) }}
    status_code: [200, 202]
  loop: >-
    {{ servarr_wiring_retire_items.json
       | selectattr('qualityProfileId', 'equalto', servarr_wiring_retire_legacy_profile.id)
       | list }}
  loop_control:
    label: "{{ item.title | default(item.id) }}"
  no_log: true
  when: servarr_wiring_retire_legacy_profile != {}

- name: Re-read items after profile migration - {{ _quality_profile_app }}
  ansible.builtin.uri:
    url: "http://{{ _quality_profile_host }}:{{ _quality_profile_port }}/api/v3/{{ _quality_profile_content_endpoint }}"
    method: GET
    headers:
      X-Api-Key: "{{ _quality_profile_api_key }}"
    status_code: 200
  register: servarr_wiring_retire_items_after
  changed_when: false
  no_log: true
  when: servarr_wiring_retire_legacy_profile != {}

- name: Require migrated legacy assignments for {{ _quality_profile_app }}
  ansible.builtin.assert:
    that:
      - >-
        (servarr_wiring_retire_items_after.json
         | selectattr('qualityProfileId', 'equalto', servarr_wiring_retire_legacy_profile.id)
         | list | length) == 0
    fail_msg: >-
      {{ _quality_profile_app }} still has items assigned to
      {{ _quality_profile_legacy_name }}; refusing to delete that profile.
    quiet: true
  when: servarr_wiring_retire_legacy_profile != {}

- name: Delete retired quality profile for {{ _quality_profile_app }}
  ansible.builtin.uri:
    url: >-
      http://{{ _quality_profile_host }}:{{ _quality_profile_port }}/api/v3/
      qualityprofile/{{ servarr_wiring_retire_legacy_profile.id }}
    method: DELETE
    headers:
      X-Api-Key: "{{ _quality_profile_api_key }}"
    status_code: [200, 204]
  no_log: true
  when: servarr_wiring_retire_legacy_profile != {}
