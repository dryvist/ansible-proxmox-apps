---
# PR-time validation for the github_runner image. The fleet's runner image
# was historically only tested by converging production (see #1248); this
# catches package breaks, missing toolchain, and stale runner binaries at
# review time instead.

name: Runner Image

on:
  pull_request:
    paths:
      - roles/github_runner/files/**
      - requirements.yml
      - .github/workflows/runner-image.yml
      - .github/scripts/runner-image-smoke.sh

permissions:
  contents: read

jobs:
  build-smoke:
    name: Build & Smoke Test
    # Hosted runner on purpose: must stay buildable when the fleet is down —
    # rebuilding the fleet's own image is exactly the recovery path.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Build and smoke-test runner image
        run: .github/scripts/runner-image-smoke.sh
