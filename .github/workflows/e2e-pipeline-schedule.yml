---
# Frequent E2E pipeline validation (syslog sources -> HAProxy -> Cribl -> Splunk).
#
# Runs the existing reusable `_e2e-tests.yml` against the live cluster.
# Triggered by:
#   - every 4 hours
#   - manual workflow_dispatch
#
# Gated by repo variable `E2E_RUNNERS_ENABLED == 'true'` (same gate the
# PR-driven path uses in `ci-gate.yml`). When the gate is off, the run
# FAILS loudly: a silently-skipped schedule reported "success" for months
# while live pipeline regressions went unnoticed. Disable this schedule
# intentionally if E2E coverage is meant to be off.
#
# Closes terraform-proxmox#202 (Splunk cluster validation tests).

name: E2E Pipeline Schedule

on:
  schedule:
    - cron: '23 */4 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-pipeline-schedule
  cancel-in-progress: false

jobs:
  gate-check:
    name: Check E2E gate
    runs-on: ubuntu-latest
    steps:
      - name: Fail when E2E_RUNNERS_ENABLED is not true
        if: vars.E2E_RUNNERS_ENABLED != 'true'
        env:
          GATE_MESSAGE: >-
            E2E_RUNNERS_ENABLED is not 'true' -- scheduled E2E coverage is
            OFF and live regressions are invisible. Set the repo variable to
            re-enable, or disable this schedule intentionally.
        run: |
          echo "::error::${GATE_MESSAGE}"
          exit 1

  e2e:
    name: Run pipeline E2E tests
    needs: gate-check
    uses: ./.github/workflows/_e2e-tests.yml
