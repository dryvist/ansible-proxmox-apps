---
name: CI Fail Issue

on:
  workflow_run:
    workflows: ["Ansible Lint"]
    types: [completed]
    branches: [main]

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  handle-failure:
    if: github.event.workflow_run.conclusion == 'failure'
    uses: dryvist/ai-workflows/.github/workflows/ci-fail-issue.yml@main
    with:
      workflow_name: "Ansible Lint"
    secrets: inherit
