[defaults]
inventory = inventory/hosts.yml
roles_path = roles
# Host identities are verified against the reviewed pinned known_hosts that
# scripts/run-ansible.sh materializes from SSH_KNOWN_HOSTS (Doppler). A rebuilt
# guest fails closed until re-harvested. LXC converges use pct, not SSH.
host_key_checking = True
deprecation_warnings = True
retry_files_enabled = False
forks = 5
timeout = 30
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 3600
# NOTE: allow_world_readable_tmpfiles = True is disabled for security
# If plugins fail due to permission issues, investigate root cause rather than
# globally disabling file permissions. This setting exposes sensitive data in tmp files.
# allow_world_readable_tmpfiles = True

[inventory]
enable_plugins = yaml

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s

[proxmox_pct_remote_connection]
pipelining = False
