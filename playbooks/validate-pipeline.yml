---
# Logging Pipeline Validation Playbook
# Validates connectivity, service health, and data flow across the pipeline
#
# Production pipeline uses native Cribl on LXC containers:
#   - Cribl Edge (cribl_edge group): syslog processing
#   - Cribl Stream (cribl_stream_group): netflow/IPFIX processing
#   - HAProxy (haproxy_group): load balancing to Cribl LXCs
#   - Splunk (splunk_vms): search head and indexer
#
# Usage:
#   doppler run -- uv run ansible-playbook \
#     -i inventory/hosts.yml playbooks/validate-pipeline.yml
#
# Check mode (--check): validation plays are read-only and always run for
# real (check_mode: false). E2E plays inject test data, so they end early
# under --check instead of reporting misleading results.

- name: Import OpenTofu infrastructure inventory
  import_playbook: ../inventory/load_tofu.yml

- name: Validate HAProxy Load Balancer
  hosts: haproxy_group
  become: true
  gather_facts: false
  # Read-only validation — run for real even under --check
  check_mode: false
  tags:
    - haproxy
    - validation

  vars:
    constants: "{{ hostvars['localhost']['tofu_data']['constants'] }}"
    # Standard app-facing frontends (constants.syslog_port_map.*.standard,
    # exported by terraform-proxmox) plus high backend ports
    # (constants.syslog_ports). The default({}) keeps this working against
    # inventories generated before syslog_port_map existed.
    haproxy_syslog_check_ports: >-
      {{ ((constants.syslog_ports.values() | list)
          + (constants.syslog_port_map | default({}) | dict2items
             | map(attribute='value.standard') | list))
         | map('int') | unique | sort }}

  tasks:
    - name: Gather service facts for HAProxy validation
      ansible.builtin.service_facts:

    - name: Assert HAProxy service is running
      ansible.builtin.assert:
        that:
          - >-
            ansible_facts.services['haproxy.service'] is defined
          - >-
            ansible_facts.services['haproxy.service'].state == 'running'
        fail_msg: >-
          HAProxy service is not running
        quiet: true

    - name: Check HAProxy configuration validity
      ansible.builtin.command:
        cmd: haproxy -c -f /etc/haproxy/haproxy.cfg
      register: haproxy_config_check
      changed_when: false
      failed_when: haproxy_config_check.rc != 0

    - name: Verify syslog TCP ports are listening
      ansible.builtin.wait_for:
        port: "{{ item }}"
        timeout: 5
      loop: "{{ haproxy_syslog_check_ports }}"

    - name: Capture UDP listeners
      ansible.builtin.command:
        cmd: ss -ulnp
      register: haproxy_udp_listeners
      changed_when: false

    - name: Verify syslog UDP ports are listening
      ansible.builtin.assert:
        that:
          - "(':' ~ item ~ ' ') in haproxy_udp_listeners.stdout"
        fail_msg: >-
          UDP syslog port {{ item }} is not listening on HAProxy
        quiet: true
      loop: "{{ haproxy_syslog_check_ports }}"

    - name: Verify netflow UDP port is listening
      ansible.builtin.assert:
        that:
          - "(':' ~ constants.netflow_ports.unifi ~ ' ') in haproxy_udp_listeners.stdout"
        fail_msg: >-
          NetFlow UDP port {{ constants.netflow_ports.unifi }} is not
          listening on HAProxy
        quiet: true

    - name: Verify stats page is accessible
      ansible.builtin.wait_for:
        port: "{{ constants.service_ports.haproxy_stats }}"
        timeout: 5

    - name: Get HAProxy backend status via stats socket
      ansible.builtin.command:
        cmd: >-
          socat - UNIX-CONNECT:/run/haproxy/admin.sock
        stdin: "show servers state\n"
      register: haproxy_backend
      changed_when: false
      failed_when: false

    - name: Display HAProxy validation results
      ansible.builtin.debug:
        msg: |
          HAProxy validation passed: config valid, all ports listening
          Backend status:
          {{ haproxy_backend.stdout | default('Socket not available') }}

- name: Validate Cribl Edge LXC Containers
  hosts: cribl_edge
  become: true
  gather_facts: false
  # Read-only validation — run for real even under --check
  check_mode: false
  tags:
    - cribl_edge
    - validation

  vars:
    constants: "{{ hostvars['localhost']['tofu_data']['constants'] }}"
    # Edge receives backend/high syslog ports from HAProxy. The app-facing
    # standard ports live on HAProxy, not on Cribl Edge.
    cribl_edge_syslog_check_ports: >-
      {{ ((constants.syslog_port_map | default({}) | dict2items
           | map(attribute='value.high') | list)
          if ((constants.syslog_port_map | default({})) | length > 0)
          else (constants.syslog_ports | default({}) | dict2items
                | rejectattr('key', 'equalto', 'default')
                | map(attribute='value') | list))
         | map('int') | unique | sort }}

  tasks:
    - name: Gather service facts for Cribl Edge validation
      ansible.builtin.service_facts:

    - name: Assert Cribl Edge service is running
      # `cribl boot-start enable` after `cribl mode-edge` creates the unit
      # as `cribl-edge.service`, not `cribl.service`. Must match the role
      # default `cribl_edge_service_name: cribl-edge` (fixed in PR #175).
      ansible.builtin.assert:
        that:
          - >-
            ansible_facts.services['cribl-edge.service'] is defined
          - >-
            ansible_facts.services['cribl-edge.service'].state == 'running'
        fail_msg: >-
          Cribl Edge service is not running on {{ inventory_hostname }}
        quiet: true

    - name: Verify Cribl Edge API health endpoint
      ansible.builtin.uri:
        url: >-
          http://127.0.0.1:{{ constants.service_ports.cribl_edge_api
          }}/api/v1/health
        method: GET
        return_content: true
        status_code: 200
      register: edge_health

    - name: Verify syslog ports are listening on Cribl Edge
      ansible.builtin.wait_for:
        port: "{{ item }}"
        timeout: 5
      loop: "{{ cribl_edge_syslog_check_ports }}"

    - name: Check Cribl Edge config directory exists
      # Edge mode (`cribl mode-edge`) loads config from local/edge/, not
      # local/cribl/ — must match where roles/cribl_edge deploys.
      ansible.builtin.stat:
        path: /opt/cribl/local/edge
      register: cribl_edge_config_dir

    - name: Fail if Cribl Edge config directory is missing
      ansible.builtin.fail:
        msg: >-
          Cribl Edge config directory /opt/cribl/local/edge not found
          on {{ inventory_hostname }}
      when: not cribl_edge_config_dir.stat.exists

    - name: Display Cribl Edge validation results
      ansible.builtin.debug:
        msg: |
          Cribl Edge validation passed on {{ inventory_hostname }}:
          - Service: running
          - Health API: {{ edge_health.status }}
          - Syslog backend ports: {{ cribl_edge_syslog_check_ports | join(', ') }}
          - Config dir: present

- name: Validate Cribl Stream LXC Containers
  hosts: cribl_stream_group
  become: true
  gather_facts: false
  # Read-only validation — run for real even under --check
  check_mode: false
  tags:
    - cribl_stream
    - validation

  vars:
    constants: "{{ hostvars['localhost']['tofu_data']['constants'] }}"

  tasks:
    - name: Gather service facts for Cribl Stream validation
      ansible.builtin.service_facts:

    - name: Assert Cribl Stream service is running
      ansible.builtin.assert:
        that:
          - >-
            ansible_facts.services['cribl.service'] is defined
          - >-
            ansible_facts.services['cribl.service'].state == 'running'
        fail_msg: >-
          Cribl Stream service is not running on {{ inventory_hostname }}
        quiet: true

    - name: Verify Cribl Stream API health endpoint
      ansible.builtin.uri:
        url: >-
          http://127.0.0.1:{{ constants.service_ports.cribl_stream_api
          }}/api/v1/health
        method: GET
        return_content: true
        status_code: 200
      register: stream_health

    - name: Verify netflow UDP port is listening on Cribl Stream
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          ss -ulnp | grep ':{{ constants.netflow_ports.unifi }}'
        executable: /bin/bash
      register: stream_netflow_udp
      changed_when: false
      failed_when: stream_netflow_udp.rc != 0

    - name: Check Cribl Stream config directory exists
      # Stream runs in single-instance mode and reads local/cribl/ —
      # unlike Edge, which reads local/edge/.
      ansible.builtin.stat:
        path: /opt/cribl/local/cribl
      register: cribl_stream_config_dir

    - name: Fail if Cribl Stream config directory is missing
      ansible.builtin.fail:
        msg: >-
          Cribl Stream config directory /opt/cribl/local/cribl not found
          on {{ inventory_hostname }}
      when: not cribl_stream_config_dir.stat.exists

    - name: Display Cribl Stream validation results
      ansible.builtin.debug:
        msg: |
          Cribl Stream validation passed on {{ inventory_hostname }}:
          - Service: running
          - Health API: {{ stream_health.status }}
          - NetFlow port {{ constants.netflow_ports.unifi }}: listening
          - Config dir: present

- name: Validate Cribl Edge Metrics
  hosts: cribl_edge
  become: true
  gather_facts: false
  # Read-only validation — run for real even under --check
  check_mode: false
  tags:
    - cribl_edge_metrics
    - validation

  vars:
    constants: "{{ hostvars['localhost']['tofu_data']['constants'] }}"
    cribl_edge_metrics_api_token: >-
      {{ lookup('env', 'CRIBL_EDGE_API_TOKEN') | default('', true) }}

  tasks:
    - name: Check Cribl Edge metrics API with configured token
      ansible.builtin.uri:
        url: >-
          http://127.0.0.1:{{ constants.service_ports.cribl_edge_api
          }}/api/v1/system/metrics
        method: GET
        headers: "{{
          {'Authorization': 'Bearer ' + cribl_edge_metrics_api_token}
          if cribl_edge_metrics_api_token | length > 0
          else omit
          }}"
        status_code:
          - 200
      register: cribl_metrics
      failed_when: cribl_metrics.status != 200
      changed_when: false
      when: cribl_edge_metrics_api_token | length > 0

    - name: Display Cribl Edge metrics validation result
      ansible.builtin.debug:
        msg: |
          Cribl Edge metrics check passed on {{ inventory_hostname }}: API responded with 200
          (auth token used: true)
          status: {{ cribl_metrics.status }}
      when: cribl_edge_metrics_api_token | length > 0

    - name: Display Cribl Edge metrics skip reason
      ansible.builtin.debug:
        msg: |
          Cribl Edge private metrics check skipped on {{ inventory_hostname }}:
          CRIBL_EDGE_API_TOKEN is not set. Service health, API reachability,
          syslog listeners, and data-flow tests still validate this Edge node.
      when: cribl_edge_metrics_api_token | length == 0

- name: E2E Data Pipeline Validation (Syslog via Cribl Edge)
  hosts: cribl_edge[0]
  become: true
  gather_facts: true
  tags:
    - e2e
    - data_validation

  vars:
    constants: "{{ hostvars['localhost']['tofu_data']['constants'] }}"
    # Generate unique test event ID using epoch timestamp
    e2e_test_event_id: "E2E_VALIDATION_{{ ansible_date_time.epoch }}"
    # Splunk connection details — FQDN, never an IP (resolves from the
    # pipeline VLAN; the uri tasks execute on the Edge LXC)
    splunk_host: "splunk.{{ lookup('env', 'PROXMOX_SUBDOMAIN') }}"
    splunk_port: "{{ constants.service_ports.splunk_mgmt }}"
    splunk_user: admin
    # SPLUNK_PASSWORD must be set via Doppler
    splunk_password: "{{ lookup('env', 'SPLUNK_PASSWORD') }}"

  tasks:
    - name: Skip E2E data injection in check mode
      ansible.builtin.meta: end_play
      when: ansible_check_mode

    - name: Verify SPLUNK_PASSWORD is set
      ansible.builtin.assert:
        that:
          - splunk_password | length > 0
        fail_msg: >-
          SPLUNK_PASSWORD environment variable must be set.
          Run with doppler run --
        quiet: true

    - name: Install netcat for syslog testing
      ansible.builtin.apt:
        name: netcat-openbsd
        state: present
        update_cache: true

    - name: Send per-family test syslog messages through pipeline
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          echo "<14>{{ ansible_date_time.iso8601 }} ansible-e2e-test: \
          {{ e2e_test_event_id }}-{{ item.key }}" | \
          nc -u -w1 localhost {{ item.value.high }}
        executable: /bin/bash
      changed_when: false
      loop: "{{ constants.syslog_port_map | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Wait for events to propagate through pipeline
      ansible.builtin.pause:
        seconds: 10
        prompt: >-
          Waiting for test events to propagate through Cribl Edge to Splunk...

    # Pipeline latency assertion: poll up to 120 seconds per family
    # (retries: 12, delay: 10). Each family must land in ITS index with ITS
    # sourcetype — the routing contract from constants.syslog_port_map.
    - name: Query Splunk for each family event in its index (120s timeout each)
      ansible.builtin.uri:
        url: >-
          https://{{ splunk_host }}:{{ splunk_port
          }}/services/search/jobs
        method: POST
        user: "{{ splunk_user }}"
        password: "{{ splunk_password }}"
        force_basic_auth: true
        validate_certs: false
        body_format: form-urlencoded
        body:
          search: >-
            search index={{ item.value.index }}
            sourcetype="{{ item.value.sourcetype }}"
            "{{ e2e_test_event_id }}-{{ item.key }}" | head 1
          output_mode: json
          exec_mode: oneshot
      register: splunk_family_result
      retries: 12
      delay: 10
      until: >-
        splunk_family_result.status == 200 and
        (splunk_family_result.json.results | default([]) | length > 0)
      failed_when: >-
        splunk_family_result.status != 200 or
        (splunk_family_result.json.results | default([]) | length == 0)
      loop: "{{ constants.syslog_port_map | dict2items }}"
      loop_control:
        label: "{{ item.key }} -> index={{ item.value.index }}"

    - name: E2E Data Pipeline PASSED
      ansible.builtin.debug:
        msg: |
          === E2E DATA PIPELINE VALIDATION PASSED ===
          One event per source family sent to its Cribl Edge backend port
          Event ID prefix: {{ e2e_test_event_id }}
          Splunk host: {{ splunk_host }}
          Families verified: {{ constants.syslog_port_map.keys() | list | join(', ') }}
          Full pipeline verified: Source -> Cribl Edge LXC -> Splunk HEC -> per-family index

- name: E2E Validation via HAProxy (full path)
  hosts: cribl_edge[0]
  become: true
  gather_facts: true
  tags:
    - e2e
    - haproxy
    - data_validation

  vars:
    constants: "{{ hostvars['localhost']['tofu_data']['constants'] }}"
    # Generate unique test event ID using epoch timestamp
    e2e_test_event_id: "E2E_HAPROXY_{{ ansible_date_time.epoch }}"
    # Splunk connection details (no hardcoded fallback)
    # FQDN, never an IP — both names resolve from the pipeline VLAN where
    # these tasks execute. syslog.<subdomain> is the stable client-facing
    # entry point for the HAProxy syslog frontends.
    splunk_host: "splunk.{{ lookup('env', 'PROXMOX_SUBDOMAIN') }}"
    syslog_entrypoint: "syslog.{{ lookup('env', 'PROXMOX_SUBDOMAIN') }}"
    splunk_port: "{{ constants.service_ports.splunk_mgmt }}"
    splunk_user: admin
    # SPLUNK_PASSWORD must be set via Doppler
    splunk_password: "{{ lookup('env', 'SPLUNK_PASSWORD') }}"

  tasks:
    - name: Skip E2E data injection in check mode
      ansible.builtin.meta: end_play
      when: ansible_check_mode

    - name: Verify SPLUNK_PASSWORD is set
      ansible.builtin.assert:
        that:
          - splunk_password | length > 0
        fail_msg: >-
          SPLUNK_PASSWORD environment variable must be set.
          Run with doppler run --
        quiet: true

    - name: Install netcat for syslog testing
      ansible.builtin.apt:
        name: netcat-openbsd
        state: present
        update_cache: true

    - name: Send per-family test syslog messages through HAProxy standard frontends
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          echo "<14>{{ ansible_date_time.iso8601 }} ansible-e2e-haproxy-test: \
          {{ e2e_test_event_id }}-{{ item.key }}" | \
          nc -u -w1 {{ syslog_entrypoint }} {{ item.value.standard }}
        executable: /bin/bash
      changed_when: false
      loop: "{{ constants.syslog_port_map | dict2items }}"
      loop_control:
        label: "{{ item.key }} -> :{{ item.value.standard }}"

    - name: Wait for events to propagate through pipeline
      ansible.builtin.pause:
        seconds: 10
        prompt: >-
          Waiting for test events to propagate through HAProxy -> Cribl Edge -> Splunk...

    # Pipeline latency assertion: poll up to 120 seconds per family
    # (retries: 12, delay: 10) — each family in ITS index with ITS sourcetype.
    - name: Query Splunk for each HAProxy family event in its index (120s timeout each)
      ansible.builtin.uri:
        url: >-
          https://{{ splunk_host }}:{{ splunk_port
          }}/services/search/jobs
        method: POST
        user: "{{ splunk_user }}"
        password: "{{ splunk_password }}"
        force_basic_auth: true
        validate_certs: false
        body_format: form-urlencoded
        body:
          search: >-
            search index={{ item.value.index }}
            sourcetype="{{ item.value.sourcetype }}"
            "{{ e2e_test_event_id }}-{{ item.key }}" | head 1
          output_mode: json
          exec_mode: oneshot
      register: splunk_haproxy_result
      retries: 12
      delay: 10
      until: >-
        splunk_haproxy_result.status == 200 and
        (splunk_haproxy_result.json.results | default([]) | length > 0)
      failed_when: >-
        splunk_haproxy_result.status != 200 or
        (splunk_haproxy_result.json.results | default([]) | length == 0)
      loop: "{{ constants.syslog_port_map | dict2items }}"
      loop_control:
        label: "{{ item.key }} -> index={{ item.value.index }}"

    - name: E2E HAProxy Data Pipeline PASSED
      ansible.builtin.debug:
        msg: |
          === E2E HAPROXY PIPELINE VALIDATION PASSED ===
          One event per source family sent to {{ syslog_entrypoint }} standard frontends
          Event ID prefix: {{ e2e_test_event_id }}
          Splunk host: {{ splunk_host }}
          Families verified: {{ constants.syslog_port_map.keys() | list | join(', ') }}
          Full path verified: Source -> HAProxy -> Cribl Edge LXC -> Splunk HEC -> per-family index

- name: Validate NetFlow Port
  hosts: cribl_stream_group[0]
  become: true
  gather_facts: true
  tags:
    - netflow
    - validation

  vars:
    constants: "{{ hostvars['localhost']['tofu_data']['constants'] }}"
    # Splunk connection — FQDN, never an IP (resolves from the pipeline VLAN)
    splunk_host: "splunk.{{ lookup('env', 'PROXMOX_SUBDOMAIN') }}"
    splunk_port: "{{ constants.service_ports.splunk_mgmt }}"
    splunk_user: admin
    # SPLUNK_PASSWORD must be set via Doppler
    splunk_password: "{{ lookup('env', 'SPLUNK_PASSWORD') }}"

  tasks:
    - name: Skip E2E data injection in check mode
      ansible.builtin.meta: end_play
      when: ansible_check_mode

    - name: Verify SPLUNK_PASSWORD is set
      ansible.builtin.assert:
        that:
          - splunk_password | length > 0
        fail_msg: >-
          SPLUNK_PASSWORD environment variable must be set.
          Run with doppler run --
        quiet: true

    - name: Check netflow UDP port is listening
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          ss -ulnp | grep ':{{ constants.netflow_ports.unifi }}'
        executable: /bin/bash
      register: netflow_port_check
      failed_when: netflow_port_check.rc != 0
      changed_when: false

    - name: Generate unique sentinel port for NetFlow test correlation
      ansible.builtin.set_fact:
        netflow_sentinel_port: "{{ 40000 + (ansible_date_time.epoch | int % 25000) }}"

    - name: Send minimal NetFlow v5 test packet
      ansible.builtin.shell:
        cmd: |
          python3 -c "
          import socket, struct, time

          # NetFlow v5 header: version=5, count=1, uptime=0
          # epoch, nanosec, flow_seq=1, engine=0, sampling=0
          epoch = int(time.time())
          header = struct.pack('!HHIIIIBBH',
              5,       # version
              1,       # count (1 flow record)
              0,       # sys_uptime_ms
              epoch,   # unix_secs
              0,       # unix_nsecs
              1,       # flow_sequence
              0,       # engine_type + engine_id (packed as one byte each below)
              0,       # engine_id
              0        # sampling_interval
          )

          # NetFlow v5 flow record (48 bytes): minimal valid record
          # Uses sentinel src_port for test correlation in Splunk
          record = struct.pack('!IIIHHIIIIHHBBBBHHBBH',
              0x0A000001,  # src_addr 10.0.0.1
              0x0A000002,  # dst_addr 10.0.0.2
              0,           # next_hop
              0,           # snmp_input
              0,           # snmp_output
              1,           # packets
              64,          # octets
              0,           # first_switched
              0,           # last_switched
              {{ netflow_sentinel_port }},  # src_port (sentinel)
              80,          # dst_port
              0,           # pad1
              6,           # tcp_flags
              6,           # protocol (TCP)
              0,           # tos
              0,           # src_as
              0,           # dst_as
              0,           # src_mask
              0,           # dst_mask
              0            # pad2
          )

          sock = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
          sock.sendto(header + record, ('127.0.0.1', {{ constants.netflow_ports.unifi }}))
          sock.close()
          print('NetFlow v5 test packet sent with sentinel src_port={{ netflow_sentinel_port }}')
          "
        executable: /bin/bash
      changed_when: false

    - name: Wait for NetFlow event to propagate through pipeline
      ansible.builtin.pause:
        seconds: 10
        prompt: >-
          Waiting for NetFlow test event to propagate through Cribl Stream to Splunk...

    # Pipeline latency assertion: poll up to 120 seconds (retries: 12, delay: 10)
    # The loop fails the play if the event does not appear within 120 seconds.
    - name: Query Splunk for NetFlow event in network index (pipeline latency assertion, 120s timeout)
      ansible.builtin.uri:
        url: >-
          https://{{ splunk_host }}:{{ splunk_port
          }}/services/search/jobs
        method: POST
        user: "{{ splunk_user }}"
        password: "{{ splunk_password }}"
        force_basic_auth: true
        validate_certs: false
        body_format: form-urlencoded
        body:
          # Cribl's netflow input emits camelCase srcPort (preserved by
          # Splunk's JSON auto-extraction) — src_port never matches.
          search: 'search index=network earliest=-5m srcPort={{ netflow_sentinel_port }} | head 1'
          output_mode: json
          exec_mode: oneshot
      register: splunk_netflow_result
      retries: 12
      delay: 10
      until: >-
        splunk_netflow_result.status == 200 and
        (splunk_netflow_result.json.results | default([]) | length > 0)
      failed_when: >-
        splunk_netflow_result.status != 200 or
        (splunk_netflow_result.json.results | default([]) | length == 0)

    - name: Display NetFlow validation result
      ansible.builtin.debug:
        msg: |
          === NETFLOW VALIDATION PASSED ===
          NetFlow port {{ constants.netflow_ports.unifi }} UDP is listening
          {{ netflow_port_check.stdout }}
          NetFlow v5 test packet sent and event found in Splunk
          Splunk host: {{ splunk_host }}
          Search results (index=network): {{ splunk_netflow_result.json.results | length }} event(s) found
          Full path verified: NetFlow source -> Cribl Stream LXC -> Splunk HEC -> Splunk Index (network)

- name: Validate Qdrant Vector Database
  hosts: qdrant_group
  become: true
  gather_facts: false
  # Read-only validation — run for real even under --check
  check_mode: false
  tags:
    - qdrant
    - validation

  tasks:
    - name: Load tofu data for Qdrant validation
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../inventory/tofu_inventory.json"
        name: tofu_data
      delegate_to: localhost
      run_once: true

    - name: Gather service facts for Qdrant validation
      ansible.builtin.service_facts:

    - name: Assert Docker service is running
      ansible.builtin.assert:
        that:
          - >-
            ansible_facts.services['docker.service'] is defined
          - >-
            ansible_facts.services['docker.service'].state == 'running'
        fail_msg: >-
          Docker service is not running on {{ inventory_hostname }}
        quiet: true

    - name: Verify qdrant container is running
      ansible.builtin.command:
        cmd: docker ps --filter name=qdrant --filter status=running --format {% raw %}"{{ .Names }}"{% endraw %}
      register: qdrant_container_check
      changed_when: false
      failed_when: "'qdrant' not in qdrant_container_check.stdout"

    - name: Set Qdrant port facts
      ansible.builtin.set_fact:
        _qdrant_http_port: >-
          {{ hostvars['localhost']['tofu_data']['constants']['vector_db_ports']['qdrant_http'] }}
        _qdrant_grpc_port: >-
          {{ hostvars['localhost']['tofu_data']['constants']['vector_db_ports']['qdrant_grpc'] }}

    - name: Wait for Qdrant HTTP health endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ _qdrant_http_port }}/healthz"
        method: GET
        status_code: 200
      register: qdrant_health
      retries: 6
      delay: 5
      until: qdrant_health.status == 200
      changed_when: false

    - name: Wait for Qdrant gRPC port
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ _qdrant_grpc_port }}"
        timeout: 30

    - name: Display Qdrant validation results
      ansible.builtin.debug:
        msg: |
          Qdrant validation passed on {{ inventory_hostname }}:
          - Docker: running
          - Container: qdrant running
          - HTTP health: {{ qdrant_health.status }}
          - gRPC port: listening

