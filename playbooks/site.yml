# =============================================================================
# Phase 8.5: Infisical self-hosted secrets management
# Bundled Docker Compose stack (postgres + redis + infisical app) in LXC.
# Fronted by HAProxy on TLS once roles/haproxy haproxy_http_enabled flips
# to true (see inventory/group_vars/haproxy_group.yml). DNS A record
# (infisical.{domain}) is auto-created by technitium_dns from the
# hostname + container_ip in inventory.
# =============================================================================

- name: Configure Infisical secrets-management platform
  hosts: infisical_group
  become: true
  gather_facts: false
  tags:
    - infisical_docker
    - secrets
    - secrets-management
  roles:
    - role: infisical_docker

# =============================================================================
# Phase 8c: Media stack (pve2)
# LAN-only Sonarr/Radarr/Plex/Seerr first, then the VPN-locked downloader
# (qBittorrent + Prowlarr behind Proton WireGuard with a fail-closed nftables
# killswitch) LAST.
#
# ORDERING IS DELIBERATE — RESILIENCE: download_vpn imports its own validate.yml
# at the end and FAILS its play on any killswitch/leak violation (correct: the
# tunnel must never leak). These are independent plays per host-group with no
# any_errors_fatal, so a download_vpn failure does NOT abort the others — and by
# running it LAST, Sonarr/Radarr/Plex/Seerr are already converged and serving
# before the fragile, security-gated downloader is even attempted. qBittorrent is
# not required for Plex. Do NOT move download_vpn earlier and do NOT weaken its
# validate.yml; resilience comes from play isolation + ordering, not from making
# the killswitch check non-fatal.
# =============================================================================

- name: Configure Sonarr (LAN-only TV PVR)
  hosts: sonarr_group
  become: true
  gather_facts: true
  tags:
    - sonarr
    - media
  roles:
    - role: sonarr

- name: Configure Radarr (LAN-only movie PVR)
  hosts: radarr_group
  become: true
  gather_facts: true
  tags:
    - radarr
    - media
  roles:
    - role: radarr

- name: Configure Plex Media Server (LAN-only)
  hosts: plex_group
  become: true
  gather_facts: true
  tags:
    - plex
    - media
  roles:
    - role: plex

# Seerr request UI (Docker in LXC). Registers Sonarr/Radarr/Plex via its settings
# API — depends only on those apps being up (from the plays above), not on the
# Prowlarr/qBittorrent wiring, so it runs before download_vpn/servarr_wiring and
# stays up even if the VPN downloader fails.
- name: Configure Seerr request UI
  hosts: seerr_group
  become: true
  gather_facts: true
  tags:
    - seerr
    - media
  roles:
    - role: seerr

# Sortarr insights dashboard (Docker in LXC). Read-only — reads Sonarr/Radarr
# (and optionally Plex) via their existing API keys; registers nothing back
# into those apps, so it can run anywhere in this phase.
- name: Configure Sortarr insights dashboard
  hosts: sortarr_group
  become: true
  gather_facts: true
  tags:
    - sortarr
    - media
  roles:
    - role: sortarr

# VPN-locked downloader runs LAST (see Phase 8c header). any_errors_fatal is
# explicitly false so a killswitch/leak failure here can never abort the media
# stack converged above.
- name: Configure VPN-locked downloader (qBittorrent + Prowlarr)
  hosts: download_vpn_group
  become: true
  gather_facts: true
  any_errors_fatal: false
  tags:
    - download_vpn
    - media
    - vpn
  roles:
    - role: download_vpn

# Self-wiring: auto-configures the Prowlarr <-> Sonarr/Radarr <-> qBittorrent
# pipeline via each app's API (deterministic SOPS keys). Runs from the
# download_vpn coordinator, so it must come AFTER download_vpn; if that play
# failed, this is skipped for the failed host — the *arr/Plex/Seerr stack above
# is unaffected.
- name: Wire the Servarr stack via API (Prowlarr/Sonarr/Radarr/qBittorrent)
  hosts: download_vpn_group
  become: true
  gather_facts: true
  tags:
    - servarr_wiring
    - media
  roles:
    - role: servarr_wiring

# Enforce TRaSH-Guides quality profiles + custom formats on Sonarr/Radarr via
# the official Configarr container. Runs on docker-host (reaches the *arr LAN
# and the internet directly, no VPN) AFTER the apps + deterministic keys exist.
# docker_vms[0]: one docker host is enough, and Configarr is idempotent so it is
# safe every converge. Owns quality config only — root folders / download
# clients live in the devopsarr servarr-config tofu module.
- name: Enforce *arr quality config (Configarr / TRaSH)
  hosts: docker_vms[0]
  become: true
  gather_facts: true
  tags:
    - configarr
    - media
  roles:
    - role: configarr

# Immich photo/video backup (Docker-in-LXC). Standalone — no cross-app API
# wiring; phone/Mac clients point straight at it. Inert until an LXC is tagged
# `immich` (empty group => no hosts).
- name: Deploy Immich photo backup
  hosts: immich_group
  become: true
  gather_facts: true
  tags:
    - immich
    - media
    - photos
  roles:
    - role: immich

# =============================================================================
# Phase 8e: Home Assistant (Docker-in-LXC)
# Vendor Docker image only; host-network mode for mDNS/Zeroconf device
# discovery. Reachable at homeassistant_web port; DNS A record is auto-created
# by technitium_dns from hostname + container_ip.
# =============================================================================

- name: Configure Home Assistant
  hosts: homeassistant_group
  become: true
  gather_facts: false
  tags:
    - homeassistant
    - automation
  roles:
    - role: homeassistant

# =============================================================================
# Phase 8f: phpIPAM (Docker-in-LXC)
# IP address management — phpipam-www + phpipam-cron + MariaDB via Compose.
# Secrets (db password, root password) in SOPS secrets.enc.yaml.
# =============================================================================

- name: Configure phpIPAM
  hosts: phpipam_group
  become: true
  gather_facts: false
  tags:
    - phpipam
    - ipam
  roles:
    - role: phpipam

# =============================================================================
# Phase 8d: HTTPS ingress (Traefik)
# Fronts every service web UI at https://<name>.<domain> (no ports) with a
# wildcard Let's Encrypt cert fetched via Route53 DNS-01. On the media VLAN so
# it reaches the media UIs at L2; other VLANs' UIs route in (UniFi).
# =============================================================================

- name: Configure Traefik HTTPS ingress
  hosts: traefik_group
  become: true
  gather_facts: true
  tags:
    - traefik
    - ingress
  roles:
    - role: traefik
    # keepalived floats the ingress VRRP virtual IP across every Traefik
    # instance so a node loss migrates ingress automatically (no manual DR).
    # No-ops below 2 ingress instances / without a published VIP.
    - role: keepalived

# =============================================================================
# Phase 9: Systemd Restart Policies
# Apply restart-on-failure policies to all managed services
# Each group defines its services via group_vars
# =============================================================================

- name: Apply systemd restart policies to all managed services
  hosts: all
  become: true
  gather_facts: false
  tags:
    - restart-policy
    - hardening

  roles:
    - role: systemd_restart_policy
      when: systemd_restart_policy_services | default([]) | length > 0
