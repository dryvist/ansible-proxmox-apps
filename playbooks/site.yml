---
# Import OpenTofu infrastructure data before running application playbooks
# This populates the inventory dynamically from tofu_inventory.json
# Must run with gather_facts: false to avoid Gathering Facts task
- name: Load OpenTofu infrastructure inventory
  import_playbook: ../inventory/load_tofu.yml

# Configure application stacks based on OpenTofu infrastructure

# =============================================================================
# Phase 0-secrets: OpenBao resource-domain secrets pre-fetch
# Reads each resource-domain's KV subtree (its own least-privilege AppRole)
# into a per-domain `bao_<domain>_secrets` fact so every consumer role can
# resolve its secrets bao-first with an env fallback. Runs once on the
# controller and publishes to the union of every domain's consuming groups;
# each domain SKIPS CLEANLY when BAO_ADDR or that domain's own role_id/
# secret_id envs are unset. Placed before Phase 6 (qdrant) so it precedes
# every consumer.
# =============================================================================

- name: Pre-fetch resource-domain secrets from OpenBao
  hosts: >-
    qdrant_group:open_webui_group:hermes_agent_group:llm_router_group:ai_orchestration_group:
    langfuse_group:langflow_group:
    cribl_stream_group:cribl_edge:
    object_storage_group:
    netmon_group:prometheus_group:unifi_metrics_group:
    sonarr_group:radarr_group:plex_group:seerr_group:sortarr_group:download_vpn_group:immich_group
  gather_facts: false
  tags:
    - openbao_secrets
    - ai
  tasks:
    - name: Fetch each resource-domain's KV subtree via its own AppRole
      ansible.builtin.include_role:
        name: openbao_secrets

    # Publish each domain's shared, un-prefixed fact at the playbook layer
    # (like tofu_data in load_tofu.yml). openbao_secrets_by_domain was
    # computed once on the delegated controller; a domain that was skipped
    # (BAO_ADDR or that domain's creds unset) is simply absent from the dict,
    # so `default({})` covers it the same as a host outside this play.
    - name: Publish each domain's merged secrets to every host in this play
      ansible.builtin.set_fact:
        bao_observability_secrets: "{{ openbao_secrets_by_domain['observability'] | default({}) }}"
        bao_local_cloud_secrets: "{{ openbao_secrets_by_domain['local-cloud'] | default({}) }}"
        bao_monitoring_secrets: "{{ openbao_secrets_by_domain['monitoring'] | default({}) }}"
        bao_media_secrets: "{{ openbao_secrets_by_domain['media'] | default({}) }}"
        bao_local_llm_secrets: "{{ openbao_secrets_by_domain['local-llm'] | default({}) }}"
      vars:
        openbao_secrets_by_domain: "{{ hostvars['localhost'].openbao_secrets_by_domain | default({}) }}"
      no_log: true

# =============================================================================
# Phase 0: APT Cache Infrastructure
# apt-cacher-ng must be deployed BEFORE any roles that install apt packages
# =============================================================================

- name: Deploy apt-cacher-ng caching proxy
  hosts: apt_cacher_group
  become: true
  gather_facts: true
  tags:
    - apt_cacher_ng
    - apt_proxy
    - lxc
  roles:
    - role: apt_cacher_ng

- name: Configure apt proxy on LXC containers
  hosts: lxc_containers:!apt_cacher_group:!download_vpn_group
  become: true
  gather_facts: false
  tags:
    - apt_proxy
    - lxc
  tasks:
    - name: Configure apt proxy
      when: "'apt-cacher-ng' in hostvars"
      vars:
        _apt_cache_ip: >-
          {{ hostvars['apt-cacher-ng']['container_ip'] }}
        _apt_cache_port: >-
          {{ hostvars['localhost']['tofu_data']
             ['constants']['service_ports']['apt_cacher_ng']
             | default(3142) }}
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/00proxy
        content: |
          Acquire::http::Proxy
            "http://{{ _apt_cache_ip }}:{{ _apt_cache_port }}";
        owner: root
        group: root
        mode: '0644'

    - name: Remove stale apt proxy configuration
      when: "'apt-cacher-ng' not in hostvars"
      ansible.builtin.file:
        path: /etc/apt/apt.conf.d/00proxy
        state: absent

- name: Remove apt proxy from download_vpn (killswitch blocks cross-subnet proxy)
  hosts: download_vpn_group
  become: true
  gather_facts: false
  tags:
    - apt_proxy
    - download_vpn
    - lxc
  tasks:
    - name: Ensure no apt proxy is configured (apt-cacher-ng is in a different /24 than wg0 allows)
      ansible.builtin.file:
        path: /etc/apt/apt.conf.d/00proxy
        state: absent

# =============================================================================
# Phase 0-zot: Zot OCI Registry
# Self-hosted pull-through cache (docker.io/ghcr.io/quay.io) and private
# registry. Deployed early — before any docker app roles — so firewalled
# docker hosts can pull through it. Pairs with the tofu registry LXC 109.
# =============================================================================

- name: Deploy Zot registry
  hosts: registry_group
  become: true
  gather_facts: true
  tags:
    - zot
    - registry
    - lxc
  roles:
    - role: zot_registry

- name: Configure Docker registry mirror on LXC containers
  hosts: lxc_containers:!registry_group
  become: true
  gather_facts: false
  tags:
    - registry_mirror
    - docker
    - lxc
  handlers:
    - name: Restart docker
      ansible.builtin.systemd:
        name: docker
        state: restarted
  tasks:
    # This play is the single owner of /etc/docker/daemon.json on docker LXCs.
    # roles/idrac_kvm_docker no longer writes the storage-driver here (removed
    # on a separate branch) to avoid two writers fighting over the same file.
    - name: Configure Docker registry mirror
      when:
        - "'registry' in hostvars"
        - "'docker' in (host_tags | default([]))"
      vars:
        _registry_ip: "{{ hostvars['registry']['container_ip'] }}"
        _registry_port: >-
          {{ hostvars['localhost']['tofu_data']
             ['constants']['service_ports']['registry']
             | default(5000) }}
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "registry-mirrors": ["http://{{ _registry_ip }}:{{ _registry_port }}"],
            "insecure-registries": ["{{ _registry_ip }}:{{ _registry_port }}"],
            "storage-driver": "fuse-overlayfs"
          }
        owner: root
        group: root
        mode: '0644'
      notify: Restart docker

# =============================================================================
# Phase 0a: NTP Time Synchronization Baseline
# Runs after apt-cacher-ng is up and the apt proxy is configured, so LXC
# containers with outbound-internal firewall (cribl_edge, cribl_stream)
# can install chrony via the proxy. Establishes accurate time on every
# managed VM/container before anything that depends on it (TLS handshakes,
# log timestamps, certificate validation, Splunk _time correlation).
# Points at the Proxmox hosts (stratum-2 servers managed by ansible-proxmox)
# when PROXMOX_NTP_SERVERS is set in Doppler; falls back to the Debian
# public pool when not.
# =============================================================================

- name: Configure NTP time synchronization baseline
  hosts: all:!localhost
  become: true
  gather_facts: true
  tags:
    - ntp
    - time
    - baseline
  roles:
    - role: ntp

# =============================================================================
# Phase 0a2: Syslog forwarding to the central pipeline
# Every infra LXC ships its logs (systemd journal + native services) to the
# HAProxy syslog VIP -> Cribl Edge -> Splunk (os index). Runs after NTP so log
# timestamps are accurate. The pipeline (cribl_edge / cribl_stream) and the load
# balancer (haproxy) are excluded: they RECEIVE this traffic, so forwarding into
# themselves would loop; their own logs are collected locally by Cribl Edge.
# =============================================================================

- name: Forward infra LXC logs to the syslog pipeline
  hosts: lxc_containers:!cribl_edge:!cribl_stream_group:!haproxy_group
  become: true
  gather_facts: false
  tags:
    - syslog_forwarder
    - logging
    - baseline
  roles:
    - role: syslog_forwarder

