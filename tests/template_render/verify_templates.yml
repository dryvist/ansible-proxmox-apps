---
# Template rendering verification playbook
# Renders cribl_docker_stack role templates offline and asserts on expected content.
#
# Usage:
#   ansible-playbook tests/template_render/verify_templates.yml -c local
#
# Covers:
#   - docker-stack.yml.j2 publishes syslog ports 1514-1518 (TCP + UDP each)
#   - docker-stack.yml.j2 publishes netflow port 2055 (UDP)
#   - cribl/inputs.yml.j2 renders combined syslog listeners (TCP+UDP) for each port
#   - stream/inputs.yml.j2 renders IPFIX/NetFlow UDP listener on port 2055
#   - outputs.yml.j2 renders HEC URL with correct splunk host

- name: Render and verify cribl_docker_stack templates
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Mirror the role defaults (cribl_docker_stack/defaults/main.yml).
    # Role default is `cribl/cribl:latest`; this fixture tracks the same tag
    # so the test never silently freezes on an old version. The previous
    # hand-pin (`cribl/cribl:4.10.1`) is what motivated this — by the time
    # it was noticed, it had drifted 8 minor versions behind the role
    # default and was no longer testing what the role actually deploys.
    cribl_docker_stack_image: "cribl/cribl:latest"
    cribl_docker_stack_edge_replicas: 2
    cribl_docker_stack_edge_cpu_limit: "1"
    cribl_docker_stack_edge_memory_limit: "1024M"
    cribl_docker_stack_edge_cpu_reservation: "0.5"
    cribl_docker_stack_edge_memory_reservation: "256M"
    cribl_docker_stack_stream_replicas: 1
    cribl_docker_stack_stream_cpu_limit: "1"
    cribl_docker_stack_stream_memory_limit: "1024M"
    cribl_docker_stack_stream_cpu_reservation: "0.5"
    cribl_docker_stack_stream_memory_reservation: "256M"
    cribl_docker_stack_syslog_ports:
      - 1514
      - 1515
      - 1516
      - 1517
      - 1518
    cribl_docker_stack_netflow_port: 2055
    cribl_docker_stack_edge_web_port: 9000
    cribl_docker_stack_stream_web_port: 9100
    cribl_docker_stack_healthcheck_interval: "60s"
    cribl_docker_stack_healthcheck_timeout: "30s"
    cribl_docker_stack_healthcheck_retries: 5
    cribl_docker_stack_healthcheck_start_period: "120s"
    cribl_docker_stack_config_dir: /opt/cribl/config
    # Test values for HEC output — splunk host and token
    cribl_docker_stack_splunk_host: "192.168.0.200"
    cribl_docker_stack_hec_url: "https://192.168.0.200:8088"
    cribl_docker_stack_hec_token: "test-hec-token-12345"
    cribl_docker_stack_hec_tls_verify: false
    # Template source root — relative to playbook location, role is at repo root
    _template_dir: "../../roles/cribl_docker_stack/templates"

  tasks:
    # -------------------------------------------------------------------------
    # docker-stack.yml.j2
    # -------------------------------------------------------------------------
    - name: Render docker-stack.yml.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/docker-stack.yml.j2"
        dest: /tmp/test_docker_stack.yml
        mode: "0644"

    - name: Read rendered docker-stack.yml
      ansible.builtin.slurp:
        src: /tmp/test_docker_stack.yml
      register: _docker_stack_raw

    - name: Decode docker-stack content
      ansible.builtin.set_fact:
        _docker_stack: "{{ _docker_stack_raw.content | b64decode }}"

    - name: Assert docker-stack publishes each syslog port (TCP)
      ansible.builtin.assert:
        that:
          - "('published: ' ~ item ~ '\n        protocol: tcp') in _docker_stack"
        fail_msg: "docker-stack.yml.j2 is missing TCP publish for syslog port {{ item }}"
      loop: "{{ cribl_docker_stack_syslog_ports }}"

    - name: Assert docker-stack publishes each syslog port (UDP)
      ansible.builtin.assert:
        that:
          - "('published: ' ~ item ~ '\n        protocol: udp') in _docker_stack"
        fail_msg: "docker-stack.yml.j2 is missing UDP publish for syslog port {{ item }}"
      loop: "{{ cribl_docker_stack_syslog_ports }}"

    - name: Assert docker-stack publishes netflow port 2055 (UDP)
      ansible.builtin.assert:
        that:
          - "('published: 2055\n        protocol: udp') in _docker_stack"
        fail_msg: "docker-stack.yml.j2 is missing netflow port 2055 UDP publish"

    - name: Assert docker-stack references cribl image
      ansible.builtin.assert:
        that:
          - "'image: ' ~ cribl_docker_stack_image in _docker_stack"
        fail_msg: "docker-stack.yml.j2 does not reference expected image {{ cribl_docker_stack_image }}"

    # -------------------------------------------------------------------------
    # inputs.yml.j2
    # -------------------------------------------------------------------------
    - name: Render inputs.yml.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/cribl/inputs.yml.j2"
        dest: /tmp/test_inputs.yml
        mode: "0644"

    - name: Read rendered inputs.yml
      ansible.builtin.slurp:
        src: /tmp/test_inputs.yml
      register: _inputs_raw

    - name: Decode inputs content
      ansible.builtin.set_fact:
        _inputs: "{{ _inputs_raw.content | b64decode }}"

    - name: Assert inputs.yml has combined syslog listener for each port
      ansible.builtin.assert:
        that:
          - "'in_syslog_' ~ item in _inputs"
          - "'tcpPort: ' ~ item in _inputs"
          - "'udpPort: ' ~ item in _inputs"
        fail_msg: "inputs.yml.j2 is missing syslog listener for port {{ item }}"
      loop: "{{ cribl_docker_stack_syslog_ports }}"

    # -------------------------------------------------------------------------
    # stream/inputs.yml.j2 (IPFIX/NetFlow handled by Cribl Stream, not Edge)
    # -------------------------------------------------------------------------
    - name: Render stream/inputs.yml.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/stream/inputs.yml.j2"
        dest: /tmp/test_stream_inputs.yml
        mode: "0644"

    - name: Read rendered stream/inputs.yml
      ansible.builtin.slurp:
        src: /tmp/test_stream_inputs.yml
      register: _stream_inputs_raw

    - name: Decode stream inputs content
      ansible.builtin.set_fact:
        _stream_inputs: "{{ _stream_inputs_raw.content | b64decode }}"

    - name: Assert stream/inputs.yml has IPFIX/NetFlow UDP listener on port 2055
      ansible.builtin.assert:
        that:
          - "'in_ipfix' in _stream_inputs"
          - "'port: 2055' in _stream_inputs"
          - "'type: netflow' in _stream_inputs"
        fail_msg: "stream/inputs.yml.j2 is missing IPFIX/NetFlow UDP listener on port 2055"

    # -------------------------------------------------------------------------
    # outputs.yml.j2
    # -------------------------------------------------------------------------
    - name: Render outputs.yml.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/cribl/outputs.yml.j2"
        dest: /tmp/test_outputs.yml
        mode: "0644"

    - name: Read rendered outputs.yml
      ansible.builtin.slurp:
        src: /tmp/test_outputs.yml
      register: _outputs_raw

    - name: Decode outputs content
      ansible.builtin.set_fact:
        _outputs: "{{ _outputs_raw.content | b64decode }}"

    - name: Assert outputs.yml HEC URL points to correct splunk host
      ansible.builtin.assert:
        that:
          - "'https://192.168.0.200:8088' in _outputs"
        fail_msg: >-
          outputs.yml.j2 HEC URL does not point to 192.168.0.200:8088;
          rendered content: {{ _outputs }}

    - name: Assert outputs.yml includes splunk_hec output type
      ansible.builtin.assert:
        that:
          - "'type: splunk_hec' in _outputs"
        fail_msg: "outputs.yml.j2 does not define a splunk_hec output"

    - name: Assert outputs.yml includes HEC token
      ansible.builtin.assert:
        that:
          - "cribl_docker_stack_hec_token in _outputs"
        fail_msg: "outputs.yml.j2 does not include HEC token"

    # -------------------------------------------------------------------------
    # Summary
    # -------------------------------------------------------------------------
    - name: Template rendering verification PASSED
      ansible.builtin.debug:
        msg: |
          All template rendering assertions passed:
          - docker-stack.yml.j2: syslog ports 1514-1518 published (TCP+UDP), netflow 2055 (UDP)
          - cribl/inputs.yml.j2: combined syslog listeners (TCP+UDP) for ports 1514-1518
          - stream/inputs.yml.j2: IPFIX/NetFlow on port 2055
          - outputs.yml.j2: HEC URL -> https://192.168.0.200:8088, type: splunk_hec

- name: Render and verify mailpit_docker templates
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Mirror roles/mailpit_docker/defaults/main.yml
    mailpit_docker_image: "axllent/mailpit:v1.29.2"
    mailpit_docker_container_name: mailpit
    mailpit_docker_smtp_port: 1025
    mailpit_docker_web_port: 8025
    mailpit_docker_data_dir: /opt/mailpit
    mailpit_docker_relay_starttls: true
    mailpit_docker_relay_all: false
    mailpit_docker_relay_host: "smtp.test.example.com"
    mailpit_docker_relay_port: "587"
    mailpit_docker_relay_username: "testuser"
    mailpit_docker_relay_password: "test-placeholder"
    _template_dir: "../../roles/mailpit_docker/templates"

  tasks:
    - name: Render mailpit docker-compose.yml.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/docker-compose.yml.j2"
        dest: /tmp/test_mailpit_compose.yml
        mode: "0644"

    - name: Read rendered mailpit docker-compose.yml
      ansible.builtin.slurp:
        src: /tmp/test_mailpit_compose.yml
      register: _mailpit_compose_raw

    - name: Decode mailpit compose content
      ansible.builtin.set_fact:
        _mailpit_compose: "{{ _mailpit_compose_raw.content | b64decode }}"

    - name: Assert mailpit compose has expected ports
      ansible.builtin.assert:
        that:
          - "'1025:1025' in _mailpit_compose"
          - "'8025:8025' in _mailpit_compose"
        fail_msg: >-
          mailpit docker-compose.yml.j2 missing expected port mappings

    - name: Assert mailpit compose has expected image
      ansible.builtin.assert:
        that:
          - "'axllent/mailpit:v1.29.2' in _mailpit_compose"
        fail_msg: "mailpit docker-compose.yml.j2 does not reference expected image"

    - name: Assert mailpit compose has relay env vars
      ansible.builtin.assert:
        that:
          - "'MP_SMTP_RELAY_HOST' in _mailpit_compose"
          - "'MP_SMTP_RELAY_STARTTLS' in _mailpit_compose"
        fail_msg: "mailpit docker-compose.yml.j2 missing relay environment variables"

    - name: Mailpit template rendering PASSED
      ansible.builtin.debug:
        msg: |
          Mailpit template assertions passed:
          - docker-compose.yml.j2: SMTP port 1025, web port 8025, image, relay env vars

- name: Render and verify ntfy_docker templates
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Mirror roles/ntfy_docker/defaults/main.yml
    ntfy_docker_image: "binwiederhier/ntfy:v2.17.0"
    ntfy_docker_container_name: ntfy
    ntfy_docker_http_port: 8080
    ntfy_docker_data_dir: /opt/ntfy
    ntfy_docker_cache_duration: "12h"
    ntfy_docker_attachment_cache_dir: /var/cache/ntfy/attachments
    ansible_host: "192.168.0.111"
    _template_dir: "../../roles/ntfy_docker/templates"

  tasks:
    - name: Render ntfy docker-compose.yml.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/docker-compose.yml.j2"
        dest: /tmp/test_ntfy_compose.yml
        mode: "0644"

    - name: Read rendered ntfy docker-compose.yml
      ansible.builtin.slurp:
        src: /tmp/test_ntfy_compose.yml
      register: _ntfy_compose_raw

    - name: Decode ntfy compose content
      ansible.builtin.set_fact:
        _ntfy_compose: "{{ _ntfy_compose_raw.content | b64decode }}"

    - name: Assert ntfy compose has expected port mapping
      ansible.builtin.assert:
        that:
          - "'8080:80' in _ntfy_compose"
        fail_msg: >-
          ntfy docker-compose.yml.j2 missing expected port mapping 8080:80

    - name: Assert ntfy compose has expected image
      ansible.builtin.assert:
        that:
          - "'binwiederhier/ntfy:v2.17.0' in _ntfy_compose"
        fail_msg: "ntfy docker-compose.yml.j2 does not reference expected image"

    - name: Assert ntfy compose mounts server.yml config
      ansible.builtin.assert:
        that:
          - "'server.yml:ro' in _ntfy_compose"
        fail_msg: "ntfy docker-compose.yml.j2 missing server.yml config mount"

    - name: Render ntfy server.yml.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/server.yml.j2"
        dest: /tmp/test_ntfy_server.yml
        mode: "0644"

    - name: Read rendered ntfy server.yml
      ansible.builtin.slurp:
        src: /tmp/test_ntfy_server.yml
      register: _ntfy_server_raw

    - name: Decode ntfy server content
      ansible.builtin.set_fact:
        _ntfy_server: "{{ _ntfy_server_raw.content | b64decode }}"

    - name: Assert ntfy server.yml has expected configuration
      ansible.builtin.assert:
        that:
          - "'cache-file' in _ntfy_server"
          - "'listen-http: \":80\"' in _ntfy_server"
          - "'cache-duration' in _ntfy_server"
        fail_msg: >-
          ntfy server.yml.j2 missing expected configuration;
          rendered content: {{ _ntfy_server }}

    - name: Ntfy template rendering PASSED
      ansible.builtin.debug:
        msg: |
          Ntfy template assertions passed:
          - docker-compose.yml.j2: HTTP port 8080:80, image, config mount
          - server.yml.j2: cache-file, listen-http, cache-duration

- name: Render and verify openproject_docker templates
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Mirror roles/openproject_docker/defaults/main.yml
    openproject_docker_image: "openproject/community:15"
    openproject_docker_container_name: openproject
    openproject_docker_data_dir: /opt/openproject
    openproject_docker_web_port: 80
    openproject_docker_host_name: "openproject.test.example.com"
    openproject_docker_https: false
    openproject_docker_secret_key_base: "test-secret-key-base-placeholder-do-not-use-in-production"
    openproject_docker_smtp_address: "192.168.0.110"
    openproject_docker_smtp_port: 1025
    openproject_docker_smtp_domain: "test.example.com"
    openproject_docker_mail_from: "openproject@test.example.com"
    openproject_docker_admin_email: "admin@test.example.com"
    openproject_docker_default_language: en
    openproject_docker_rails_env: production
    openproject_docker_web_concurrency: 2
    _template_dir: "../../roles/openproject_docker/templates"

  tasks:
    - name: Render openproject docker-compose.yml.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/docker-compose.yml.j2"
        dest: /tmp/test_openproject_compose.yml
        mode: "0644"

    - name: Read rendered openproject docker-compose.yml
      ansible.builtin.slurp:
        src: /tmp/test_openproject_compose.yml
      register: _openproject_compose_raw

    - name: Decode openproject compose content
      ansible.builtin.set_fact:
        _openproject_compose: "{{ _openproject_compose_raw.content | b64decode }}"

    - name: Assert openproject compose references expected image
      ansible.builtin.assert:
        that:
          - "'openproject/community:15' in _openproject_compose"
        fail_msg: "openproject docker-compose.yml.j2 does not reference expected image"

    - name: Assert openproject compose publishes web port 80
      ansible.builtin.assert:
        that:
          - "'80:80' in _openproject_compose"
        fail_msg: "openproject docker-compose.yml.j2 missing web port mapping 80:80"

    - name: Assert openproject compose uses OPENPROJECT_-prefixed secret env var
      ansible.builtin.assert:
        that:
          - "'OPENPROJECT_SECRET_KEY_BASE' in _openproject_compose"
        fail_msg: >-
          openproject docker-compose.yml.j2 must pass the secret as
          OPENPROJECT_SECRET_KEY_BASE (the OpenProject image config layer
          expects the OPENPROJECT_ prefix)

    - name: Assert openproject compose configures SMTP env vars
      ansible.builtin.assert:
        that:
          - "'OPENPROJECT_SMTP__ADDRESS' in _openproject_compose"
          - "'OPENPROJECT_SMTP__PORT' in _openproject_compose"
          - "'192.168.0.110' in _openproject_compose"
        fail_msg: >-
          openproject docker-compose.yml.j2 missing SMTP relay env vars
          (OPENPROJECT_SMTP__ADDRESS / __PORT) or SMTP host substitution

    - name: Assert openproject compose mounts persistent volumes
      ansible.builtin.assert:
        that:
          - "'/opt/openproject/pgdata:/var/openproject/pgdata' in _openproject_compose"
          - "'/opt/openproject/assets:/var/openproject/assets' in _openproject_compose"
        fail_msg: >-
          openproject docker-compose.yml.j2 missing required persistent
          volume mounts for pgdata and assets

    - name: Assert openproject compose sets OPENPROJECT_HOST__NAME
      ansible.builtin.assert:
        that:
          - "'OPENPROJECT_HOST__NAME' in _openproject_compose"
          - "'openproject.test.example.com' in _openproject_compose"
        fail_msg: >-
          openproject docker-compose.yml.j2 missing OPENPROJECT_HOST__NAME
          or did not substitute the FQDN

    - name: OpenProject template rendering PASSED
      ansible.builtin.debug:
        msg: |
          OpenProject template assertions passed:
          - docker-compose.yml.j2: image, port 80:80, OPENPROJECT_SECRET_KEY_BASE,
            SMTP env vars, persistent volumes, host name

- name: Render and verify infisical_docker templates
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Mirror roles/infisical_docker/defaults/main.yml (test stand-ins for
    # SOPS-sourced env lookups and terraform_data constants).
    infisical_docker_postgres_image: "postgres:14-alpine"
    infisical_docker_redis_image: "redis:7-alpine"
    infisical_docker_app_image: "infisical/infisical:latest"
    infisical_docker_container_name: infisical
    infisical_docker_data_dir: /opt/infisical
    infisical_docker_postgres_data_dir: /opt/infisical/postgres
    infisical_docker_redis_data_dir: /opt/infisical/redis
    infisical_docker_postgres_internal_data: /var/lib/postgresql/data
    infisical_docker_redis_internal_data: /data
    infisical_docker_db_service: db
    infisical_docker_redis_service: redis
    infisical_docker_app_service: infisical
    infisical_docker_db_name: infisical
    infisical_docker_db_user: infisical
    infisical_docker_restart_policy: unless-stopped
    infisical_docker_api_port: 8080
    infisical_docker_postgres_port: 5432
    infisical_docker_redis_port: 6379
    infisical_docker_site_url: "https://infisical.test.example.com"
    infisical_docker_db_uri: "postgres://infisical:test-db-pw@db:5432/infisical"
    infisical_docker_redis_url: "redis://redis:6379"
    infisical_docker_encryption_key: "test-encryption-key-placeholder-do-not-use"
    infisical_docker_auth_secret: "test-auth-secret-placeholder-do-not-use"
    infisical_docker_db_password: "test-db-pw"
    _template_dir: "../../roles/infisical_docker/templates"

  tasks:
    - name: Render infisical docker-compose.yml.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/docker-compose.yml.j2"
        dest: /tmp/test_infisical_compose.yml
        mode: "0644"

    - name: Read rendered infisical docker-compose.yml
      ansible.builtin.slurp:
        src: /tmp/test_infisical_compose.yml
      register: _infisical_compose_raw

    - name: Decode infisical compose content
      ansible.builtin.set_fact:
        _infisical_compose: "{{ _infisical_compose_raw.content | b64decode }}"

    - name: Assert infisical compose references all three expected images
      ansible.builtin.assert:
        that:
          - "'postgres:14-alpine' in _infisical_compose"
          - "'redis:7-alpine' in _infisical_compose"
          - "'infisical/infisical:latest' in _infisical_compose"
        fail_msg: >-
          infisical docker-compose.yml.j2 missing one of the three required
          images (postgres:14-alpine, redis:7-alpine, infisical/infisical:latest)

    - name: Assert infisical compose publishes api port 8080:8080
      ansible.builtin.assert:
        that:
          - "'8080:8080' in _infisical_compose"
        fail_msg: >-
          infisical docker-compose.yml.j2 missing api port mapping 8080:8080
          (service_ports.infisical_api must be on both sides)

    - name: Assert infisical compose builds DB_CONNECTION_URI from vars (no literal port)
      ansible.builtin.assert:
        that:
          - "'DB_CONNECTION_URI' in _infisical_compose"
          - "'postgres://infisical:test-db-pw@db:5432/infisical' in _infisical_compose"
        fail_msg: >-
          infisical docker-compose.yml.j2 missing DB_CONNECTION_URI or it does
          not assemble from the DRY pieces (user, password, service host,
          postgres_default port, db_name)

    - name: Assert infisical compose builds REDIS_URL from vars (no literal port)
      ansible.builtin.assert:
        that:
          - "'REDIS_URL' in _infisical_compose"
          - "'redis://redis:6379' in _infisical_compose"
        fail_msg: >-
          infisical docker-compose.yml.j2 missing REDIS_URL or it does not
          assemble from the redis service host + redis_default port

    - name: Assert infisical compose sets SITE_URL to the HTTPS FQDN
      ansible.builtin.assert:
        that:
          - "'SITE_URL' in _infisical_compose"
          - "'https://infisical.test.example.com' in _infisical_compose"
        fail_msg: >-
          infisical docker-compose.yml.j2 missing SITE_URL or did not
          substitute the HTTPS FQDN

    - name: Assert infisical compose mounts persistent volumes for postgres and redis
      ansible.builtin.assert:
        that:
          - "'/opt/infisical/postgres:/var/lib/postgresql/data' in _infisical_compose"
          - "'/opt/infisical/redis:/data' in _infisical_compose"
        fail_msg: >-
          infisical docker-compose.yml.j2 missing required persistent volume
          mounts for postgres and redis

    - name: Assert infisical compose passes ENCRYPTION_KEY and AUTH_SECRET
      ansible.builtin.assert:
        that:
          - "'ENCRYPTION_KEY' in _infisical_compose"
          - "'AUTH_SECRET' in _infisical_compose"
        fail_msg: >-
          infisical docker-compose.yml.j2 must pass ENCRYPTION_KEY and
          AUTH_SECRET (Infisical fails to start without them)

    - name: Infisical template rendering PASSED
      ansible.builtin.debug:
        msg: |
          Infisical template assertions passed:
          - docker-compose.yml.j2: postgres+redis+app images, port 8080:8080,
            DB_CONNECTION_URI, REDIS_URL, SITE_URL, persistent volumes,
            ENCRYPTION_KEY/AUTH_SECRET

- name: Render and verify haproxy templates
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Mirror roles/haproxy/defaults/main.yml (only vars referenced by haproxy.cfg.j2)
    haproxy_stats_enabled: true
    haproxy_stats_port: 8404
    haproxy_stats_user: admin
    haproxy_stats_password: "test-stats-placeholder"
    haproxy_stats_timeout: "30s"
    haproxy_stats_refresh: "10s"
    haproxy_algorithm: roundrobin
    haproxy_mode_tcp: tcp
    haproxy_mode_http: http
    haproxy_log_option_tcp: tcplog
    haproxy_log_option_http: httplog
    haproxy_ssl_ca_base: /etc/ssl/certs
    haproxy_ssl_crt_base: /etc/ssl/private
    haproxy_timeout_connect: 5000
    haproxy_timeout_client: 60000
    haproxy_timeout_server: 60000
    haproxy_health_check_interval: 5000
    haproxy_health_check_timeout: 5000
    haproxy_http_port: 80
    haproxy_https_port: 443
    haproxy_http_redirect_code: 301
    haproxy_http_forwardfor: true
    haproxy_syslog_port_mappings:
      - { frontend: 514, backend: 1514, name: unifi }
      - { frontend: 515, backend: 1515, name: palo_alto }
    haproxy_syslog_backend_servers:
      - inventory_hostname: cribl-edge-01
        container_ip: 192.168.0.180
      - inventory_hostname: cribl-edge-02
        container_ip: 192.168.0.181
    _template_dir: "../../roles/haproxy/templates"

  tasks:
    # =========================================================================
    # Default path: haproxy_http_enabled=false (existing behavior, no opt-in)
    # =========================================================================
    - name: Render haproxy.cfg.j2 with HTTP disabled
      ansible.builtin.template:
        src: "{{ _template_dir }}/haproxy.cfg.j2"
        dest: /tmp/test_haproxy_disabled.cfg
        mode: "0644"
      vars:
        haproxy_http_enabled: false
        haproxy_http_frontends: []

    - name: Read rendered haproxy.cfg (disabled)
      ansible.builtin.slurp:
        src: /tmp/test_haproxy_disabled.cfg
      register: _haproxy_disabled_raw

    - name: Decode haproxy.cfg disabled content
      ansible.builtin.set_fact:
        _haproxy_disabled: "{{ _haproxy_disabled_raw.content | b64decode }}"

    - name: Assert disabled config keeps TCP/syslog frontends and backends (DRY audit no-op)
      ansible.builtin.assert:
        that:
          - "'mode tcp' in _haproxy_disabled"
          - "'option tcplog' in _haproxy_disabled"
          - "'timeout connect 5000' in _haproxy_disabled"
          - "'timeout client 60000' in _haproxy_disabled"
          - "'ca-base /etc/ssl/certs' in _haproxy_disabled"
          - "'crt-base /etc/ssl/private' in _haproxy_disabled"
          - "'frontend syslog_unifi_514' in _haproxy_disabled"
          - "'bind *:514' in _haproxy_disabled"
          - "'default_backend syslog_backend_1514' in _haproxy_disabled"
          - "'backend syslog_backend_1514' in _haproxy_disabled"
          - "'server cribl-edge-01 192.168.0.180:1514' in _haproxy_disabled"
        fail_msg: >-
          DRY audit caused a behavior change with HTTP disabled — TCP/syslog
          rendering differs from prior literal-baked config.

    - name: Assert disabled config DOES NOT emit any HTTP/HTTPS frontends or backends
      ansible.builtin.assert:
        that:
          - "'frontend http_in' not in _haproxy_disabled"
          - "'frontend https_in' not in _haproxy_disabled"
          - "'http_backend_' not in _haproxy_disabled"
          - "'use_backend' not in _haproxy_disabled"
          - "'X-Forwarded-Proto' not in _haproxy_disabled"
        fail_msg: >-
          HTTP/HTTPS section leaked into the rendered config even though
          haproxy_http_enabled was false. The Jinja conditional gate is broken.

    # =========================================================================
    # Enabled path: single frontend entry (the Infisical case)
    # =========================================================================
    - name: Render haproxy.cfg.j2 with HTTP enabled and one frontend
      ansible.builtin.template:
        src: "{{ _template_dir }}/haproxy.cfg.j2"
        dest: /tmp/test_haproxy_single.cfg
        mode: "0644"
      vars:
        haproxy_http_enabled: true
        haproxy_http_frontends:
          - name: infisical
            server_name: infisical.test.example.com
            backend_host: 192.168.0.108
            backend_port: 8080
            cert_path: /etc/ssl/private/infisical.pem

    - name: Read rendered haproxy.cfg (single)
      ansible.builtin.slurp:
        src: /tmp/test_haproxy_single.cfg
      register: _haproxy_single_raw

    - name: Decode haproxy.cfg single content
      ansible.builtin.set_fact:
        _haproxy_single: "{{ _haproxy_single_raw.content | b64decode }}"

    - name: Assert single-entry render has one http_in frontend with HTTPS redirect
      ansible.builtin.assert:
        that:
          - "'frontend http_in' in _haproxy_single"
          - "'bind *:80' in _haproxy_single"
          - "'redirect scheme https code 301' in _haproxy_single"
        fail_msg: >-
          frontend http_in is missing or the HTTPS redirect is malformed.

    - name: Assert single-entry render has https_in with SNI cert bind and per-Host routing
      ansible.builtin.assert:
        that:
          - "'frontend https_in' in _haproxy_single"
          - "'bind *:443 ssl crt /etc/ssl/private/infisical.pem' in _haproxy_single"
          - "'use_backend http_backend_infisical if { hdr(host) -i infisical.test.example.com }' in _haproxy_single"
          - "'http-request set-header X-Forwarded-Proto https' in _haproxy_single"
          - "'option forwardfor' in _haproxy_single"
        fail_msg: >-
          frontend https_in is missing one of: SNI cert bind, use_backend ACL,
          X-Forwarded-Proto header, or option forwardfor.

    - name: Assert single-entry render has per-service backend pointed at backend_host
      ansible.builtin.assert:
        that:
          - "'backend http_backend_infisical' in _haproxy_single"
          - "'server infisical 192.168.0.108:8080 check' in _haproxy_single"
        fail_msg: >-
          backend http_backend_infisical missing or server line does not point
          at backend_host:backend_port.

    - name: Assert single-entry render keeps option httplog out of the backend section
      ansible.builtin.assert:
        that:
          # option httplog must appear exactly twice (once per frontend) and
          # never in any backend section. HAProxy rejects it in backends.
          - "_haproxy_single.count('option httplog') == 2"
        fail_msg: >-
          option httplog occurrence count is {{ _haproxy_single.count('option httplog') }};
          expected exactly 2 (one in http_in, one in https_in). If higher, it
          leaked into a backend and HAProxy will reject the config.

    - name: Assert single-entry render preserves TCP/syslog section alongside HTTP
      ansible.builtin.assert:
        that:
          - "'frontend syslog_unifi_514' in _haproxy_single"
          - "'backend syslog_backend_1514' in _haproxy_single"
        fail_msg: >-
          TCP/syslog frontends or backends disappeared when HTTP was enabled.

    # =========================================================================
    # Multi-entry render: verifies the CRITICAL bug fix (no port duplication)
    # =========================================================================
    - name: Render haproxy.cfg.j2 with HTTP enabled and two frontends
      ansible.builtin.template:
        src: "{{ _template_dir }}/haproxy.cfg.j2"
        dest: /tmp/test_haproxy_multi.cfg
        mode: "0644"
      vars:
        haproxy_http_enabled: true
        haproxy_http_frontends:
          - name: infisical
            server_name: infisical.test.example.com
            backend_host: 192.168.0.108
            backend_port: 8080
            cert_path: /etc/ssl/private/infisical.pem
          - name: gitea
            server_name: gitea.test.example.com
            backend_host: 192.168.0.109
            backend_port: 3000
            cert_path: /etc/ssl/private/gitea.pem

    - name: Read rendered haproxy.cfg (multi)
      ansible.builtin.slurp:
        src: /tmp/test_haproxy_multi.cfg
      register: _haproxy_multi_raw

    - name: Decode haproxy.cfg multi content
      ansible.builtin.set_fact:
        _haproxy_multi: "{{ _haproxy_multi_raw.content | b64decode }}"

    - name: Assert multi-entry render does NOT duplicate bind lines (CRITICAL fix)
      ansible.builtin.assert:
        that:
          - "_haproxy_multi.count('bind *:80') == 1"
          - "_haproxy_multi.count('bind *:443') == 1"
          - "_haproxy_multi.count('frontend http_in') == 1"
          - "_haproxy_multi.count('frontend https_in') == 1"
        fail_msg: >-
          Multi-entry render duplicated a port bind or frontend. HAProxy would
          fail to start with "Address already in use". This is exactly the
          original gemini-code-assist CRITICAL finding and must stay fixed.

    - name: Assert multi-entry render lists both certs on the single SNI bind line
      ansible.builtin.assert:
        that:
          - "'crt /etc/ssl/private/infisical.pem' in _haproxy_multi"
          - "'crt /etc/ssl/private/gitea.pem' in _haproxy_multi"
        fail_msg: >-
          Multi-entry render is missing a cert keyword on the SNI bind line.

    - name: Assert multi-entry render emits one use_backend ACL per service
      ansible.builtin.assert:
        that:
          - "'use_backend http_backend_infisical if { hdr(host) -i infisical.test.example.com }' in _haproxy_multi"
          - "'use_backend http_backend_gitea if { hdr(host) -i gitea.test.example.com }' in _haproxy_multi"
        fail_msg: >-
          Multi-entry render is missing a use_backend ACL — services would
          collide on the catch-all and all traffic would route to the first
          backend.

    - name: Assert multi-entry render emits one per-service backend block
      ansible.builtin.assert:
        that:
          - "'backend http_backend_infisical' in _haproxy_multi"
          - "'backend http_backend_gitea' in _haproxy_multi"
          - "'server infisical 192.168.0.108:8080 check' in _haproxy_multi"
          - "'server gitea 192.168.0.109:3000 check' in _haproxy_multi"
        fail_msg: >-
          Multi-entry render is missing a per-service backend or its server line.

    - name: HAProxy template rendering PASSED
      ansible.builtin.debug:
        msg: |
          HAProxy template assertions passed:
          - Default path (haproxy_http_enabled: false): TCP/syslog renders;
            HTTP/HTTPS Jinja block stays gated off; DRY audit is a true no-op
          - Single-entry enabled: frontend http_in redirects to HTTPS,
            frontend https_in terminates TLS via SNI cert, routes by Host
            header to per-service backend, sets X-Forwarded-Proto;
            option httplog appears exactly twice (frontends only)
          - Multi-entry enabled: exactly one bind *:80 and one bind *:443
            (CRITICAL fix), two crt entries on the SNI bind line, two
            use_backend ACLs, two per-service backends

- name: Render and verify seerr templates
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Mirror roles/seerr/defaults/main.yml (test stand-ins for the
    # SOPS-sourced API key and terraform_data ports).
    seerr_image: "ghcr.io/seerr-team/seerr:v3.3.0"
    seerr_container_name: seerr
    seerr_bind_address: "0.0.0.0"
    seerr_tz: "UTC"
    seerr_log_level: "info"
    seerr_web_port: 5055
    seerr_config_dir: /opt/seerr/config
    seerr_api_key: "test-seerr-apikey-placeholder"
    _template_dir: "../../roles/seerr/templates"

  tasks:
    - name: Render seerr docker-compose.yml.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/docker-compose.yml.j2"
        dest: /tmp/test_seerr_compose.yml
        mode: "0644"

    - name: Read rendered seerr docker-compose.yml
      ansible.builtin.slurp:
        src: /tmp/test_seerr_compose.yml
      register: _seerr_compose_raw

    - name: Decode seerr compose content
      ansible.builtin.set_fact:
        _seerr_compose: "{{ _seerr_compose_raw.content | b64decode }}"

    - name: Assert seerr compose references image, port 5055, config mount
      ansible.builtin.assert:
        that:
          - "'ghcr.io/seerr-team/seerr:v3.3.0' in _seerr_compose"
          - "'5055:5055' in _seerr_compose"
          - "'/app/config' in _seerr_compose"
        fail_msg: >-
          seerr docker-compose.yml.j2 missing image, port 5055, or the
          /app/config mount

    - name: Render seerr settings.json.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/settings.json.j2"
        dest: /tmp/test_seerr_settings.json
        mode: "0640"

    - name: Read rendered seerr settings.json
      ansible.builtin.slurp:
        src: /tmp/test_seerr_settings.json
      register: _seerr_settings_raw

    - name: Parse seerr settings.json (must be valid JSON with the seeded key)
      ansible.builtin.set_fact:
        _seerr_settings: "{{ _seerr_settings_raw.content | b64decode | from_json }}"

    - name: Assert settings.json seeds the deterministic main.apiKey and minimal shape
      ansible.builtin.assert:
        that:
          - _seerr_settings.main.apiKey == seerr_api_key
          - "'radarr' in _seerr_settings"
          - "'sonarr' in _seerr_settings"
          - _seerr_settings.radarr | length == 0
          - _seerr_settings.sonarr | length == 0
        fail_msg: >-
          settings.json.j2 does not seed main.apiKey or is not valid minimal JSON

    - name: Seerr template rendering PASSED
      ansible.builtin.debug:
        msg: |
          Seerr template assertions passed:
          - docker-compose.yml.j2: image, port 5055:5055, /app/config mount
          - settings.json.j2: valid JSON seeding the deterministic main.apiKey

# =============================================================================
# servarr_wiring API body-construction logic (mocked schema — no live apps)
# =============================================================================
# The wiring role builds each POST body by taking the app's API schema and
# overriding only the field VALUES it controls (pure Jinja, no custom filter).
# This is the load-bearing, error-prone logic. Here we feed a CANNED schema
# (exactly the shape Prowlarr / Sonarr return from /schema) and assert the merge
# produces the right fields array — proving correctness without any live app.
- name: Verify servarr_wiring field-merge logic against a mocked schema
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Canned Prowlarr "Sonarr application" schema fragment (as /applications/schema
    # returns it): default field entries the role must preserve or override.
    _mock_prowlarr_schema_fields:
      - name: prowlarrUrl
        value: ""
      - name: baseUrl
        value: ""
      - name: apiKey
        value: ""
      - name: syncCategories
        value: [5000, 5010, 5030, 5040]
      - name: syncRejectBlocklistedTorrentHashesWhileGrabbing
        value: false
    # The override values the role injects for a Sonarr application.
    _mock_app_values:
      prowlarrUrl: "http://192.0.2.10:9696"
      baseUrl: "http://192.0.2.11:8989"
      apiKey: "sonarr-key-placeholder"

    # This is the EXACT expression from roles/servarr_wiring/tasks/prowlarr_apps.yml
    # (_app_fields). Keep it identical so the test guards the real logic.
    _merged_fields: >-
      {{ (_mock_prowlarr_schema_fields | rejectattr('name', 'in', _mock_app_values.keys()) | list)
         + (_mock_app_values | dict2items(key_name='name', value_name='value')) }}

    # Canned qBittorrent download-client schema fragment (Sonarr /downloadclient/schema).
    _mock_qbt_schema_fields:
      - name: host
        value: ""
      - name: port
        value: 8080
      - name: useSsl
        value: false
      - name: username
        value: ""
      - name: password
        value: ""
      - name: tvCategory
        value: ""
      - name: recentTvPriority
        value: 0
    _mock_qbt_values:
      host: "192.0.2.12"
      port: 8080
      username: admin
      password: "qbt-pass-placeholder"
      useSsl: false
      tvCategory: "tv"
    _merged_qbt_fields: >-
      {{ (_mock_qbt_schema_fields | rejectattr('name', 'in', _mock_qbt_values.keys()) | list)
         + (_mock_qbt_values | dict2items(key_name='name', value_name='value')) }}

  tasks:
    - name: Index merged Prowlarr fields by name for assertions
      ansible.builtin.set_fact:
        _pf: "{{ _merged_fields | items2dict(key_name='name', value_name='value') }}"

    - name: Assert Prowlarr application fields override values and preserve schema defaults
      ansible.builtin.assert:
        that:
          # Overrides applied verbatim.
          - _pf.prowlarrUrl == "http://192.0.2.10:9696"
          - _pf.baseUrl == "http://192.0.2.11:8989"
          - _pf.apiKey == "sonarr-key-placeholder"
          # Schema default NOT in the override set is preserved untouched.
          - _pf.syncCategories == [5000, 5010, 5030, 5040]
          - _pf.syncRejectBlocklistedTorrentHashesWhileGrabbing == false
          # No duplicate field names (the override must REPLACE, not append).
          - (_merged_fields | map(attribute='name') | list | length)
            == (_merged_fields | map(attribute='name') | unique | list | length)
        fail_msg: >-
          servarr_wiring Prowlarr field-merge produced wrong fields:
          {{ _merged_fields }}

    - name: Index merged qBittorrent fields by name for assertions
      ansible.builtin.set_fact:
        _qf: "{{ _merged_qbt_fields | items2dict(key_name='name', value_name='value') }}"

    - name: Assert qBittorrent download-client fields override values and preserve defaults
      ansible.builtin.assert:
        that:
          - _qf.host == "192.0.2.12"
          - _qf.username == "admin"
          - _qf.tvCategory == "tv"
          - _qf.useSsl == false
          # Schema default not overridden is preserved.
          - _qf.recentTvPriority == 0
          - (_merged_qbt_fields | map(attribute='name') | list | length)
            == (_merged_qbt_fields | map(attribute='name') | unique | list | length)
        fail_msg: >-
          servarr_wiring qBittorrent field-merge produced wrong fields:
          {{ _merged_qbt_fields }}

    - name: Servarr_wiring field-merge logic PASSED
      ansible.builtin.debug:
        msg: |
          servarr_wiring field-merge assertions passed (mocked schema, no live apps):
          - Prowlarr application: prowlarrUrl/baseUrl/apiKey overridden,
            syncCategories preserved, no duplicate field names
          - qBittorrent client: host/username/tvCategory/useSsl overridden,
            recentTvPriority preserved, no duplicate field names

# =============================================================================
# traefik — static config, dynamic routers, and the ACME EnvironmentFile
# =============================================================================
# Render-only: proves the Route53 DNS-01 resolver, the wildcard cert request on
# each router, the inventory-derived backends, and that the creds land in the
# EnvironmentFile (not the dynamic config). No live ACME / Traefik in CI.
- name: Render and verify traefik templates
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Mirror roles/traefik/defaults/main.yml (scrubbed domain + test creds).
    traefik_base_domain: "pve.example.com"
    # ACME email is optional; empty here to prove it is OMITTED from the rendered
    # config (no email literal ever lives in a committed file).
    traefik_acme_email: ""
    traefik_acme_ca_server: "https://acme-v02.api.letsencrypt.org/directory"
    traefik_acme_storage: /etc/traefik/acme/acme.json
    traefik_dynamic_dir: /etc/traefik/dynamic
    traefik_acme_dns_resolvers: ["1.1.1.1:53", "8.8.8.8:53"]
    traefik_dashboard_enabled: true
    # basicAuth reads a usersFile the role generates on the host at build time;
    # only the path is in the config — never a credential.
    traefik_dashboard_users_file: /etc/traefik/dashboard.htpasswd
    traefik_tls_min_version: VersionTLS12
    # Test creds (placeholders) for the EnvironmentFile.
    traefik_acme_aws_access_key_id: "AKIATESTACCESSKEYID00"
    traefik_acme_aws_secret_access_key: "testsecretplaceholderplaceholderplaceholde"
    traefik_acme_aws_region: "us-east-1"
    traefik_acme_route53_zone_id: "Z0123456789ABCDEFGHIJ"
    # Routes as tasks/main.yml builds them from terraform_data.ingress
    # ({name, ip, port}) -> {name, fqdn, backend}.
    traefik_routes:
      - { name: plex, fqdn: "plex.pve.example.com", backend: "http://192.0.2.10:32400" }
      - { name: seerr, fqdn: "seerr.pve.example.com", backend: "http://192.0.2.11:5055" }
    _template_dir: "../../roles/traefik/templates"

  tasks:
    - name: Render traefik static config to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/traefik.yml.j2"
        dest: /tmp/test_traefik.yml
        mode: "0640"

    - name: Read rendered traefik static config
      ansible.builtin.slurp:
        src: /tmp/test_traefik.yml
      register: _traefik_static_raw

    - name: Decode traefik static config
      ansible.builtin.set_fact:
        _traefik_static: "{{ _traefik_static_raw.content | b64decode }}"

    - name: Assert static config uses Route53 DNS-01 + secured API + TLS hardening
      ansible.builtin.assert:
        that:
          - "'provider: route53' in _traefik_static"
          - "'acme-v02.api.letsencrypt.org' in _traefik_static"
          - "'/etc/traefik/acme/acme.json' in _traefik_static"
          - "'insecure: false' in _traefik_static"
          - "'minVersion: VersionTLS12' in _traefik_static"
          # Empty ACME email -> the email line is omitted entirely.
          - "'email:' not in _traefik_static"
          # Credentials must NOT appear in the (group-readable) static config.
          - "'AKIATESTACCESSKEYID00' not in _traefik_static"
        fail_msg: >-
          traefik.yml.j2 missing the route53 resolver / secured API / TLS floor,
          emitted an email when none was set, or leaked AWS creds into the config.

    - name: Render traefik dynamic config to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/dynamic.yml.j2"
        dest: /tmp/test_traefik_dynamic.yml
        mode: "0640"

    - name: Read rendered traefik dynamic config
      ansible.builtin.slurp:
        src: /tmp/test_traefik_dynamic.yml
      register: _traefik_dynamic_raw

    - name: Decode + parse traefik dynamic config (must be valid YAML)
      ansible.builtin.set_fact:
        _traefik_dynamic: "{{ _traefik_dynamic_raw.content | b64decode }}"
        _traefik_dynamic_yaml: "{{ _traefik_dynamic_raw.content | b64decode | from_yaml }}"

    - name: Assert routers front each service with the wildcard cert + backend
      ansible.builtin.assert:
        that:
          - "'Host(`plex.pve.example.com`)' in _traefik_dynamic"
          - "'Host(`seerr.pve.example.com`)' in _traefik_dynamic"
          - "'http://192.0.2.10:32400' in _traefik_dynamic"
          - "'http://192.0.2.11:5055' in _traefik_dynamic"
          - "'*.pve.example.com' in _traefik_dynamic"
          # Wildcard requested via the resolver; dashboard secured by a usersFile
          # (no credential inline — the role generates the file on the host).
          - _traefik_dynamic_yaml.http.routers.plex.tls.certResolver == "letsencrypt"
          - "'dashboard-auth' in _traefik_dynamic_yaml.http.routers.dashboard.middlewares"
          - >-
            _traefik_dynamic_yaml.http.middlewares['dashboard-auth'].basicAuth.usersFile
            == "/etc/traefik/dashboard.htpasswd"
          - _traefik_dynamic_yaml.http.services.plex.loadBalancer.servers[0].url == "http://192.0.2.10:32400"
        fail_msg: >-
          dynamic.yml.j2 missing a router/service, the wildcard SAN, or the
          usersFile-secured dashboard.

    - name: Render traefik ACME EnvironmentFile to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/acme.env.j2"
        dest: /tmp/test_traefik_acme.env
        mode: "0600"

    - name: Read rendered ACME EnvironmentFile
      ansible.builtin.slurp:
        src: /tmp/test_traefik_acme.env
      register: _traefik_env_raw

    - name: Decode ACME EnvironmentFile
      ansible.builtin.set_fact:
        _traefik_env: "{{ _traefik_env_raw.content | b64decode }}"

    - name: Assert EnvironmentFile carries the Route53 creds + zone id
      ansible.builtin.assert:
        that:
          - "'AWS_ACCESS_KEY_ID=AKIATESTACCESSKEYID00' in _traefik_env"
          - "'AWS_SECRET_ACCESS_KEY=' in _traefik_env"
          - "'AWS_REGION=us-east-1' in _traefik_env"
          # AWS_HOSTED_ZONE_ID set -> lego can skip ListHostedZonesByName.
          - "'AWS_HOSTED_ZONE_ID=Z0123456789ABCDEFGHIJ' in _traefik_env"
        fail_msg: "acme.env.j2 missing one of the Route53 DNS-01 env vars"

    - name: Traefik template rendering PASSED
      ansible.builtin.debug:
