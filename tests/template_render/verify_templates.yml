---
# Template rendering verification playbook
# Renders cribl_docker_stack role templates offline and asserts on expected content.
#
# Usage:
#   ansible-playbook tests/template_render/verify_templates.yml -c local
#
# Covers:
#   - docker-stack.yml.j2 publishes syslog ports 1514-1518 (TCP + UDP each)
#   - docker-stack.yml.j2 publishes netflow port 2055 (UDP)
#   - cribl/inputs.yml.j2 renders combined syslog listeners (TCP+UDP) for each port
#   - stream/inputs.yml.j2 renders IPFIX/NetFlow UDP listener on port 2055
#   - outputs.yml.j2 renders HEC URL with correct splunk host

- name: Render and verify cribl_docker_stack templates
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Mirror the role defaults (cribl_docker_stack/defaults/main.yml).
    # Role default is `cribl/cribl:latest`; this fixture tracks the same tag
    # so the test never silently freezes on an old version. The previous
    # hand-pin (`cribl/cribl:4.10.1`) is what motivated this — by the time
    # it was noticed, it had drifted 8 minor versions behind the role
    # default and was no longer testing what the role actually deploys.
    cribl_docker_stack_image: "cribl/cribl:latest"
    cribl_docker_stack_edge_replicas: 2
    cribl_docker_stack_edge_cpu_limit: "1"
    cribl_docker_stack_edge_memory_limit: "1024M"
    cribl_docker_stack_edge_cpu_reservation: "0.5"
    cribl_docker_stack_edge_memory_reservation: "256M"
    cribl_docker_stack_stream_replicas: 1
    cribl_docker_stack_stream_cpu_limit: "1"
    cribl_docker_stack_stream_memory_limit: "1024M"
    cribl_docker_stack_stream_cpu_reservation: "0.5"
    cribl_docker_stack_stream_memory_reservation: "256M"
    cribl_docker_stack_syslog_ports:
      - 1514
      - 1515
      - 1516
      - 1517
      - 1518
    cribl_docker_stack_netflow_port: 2055
    cribl_docker_stack_edge_web_port: 9000
    cribl_docker_stack_stream_web_port: 9100
    cribl_docker_stack_healthcheck_interval: "60s"
    cribl_docker_stack_healthcheck_timeout: "30s"
    cribl_docker_stack_healthcheck_retries: 5
    cribl_docker_stack_healthcheck_start_period: "120s"
    cribl_docker_stack_config_dir: /opt/cribl/config
    # Test values for HEC output — splunk host and token
    cribl_docker_stack_splunk_host: "192.168.0.200"
    cribl_docker_stack_hec_url: "https://192.168.0.200:8088"
    cribl_docker_stack_hec_token: "test-hec-token-12345"
    cribl_docker_stack_hec_tls_verify: false
    # Template source root — relative to playbook location, role is at repo root
    _template_dir: "../../roles/cribl_docker_stack/templates"

  tasks:
    # -------------------------------------------------------------------------
    # docker-stack.yml.j2
    # -------------------------------------------------------------------------
    - name: Render docker-stack.yml.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/docker-stack.yml.j2"
        dest: /tmp/test_docker_stack.yml
        mode: "0644"

    - name: Read rendered docker-stack.yml
      ansible.builtin.slurp:
        src: /tmp/test_docker_stack.yml
      register: _docker_stack_raw

    - name: Decode docker-stack content
      ansible.builtin.set_fact:
        _docker_stack: "{{ _docker_stack_raw.content | b64decode }}"

    - name: Assert docker-stack publishes each syslog port (TCP)
      ansible.builtin.assert:
        that:
          - "('published: ' ~ item ~ '\n        protocol: tcp') in _docker_stack"
        fail_msg: "docker-stack.yml.j2 is missing TCP publish for syslog port {{ item }}"
      loop: "{{ cribl_docker_stack_syslog_ports }}"

    - name: Assert docker-stack publishes each syslog port (UDP)
      ansible.builtin.assert:
        that:
          - "('published: ' ~ item ~ '\n        protocol: udp') in _docker_stack"
        fail_msg: "docker-stack.yml.j2 is missing UDP publish for syslog port {{ item }}"
      loop: "{{ cribl_docker_stack_syslog_ports }}"

    - name: Assert docker-stack publishes netflow port 2055 (UDP)
      ansible.builtin.assert:
        that:
          - "('published: 2055\n        protocol: udp') in _docker_stack"
        fail_msg: "docker-stack.yml.j2 is missing netflow port 2055 UDP publish"

    - name: Assert docker-stack references cribl image
      ansible.builtin.assert:
        that:
          - "'image: ' ~ cribl_docker_stack_image in _docker_stack"
        fail_msg: "docker-stack.yml.j2 does not reference expected image {{ cribl_docker_stack_image }}"

    # -------------------------------------------------------------------------
    # inputs.yml.j2
    # -------------------------------------------------------------------------
    - name: Render inputs.yml.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/cribl/inputs.yml.j2"
        dest: /tmp/test_inputs.yml
        mode: "0644"

    - name: Read rendered inputs.yml
      ansible.builtin.slurp:
        src: /tmp/test_inputs.yml
      register: _inputs_raw

    - name: Decode inputs content
      ansible.builtin.set_fact:
        _inputs: "{{ _inputs_raw.content | b64decode }}"

    - name: Assert inputs.yml has combined syslog listener for each port
      ansible.builtin.assert:
        that:
          - "'in_syslog_' ~ item in _inputs"
          - "'tcpPort: ' ~ item in _inputs"
          - "'udpPort: ' ~ item in _inputs"
        fail_msg: "inputs.yml.j2 is missing syslog listener for port {{ item }}"
      loop: "{{ cribl_docker_stack_syslog_ports }}"

    # -------------------------------------------------------------------------
    # stream/inputs.yml.j2 (IPFIX/NetFlow handled by Cribl Stream, not Edge)
    # -------------------------------------------------------------------------
    - name: Render stream/inputs.yml.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/stream/inputs.yml.j2"
        dest: /tmp/test_stream_inputs.yml
        mode: "0644"

    - name: Read rendered stream/inputs.yml
      ansible.builtin.slurp:
        src: /tmp/test_stream_inputs.yml
      register: _stream_inputs_raw

    - name: Decode stream inputs content
      ansible.builtin.set_fact:
        _stream_inputs: "{{ _stream_inputs_raw.content | b64decode }}"

    - name: Assert stream/inputs.yml has IPFIX/NetFlow UDP listener on port 2055
      ansible.builtin.assert:
        that:
          - "'in_ipfix' in _stream_inputs"
          - "'port: 2055' in _stream_inputs"
          - "'type: netflow' in _stream_inputs"
        fail_msg: "stream/inputs.yml.j2 is missing IPFIX/NetFlow UDP listener on port 2055"

    # -------------------------------------------------------------------------
    # outputs.yml.j2
    # -------------------------------------------------------------------------
    - name: Render outputs.yml.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/cribl/outputs.yml.j2"
        dest: /tmp/test_outputs.yml
        mode: "0644"

    - name: Read rendered outputs.yml
      ansible.builtin.slurp:
        src: /tmp/test_outputs.yml
      register: _outputs_raw

    - name: Decode outputs content
      ansible.builtin.set_fact:
        _outputs: "{{ _outputs_raw.content | b64decode }}"

    - name: Assert outputs.yml HEC URL points to correct splunk host
      ansible.builtin.assert:
        that:
          - "'https://192.168.0.200:8088' in _outputs"
        fail_msg: >-
          outputs.yml.j2 HEC URL does not point to 192.168.0.200:8088;
          rendered content: {{ _outputs }}

    - name: Assert outputs.yml includes splunk_hec output type
      ansible.builtin.assert:
        that:
          - "'type: splunk_hec' in _outputs"
        fail_msg: "outputs.yml.j2 does not define a splunk_hec output"

    - name: Assert outputs.yml includes HEC token
      ansible.builtin.assert:
        that:
          - "cribl_docker_stack_hec_token in _outputs"
        fail_msg: "outputs.yml.j2 does not include HEC token"

    # -------------------------------------------------------------------------
    # Summary
    # -------------------------------------------------------------------------
    - name: Template rendering verification PASSED
      ansible.builtin.debug:
        msg: |
          All template rendering assertions passed:
          - docker-stack.yml.j2: syslog ports 1514-1518 published (TCP+UDP), netflow 2055 (UDP)
          - cribl/inputs.yml.j2: combined syslog listeners (TCP+UDP) for ports 1514-1518
          - stream/inputs.yml.j2: IPFIX/NetFlow on port 2055
          - outputs.yml.j2: HEC URL -> https://192.168.0.200:8088, type: splunk_hec

- name: Render and verify mailpit_docker templates
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Mirror roles/mailpit_docker/defaults/main.yml
    mailpit_docker_image: "axllent/mailpit:v1.29.2"
    mailpit_docker_container_name: mailpit
    mailpit_docker_smtp_port: 1025
    mailpit_docker_web_port: 8025
    mailpit_docker_data_dir: /opt/mailpit
    mailpit_docker_relay_starttls: true
    mailpit_docker_relay_all: false
    mailpit_docker_relay_host: "smtp.test.example.com"
    mailpit_docker_relay_port: "587"
    mailpit_docker_relay_username: "testuser"
    mailpit_docker_relay_password: "test-placeholder"
    _template_dir: "../../roles/mailpit_docker/templates"

  tasks:
    - name: Render mailpit docker-compose.yml.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/docker-compose.yml.j2"
        dest: /tmp/test_mailpit_compose.yml
        mode: "0644"

    - name: Read rendered mailpit docker-compose.yml
      ansible.builtin.slurp:
        src: /tmp/test_mailpit_compose.yml
      register: _mailpit_compose_raw

    - name: Decode mailpit compose content
      ansible.builtin.set_fact:
        _mailpit_compose: "{{ _mailpit_compose_raw.content | b64decode }}"

    - name: Assert mailpit compose has expected ports
      ansible.builtin.assert:
        that:
          - "'1025:1025' in _mailpit_compose"
          - "'8025:8025' in _mailpit_compose"
        fail_msg: >-
          mailpit docker-compose.yml.j2 missing expected port mappings

    - name: Assert mailpit compose has expected image
      ansible.builtin.assert:
        that:
          - "'axllent/mailpit:v1.29.2' in _mailpit_compose"
        fail_msg: "mailpit docker-compose.yml.j2 does not reference expected image"

    - name: Assert mailpit compose has relay env vars
      ansible.builtin.assert:
        that:
          - "'MP_SMTP_RELAY_HOST' in _mailpit_compose"
          - "'MP_SMTP_RELAY_STARTTLS' in _mailpit_compose"
        fail_msg: "mailpit docker-compose.yml.j2 missing relay environment variables"

    - name: Mailpit template rendering PASSED
      ansible.builtin.debug:
        msg: |
          Mailpit template assertions passed:
          - docker-compose.yml.j2: SMTP port 1025, web port 8025, image, relay env vars

- name: Render and verify ntfy_docker templates
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Mirror roles/ntfy_docker/defaults/main.yml
    ntfy_docker_image: "binwiederhier/ntfy:v2.17.0"
    ntfy_docker_container_name: ntfy
    ntfy_docker_http_port: 8080
    ntfy_docker_data_dir: /opt/ntfy
    ntfy_docker_cache_duration: "12h"
    ntfy_docker_attachment_cache_dir: /var/cache/ntfy/attachments
    ansible_host: "192.168.0.111"
    _template_dir: "../../roles/ntfy_docker/templates"

  tasks:
    - name: Render ntfy docker-compose.yml.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/docker-compose.yml.j2"
        dest: /tmp/test_ntfy_compose.yml
        mode: "0644"

    - name: Read rendered ntfy docker-compose.yml
      ansible.builtin.slurp:
        src: /tmp/test_ntfy_compose.yml
      register: _ntfy_compose_raw

    - name: Decode ntfy compose content
      ansible.builtin.set_fact:
        _ntfy_compose: "{{ _ntfy_compose_raw.content | b64decode }}"

    - name: Assert ntfy compose has expected port mapping
      ansible.builtin.assert:
        that:
          - "'8080:80' in _ntfy_compose"
        fail_msg: >-
          ntfy docker-compose.yml.j2 missing expected port mapping 8080:80

    - name: Assert ntfy compose has expected image
      ansible.builtin.assert:
        that:
          - "'binwiederhier/ntfy:v2.17.0' in _ntfy_compose"
        fail_msg: "ntfy docker-compose.yml.j2 does not reference expected image"

    - name: Assert ntfy compose mounts server.yml config
      ansible.builtin.assert:
        that:
          - "'server.yml:ro' in _ntfy_compose"
        fail_msg: "ntfy docker-compose.yml.j2 missing server.yml config mount"

    - name: Render ntfy server.yml.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/server.yml.j2"
        dest: /tmp/test_ntfy_server.yml
        mode: "0644"

    - name: Read rendered ntfy server.yml
      ansible.builtin.slurp:
        src: /tmp/test_ntfy_server.yml
      register: _ntfy_server_raw

    - name: Decode ntfy server content
      ansible.builtin.set_fact:
        _ntfy_server: "{{ _ntfy_server_raw.content | b64decode }}"

    - name: Assert ntfy server.yml has expected configuration
      ansible.builtin.assert:
        that:
          - "'cache-file' in _ntfy_server"
          - "'listen-http: \":80\"' in _ntfy_server"
          - "'cache-duration' in _ntfy_server"
        fail_msg: >-
          ntfy server.yml.j2 missing expected configuration;
          rendered content: {{ _ntfy_server }}

    - name: Ntfy template rendering PASSED
      ansible.builtin.debug:
        msg: |
          Ntfy template assertions passed:
          - docker-compose.yml.j2: HTTP port 8080:80, image, config mount
          - server.yml.j2: cache-file, listen-http, cache-duration

- name: Render and verify openproject_docker templates
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Mirror roles/openproject_docker/defaults/main.yml
    openproject_docker_image: "openproject/community:15"
    openproject_docker_container_name: openproject
    openproject_docker_data_dir: /opt/openproject
    openproject_docker_web_port: 80
    openproject_docker_host_name: "openproject.test.example.com"
    openproject_docker_https: false
    openproject_docker_secret_key_base: "test-secret-key-base-placeholder-do-not-use-in-production"
    openproject_docker_smtp_address: "192.168.0.110"
    openproject_docker_smtp_port: 1025
    openproject_docker_smtp_domain: "test.example.com"
    openproject_docker_mail_from: "openproject@test.example.com"
    openproject_docker_admin_email: "admin@test.example.com"
    openproject_docker_default_language: en
    openproject_docker_rails_env: production
    openproject_docker_web_concurrency: 2
    _template_dir: "../../roles/openproject_docker/templates"

  tasks:
    - name: Render openproject docker-compose.yml.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/docker-compose.yml.j2"
        dest: /tmp/test_openproject_compose.yml
        mode: "0644"

    - name: Read rendered openproject docker-compose.yml
      ansible.builtin.slurp:
        src: /tmp/test_openproject_compose.yml
      register: _openproject_compose_raw

    - name: Decode openproject compose content
      ansible.builtin.set_fact:
        _openproject_compose: "{{ _openproject_compose_raw.content | b64decode }}"

    - name: Assert openproject compose references expected image
      ansible.builtin.assert:
        that:
          - "'openproject/community:15' in _openproject_compose"
        fail_msg: "openproject docker-compose.yml.j2 does not reference expected image"

    - name: Assert openproject compose publishes web port 80
      ansible.builtin.assert:
        that:
          - "'80:80' in _openproject_compose"
        fail_msg: "openproject docker-compose.yml.j2 missing web port mapping 80:80"

    - name: Assert openproject compose uses OPENPROJECT_-prefixed secret env var
      ansible.builtin.assert:
        that:
          - "'OPENPROJECT_SECRET_KEY_BASE' in _openproject_compose"
        fail_msg: >-
          openproject docker-compose.yml.j2 must pass the secret as
          OPENPROJECT_SECRET_KEY_BASE (the OpenProject image config layer
          expects the OPENPROJECT_ prefix)

    - name: Assert openproject compose configures SMTP env vars
      ansible.builtin.assert:
        that:
          - "'OPENPROJECT_SMTP__ADDRESS' in _openproject_compose"
          - "'OPENPROJECT_SMTP__PORT' in _openproject_compose"
          - "'192.168.0.110' in _openproject_compose"
        fail_msg: >-
          openproject docker-compose.yml.j2 missing SMTP relay env vars
          (OPENPROJECT_SMTP__ADDRESS / __PORT) or SMTP host substitution

    - name: Assert openproject compose mounts persistent volumes
      ansible.builtin.assert:
        that:
          - "'/opt/openproject/pgdata:/var/openproject/pgdata' in _openproject_compose"
          - "'/opt/openproject/assets:/var/openproject/assets' in _openproject_compose"
        fail_msg: >-
          openproject docker-compose.yml.j2 missing required persistent
          volume mounts for pgdata and assets

    - name: Assert openproject compose sets OPENPROJECT_HOST__NAME
      ansible.builtin.assert:
        that:
          - "'OPENPROJECT_HOST__NAME' in _openproject_compose"
          - "'openproject.test.example.com' in _openproject_compose"
        fail_msg: >-
          openproject docker-compose.yml.j2 missing OPENPROJECT_HOST__NAME
          or did not substitute the FQDN

    - name: OpenProject template rendering PASSED
      ansible.builtin.debug:
        msg: |
          OpenProject template assertions passed:
          - docker-compose.yml.j2: image, port 80:80, OPENPROJECT_SECRET_KEY_BASE,
            SMTP env vars, persistent volumes, host name

- name: Render and verify infisical_docker templates
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Mirror roles/infisical_docker/defaults/main.yml (test stand-ins for
    # SOPS-sourced env lookups and tofu_data constants).
    infisical_docker_postgres_image: "postgres:14-alpine"
    infisical_docker_redis_image: "redis:7-alpine"
    infisical_docker_app_image: "infisical/infisical:latest"
    infisical_docker_container_name: infisical
    infisical_docker_data_dir: /opt/infisical
    infisical_docker_postgres_data_dir: /opt/infisical/postgres
    infisical_docker_redis_data_dir: /opt/infisical/redis
    infisical_docker_postgres_internal_data: /var/lib/postgresql/data
    infisical_docker_redis_internal_data: /data
    infisical_docker_db_service: db
    infisical_docker_redis_service: redis
    infisical_docker_app_service: infisical
    infisical_docker_db_name: infisical
    infisical_docker_db_user: infisical
    infisical_docker_restart_policy: unless-stopped
    infisical_docker_api_port: 8080
    infisical_docker_postgres_port: 5432
    infisical_docker_redis_port: 6379
    infisical_docker_site_url: "https://infisical.test.example.com"
    infisical_docker_db_uri: "postgres://infisical:test-db-pw@db:5432/infisical"
    infisical_docker_redis_url: "redis://redis:6379"
    infisical_docker_encryption_key: "test-encryption-key-placeholder-do-not-use"
    infisical_docker_auth_secret: "test-auth-secret-placeholder-do-not-use"
    infisical_docker_db_password: "test-db-pw"
    _template_dir: "../../roles/infisical_docker/templates"

  tasks:
    - name: Render infisical docker-compose.yml.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/docker-compose.yml.j2"
        dest: /tmp/test_infisical_compose.yml
        mode: "0644"

    - name: Read rendered infisical docker-compose.yml
      ansible.builtin.slurp:
        src: /tmp/test_infisical_compose.yml
      register: _infisical_compose_raw

    - name: Decode infisical compose content
      ansible.builtin.set_fact:
        _infisical_compose: "{{ _infisical_compose_raw.content | b64decode }}"

    - name: Assert infisical compose references all three expected images
      ansible.builtin.assert:
        that:
          - "'postgres:14-alpine' in _infisical_compose"
          - "'redis:7-alpine' in _infisical_compose"
          - "'infisical/infisical:latest' in _infisical_compose"
        fail_msg: >-
          infisical docker-compose.yml.j2 missing one of the three required
          images (postgres:14-alpine, redis:7-alpine, infisical/infisical:latest)

    - name: Assert infisical compose publishes api port 8080:8080
      ansible.builtin.assert:
        that:
          - "'8080:8080' in _infisical_compose"
        fail_msg: >-
          infisical docker-compose.yml.j2 missing api port mapping 8080:8080
          (service_ports.infisical_api must be on both sides)

    - name: Assert infisical compose builds DB_CONNECTION_URI from vars (no literal port)
      ansible.builtin.assert:
        that:
          - "'DB_CONNECTION_URI' in _infisical_compose"
          - "'postgres://infisical:test-db-pw@db:5432/infisical' in _infisical_compose"
        fail_msg: >-
          infisical docker-compose.yml.j2 missing DB_CONNECTION_URI or it does
          not assemble from the DRY pieces (user, password, service host,
          postgres_default port, db_name)

    - name: Assert infisical compose builds REDIS_URL from vars (no literal port)
      ansible.builtin.assert:
        that:
          - "'REDIS_URL' in _infisical_compose"
          - "'redis://redis:6379' in _infisical_compose"
        fail_msg: >-
          infisical docker-compose.yml.j2 missing REDIS_URL or it does not
          assemble from the redis service host + redis_default port

    - name: Assert infisical compose sets SITE_URL to the HTTPS FQDN
      ansible.builtin.assert:
        that:
          - "'SITE_URL' in _infisical_compose"
          - "'https://infisical.test.example.com' in _infisical_compose"
        fail_msg: >-
          infisical docker-compose.yml.j2 missing SITE_URL or did not
          substitute the HTTPS FQDN

    - name: Assert infisical compose mounts persistent volumes for postgres and redis
      ansible.builtin.assert:
        that:
          - "'/opt/infisical/postgres:/var/lib/postgresql/data' in _infisical_compose"
          - "'/opt/infisical/redis:/data' in _infisical_compose"
        fail_msg: >-
          infisical docker-compose.yml.j2 missing required persistent volume
          mounts for postgres and redis

    - name: Assert infisical compose passes ENCRYPTION_KEY and AUTH_SECRET
      ansible.builtin.assert:
        that:
          - "'ENCRYPTION_KEY' in _infisical_compose"
          - "'AUTH_SECRET' in _infisical_compose"
        fail_msg: >-
          infisical docker-compose.yml.j2 must pass ENCRYPTION_KEY and
          AUTH_SECRET (Infisical fails to start without them)

    - name: Infisical template rendering PASSED
      ansible.builtin.debug:
        msg: |
          Infisical template assertions passed:
          - docker-compose.yml.j2: postgres+redis+app images, port 8080:8080,
            DB_CONNECTION_URI, REDIS_URL, SITE_URL, persistent volumes,
            ENCRYPTION_KEY/AUTH_SECRET

- name: Render and verify haproxy templates
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Mirror roles/haproxy/defaults/main.yml (only vars referenced by haproxy.cfg.j2)
    haproxy_stats_enabled: true
    haproxy_stats_port: 8404
    haproxy_stats_user: admin
    haproxy_stats_password: "test-stats-placeholder"
    haproxy_stats_timeout: "30s"
    haproxy_stats_refresh: "10s"
    haproxy_algorithm: roundrobin
    haproxy_mode_tcp: tcp
    haproxy_mode_http: http
    haproxy_log_option_tcp: tcplog
    haproxy_log_option_http: httplog
    haproxy_ssl_ca_base: /etc/ssl/certs
    haproxy_ssl_crt_base: /etc/ssl/private
    haproxy_timeout_connect: 5000
    haproxy_timeout_client: 60000
    haproxy_timeout_server: 60000
    haproxy_health_check_interval: 5000
    haproxy_health_check_timeout: 5000
    haproxy_http_port: 80
    haproxy_https_port: 443
    haproxy_http_redirect_code: 301
    haproxy_http_forwardfor: true
    haproxy_syslog_port_mappings:
      - { frontend: 514, backend: 1514, name: unifi }
      - { frontend: 515, backend: 1515, name: palo_alto }
    haproxy_syslog_backend_servers:
      - inventory_hostname: cribl-edge-01
        container_ip: 192.168.0.180
      - inventory_hostname: cribl-edge-02
        container_ip: 192.168.0.181
    haproxy_cribl_s2s_port: 10300
    haproxy_ipfix_backend_servers:
      - inventory_hostname: cribl-stream-01
        container_ip: 192.168.0.182
      - inventory_hostname: cribl-stream-02
        container_ip: 192.168.0.183
    # Mirror the ai_log_routing-derived default (two representative entries).
    haproxy_ai_log_mappings:
      claude_code: { port: 10311, index: claude, sourcetype: "claude:code" }
      openbao_audit: { port: 10331, index: openbao_audit, sourcetype: "openbao:audit" }
    # nginx-stream.conf.j2 inputs (mirror role defaults; macos relay enabled =
    # the family is absent from the fixture's syslog mappings above).
    haproxy_netflow_port:
      frontend: 2055
      backend: 2055
    haproxy_macos_syslog_port:
      frontend: 521
      backend: 1521
    haproxy_macos_udp_relay_enabled: true
    _template_dir: "../../roles/haproxy/templates"

  tasks:
    # =========================================================================
    # Default path: haproxy_http_enabled=false (existing behavior, no opt-in)
    # =========================================================================
    - name: Render haproxy.cfg.j2 with HTTP disabled
      ansible.builtin.template:
        src: "{{ _template_dir }}/haproxy.cfg.j2"
        dest: /tmp/test_haproxy_disabled.cfg
        mode: "0644"
      vars:
        haproxy_http_enabled: false
        haproxy_http_frontends: []

    - name: Read rendered haproxy.cfg (disabled)
      ansible.builtin.slurp:
        src: /tmp/test_haproxy_disabled.cfg
      register: _haproxy_disabled_raw

    - name: Decode haproxy.cfg disabled content
      ansible.builtin.set_fact:
        _haproxy_disabled: "{{ _haproxy_disabled_raw.content | b64decode }}"

    - name: Assert disabled config keeps TCP/syslog frontends and backends (DRY audit no-op)
      ansible.builtin.assert:
        that:
          - "'mode tcp' in _haproxy_disabled"
          - "'option tcplog' in _haproxy_disabled"
          - "'timeout connect 5000' in _haproxy_disabled"
          - "'timeout client 60000' in _haproxy_disabled"
          - "'ca-base /etc/ssl/certs' in _haproxy_disabled"
          - "'crt-base /etc/ssl/private' in _haproxy_disabled"
          - "'frontend syslog_unifi_514' in _haproxy_disabled"
          - "'bind *:514' in _haproxy_disabled"
          - "'default_backend syslog_backend_1514' in _haproxy_disabled"
          - "'backend syslog_backend_1514' in _haproxy_disabled"
          - "'server cribl-edge-01 192.168.0.180:1514' in _haproxy_disabled"
          - "'frontend cribl_s2s_10300' in _haproxy_disabled"
          - "'bind *:10300' in _haproxy_disabled"
          - "'server cribl-stream-01 192.168.0.182:10300' in _haproxy_disabled"
        fail_msg: >-
          DRY audit caused a behavior change with HTTP disabled — TCP/syslog
          rendering differs from prior literal-baked config.

    - name: Assert AI ingest frontends and backends render toward the Stream pair
      ansible.builtin.assert:
        that:
          - "'frontend ai_claude_code_10311' in _haproxy_disabled"
          - "'bind *:10311' in _haproxy_disabled"
          - "'default_backend ai_backend_10311' in _haproxy_disabled"
          - "'backend ai_backend_10311' in _haproxy_disabled"
          - "'server cribl-stream-01 192.168.0.182:10311' in _haproxy_disabled"
          - "'server cribl-stream-02 192.168.0.183:10311' in _haproxy_disabled"
          - "'frontend ai_openbao_audit_10331' in _haproxy_disabled"
          - "'server cribl-stream-01 192.168.0.182:10331' in _haproxy_disabled"
        fail_msg: >-
          haproxy.cfg.j2 did not render an AI ingest frontend/backend pair per
          ai_log_routing entry pointing at the Cribl Stream servers.

    - name: Assert disabled config DOES NOT emit any HTTP/HTTPS frontends or backends
      ansible.builtin.assert:
        that:
          - "'frontend http_in' not in _haproxy_disabled"
          - "'frontend https_in' not in _haproxy_disabled"
          - "'http_backend_' not in _haproxy_disabled"
          - "'use_backend' not in _haproxy_disabled"
          - "'X-Forwarded-Proto' not in _haproxy_disabled"
        fail_msg: >-
          HTTP/HTTPS section leaked into the rendered config even though
          haproxy_http_enabled was false. The Jinja conditional gate is broken.

    # =========================================================================
    # Enabled path: single frontend entry (the Infisical case)
    # =========================================================================
    - name: Render haproxy.cfg.j2 with HTTP enabled and one frontend
      ansible.builtin.template:
        src: "{{ _template_dir }}/haproxy.cfg.j2"
        dest: /tmp/test_haproxy_single.cfg
        mode: "0644"
      vars:
        haproxy_http_enabled: true
        haproxy_http_frontends:
          - name: infisical
            server_name: infisical.test.example.com
            backend_host: 192.168.0.108
            backend_port: 8080
            cert_path: /etc/ssl/private/infisical.pem

    - name: Read rendered haproxy.cfg (single)
      ansible.builtin.slurp:
        src: /tmp/test_haproxy_single.cfg
      register: _haproxy_single_raw

    - name: Decode haproxy.cfg single content
      ansible.builtin.set_fact:
        _haproxy_single: "{{ _haproxy_single_raw.content | b64decode }}"

    - name: Assert single-entry render has one http_in frontend with HTTPS redirect
      ansible.builtin.assert:
        that:
          - "'frontend http_in' in _haproxy_single"
          - "'bind *:80' in _haproxy_single"
          - "'redirect scheme https code 301' in _haproxy_single"
        fail_msg: >-
          frontend http_in is missing or the HTTPS redirect is malformed.

    - name: Assert single-entry render has https_in with SNI cert bind and per-Host routing
      ansible.builtin.assert:
        that:
          - "'frontend https_in' in _haproxy_single"
          - "'bind *:443 ssl crt /etc/ssl/private/infisical.pem' in _haproxy_single"
          - "'use_backend http_backend_infisical if { hdr(host) -i infisical.test.example.com }' in _haproxy_single"
          - "'http-request set-header X-Forwarded-Proto https' in _haproxy_single"
          - "'option forwardfor' in _haproxy_single"
        fail_msg: >-
          frontend https_in is missing one of: SNI cert bind, use_backend ACL,
          X-Forwarded-Proto header, or option forwardfor.

    - name: Assert single-entry render has per-service backend pointed at backend_host
      ansible.builtin.assert:
        that:
          - "'backend http_backend_infisical' in _haproxy_single"
          - "'server infisical 192.168.0.108:8080 check' in _haproxy_single"
        fail_msg: >-
          backend http_backend_infisical missing or server line does not point
          at backend_host:backend_port.

    - name: Assert single-entry render keeps option httplog out of the backend section
      ansible.builtin.assert:
        that:
          # option httplog must appear exactly twice (once per frontend) and
          # never in any backend section. HAProxy rejects it in backends.
          - "_haproxy_single.count('option httplog') == 2"
        fail_msg: >-
          option httplog occurrence count is {{ _haproxy_single.count('option httplog') }};
          expected exactly 2 (one in http_in, one in https_in). If higher, it
          leaked into a backend and HAProxy will reject the config.

    - name: Assert single-entry render preserves TCP/syslog section alongside HTTP
      ansible.builtin.assert:
        that:
          - "'frontend syslog_unifi_514' in _haproxy_single"
          - "'backend syslog_backend_1514' in _haproxy_single"
        fail_msg: >-
          TCP/syslog frontends or backends disappeared when HTTP was enabled.

    # =========================================================================
    # Multi-entry render: verifies the CRITICAL bug fix (no port duplication)
    # =========================================================================
    - name: Render haproxy.cfg.j2 with HTTP enabled and two frontends
      ansible.builtin.template:
        src: "{{ _template_dir }}/haproxy.cfg.j2"
        dest: /tmp/test_haproxy_multi.cfg
        mode: "0644"
      vars:
        haproxy_http_enabled: true
        haproxy_http_frontends:
          - name: infisical
            server_name: infisical.test.example.com
            backend_host: 192.168.0.108
            backend_port: 8080
            cert_path: /etc/ssl/private/infisical.pem
          - name: gitea
            server_name: gitea.test.example.com
            backend_host: 192.168.0.109
            backend_port: 3000
            cert_path: /etc/ssl/private/gitea.pem

    - name: Read rendered haproxy.cfg (multi)
      ansible.builtin.slurp:
        src: /tmp/test_haproxy_multi.cfg
      register: _haproxy_multi_raw

    - name: Decode haproxy.cfg multi content
      ansible.builtin.set_fact:
        _haproxy_multi: "{{ _haproxy_multi_raw.content | b64decode }}"

    - name: Assert multi-entry render does NOT duplicate bind lines (CRITICAL fix)
      ansible.builtin.assert:
        that:
          - "_haproxy_multi.count('bind *:80') == 1"
          - "_haproxy_multi.count('bind *:443') == 1"
          - "_haproxy_multi.count('frontend http_in') == 1"
          - "_haproxy_multi.count('frontend https_in') == 1"
        fail_msg: >-
          Multi-entry render duplicated a port bind or frontend. HAProxy would
          fail to start with "Address already in use". This is exactly the
          original gemini-code-assist CRITICAL finding and must stay fixed.

    - name: Assert multi-entry render lists both certs on the single SNI bind line
      ansible.builtin.assert:
        that:
          - "'crt /etc/ssl/private/infisical.pem' in _haproxy_multi"
          - "'crt /etc/ssl/private/gitea.pem' in _haproxy_multi"
        fail_msg: >-
          Multi-entry render is missing a cert keyword on the SNI bind line.

    - name: Assert multi-entry render emits one use_backend ACL per service
      ansible.builtin.assert:
        that:
          - "'use_backend http_backend_infisical if { hdr(host) -i infisical.test.example.com }' in _haproxy_multi"
          - "'use_backend http_backend_gitea if { hdr(host) -i gitea.test.example.com }' in _haproxy_multi"
        fail_msg: >-
          Multi-entry render is missing a use_backend ACL — services would
          collide on the catch-all and all traffic would route to the first
          backend.

    - name: Assert multi-entry render emits one per-service backend block
      ansible.builtin.assert:
        that:
          - "'backend http_backend_infisical' in _haproxy_multi"
          - "'backend http_backend_gitea' in _haproxy_multi"
          - "'server infisical 192.168.0.108:8080 check' in _haproxy_multi"
          - "'server gitea 192.168.0.109:3000 check' in _haproxy_multi"
        fail_msg: >-
          Multi-entry render is missing a per-service backend or its server line.

    # =========================================================================
    # nginx-stream.conf.j2 — UDP LB incl. the dedicated macOS syslog relay
    # =========================================================================
    - name: Render nginx-stream.conf.j2 (macos relay enabled)
      ansible.builtin.template:
        src: "{{ _template_dir }}/nginx-stream.conf.j2"
        dest: /tmp/test_nginx_stream_macos.conf
        mode: "0644"

    - name: Render nginx-stream.conf.j2 (macos relay self-disabled)
      ansible.builtin.template:
        src: "{{ _template_dir }}/nginx-stream.conf.j2"
        dest: /tmp/test_nginx_stream_no_macos.conf
        mode: "0644"
      vars:
        haproxy_macos_udp_relay_enabled: false

    - name: Read rendered nginx-stream configs
      ansible.builtin.slurp:
        src: "{{ item }}"
      register: _nginx_stream_raw
      loop:
        - /tmp/test_nginx_stream_macos.conf
        - /tmp/test_nginx_stream_no_macos.conf

    - name: Decode rendered nginx-stream configs
      ansible.builtin.set_fact:
        _nginx_stream: "{{ _nginx_stream_raw.results[0].content | b64decode }}"
        _nginx_stream_off: "{{ _nginx_stream_raw.results[1].content | b64decode }}"

    - name: Assert the macOS UDP relay renders toward the Edge nodes on 1521
      ansible.builtin.assert:
        that:
          - "'listen 521 udp' in _nginx_stream"
          - "'upstream cribl_edge_macos_udp_1521' in _nginx_stream"
          - "'proxy_pass cribl_edge_macos_udp_1521' in _nginx_stream"
          - "'server 192.168.0.180:1521;' in _nginx_stream"
          - "'server 192.168.0.181:1521;' in _nginx_stream"
          # NetFlow block untouched alongside it.
          - "'listen 2055 udp' in _nginx_stream"
          # Exactly one 521 listener — no duplicate with the family loop.
          - "_nginx_stream.count('listen 521 udp') == 1"
        fail_msg: >-
          nginx-stream.conf.j2 did not render the macOS UDP relay
          (521 -> Cribl Edge :1521) modeled on the NetFlow block.

    - name: Assert the macOS relay self-disables when the family joins the map
      ansible.builtin.assert:
        that:
          - "'listen 521 udp' not in _nginx_stream_off"
          - "'cribl_edge_macos_udp_1521' not in _nginx_stream_off"
          - "'listen 2055 udp' in _nginx_stream_off"
        fail_msg: >-
          The dedicated macOS relay must self-disable when
          haproxy_macos_udp_relay_enabled is false (macos family present in
          syslog_port_map) or nginx would fail on a duplicate 521 listener.

    - name: HAProxy template rendering PASSED
      ansible.builtin.debug:
        msg: |
          HAProxy template assertions passed:
          - Default path (haproxy_http_enabled: false): TCP/syslog renders;
            HTTP/HTTPS Jinja block stays gated off; DRY audit is a true no-op
          - Single-entry enabled: frontend http_in redirects to HTTPS,
            frontend https_in terminates TLS via SNI cert, routes by Host
            header to per-service backend, sets X-Forwarded-Proto;
            option httplog appears exactly twice (frontends only)
          - Multi-entry enabled: exactly one bind *:80 and one bind *:443
            (CRITICAL fix), two crt entries on the SNI bind line, two
            use_backend ACLs, two per-service backends

- name: Render and verify seerr templates
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Mirror roles/seerr/defaults/main.yml (test stand-ins for the
    # SOPS-sourced API key and tofu_data ports).
    seerr_image: "ghcr.io/seerr-team/seerr:v3.3.0"
    seerr_container_name: seerr
    seerr_bind_address: "0.0.0.0"
    seerr_tz: "UTC"
    seerr_log_level: "info"
    seerr_web_port: 5055
    seerr_config_dir: /opt/seerr/config
    seerr_api_key: "test-seerr-apikey-placeholder"
    _template_dir: "../../roles/seerr/templates"

  tasks:
    - name: Render seerr docker-compose.yml.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/docker-compose.yml.j2"
        dest: /tmp/test_seerr_compose.yml
        mode: "0644"

    - name: Read rendered seerr docker-compose.yml
      ansible.builtin.slurp:
        src: /tmp/test_seerr_compose.yml
      register: _seerr_compose_raw

    - name: Decode seerr compose content
      ansible.builtin.set_fact:
        _seerr_compose: "{{ _seerr_compose_raw.content | b64decode }}"

    - name: Assert seerr compose references image, port 5055, config mount
      ansible.builtin.assert:
        that:
          - "'ghcr.io/seerr-team/seerr:v3.3.0' in _seerr_compose"
          - "'5055:5055' in _seerr_compose"
          - "'/app/config' in _seerr_compose"
        fail_msg: >-
          seerr docker-compose.yml.j2 missing image, port 5055, or the
          /app/config mount

    - name: Render seerr settings.json.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/settings.json.j2"
        dest: /tmp/test_seerr_settings.json
        mode: "0640"

    - name: Read rendered seerr settings.json
      ansible.builtin.slurp:
        src: /tmp/test_seerr_settings.json
      register: _seerr_settings_raw

    - name: Parse seerr settings.json (must be valid JSON with the seeded key)
      ansible.builtin.set_fact:
        _seerr_settings: "{{ _seerr_settings_raw.content | b64decode | from_json }}"

    - name: Assert settings.json seeds the deterministic main.apiKey and minimal shape
      ansible.builtin.assert:
        that:
          - _seerr_settings.main.apiKey == seerr_api_key
          - "'radarr' in _seerr_settings"
          - "'sonarr' in _seerr_settings"
          - _seerr_settings.radarr | length == 0
          - _seerr_settings.sonarr | length == 0
        fail_msg: >-
          settings.json.j2 does not seed main.apiKey or is not valid minimal JSON

    - name: Seerr template rendering PASSED
      ansible.builtin.debug:
        msg: |
          Seerr template assertions passed:
          - docker-compose.yml.j2: image, port 5055:5055, /app/config mount
          - settings.json.j2: valid JSON seeding the deterministic main.apiKey

# =============================================================================
# servarr_wiring API body-construction logic (mocked schema — no live apps)
# =============================================================================
# The wiring role builds each POST body by taking the app's API schema and
# overriding only the field VALUES it controls (pure Jinja, no custom filter).
# This is the load-bearing, error-prone logic. Here we feed a CANNED schema
# (exactly the shape Prowlarr / Sonarr return from /schema) and assert the merge
# produces the right fields array — proving correctness without any live app.
- name: Verify servarr_wiring field-merge logic against a mocked schema
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Canned Prowlarr "Sonarr application" schema fragment (as /applications/schema
    # returns it): default field entries the role must preserve or override.
    _mock_prowlarr_schema_fields:
      - name: prowlarrUrl
        value: ""
      - name: baseUrl
        value: ""
      - name: apiKey
        value: ""
      - name: syncCategories
        value: [5000, 5010, 5030, 5040]
      - name: syncRejectBlocklistedTorrentHashesWhileGrabbing
        value: false
    # The override values the role injects for a Sonarr application.
    _mock_app_values:
      prowlarrUrl: "http://192.0.2.10:9696"
      baseUrl: "http://192.0.2.11:8989"
      apiKey: "sonarr-key-placeholder"

    # This is the EXACT expression from roles/servarr_wiring/tasks/prowlarr_apps.yml
    # (_app_fields). Keep it identical so the test guards the real logic.
    _merged_fields: >-
      {{ (_mock_prowlarr_schema_fields | rejectattr('name', 'in', _mock_app_values.keys()) | list)
         + (_mock_app_values | dict2items(key_name='name', value_name='value')) }}

    # Canned qBittorrent download-client schema fragment (Sonarr /downloadclient/schema).
    _mock_qbt_schema_fields:
      - name: host
        value: ""
      - name: port
        value: 8080
      - name: useSsl
        value: false
      - name: username
        value: ""
      - name: password
        value: ""
      - name: tvCategory
        value: ""
      - name: recentTvPriority
        value: 0
    _mock_qbt_values:
      host: "192.0.2.12"
      port: 8080
      username: admin
      password: "qbt-pass-placeholder"
      useSsl: false
      tvCategory: "tv"
    _merged_qbt_fields: >-
      {{ (_mock_qbt_schema_fields | rejectattr('name', 'in', _mock_qbt_values.keys()) | list)
         + (_mock_qbt_values | dict2items(key_name='name', value_name='value')) }}

  tasks:
    - name: Index merged Prowlarr fields by name for assertions
      ansible.builtin.set_fact:
        _pf: "{{ _merged_fields | items2dict(key_name='name', value_name='value') }}"

    - name: Assert Prowlarr application fields override values and preserve schema defaults
      ansible.builtin.assert:
        that:
          # Overrides applied verbatim.
          - _pf.prowlarrUrl == "http://192.0.2.10:9696"
          - _pf.baseUrl == "http://192.0.2.11:8989"
          - _pf.apiKey == "sonarr-key-placeholder"
          # Schema default NOT in the override set is preserved untouched.
          - _pf.syncCategories == [5000, 5010, 5030, 5040]
          - _pf.syncRejectBlocklistedTorrentHashesWhileGrabbing == false
          # No duplicate field names (the override must REPLACE, not append).
          - (_merged_fields | map(attribute='name') | list | length)
            == (_merged_fields | map(attribute='name') | unique | list | length)
        fail_msg: >-
          servarr_wiring Prowlarr field-merge produced wrong fields:
          {{ _merged_fields }}

    - name: Index merged qBittorrent fields by name for assertions
      ansible.builtin.set_fact:
        _qf: "{{ _merged_qbt_fields | items2dict(key_name='name', value_name='value') }}"

    - name: Assert qBittorrent download-client fields override values and preserve defaults
      ansible.builtin.assert:
        that:
          - _qf.host == "192.0.2.12"
          - _qf.username == "admin"
          - _qf.tvCategory == "tv"
          - _qf.useSsl == false
          # Schema default not overridden is preserved.
          - _qf.recentTvPriority == 0
          - (_merged_qbt_fields | map(attribute='name') | list | length)
            == (_merged_qbt_fields | map(attribute='name') | unique | list | length)
        fail_msg: >-
          servarr_wiring qBittorrent field-merge produced wrong fields:
          {{ _merged_qbt_fields }}

    - name: Servarr_wiring field-merge logic PASSED
      ansible.builtin.debug:
        msg: |
          servarr_wiring field-merge assertions passed (mocked schema, no live apps):
          - Prowlarr application: prowlarrUrl/baseUrl/apiKey overridden,
            syncCategories preserved, no duplicate field names
          - qBittorrent client: host/username/tvCategory/useSsl overridden,
            recentTvPriority preserved, no duplicate field names

# =============================================================================
# traefik — static config, dynamic routers, and the ACME EnvironmentFile
# =============================================================================
# Render-only: proves the Route53 DNS-01 resolver, the wildcard cert request on
# each router, the inventory-derived backends, and that the creds land in the
# EnvironmentFile (not the dynamic config). No live ACME / Traefik in CI.
- name: Render and verify traefik templates
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Mirror roles/traefik/defaults/main.yml (scrubbed domain + test creds).
    traefik_base_domain: "pve.example.com"
    # ACME email is optional; empty here to prove it is OMITTED from the rendered
    # config (no email literal ever lives in a committed file).
    traefik_acme_email: ""
    traefik_acme_ca_server: "https://acme-v02.api.letsencrypt.org/directory"
    traefik_acme_storage: /etc/traefik/acme/acme.json
    traefik_dynamic_dir: /etc/traefik/dynamic
    traefik_acme_dns_resolvers: ["1.1.1.1:53", "8.8.8.8:53"]
    traefik_dashboard_enabled: true
    # basicAuth reads a usersFile the role generates on the host at build time;
    # only the path is in the config — never a credential.
    traefik_dashboard_users_file: /etc/traefik/dashboard.htpasswd
    traefik_tls_min_version: VersionTLS12
    # Test creds (placeholders) for the EnvironmentFile.
    traefik_acme_aws_access_key_id: "AKIATESTACCESSKEYID00"
    traefik_acme_aws_secret_access_key: "testsecretplaceholderplaceholderplaceholde"
    traefik_acme_aws_region: "us-east-1"
    traefik_acme_route53_zone_id: "Z0123456789ABCDEFGHIJ"
    # The tofu-owned ingress table (tofu_data.ingress) the builder consumes:
    # single-backend {name, ip, port} rows plus the Proxmox apex {name, apex,
    # backends[], port} pool. Scrubbed/documentation values only. The real
    # builder (mirrored in the first task below) turns these into traefik_routes.
    traefik_ingress_routes:
      - { name: plex, ip: "192.0.2.10", port: 32400 }
      # HTTPS backend with a self-signed cert (e.g. Splunk Web) -> insecure_tls.
      - { name: splunk, ip: "192.0.2.12", port: 8000, scheme: https, insecure_tls: true }
      # Proxmox cluster-UI apex: load-balanced pool over the node FQDNs, sticky
      # + health-checked, https to self-signed node backends.
      - name: proxmox
        apex: true
        backends: ["proxmox1.example.com", "proxmox2.example.com", "proxmox3.example.com"]
        port: 8006
        scheme: https
        insecure_tls: true
        sticky: true
        health_check: true
    _template_dir: "../../roles/traefik/templates"

  tasks:
    # Build traefik_routes from the ingress table exactly as
    # roles/traefik/tasks/main.yml does, so this exercises the real route-builder
    # transform (apex fqdn, multi-backend servers list, scheme/sticky/health
    # flags) end-to-end into the template — not a hand-maintained output mirror.
    - name: Build traefik_routes from the fixture ingress table
      ansible.builtin.set_fact:
        traefik_routes: >-
          {{
            traefik_routes | default([]) + [{
              'name': item.name,
              'fqdn': (item.apex | default(false)) | ternary(
                        traefik_base_domain,
                        item.name ~ '.' ~ traefik_base_domain),
              'servers': (item.backends | default([item.ip | default('')]))
                         | map('regex_replace', '^', (item.scheme | default('http')) ~ '://')
                         | map('regex_replace', '$', ':' ~ (item.port | string))
                         | list,
              'scheme': item.scheme | default('http'),
              'insecure_tls': item.insecure_tls | default(false),
              'sticky': item.sticky | default(false),
              'health_check': item.health_check | default(false)
            }]
          }}
      loop: "{{ traefik_ingress_routes }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Assert the builder normalised apex + multi-backend rows correctly
      ansible.builtin.assert:
        that:
          # Single http backend -> one url; fqdn keeps the <name>. prefix.
          - (traefik_routes | selectattr('name', 'equalto', 'plex') | first).servers == ["http://192.0.2.10:32400"]
          - (traefik_routes | selectattr('name', 'equalto', 'plex') | first).fqdn == "plex.pve.example.com"
          # Apex row -> fqdn is the base domain itself + a 3-server pool.
          - (traefik_routes | selectattr('name', 'equalto', 'proxmox') | first).fqdn == "pve.example.com"
          - >-
            (traefik_routes | selectattr('name', 'equalto', 'proxmox') | first).servers
            == ["https://proxmox1.example.com:8006",
            "https://proxmox2.example.com:8006", "https://proxmox3.example.com:8006"]
          - (traefik_routes | selectattr('name', 'equalto', 'proxmox') | first).sticky | bool
          - (traefik_routes | selectattr('name', 'equalto', 'proxmox') | first).health_check | bool
        fail_msg: >-
          The route-builder did not normalise the ingress table correctly: apex
          fqdn, the multi-backend servers list, or the sticky/health flags wrong.

    - name: Render traefik static config to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/traefik.yml.j2"
        dest: /tmp/test_traefik.yml
        mode: "0640"

    - name: Read rendered traefik static config
      ansible.builtin.slurp:
        src: /tmp/test_traefik.yml
      register: _traefik_static_raw

    - name: Decode traefik static config
      ansible.builtin.set_fact:
        _traefik_static: "{{ _traefik_static_raw.content | b64decode }}"

    - name: Assert static config uses Route53 DNS-01 + secured API + TLS hardening
      ansible.builtin.assert:
        that:
          - "'provider: route53' in _traefik_static"
          - "'acme-v02.api.letsencrypt.org' in _traefik_static"
          - "'/etc/traefik/acme/acme.json' in _traefik_static"
          - "'insecure: false' in _traefik_static"
          - "'minVersion: VersionTLS12' in _traefik_static"
          # Empty ACME email -> the email line is omitted entirely.
          - "'email:' not in _traefik_static"
          # Credentials must NOT appear in the (group-readable) static config.
          - "'AKIATESTACCESSKEYID00' not in _traefik_static"
        fail_msg: >-
          traefik.yml.j2 missing the route53 resolver / secured API / TLS floor,
          emitted an email when none was set, or leaked AWS creds into the config.

    - name: Render traefik dynamic config to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/dynamic.yml.j2"
        dest: /tmp/test_traefik_dynamic.yml
        mode: "0640"

    - name: Read rendered traefik dynamic config
      ansible.builtin.slurp:
        src: /tmp/test_traefik_dynamic.yml
      register: _traefik_dynamic_raw

    - name: Decode + parse traefik dynamic config (must be valid YAML)
      ansible.builtin.set_fact:
        _traefik_dynamic: "{{ _traefik_dynamic_raw.content | b64decode }}"
        _traefik_dynamic_yaml: "{{ _traefik_dynamic_raw.content | b64decode | from_yaml }}"

    - name: Assert routers front each service with the wildcard cert + apex
      ansible.builtin.assert:
        that:
          - "'Host(`plex.pve.example.com`)' in _traefik_dynamic"
          - "'http://192.0.2.10:32400' in _traefik_dynamic"
          - "'*.pve.example.com' in _traefik_dynamic"
          # The apex router's Host rule is the base domain ITSELF (no <name>. prefix).
          - _traefik_dynamic_yaml.http.routers.proxmox.rule == "Host(`pve.example.com`)"
          # Wildcard requested via the resolver; dashboard secured by a usersFile
          # (no credential inline — the role generates the file on the host).
          - _traefik_dynamic_yaml.http.routers.plex.tls.certResolver == "letsencrypt"
          - "'dashboard-auth' in _traefik_dynamic_yaml.http.routers.dashboard.middlewares"
          - >-
            _traefik_dynamic_yaml.http.middlewares['dashboard-auth'].basicAuth.usersFile
            == "/etc/traefik/dashboard.htpasswd"
          - _traefik_dynamic_yaml.http.services.plex.loadBalancer.servers[0].url == "http://192.0.2.10:32400"
        fail_msg: >-
          dynamic.yml.j2 missing a router/service, the apex Host rule, the
          wildcard SAN, or the usersFile-secured dashboard.

    - name: Assert the apex service is a sticky, health-checked, 3-node pool
      ansible.builtin.assert:
        that:
          # Load-balanced across all three node UIs, in order.
          - _traefik_dynamic_yaml.http.services.proxmox.loadBalancer.servers | length == 3
          - >-
            (_traefik_dynamic_yaml.http.services.proxmox.loadBalancer.servers | map(attribute='url') | list)
            == ["https://proxmox1.example.com:8006",
            "https://proxmox2.example.com:8006", "https://proxmox3.example.com:8006"]
          # Sticky session cookie pins a browser to one node.
          - _traefik_dynamic_yaml.http.services.proxmox.loadBalancer.sticky.cookie.name == "proxmox_lb"
          - _traefik_dynamic_yaml.http.services.proxmox.loadBalancer.sticky.cookie.secure | bool
          # Health check (https, path /) drops a down node; insecure-backend
          # transport re-encrypts to the self-signed node certs.
          - _traefik_dynamic_yaml.http.services.proxmox.loadBalancer.healthCheck.path == "/"
          - _traefik_dynamic_yaml.http.services.proxmox.loadBalancer.healthCheck.scheme == "https"
          - _traefik_dynamic_yaml.http.services.proxmox.loadBalancer.serversTransport == "insecure-backend"
          # A single-backend http service gets neither sticky nor healthCheck.
          - "'sticky' not in _traefik_dynamic_yaml.http.services.plex.loadBalancer"
          - "'healthCheck' not in _traefik_dynamic_yaml.http.services.plex.loadBalancer"
        fail_msg: >-
          dynamic.yml.j2 apex service wrong: pool size/urls, sticky cookie,
          healthCheck, or serversTransport not rendered as expected.

    - name: Assert HTTPS backend gets an https URL + insecure-backend serversTransport
      ansible.builtin.assert:
        that:
          # The https backend keeps its scheme through to the service URL.
          - _traefik_dynamic_yaml.http.services.splunk.loadBalancer.servers[0].url == "https://192.0.2.12:8000"
          # Only the insecure_tls routes reference the shared transport...
          - _traefik_dynamic_yaml.http.services.splunk.loadBalancer.serversTransport == "insecure-backend"
          - "'serversTransport' not in _traefik_dynamic_yaml.http.services.plex.loadBalancer"
          # ...and that transport skips verification of the self-signed cert.
          - _traefik_dynamic_yaml.http.serversTransports['insecure-backend'].insecureSkipVerify | bool
        fail_msg: >-
          dynamic.yml.j2 did not honor scheme/insecure_tls: the https backend
          lost its scheme, the serversTransport was missing or leaked onto an
          http service, or insecureSkipVerify was not set.

    - name: Render traefik ACME EnvironmentFile to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/acme.env.j2"
        dest: /tmp/test_traefik_acme.env
        mode: "0600"

    - name: Read rendered ACME EnvironmentFile
      ansible.builtin.slurp:
        src: /tmp/test_traefik_acme.env
      register: _traefik_env_raw

    - name: Decode ACME EnvironmentFile
      ansible.builtin.set_fact:
        _traefik_env: "{{ _traefik_env_raw.content | b64decode }}"

    - name: Assert EnvironmentFile carries the Route53 creds + zone id
      ansible.builtin.assert:
        that:
          - "'AWS_ACCESS_KEY_ID=AKIATESTACCESSKEYID00' in _traefik_env"
          - "'AWS_SECRET_ACCESS_KEY=' in _traefik_env"
          - "'AWS_REGION=us-east-1' in _traefik_env"
          # AWS_HOSTED_ZONE_ID set -> lego can skip ListHostedZonesByName.
          - "'AWS_HOSTED_ZONE_ID=Z0123456789ABCDEFGHIJ' in _traefik_env"
        fail_msg: "acme.env.j2 missing one of the Route53 DNS-01 env vars"

    - name: Traefik template rendering PASSED
      ansible.builtin.debug:
        msg: |
          Traefik template assertions passed:
          - traefik.yml.j2: route53 DNS-01 resolver, secured API, TLS >= 1.2, no leaked creds
          - dynamic.yml.j2: per-service routers + backends, wildcard SAN, secured dashboard
          - acme.env.j2: AWS creds + AWS_HOSTED_ZONE_ID in the root-only EnvironmentFile

# =============================================================================
# syslog_forwarder — the rsyslog drop-in that forwards every log to the central
# syslog VIP (-> HAProxy -> Cribl Edge -> Splunk). Render + assert the omfwd rule.
# =============================================================================
- name: Render and verify syslog_forwarder template
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Mirror roles/syslog_forwarder/defaults/main.yml with scrubbed values.
    syslog_forwarder_target_host: "syslog.pve.example.com"
    syslog_forwarder_target_port: 1517
    syslog_forwarder_protocol: tcp
    syslog_forwarder_queue_max_disk_space: 256m
    # Mirror the group_vars wiring: program-specific routes rendered above
    # the catch-all (traefik -> the proxy family standard frontend).
    syslog_forwarder_program_routes:
      - program: traefik
        port: 523
    _sf_template_dir: "../../roles/syslog_forwarder/templates"

  tasks:
    - name: Render the syslog forward rule to /tmp
      ansible.builtin.template:
        src: "{{ _sf_template_dir }}/10-forward-cribl.conf.j2"
        dest: /tmp/test_syslog_forward.conf
        mode: "0644"

    - name: Read rendered syslog forward rule
      ansible.builtin.slurp:
        src: /tmp/test_syslog_forward.conf
      register: _sf_raw

    - name: Decode rendered syslog forward rule
      ansible.builtin.set_fact:
        _sf: "{{ _sf_raw.content | b64decode }}"

    - name: Assert all logs forward to the VIP over TCP with a disk-assisted queue
      ansible.builtin.assert:
        that:
          # All facilities/severities, via the omfwd output module.
          - "'*.*' in _sf"
          - "'action(type=' in _sf"
          - "'omfwd' in _sf"
          # To the stable syslog CNAME on the Linux port, over TCP.
          - "'syslog.pve.example.com' in _sf"
          - "'1517' in _sf"
          - "'protocol' in _sf"
          - "'tcp' in _sf"
          # Disk-assisted queue so a receiver outage buffers instead of dropping.
          - "'queue.filename' in _sf"
          - "'cribl_fwd' in _sf"
          - "'256m' in _sf"
        fail_msg: >-
          10-forward-cribl.conf.j2 did not render the expected omfwd rule
          (selector/target/port/protocol/queue).

    - name: Assert program routes render above the catch-all and stop
      ansible.builtin.assert:
        that:
          - "\"if $programname == 'traefik' then {\" in _sf"
          - "'port=\"523\"' in _sf"
          - "'queue.filename=\"cribl_fwd_traefik\"' in _sf"
          - "'stop' in _sf"
          # Order is load-bearing: the program route must precede the
          # catch-all *.* rule, or the catch-all consumes the line first.
          - "_sf.index(\"$programname == 'traefik'\") < _sf.index('*.*')"
        fail_msg: >-
          10-forward-cribl.conf.j2 did not render the program route above the
          catch-all with its own disk queue and a stop.

    - name: Syslog forwarder template rendering PASSED
      ansible.builtin.debug:
        msg: "syslog_forwarder: omfwd rule -> syslog.pve.example.com:1517/tcp with disk queue"

- name: Render and verify cribl_stream templates
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Mirror roles/cribl_stream/defaults/main.yml (only vars inputs.yml.j2 uses;
    # the real defaults derive these from tofu_data constants).
    cribl_stream_netflow_port: 2055
    cribl_stream_s2s_port: 10300
    cribl_stream_pq_enabled: true
    cribl_stream_prometheus_rw_port: 9201
    cribl_stream_prometheus_rw_api_path: /api/v1/write
    # Mirror the ai_log_routing-derived defaults (representative subset:
    # one tcpjson CLI source + one rsyslog-fed syslog-type source).
    cribl_stream_ai_log_routing:
      claude_code: { port: 10311, index: claude, sourcetype: "claude:code" }
      homelab_llm: { port: 10323, index: llm, sourcetype: llamaswap }
    cribl_stream_ai_input_types:
      homelab_llm: syslog
      openbao_audit: syslog
    cribl_stream_hec_namespace: ""
    cribl_stream_per_index_indexes: >-
      {{ (['netflow']
          + (cribl_stream_ai_log_routing.values() | map(attribute='index') | list))
         | unique | list }}
    # outputs.yml.j2 stand-ins (per-index render below).
    cribl_stream_splunk_hec_url: "https://splunk-hec.pve.example.com/services/collector/event"
    cribl_stream_splunk_hec_token: "test-hec-token-placeholder"
    cribl_stream_splunk_hec_tls_verify: false
    _template_dir: "../../roles/cribl_stream/templates"

  tasks:
    - name: Render cribl_stream inputs.yml.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/inputs.yml.j2"
        dest: /tmp/test_cribl_stream_inputs.yml
        mode: "0644"

    - name: Render force_splunk_meta conf.yml.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/pipelines/force_splunk_meta/conf.yml.j2"
        dest: /tmp/test_cribl_stream_force_splunk_meta.yml
        mode: "0644"

    - name: Render prometheus_to_netmon conf.yml.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/pipelines/prometheus_to_netmon/conf.yml.j2"
        dest: /tmp/test_cribl_stream_prometheus_to_netmon.yml
        mode: "0644"

    - name: Render ai_stamp conf.yml.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/pipelines/ai_stamp/conf.yml.j2"
        dest: /tmp/test_cribl_stream_ai_stamp.yml
        mode: "0644"

    - name: Render outputs.yml.j2 with per-index HEC enabled to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/outputs.yml.j2"
        dest: /tmp/test_cribl_stream_outputs_per_index.yml
        mode: "0644"
      vars:
        # Documentation-only namespace UUID (RFC 4122 test value).
        cribl_stream_hec_namespace: "11111111-2222-4333-8444-555555555555"

    - name: Read rendered cribl_stream templates
      ansible.builtin.slurp:
        src: "{{ item }}"
      register: _cribl_stream_rendered
      loop:
        - /tmp/test_cribl_stream_inputs.yml
        - /tmp/test_cribl_stream_force_splunk_meta.yml
        - /tmp/test_cribl_stream_prometheus_to_netmon.yml
        - /tmp/test_cribl_stream_ai_stamp.yml
        - /tmp/test_cribl_stream_outputs_per_index.yml

    - name: Decode cribl_stream rendered content
      ansible.builtin.set_fact:
        _cribl_stream_inputs: "{{ _cribl_stream_rendered.results[0].content | b64decode }}"
        _cribl_stream_meta_pipeline: "{{ _cribl_stream_rendered.results[1].content | b64decode }}"
        _cribl_stream_prom_pipeline: "{{ _cribl_stream_rendered.results[2].content | b64decode }}"
        _cribl_stream_ai_pipeline: "{{ _cribl_stream_rendered.results[3].content | b64decode }}"
        _cribl_stream_outputs_pi: "{{ _cribl_stream_rendered.results[4].content | b64decode }}"

    - name: Assert S2S input attaches the force_splunk_meta connection pipeline
      ansible.builtin.assert:
        that:
          - "'type: tcpjson' in _cribl_stream_inputs"
          - "'port: 10300' in _cribl_stream_inputs"
          - "'pipeline: force_splunk_meta' in _cribl_stream_inputs"
        fail_msg: >-
          inputs.yml.j2 must attach force_splunk_meta to the in_cribl_s2s
          connection — Cribl Edge skips its destination post-processing for
          pack-routed events, so unstamped events would fall into Splunk's
          HEC token defaults (index=main, sourcetype=httpevent)

    - name: Assert prometheus_rw input is present on port 9201 with prometheusAPI and prometheus_to_netmon pipeline
      ansible.builtin.assert:
        that:
          - "'type: prometheus_rw' in _cribl_stream_inputs"
          - "'port: 9201' in _cribl_stream_inputs"
          - "'prometheusAPI: /api/v1/write' in _cribl_stream_inputs"
          - "'pipeline: prometheus_to_netmon' in _cribl_stream_inputs"
        fail_msg: >-
          inputs.yml.j2 must include a prometheus_rw input on port 9201 with
          prometheusAPI: /api/v1/write (required by Cribl schema) connected
          to the prometheus_to_netmon pipeline

    - name: Assert AI ingest inputs render per routing entry with the right type
      ansible.builtin.assert:
        that:
          # tcpjson CLI source.
          - "'in_ai_claude_code' in _cribl_stream_inputs"
          - "'type: tcpjson' in _cribl_stream_inputs"
          - "'port: 10311' in _cribl_stream_inputs"
          # rsyslog-fed source renders a syslog-type, TCP-only input.
          - "'in_ai_homelab_llm' in _cribl_stream_inputs"
          - "'type: syslog' in _cribl_stream_inputs"
          - "'tcpPort: 10323' in _cribl_stream_inputs"
          # Both connect through the ai_stamp pipeline.
          - "'pipeline: ai_stamp' in _cribl_stream_inputs"
        fail_msg: >-
          inputs.yml.j2 must render one in_ai_<name> input per ai_log_routing
          entry (tcpjson by default, syslog-type for rsyslog senders), each
          connected via the ai_stamp pipeline

    - name: Assert ai_stamp pipeline stamps conditionally and parses as YAML
      ansible.builtin.assert:
        that:
          - "(_cribl_stream_ai_pipeline | from_yaml).functions | length == 2"
          - "'index ||' in _cribl_stream_ai_pipeline"
          - "'sourcetype ||' in _cribl_stream_ai_pipeline"
          - "\"__inputId.includes('in_ai_claude_code') ? 'claude'\" in _cribl_stream_ai_pipeline"
          - "\"__inputId.includes('in_ai_homelab_llm') ? 'llamaswap'\" in _cribl_stream_ai_pipeline"
          - "'matchRegex' in _cribl_stream_ai_pipeline"
          - "'replaceExpr' in _cribl_stream_ai_pipeline"
          - "'regex:' not in _cribl_stream_ai_pipeline"
        fail_msg: >-
          ai_stamp conf.yml must keep conditional evals (index || ...) driven by
          __inputId and the same matchRegex/replaceExpr mask schema as
          force_splunk_meta

    - name: Assert per-index HEC outputs render for netflow + every AI index
      ansible.builtin.assert:
        that:
          - "'splunk_hec_netflow' in _cribl_stream_outputs_pi"
          - "'splunk_hec_claude' in _cribl_stream_outputs_pi"
          - "'splunk_hec_llm' in _cribl_stream_outputs_pi"
          # Derived list is unique — no duplicated output ids.
          - "_cribl_stream_outputs_pi.count('id: splunk_hec_llm') == 1"
        fail_msg: >-
          outputs.yml.j2 with HEC_NAMESPACE set must render one dedicated
          splunk_hec_<index> output for netflow plus each unique
          ai_log_routing index

    - name: Assert force_splunk_meta evals are conditional and mask schema is valid
      ansible.builtin.assert:
        that:
          - "'index ||' in _cribl_stream_meta_pipeline"
          - "'sourcetype ||' in _cribl_stream_meta_pipeline"
          - "'matchRegex' in _cribl_stream_meta_pipeline"
          - "'replaceExpr' in _cribl_stream_meta_pipeline"
          - "'regex:' not in _cribl_stream_meta_pipeline"
          # Copilot datatypes stamp index=openai — there is no 'copilot' index;
          # openai is the designated Copilot/OpenAI CLI index (ai_log_routing).
          - "\"? 'openai'\" in _cribl_stream_meta_pipeline"
          - "\"? 'copilot'\" not in _cribl_stream_meta_pipeline"
        fail_msg: >-
          force_splunk_meta must keep conditional evals (index || ...) so
          Edge-stamped events pass through, and the mask rules must use
          matchRegex/replaceExpr — regex/replacement keys fail function init
          and silently disable the whole pipeline

    - name: Assert force_splunk_meta renders as parseable YAML
      ansible.builtin.assert:
        that:
          - "(_cribl_stream_meta_pipeline | from_yaml).functions | length == 2"
        fail_msg: "force_splunk_meta conf.yml must parse as YAML with eval + mask functions"

    - name: Assert prometheus_to_netmon stamps index=netmon_metrics and sourcetype=prometheus:metrics
      ansible.builtin.assert:
        that:
          - "(_cribl_stream_prom_pipeline | from_yaml).functions | length == 1"
          - "'netmon_metrics' in _cribl_stream_prom_pipeline"
          - "'prometheus:metrics' in _cribl_stream_prom_pipeline"
          - "'Number.isFinite' in _cribl_stream_prom_pipeline"
        fail_msg: >-
          prometheus_to_netmon pipeline must have exactly one eval function
          that coerces non-finite metric values and stamps index=netmon_metrics
          and sourcetype=prometheus:metrics

    - name: Cribl Stream template rendering PASSED
      ansible.builtin.debug:
        msg: |
          cribl_stream template assertions passed:
          - inputs.yml.j2: tcpjson S2S (10300/force_splunk_meta) + prometheus_rw (9201/prometheus_to_netmon)
          - force_splunk_meta: conditional evals + valid mask schema (matchRegex/replaceExpr)
          - prometheus_to_netmon: eval coerces non-finite values + stamps index=netmon_metrics

- name: Render and verify the cribl_edge syslog pipeline (unifi fw split)
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Mirror roles/cribl_edge/defaults/main.yml: a representative subset of the
    # tofu syslog_port_map plus the firewall-split match pattern.
    cribl_edge_syslog_routing:
      unifi: { standard: 514, high: 1514, index: unifi, sourcetype: "ubiquiti:unifi" }
      linux: { standard: 517, high: 1517, index: os, sourcetype: syslog }
    cribl_edge_unifi_fw_match: >-
      \[[A-Z][A-Z0-9_-]*-[AD]\]|\bIN=\S* OUT=\S* MAC=|suricata
    _template_dir: "../../roles/cribl_edge/templates"

  tasks:
    - name: Render the edge syslog pipeline to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/pipelines/syslog/conf.yml.j2"
        dest: /tmp/test_cribl_edge_syslog_pipeline.yml
        mode: "0644"

    - name: Read the rendered edge syslog pipeline
      ansible.builtin.slurp:
        src: /tmp/test_cribl_edge_syslog_pipeline.yml
      register: _edge_syslog_raw

    - name: Decode and parse the rendered edge syslog pipeline
      ansible.builtin.set_fact:
        _edge_syslog: "{{ _edge_syslog_raw.content | b64decode }}"
        _edge_syslog_yaml: "{{ _edge_syslog_raw.content | b64decode | from_yaml }}"

    - name: Extract the rendered index/sourcetype expressions
      ansible.builtin.set_fact:
        _edge_index_expr: >-
          {{ (_edge_syslog_yaml.functions | first).conf.add
             | selectattr('name', 'equalto', 'index') | map(attribute='value') | first }}
        _edge_sourcetype_expr: >-
          {{ (_edge_syslog_yaml.functions | first).conf.add
             | selectattr('name', 'equalto', 'sourcetype') | map(attribute='value') | first }}

    - name: Assert the unifi firewall/IPS split branch precedes the plain unifi branch
      ansible.builtin.assert:
        that:
          # The fw branch tests _raw against the match pattern on the unifi port.
          - "\".test(_raw) ? 'firewall' :\" in _edge_index_expr"
          - "\".test(_raw) ? 'ubiquiti:firewall' :\" in _edge_sourcetype_expr"
          # Ternary chains evaluate in order — the fw branch MUST come first,
          # otherwise the plain unifi branch swallows every gateway line.
          - "_edge_index_expr.index(\".test(_raw) ? 'firewall'\") < _edge_index_expr.index(\"? 'unifi'\")"
          # Non-unifi families are untouched (single plain branch each).
          - "\"__inputId.includes('1517') ? 'os' :\" in _edge_index_expr"
          - "_edge_index_expr.count('.test(_raw)') == 1"
        fail_msg: >-
          The unifi firewall/IPS split did not render before the plain unifi
          branch (or leaked into other families): {{ _edge_index_expr }}

    - name: Cribl Edge syslog pipeline rendering PASSED
      ansible.builtin.debug:
        msg: |
          cribl_edge syslog pipeline assertions passed:
          - unifi fw/IPS split branch (regex on _raw) renders BEFORE the plain
            unifi branch, stamping index=firewall sourcetype=ubiquiti:firewall
          - other families keep their single plain branch

- name: Render and verify unifi_metrics templates
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Mirror roles/unifi_metrics/defaults/main.yml (only vars the templates use).
    unifi_metrics_telegraf_interval: "30s"
    unifi_metrics_unpoller_port: 9130
    unifi_metrics_unpoller_image: "ghcr.io/unpoller/unpoller:v2.15.3"
    unifi_metrics_unpoller_container_name: unpoller
    unifi_metrics_telegraf_image: "telegraf:1.33-alpine"
    unifi_metrics_telegraf_container_name: telegraf
    unifi_metrics_telegraf_network_mode: host
    unifi_metrics_data_dir: /opt/unifi-metrics
    unifi_metrics_controller_url: "https://unifi.test.example"
    unifi_metrics_controller_user: "tester"
    unifi_metrics_controller_pass: "test-placeholder"
    unifi_metrics_controller_verify_ssl: false
    unifi_metrics_hec_url: "http://192.168.0.180:8088/services/collector/event"
    unifi_metrics_hec_token: ""
    _um_role_dir: "../../roles/unifi_metrics/templates"
    _um_cribl_dir: "../../roles/cribl_edge/templates"

  tasks:
    - name: Render unifi_metrics templates to /tmp
      ansible.builtin.template:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        mode: "0644"
      loop:
        - { src: "{{ _um_role_dir }}/telegraf.conf.j2", dest: /tmp/test_um_telegraf.conf }
        - { src: "{{ _um_role_dir }}/docker-compose.yml.j2", dest: /tmp/test_um_compose.yml }
        - { src: "{{ _um_cribl_dir }}/pipelines/netmon/conf.yml.j2", dest: /tmp/test_um_pipeline.yml }

    - name: Read rendered unifi_metrics templates
      ansible.builtin.slurp:
        src: "{{ item }}"
      register: _um
      loop:
        - /tmp/test_um_telegraf.conf
        - /tmp/test_um_compose.yml
        - /tmp/test_um_pipeline.yml

    - name: Decode rendered unifi_metrics content
      ansible.builtin.set_fact:
        _um_telegraf: "{{ _um.results[0].content | b64decode }}"
        _um_compose: "{{ _um.results[1].content | b64decode }}"
        _um_pipeline: "{{ _um.results[2].content | b64decode }}"

    - name: Assert telegraf scrapes unpoller and tags the stream
      ansible.builtin.assert:
        that:
          - "'stream = ' in _um_telegraf"
          - "'unifi_metrics' in _um_telegraf"
          - "'127.0.0.1:9130/metrics' in _um_telegraf"
          - "'splunkmetric' in _um_telegraf"
        fail_msg: >-
          telegraf.conf.j2 must scrape the unpoller exporter on :9130, ship
          splunkmetric, and tag stream=unifi_metrics (so Cribl branches the index)

    - name: Assert compose runs unpoller (Prometheus enabled) + telegraf
      ansible.builtin.assert:
        that:
          - "'unpoller' in _um_compose"
          - "'UP_PROMETHEUS_DISABLE' in _um_compose"
          - "'UP_UNIFI_DEFAULT_URL' in _um_compose"
          - "'telegraf.conf:/etc/telegraf/telegraf.conf' in _um_compose"
        fail_msg: >-
          docker-compose.yml.j2 must run unpoller with Prometheus enabled and a
          telegraf that mounts the rendered config

    - name: Assert cribl pipeline branches index on the stream tag
      ansible.builtin.assert:
        that:
          - "'unifi_metrics' in _um_pipeline"
          - "'netmon_metrics' in _um_pipeline"
          - "'stream' in _um_pipeline"
        fail_msg: >-
          the shared cribl netmon pipeline must branch index/sourcetype on the
          stream tag so unifi_metrics events land in index=unifi_metrics while
          netmon (no stream tag) stays index=netmon_metrics

    - name: UniFi metrics template rendering PASSED
      ansible.builtin.debug:
        msg: |
          unifi_metrics template assertions passed:
          - telegraf.conf.j2: inputs.prometheus scrape of unpoller :9130 + stream tag + splunkmetric HEC
          - docker-compose.yml.j2: unpoller (Prometheus) + telegraf
          - cribl netmon pipeline: index branches on stream=unifi_metrics

# =============================================================================
# wan_hop_discovery — the mtr-JSON parse -> RFC1918/??? reject -> echo-validate ->
# first-N fold logic, plus the network_quality smokeping target render. No live
# mtr/network: a canned `mtr -j` payload (shaped like the real Comcast trace)
# drives the EXACT filter chain from roles/wan_hop_discovery/tasks/main.yml, so
# this guards the real parsing/fold expressions, not a hand-maintained mirror.
# =============================================================================
- name: Verify wan_hop_discovery parse/fold logic + smokeping target render
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Mirror roles/wan_hop_discovery/defaults/main.yml.
    wan_hop_discovery_private_regex: '^(10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[01])\.|169\.254\.)'
    wan_hop_discovery_probe_target: "1.1.1.1"
    wan_hop_discovery_max_hops: 3
    # CGNAT 100.64/10 echo-validation stand-in (single-quoted -> literal `^100\.`).
    _cgnat_regex: '^100\.'
    # Canned `mtr -n -r -j 1.1.1.1` report: LAN gw (10.x, drop), link-local
    # (169.254, drop), CGNAT edge (100.64/10, kept as candidate then dropped by
    # echo-validation), two public Comcast hops (96.x, kept), unresponsive (???, drop).
    _sample_mtr: >-
      {"report":{"mtr":{"dst":"1.1.1.1"},"hubs":[
        {"count":"1","host":"10.0.1.1"},
        {"count":"2","host":"169.254.0.1"},
        {"count":"3","host":"100.93.238.67"},
        {"count":"4","host":"96.110.170.225"},
        {"count":"5","host":"96.108.122.13"},
        {"count":"6","host":"???"}
      ]}}
    # Mirror the generic modem + anycast defaults shared by both consumer roles.
    network_quality_modem_ip: "192.168.100.1"
    network_quality_anycast_targets: ["1.1.1.1", "8.8.8.8"]
    prometheus_stack_modem_ip: "192.168.100.1"
    prometheus_stack_anycast_targets: ["1.1.1.1", "8.8.8.8"]
    # network_quality smokeping.yml.j2 inputs.
    network_quality_smokeping_interval: "1s"
    network_quality_ip_protocol: "ip4"
    _template_dir: "../../roles/network_quality/templates"

  tasks:
    - name: Extract public hop candidates (exact chain from tasks/main.yml)
      ansible.builtin.set_fact:
        _candidates: >-
          {{ (_sample_mtr | from_json).report.hubs
             | map(attribute='host') | list
             | reject('match', wan_hop_discovery_private_regex)
             | reject('equalto', '???')
             | reject('equalto', wan_hop_discovery_probe_target)
             | unique | list }}

    - name: Assert RFC1918 + unresponsive dropped; CGNAT + public kept as candidates
      ansible.builtin.assert:
        that:
          - _candidates == ['100.93.238.67', '96.110.170.225', '96.108.122.13']
        fail_msg: "candidate extraction wrong: {{ _candidates }}"

    - name: Simulate echo-validation (CGNAT 100.64/10 answers traceroute, not echo)
      ansible.builtin.set_fact:
        _reachable: "{{ _candidates | reject('match', _cgnat_regex) | list }}"

    - name: Select effective ISP hops (first N echo-reachable)
      ansible.builtin.set_fact:
        wan_hop_discovery_isp_hops: "{{ _reachable[0:wan_hop_discovery_max_hops] }}"

    - name: Assert only echo-reachable public hops survive (CGNAT dropped)
      ansible.builtin.assert:
        that:
          - wan_hop_discovery_isp_hops == ['96.110.170.225', '96.108.122.13']
        fail_msg: "ISP-hop selection wrong: {{ wan_hop_discovery_isp_hops }}"

    - name: Build the consumer target lists (exact expressions from role defaults)
      ansible.builtin.set_fact:
        network_quality_smokeping_targets: >-
          {{ [network_quality_modem_ip]
             + (wan_hop_discovery_isp_hops | default([]))
             + (network_quality_anycast_targets | default([])) }}
        _icmp_targets: >-
          {{ [prometheus_stack_modem_ip]
             + (wan_hop_discovery_isp_hops | default([]))
             + (prometheus_stack_anycast_targets | default([])) }}

    - name: Assert the blackbox icmp job folds modem + ISP hops + anycast in order
      ansible.builtin.assert:
        that:
          - >-
            _icmp_targets ==
            ['192.168.100.1', '96.110.170.225', '96.108.122.13', '1.1.1.1', '8.8.8.8']
        fail_msg: "blackbox icmp target fold wrong: {{ _icmp_targets }}"

    - name: Render network_quality smokeping.yml.j2 with the folded targets
      ansible.builtin.template:
        src: "{{ _template_dir }}/smokeping.yml.j2"
        dest: /tmp/test_smokeping.yml
        mode: "0644"

    - name: Read rendered smokeping.yml
      ansible.builtin.slurp:
        src: /tmp/test_smokeping.yml
      register: _smokeping_raw

    - name: Parse rendered smokeping.yml (must be valid YAML)
      ansible.builtin.set_fact:
        _smokeping_yaml: "{{ _smokeping_raw.content | b64decode | from_yaml }}"

    - name: Assert smokeping pings modem + ISP hops + anycast, never the CGNAT edge
      ansible.builtin.assert:
        that:
          - >-
            _smokeping_yaml.targets[0].hosts ==
            ['192.168.100.1', '96.110.170.225', '96.108.122.13', '1.1.1.1', '8.8.8.8']
          - "'100.93.238.67' not in _smokeping_yaml.targets[0].hosts"
          - _smokeping_yaml.targets[0].interval == "1s"
          - _smokeping_yaml.targets[0].protocol == "icmp"
        fail_msg: >-
          smokeping.yml.j2 did not render the folded target list, or the non-echo
          CGNAT hop leaked into the ping set: {{ _smokeping_yaml }}

    - name: Assert empty-discovery degrades safely to modem + anycast only
      ansible.builtin.assert:
        that:
          - >-
            ([network_quality_modem_ip] + ([] | default([]))
             + (network_quality_anycast_targets | default([])))
            == ['192.168.100.1', '1.1.1.1', '8.8.8.8']
        fail_msg: "empty-discovery fallback wrong"

    - name: Simulate a failed mtr run (rc=1, empty stdout)
      ansible.builtin.set_fact:
        wan_hop_discovery_mtr: {rc: 1, stdout: ""}

    - name: Build candidates with the role's guarded ternary (exact expression)
      ansible.builtin.set_fact:
        _failed_candidates: >-
          {{ ((wan_hop_discovery_mtr.stdout | from_json).report.hubs
              | map(attribute='host') | list
              | reject('match', wan_hop_discovery_private_regex)
              | reject('equalto', '???')
              | reject('equalto', wan_hop_discovery_probe_target)
              | unique | list)
             if (wan_hop_discovery_mtr.rc | default(1) == 0
                 and (wan_hop_discovery_mtr.stdout | default('') | length) > 0)
             else [] }}

    - name: Assert a failed mtr degrades to empty candidates (no from_json crash)
      ansible.builtin.assert:
        that:
          - _failed_candidates == []
        fail_msg: >-
          guarded mtr parse did not degrade to [] on failure: {{ _failed_candidates }}

    - name: WAN-hop discovery logic + render PASSED
      ansible.builtin.debug:
        msg: |
          wan_hop_discovery assertions passed (canned mtr -j, no live network):
          - parse: RFC1918 + link-local + ??? dropped, CGNAT + public kept
          - echo-validate: non-echo CGNAT 100.64/10 dropped, public hops kept
          - fold: smokeping + blackbox icmp = modem + ISP hops + anycast (in order)
          - smokeping.yml.j2 renders valid YAML with the folded ping set
          - empty discovery degrades to modem + anycast
          - failed mtr (rc!=0) degrades to [] candidates without a from_json crash

# =============================================================================
# llama_cpp — llama-swap config + systemd unit (light serving tier)
# =============================================================================
- name: Render and verify llama_cpp templates
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Mirror roles/llama_cpp/defaults/main.yml (literal stand-ins for the tofu
    # port + the gpu-derived values, so the render is offline and deterministic).
    llama_cpp_user: llama-cpp
    llama_cpp_group: llama-cpp
    llama_cpp_install_dir: /opt/llama-cpp
    llama_cpp_server_bin: /opt/llama-cpp/llama-server
    llama_cpp_swap_bin: /usr/local/bin/llama-swap
    llama_cpp_data_dir: /var/lib/llama-cpp
    llama_cpp_models_dir: /var/lib/llama-cpp/models
    llama_cpp_config_file: /etc/llama-swap/config.yaml
    llama_cpp_gpu: true
    llama_cpp_hsa_override_gfx_version: "10.3.0"
    llama_cpp_ngl: "99"
    llama_cpp_ctx_size: 8192
    llama_cpp_api_port: 10434
    llama_cpp_start_port: 9200
    llama_cpp_health_check_timeout: 300
    # Only the fields the templates consume (name/aliases/gguf/embeddings).
    llama_cpp_models:
      - { name: hermes-4-14b, aliases: [], gguf: "hermes.gguf", embeddings: false }
      - { name: qwen3-4b, aliases: [], gguf: "qwen.gguf", embeddings: false }
      - { name: embeddings, aliases: [nomic-embed-text-v1.5], gguf: "nomic.gguf", embeddings: true }
    _template_dir: "../../roles/llama_cpp/templates"

  tasks:
    - name: Render llama-swap.yaml.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/llama-swap.yaml.j2"
        dest: /tmp/test_llama_swap.yaml
        mode: "0644"

    - name: Parse rendered llama-swap config (must be valid YAML)
      ansible.builtin.set_fact:
        _llama_swap: "{{ (lookup('file', '/tmp/test_llama_swap.yaml')) | from_yaml }}"

    - name: Assert llama-swap renders VRAM-disciplined groups (embeddings resident, chat swaps)
      ansible.builtin.assert:
        that:
          - "'hermes-4-14b' in _llama_swap.models"
          - "'qwen3-4b' in _llama_swap.models"
          - "'embeddings' in _llama_swap.models"
          # Full co-residency exceeded the 16 GB card and hard-hung the host;
          # only the embeddings model stays resident, chat models swap.
          - _llama_swap.groups.embeddings.swap == false
          - _llama_swap.groups.embeddings.members == ['embeddings']
          - _llama_swap.groups.chat.swap == true
          - (_llama_swap.groups.chat.members | sort) == ['hermes-4-14b', 'qwen3-4b']
        fail_msg: >-
          llama-swap.yaml.j2 did not render the VRAM-disciplined groups: {{ _llama_swap }}

    - name: Assert the shared macro offloads to GPU and per-model cmd flags differ
      ansible.builtin.assert:
        that:
          # -ngl lives in the shared macro (expanded by llama-swap at runtime).
          - "'-ngl 99' in _llama_swap.macros['server-base']"
          - "'${server-base}' in _llama_swap.models['hermes-4-14b'].cmd"
          - "'--jinja' in _llama_swap.models['hermes-4-14b'].cmd"
          - "'/var/lib/llama-cpp/models/hermes.gguf' in _llama_swap.models['hermes-4-14b'].cmd"
          - "'--embeddings' in _llama_swap.models['embeddings'].cmd"
          - "'--jinja' not in _llama_swap.models['embeddings'].cmd"
        fail_msg: >-
          llama-swap macro/cmd missing GPU offload / chat / embeddings flags:
          macros={{ _llama_swap.macros }} models={{ _llama_swap.models }}

    - name: Render llama-swap.service.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/llama-swap.service.j2"
        dest: /tmp/test_llama_swap.service
        mode: "0644"

    - name: Read rendered llama-swap unit
      ansible.builtin.slurp:
        src: /tmp/test_llama_swap.service
      register: _llama_unit_raw

    - name: Decode llama-swap unit
      ansible.builtin.set_fact:
        _llama_unit: "{{ _llama_unit_raw.content | b64decode }}"

    - name: Assert the unit sets ROCm env and listens on the api port
      ansible.builtin.assert:
        that:
          - "'HSA_OVERRIDE_GFX_VERSION=10.3.0' in _llama_unit"
          - "'LD_LIBRARY_PATH=/opt/llama-cpp' in _llama_unit"
          - "'--listen 0.0.0.0:10434' in _llama_unit"
          - "'User=llama-cpp' in _llama_unit"
        fail_msg: "llama-swap.service.j2 missing ROCm env, listen port, or user: {{ _llama_unit }}"

    - name: Llama.cpp template rendering PASSED
      ansible.builtin.debug:
        msg: |
          llama_cpp assertions passed:
          - llama-swap.yaml.j2: 3 co-resident models (group swap:false), hermes4
            alias, GPU offload + chat/embeddings flags
          - llama-swap.service.j2: HSA override, LD_LIBRARY_PATH, listen port, user

# =============================================================================
# llm_router — LiteLLM config + env file + systemd unit (fabric front door)
# =============================================================================
- name: Render and verify llm_router templates
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Mirror roles/llm_router/defaults/main.yml (literal stand-ins for the tofu
    # ports + env-sourced secrets; scrubbed subdomain).
    llm_router_user: litellm
    llm_router_group: litellm
    llm_router_home: /var/lib/litellm
    llm_router_venv: /opt/litellm-venv
    llm_router_service: litellm
    llm_router_config_file: /etc/litellm/config.yaml
    llm_router_env_file: /etc/litellm/litellm.env
    llm_router_api_port: 4000
    llm_router_llm_fast_base_url: "http://llm-fast.pve.example.net:10434/v1"
    llm_router_llm_fast_enabled: true
    llm_router_llm_light_base_url: "http://llm-light.pve.example.net:10434/v1"
    llm_router_llm_large_base_url: "https://llm-large.example.net:11434/v1"
    llm_router_large_models:
      - { alias: gpt-oss-120b, backend: mlx-community/gpt-oss-120b-MXFP4-Q8, context_window: 131072 }
      - { alias: Qwen3-Coder-30B-A3B, backend: mlx-community/Qwen3-Coder-30B-A3B-Instruct-4bit, context_window: 262144 }
      - { alias: Qwen3.6-35B-A3B-4bit, backend: mlx-community/Qwen3.6-35B-A3B-4bit, context_window: 262144 }
      - { alias: Qwen3.6-27B-4bit, backend: mlx-community/Qwen3.6-27B-4bit, context_window: 262144 }
      - { alias: claude-sonnet-5, backend: mlx-community/Qwen3.6-35B-A3B-4bit, context_window: 262144 }
    llm_router_light_models:
      - { alias: hermes-4-14b, backend: hermes-4-14b }
      - { alias: qwen3-4b, backend: qwen3-4b }
      - { alias: embeddings, backend: embeddings, embedding: true }
      - { alias: claude-haiku-4-5, backend: hermes-4-14b }
    llm_router_routing_strategy: simple-shuffle
    llm_router_allowed_fails: 2
    llm_router_cooldown_time: 30
    llm_router_num_retries: 2
    llm_router_request_timeout_seconds: 300
    llm_router_health_check_interval: 300
    llm_router_background_health_checks: false
    llm_router_light_api_key: "sk-noauth"
    llm_router_master_key: "test-master-key-placeholder"
    llm_router_llm_large_bearer: "test-bearer-placeholder"
    llm_router_otel_endpoint: "http://cribl-edge.pve.example.net:4318"
    _template_dir: "../../roles/llm_router/templates"

  tasks:
    - name: Render config.yaml.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/config.yaml.j2"
        dest: /tmp/test_litellm_config.yaml
        mode: "0644"

    - name: Parse rendered LiteLLM config (must be valid YAML)
      ansible.builtin.set_fact:
        _litellm: "{{ (lookup('file', '/tmp/test_litellm_config.yaml')) | from_yaml }}"

    - name: Index the model_list model_names
      ansible.builtin.set_fact:
        _model_names: "{{ _litellm.model_list | map(attribute='model_name') | list }}"

    - name: Assert large tier is bearer-authed and light tier is dual-deployment
      ansible.builtin.assert:
        that:
          # Large tier: one deployment each, bearer via env.
          - _model_names | select('equalto', 'gpt-oss-120b') | list | length == 1
          - _model_names | select('equalto', 'Qwen3-Coder-30B-A3B') | list | length == 1
          - _model_names | select('equalto', 'Qwen3.6-35B-A3B-4bit') | list | length == 1
          - _model_names | select('equalto', 'Qwen3.6-27B-4bit') | list | length == 1
          - _model_names | select('equalto', 'claude-sonnet-5') | list | length == 1
          # Light tier: two deployments per alias (GPU llm-fast + CPU llm-light).
          - _model_names | select('equalto', 'hermes-4-14b') | list | length == 2
          - _model_names | select('equalto', 'qwen3-4b') | list | length == 2
          - _model_names | select('equalto', 'embeddings') | list | length == 2
          - _model_names | select('equalto', 'claude-haiku-4-5') | list | length == 2
          # Secrets referenced via os.environ, never a literal in the config.
          - "'test-master-key-placeholder' not in (lookup('file', '/tmp/test_litellm_config.yaml'))"
          - _litellm.general_settings.master_key == 'os.environ/LLM_ROUTER_MASTER_KEY'
        fail_msg: "config.yaml.j2 model_list / auth wrong: {{ _litellm.model_list }}"

    - name: Index each model's rendered max_input_tokens by name
      vars:
        _ctxd: "{{ _litellm.model_list | selectattr('model_info.max_input_tokens', 'defined') }}"
      ansible.builtin.set_fact:
        _ctx: >-
          {{ dict(_ctxd | map(attribute='model_name') | zip(
             _ctxd | map(attribute='model_info.max_input_tokens'))) }}

    - name: Assert every large model gets a real max_input_tokens
      ansible.builtin.assert:
        that:
          # Without an explicit context_window, these mlx-community backend ids are
          # unknown to LiteLLM's cost map and max_input_tokens silently resolves to
          # null — the root cause of the Hermes/OpenWebUI context-collapse bug this
          # fixes. Assert every large deployment carries its real native context.
          - _ctx['gpt-oss-120b'] == 131072
          - _ctx['Qwen3-Coder-30B-A3B'] == 262144
          - _ctx['Qwen3.6-35B-A3B-4bit'] == 262144
          - _ctx['Qwen3.6-27B-4bit'] == 262144
          - _ctx['claude-sonnet-5'] == 262144
        fail_msg: "config.yaml.j2 did not render max_input_tokens for all large models: {{ _litellm.model_list }}"

    - name: Assert routing, health checks, and observability callbacks
      ansible.builtin.assert:
        that:
          - _litellm.router_settings.routing_strategy == 'simple-shuffle'
          - _litellm.router_settings.cooldown_time == 30
          # Active probes spawn models on the swap tier — passive by default.
          - _litellm.general_settings.background_health_checks == false
          # OTLP only: the direct langfuse callback is v2-SDK-only and Langfuse
          # is fed via the Cribl fan-out instead.
          - _litellm.litellm_settings.callbacks == ['otel']
          # embeddings deployments declare the embedding mode.
          - >-
            (_litellm.model_list | selectattr('model_name', 'equalto', 'embeddings')
             | map(attribute='model_info.mode') | list) == ['embedding', 'embedding']
        fail_msg: "config.yaml.j2 routing / callbacks / embedding-mode wrong: {{ _litellm }}"

    - name: Render litellm.env.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/litellm.env.j2"
        dest: /tmp/test_litellm.env
        mode: "0644"

    - name: Read rendered litellm env file
      ansible.builtin.slurp:
        src: /tmp/test_litellm.env
      register: _litellm_env_raw

    - name: Decode litellm env file
      ansible.builtin.set_fact:
        _litellm_env: "{{ _litellm_env_raw.content | b64decode }}"

    - name: Assert the env file carries the secrets and full OTLP traces path
      ansible.builtin.assert:
        that:
          - "'LLM_ROUTER_MASTER_KEY=test-master-key-placeholder' in _litellm_env"
          - "'LLM_LARGE_BEARER_TOKEN=test-bearer-placeholder' in _litellm_env"
          - "'OTEL_EXPORTER=otlp_http' in _litellm_env"
          - "'OTEL_ENDPOINT=http://cribl-edge.pve.example.net:4318/v1/traces' in _litellm_env"
        fail_msg: "litellm.env.j2 missing secrets or OTLP traces path: {{ _litellm_env }}"

    - name: Render litellm.service.j2 to /tmp
      ansible.builtin.template:
        src: "{{ _template_dir }}/litellm.service.j2"
        dest: /tmp/test_litellm.service
        mode: "0644"

    - name: Read rendered litellm unit
      ansible.builtin.slurp:
        src: /tmp/test_litellm.service
      register: _litellm_unit_raw

    - name: Decode litellm unit
      ansible.builtin.set_fact:
        _litellm_unit: "{{ _litellm_unit_raw.content | b64decode }}"

    - name: Assert the unit loads the env file and serves on the api port
      ansible.builtin.assert:
        that:
          - "'EnvironmentFile=/etc/litellm/litellm.env' in _litellm_unit"
          - "'--config /etc/litellm/config.yaml' in _litellm_unit"
          - "'--port 4000' in _litellm_unit"
          - "'/opt/litellm-venv/bin/litellm' in _litellm_unit"
        fail_msg: "litellm.service.j2 missing env file, config, or listen port: {{ _litellm_unit }}"

    - name: LiteLLM router template rendering PASSED
      ansible.builtin.debug:
        msg: |
          llm_router assertions passed:
          - config.yaml.j2: large tier bearer-authed (1 each), light tier dual
            deployment (2 each, GPU+CPU), master_key via os.environ, otel
            callback, embedding mode on the embeddings group
          - litellm.env.j2: secrets + full OTLP /v1/traces endpoint
          - litellm.service.j2: EnvironmentFile, config, listen port

# =============================================================================
# plex / sonarr / radarr persistence guards (unit-style — no molecule scenario
# exists for these roles, so their tasks/main.yml is asserted directly here,
# the same way the servarr_wiring field-merge and traefik route-builder logic
# above are verified without a live app)
# =============================================================================
# Each guard checks its own config/data dir is a real persistent mountpoint,
# alerts ntfy, then FAILS the converge if not — never just a warning. Asserted
# by reading the role's own (un-rendered) task source and confirming the
# mountpoint check, the ntfy alert, and the fail all exist together.
- name: Verify the plex/sonarr/radarr persistence guards are fail-loud (unit-style)
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Read each role's tasks/main.yml
      ansible.builtin.slurp:
        src: "../../roles/{{ item }}/tasks/main.yml"
      loop:
        - plex
        - sonarr
        - radarr
      register: _persistence_guard_tasks_raw

    - name: Decode each role's tasks/main.yml, keyed by role name
      ansible.builtin.set_fact:
        _persistence_guard_tasks: >-
          {{ _persistence_guard_tasks | default({})
             | combine({item.item: (item.content | b64decode)}) }}
      loop: "{{ _persistence_guard_tasks_raw.results }}"
      loop_control:
        label: "{{ item.item }}"

    # The role's tasks are un-rendered Jinja on disk (the {{ }} placeholders are
    # literal text here, not resolved values) — {% raw %} keeps THIS assert's
    # own templating pass from consuming them so the search strings match
    # verbatim.
    - name: Compute the literal, un-rendered mountpoint snippet per role
      ansible.builtin.set_fact:
        _persistence_guard_snippets:
          plex: "mountpoint -q /var/lib/plexmediaserver"
          sonarr: "mountpoint -q {% raw %}{{ sonarr_data_dir }}{% endraw %}"
          radarr: "mountpoint -q {% raw %}{{ radarr_data_dir }}{% endraw %}"

    - name: Assert each role's persistence guard checks, alerts, then fails
      ansible.builtin.assert:
        that:
          - _persistence_guard_snippets[item] in _persistence_guard_tasks[item]
          - "'ansible.builtin.fail' in _persistence_guard_tasks[item]"
          - (_persistence_guard_tasks[item].count(item ~ '_ntfy_url')) >= 1
        fail_msg: >-
          The {{ item }} role no longer has a fatal mountpoint guard (with an
          ntfy alert) for its config/data dir.
      loop:
        - plex
        - sonarr
        - radarr

    - name: Plex/Sonarr/Radarr persistence guard verification PASSED
      ansible.builtin.debug:
        msg: |
          Persistence guard assertions passed for plex, sonarr, radarr:
          - each checks its config/data dir is a real persistent mountpoint
          - each alerts ntfy (<role>_ntfy_url) before failing
          - each FAILS the converge (not just a warning) when not persistent
