# identifier — safe to commit. Matches the ansible-proxmox and
# terraform-proxmox sibling repos.
creation_rules:
  - path_regex: \.enc\.ya?ml$
    age: "age1y0jvtlp2ac8fwwvh2nzm88ehye74jlseywjrjcjqll7u8vycsedq788tp9"
